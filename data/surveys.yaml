      what_it_solves: Automatically designing ablation studies to validate research
        claims, and benchmarking LM capabilities for this task.
      what_remains_open: Current LMs achieve only 45% recall on ablation identification,
        far below human performance; inverse performance between author and reviewer
        tasks indicates grounding issues.
