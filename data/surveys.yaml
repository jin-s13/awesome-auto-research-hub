  related_work_outline:
  - 'Mainstream direction: The dominant thrust is building LLM-based autonomous research
    agents and evaluating them through benchmarks or held-out scientific tasks. The
    most developed exemplar is an auditable AI scientist for materials science that
    runs a search over modeling changes and validates on unseen data (Auto Research
    for Materials).'
  - 'Shared research pattern: Most works design an agent loop that generates hypotheses,
    code, or experiments, then assesses outcomes via a fixed evaluation protocol—either
    a predefined benchmark (ReportBench, SciCode) or a held-out test set. The focus
    is on improving the agent''s ability to produce useful research artifacts that
    survive a final validation step.'
  - 'Key differences: Evaluation targets diverge: some measure survey writing quality,
    others test research coding, rebuttal crafting, or actual predictive improvement
    on domain-specific tasks. The level of autonomy varies from fully closed-loop
    systems that search over modeling spaces to systems with human-in-the-loop or
    task-specific scaffolds.'
  - 'Trend evolution: From 2024 to 2026, the evidence moves from static research-coding
    benchmarks (SciCode, 2024) toward interactive, closed-loop evaluation of research
    agents (ReportBench, 2025) and then to domain-specific autonomous systems with
    held-out validation (2026), indicating a shift toward real-world scientific discovery
    as the target.'
  - 'Open questions: The generalization of agent-made discoveries across domains remains
    untested; most systems are evaluated on a handful of tasks. It is unclear whether
    proxy metrics like survey quality or benchmark scores align with genuine scientific
    progress, and the robustness of held-out validation when only a few endpoints
    are used is still uncertain.'
  related_work_outline_zh:
  - 主流方向：主流推力是构建基于 LLM 的自主研究智能体，并通过基准测试或留出科学任务进行评估。最具代表性的工作是材料科学的可审计 AI 科学家，该工作在建模变化上执行搜索并在未见数据上验证（Auto
    Research for Materials）。
  - 研究共性：多数工作设计一个智能体循环，生成假设、代码或实验，然后通过固定评估协议（预定义基准或留出测试集）衡量结果。焦点在于提升智能体产生有用研究产物的能力，且这些产物能在最终验证步骤中存活。
  - 关键差异：评估目标分化：有的衡量综述写作质量，有的测试研究编码、反驳撰写或特定领域任务上的实际预测改进。自主程度从完全闭环搜索建模空间，到含有人类参与或任务特定脚手架的系统各不相同。
  - 趋势演进：从 2024 到 2026 年，证据从静态研究编码基准（SciCode, 2024）转向交互式、闭环评估研究智能体（ReportBench, 2025），再到具备留出验证的领域特定自主系统（2026），表明目标正在向真实世界科学发现迁移。
  - 开放问题：智能体发现跨领域泛化能力仍未经检验；多数系统仅在两三个任务上评估。尚不清楚综述质量、基准分数等代理指标是否与真实科学进步一致，且仅使用少量端点进行留出验证的鲁棒性仍然存疑。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design for research agents
      what_it_solves: Creates standardized tasks and metrics to compare research agents
        across coding, survey writing, and rebuttal quality, ensuring comparability
        and reproducibility.
      what_remains_open: Whether these benchmarks capture the open-ended nature of
        real research, and how well their proxy metrics correlate with downstream
        scientific utility.
    - line: System architectures for autonomous research loops
      what_it_solves: Automates the cycle of hypothesis generation, experimentation,
        and validation, often within a specific domain, to produce reusable code and
        verifiable modeling improvements.
      what_remains_open: Robustness across domains, scalability beyond a handful of
        evaluation endpoints, and dependence on pre-defined search spaces that may
        limit discovery.
    - line: Conceptual taxonomies for research automation
      what_it_solves: Organizes the space of research tasks, agent roles, and evaluation
        criteria into frameworks that guide future system design.
      what_remains_open: Empirical validation that these taxonomies predict agent
        behavior or improve design choices remains absent.
    consensus:
    - LLM-based agents are the core building block for research automation, with an
      emphasis on iterating over ideas or code.
    - 'Evaluation is a central concern: all works incorporate some form of external
      validation, whether a benchmark or a held-out set.'
    - Held-out or previously unseen tasks are emerging as a preferred way to demonstrate
      that agent discoveries are not overfitted to a development set.
    disagreements:
    - 'Evaluation modality: some systems are assessed on survey generation, others
      on coding, rebuttal, or domain-specific predictive improvement.'
    - 'Autonomy level: fully closed-loop agents that search and validate without human
      intervention contrast with systems that scaffold a specific sub-task or require
      human feedback.'
    - 'Domain specificity: a few works target a single scientific domain (materials
      science), while others aim for generalist research capabilities across disciplines.'
    open_questions:
    - How to evaluate the cross-domain generalization of research agent discoveries
      when current evidence is limited to a few endpoints.
    - Whether the proxy metrics from existing benchmarks align with the true value
      of a scientific contribution.
    - The reliability of held-out validation when only a small number of tasks are
      used, as seen in the one failure out of ten interventions in the materials science
      agent.
  literature_review_zh:
    研究路线矩阵:
    - 路线: 面向研究智能体的评测与证据设计
      解决的问题: 创建标准化任务和指标，比较研究智能体在编码、综述写作和反驳质量等方面的能力，确保可比性和可重现性。
      尚未覆盖: 这些基准能否捕捉真实研究的开放特性，以及它们的代理指标与下游科学效用的相关性如何，仍不清楚。
    - 路线: 面向自主研究循环的系统架构
      解决的问题: 自动化假设生成、实验和验证的循环，通常在一个特定领域内，产生可重用代码和可验证的建模改进。
      尚未覆盖: 跨领域鲁棒性、超出少数几个评估端点的可扩展性，以及对预定义搜索空间的依赖可能限制发现。
    - 路线: 研究自动化的概念分类法
      解决的问题: 将研究任务、智能体角色和评估标准组织成框架，指导未来系统设计。
      尚未覆盖: 这些分类法能否预测智能体行为或改进设计选择，仍缺乏实证验证。
    共识:
    - 基于 LLM 的智能体是研究自动化的核心构件，强调在想法或代码上进行迭代。
    - 评估是核心关注点：所有工作都包含某种形式的外部验证，无论是基准测试还是留出集。
    - 留出或未见过的任务正成为首选方式，以证明智能体发现没有过度拟合开发集。
    分歧:
    - 评估模态：一些系统通过综述生成来评估，另一些通过编码、反驳或领域特定的预测改进来评估。
    - 自主程度：完全闭环搜索并验证的智能体与为特定子任务提供脚手架或需要人工反馈的系统形成对比。
    - 领域特异性：少数工作聚焦于单个科学领域（如材料科学），而其他工作旨在跨学科的通才研究能力。
    开放问题:
    - 当现有证据仅限少数端点时，如何评估研究智能体发现的跨领域泛化能力。
    - 现有基准的代理指标是否与科学贡献的真实价值一致。
    - 仅使用少量任务进行留出验证的可靠性，如在材料科学智能体中十项干预中有一项失败的情况。
