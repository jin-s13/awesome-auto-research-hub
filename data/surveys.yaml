    - 'Code generation approach: early work relied on human-authored code templates,
      whereas later systems generate code from scratch or modify existing codebases,
      trading flexibility for stability.'
    - 'Search and collaboration strategy: tree-search with an experiment manager agent
      versus multi-agent debate with role specialization, leading to different exploration-exploitation
      trade-offs.'
    - 'Evaluation target: some works aim to pass peer review at workshops, others
      focus on task completion in simulated environments, and yet others measure improvement
      on domain-specific metrics like RMSE against DNS.'
    open_questions:
