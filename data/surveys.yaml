      尚未覆盖: 静默失败的覆盖率；门控本身可能遗漏无效结果，且其设计目前与特定仿真器或数据模态绑定。
    - 路线: 基准与评估环境
      解决的问题: 提供标准化任务和指标，以比较AI科学家在假设形成、实验和发现方面的能力。
      尚未覆盖: 在模拟或策划基准上的表现是否能转化为真实世界的科学影响，以及如何捕捉开放式发现而非任务完成度。
    - 路线: 失败模式分析与设计原则
      解决的问题: 编目反复出现的弱点（如实现漂移、过度兴奋、记忆退化），以指导更鲁棒的系统设计。
      尚未覆盖: 在长时程自主运行中预防或恢复这些失败的系统性方法，以及所提原则能提高成功率的实证验证。
    共识:
    - 大语言模型作为核心推理和规划组件，协调代码执行、数据分析和论文撰写。
    - 科学过程被建模为假设生成、实验设计、结果解释和报告撰写的迭代循环。
    - 自动化评估（通过基于LLM的评审或基准指标）对于规模化评估是必要的，但其与人类判断的一致性仍受审视。
    - 当前系统尚不足以完全无人值守运行；仍需要人类监督或领域特定的防护栏。
    分歧:
    - 领域范围：部分系统面向通用机器学习研究，而其他系统则与单一科学领域（计算流体动力学、单细胞转录组学）紧密耦合，并配备定制化验证。
    - 代码生成方式：早期工作依赖人类编写的代码模板，而后续系统从零生成代码或修改现有代码库，在灵活性与稳定性之间做出不同权衡。
    - 搜索与协作策略：采用实验管理器智能体的树搜索，对比具有角色专业化的多智能体辩论，导致不同的探索-利用权衡。
    - 评估目标：部分工作旨在通过工作坊同行评审，其他工作聚焦于模拟环境中的任务完成，还有工作衡量领域特定指标（如与DNS相比的RMSE）的改进。
    开放问题:
    - 如何赋予AI科学家鲁棒的科学品味，以避免追求琐碎或有缺陷的假设？
