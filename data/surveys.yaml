    expert-annotated taxonomies for supervision.'
  - 'Trend evolution: Early 2023–2024 work explored basic retrieval-augmented generation;
    by 2025–2026, the field moved to agentic iterative refinement, evidence-constrained
    citation, full-text analysis, and dedicated benchmarks like TaxoBench and Survey-Arena,
    with the latest systems incorporating governance and domain-specific validation.'
  - 'Open questions: Whether automated metrics align with expert judgment of survey
    quality, how to ensure citation correctness beyond surface-level attribution,
    robustness across diverse research domains, and the scalability of full-text analysis
    to large literature corpora.'
  related_work_outline_zh:
  - 主流方向：构建自动化综述生成系统，整合检索、迭代式多智能体精炼和结构化评估，以生成具有高覆盖度、引用准确性和结构连贯性的学术手稿。
  - 研究共性：所有系统将综述生成任务分解为子任务（检索、主题组织、起草、评审），并利用基于LLM的智能体，通过某种形式的迭代反馈循环来提升输出质量。
  - 关键差异：系统在智能体架构（单流水线 vs. 多智能体协作）、源分析深度（仅摘要 vs. 全文与代码）、评估策略（自定义基准 vs. 人机协同）以及专家标注分类法作为监督信号的角色上存在差异。
  - 趋势演进：2023–2024年早期工作探索基础检索增强生成；到2025–2026年，领域转向智能体迭代精炼、证据约束引用、全文分析，并出现TaxoBench和Survey-Arena等专用基准，最新系统融合了治理和领域特定验证。
  - 开放问题：自动化指标是否与专家对综述质量的判断一致，如何确保引用正确性超越表面归属，跨研究领域的鲁棒性，以及全文分析在大规模文献语料库上的可扩展性。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation pipelines
      what_it_solves: End-to-end synthesis of a literature survey from paper retrieval
        through drafting and revision, using iterative refinement and multi-agent
        orchestration to improve coherence, coverage, and citation accuracy.
      what_remains_open: Generalization across diverse disciplines without task-specific
        tuning; scalability to very large paper sets without loss of citation recall;
        and alignment of pipeline-generated quality with expert human judgment in
        real-world scholarly workflows.
    - line: Evaluation benchmarks and metrics for survey quality
      what_it_solves: Providing standardized testbeds and metrics (e.g., TaxoBench,
        Survey-Arena, 12-dimensional evaluation) to quantitatively compare automated
        survey generation systems on retrieval, organization, content depth, and citation
        fidelity.
      what_remains_open: The gap between proxy metrics and true scholarly utility;
        the reliance on a single expert taxonomy as reference risks penalizing valid
        alternative organizations; and limited coverage of non-CS or non-English survey
        tasks.
    - line: Taxonomy and knowledge organization
      what_it_solves: Constructing hierarchical or flat taxonomies of research topics
        from reference papers to structure a survey, enabling clear paper-to-category
        mapping and topical navigation.
      what_remains_open: Whether automatically generated taxonomies are preferable
        to human-curated ones in terms of utility for readers; verifying that taxonomy-based
        organization improves downstream comprehension rather than just structural
        metrics.
    consensus:
    - LLM-based agents are the core engine for survey generation, and simple single-pass
      generation is insufficient; iterative refinement is necessary.
    - Citation accuracy and content coverage are the primary quality dimensions, and
      systems must incorporate explicit mechanisms to verify claims against source
      papers.
    - Structural coherence and logical organization of the survey are as important
      as factual correctness, leading to outline planning and taxonomy-guided sectioning.
    disagreements:
    - Systems adopt either a single multi-stage pipeline (e.g., AutoSurvey2) or a
      multi-agent collaboration (e.g., ARISE, Agentic AutoSurvey, DeepSurvey), with
      no consensus on which paradigm yields better reliability–cost trade-offs.
    - 'Evaluation approaches diverge: some rely on custom benchmarks with expert annotations
      (TaxoBench, CS-TaxoBench), while others build ad-hoc human evaluations or use
      LLM-as-judge; there is no standardized external benchmark accepted across all
      works.'
    - 'The depth of source analysis varies: most systems operate on abstracts and
      metadata, but DeepSurvey pushes full-text and code-repository analysis, raising
      open questions about the necessary and sufficient evidence for high-quality
      synthesis.'
    - 'The role of human oversight differs: NVAITC AI Scientist emphasizes governance
      and scientist-in-the-loop, whereas many other systems target fully autonomous
      generation, leaving the boundary between assistance and automation unsettled.'
    open_questions:
    - How can we verify that a citation in a generated survey truly supports the attributed
      claim, beyond checking keyword overlap?
    - Do automated surveys improve researcher efficiency or comprehension in real-world
      workflows, and what experiment would demonstrate this?
    - What are the failure modes of multi-agent iterative refinement when applied
      to rapidly evolving preprint literature with incomplete or contradictory claims?
    - Can taxonomy-based evaluation metrics be designed to be reference-free yet still
      aligned with human preferences for survey organization?
