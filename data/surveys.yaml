    - line: Automated survey generation systems
      what_it_solves: Produces full-length academic survey papers with high coverage,
        structural coherence, and citation accuracy by orchestrating LLM agents, retrieval,
        planning, drafting, and iterative refinement.
      what_remains_open: Generation quality still lags human surveys in critical depth
        and nuanced argumentation; cross-domain generalization and citation recall
        on very large paper collections (>400 papers) are unresolved.
    - line: Evaluation benchmarks and metrics for survey quality
      what_it_solves: Provides standardized tasks, metrics, and datasets to compare
        automated survey systems on content coverage, structure, citation fidelity,
        and hierarchical organization.
      what_remains_open: Alignment between proxy metrics and expert judgment of survey
        utility is not established; benchmarks are limited to narrow domains (e.g.,
        LLM, CS) and few human-written reference surveys.
    - line: Taxonomy generation and organization
      what_it_solves: Automatically constructs scholarly taxonomies from literature,
        organizing papers into hierarchical categories that mirror expert mental models.
      what_remains_open: Generated taxonomies often violate mutual exclusivity and
        structural balance; their ability to predict emerging research trends or guide
        future work is untested.
    consensus:
    - All generation systems decompose the survey task into sub-processes (retrieval,
      planning, writing, reviewing) and leverage LLM agents or pipeline stages.
    - Iterative refinement, whether through rubric-guided cycles or review-and-revise
      loops, is a shared mechanism for improving output quality.
    - Citation quality is a primary concern, with most works evaluating precision,
      recall, or F1 of citations against a reference set.
    - Automatic evaluation using LLM judges is widely adopted, often measuring structure,
      coherence, and relevance.
    disagreements:
    - 'Generation paradigm: some systems use a fixed multi-stage pipeline, others
      adopt a multi-agent collaboration with specialized roles, and yet others use
      a recurrent outline generation and incremental update workflow.'
    - 'Depth mechanisms: approaches range from abstract-only processing to full-text
      structured keynotes, cross-paper clustering, and code-repository analysis, leading
      to varying levels of analytical depth.'
    - 'Evaluation scope: one body of work relies solely on automatic metrics, while
      another incorporates human evaluation and expert preference studies, revealing
      different quality standards and gaps.'
    - 'Citation grounding: some methods use simple retrieval and linking, while others
      enforce evidence-constrained citation assignment or citation-graph expansion,
      affecting reliability.'
    open_questions:
    - How can automated surveys move beyond summarization to generate novel taxonomies
      and critical syntheses that drive research forward?
    - What is the minimal set of evaluation protocols that reliably predicts whether
      a survey is useful to human researchers?
    - How do these systems perform when the topic is interdisciplinary, rapidly evolving,
      or has sparse existing surveys?
    - Can the taxonomy organization capabilities demonstrated on LLM surveys transfer
      to highly technical or mathematical domains?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述生成系统
      解决的问题: 通过编排LLM智能体、检索、规划、起草和迭代优化，生成具有高覆盖度、结构连贯性和引用准确性的长篇学术综述论文。
      尚未覆盖: 生成质量在批判性深度和细致论证上仍落后于人类综述；跨领域泛化和在大规模文献集（>400篇）上的引用召回率尚未解决。
    - 路线: 综述质量的评测基准与指标
      解决的问题: 提供标准化任务、指标和数据集，以比较自动化综述系统在内容覆盖、结构、引用准确性和层次组织上的表现。
      尚未覆盖: 代理指标与专家对综述实用性的判断之间的对齐未建立；基准限于窄领域（如LLM、CS）和少量人类撰写的参考综述。
    - 路线: 分类法生成与组织
      解决的问题: 自动从文献中构建学术分类法，将论文组织成反映专家认知模型的层次类别。
      尚未覆盖: 生成的分类法常违反互斥性和结构平衡；其预测新兴研究趋势或指导未来工作的能力未经测试。
    共识:
    - 所有生成系统将综述任务分解为子过程（检索、规划、写作、评审），并利用LLM智能体或流水线阶段。
    - 迭代优化（无论是通过评分准则引导的循环还是审查-修改循环）是提升输出质量的共同机制。
    - 引用质量是首要关注点，多数工作通过对比参考集评估引用的精确率、召回率或F1。
    - 广泛采用基于LLM法官的自动评估，通常衡量结构、连贯性和相关性。
    分歧:
    - 生成范式：部分系统使用固定多阶段流水线，其他采用多智能体协作与专门角色，还有的采用循环大纲生成和增量更新工作流。
    - 深度机制：方法范围从仅处理摘要到全文结构化要点、跨论文聚类和代码仓库分析，导致分析深度差异显著。
    - 评估范围：一类工作仅依赖自动指标，另一类结合人工评估和专家偏好研究，揭示了不同的质量标准和差距。
    - 引用基础：一些方法使用简单检索和链接，而其他方法强制执行证据约束的引用分配或引文图扩展，影响可靠性。
    开放问题:
    - 自动综述如何超越摘要，生成能够推动研究前进的新颖分类和批判性综合？
    - 能够可靠预测综述对人类研究者是否有用的最小评估协议集是什么？
    - 当主题是跨学科、快速演变或现有综述稀疏时，这些系统表现如何？
    - 在LLM综述上展示的分类组织能力能否迁移到高度技术化或数学化的领域？
