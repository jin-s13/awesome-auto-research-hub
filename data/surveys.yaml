  related_work_outline_zh:
  - 主流方向：构建覆盖构思、实验和论文撰写的全自动科研工作流，以LLM驱动的多智能体与工具集成为核心。
  - 研究共性：均以LLM作为核心推理与规划模块，通过执行-反馈循环连接实验设计、代码生成、结果分析和论文撰写，并逐步引入记忆、多角色协作与外部工具。
  - 关键差异：在自动化粒度（全自动生成 vs. 交互式平台与人在环）、评估方式（自动评审、基准或真实同行评审）、领域覆盖（通用AI/ML vs. 特定领域如推荐系统）以及错误处理（被动忽略
    vs. 主动失败记忆）上存在分歧。
  - 趋势演进：从2024年概念验证框架，到2025年引入树搜索、基准测试、失败记忆和风险分析，再到2026年多智能体交互平台，该领域正朝着更可靠、可交互、可扩展的方向发展，并开始关注领域特定自动化与治理。
  - 开放问题：如何保证自动生成科研工作的真实创新性与科学严谨性？失败记忆跨任务与跨领域的迁移性如何？现有基准能否代表真实科学发现？如何落地自主实验室的伦理、归属和治理机制？
  literature_review:
    line_of_work_matrix:
    - line: Fully automated research pipelines
      what_it_solves: Automating the full scientific loop—hypothesis generation, experiment
        design, code implementation, result analysis, and paper writing—to reduce
        human labor and accelerate discovery.
      what_remains_open: Generated papers exhibit inconsistent novelty and scientific
        rigor; successful peer review remains rare; reliance on human-written code
        templates or domain priors limits generalization; risk assessment and ethical
        constraints are not yet integrated.
    - line: Failure-aware and memory-augmented experimentation
      what_it_solves: Leveraging failed attempts to build a reusable memory that avoids
        repeated errors, improves resource efficiency, and guides subsequent experiments
        toward success.
      what_remains_open: Representation and typing strategies for failure memory may
        not generalize across scientific domains; evidence of cross-task transfer
        is limited; integration with long-horizon, multi-step experiment planning
        is unexplored.
    - line: Evaluation benchmarks and task design
      what_it_solves: Providing standardized, quantifiable testbeds for automated
        experiment planning, revealing capability gaps between current models and
        humans, and directing system improvements.
      what_remains_open: Ecological validity of proxy tasks (e.g., ablation planning,
        virtual discovery) is uncertain; alignment between benchmark metrics and real
        scientific contribution is unverified; covered scientific domains and difficulty
        levels are narrow.
    - line: Interactive multi-agent research platforms
      what_it_solves: Providing customizable, monitorable research environments with
        multi-role collaboration and human-in-the-loop control, increasing transparency
        and flexibility of the research process.
      what_remains_open: Platform maturity is low, validated only on small-scale case
        studies; standardized external validation across domains and datasets is missing;
        multi-agent coordination and conflict resolution mechanisms are underexplored.
    - line: Domain-specific automated labs and governance
      what_it_solves: Applying the concept of automated research to specific domains
        (e.g., recommender systems) and proposing frameworks for governance, ethics,
        and community norms.
      what_remains_open: Remains a conceptual proposal without empirical validation;
        realization depends on community consensus and resource investment; concrete
        solutions to ethical, privacy, and fairness challenges are not provided.
    consensus:
    - LLMs are the core reasoning engine for automating scientific experiments.
    - Current systems lack reliability and generalization, requiring human oversight
      or evaluation.
    - Standardized benchmarks and metrics are essential for measuring progress.
    - Leveraging experiment history (both successes and failures) is crucial for improving
      efficiency.
    disagreements:
    - 'Automation granularity: some works pursue fully autonomous paper generation
      without human input, while others advocate interactive platforms with human-in-the-loop.'
    - 'Evaluation methods: approaches range from automated reviewers to real peer
      review or benchmark tasks, with differing views on their validity and scalability.'
    - 'Error handling: most systems ignore failed attempts, whereas one line of work
      argues for proactively recording and analyzing failures as reusable memory.'
    - 'Domain coverage: there is a split between general AI/ML experimentation and
      deep automation of a specific domain (e.g., recommender systems), requiring
      additional domain knowledge and governance considerations.'
    open_questions:
    - How can we design benchmarks that capture the diversity and ecological validity
      of real scientific discovery?
    - What failure memory representations and transfer mechanisms generalize across
      different experimental paradigms?
    - How can ethical, attribution, and governance frameworks for autonomous labs
      move from concept to implementation?
    - What is the predictive relationship between current benchmark metrics (e.g.,
      ablation recall) and the final scientific contribution?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 全自动科研流水线
      解决的问题: 自动化科学研究的完整循环——假设生成、实验设计、代码实现、结果分析、论文撰写——以减少人工并加速发现。
      尚未覆盖: 生成论文的创新性和严谨性不稳定；通过真正同行评审的成功率低；依赖人类编写的代码模板或领域先验，泛化性受限；尚未整合风险评估和伦理约束。
    - 路线: 失败感知与记忆增强实验
      解决的问题: 利用失败尝试构建可复用记忆，避免重复错误，提高资源效率，并引导后续实验走向成功。
      尚未覆盖: 失败记忆的表示和类型化策略能否泛化到不同科学领域未知；跨任务迁移的证据有限；与长周期、多步实验规划的集成尚未探索。
    - 路线: 评估基准与任务设计
      解决的问题: 为自动化实验规划提供标准化、可量化的测试平台，揭示当前模型与人类的差距，指导系统改进。
      尚未覆盖: 代理任务（如消融规划、虚拟发现）的生态效度不确定；基准指标与真实科学贡献的一致性未经验证；覆盖的科学领域和难度级别较窄。
    - 路线: 交互式多智能体研究平台
      解决的问题: 提供可定制、可监控的研究环境，支持多角色协作和人在环控制，提升研究过程的透明度和灵活性。
      尚未覆盖: 平台成熟度低，仅在小规模案例研究上验证；缺乏跨领域和数据集的标准化外部验证；多智能体协调和冲突解决机制未深入探索。
    - 路线: 领域特定自动化实验室与治理
      解决的问题: 将自动化科研概念应用于特定领域（如推荐系统），并提出治理、伦理和社区规范框架。
      尚未覆盖: 仅为概念性提案，缺乏实证验证；实现依赖社区共识和资源投入；尚未给出伦理、隐私和公平挑战的具体解决方案。
    共识:
    - LLM是自动化科学实验的核心推理引擎。
    - 当前系统在可靠性和泛化性上存在不足，需要人类监督或评估。
    - 标准化基准和指标对于衡量进展至关重要。
    - 利用实验历史（成功和失败）是提高效率的关键。
    分歧:
    - 自动化粒度：一些工作追求无需人工干预的全自动论文生成，另一些则倡导交互式平台和人在环。
    - 评估方法：从自动评审器到真实同行评审或基准任务，对其有效性和可扩展性看法不一。
    - 错误处理：多数系统忽略失败尝试，而一种路线主张主动记录和分析失败作为可复用记忆。
    - 领域覆盖：存在通用AI/ML实验与特定领域深度自动化（如推荐系统）的区分，后者需要额外的领域知识和治理考量。
    开放问题:
    - 如何设计能够捕捉真实科学发现多样性和生态效度的基准？
    - 什么样的失败记忆表示和迁移机制能够跨不同实验范式泛化？
    - 自主实验室的伦理、归属和治理框架如何从概念走向实践？
    - 当前基准指标（如消融召回率）与最终科研贡献之间的预测关系是什么？
