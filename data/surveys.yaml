  related_work_outline:
  - 'Mainstream direction: Building multi-agent LLM systems that automate literature
    search, survey generation, and end-to-end scientific discovery, with a strong
    emphasis on iterative refinement and self-evolution.'
  - 'Shared research pattern: Decomposing the research workflow into specialized agent
    roles (search, analysis, writing, review) and orchestrating them through state
    machines or tree-based workflows, evaluated via benchmarks or human judgment.'
  - 'Key differences: Domain-specific (e.g., educational data mining) vs. domain-agnostic
    frameworks; systems that generate surveys vs. those that perform full experimental
    cycles; evaluation by rubric scores vs. independent scientist accuracy ratings;
    presence or absence of a structured world model for cross-agent memory.'
  - 'Trend evolution: Within 2023–2026, the frontier moved from single-task survey
    generation toward autonomous, long-horizon research agents that self-evolve and
    accumulate knowledge, with benchmarks shifting from narrow tasks to broader scientific
    reasoning.'
  - 'Open questions: How to guarantee factual accuracy and citation correctness in
    generated content; how to measure genuine scientific insight rather than surface-level
    metric gains; how to prevent error cascades in multi-cycle autonomous runs; and
    how to validate that design principles generalize beyond the tested domains.'
  related_work_outline_zh:
  - 主流方向：构建多智能体大模型系统，自动化文献搜索、综述生成和端到端科学发现，重点在迭代优化与自我演化。
  - 研究共性：将研究工作流分解为专门智能体角色（搜索、分析、写作、评审），通过状态机或树形工作流编排，并以基准或人类评审进行评估。
  - 关键差异：领域特定（如教育数据挖掘）与领域无关框架；生成综述的系统与执行完整实验周期的系统；基于评分准则的评估与独立科学家准确率评估；是否具备结构化世界模型以支持跨智能体记忆。
  - 趋势演进：2023–2026年间，前沿从单任务综述生成转向能够自我演化和积累知识的长期自主研究智能体，基准从狭窄任务扩展到更广泛的科学推理。
  - 开放问题：如何保证生成内容的真实性和引用正确性；如何衡量真正的科学洞察而非表面指标提升；如何防止多周期自主运行中的错误级联；如何验证设计原则在测试领域之外的泛化性。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation via multi-agent refinement
      what_it_solves: Producing comprehensive, well-structured academic survey papers
        by decomposing the task into topic expansion, citation curation, summarization,
        drafting, and rubric-guided peer review.
      what_remains_open: Whether rubric-aligned quality scores translate to genuine
        scholarly utility; the risk of hallucinated citations and shallow synthesis
        remains unquantified in long-tail topics.
    - line: End-to-end autonomous research agents
      what_it_solves: Performing full cycles of literature search, data analysis,
        hypothesis generation, and manuscript writing over extended time horizons,
        aiming to replicate or augment human scientific workflows.
      what_remains_open: Factual accuracy of generated reports is still imperfect
        (e.g., ~79% statement accuracy); scaling behavior beyond tested cycle counts
        is unknown; failure modes like implementation drift and overexcitement are
        documented but not systematically resolved.
    - line: Benchmarking AI scientists on domain-specific discovery tasks
      what_it_solves: Providing standardized tasks, datasets, and human baselines
        to measure how well AI systems perform scientific reasoning, such as cell-type
        annotation or answering multiple-choice questions derived from published studies.
      what_remains_open: Current benchmarks cover narrow slices of the scientific
        process; it is unclear whether performance on these proxies predicts success
        in open-ended, real-world discovery.
    - line: Failure analysis and design principle extraction
      what_it_solves: Cataloging recurring failure modes (e.g., bias toward training
        defaults, memory degradation, weak scientific taste) in autonomous research
        attempts and deriving guidelines for more robust systems.
      what_remains_open: The identified design principles have not been systematically
        validated across diverse domains or agent architectures; the relative contribution
        of each principle to overall reliability is unknown.
    - line: Taxonomies and surveys of agentic AI for science
      what_it_solves: Organizing fragmented systems and tools by scientific domain,
        capability, and evaluation metrics, and highlighting challenges such as literature
        review automation and ethical concerns.
      what_remains_open: The proposed taxonomies lack direct empirical validation
        that the categories predict system behavior or guide actionable improvements;
        the surveys themselves are static and do not evolve with the literature.
    consensus:
    - LLM-based multi-agent architectures are the dominant approach for automating
      literature-intensive research tasks.
    - Current systems fall short of fully autonomous, reliable scientific discovery
      and require human oversight or verification.
    - Structured evaluation—whether by benchmarks, rubrics, or human judges—is essential
      for measuring progress, but no single metric captures all dimensions of scientific
      quality.
    - Iterative refinement, self-critique, and memory mechanisms are critical for
      improving output quality over single-pass generation.
    disagreements:
    - Whether to build domain-specific systems that embed expert knowledge or domain-agnostic
      frameworks that can be rapidly instantiated across fields.
    - Whether the primary output should be a literature survey or a complete experimental
      research paper with novel findings.
    - How to balance evolutionary exploration of ideas against systematic, tree-based
      research planning with backtracking.
    - Whether evaluation should rely on automated rubric scores, benchmark accuracy,
      or independent scientist judgments of report statements.
    open_questions:
    - How can we verify that a generated survey or research report contains no factual
      errors or hallucinated references without exhaustive human checking?
    - What evaluation protocols can distinguish between a system that merely recombines
      known results and one that produces genuinely novel scientific insights?
    - How do failure modes evolve over long autonomous runs, and what safeguards can
      prevent catastrophic error cascades?
    - To what extent do design principles derived from a few case studies generalize
      to new scientific domains and agent implementations?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于多智能体迭代优化的自动综述生成
      解决的问题: 通过将任务分解为主题扩展、引文管理、总结、起草和评分准则引导的同行评审，生成全面、结构良好的学术综述。
      尚未覆盖: 评分准则对齐的质量分数是否转化为真正的学术效用尚不明确；在长尾主题中，虚构引用和浅层综合的风险尚未量化。
    - 路线: 端到端自主研究智能体
      解决的问题: 在较长时间跨度内执行文献搜索、数据分析、假设生成和论文撰写的完整循环，旨在复现或增强人类科研工作流。
      尚未覆盖: 生成报告的事实准确率仍不完美（如约79%陈述准确）；超出测试周期数的扩展行为未知；实现漂移和过度兴奋等失败模式已被记录但未系统解决。
    - 路线: 面向特定领域发现任务的AI科学家基准测试
      解决的问题: 提供标准化任务、数据集和人类基线，衡量AI系统在细胞类型注释或回答基于已发表研究的选择题等科学推理上的表现。
      尚未覆盖: 当前基准仅覆盖科学过程的狭窄片段；在这些代理任务上的表现能否预测开放式的真实世界发现尚不清楚。
    - 路线: 失败分析与设计原则提炼
      解决的问题: 对自主研究尝试中反复出现的失败模式（如偏向训练数据默认值、记忆退化、科学品味薄弱）进行分类，并推导更稳健系统的设计指南。
      尚未覆盖: 所识别的设计原则尚未在不同领域或智能体架构中得到系统验证；每个原则对整体可靠性的相对贡献未知。
    - 路线: 面向科学的智能体AI分类与综述
      解决的问题: 按科学领域、能力和评估指标组织碎片化的系统与工具，并突出文献综述自动化和伦理问题等挑战。
      尚未覆盖: 所提出的分类法缺乏直接的实证验证，无法证明这些类别能预测系统行为或指导可操作的改进；综述本身是静态的，不随文献更新。
    共识:
    - 基于大模型的多智能体架构是自动化文献密集型研究任务的主流方法。
    - 当前系统尚未达到完全自主、可靠的科学发现，仍需人类监督或验证。
    - 结构化评估——无论是通过基准、评分准则还是人类评审——对衡量进展至关重要，但没有单一指标能捕捉科学质量的所有维度。
    - 迭代优化、自我批判和记忆机制对于提升输出质量比单次生成更为关键。
    分歧:
    - 是构建嵌入专家知识的领域特定系统，还是构建可跨领域快速实例化的领域无关框架。
    - 主要输出应为文献综述，还是包含新发现的完整实验研究论文。
    - 如何在思想的进化探索与带回溯的系统化树形研究规划之间取得平衡。
    - 评估应依赖自动评分准则分数、基准准确率，还是独立科学家对报告陈述的判断。
    开放问题:
    - 如何在不进行穷举人工检查的情况下，验证生成的综述或研究报告不含事实错误或虚构引用？
    - 何种评估方案能区分仅重组已知结果的系统与产生真正新颖科学洞察的系统？
    - 在长时间自主运行中，失败模式如何演变，以及哪些安全措施能防止灾难性错误级联？
    - 从少数案例研究中得出的设计原则在多大程度上能泛化到新的科学领域和智能体实现？
