  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，从想法到完整论文全流程生成，并日益强调失败恢复和迭代自我纠正。
  - 研究共性：系统将科学工作流分解为LLM驱动的阶段（构思、编码、实验、写作），并通过验证门控、过往失败记忆或审稿人反馈循环进行增强。
