    研究路线矩阵:
    - 路线: 基准测试与评估环境设计
      解决的问题: 提供标准化任务、指标和基线，系统性衡量自动化科研系统的科学发现能力。
      尚未覆盖: 任务覆盖多样性与真实科学问题的差距，以及自动指标与人类专家判断的一致性。
    - 路线: 端到端自动化科研框架
      解决的问题: 整合构思、编码、实验、分析和写作，实现全自动或人工监督的科研流程。
      尚未覆盖: 生成科学结论的鲁棒性和泛化性，以及避免模式坍塌和幻觉的机制。
    - 路线: 可靠性、验证与自我纠正
      解决的问题: 通过物理验证、失败归因和反思循环，提高自动化科研输出的正确性和可信度。
      尚未覆盖: 验证机制对静默失败的覆盖率，以及自我纠正能否处理超出训练分布的错误。
    - 路线: 科研治理与评审机制
      解决的问题: 模拟同行评审或人类评审流程，为自动化科研输出提供质量把控和治理接口。
      尚未覆盖: 自动评审与人类评审在长期科学价值判断上的对齐，以及如何嵌入伦理和安全审查。
    共识:
    - 自动化科研系统需要超越单次任务成功，建立可重复的评估流程。
    - 当前系统在完全自主产生可靠科学成果方面仍存在显著差距，必须结合验证和纠错。
    - 基准测试和模拟环境是推进系统开发的关键基础设施。
    分歧:
