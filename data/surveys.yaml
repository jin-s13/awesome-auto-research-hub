  related_work_outline_zh:
  - 主流方向：构建科学发现智能体的评估基准和辅助工具，并探索自动化目标设计与方程发现的方法。
  - 研究共性：利用LLM驱动智能体执行科学实验循环，高度重视评估。
  - 关键差异：评估维度（结果 vs 机制）、交互模式（模拟环境 vs 代码生成）、领域特异性。
  - 趋势演进：在2024–2026前沿内，从环境和工具构建转向对评估理论的反思和发现方法的深化。
  - 开放问题：如何确保发现机制的诚实性，以及如何将模拟成功迁移到真实实验室。
  literature_review:
    line_of_work_matrix:
    - line: Standardized evaluation environments for scientific discovery agents
      what_it_solves: Providing reproducible tasks, metrics, and baselines to measure
        agent capabilities across complete scientific discovery cycles.
      what_remains_open: Alignment between proxy metrics and real scientific utility,
        and generalization across diverse scientific domains.
    - line: Auxiliary tools for scientific coding and experimentation
      what_it_solves: Lowering barriers for agents to conduct scientific experiments
        by auto-generating code libraries or structuring workflows, improving experiment
        quality and reproducibility.
      what_remains_open: Causal contribution of tools to final discovery quality,
        and applicability beyond the specific domains tested (e.g., materials science).
    - line: Automated objective and equation discovery methods
      what_it_solves: Enabling agents to autonomously design optimization objectives
        or discover governing equations from data, driving hypothesis generation and
        validation.
      what_remains_open: Physical plausibility and epistemic honesty of discovered
        mechanisms, and transfer from simulation to real-world experiments.
    - line: Evaluation theory for scientific discovery agents
      what_it_solves: Moving beyond outcome-only evaluation by proposing dimensions
        like mechanism fidelity and epistemic honesty to detect superficially correct
        but flawed reasoning.
      what_remains_open: Automated, scalable implementation of these new evaluation
        dimensions, and their predictive validity in genuine discovery tasks.
    consensus:
    - All works aim to automate scientific discovery workflows using LLM-based agents
      as core components.
    - Evaluation is recognized as critical, with efforts to establish benchmarks or
      metrics.
    - Agent performance on scientific tasks is the central concern, though evaluation
      granularity and criteria vary.
    disagreements:
    - 'Evaluation target: some prioritize task completion scores, while others demand
      mechanism correctness and epistemic honesty.'
    - 'Interaction mode: agents operate in text-based simulated environments, generate
      code directly, or control experimental apparatus through structured interfaces.'
    - 'Supervision signal: methods range from human-designed reward functions to competitive
      optimization and evolutionary pressure.'
    - 'Deployment setting: some systems are domain-specific (materials science, particle
      physics), while others aim for broader applicability across ML or scientific
      tasks.'
    open_questions:
    - How can we design automated evaluation methods that detect 'correct answer,
      wrong mechanism' failures without knowing the ground-truth mechanism?
    - To what extent does success in simulated discovery environments translate to
      real-world laboratory discoveries?
    - What is the minimal domain-specific scaffolding needed to build a general-purpose
      scientific discovery agent that works across disciplines?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 科学发现智能体的标准化评估环境
      解决的问题: 提供可重复的任务、指标和基线，衡量智能体在完整科学发现循环中的能力。
      尚未覆盖: 代理指标与真实科学效用的一致性，以及跨科学领域的泛化能力。
    - 路线: 科学编码与实验的辅助工具
      解决的问题: 通过自动生成代码库或结构化工作流，降低智能体执行科学实验的门槛，提高实验质量和可重复性。
      尚未覆盖: 工具对最终发现质量的因果贡献，以及在已测试领域（如材料科学）之外的适用性。
    - 路线: 自动化目标与方程发现方法
      解决的问题: 使智能体能够自主设计优化目标或从数据中发现控制方程，驱动假设生成与验证。
      尚未覆盖: 发现机制的物理合理性与认知诚实性，以及从模拟到真实实验的迁移。
    - 路线: 科学发现智能体的评估理论
      解决的问题: 超越仅看结果的评估，提出机制忠实性和认知诚实性等维度，以检测表面正确但推理有缺陷的发现。
      尚未覆盖: 这些新评估维度的自动化、可扩展实现，以及它们在真实发现任务中的预测有效性。
    共识:
    - 所有工作都致力于使用基于LLM的智能体自动化科学发现流程。
    - 评估被公认为关键，并努力建立基准或指标。
