  related_work_outline:
  - 'Mainstream direction: Building multi-agent LLM frameworks that automate the full
    research lifecycle—literature search, review synthesis, hypothesis generation,
    experiment execution, and paper writing—to act as AI scientists or survey engines.'
  - 'Shared research pattern: Decomposing the scientific workflow into discrete roles
    (search, analysis, critique, writing) and orchestrating them through iterative
    loops, structured trees, or rubric-guided refinement with verification mechanisms.'
  - 'Key differences: Domain generality versus domain-specific embedding; supervision
    signals ranging from external rubrics and human baselines to self-evolution and
    structured world models; output type (full paper, report, survey) and evaluation
    rigor (benchmark scores, human assessment, failure analysis).'
  - 'Trend evolution: 2025 papers introduced benchmarks and survey frameworks; later
    work shifted toward end-to-end autonomous systems, explicit failure-mode documentation,
    and self-improving/search-based architectures, with a growing emphasis on traceability
    and reliability.'
  - 'Open questions: How to measure genuine scientific novelty, ensure factual accuracy
    and reproducibility, prevent mode collapse toward known results, and manage context
    degradation over long-horizon autonomous runs.'
  related_work_outline_zh:
  - 主流方向：构建多智能体大语言模型框架，自动化完成文献搜索、综述生成、假设提出、实验执行与论文撰写的完整研究流程，充当AI科学家或调查引擎。
  - 研究共性：将科学工作流拆解为搜索、分析、批判、写作等离散角色，通过迭代循环、结构化树形探索或评分准则引导的精炼机制进行编排，并引入验证环节。
  - 关键差异：通用性 vs. 领域专属知识嵌入；监督信号从外部评分准则、人类基线，到自我进化、结构化世界模型；输出形式（完整论文、研究报告、综述）与评估严格程度（基准分数、人类评判、失败模式分析）各不相同。
  - 趋势演进：2025年工作侧重基准与调查框架；后续转向端到端自主系统，并显式记录失败模式，引入自我改进与搜索型架构，更加重视可追溯性与可靠性。
  - 开放问题：如何衡量真正的科学创新性，确保事实准确性与可复现性，防止模型收敛到已知结论，以及解决长周期自主运行中的上下文退化问题。
  literature_review:
    line_of_work_matrix:
    - line: Automated literature survey and review generation
      what_it_solves: Automates the pipeline of literature retrieval, curation, summarization,
        and synthesis to produce structured academic surveys with iterative quality
        refinement.
      what_remains_open: Factual accuracy and completeness of generated surveys, especially
        for fast-moving fields; deep logical reasoning about inter-paper relationships
        beyond surface-level summarization.
    - line: Literature-search and hypothesis-generation for scientific discovery
      what_it_solves: Integrates literature search with data analysis in iterative
        cycles to propose and validate hypotheses, producing traceable research reports
        that combine published knowledge with empirical findings.
      what_remains_open: Search coverage and recall in open-domain settings; evaluation
        of hypothesis quality beyond human judgment; avoidance of rediscovering known
        results or trivial correlations.
    - line: End-to-end research process automation frameworks
      what_it_solves: Encapsulates the full research lifecycle—problem formulation,
        data engineering, experimentation, analysis, and writing—into a coordinated
        multi-agent system that generates complete manuscripts.
      what_remains_open: Generic adaptation across disciplines requires substantial
        customization; output often lacks scientific taste and novelty; reliability
        and soundness of the entire pipeline under diverse conditions are unproven.
    - line: Evaluation and benchmarking of AI scientist capabilities
      what_it_solves: Provides standardized tasks, benchmarks, and human baselines
        to measure AI systems' ability to perform literature understanding, scientific
        reasoning, and discovery, and systematically documents failure modes.
      what_remains_open: Gap between proxy tasks and real-world scientific impact;
        coverage of diverse disciplines and problem types; alignment of automated
        metrics with long-term research utility and expert judgment.
    consensus:
    - LLM-powered agents can partially automate literature review and scientific discovery,
      but current systems exhibit significant reliability gaps in accuracy, factuality,
      and long-horizon planning.
    - Structured workflows—such as iterative refinement loops, tree-based exploration,
      and role-based agent orchestration—are essential for improving output quality
      and coherence.
    - Evaluation methods are evolving from simple automated metrics toward human expert
      assessment and systematic failure analysis, yet remain insufficient to capture
      real scientific value.
    disagreements:
    - 'Domain scope: some systems target domain-agnostic general-purpose discovery,
      while others embed deep domain-specific expertise and data registries for a
      single field.'
    - 'Supervision and improvement mechanism: approaches differ in using external
      rubric-guided critique, internal self-evolution and reflection, or structured
      world models that coordinate search and analysis.'
    - 'Output granularity and format: outputs range from complete LaTeX manuscripts
      with citations to concise scientific reports with traceable statements, reflecting
      different assumptions about downstream human involvement.'
    - 'Exploration strategy: some employ evolutionary search with backtracking to
      balance exploration and exploitation, while others rely on linear iterative
      cycles or tree-based branching without explicit search optimization.'
    open_questions:
    - What constitutes genuine scientific novelty in automatically generated literature
      reviews or discoveries, and how can it be reliably assessed without human oversight?
    - How can we prevent model collapse into known results and mitigate the risk of
      amplifying existing biases or errors in the literature?
    - What mechanisms can effectively manage context and memory degradation over hundreds
      of agent rollouts to maintain coherent long-horizon reasoning?
    - How can standardized evaluation benchmarks be designed to cover diverse scientific
      domains and align with the nuanced judgment of expert researchers?
    - What ethical and reproducibility safeguards are needed when AI systems autonomously
      produce literature reviews or research papers that enter the scholarly record?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化文献综述与调查生成
      解决的问题: 将文献检索、筛选、总结与综合的流程自动化，通过迭代质量优化生成结构化学术综述。
      尚未覆盖: 生成综述的事实准确性与完整性，尤其在快速发展的领域；对文献间深层逻辑关系的高阶推理仍较欠缺。
    - 路线: 文献搜索与假设生成驱动的科学发现
      解决的问题: 将文献搜索与数据分析融入迭代循环，提出并验证假设，生成可追溯的研究报告，结合已发表知识与实证发现。
      尚未覆盖: 开放域搜索的覆盖度与召回率；假设质量的评估不仅依赖人类判断；避免重新发现已知结果或无关关联。
    - 路线: 端到端研究流程自动化框架
      解决的问题: 将问题定义、数据工程、实验、分析和写作等完整研究生命周期封装到协调的多智能体系统中，生成完整手稿。
      尚未覆盖: 跨学科泛化需大量定制；输出常缺乏科学品味与创新性；整个流水线在多样条件下的可靠性尚未得到验证。
    - 路线: AI科学家能力的评估与基准测试
      解决的问题: 提供标准化任务、基准和人类基线，衡量AI系统在文献理解、科学推理和发现方面的能力，并系统记录失败模式。
      尚未覆盖: 代理任务与现实科学影响力之间的差距；多学科与问题类型的覆盖度；自动化指标与长期研究效用及专家判断的一致性。
    共识:
    - 基于大语言模型的智能体可以部分自动化文献综述和科学发现，但当前系统在准确性、事实性和长期规划方面存在显著的可靠性缺口。
    - 结构化工作流——如迭代精炼循环、树形探索和基于角色的智能体编排——对提升输出质量和连贯性至关重要。
    - 评估方法正从单一自动指标转向人类专家评估和系统失败分析，但仍不足以捕捉真实的科学价值。
    分歧:
    - 领域范围：部分系统追求领域无关的通用发现，其他系统则为单一领域嵌入深厚的领域专业知识和数据注册表。
    - 监督与改进机制：方法在外部评分准则引导的批判、内部自我进化与反思，或协调搜索与分析的结构化世界模型之间有所不同。
    - 输出粒度与形式：输出从包含引用的完整LaTeX手稿，到具有可追溯陈述的简明科学报告，反映了对下游人类参与的不同假设。
    - 探索策略：一些系统采用带有回溯的进化搜索以平衡探索与利用，另一些则依赖线性迭代循环或树形分支，缺乏显式的搜索优化。
    开放问题:
    - 在自动生成的文献综述或发现中，什么构成真正的科学创新性，如何在无需人类监督的情况下可靠评估？
    - 如何防止模型坍缩到已知结果，并降低放大文献中已有偏见或错误的风险？
    - 在数百次智能体展开中，哪些机制能有效管理上下文和记忆退化，以维持连贯的长期推理？
    - 如何设计覆盖多科学领域的标准化评估基准，并使其与专家研究者的细致判断对齐？
    - 当AI系统自主生成进入学术记录的文献综述或研究论文时，需要哪些伦理和可复现性保障？
