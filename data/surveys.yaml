  related_work_outline:
  - 'Mainstream direction: Building end-to-end autonomous research agents that can
    generate ideas, run experiments, and write papers, with growing emphasis on reliability,
    self-correction, and human collaboration.'
  - 'Shared research pattern: All systems use large language models as the core reasoning
    engine, decompose scientific workflows into agentic pipelines, and incorporate
    verification or feedback loops to catch errors.'
  - 'Key differences: Autonomy level ranges from fully automated (AI Scientist, AI
    CFD Scientist) to human-in-the-loop (AutoResearchClaw); failure handling varies
    from multi-hypothesis attribution (SAGE) to negative knowledge memory; and evaluation
    targets differ from workshop-level acceptance (AI Scientist-v2) to component-level
    ablation planning (AblationBench).'
  - 'Trend evolution: The field moved from initial proof-of-concept fully automated
    systems in 2024 to workshop-level peer-reviewed acceptance in 2025, and by 2026
    focused on improving robustness through self-correction, failure memory, and strategic
    human intervention, while also developing dedicated benchmarks for evaluation.'
  - 'Open questions: How to guarantee scientific validity and factual accuracy in
    fully generated papers, how to scale human feedback effectively, and how to generalize
    autonomous research agents across diverse scientific domains beyond machine learning.'
  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，能够生成想法、运行实验并撰写论文，同时越来越重视可靠性、自我纠正和人类协作。
  - 研究共性：所有系统均使用大型语言模型作为核心推理引擎，将科学工作流分解为智能体流水线，并集成验证或反馈循环来捕获错误。
  - 关键差异：自主程度从全自动（AI Scientist, AI CFD Scientist）到人在回路（AutoResearchClaw）；失败处理方式从多假设归因（SAGE）到负知识记忆；评测目标从工作坊级别接受（AI
    Scientist-v2）到组件级消融规划（AblationBench）。
  - 趋势演进：该领域从2024年的概念验证式全自动系统，发展到2025年通过工作坊同行评审，再到2026年聚焦于通过自我纠正、失败记忆和战略性人类干预来提升鲁棒性，同时开发了专门的评测基准。
  - 开放问题：如何确保完全生成论文的科学有效性和事实准确性，如何有效扩展人类反馈，以及如何将自主研究智能体泛化到机器学习之外的多样化科学领域。
  literature_review:
    line_of_work_matrix:
    - line: Fully automated research writing pipelines
      what_it_solves: end-to-end generation of research ideas, experiment execution,
        and paper authoring without human intervention, aiming to accelerate scientific
        discovery
      what_remains_open: reliability in producing valid, non-hallucinated results;
        consistent quality across diverse topics; and acceptance at full conference
        standards beyond workshop-level
    - line: Human-AI collaborative research systems
      what_it_solves: combines autonomous agent capabilities with targeted human intervention
        at high-leverage decision points to improve research output quality and reduce
        failure rates
      what_remains_open: optimal granularity and timing of human intervention; scalability
        of collaboration modes; and how to minimize human effort while maximizing
        benefit
    - line: Self-correction and failure-aware research agents
      what_it_solves: diagnoses and recovers from experiment failures through structured
        failure attribution, negative knowledge memory, or multi-agent debate, improving
        robustness of autonomous research
      what_remains_open: generalization of failure patterns across domains; long-term
        memory and knowledge reuse; and whether these mechanisms can fully replace
        human debugging intuition
    - line: Automated evaluation and planning of research components
      what_it_solves: automates sub-tasks like ablation study design and experimental
        planning, isolating a specific bottleneck in the research workflow for benchmarking
      what_remains_open: integration with full research pipelines; alignment of proxy
        metrics with real scientific contribution; and coverage of diverse research
        methodologies beyond ML
    consensus:
    - Large language models are the backbone for autonomous research agents, driving
      idea generation, coding, and writing.
    - Verification mechanisms (code execution checks, vision-language gates, grounded
      reporting) are essential to prevent hallucinated results and unsupported claims.
    - Current systems still lack the reliability and scientific taste needed for consistent
      high-quality output, and failure cases are common.
    - Benchmarking and evaluation are critical but currently fragmented, with no widely
      accepted standard for measuring AI scientist performance.
    disagreements:
    - 'Autonomy philosophy: fully automated approaches (AI Scientist, AI CFD Scientist)
      assume eventual sufficiency of AI, while human-in-the-loop approaches (AutoResearchClaw)
      argue that strategic human input is necessary for quality.'
    - 'Failure handling strategy: some systems use reflective self-correction with
      multi-hypothesis attribution (SAGE), others use a shared memory of past failures
      (Negative Knowledge), and others document failure modes for design principles
      (Why LLMs aren''t scientists yet).'
    - 'Evaluation setting: some papers rely on internal benchmarks or automated reviewers,
      while others aim for external peer review at workshops or conferences, leading
      to different claims about success.'
    - 'Domain scope: most systems target general machine learning, but AI CFD Scientist
      demonstrates domain-specific adaptation with physics-aware verification, suggesting
      a trade-off between generality and specialized validity.'
    open_questions:
    - Can fully autonomous research agents ever achieve the logical consistency and
      novelty required for full conference paper acceptance without human co-authorship?
    - How can failure-handling mechanisms be designed to transfer across different
      scientific domains, given that error patterns vary significantly?
    - What are the right metrics to evaluate the scientific contribution of AI-generated
      papers beyond surface-level acceptance rates?
    - What is the minimal human intervention needed to keep AI research agents aligned
      with scientific rigor while still reducing labor?
