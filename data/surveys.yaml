  related_work_outline:
  - 'Mainstream direction: Building autonomous or semi-autonomous research agents
    that integrate hypothesis generation, experiment execution, and self-verification
    into a closed loop, with a strong emphasis on multi-agent debate, evolutionary
    search, and domain-specific verification gates.'
  - 'Shared research pattern: Systems decompose scientific discovery into structured
    workflows—hypothesis proposal, validation, execution, reflection—and use iterative
    refinement, failure attribution, and human-in-the-loop collaboration to improve
    idea quality and experimental reliability.'
  - 'Key differences: Hypothesis generation approaches split between multi-agent debate,
    evolutionary search, and physics-aware literature grounding; validation methods
    range from visual-language physical gates to verifiable reporting; human involvement
    varies from full autonomy to targeted intervention at high-leverage decision points.'
  - 'Trend evolution: The field moved rapidly from domain-specific prototypes (CFD)
    and benchmark creation (2025) toward general-purpose, self-evolving agent frameworks
    (2026), with a shift from simple reflection to multi-hypothesis causal diagnosis
    and from isolated systems to interactive, customizable team platforms.'
  - 'Open questions: Whether current benchmarks with limited tasks and human baselines
    adequately capture real-world scientific novelty; how to guarantee reliability
    across diverse domains without expensive domain-specific verification; and how
    to resolve the tension between autonomous exploration and ethical, interpretable
    oversight.'
  related_work_outline_zh:
  - 主流方向：构建自主或半自主的研究智能体，将假设生成、实验执行与自我验证整合为闭环，重点发展多智能体辩论、进化搜索和领域专用验证门控。
  - 研究共性：系统将科学发现分解为结构化工作流（假设提出、验证、执行、反思），并通过迭代优化、失败归因与人机协作来提升想法质量和实验可靠性。
  - 关键差异：假设生成方法分为多智能体辩论、进化搜索和物理感知的文献基础三类；验证方式从视觉-语言物理门控到可验证报告不等；人类参与程度从完全自主到高杠杆决策点精准干预。
  - 趋势演进：从领域专用原型（CFD）和基准构建（2025年）快速转向通用、自我演化的智能体框架（2026年），由简单反思走向多假设因果诊断，由孤立系统走向交互式可定制团队平台。
  - 开放问题：现有有限任务和人类基线的基准能否充分反映真实科学新颖性；如何在不依赖昂贵领域专用验证的情况下保证跨领域可靠性；如何平衡自主探索与伦理、可解释的监督。
  literature_review:
    line_of_work_matrix:
    - line: Domain-aware, physics/domain-verification-grounded hypothesis generation
      what_it_solves: Produces physically plausible hypotheses by coupling literature-grounded
        ideation with a vision-language verification gate that inspects simulation
        outputs, reducing silent failures in computational science.
      what_remains_open: The verification gate still misses a fraction of failures;
        the approach is demonstrated only in a single CFD domain and may not transfer
        to fields without renderable ground truth.
    - line: Multi-agent debate and structured team collaboration for hypothesis formation
      what_it_solves: Improves idea novelty, experiment completeness, and report quality
        by having multiple agents debate proposals, execute self-healing actions,
        and produce verifiable results, often with human-in-the-loop checkpoints.
      what_remains_open: Reliance on LLM-judge evaluation may overestimate real scientific
        merit; human collaboration modes are costly and optimal intervention points
        are not yet formally characterized.
    - line: Self-correcting and self-evolving hypothesis refinement
      what_it_solves: Uses multi-hypothesis failure attribution or continuous self-evolution
        to iteratively improve hypotheses and experimental code, turning failed experiments
        into diagnostic signals for higher-quality reruns.
      what_remains_open: Fully autonomous scientific writing and conference-ready
        paper generation remain unsolved; the self-evolution memory may accumulate
        obsolete or biased knowledge over long cycles.
    - line: Evolutionary search and structured research tree exploration
      what_it_solves: Combines evolutionary selection of starting points, tree-based
        branching, and hierarchical reflection to systematically explore the hypothesis
        space, outperforming pure evolutionary baselines on combinatorial optimization
        and cooperative driving tasks.
      what_remains_open: The approach has been validated on relatively narrow optimization
        and simulation scenarios; its effectiveness on open-ended scientific discovery
        with large conceptual leaps is unknown.
    - line: Benchmarking and evaluation of AI scientist hypothesis quality
      what_it_solves: Provides standardized tasks (cell annotation, multiple-choice
        questions from published studies) and human expert baselines to measure the
        gap between AI and human hypothesis generation in biology.
      what_remains_open: Current benchmarks are limited to single-cell transcriptomics
        and structured questions, which may not capture the creativity or long-term
        impact of real scientific hypotheses; the human baseline is small and from
        a single institution.
    consensus:
    - Hypothesis generation must be tightly coupled with verification and execution
      feedback to produce credible scientific claims.
    - Multi-step, structured workflows (debate, tree search, evolutionary loops) outperform
      single-pass prompt-based idea generation.
    - Human involvement, even at sparse decision points, significantly boosts the
      quality of autonomous research outputs.
    - Verification mechanisms—whether physics-based gates or verifiable reporting—are
      essential to prevent hallucinated results and build trust in AI-generated hypotheses.
    disagreements:
    - 'The optimal granularity of self-correction: some favor multi-hypothesis causal
      attribution targeting specific failure roots, while others adopt continuous
      self-evolution across entire research cycles.'
    - 'The role of human collaboration: systems range from almost fully autonomous
      to offering seven distinct intervention modes, with debate on whether high-leverage
      sparse collaboration is always superior to exhaustive oversight.'
    - 'Domain specificity: one line builds domain-immersed agents with physics-aware
      verification, whereas others advocate domain-agnostic frameworks that can be
      instantiated with ~100 lines of code, raising a trade-off between depth and
      breadth.'
    - 'Evaluation methodology: some rely on automated LLM judges and benchmark scores,
      while others introduce domain expert baselines and blind review, leading to
      contradictory signals about how close AI scientists are to human-level hypothesis
      generation.'
    open_questions:
    - How can we design benchmarks that evaluate the long-term novelty and impact
      of AI-generated hypotheses rather than their immediate correctness on proxy
      tasks?
    - What is the minimal domain-specific verification needed to prevent silent failures
      without making the system brittle and non-transferable?
    - Can self-evolving agents maintain a productive hypothesis space without accumulating
      bias or drifts when running for hundreds of cycles?
    - Under what conditions does human collaboration become a bottleneck rather than
      a boost, and how can we dynamically adjust the level of autonomy?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于领域知识、物理/领域验证的假设生成
      解决的问题: 通过将文献基础构思与视觉-语言验证门控相结合，生成物理上合理的假设，该门控检查仿真输出，减少计算科学中的静默失败。
      尚未覆盖: 验证门控仍会遗漏部分失败；该方法仅在单一CFD领域展示，可能无法迁移到无可渲染真值的领域。
    - 路线: 多智能体辩论与结构化团队协作的假设生成
      解决的问题: 通过多智能体辩论、自愈执行和可验证结果，并常设人机协作检查点，提升想法新颖性、实验完整性和报告质量。
      尚未覆盖: 依赖LLM评委的评估可能高估真实科学价值；人类协作模式成本高，最优干预点尚未被形式化描述。
    - 路线: 自我纠正与自我演化的假设迭代
      解决的问题: 利用多假设失败归因或持续自我演化，迭代改进假设和实验代码，将失败实验转化为诊断信号，实现更高质量的重新运行。
      尚未覆盖: 完全自主的科学写作与可提交会议论文仍悬而未决；自我演化记忆可能在长周期中累积过时或偏见知识。
    - 路线: 进化搜索与结构化研究树探索
      解决的问题: 结合进化起始点选择、树形分支和分层反思，系统性地探索假设空间，在组合优化和协同驾驶任务上优于纯进化基线。
      尚未覆盖: 该方法仅在较窄的优化与仿真场景中验证，对涉及重大概念跳跃的开放式科学发现的有效性未知。
    - 路线: AI科学家假设质量的基准测试与评估
      解决的问题: 提供标准化任务（细胞注释、基于已发表研究的选择题）和人类专家基线，衡量AI与人类在生物学假设生成上的差距。
      尚未覆盖: 现有基准仅限于单细胞转录组学和结构化问题，可能无法捕捉真实科学假设的创造力或长期影响；人类基线样本小且来自单一机构。
    共识:
    - 假设生成必须与验证和执行反馈紧密耦合，才能产生可信的科学主张。
    - 多步骤、结构化的工作流（辩论、树搜索、进化循环）优于单次提示式的想法生成。
    - 即使在稀疏决策点引入人类参与，也能显著提升自主研究成果的质量。
    - 验证机制——无论是基于物理的门控还是可验证的报告——对防止幻觉结果和建立对AI生成假设的信任至关重要。
    分歧:
    - 自我纠正的最优粒度：一些人主张针对特定失败根源的多假设因果归因，另一些人则采用贯穿整个研究周期的持续自我演化。
    - 人类协作的角色：系统从几乎完全自主到提供七种不同干预模式不等，关于高杠杆稀疏协作是否始终优于逐步详尽监督存在争议。
    - 领域特异性：一条路线构建领域沉浸式智能体，配备物理感知验证，而其他路线提出可用约100行代码实例化的领域无关框架，在深度与广度之间形成权衡。
    - 评估方法论：一些工作依赖自动化LLM评委和基准分数，另一些则引入领域专家基线和盲审，导致关于AI科学家距离人类水平假设生成有多近的信号相互矛盾。
    开放问题:
