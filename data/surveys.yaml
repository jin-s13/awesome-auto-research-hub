    pipeline, and how to benchmark agents against real-world review utility rather
    than proxy metrics.'
  related_work_outline_zh:
  - 主流方向：通过多智能体或迭代式LLM工作流自动化文献综述生成与同行评审，并日益关注鲁棒性和对抗性评估。
  - 研究共性：将综述过程分解为大纲、写作、编辑、审阅等子任务，分配给不同智能体或迭代步骤，并通过与人类综述的相似度和引用质量进行评估。
  - 关键差异：目标任务分化为完整综述生成、层次化组织支持、同行评审动态和智能体检索；评估设置从标准相似度指标到对抗鲁棒性和博弈场景各不相同。
  - 趋势演进：从2024年的层次化组织支持（CHIME）到2025年的多智能体生成（LiRA、IterSurvey）和对抗分析，再到2026年的自进化检索和同行评审博弈，显示出向更自主、鲁棒和全面系统的转变。
  - 开放问题：如何保证超越表面相似度的事实准确性，如何将检索、组织和生成统一为可信的流水线，以及如何基于真实评审效用而非代理指标对智能体进行基准测试。
  literature_review:
    line_of_work_matrix:
    - line: Multi-agent and iterative review generation
      what_it_solves: Automates the writing of full literature reviews by decomposing
        the process into outlining, writing, editing, and reviewing stages, often
        using specialized agents (e.g., LiRA) or iterative refinement (e.g., IterSurvey).
      what_remains_open: Factual accuracy beyond similarity to human reviews, robustness
        to reviewer model variation, and coverage across diverse scientific domains
        remain unverified.
    - line: Hierarchical organization for review support
      what_it_solves: Assists human reviewers by organizing scientific studies into
        hierarchical structures, as in CHIME, to facilitate navigation and synthesis.
      what_remains_open: Whether such organization directly improves downstream review
        quality or can be integrated with automated generation is not demonstrated.
    - line: Automated peer review and adversarial analysis
      what_it_solves: Explores LLM-based peer review dynamics (AgentReview), vulnerability
        to textual attacks (Breaking the Reviewer), and susceptibility to gaming through
        presentation-only revisions (No Hidden Prompts).
      what_remains_open: Alignment with human peer review standards, fairness under
        adversarial manipulation, and generalizability beyond the studied attack types
        are unresolved.
    - line: Agentic literature retrieval
      what_it_solves: Enhances literature retrieval for review tasks via self-evolving
        agents that adapt their search strategies over time (Towards Self-Evolving
        Agentic Literature Retrieval).
      what_remains_open: The impact of improved retrieval on final review quality
        and the handling of rapidly evolving literature are not yet quantified.
    - line: Benchmarks for agent-driven post-training and review
      what_it_solves: Provides evaluation suites like PostTrainBench to measure LLM
        agents' ability to automate post-training pipelines, which may include literature
        synthesis steps.
      what_remains_open: Coverage of literature-review-specific tasks, metrics that
        capture factual correctness and argument coherence, and real-world utility
        remain open.
    consensus:
    - LLM agents can be effectively orchestrated to automate parts of the literature
      review and peer review process.
    - Decomposing the review workflow into specialized sub-tasks improves output quality
      compared to monolithic generation.
    - Evaluation relies heavily on similarity to human-written reviews and citation
      accuracy, though these proxies are acknowledged as incomplete.
    disagreements:
    - 'The primary target task varies: some works aim at end-to-end review generation,
      others at organizational support, peer review simulation, or retrieval augmentation.'
    - 'Evaluation philosophies differ: some emphasize fidelity to human reviews, while
      others stress adversarial robustness or resistance to gaming.'
    - Reproducibility and system openness are inconsistent; some systems provide code
      and datasets, while others offer only limited artifacts.
    open_questions:
    - How can automated reviews achieve factual reliability comparable to expert human
      synthesis, especially for claims not explicitly stated in source papers?
    - What evaluation protocols can move beyond surface similarity to measure argument
      quality, novelty detection, and critical synthesis?
    - How can retrieval, hierarchical organization, and multi-agent generation be
      combined into a single, robust pipeline without compounding errors?
    - Under what conditions do adversarial attacks or presentation-only revisions
      break automated peer review, and how can systems be hardened against them?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多智能体与迭代式综述生成
      解决的问题: 通过将综述过程分解为大纲、写作、编辑和审阅等阶段，利用专用智能体（如LiRA）或迭代优化（如IterSurvey）自动撰写完整文献综述。
      尚未覆盖: 超越与人类综述相似度的事实准确性、对审阅模型变化的鲁棒性以及跨学科领域的覆盖尚未得到验证。
    - 路线: 面向综述支持的层次化组织
      解决的问题: 如CHIME所示，将科学研究组织成层次结构，以辅助人类审阅者进行导航和综合。
      尚未覆盖: 这种组织方式是否直接提升下游综述质量，或能否与自动生成集成，尚未得到证明。
    - 路线: 自动化同行评审与对抗分析
      解决的问题: 探索基于LLM的同行评审动态（AgentReview）、对文本攻击的脆弱性（Breaking the Reviewer）以及通过仅修改呈现方式的博弈（No
        Hidden Prompts）。
      尚未覆盖: 与人类同行评审标准的一致性、对抗操纵下的公平性以及超出已研究攻击类型的泛化能力仍未解决。
    - 路线: 智能体文献检索
      解决的问题: 通过自进化智能体随时间调整搜索策略，增强面向综述任务的文献检索（Towards Self-Evolving Agentic Literature
        Retrieval）。
      尚未覆盖: 检索改进对最终综述质量的影响以及对快速演变文献的处理尚未量化。
    - 路线: 面向智能体驱动后训练与评审的基准
      解决的问题: 提供如PostTrainBench的评估套件，衡量LLM智能体自动化后训练流程的能力，其中可能包含文献综合步骤。
      尚未覆盖: 对文献综述特定任务的覆盖、捕捉事实正确性和论证连贯性的指标以及实际效用仍为开放问题。
    共识:
    - LLM智能体可以被有效编排，以自动化文献综述和同行评审的部分过程。
    - 将评审工作流分解为专门子任务相比单体生成能提升输出质量。
    - 评估严重依赖与人类撰写综述的相似度和引用准确性，尽管这些代理指标被认为是不完整的。
    分歧:
    - 主要目标任务各异：部分工作瞄准端到端综述生成，其他则聚焦组织支持、同行评审模拟或检索增强。
    - 评估理念不同：有的强调对人类综述的忠实度，有的则强调对抗鲁棒性或抗博弈能力。
    - 可复现性和系统开放性不一致；部分系统提供代码和数据集，而其他仅提供有限工件。
    开放问题:
    - 自动生成的综述如何在事实可靠性上达到与专家人工综合相当的水平，尤其是针对源论文中未明确陈述的论断？
    - 何种评估协议能超越表面相似度，衡量论证质量、新颖性检测和批判性综合？
    - 如何将检索、层次化组织和多智能体生成组合成一个鲁棒的流水线，而不累积错误？
    - 在何种条件下对抗攻击或仅修改呈现方式会破坏自动化同行评审，以及如何加固系统以抵御这些攻击？
