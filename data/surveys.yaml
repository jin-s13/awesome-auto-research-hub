      解决的问题: 识别评估盲区，如“正确答案、错误机制”失败模式，并提出多维度评估（结果、机制忠实性、认知诚实），以组织碎片化的智能体能力主张。
      尚未覆盖: 所提出的分类能否预测智能体在开放式发现中的行为的直接实证证据；无需事先知道正确答案的轻量级检测方法。
    共识:
    - 基于LLM的智能体可执行多步科学推理，但仅靠结果评估不足，必须测量机制忠实性、安全性和诚实性。
    - 当前验证环境为模拟或受限环境（文本虚拟实验室、单GPU的ML任务），尚无真实世界实验室验证。
