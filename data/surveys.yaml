  literature_review:
    line_of_work_matrix:
    - line: Systems and reproducible infrastructure
      what_it_solves: Transforms isolated model ideas into runnable, end-to-end autonomous
        research pipelines that generate code, execute experiments, and produce manuscripts,
        as demonstrated by The AI Scientist and Claw AI Lab.
      what_remains_open: Standardized external validation across diverse hardware,
        datasets, and scientific domains; current systems show inconsistent success
        rates and often fail silently without domain-specific validity checks.
    - line: Evaluation and evidence design
      what_it_solves: Creates tasks, baselines, and metrics to compare AI scientist
        claims, ranging from simulated automated review to structured benchmarks like
        DISCOVERYWORLD and BAISBench that include human performance baselines.
      what_remains_open: Coverage of the full discovery cycle beyond narrow task completion;
        alignment between proxy metrics (e.g., automated reviewer scores) and real
        scientific contribution remains unvalidated.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizes fragmented system designs and failure modes into design
        principles and challenge categories, as seen in surveys and failure analysis
        studies that identify recurring issues like implementation drift and overexcitement.
      what_remains_open: Direct empirical validation that proposed taxonomies or design
        principles predict system behavior or improve success rates across different
        architectures and domains.
    consensus:
    - All systems decompose the scientific method into LLM-orchestrated stages and
      use some form of automated filtering (reviewer, vision gate, or benchmark) to
      assess output quality.
    - Current AI scientists cannot yet match human-level reliability; even the best
      systems produce a mix of valid and flawed results, with failure modes including
      code bugs, hallucinated claims, and insufficient domain knowledge.
    - Open-source code and artifacts are increasingly provided, but reproducibility
      remains limited by the stochastic nature of LLMs and the lack of standardized
      evaluation protocols.
    disagreements:
    - 'Domain generality vs. specialization: The AI Scientist and AI Scientist-v2
      aim for broad ML applicability, while AI CFD Scientist embeds physics-aware
      verification for a single domain, trading flexibility for reliability.'
    - 'Evaluation methodology: Some works rely on automated LLM reviewers, others
      use structured benchmark environments with predefined tasks and human baselines,
      and one uses real peer review acceptance as the ultimate metric.'
    - 'Interaction paradigm: Claw AI Lab offers an interactive dashboard with human-in-the-loop
      control, whereas The AI Scientist operates fully autonomously, reflecting different
      assumptions about the role of human oversight.'
    open_questions:
    - How can AI scientists be equipped with robust self-verification to detect and
      correct their own errors, given that even domain-specific gates miss a fraction
      of silent failures?
    - What evaluation framework can capture the novelty, correctness, and reproducibility
      of AI-generated research in a way that correlates with long-term scientific
      impact?
    - Can the design principles derived from failure analyses be operationalized into
      architectural constraints that measurably improve success rates across diverse
      scientific fields?
