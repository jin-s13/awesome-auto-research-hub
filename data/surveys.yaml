  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research writing systems
      what_it_solves: Automating the full cycle from idea generation, code implementation,
        experiment execution, to paper drafting, drastically reducing per-paper cost
        and time (e.g., AI Scientist, AI Scientist-v2, AI CFD Scientist).
      what_remains_open: Reliability of generated claims; silent experiment failures
        that escape automated checks; lack of deep domain reasoning beyond pattern
        matching; inconsistent performance across multiple runs.
    - line: Failure-aware memory and self-correction
      what_it_solves: Detecting, attributing, and recovering from errors in autonomous
        research pipelines by storing negative knowledge or performing multi-hypothesis
        failure attribution, thus improving success rates and artifact quality (e.g.,
        SAGE, Negative Knowledge).
      what_remains_open: Generalization of failure handling across scientific domains;
        prevention of cascading errors without human oversight; whether stored negative
        knowledge transfers effectively to novel tasks.
    - line: Evaluation benchmarks and automated review
      what_it_solves: Providing standardized tasks, metrics, and automated reviewers
        to assess the quality of AI-generated research artifacts, experimental plans,
        and papers (e.g., AblationBench, automated reviewer in AI Scientist).
      what_remains_open: Alignment between automated metrics and true scientific merit;
        coverage of diverse research activities beyond ablation planning; consistent
        performance of LM-based judges across author and reviewer perspectives.
    - line: Human-AI collaboration frameworks
      what_it_solves: Integrating human judgment at critical decision points to improve
        robustness and trustworthiness of autonomous research, with multiple intervention
        modes from full autonomy to step-by-step oversight (e.g., AutoResearchClaw).
      what_remains_open: Optimal granularity and timing of human intervention; scalability
        when human experts are scarce; whether targeted collaboration consistently
        outperforms full autonomy across different research phases.
    consensus:
    - LLM-based agents can draft plausible research papers but frequently introduce
      factual errors, omit critical validation steps, or produce unreproducible results.
    - Automated verification gates (e.g., vision-language physics checks, grounded
      reporting) are necessary to catch silent failures that code-level checks miss.
    - Current systems perform better when augmented with structured memory of past
      failures or with human feedback at key decision points.
    - Evaluation of AI-generated research remains an open challenge; automated reviewer
      scores do not fully capture scientific validity, and benchmarks like AblationBench
      reveal significant gaps compared to human performance.
    disagreements:
    - 'Autonomy level: some systems pursue full autonomy without human intervention,
      while others demonstrate that targeted human collaboration yields higher quality
      and more defensible claims.'
    - 'Failure handling strategy: one approach uses multi-hypothesis causal attribution
      to route corrections to the right level, another stores explicit negative knowledge
      records for later retrieval and rejection.'
    - 'Evaluation target: some works evaluate end-to-end paper quality via automated
      or peer review, others focus on specific sub-tasks like ablation planning, making
      cross-system comparison difficult.'
    - 'Domain specificity: general-purpose systems aim to work across ML subfields,
      whereas domain-adapted systems incorporate physics-aware verification, raising
      questions about transferability.'
    open_questions:
    - How can autonomous research systems ensure that generated papers contain verifiable,
      reproducible results beyond surface-level plausibility?
    - Can these systems move beyond recombining known patterns to produce genuinely
      novel hypotheses, and how would we verify such novelty?
    - What is the role of domain-specific verification (e.g., physics-informed gates)
      versus general scientific reasoning, and can a single architecture serve both?
    - How should human-AI collaboration be structured to maximize scientific rigor
      without creating bottlenecks, especially in fields with limited expert availability?
