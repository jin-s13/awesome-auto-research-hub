  related_work_outline:
  - 'Mainstream direction: Building autonomous AI scientist systems that iteratively
    search literature, analyze data, generate hypotheses, and produce scientific reports
    or manuscripts.'
  - 'Shared research pattern: Decomposing the research lifecycle into specialized
    LLM agents, orchestrating them through iterative refinement loops, and evaluating
    with mixed human-automated protocols.'
  - 'Key differences: Some systems target end-to-end paper generation, others focus
    on discovery; evaluation ranges from rubric-based scoring to independent scientist
    accuracy; domain specificity varies from general-purpose to narrow fields.'
  - 'Trend evolution: From 2025 benchmarks and surveys to 2026 fully autonomous frameworks
    with self-evolution and long-horizon iterative cycles, driven by multi-agent architectures
    and structured world models.'
  - 'Open questions: Reliability and failure modes in long-horizon tasks, transferability
    across scientific domains, alignment between proxy metrics and real research utility,
    and ethical governance of autonomous discovery.'
  related_work_outline_zh:
  - 主流方向：构建自主AI科学家系统，能够迭代搜索文献、分析数据、生成假设并产出科学报告或论文。
  - 研究共性：将研究生命周期分解为多个专业LLM智能体，通过迭代优化循环编排，并采用人机混合评估协议。
  - 关键差异：部分系统以端到端论文生成为目标，部分聚焦于发现；评估方式从基于评分准则到独立科学家准确率不等；领域特定程度从通用到垂直领域。
  - 趋势演进：从2025年的基准和综述迈向2026年具备自我演化和长周期迭代的完全自主框架，多智能体架构和结构化世界模型驱动。
  - 开放问题：长周期任务中的可靠性与失败模式、跨科学领域的可迁移性、代理指标与真实研究效用的一致性、以及自主发现的伦理治理。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey and manuscript generation
      what_it_solves: Producing comprehensive, citation-backed survey papers or research
        manuscripts through modular LLM agents with reviewer-guided refinement (e.g.,
        ARISE, EDM-ARS).
      what_remains_open: Cross-domain generalization of writing quality, handling
        of controversial or contradictory literature, and alignment with human expert-vetted
        knowledge structures.
    - line: Autonomous AI scientist frameworks for discovery
      what_it_solves: Performing iterative cycles of literature search, data analysis,
        and hypothesis generation to produce traceable scientific findings (e.g.,
        Kosmos, EvoMaster, OR-Agent).
      what_remains_open: Long-term reliability outside controlled runs, containment
        of failure modes such as memory degradation and implementation drift, and
        scalability to diverse scientific fields.
    - line: Benchmarking and evaluation of AI-driven research
      what_it_solves: Providing standardized tasks and metrics to assess AI scientists'
        performance on real scientific data and discovery challenges (e.g., BAISBench).
      what_remains_open: Coverage of open-ended discovery versus narrow task evaluation,
        and evidence that benchmark scores predict actual research productivity or
        breakthrough generation.
    - line: Conceptual surveys and taxonomy of agentic scientific AI
      what_it_solves: Organizing emerging systems, tools, and evaluation strategies
        into structured categories to guide future development (e.g., Agentic AI for
        Scientific Discovery survey).
      what_remains_open: Empirical validation of proposed taxonomies against system
        behavior, and dynamic updating as agent architectures evolve rapidly.
    consensus:
    - Decomposing the scientific workflow into specialized LLM agents (search, analysis,
      writing, reviewing) improves task coverage and output quality.
    - Iterative refinement with feedback loops, whether from reviewer agents or self-critique,
      is essential for generating coherent scientific content.
    - Current systems fall short of fully autonomous high-impact discovery; they assist
      human researchers rather than replace them.
    - Evaluation must combine automated metrics with human judgment, as purely automated
      scores do not capture scientific novelty or correctness.
    disagreements:
    - 'Output scope: some systems aim to generate complete manuscripts, while others
      focus on producing analytical findings and reports without full paper formatting.'
    - 'Domain strategy: several frameworks are designed to be domain-agnostic, whereas
      others embed domain-specific knowledge in agent roles or data registries to
      improve performance.'
    - 'Reliability assessment: one line of work catalogs explicit failure modes (implementation
      drift, overexcitement), while others report only accuracy or success rates,
      leaving failure analysis unreported.'
    - 'Evaluation targets: benchmarks use task-specific metrics (cell annotation accuracy,
      multiple-choice), while autonomous systems rely on human ratings of statement
      accuracy or rubric scores, making cross-comparison difficult.'
    open_questions:
    - How can autonomous systems be made robust to the failure modes documented in
      long-horizon research runs, such as context degradation and premature claims
      of success?
    - What evaluation protocols can bridge the gap between proxy benchmarks and the
      real-world impact of AI-generated discoveries?
    - To what extent can domain-agnostic frameworks match the performance of domain-specific
      systems when applied to unfamiliar scientific fields?
    - How should the community address ethical concerns and validate the provenance
      of literature when AI scientists autonomously generate and cite content?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述与论文生成
      解决的问题: 通过模块化LLM智能体与评审引导的迭代优化，生成全面、附引文的综述论文或研究手稿（如ARISE、EDM-ARS）。
      尚未覆盖: 写作质量的跨领域泛化、对争议性或矛盾文献的处理、以及与人类专家审核知识结构的一致性。
    - 路线: 面向发现的自主AI科学家框架
      解决的问题: 执行文献搜索、数据分析和假设生成的迭代循环，产出可追溯的科学发现（如Kosmos、EvoMaster、OR-Agent）。
      尚未覆盖: 受控运行之外的长周期可靠性、对记忆退化和实现漂移等失败模式的抑制、以及向多样科学领域的可扩展性。
    - 路线: AI驱动研究的基准与评估
      解决的问题: 提供标准化任务和指标，评估AI科学家在真实科学数据和发现挑战上的表现（如BAISBench）。
      尚未覆盖: 开放端发现与窄任务评估的覆盖范围，以及基准分数能否预测实际科研产出或突破性发现。
    - 路线: 智能体科学AI的概念综述与分类
      解决的问题: 将新兴系统、工具和评估策略组织为结构化类别，以指导未来发展（如《面向科学发现的智能体AI综述》）。
      尚未覆盖: 所提分类体系与系统行为的实证对齐，以及在智能体架构快速演进下的动态更新。
    共识:
    - 将科学工作流分解为专门的LLM智能体（搜索、分析、写作、评审）能提升任务覆盖率和输出质量。
    - 通过评审智能体或自我批判机制进行迭代优化，对生成连贯的科学内容至关重要。
    - 当前系统尚未实现完全自主的高影响力发现，它们更多的是辅助人类研究者而非替代。
    - 评估必须结合自动化指标与人类判断，因为纯自动评分无法捕捉科学新颖性或正确性。
    分歧:
    - 产出范围：部分系统以生成完整论文为目标，而另一些则专注于产出分析发现和报告，不包含完整论文格式。
    - 领域策略：若干框架设计为领域无关，而其他系统则在智能体角色或数据注册表中嵌入领域知识以提升性能。
    - 可靠性评估：一类工作明确记录了失败模式（实现漂移、过度兴奋），而其他系统仅报告准确率或成功率，未提供失败分析。
    - 评估目标：基准使用任务特定指标（细胞注释准确率、多选题），而自主系统依赖人类对陈述准确性或评分准则的评判，导致跨系统对比困难。
    开放问题:
    - 如何使自主系统对长周期研究中出现的上下文退化、过早宣布成功等失败模式具有鲁棒性？
    - 何种评估协议能弥合代理基准与AI生成发现在真实世界影响之间的差距？
    - 当应用于不熟悉的科学领域时，领域无关框架能在多大程度上媲美领域特定系统的性能？
    - 当AI科学家自主生成并引用文献内容时，社区应如何处理伦理问题并验证文献来源的可靠性？
