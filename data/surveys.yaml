    consensus:
    - Automated experimentation requires a closed-loop architecture where an AI component
      selects actions and incorporates feedback to guide subsequent steps.
    - Machine learning models, particularly LLMs, are central to reducing human intervention
      in hypothesis generation, code modification, and result interpretation.
    - Data quality, noise, and reproducibility are recognized as critical bottlenecks
      that must be addressed for reliable autonomous discovery.
    - Infrastructure for experiment tracking, data versioning, and compute orchestration
      is essential to move beyond single-shot automation.
    disagreements:
    - 'Agent design: single LLM agent with tool-calling versus multi-agent systems
      that separate quantitative analysis, reasoning, and theory integration.'
    - 'Optimization paradigm: Bayesian optimization with explicit acquisition functions
      versus LLM-based reasoning trace selection guided by physical admissibility.'
    - 'Role of measurement noise: treated as a nuisance to be cleaned via post-processing
      versus an explicit optimization variable co-optimized with the target property.'
    - 'Evaluation setting: proof-of-concept on simple color mixing or molecular datasets
      versus real-world materials characterization with atomic-resolution data.'
    - 'Human involvement: fully autonomous pipelines with minimal human input versus
      frameworks that require real-time expert guidance for critical decisions.'
    open_questions:
    - How can the scientific validity of autonomously generated hypotheses be systematically
      verified beyond the training distribution?
    - What benchmarks and metrics can capture the utility of automated experimentation
      systems across diverse scientific domains?
    - How do we ensure that improvements come from the AI agent's reasoning rather
      than from the underlying simulator, model, or task-specific priors?
    - What governance and provenance standards are needed when autonomous labs generate
      and publish findings with minimal human oversight?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究实验室基础设施
      解决的问题: 将构思、代码生成、实验执行和结果解释集成为单一自动化管道，减少迭代研究周期中的人工开销。
      尚未覆盖: 超越演示性玩具任务或单一材料系统的跨领域泛化；全自主实验室的伦理与治理机制仍停留在概念层面。
    - 路线: 自动化闭环中的数据质量与测量噪声管理
      解决的问题: 检测并纠正噪声特征，或协同优化测量参数（如持续时间）与目标属性，以提高信噪比和下游模型可靠性。
      尚未覆盖: 对复杂、非独立同分布噪声类型的泛化，以及在没有预定义噪声模型的情况下与实时决策的集成。
    - 路线: 多智能体与理论引导的实验编排
      解决的问题: 结合专用机器学习模型、LLM推理和物理理论，评估新颖性、提出可证伪假设并建议后续实验，实现偶然发现的操作化。
      尚未覆盖: 关键决策依赖人类专家反馈；所使用的物理理论限于已知模型，可能遗漏异常现象。
    - 路线: 面向实验设计的序贯优化
      解决的问题: 利用贝叶斯优化或主动学习高效探索参数空间，在有限实验预算下平衡探索与利用。
      尚未覆盖: 向高维、混合变量和多目标空间的可扩展性；优化器相对于底层模型或仿真器的贡献未被隔离。
    - 路线: 概念路线图与社区议程
      解决的问题: 定义自主研究的愿景、评估标准和治理挑战，将碎片化努力组织为连贯的研究方向。
      尚未覆盖: 所提框架缺乏实证验证；社区共识和资源投入被假定但未得到证明。
    共识:
    - 自动化实验需要闭环架构，其中AI组件选择动作并整合反馈以指导后续步骤。
    - 机器学习模型，尤其是LLM，在减少假设生成、代码修改和结果解释中的人工干预方面发挥核心作用。
    - 数据质量、噪声和可复现性被认为是实现可靠自主发现必须解决的关键瓶颈。
    - 实验跟踪、数据版本化和计算编排的基础设施对于超越单次自动化至关重要。
    分歧:
    - 智能体设计：具有工具调用能力的单一LLM代理 vs. 分离定量分析、推理和理论集成的多智能体系统。
    - 优化范式：具有显式采集函数的贝叶斯优化 vs. 基于物理可接受性引导的LLM推理轨迹选择。
    - 测量噪声的角色：视为通过后处理清除的干扰 vs. 作为与目标属性协同优化的显式变量。
    - 评估场景：在简单颜色混合或分子数据集上的概念验证 vs. 使用原子分辨率数据的真实材料表征。
    - 人类参与：人工输入最少的全自主管道 vs. 在关键决策中需要实时专家指导的框架。
    开放问题:
    - 如何系统验证自主生成假设在训练分布之外的科学有效性？
    - 哪些基准和指标能够捕捉自动化实验系统在不同科学领域的效用？
    - 如何确保性能提升来自AI智能体的推理，而非底层仿真器、模型或任务特定先验？
    - 当自主实验室在最少人工监督下生成并发表发现时，需要哪些治理和溯源标准？
