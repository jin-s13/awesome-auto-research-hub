  literature_review:
    line_of_work_matrix:
    - line: Virtual environments and benchmarks for scientific discovery
      what_it_solves: Provides standardized tasks, metrics, and baselines to evaluate
        agents on complete cycles of hypothesis formation, experimentation, and conclusion.
      what_remains_open: Whether the simulated tasks capture the diversity and complexity
        of real-world science, and whether automatic metrics correlate with genuine
        discovery value.
    - line: Code and tool augmentation for experiment generation
      what_it_solves: Automatically distills domain-specific code examples from repositories
        to improve the accuracy and scientific soundness of agent-generated experiments.
      what_remains_open: Generalizability beyond the trained scientific domain, and
        the reliability of LLM-as-a-judge for evaluating code quality.
    - line: Safety reasoning and risk control in agent pipelines
      what_it_solves: Embeds trajectory-aware safety checks into every stage of the
        agent workflow to prevent compositional tool-chain risks without sacrificing
        output quality.
      what_remains_open: Applicability across diverse scientific domains and the potential
        trade-off between safety overhead and discovery throughput.
    - line: 'Evaluation beyond task outcomes: mechanism fidelity and epistemic honesty'
      what_it_solves: Detects the 'correct answer, wrong mechanism' failure mode by
        separately assessing reasoning correctness and honesty when agents face contradictory
        evidence.
      what_remains_open: Lightweight detection methods that do not require knowing
        the ground-truth mechanism, and validation on open-ended discovery tasks.
    - line: Autonomous objective evolution for scientific optimization
      what_it_solves: Automates the design of objective functions via a bi-level LLM
        agent, enabling systematic exploration of objective spaces and trade-offs
        in materials and drug design.
      what_remains_open: Whether evolved objectives always lead to scientifically
        meaningful discoveries, and the computational cost of the inner optimization
        loop.
    - line: Automated post-training of language models by agents
      what_it_solves: Structures the full post-training pipeline (planning, data preparation,
        training, evaluation) as agent-computer interfaces, reducing manual expertise.
      what_remains_open: Reliability across a wider range of model architectures and
        tasks, and the risk of reward hacking when agents self-improve.
    - line: Data-driven discovery of governing equations
      what_it_solves: Recovers shared partial differential equations from multi-source
        datasets using competitive optimization and genetic search, handling heterogeneous
        and noisy data.
      what_remains_open: Robustness to sparse or highly noisy observations, and interpretability
        of discovered equations for domain scientists.
    consensus:
    - LLM-based agents are the dominant architecture for automating scientific discovery
      loops.
    - Standardized benchmarks with automatic metrics are necessary for reproducible
      progress.
    - Code generation and execution are central to enabling agents to perform experiments.
    - Evaluation should move beyond final-answer accuracy to include process-level
      qualities such as safety, reasoning fidelity, and robustness.
    disagreements:
    - 'Evaluation granularity: some works focus on task completion scores, while others
      argue for separate assessment of mechanism fidelity and epistemic honesty.'
    - 'Safety integration: SciTrace embeds safety checks at every reasoning stage,
      whereas other agent designs treat safety as an external filter or omit it entirely.'
    - 'Agent autonomy: SAGA and AutoTrainess give agents control over objective design
      and training pipelines, while benchmarks like DISCOVERYWORLD and 1GC-7RC fix
      the task and constraints.'
    - 'Resource constraints: 1GC-7RC enforces a single-GPU, no-internet setting to
      test implicit ML knowledge, contrasting with unconstrained environments used
      elsewhere.'
    - 'Domain specificity: CodeDistiller targets materials science, MCO-PDE targets
      physics, while DISCOVERYWORLD spans multiple sciences—raising questions about
      domain-agnostic vs. domain-tuned agent design.'
    open_questions:
    - How can we verify an agent's reasoning mechanism in open-ended discovery where
      no ground-truth answer exists?
    - What is the right trade-off between safety constraints and the agent's freedom
      to explore risky but potentially groundbreaking hypotheses?
    - Can code and tool augmentation methods transfer across scientific domains without
      extensive re-engineering?
    - Do current benchmark metrics predict real-world scientific impact, or do they
      reward agents that exploit simulator artifacts?
    - How can autonomous objective evolution avoid degenerate or trivial objectives
      that do not advance scientific understanding?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 科学发现虚拟环境与基准构建
      解决的问题: 提供标准化任务、指标和基线，评估智能体在假设形成、实验和结论完整循环中的能力。
      尚未覆盖: 模拟任务是否捕捉真实科学的多样性和复杂性，自动指标是否与真实发现价值相关。
    - 路线: 面向实验生成的代码与工具增强
      解决的问题: 自动从代码仓库提炼领域特定示例，提升智能体生成实验的准确性和科学合理性。
      尚未覆盖: 跨科学领域的泛化能力，以及用LLM-as-a-judge评估代码质量的可靠性。
    - 路线: 智能体流水线中的安全推理与风险控制
      解决的问题: 将轨迹感知安全检查嵌入智能体各阶段，防止组合工具链风险，同时保持输出质量。
      尚未覆盖: 跨科学领域的适用性，以及安全开销与发现效率之间的权衡。
    - 路线: 超越任务结果的评估：机制忠实性与认知诚实性
      解决的问题: 通过分别评估推理正确性和面对矛盾证据时的诚实性，检测“正确答案、错误机制”失败模式。
      尚未覆盖: 无需已知真实机制的轻量检测方法，以及在开放式发现任务上的验证。
    - 路线: 面向科学优化的自主目标演化
      解决的问题: 通过双层LLM智能体自动化目标函数设计，系统探索材料与药物设计中的目标空间及权衡。
      尚未覆盖: 演化目标是否总能产生有意义的科学发现，以及内部优化循环的计算成本。
    - 路线: 语言模型的自动化后训练
      解决的问题: 将完整后训练流程结构化为智能体-计算机接口，减少人工专业知识需求。
      尚未覆盖: 在更广泛模型架构和任务上的可靠性，以及智能体自我改进时的奖励黑客风险。
    - 路线: 数据驱动的控制方程发现
      解决的问题: 利用竞争优化和遗传搜索从多源数据中恢复共享偏微分方程，处理异质和噪声数据。
      尚未覆盖: 对稀疏或高噪声观测的鲁棒性，以及发现方程对领域科学家的可解释性。
    共识:
    - 基于LLM的智能体是自动化科学发现循环的主流架构。
    - 具有自动指标的标准化基准对于可复现的进展是必要的。
    - 代码生成与执行是使智能体能够执行实验的核心能力。
    - 评估应超越最终答案准确性，纳入过程层面的质量，如安全性、推理忠实性和鲁棒性。
    分歧:
    - 评估粒度：部分工作关注任务完成分数，而另一些主张分别评估机制忠实性和认知诚实性。
    - 安全集成：SciTrace在每个推理阶段嵌入安全检查，而其他智能体设计将安全视为外部过滤器或完全忽略。
    - 智能体自主性：SAGA和AutoTrainess让智能体控制目标设计和训练流程，而DISCOVERYWORLD和1GC-7RC等基准固定任务和约束。
    - 资源约束：1GC-7RC强制单GPU、无互联网设置以测试隐式ML知识，与其他工作中使用的无约束环境形成对比。
    - 领域特异性：CodeDistiller针对材料科学，MCO-PDE针对物理，而DISCOVERYWORLD跨多个科学领域，引发领域无关与领域调优智能体设计的讨论。
    开放问题:
    - 在无真实答案的开放式发现中，如何验证智能体的推理机制？
    - 安全约束与智能体探索风险但可能具有突破性假设的自由之间，应如何权衡？
    - 代码和工具增强方法能否在无需大量重新工程的情况下跨科学领域迁移？
    - 当前基准指标能否预测真实世界的科学影响，还是奖励利用模拟器漏洞的智能体？
    - 自主目标演化如何避免退化或琐碎的目标，从而无法推进科学理解？
