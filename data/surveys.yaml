    automation.'
  - 'Open questions: How to guarantee reliability and reproducibility of fully automated
    experiments; how to transfer from code-based simulation to physical lab settings;
    how to design evaluation standards that correlate with genuine scientific progress;
    how negative knowledge generalizes across tasks; and how to implement governance
    and ethical safeguards for autonomous research.'
  related_work_outline_zh:
  - 主流方向：构建端到端的AI智能体，以大语言模型为核心推理引擎，自主完成从构思、编码、实验执行、分析到论文撰写的完整科学实验循环。
  - 研究共性：将研究过程分解为模块化步骤（假设生成、实验设计、代码实现、结果解释），并应用基于LLM的智能体，结合工具使用、迭代优化和自动评估。
  - 关键差异：自动化范围从全流程论文生成到聚焦消融规划；智能体架构有单智能体与多智能体团队之分；记忆机制包括无记忆和失败感知的负知识；评估依赖自动评审、基准任务或人类判断；领域从通用机器学习到专用推荐系统实验室。
  - 趋势演进：从2024年的概念验证（The AI Scientist）到2025年带有树搜索的改进版本和基准（DISCOVERYWORLD、AblationBench），再到2026年的多智能体平台（Claw
    AI Lab）和记忆增强系统（Negative Knowledge），显示出向更鲁棒、协作和失败感知的自动化演进。
  - 开放问题：如何保证全自动实验的可靠性和可复现性；如何从代码模拟迁移到真实物理实验室；如何设计与真正科学进步相关的评估标准；负知识如何跨任务泛化；以及如何实施自主研究的治理与伦理保障。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated research agent systems
      what_it_solves: Automating the full scientific discovery pipeline—idea generation,
        code implementation, experiment execution, result visualization, and paper
        writing—to produce complete manuscripts with minimal human intervention.
      what_remains_open: Performance is inconsistent (only a fraction of generated
        papers pass peer review); reliance on pre-trained LLM knowledge may introduce
        hallucinations; long-term memory and deep multi-step reasoning are limited;
        applicability to complex multi-file codebases and physical lab environments
        is unverified.
    - line: Benchmarks and evaluation frameworks for automated experimentation
      what_it_solves: Providing standardized tasks and metrics to assess agent capabilities
        in hypothesis formation, experiment design, ablation planning, and result
        analysis, enabling comparison across systems.
      what_remains_open: Task coverage is narrow (e.g., text-based simulations, specific
        ML subfields); proxy metrics like task completion or automated review scores
        may not align with real scientific impact; open-ended discovery evaluation
        remains unsolved.
    - line: Memory-augmented and failure-aware automation
      what_it_solves: Improving agent efficiency and success rate by recording failed
        attempts as structured negative knowledge, allowing downstream agents to avoid
        repeated errors and make better experimental decisions.
      what_remains_open: Generalization of negative knowledge across different tasks
        and domains is untested; mechanisms to prevent memory pollution or overfitting
        to past failures are absent; the trade-off between exploration and exploitation
        is not addressed.
    - line: Domain-specific autonomous research lab concepts and governance
      what_it_solves: Proposing blueprints for end-to-end automation tailored to a
        specific field (e.g., recommender systems) and outlining agendas for building,
        evaluating, and governing such labs.
      what_remains_open: No implemented prototype or empirical validation exists;
        governance, ethics, privacy, and fairness challenges are identified but not
        resolved; community consensus and resource investment are required but not
        guaranteed.
    consensus:
    - Large language models serve as the central reasoning and planning component
      for automated experiment agents.
    - Closed-loop iteration—executing experiments, analyzing results, and refining
      hypotheses—is essential for autonomous scientific discovery.
    - Dedicated benchmarks and automated evaluation metrics are necessary to measure
      progress, as manual review does not scale.
    - Handling failures and leveraging past experience (e.g., via memory) can significantly
      improve agent performance and token efficiency.
    disagreements:
    - 'Automation scope: some systems target the entire research pipeline from idea
      to paper, while others focus on specific sub-tasks like ablation planning or
      experiment execution only.'
    - 'Agent architecture: single-agent designs contrast with multi-agent teams that
      assign distinct roles (e.g., experiment manager, reviewer, curator).'
    - 'Memory design: most systems operate statelessly, whereas one line introduces
      a persistent negative knowledge bank to record and reuse failure information.'
    - 'Evaluation strategy: approaches include automated LLM reviewers, task-completion
      benchmarks in simulated environments, human expert judgment, and real peer-review
      submission—each with different validity and scalability trade-offs.'
    - 'Domain generality: some systems are demonstrated across multiple ML subfields,
      while others are conceptualized for a single domain like recommender systems,
      raising questions about cross-domain transfer.'
    open_questions:
    - How can automated experiment agents ensure the reproducibility and reliability
      of their findings, given that code and data artifacts are generated on the fly?
    - What evaluation criteria can replace or complement automated review scores to
      better reflect genuine scientific novelty and correctness?
    - Can failure-aware memory generalize across diverse research tasks without introducing
      harmful biases or memory bloat?
    - What are the minimal human oversight requirements to prevent unethical, unsafe,
      or meaningless research outputs from fully autonomous systems?
    - How can these agents move beyond code-based ML experiments to interact with
      physical laboratories or multi-modal data collection?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动化研究智能体系统
      解决的问题: 自动化完整的科学发现流程——从想法生成、代码实现、实验执行、结果可视化到论文撰写，以最少的人工干预产出完整手稿。
      尚未覆盖: 性能不稳定（仅部分生成论文通过同行评审）；依赖预训练LLM知识可能产生幻觉；长期记忆和深度多步推理有限；在复杂多文件代码和物理实验室环境中的适用性未经验证。
    - 路线: 自动化实验的基准测试与评估框架
      解决的问题: 提供标准化任务和指标，评估智能体在假设形成、实验设计、消融规划和结果分析等方面的能力，使不同系统可比较。
      尚未覆盖: 任务覆盖范围较窄（如基于文本的模拟、特定ML子领域）；任务完成度或自动评审分数等代理指标可能与真实科学影响力不一致；开放式发现评估仍未解决。
    - 路线: 记忆增强与失败感知的自动化
      解决的问题: 通过将失败尝试记录为结构化的负知识，使下游智能体避免重复错误并做出更好的实验决策，从而提高效率和成功率。
      尚未覆盖: 负知识在不同任务和领域间的泛化能力未经测试；缺乏防止记忆污染或过拟合过去失败的机制；探索与利用的权衡未被讨论。
    - 路线: 特定领域的自主研究实验室概念与治理
      解决的问题: 为特定领域（如推荐系统）提出端到端自动化蓝图，并规划构建、评估和治理的议程。
      尚未覆盖: 尚无实现原型或实证验证；治理、伦理、隐私和公平挑战仅被指出但未解决；需要社区共识和资源投入，但无法保证。
    共识:
    - 大语言模型是自动化实验智能体的核心推理与规划组件。
    - 闭环迭代——执行实验、分析结果并优化假设——对自主科学发现至关重要。
    - 需要专门的基准和自动评估指标来衡量进展，因为人工评审无法规模化。
    - 处理失败并利用过去经验（如通过记忆）可以显著提升智能体性能和令牌效率。
    分歧:
    - 自动化范围：部分系统瞄准从想法到论文的整个研究流程，而其他系统仅聚焦于消融规划或实验执行等子任务。
    - 智能体架构：单智能体设计与分配不同角色（如实验管理器、审稿人、策展人）的多智能体团队形成对比。
    - 记忆设计：多数系统无状态运行，而一条路线引入持久负知识库以记录和复用失败信息。
    - 评估策略：方法包括自动LLM审稿人、模拟环境中的任务完成基准、人类专家评判以及真实同行评审投稿，各自在有效性和可扩展性上存在不同权衡。
    - 领域通用性：部分系统在多个ML子领域展示，而其他系统为推荐系统等单一领域构思，引发跨领域迁移的疑问。
    开放问题:
    - 自动化实验智能体如何确保其发现的可靠性和可复现性，因为代码和数据工件是即时生成的？
    - 何种评估标准可以替代或补充自动评审分数，以更好地反映真正的科学新颖性和正确性？
    - 失败感知记忆能否在不同研究任务间泛化，而不引入有害偏差或记忆膨胀？
    - 防止全自主系统产生不道德、不安全或无意义的研究输出所需的最低人工监督是什么？
    - 这些智能体如何从基于代码的ML实验扩展到与物理实验室或多模态数据收集交互？
