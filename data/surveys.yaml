  related_work_outline_zh:
  - 主流方向：多智能体自主研究流水线，整合假设生成、实验执行与报告，并日益强调自我纠正与人机协作。
  - 研究共性：系统将科学过程分解为模块化阶段（构思、实验、验证），使用具有专门角色的LLM智能体管理各阶段，通常包含某种有效性检查。
  - 关键差异：自我改进机制（反思、多假设归因、进化）、人类参与程度、领域通用性（通用框架 vs. 深度领域知识嵌入）以及是否依赖标准化基准。
  - 趋势演进：从孤立的领域专用原型（2023–2024）转向通用框架与自我演化系统（2025–2026），伴随ARC-Bench、BAISBench等基准的出现。
  - 开放问题：生成假设的新颖性、验证门控的可靠性、跨领域泛化能力，以及自主科学发现的伦理安全机制。
  literature_review:
    line_of_work_matrix:
    - line: Integrated autonomous research pipelines
      what_it_solves: End-to-end automation of the scientific cycle from idea generation
        to experiment execution and paper writing, using multi-agent orchestration
        and modular task decomposition.
      what_remains_open: Reliability of the pipeline under unexpected failures, autonomous
        scientific writing quality, and generalization to truly novel discovery tasks
        beyond imitation of existing patterns.
    - line: Self-correction and evolution mechanisms
      what_it_solves: 'Improving research quality through feedback loops: multi-hypothesis
        failure attribution, self-evolution across cycles, and evolutionary search
        combined with structured trees.'
      what_remains_open: Whether these mechanisms can produce genuinely novel hypotheses
        rather than optimizing known objectives, and how to evaluate the creativity
        of the generated ideas.
    - line: Domain-specific scientific discovery agents
      what_it_solves: Embedding domain knowledge (e.g., CFD physics, single-cell genomics)
        into AI scientist workflows via verification gates and specialized tools to
        ensure valid, usable results.
      what_remains_open: Robustness of domain-specific verifiers, transferability
        to other domains, and whether the systems can surpass human-designed domain
        heuristics.
    - line: Benchmarking and evaluation design
      what_it_solves: Providing standardized tasks and human baselines to compare
        AI scientist performance, covering both experimental outcomes and the scientific
        reasoning process.
      what_remains_open: Whether current benchmarks capture the full depth of scientific
        discovery, and alignment between proxy metrics (e.g., accuracy, RMSE) and
        genuine scientific impact.
    - line: Human-AI collaboration frameworks
      what_it_solves: Integrating human judgment at high-leverage decision points
        to improve outcomes over fully autonomous systems, while maintaining workflow
        efficiency.
      what_remains_open: Optimal intervention modes and timing, risk of over-reliance
        on human input, and scalability when human experts are scarce.
    consensus:
    - Modular decomposition of research into ideation, execution, verification, and
      reporting stages is essential for manageable autonomous systems.
    - Verification mechanisms (physics-aware gates, grounded reporting, fact-constrained
      output) are critical to prevent hallucinated results and unsubstantiated claims.
    - Multi-agent architectures with specialized roles outperform monolithic agents
      in handling complex, multi-step scientific workflows.
    - Current AI scientist systems perform well on structured or surrogate tasks but
      fall short of fully autonomous, novel scientific discovery.
    - Standardized benchmarks with human-performance baselines are necessary to track
      progress and are beginning to emerge.
    disagreements:
    - 'Self-improvement strategy: reflection-based failure diagnosis versus evolutionary/gradient-inspired
      search versus multi-hypothesis causal attribution.'
    - 'Degree of human involvement: fully autonomous pipelines versus varied human-in-the-loop
      modes, with no consensus on the optimal balance of autonomy and oversight.'
    - 'Domain generality: domain-agnostic frameworks (e.g., EvoMaster) claim broad
      applicability, while domain-specific systems (e.g., AI CFD Scientist) argue
      deep integration of domain knowledge is needed for reliable results.'
    - 'Report generation: some systems prioritize verifiable, constraint-bound reporting
      to ensure scientific honesty, while others focus on generating fluent full papers,
      potentially at the cost of factual accuracy.'
    open_questions:
    - Can autonomous systems generate hypotheses with genuine scientific novelty,
      or are they limited to recombining known patterns from training data?
    - How can verification gates be made robust across diverse domains without extensive
      manual redesign?
    - Do current benchmarks (ARC-Bench, BAISBench) measure core scientific reasoning
      abilities, or do they primarily test task completion and optimization skills?
    - What are the ethical and safety risks of deploying autonomous scientist agents
      in high-stakes scientific fields, and how should they be mitigated?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 集成自主研究流水线
      解决的问题: 端到端自动化科学循环，从想法生成到实验执行和论文撰写，通过多智能体编排和模块化任务分解实现。
      尚未覆盖: 流水线在意外失败下的可靠性、自主科学写作质量，以及超越模仿现有模式、真正新颖的发现能力。
    - 路线: 自我纠正与演化机制
      解决的问题: 通过反馈循环提升研究质量，包括多假设失败归因、跨周期自我演化，以及结合结构化树的进化搜索。
      尚未覆盖: 这些机制能否产生真正新颖的假设而不仅仅是优化已知目标，以及如何评估生成想法的创造性。
    - 路线: 领域专用科学发现智能体
      解决的问题: 通过验证门控和专用工具，将领域知识（如CFD物理、单细胞基因组学）嵌入AI科学家工作流，确保结果有效可用。
      尚未覆盖: 领域专用验证器的鲁棒性、向其他领域的可迁移性，以及系统是否能超越人类设计的领域启发式方法。
    - 路线: 基准化与评估设计
      解决的问题: 提供标准化任务和人类基线，以比较AI科学家表现，涵盖实验成果和科学推理过程。
      尚未覆盖: 当前基准是否捕捉了科学发现的完整深度，以及代理指标（如准确率、RMSE）与真实科学影响力之间的一致性。
    - 路线: 人机协作框架
      解决的问题: 在高杠杆决策点整合人类判断，以超越完全自主系统的成果，同时保持工作流效率。
      尚未覆盖: 最优的干预模式与时机，过度依赖人类输入的风险，以及在人类专家稀缺时的可扩展性。
    共识:
    - 将研究模块化分解为构思、执行、验证和报告阶段，对于构建可管理的自主系统至关重要。
    - 验证机制（物理感知门控、基于事实的报告、受约束输出）对于防止幻觉结果和无根据主张至关重要。
    - 具有专门角色的多智能体架构在复杂、多步骤科学工作流中优于单智能体设计。
    - 当前AI科学家系统在结构化或代理任务上表现良好，但在完全自主的新颖科学发现上仍不及人类。
    - 需要并开始出现具有人类表现基线的标准化基准，以追踪进展。
    分歧:
    - 自我改进策略：基于反思的失败诊断 vs. 进化/梯度启发搜索 vs. 多假设因果归因。
    - 人类参与程度：完全自主流水线 vs. 多种人机交互模式，尚无关于自主与监督最优平衡的共识。
    - 领域通用性：领域无关框架（如EvoMaster）声称广泛适用，而领域专用系统（如AI CFD Scientist）主张可靠结果需要深度嵌入领域知识。
    - 报告生成：一些系统优先考虑可验证、受约束的报告以确保科学诚实性，另一些则专注于生成流畅的完整论文，可能牺牲事实准确性。
    开放问题:
    - 自主系统能否产生具有真正科学新颖性的假设，还是仅限于重组训练数据中已知的模式？
    - 如何使验证门控在不同领域可靠运行，而不需要大量手动重新设计？
    - 当前基准（ARC-Bench、BAISBench）是否测量核心科学推理能力，还是主要测试任务完成和优化技能？
    - 在高风险科学领域部署自主科学智能体存在哪些伦理与安全风险，应如何缓解？
