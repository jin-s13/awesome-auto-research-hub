  related_work_outline:
  - 'Mainstream direction: Building multi-agent systems that automate literature review,
    hypothesis generation, and experimental analysis, with iterative refinement loops
    and structured knowledge sharing.'
  - 'Shared research pattern: Decomposing the scientific workflow into specialized
    LLM-powered agents (search, analysis, writing, review) and orchestrating them
    via state machines or tree-based workflows.'
  - 'Key differences: Systems vary in domain specificity (domain-agnostic vs. domain-embedded),
    evaluation strategy (human baseline vs. rubric scores vs. independent scientist
    ratings), and output type (full manuscript vs. traceable report).'
  - 'Trend evolution: Within 2023–2026, the frontier moved from isolated benchmarks
    and surveys toward end-to-end autonomous research systems, with a recent turn
    toward failure analysis and design principles for reliability.'
  - 'Open questions: How to ensure factual accuracy beyond ~80%, how to scale autonomous
    cycles without memory degradation, and how to measure real scientific impact rather
    than proxy metrics.'
  related_work_outline_zh:
  - 主流方向：构建多智能体系统，自动化文献综述、假设生成和实验分析，并采用迭代优化循环和结构化知识共享。
  - 研究共性：将科学工作流分解为专门的LLM驱动智能体（搜索、分析、写作、评审），并通过状态机或树形工作流进行编排。
  - 关键差异：系统在领域特异性（领域无关 vs. 领域嵌入）、评估策略（人类基线 vs. 评分准则得分 vs. 独立科学家评级）和输出类型（完整手稿 vs. 可追溯报告）上存在差异。
  - 趋势演进：2023–2026年间，前沿从孤立的基准和综述转向端到端自主研究系统，近期转向失败分析和可靠性设计原则。
  - 开放问题：如何确保事实准确性超过约80%，如何在长周期自主运行中避免记忆退化，以及如何衡量真实科学影响而非代理指标。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation
      what_it_solves: Producing comprehensive, well-structured academic surveys by
        orchestrating literature search, citation curation, summarization, and iterative
        peer-review refinement.
      what_remains_open: Verification of factual accuracy and depth of synthesis beyond
        surface-level aggregation; reliance on LLM internal knowledge may introduce
        hallucinations not caught by rubric-based review.
    - line: Autonomous end-to-end discovery systems
      what_it_solves: Executing closed-loop scientific research—data analysis, literature
        search, hypothesis generation, and report writing—over extended time horizons
        with traceable reasoning.
      what_remains_open: Long-horizon reliability (tested only up to 20 cycles), memory
        degradation across cycles, and the ability to produce genuinely novel hypotheses
        rather than recombining known patterns.
    - line: Benchmarking and evaluation of AI scientists
      what_it_solves: Providing standardized tasks and human baselines to measure
        progress in autonomous scientific reasoning and discovery capabilities.
      what_remains_open: Coverage of diverse scientific domains beyond single-cell
        transcriptomics, and alignment between benchmark scores and real-world research
        utility.
    - line: Failure analysis and design principles
      what_it_solves: Cataloging recurring failure modes (e.g., implementation drift,
        overexcitement, weak scientific taste) and deriving guidelines for more robust
        autonomous research systems.
      what_remains_open: Empirical validation that applying these design principles
        reduces failure rates, and generalization of failure modes across different
        domains and agent architectures.
    - line: Taxonomy and conceptual organization
      what_it_solves: Classifying agentic AI systems by domain, capability, and evaluation
        metrics to structure the fragmented landscape of AI-for-science research.
      what_remains_open: Direct evidence that the proposed taxonomies predict system
        performance or guide practical design choices; the identified challenges remain
        largely unsolved.
    consensus:
    - Current AI systems show substantial potential for assisting literature review
      and scientific discovery but fall short of fully autonomous, reliable operation.
    - Multi-agent architectures that decompose the research workflow into specialized
      roles (search, analysis, writing, critique) are the dominant design pattern.
    - Iterative refinement, whether through rubric-guided review, evolutionary search,
      or self-critique loops, is critical for improving output quality.
    - Evaluation must move beyond toy tasks to realistic benchmarks with human baselines,
      yet no single metric captures scientific value.
    disagreements:
    - 'Domain specificity: some systems embed deep domain expertise into agent design
      and data registries, while others pursue domain-agnostic frameworks that can
      be instantiated with minimal code.'
    - 'Output format and evaluation: one line generates full LaTeX manuscripts judged
      by rubric scores, another produces traceable reports rated by independent scientists,
      making direct comparison difficult.'
    - 'Search strategy: evolutionary selection of research directions versus structured
      tree-based branching with backtracking versus parallel data-analysis/literature-search
      cycles.'
    - 'Role of human oversight: some systems target fully autonomous operation over
      hours, while others emphasize human-in-the-loop revision and calibration.'
    open_questions:
    - How can factual accuracy be pushed beyond the ~79% statement-level accuracy
      reported, and what verification mechanisms scale to long, multi-cycle runs?
    - What causes memory and context degradation in long-horizon autonomous research,
      and can structured world models or external memory mitigate it?
    - Do improvements on existing benchmarks (e.g., BAISBench, Humanity's Last Exam)
      translate to measurable gains in real-world scientific productivity?
    - How can autonomous systems develop scientific taste—the ability to prioritize
      impactful hypotheses over obvious or trivial ones—without relying on human-crafted
      heuristics?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述生成
      解决的问题: 通过编排文献搜索、引文管理、总结和迭代同行评审优化，生成全面、结构良好的学术综述。
      尚未覆盖: 事实准确性和超越表面聚合的深度综合的验证；依赖LLM内部知识可能引入未被评分准则审查发现的幻觉。
    - 路线: 端到端自主发现系统
      解决的问题: 在长时间跨度内执行闭环科学研究——数据分析、文献搜索、假设生成和报告撰写，并提供可追溯的推理。
      尚未覆盖: 长周期可靠性（仅测试到20个周期），跨周期的记忆退化，以及产生真正新颖假设而非重组已知模式的能力。
    - 路线: AI科学家的基准与评估
      解决的问题: 提供标准化任务和人类基线，以衡量自主科学推理和发现能力的进展。
      尚未覆盖: 超越单细胞转录组学的多样科学领域覆盖，以及基准分数与真实世界研究效用之间的一致性。
    - 路线: 失败分析与设计原则
      解决的问题: 编目重复出现的失败模式（如实现漂移、过度兴奋、科学品味薄弱），并推导出构建更稳健自主研究系统的指南。
      尚未覆盖: 应用这些设计原则能降低失败率的实证验证，以及失败模式在不同领域和智能体架构间的泛化性。
    - 路线: 分类法与概念组织
      解决的问题: 按领域、能力和评估指标对智能体AI系统进行分类，以结构化碎片化的AI for Science研究格局。
      尚未覆盖: 所提出的分类法能预测系统性能或指导实际设计选择的直接证据；已识别的挑战大多仍未解决。
    共识:
    - 当前AI系统在辅助文献综述和科学发现方面展现出巨大潜力，但尚未达到完全自主、可靠运行的水平。
    - 将研究工作流分解为专门角色（搜索、分析、写作、批判）的多智能体架构是主导设计模式。
    - 无论是通过评分准则引导的审查、进化搜索还是自我批判循环，迭代优化对提升输出质量至关重要。
    - 评估必须超越玩具任务，转向具有人类基线的现实基准，但目前没有单一指标能捕捉科学价值。
    分歧:
    - 领域特异性：一些系统将深度领域专业知识嵌入智能体设计和数据注册表，而另一些则追求领域无关框架，只需少量代码即可实例化。
    - 输出格式与评估：一条路线生成由评分准则打分的完整LaTeX手稿，另一条路线生成由独立科学家评级的可追溯报告，导致直接比较困难。
    - 搜索策略：研究方向的进化选择 vs. 带回溯的结构化树形分支 vs. 并行的数据分析/文献搜索循环。
    - 人类监督的角色：一些系统目标是在数小时内完全自主运行，而另一些则强调人机协作的修订和校准。
    开放问题:
    - 如何将事实准确性提升到超过已报告的约79%陈述级准确率，以及哪些验证机制能扩展到长周期、多循环运行？
    - 是什么导致了长周期自主研究中的记忆和上下文退化，结构化的世界模型或外部记忆能否缓解这一问题？
    - 在现有基准（如BAISBench、Humanity's Last Exam）上的改进是否能转化为真实世界科学生产力的可衡量提升？
    - 自主系统如何发展科学品味——即优先考虑有影响力的假设而非明显或琐碎的假设的能力——而不依赖人工设计的启发式方法？
