    - 路线: 端到端自动写作流水线与可复现基础设施
      解决的问题: 将想法生成、代码执行、结果可视化和论文编译整合为一个可运行的系统，输出完整手稿。
      尚未覆盖: 跨不同会议、硬件设置和用户偏好的标准化外部验证；大多数流水线仅在其内部基准或特定工作坊上得到验证。
    - 路线: AI写作智能体失败模式与设计原则的概念分类
      解决的问题: 将观察到的失败（如实现漂移、过度兴奋、薄弱的科学品味）组织为分类，为设计更稳健的写作智能体提供依据。
      尚未覆盖: 直接的实证验证，表明遵循这些设计原则能够预测真实同行评审中更高的接收率。
    共识:
    - 大型语言模型能够生成结构合理、风格接近人类写作的科学手稿。
    - 当前系统容易出现幻觉数字、虚构引文和实现漂移，因此必须引入显式验证门控。
    - 来自模拟审稿人或自我反思的迭代反馈循环对于提高AI生成论文的质量至关重要。
    - 在关键决策点引入人类协作能显著提升写作质量，优于完全自主方案，但人类干预的最佳粒度尚未确定。
    分歧:
    - 完全自主写作与人机协作：一些系统以完全自主为目标，而另一些系统表明精准的人类干预更为有效。
    - 领域特定验证：在计算流体动力学中使用物理感知验证门控，而通用机器学习写作系统依赖基于LLM的自我检查，导致不同的失败特征。
