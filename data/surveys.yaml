  literature_review:
    line_of_work_matrix:
    - line: State and representation modeling
      what_it_solves: Captures the internal state of a research process—such as experimental
        outcomes, failure modes, and hypothesis validity—to enable targeted diagnosis
        and recovery.
      what_remains_open: Whether the learned failure representations generalize across
        different scientific domains and whether they can anticipate novel failure
        modes beyond those seen during training.
    - line: Action-conditioned control and planning
      what_it_solves: Connects hypothesis generation to executable experimental actions
        via structured workflows, debate-driven decision trees, or evolutionary search,
        improving the quality and reproducibility of research trajectories.
      what_remains_open: How much of the planning gain originates from the control
        architecture itself versus the underlying LLM's reasoning, and whether these
        planners can adapt to open-ended exploration without exhaustive human priors.
    - line: Evaluation and evidence design
      what_it_solves: Provides benchmarks and metrics (e.g., BAISBench, ARC-Bench)
        that measure the performance of AI scientists on tasks like cell annotation,
        scientific discovery, and experiment completion, making claims comparable.
      what_remains_open: Alignment between benchmark metrics and real-world scientific
        impact; current benchmarks may not capture long-term discovery, novelty, or
        ethical soundness.
    - line: Systems and reproducible infrastructure
      what_it_solves: Delivers integrated platforms (e.g., AI CFD Scientist, Claw
        AI Lab, EvoMaster) that turn isolated model ideas into runnable, monitorable,
        and reusable research pipelines, often with code harnesses and dashboard controls.
      what_remains_open: Standardized external validation across diverse hardware,
        datasets, and user communities; many platforms remain early-stage and are
        validated only on a handful of internal case studies.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizes fragmented AI scientist literature into domain-specific
        capabilities, evaluation metrics, and implementation frameworks, clarifying
        the design space and highlighting critical challenges.
      what_remains_open: The proposed taxonomies have not been empirically shown to
        predict the success or failure of a new agentic system; they remain descriptive
        rather than predictive.
    consensus:
    - Multi-agent architectures and iterative self-improvement loops are the dominant
      paradigm for autonomous research systems.
    - LLMs serve as the core reasoning engine, but their outputs must be grounded
      through verification, constraint-based reporting, or physics-aware gates to
      prevent hallucination and ensure scientific validity.
    - Human-in-the-loop collaboration, even at minimal intervention points, substantially
      improves the quality of generated hypotheses and experimental artifacts compared
      to fully autonomous modes.
    - Current systems excel at exploring predefined search spaces and literature-grounded
      ideation but struggle with truly open-ended, high-risk hypothesis generation.
    disagreements:
    - 'Verification strategy: physics-based vision-language gates (e.g., inspecting
      rendered flow fields) versus fact-anchored output constraints that restrict
      generated text to measured values only.'
    - 'Interaction mode: fully autonomous execution versus multiple discrete human
      collaboration modes (from full oversight to targeted high-leverage decision
      points), with no consensus on the optimal granularity.'
    - 'Domain scope: domain-agnostic foundational frameworks (e.g., EvoMaster) contrast
      with deep, domain-specific integrations (e.g., CFD-focused AI CFD Scientist),
      leading to different trade-offs between generality and reliability.'
    - 'Workflow structure: tree-based branching with backtracking versus multi-agent
      debate versus evolutionary search, each with distinct assumptions about how
      to manage the research hypothesis space.'
    open_questions:
    - Can AI scientists generate hypotheses that are not only novel within a given
      literature landscape but also truly impactful, as judged by human experts over
      time?
    - How do we design verification mechanisms that cover all silent failure modes,
      including those unseen during ablation studies?
    - What is the minimum viable human intervention that guarantees ethical soundness
      and scientific rigor, and does this threshold vary across disciplines?
    - How can we build benchmarks that correlate with long-term scientific discovery
      rather than immediate task completion, and that capture the full lifecycle of
      ideation, experimentation, and peer review?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 表示/状态建模
      解决的问题: 将研究过程中的内部状态（如实验结果、失败模式、假设有效性）建模为可诊断和可恢复的表示，支持针对性干预。
      尚未覆盖: 学习到的失败表示能否跨科学领域泛化，以及能否预测训练中未见过的全新失败模式。
    - 路线: 动作条件控制与规划
      解决的问题: 通过结构化工作流、辩论驱动的决策树或进化搜索，将假设生成连接到可执行的实验动作，提升研究轨迹的质量和可复现性。
      尚未覆盖: 规划性能的提升有多少来自控制架构本身，而非底层LLM的推理能力；这些规划器能否在没有详尽人类先验的情况下适应开放式探索。
    - 路线: 评测与证据设计
      解决的问题: 提供基准和指标（如BAISBench、ARC-Bench），衡量AI科学家在细胞注释、科学发现和实验完成等任务上的表现，使主张可比较。
      尚未覆盖: 基准指标与真实世界科学影响力之间的一致性；现有基准可能无法捕捉长期发现、新颖性或伦理健全性。
    - 路线: 系统与可复现基础设施
      解决的问题: 提供集成平台（如AI CFD Scientist、Claw AI Lab、EvoMaster），将孤立模型思想转化为可运行、可监控和可复用的研究流水线，常配备代码工具和仪表板控制。
      尚未覆盖: 跨不同硬件、数据集和用户社区的标准化外部验证；许多平台仍处于早期阶段，仅在少数内部案例研究上得到验证。
    - 路线: 概念分类与理论
      解决的问题: 将碎片化的AI科学家文献按领域能力、评估指标和实现框架进行组织，澄清设计空间并突出关键挑战。
      尚未覆盖: 所提出的分类尚未被实证证明能预测新智能体系统的成败；它们仍停留在描述性层面，而非预测性层面。
    共识:
    - 多智能体架构和迭代自我改进循环是自主研究系统的主导范式。
    - LLM充当核心推理引擎，但其输出必须通过验证、基于约束的报告或物理感知门控来落到实处，以防止幻觉并确保科学有效性。
    - 即使在最小干预点引入人机协作，也能显著提高生成假设和实验工件的质量，优于完全自主模式。
    - 当前系统擅长在预定义的搜索空间和基于文献的构思中进行探索，但在真正开放式、高风险的假设生成方面仍面临困难。
    分歧:
    - 验证策略：基于物理的视觉-语言门控（例如，检查渲染流场）与基于事实的输出约束（仅将生成文本限制为测量值）之间存在差异。
    - 交互模式：完全自主执行与多种离散的人机协作模式（从完全监督到针对高杠杆决策点）并存，对最优协作粒度尚未达成共识。
    - 领域范围：领域无关的基础框架（如EvoMaster）与深度领域特定集成（如面向CFD的AI CFD Scientist）形成对比，在通用性和可靠性之间存在不同权衡。
