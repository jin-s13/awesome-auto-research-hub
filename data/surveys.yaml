  related_work_outline:
  - 'Mainstream direction: Fully automated scientific discovery and paper writing
    pipelines are shifting focus from basic generation capability toward reliability,
    verifiability, and failure-aware iteration, with growing emphasis on structured
    verification gates, self-correction, and human-AI collaboration.'
  - 'Shared research pattern: Most systems adopt a multi-agent architecture that decomposes
    research into ideation, experiment execution, and manuscript writing, and incorporate
    internal loops for validation, error attribution, or knowledge reuse to improve
    trustworthiness.'
  - 'Key differences: Approaches diverge along the axis of full autonomy vs. human-in-the-loop
    intervention, the granularity of failure handling (single-reflection vs. multi-hypothesis
    attribution vs. negative knowledge memory), and the use of domain-specific verification
    gates (e.g., physics-aware VLM) vs. general reasoning checks.'
  - 'Trend evolution: From 2024''s proof-of-concept AI Scientist generating papers
    at ML subdomains to 2025''s first peer-reviewed workshop paper, and then to 2026''s
    systems that combine self-healing, failure memory, and structured human collaboration,
    the frontier is moving from ''can it write?'' to ''can it write something reliably
    correct and improvable?'''
  - 'Open questions: How to guarantee novelty and factual correctness in generated
    manuscripts; how to design verification gates that generalize across disciplines
    without missing silent failures; how to balance human intervention cost with autonomy
    gains; and how to evaluate long-term scientific impact of such systems beyond
    short-term benchmarks.'
  related_work_outline_zh:
  - 主流方向：全自动科学发现与论文写作管线正从基础生成能力转向可靠性、可验证性和失败感知迭代，越来越重视结构化验证门控、自我纠正和人机协作。
  - 研究共性：多数系统采用多智能体架构，将研究分解为构思、实验执行和手稿撰写，并包含内部验证、错误归因或知识复用环路以提升可信度。
  - 关键差异：方法在完全自主 vs. 人机协同介入、失败处理的粒度（单次反思 vs. 多假设归因 vs. 负知识记忆）以及领域专用验证门控（如物理感知VLM）与通用推理检查之间分化。
  - 趋势演进：从2024年概念验证的AI Scientist在ML子领域生成论文，到2025年首篇同行评审工作坊论文，再到2026年结合自愈、失败记忆和结构化人机协作的系统，前沿正从“能写吗？”转向“能写得出可靠且可改进的成果吗？”。
  - 开放问题：如何保证生成手稿的新颖性与事实正确性；如何设计跨领域泛化的验证门控，同时避免遗漏静默失败；如何在人机干预成本与自主收益之间取得平衡；如何评估此类系统长期科学影响力，而不仅限于短期基准测试。
  literature_review:
    line_of_work_matrix:
    - line: Systems and reproducible infrastructure
      what_it_solves: Turning isolated model ideas into end-to-end autonomous research
        pipelines that handle ideation, code execution, experiment management, and
        manuscript drafting in a repeatable manner.
      what_remains_open: Standardized external validation across diverse scientific
        domains, and the ability to produce truly novel, defensible claims without
        human-written code templates or domain-specific scaffolds.
    - line: Evaluation and evidence design
      what_it_solves: Making claims of autonomous research systems comparable through
        benchmark tasks, automated review rubrics, and explicit verification gates
        that check logical coherence or physical validity.
      what_remains_open: Coverage of diverse real-world scientific tasks and alignment
        between proxy metrics (e.g., automated reviewer scores) and actual scientific
        contribution or truthfulness.
    - line: Action-conditioned control and planning
      what_it_solves: Connecting failure diagnosis to concrete interventions within
        the research loop, such as rerouting from hypothesis to implementation fix,
        or triggering self-healing execution after a failed experiment.
      what_remains_open: How much improvement comes from the intervention logic itself
        versus the quality of the underlying failure attribution, and whether learned
        control policies generalize across tasks.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing fragmented failure observations into structured taxonomies
        and design principles to guide the construction of more robust AI scientists.
      what_remains_open: Direct empirical validation that the proposed failure categories
        or design principles predict downstream system behavior under novel conditions.
    consensus:
    - Autonomous research systems require internal verification loops to catch logical
      errors, hallucinated results, or physically invalid outputs before human inspection.
    - Simple single-step reflection or retrieval is insufficient; structured failure
      handling, such as multi-hypothesis attribution or curated negative knowledge,
      significantly improves research output quality.
    - LLM-based scientists still suffer from insufficient domain intelligence, overexcitement
      in declaring success, and weak scientific taste, limiting their current ability
      to act as fully independent researchers.
    - Human-AI collaboration, when injected at high-leverage decision points, outperforms
      both fully autonomous and exhaustive step-by-step human oversight.
    disagreements:
    - 'The ideal level of autonomy: some systems argue for full autonomy with minimal
      human intervention, while others integrate seven human-in-the-loop modes, suggesting
      that optimal research requires varying degrees of human guidance.'
    - 'Failure handling strategy: one line uses a shared negative knowledge bank to
      avoid repeating past mistakes, another uses multi-hypothesis causal attribution
      routed to the correct intervention level, and a third relies on domain-specific
      verification gates (e.g., vision-language physics checks) rather than general
      failure memory.'
    - 'Verification scope: the AI CFD Scientist employs a domain-specific physics-verification
      gate for CFD, whereas ReasFlow uses a general logical coherence audit, and SAGE
      constrains reporting to measured values, indicating a split between domain-grounded
      and domain-agnostic verification.'
    - 'Evaluation method: some works evaluate via automated reviewer scores, others
      use artifact quality ratings or task-specific metrics like wall Cf RMSE, and
      one relies on real peer-review acceptance, reflecting different assumptions
      about what constitutes a valid assessment of scientific output.'
    open_questions:
    - How can verification gates be designed to detect subtle, non-catastrophic failures
      (e.g., 2 missed silent failures in 16 as in AI CFD Scientist) without imposing
      excessive false alarms that stifle innovative exploration?
    - To what extent can negative knowledge or failure memories transfer across scientific
      domains, and what mechanisms prevent the memory from becoming a stale list of
      constraints that limit novel hypothesis generation?
    - What is the minimal set of human intervention points that maximizes research
      quality while keeping the system scalable, given that auto-generated papers
      still require domain expert validation?
    - How should the community establish a long-term evaluation framework that measures
      the scientific impact of autonomously generated research rather than short-term
      proxy metrics like benchmark scores or acceptance rates?
