  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Automates the full scientific workflow from hypothesis generation
        and experiment execution to result analysis and manuscript writing, reducing
        manual effort.
      what_remains_open: Robustness against experiment failures, prevention of fabricated
        results, and the ability to produce publication-ready papers that meet peer-review
        standards.
    - line: Verification and self-correction mechanisms
      what_it_solves: Detects silent failures, hallucinated numbers, and invalid conclusions
        through vision-language gates, multi-hypothesis failure attribution, or report
        grounding, increasing the trustworthiness of autonomous outputs.
      what_remains_open: Verification tools themselves can miss failure modes (e.g.,
        2 of 16 planted failures were missed), and no single mechanism covers all
        possible scientific mistakes.
    - line: Human-AI collaboration and interaction design
      what_it_solves: Inserts human judgment at high-leverage decision points to balance
        autonomy with accuracy, often outperforming both fully autonomous and exhaustive
        step-by-step oversight.
      what_remains_open: The optimal set of intervention points and modes, and how
        human feedback quality affects the overall research trajectory and efficiency.
    - line: Evaluation benchmarks and metrics
      what_it_solves: Provides standardized tasks and human baselines (e.g., BAISBench,
        ARC-Bench) to compare the end-to-end research capability of AI scientists,
        covering experimental execution and biological discovery.
      what_remains_open: Limited domain coverage and the gap between proxy metrics
        (e.g., benchmark scores) and the actual utility of the generated scientific
        claims.
    - line: Scalable and general-purpose frameworks
      what_it_solves: Enables building self-evolving scientific agents across disciplines
        with minimal code, using domain-agnostic architectures like evolutionary search
        or structured research trees.
      what_remains_open: Whether domain-agnostic designs sacrifice domain-specific
        optimization, and how to transfer accumulated knowledge from one scientific
        field to another.
    consensus:
    - Autonomous research systems require layered verification (e.g., results checking,
      physics plausibility) to reduce hallucinations and silent execution errors.
    - Multi-agent or structured workflows (debate, tree-based, evolutionary) outperform
      single-pass pipelines by generating and evaluating multiple hypotheses.
    - Targeted human collaboration at critical decision points improves outcomes more
      than either full autonomy or continuous human oversight.
    - Evaluation is moving from shallow task completion to benchmarks that assess
      experimental execution, artifact quality, and scientific discovery competence.
    disagreements:
    - 'Verification strategy: some use vision-language models that inspect visual
      outputs (e.g., rendered flow fields), while others rely on causal multi-hypothesis
      failure attribution or grounded reporting that constraints values to measured
      data.'
    - 'Exploration paradigm: systems differ in how they search the hypothesis space,
      using evolutionary algorithms, structured research trees with backtracking,
      or multi-agent debate with self-healing executors.'
    - 'Human involvement modality: the interaction design ranges from a dashboard
      with real-time monitoring and rollback, to seven explicit intervention modes,
      to abstract high-leverage collaboration points.'
    - 'Domain specificity: some systems are tightly coupled to a single field (CFD,
      single-cell transcriptomics) with domain-aware verification, while others propose
      one-size-fits-all frameworks that claim to work across arbitrary disciplines.'
    open_questions:
    - How can verification gates be made comprehensive enough to catch all critical
      silent failures, given that the evidence shows they still miss some?
    - What is the most effective granularity and timing of human intervention to maximize
      research quality without creating a bottleneck?
    - Can general-purpose autonomous research frameworks truly match the performance
      of domain-specialized systems when transferred to a new scientific field?
    - What evaluation metrics best predict the real-world impact of an AI-generated
      hypothesis, beyond current benchmark scores?
    - What ethical and safety oversight is needed to prevent misuse of fully autonomous
      scientific discovery agents?
