  related_work_outline:
  - 'Mainstream direction: Building multi-agent, self-evolving frameworks that automate
    end-to-end scientific research or survey generation, integrating literature search,
    iterative refinement, and structured workflows.'
  - 'Shared research pattern: Decomposing the research process into specialized agent
    roles (search, analysis, writing, review) and applying iterative feedback loops,
    domain knowledge embedding, and structured memory to improve output quality.'
  - 'Key differences: Architectures range from tree-based and evolutionary to pipeline-based;
    some systems are domain-agnostic while others embed domain expertise; evaluation
    uses rubric scores, human judgment, or benchmark tasks; feedback mechanisms vary
    from learned world models to optimization-inspired gradients.'
  - 'Trend evolution: The field moved from benchmarking AI scientists on narrow tasks
    (2025) to proposing general self-evolving frameworks (2026), with a recent focus
    on recording failure modes and deriving design principles to increase reliability.'
  - 'Open questions: Can these systems maintain factual accuracy and avoid hallucinated
    references over long horizons? How do they generalize across disciplines and unseen
    tasks? Is there a validated mapping between proxy metrics and real scientific
    contribution?'
  related_work_outline_zh:
  - 主流方向：构建多智能体、自我演化的框架，实现从文献搜索到论文撰写的端到端自主科学研究或综述生成，融合迭代优化与结构化工作流。
  - 研究共性：将研究过程分解为搜索、分析、写作、评审等专业化智能体角色，通过迭代反馈、领域知识嵌入和结构化记忆提升输出质量。
  - 关键差异：架构设计包括树状、进化式和流水线式；有的系统领域无关，有的则嵌入领域专业知识；评估方式涉及评分准则、人类判断或基准任务；反馈机制从世界模型共享到优化启发的梯度各不相同。
  - 趋势演进：从在窄领域任务上对AI科学家进行基准测试（2025年）发展到提出通用自演化框架（2026年），近期重点转向记录失败模式并提炼设计原则以提升可靠性。
  - 开放问题：这些系统能否在长周期内保持事实准确性并避免虚构引用？它们如何跨学科、跨未见过任务泛化？代理指标与真实科学贡献之间是否存在经过验证的对应关系？
  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation systems
      what_it_solves: Producing comprehensive literature surveys automatically via
        multi-agent LLM workflows with iterative refinement, reducing the manual effort
        required to synthesize research.
      what_remains_open: Ensuring factual accuracy of generated statements and citations,
        achieving completeness comparable to human experts, and validating alignment
        with expert judgment across disciplines.
    - line: Literature search and knowledge integration in autonomous discovery
      what_it_solves: Embedding literature search agents into iterative discovery
        cycles so that AI scientists can ground hypotheses in existing knowledge and
        produce traceable, evidence-linked reports.
      what_remains_open: Verifying the accuracy and coverage of retrieved information,
        and preventing erroneous or incomplete literature findings from biasing downstream
        analysis and conclusions.
    - line: Benchmarks and evaluation frameworks for AI scientists
      what_it_solves: Creating standardized tasks with human performance baselines
        to measure the ability of AI scientists in literature comprehension, citation-aware
        reasoning, and biological discovery.
      what_remains_open: Broadening disciplinary coverage beyond single-domain datasets,
        and establishing whether benchmark scores correlate with real-world scientific
        utility or publication quality.
    - line: Architectures for autonomous research pipelines
      what_it_solves: Designing multi-agent, evolutionary, or tree-based workflows
        that fully automate the entire research cycle from ideation and coding to
        manuscript writing.
      what_remains_open: Robustness to documented failure modes such as implementation
        drift and overexcitement; scalability beyond the limited cycles tested; and
        adaptation to domain-specific constraints without excessive re-engineering.
    - line: Failure mode analysis and design principles
      what_it_solves: Systematically identifying recurring failure modes (e.g., bias
        toward training defaults, memory degradation, weak scientific taste) in autonomous
        research attempts to derive actionable design guidelines.
      what_remains_open: Generalizability of the identified failure modes across different
        domains, tasks, and model families; quantitative methods to measure improvements
        after applying the design principles.
    consensus:
    - Multi-agent workflows that decompose the research process into specialized roles
      (search, analysis, critique, writing) are more effective than monolithic approaches
      for producing structured scientific outputs.
    - Iterative refinement with explicit feedback, whether from rubric-guided reviewers,
      world-model updates, or optimization-inspired gradients, consistently improves
      the quality of generated reports and manuscripts.
    - Integrating literature search as a distinct component is essential for grounding
      hypotheses and providing traceable evidence, though its accuracy and completeness
      remain unresolved challenges.
    - Current AI scientist systems are not yet robust enough for fully autonomous,
      long-horizon discovery; they exhibit recurring failures such as factual errors,
      implementation drift, and premature claims of success.
    - Evaluation of these systems requires both structured benchmarks with human baselines
      and expert qualitative assessment, because automated metrics alone cannot capture
      scientific contribution or rigor.
    disagreements:
    - 'Architecture: some works adopt fixed pipeline stages with revision loops, while
      others use evolutionary search over hypotheses or tree-based branching with
      backtracking, leading to different trade-offs between exploration and control.'
    - 'Domain specificity: one line embeds curated domain expertise into the agent
      roles and data registries, whereas competing frameworks claim domain-agnostic
      self-evolution that can be instantiated with minimal code for any discipline.'
    - 'Feedback signal: methods differ in how they drive improvement—rubric-based
      reviewer scoring, a structured world model shared between agents, or language-based
      momentum and weight decay from optimization metaphors.'
    - 'Evaluation target: some systems are validated on the quality of their generated
      survey or manuscript, others on benchmark task scores, and yet others on human
      ratings of report accuracy, making cross-system comparisons difficult.'
    - 'Interaction mode: certain systems run fully autonomously given only a prompt
      and dataset, while others require a predefined objective or human-in-the-loop
      for problem formulation, impacting the scope of claimed autonomy.'
    open_questions:
    - What is the upper bound on factual accuracy for automatically generated literature
      surveys and discovery reports, and can it reach the level expected from human
      domain experts?
    - How do errors from the literature search stage propagate through multi-step
      autonomous research pipelines, and what mitigation strategies are effective?
    - Can the design principles derived from a small number of failure cases generalize
      to diverse scientific domains and longer time horizons?
    - Is there a validated evaluation protocol that bridges the gap between proxy
      metrics (rubric scores, benchmark accuracy) and the downstream impact of the
      produced scientific work?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述生成系统
      解决的问题: 通过多智能体大语言模型工作流和迭代优化自动生成全面文献综述，减少人工综合研究的工作量。
      尚未覆盖: 确保生成陈述和引用的准确性，达到与人类专家相当的全面性，并验证跨学科与专家判断的一致性。
    - 路线: 自主发现中的文献搜索与知识集成
      解决的问题: 将文献搜索智能体嵌入迭代发现循环，使AI科学家能够基于现有知识提出假设并生成可追溯、有证据链接的报告。
      尚未覆盖: 验证检索信息的准确性和覆盖范围，防止错误或不完整的文献发现结果偏向下游分析和结论。
    - 路线: AI科学家的基准与评估框架
      解决的问题: 创建带有真人表现基线的标准化任务，衡量AI科学家在文献理解、引文意识和科学发现方面的能力。
      尚未覆盖: 将学科覆盖范围扩展到单一领域数据集之外，并确定基准分数是否与真实世界科学效用或发表质量相关。
    - 路线: 自主研究流水线架构
      解决的问题: 设计多智能体、进化式或树状工作流，将整个研究周期从构思、编码到论文撰写完全自动化。
      尚未覆盖: 对已记录的失败模式（如实现漂移和过度兴奋）的鲁棒性；在有限测试周期之外的可扩展性；以及在不进行大量工程改造的情况下适配领域特定约束。
    - 路线: 失败模式分析与设计原则
      解决的问题: 系统识别自主研究尝试中反复出现的失败模式（如偏向训练默认值、记忆退化、科学品味薄弱），从而提炼可操作的设计指南。
      尚未覆盖: 已识别失败模式在不同领域、任务和模型家族中的泛化性；应用设计原则后改进效果的量化评估方法。
    共识:
    - 多智能体工作流将研究过程分解为搜索、分析、批评、写作等专门角色，相比单一方法更有效地生成结构化科学产出。
    - 通过明确的反馈进行迭代优化——无论是基于评分准则的评审、世界模型更新还是优化启发的梯度——都能持续提升生成报告和手稿的质量。
    - 将文献搜索作为一个独立组件集成对于为假设提供依据和提供可追溯证据至关重要，但其准确性和完整性仍是未解决的挑战。
    - 当前的AI科学家系统尚不足以稳健地进行完全自主的长周期发现；它们会反复出现事实错误、实现漂移和过早宣布成功等问题。
    - 评估这些系统既需要带有真人基线的结构化基准，也需要专家的定性评估，因为仅靠自动化指标无法捕捉科学贡献或严谨性。
    分歧:
    - 架构：有的工作采用带有修订循环的固定流水线阶段，而另一些则使用假设的进化搜索或带回溯的树状分支，在探索和控制之间达成不同权衡。
    - 领域特异性：一条路线将策划的领域专业知识嵌入智能体角色和数据注册表，而竞争框架则声称领域无关的自我演化，只需少量代码即可实例化到任何学科。
    - 反馈信号：方法在驱动改进的方式上存在差异——基于评分准则的评审评分、智能体间共享的结构化世界模型，或源自优化隐喻的语言动量和权重衰减。
    - 评估目标：有些系统以生成的综述或手稿质量进行验证，有些以基准任务得分进行验证，另一些则以报告准确性的人工评分为准，使得跨系统比较困难。
    - 交互模式：某些系统仅需提示和数据集即可完全自主运行，而另一些则需要预定义目标或人工参与问题制定，这影响了所声称的自主范围。
    开放问题:
    - 自动生成的文献综述和发现报告的事实准确性上限是多少？能否达到人类领域专家所期望的水平？
    - 文献搜索阶段的错误如何在多步自主研究流水线中传播？哪些缓解策略有效？
    - 从少量失败案例中提炼的设计原则能否泛化到多样化的科学领域和更长的时间跨度？
    - 是否存在经过验证的评估协议，能够弥合代理指标（评分准则分数、基准准确率）与所产出科学工作的下游影响之间的差距？
