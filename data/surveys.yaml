    - 评测目标：系统在内部指标（如工件质量、含指标输出率）与外部盲审分数上进行评测，这些指标之间并不总是相关。
    开放问题:
    - 自动写作系统如何在不依赖详尽人工验证的情况下，保证生成论文中数字和参考文献的事实正确性？
    - 什么样的评测基准能够全面捕捉科学写作的质量，而不仅仅是识别缺失的消融实验或模拟评审分数？
