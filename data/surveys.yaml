  related_work_outline_zh:
  - 主流方向：基于LLM的智能体端到端自动化科学发现循环，涵盖想法生成、代码级实验、论文撰写和模拟评审。
  - 研究共性：迭代闭环系统，由LLM驱动智能体提出假设、执行代码实验、分析结果并生成稿件，常配备自动评审器。
  - 关键差异：自动化范围（开放式 vs. 基于基线论文）、探索策略（树搜索、多智能体辩论、失败记忆）和评估目标（基准任务 vs. 同行评审接受）。
  - 趋势演进：2024至2026年间，前沿从单智能体框架转向多智能体平台、记忆增强重试与领域专用实验室概念，并更加关注风险与治理。
  - 开放问题：自动化智能体能否在真实世界实验室环境中达到人类级科学推理；如何设计从虚拟基准迁移到真实发现影响的可靠评估；如何安全地治理自主研究。
  literature_review:
    line_of_work_matrix:
    - line: Full-cycle scientific discovery automation
      what_it_solves: Automating the entire research pipeline from hypothesis generation,
        code implementation, and experiment execution to paper drafting and reviewing,
        lowering the cost and human effort of iterative scientific exploration.
      what_remains_open: Verification remains limited to a few ML subfields and workshop-level
        acceptance; performance is inconsistent, and the systems lack grounding in
        physical lab instrumentation or long-term scientific reasoning.
    - line: Experimental planning and ablation design
      what_it_solves: Evaluating and improving the ability of language model agents
        to plan valid ablation studies and propose experiments that isolate causal
        factors in empirical AI research.
      what_remains_open: Current agents achieve only about 45% recall of human-designed
        ablations, and the inverse performance between author and reviewer tasks suggests
        a grounding gap that limits consistent experiment design.
    - line: Virtual environments for discovery agent evaluation
      what_it_solves: Providing standardized, diverse simulation tasks that require
        agents to form hypotheses, design experiments, and interpret results, enabling
        reproducible benchmarking of automated discovery capabilities.
      what_remains_open: Strong baseline agents that succeed in prior environments
        struggle on most tasks, and the alignment between virtual task completion
        and real-world scientific discovery utility is not yet established.
    - line: Multi-agent research platforms and infrastructure
      what_it_solves: Orchestrating customizable, interactive research teams with
        real-time monitoring, code harnesses, and shared artifacts, enabling human-in-the-loop
        oversight and role-based collaboration for automated experiments.
      what_remains_open: Evaluation is confined to a small number of internal AI case
        studies; the platform is described as an early step, and cross-domain generalization
        beyond the tested scenarios is unverified.
    - line: Failure-aware memory and knowledge accumulation
      what_it_solves: Capturing failed attempts as structured negative knowledge that
        downstream agents can explicitly adopt or reject, improving sample efficiency
        and enabling retry on previously unsolved scientific tasks.
      what_remains_open: Demonstrated only on same-task retry and a specific PDE domain;
        the long-term integration of negative knowledge across diverse, evolving research
        programs is not yet explored.
    consensus:
    - All systems adopt an iterative, LLM-driven loop that couples code-level experimentation
      with automated analysis and manuscript generation.
    - Evaluation relies heavily on automated reviewers or task-completion metrics,
      while human expert validation remains limited and often reveals gaps not captured
      by proxy metrics.
    - There is a shared recognition that current automated agents are not yet reliable
      enough for unsupervised deployment and require further breakthroughs in reasoning,
      grounding, and safety.
    disagreements:
    - 'Automation scope differs: some systems start from a blank slate with open-ended
      discovery, while others analyze a given baseline paper to propose incremental
      improvements.'
    - 'Exploration and decision strategies vary: agentic tree search, multi-agent
      debate, and failure memory banks represent distinct approaches to managing the
      hypothesis–experiment–retry loop.'
    - 'Evaluation targets diverge: one line targets peer-reviewed workshop acceptance,
      another targets ablation planning recall, and a third targets task completion
      in a virtual environment, making direct comparison difficult.'
    open_questions:
    - Can the performance of automated experiment agents on virtual or code-only benchmarks
      transfer to physical lab settings where manual intervention, safety, and long-horizon
      reasoning are required?
    - What evaluation protocols can reliably measure the novelty, correctness, and
      impact of AI-generated research, given that even human peer review is noisy
      and proxy metrics do not capture real-world utility?
    - How should failure memory and knowledge accumulation be structured to support
      continuous lifelong learning across shifting research domains without catastrophic
      forgetting or stale negative knowledge?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 全周期科学发现自动化
      解决的问题: 自动化从假设生成、代码实现、实验执行到论文撰写和评审的整个研究流程，降低迭代科学探索的成本和人力投入。
      尚未覆盖: 验证仅限于少数机器学习子领域和研讨会级别接受，性能不稳定，且系统缺乏对物理实验室仪器和长期科学推理的接地。
    - 路线: 实验规划与消融设计
      解决的问题: 评估和改进语言模型智能体规划有效消融实验的能力，以隔离实证AI研究中的因果因素。
      尚未覆盖: 当前智能体仅能达到人类设计消融约45%的召回率，作者任务与审稿人任务之间的反向性能表明存在接地差距，限制了实验设计的一致性。
    - 路线: 面向发现智能体评估的虚拟环境
      解决的问题: 提供标准化、多样化的仿真任务，要求智能体形成假设、设计实验并解释结果，从而实现对自动化发现能力的可复现基准测试。
      尚未覆盖: 在先前环境中表现良好的强基线智能体在大多数任务上挣扎，虚拟任务完成度与真实世界科学发现效用之间的对齐尚未建立。
    - 路线: 多智能体研究平台与基础设施
      解决的问题: 编排可定制、交互式的研究团队，具备实时监控、代码工具和共享工件，支持人在回路监督和基于角色的协作自动化实验。
      尚未覆盖: 评估仅限于少量内部AI案例研究，平台被描述为早期步骤，跨领域泛化能力未经验证。
    - 路线: 失败感知记忆与知识积累
      解决的问题: 将失败尝试捕获为结构化负知识，供下游智能体明确采纳或拒绝，提高样本效率，并支持对先前未解决的科学任务进行重试。
      尚未覆盖: 仅在相同任务重试和特定PDE领域得到验证，负知识在多样化、不断演进的研究计划中的长期整合尚未探索。
    共识:
    - 所有系统均采用迭代的LLM驱动闭环，将代码级实验与自动化分析和稿件生成相结合。
    - 评估高度依赖自动评审或任务完成指标，而人类专家验证有限，且常揭示代理指标未能捕捉的差距。
    - 普遍认识到当前自动化智能体尚不足以可靠地用于无人监督部署，需要在推理、接地和安全性方面取得进一步突破。
    分歧:
    - 自动化范围不同：一些系统从空白开始进行开放式发现，而另一些则分析给定的基线论文并提出增量改进。
    - 探索与决策策略各异：智能体树搜索、多智能体辩论和失败记忆库代表了管理假设-实验-重试循环的不同方法。
    - 评估目标不同：一个方向以同行评审研讨会接受为目标，另一个以消融规划召回率为目标，第三个以虚拟环境中的任务完成度为目标，导致直接比较困难。
    开放问题:
    - 自动化实验智能体在虚拟或纯代码基准上的性能能否迁移到需要手动干预、安全性和长期推理的物理实验室设置？
    - 考虑到即使是人类同行评审也存在噪声，且代理指标无法捕捉真实世界效用，哪些评估协议能够可靠地衡量AI生成研究的新颖性、正确性和影响力？
    - 如何构建失败记忆和知识积累，以支持在变动的研究领域中进行持续终身学习，同时避免灾难性遗忘或过时的负知识？
