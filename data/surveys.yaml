    - line: End-to-end automated survey generation systems
      what_it_solves: Automatically retrieving, synthesizing, and composing structured
        literature surveys from large paper collections, reducing manual effort.
      what_remains_open: Analytical depth and critical insight still lag behind human-written
        surveys; citation hallucination and faithfulness remain issues; scalability
