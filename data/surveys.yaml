    on reliability through multi-agent architectures, self-correction, and human-in-the-loop
    collaboration.'
  - 'Shared research pattern: All systems decompose the scientific workflow into subtasks
    handled by LLM agents, use structured feedback loops (automated review, failure
    attribution, negative knowledge) to improve output quality, and evaluate on benchmarks
    that measure execution success, artifact quality, and paper acceptance.'
  - 'Key differences: Systems differ in how they handle failures—single reflection
    vs. multi-hypothesis attribution vs. curated negative memory—and in the degree
    of human involvement, from fully autonomous (AI Scientist) to selective human-AI
    collaboration at high-leverage decision points (AutoResearchClaw).'
  - 'Trend evolution: From 2024 to 2026, the field moved from a single pipeline generating
    papers in one pass (AI Scientist) to agentic tree search (AI Scientist-v2), then
    to structured self-correction (SAGE), multi-agent debate with human collaboration
    (AutoResearchClaw), and failure-aware shared memory (Negative Knowledge), with
    a parallel benchmarking thread (AblationBench) that quantifies ablation planning
    ability.'
  - 'Open questions: Whether current systems can consistently produce scientifically
    sound, conference-ready papers without human intervention; how to guarantee factual
    accuracy and prevent hallucinated results in generated manuscripts; and how to
    scale beyond workshop-level validation to full journal publication.'
  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，能生成想法、执行实验、撰写完整稿件，并通过多智能体架构、自我纠正和人机协作不断提高可靠性。
  - 研究共性：所有系统都将科学工作流分解为由LLM智能体处理的子任务，使用结构化反馈循环（自动评审、失败归因、负知识）来改善输出质量，并通过测量执行成功率、工件质量和论文接受率的基准进行评估。
  - 关键差异：系统在处理失败的方式上存在差异——单一反思 vs. 多假设归因 vs. 整理的负记忆；在人类参与程度上也不同，从完全自主（AI Scientist）到在高杠杆决策点进行选择性人机协作（AutoResearchClaw）。
