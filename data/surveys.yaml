  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Fully automating the scientific workflow from idea generation
        to manuscript writing, reducing human effort and cost per paper.
      what_remains_open: Reliability across multiple runs, generalization beyond ML
        subfields, and the ability to produce truly novel, defensible claims without
        human intervention.
    - line: Domain-specific scientific validation and safety gates
      what_it_solves: Ensuring that generated results are physically or biologically
        plausible by embedding domain knowledge (e.g., vision-language physics verification)
        into the agent loop.
      what_remains_open: Coverage of silent failures; the gate itself can miss invalid
        results, and its design is currently tied to specific simulators or data modalities.
    - line: Benchmarks and evaluation environments
      what_it_solves: Providing standardized tasks and metrics to compare AI scientists'
        abilities in hypothesis formation, experimentation, and discovery.
      what_remains_open: Whether performance on simulated or curated benchmarks translates
        to real-world scientific impact, and how to capture open-ended discovery rather
        than task completion.
    - line: Failure mode analysis and design principles
      what_it_solves: Cataloging recurring weaknesses (e.g., implementation drift,
        overexcitement, memory degradation) to guide more robust system design.
      what_remains_open: Systematic methods to prevent or recover from these failures
        in long-horizon autonomous runs, and empirical validation that proposed principles
        improve success rates.
    consensus:
    - Large language models serve as the core reasoning and planning component, orchestrating
      code execution, data analysis, and paper writing.
    - The scientific process is modeled as an iterative loop of hypothesis generation,
      experiment design, result interpretation, and reporting.
    - Automated evaluation (either via LLM-based reviewers or benchmark metrics) is
      necessary to scale assessment, but its alignment with human judgment remains
      under scrutiny.
    - Current systems are not yet reliable enough for fully unattended operation;
      human oversight or domain-specific guardrails are still required.
