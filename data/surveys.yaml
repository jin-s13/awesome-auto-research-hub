  related_work_outline_zh:
  - 主流方向：构建端到端的AI科学家系统以自动化完整研究周期，并开发评估其可靠性和科学产出的基准与框架。
  - 研究共性：使用LLM智能体编排从想法生成、编码实现、实验执行到论文撰写的结构化工作流，并引入自动评估或验证门控机制。
  - 关键差异：领域通用性 vs. 领域特定验证（如物理感知视觉门控）；依赖自动评审分数 vs. 人类专家判断 vs. 任务完成度指标；简单反思循环 vs. 多假设因果失败归因；单智能体
    vs. 多智能体协作。
  - 趋势演进：从2024年的可行性演示（The AI Scientist）到2025年领域特定基准和工作坊级接受，再到2026年关注可靠性、自我纠正和失败分析，表明从“能否做到”到“如何做得可靠”的转变。
  - 开放问题：如何确保科学正确性和可复现性超越表面合理性，使代理指标与人类科学判断对齐，跨领域泛化而不依赖领域特定工程，以及处理长周期自主研究中的记忆退化。
  literature_review:
    line_of_work_matrix:
    - line: Fully automated scientific discovery pipelines
      what_it_solves: Automating the complete research cycle from ideation to publication
        to reduce human labor and accelerate exploration.
      what_remains_open: Generated papers can be superficially plausible but lack
        deep scientific validity, and the systems often miss domain-specific constraints
        or silent failures.
    - line: Benchmarking environments for AI scientists
      what_it_solves: Providing standardized tasks and metrics to compare different
        AI scientist systems and measure progress.
      what_remains_open: The gap between benchmark tasks and real scientific discovery,
        and whether proxy metrics predict genuine scientific value or human acceptance.
    - line: Self-correcting and failure attribution
      what_it_solves: Enabling AI scientists to diagnose experiment failures and autonomously
        correct hypotheses, design, or implementation.
      what_remains_open: Causal attribution accuracy is limited and may not cover
        all failure modes; systems still struggle with fully autonomous writing and
        conference-ready output.
    - line: Domain-specific verification and physics-aware gates
      what_it_solves: Detecting silent failures (e.g., physically unreasonable results)
        that code-level checks miss, through domain-specific inspection such as vision-language
        physics verification.
      what_remains_open: The approach is hard to generalize to domains without explicit
        visual or physical signals, and verification gates themselves can miss some
        failures.
    consensus:
    - Structured experiment loops and feedback mechanisms are essential for AI-driven
      research, not just single-pass generation.
    - Current LLM agents show potential in automating parts of the scientific process
      but remain unreliable without additional verification.
    - Evaluation and benchmarking are critical enablers for progress, and multiple
      works agree on the need for standardized metrics and human baselines.
    disagreements:
    - Whether automated reviewer scores, human expert judgment, or task-completion
      rates should be the primary evaluation for AI scientist output.
    - Whether domain-specific verification (e.g., physics-aware gates) is necessary
      or a generic workflow suffices across domains.
    - Whether error correction should rely on simple reflection or multi-hypothesis
      causal diagnosis with routed interventions.
    - Whether a single-agent architecture or a multi-agent team with specialized roles
      yields more robust and novel research.
    open_questions:
    - How can we ensure that AI-generated scientific claims are reproducible and correct,
      not just well-formatted?
    - What evaluation metrics best predict real-world scientific impact and human
      peer review outcomes?
    - How can domain knowledge be integrated without sacrificing generality across
      scientific fields?
    - How can memory and context degradation be mitigated in long-horizon autonomous
      research flows?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 全自动科学发现流水线
      解决的问题: 自动化从构思到出版的完整科研循环，减少人类劳动并加速探索。
      尚未覆盖: 生成的论文可能表面合理但缺乏深度科学验证，系统常忽略领域特定约束或无声失败。
    - 路线: AI科学家基准测试环境
      解决的问题: 提供标准化任务和指标，以比较不同AI科学家系统并衡量进展。
      尚未覆盖: 基准任务与真实科学发现之间的差距，以及代理指标是否能预测真实的科学价值或人类接受度。
    - 路线: 自我纠正与失败归因
      解决的问题: 使AI科学家能够诊断实验失败并自主纠正假设、设计或实现。
      尚未覆盖: 因果归因准确性有限，无法覆盖所有失败模式；系统在完全自主写作和生成可投稿论文方面仍面临困难。
    - 路线: 领域特定验证与物理感知门控
      解决的问题: 通过领域特定检查（如视觉-语言物理验证）检测代码级检查遗漏的无声失败（如物理上不合理的结果）。
      尚未覆盖: 该方法难以推广到缺乏明确视觉或物理信号的领域，验证门控本身也可能遗漏部分失败。
    共识:
    - AI驱动的研究需要结构化的实验循环和反馈机制，而非单次生成。
    - 当前LLM智能体在自动化部分科学流程中展现出潜力，但若无额外验证仍不可靠。
    - 评估和基准测试是推进进展的关键，多个工作一致认为需要标准化指标和人类基线。
    分歧:
    - 应以自动评审分数、人类专家判断还是任务完成率作为评估AI科学家输出的主要方式。
    - 是否需要领域特定验证（如物理感知门控），还是通用工作流足以跨领域。
    - 纠错应依赖简单反思还是多假设因果诊断并路由干预。
    - 单智能体架构还是具有专门角色的多智能体团队能产生更稳健且新颖的研究。
    开放问题:
    - 如何确保AI生成的科学主张可复现且正确，而不仅仅是格式良好？
    - 哪些评估指标最能预测真实世界科学影响和人类同行评审结果？
    - 如何在不牺牲跨科学领域通用性的前提下融入领域知识？
    - 如何缓解长周期自主研究中的记忆和上下文退化问题？
