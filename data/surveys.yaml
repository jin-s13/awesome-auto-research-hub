  related_work_outline:
  - 'Mainstream direction: Building autonomous AI scientist systems that generate
    hypotheses, design and execute experiments, and iteratively refine ideas through
    multi-agent collaboration and tool integration.'
  - 'Shared research pattern: Systems adopt modular agent roles, iterative reflection
    or failure attribution loops, and coupling with code execution or simulation environments
    to close the loop from idea to validated result.'
  - 'Key differences: Domain-specific (e.g., CFD) versus domain-agnostic frameworks;
    reliance on physics-aware verification gates versus purely code-based execution;
    evaluation via curated benchmarks versus internal case studies; self-evolution
    mechanisms ranging from evolutionary search to structured research trees.'
  - 'Trend evolution: From 2023 to 2026, the field moved from early single-domain
    proof-of-concepts toward general, self-correcting, and self-evolving frameworks,
    with the emergence of standardized benchmarks and survey-driven taxonomies.'
  - 'Open questions: Can AI-generated hypotheses achieve genuine scientific novelty
    beyond incremental improvements? How can reliability and failure detection be
    guaranteed across unseen domains? What evaluation standards adequately capture
    real-world discovery utility?'
  related_work_outline_zh:
  - 主流方向：构建自主AI科学家系统，通过多智能体协作和工具集成，生成假设、设计并执行实验、迭代优化想法。
  - 研究共性：系统采用模块化智能体角色、迭代反思或失败归因循环，并与代码执行或仿真环境耦合，实现从想法到验证结果的闭环。
  - 关键差异：领域特定（如计算流体动力学）与领域无关框架；依赖物理感知验证门控与纯代码执行；通过精选基准测试与内部案例研究进行评估；自演化机制从进化搜索到结构化研究树各不相同。
  - 趋势演进：2023至2026年，领域从早期单领域概念验证走向通用、自我纠正和自我演化的框架，并出现了标准化基准和综述驱动的分类法。
  - 开放问题：AI生成的假设能否超越增量改进，实现真正的科学新颖性？如何在未见领域保证可靠性和失败检测？什么样的评估标准能充分捕捉真实世界的发现效用？
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous scientific discovery systems
      what_it_solves: Automating the full research cycle from hypothesis generation,
        experimental design, code execution, to result interpretation and reporting,
        reducing human intervention in routine discovery loops.
      what_remains_open: Cross-domain generalization without task-specific engineering;
        reliable detection of silent experimental failures; generating publication-ready
        papers with deep scientific insight rather than surface-level reporting.
    - line: Benchmarks and evaluation frameworks for AI scientists
      what_it_solves: Providing standardized tasks, metrics, and human baselines to
        compare the discovery capabilities of different AI scientist systems on real
        scientific data.
      what_remains_open: Alignment between benchmark performance and genuine scientific
        impact; coverage of diverse scientific modalities beyond omics; scalability
        of human baseline annotations.
    - line: Conceptual surveys and taxonomies of agentic scientific discovery
      what_it_solves: Organizing fragmented system designs into capability categories,
        identifying common challenges, and charting future directions across chemistry,
        biology, and materials science.
      what_remains_open: Empirical validation that proposed taxonomies predict system
        behavior or guide design choices; integration of ethical and reliability dimensions
        into actionable frameworks.
    - line: Automated literature review and survey generation
      what_it_solves: Synthesizing large volumes of scholarly articles into structured,
        high-quality survey papers through specialized agent roles and rubric-guided
        iterative refinement.
      what_remains_open: Achieving critical depth and novel conceptual synthesis comparable
        to expert human surveys; avoiding superficial aggregation of citations without
        meaningful analysis.
    consensus:
    - Multi-agent architectures with specialized roles (ideation, coding, reviewing)
      improve the quality and robustness of generated research outputs.
    - Iterative reflection, self-critique, or failure attribution mechanisms are essential
      for correcting errors and refining hypotheses beyond single-pass generation.
    - Integration with executable environments (code interpreters, simulators) is
      necessary to ground ideas in empirical evidence and avoid hallucinated results.
    - Fully autonomous generation of conference-ready papers remains an unsolved challenge
      across all current systems.
    disagreements:
    - Whether to build domain-specific systems with built-in physics or domain knowledge
      verification, or to pursue domain-agnostic frameworks that can be rapidly adapted
      with minimal code.
    - 'How to evaluate AI scientists: some works introduce curated benchmarks with
      human baselines, while others rely on internal case studies judged by AI experts,
      leading to incomparable claims.'
    - The mechanism for self-improvement varies from evolutionary search over a population
      of ideas, to structured tree-based backtracking, to single-trajectory multi-hypothesis
      failure attribution.
    open_questions:
    - What constitutes a scientifically novel hypothesis, and can current LLM-based
      agents reliably generate ideas that are non-incremental and experimentally fruitful?
    - How can we build verification gates that generalize across scientific domains
      without requiring domain-specific vision or physics models?
    - What is the minimum set of evaluation tasks and metrics that would allow fair
      comparison across diverse AI scientist implementations?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主科学发现系统
      解决的问题: 自动化从假设生成、实验设计、代码执行到结果解释和报告撰写的完整研究周期，减少常规发现循环中的人工干预。
      尚未覆盖: 无需任务特定工程的跨领域泛化；静默实验失败的可靠检测；生成具有深度科学洞察而非表面报告的可发表论文。
    - 路线: AI科学家的基准测试与评估框架
      解决的问题: 提供标准化任务、指标和人类基线，以比较不同AI科学家系统在真实科学数据上的发现能力。
      尚未覆盖: 基准性能与真实科学影响力之间的对齐；覆盖组学以外的多样科学模态；人类基线标注的可扩展性。
    - 路线: 智能体科学发现的概念综述与分类法
      解决的问题: 将碎片化的系统设计组织为能力类别，识别共同挑战，并绘制化学、生物学和材料科学领域的未来方向。
      尚未覆盖: 所提出的分类法能否预测系统行为或指导设计选择的实证验证；将伦理和可靠性维度整合到可操作框架中。
    - 路线: 自动化文献综述与调查生成
      解决的问题: 通过专门的智能体角色和基于评分准则的迭代优化，将大量学术文章合成为结构化、高质量的综述论文。
      尚未覆盖: 达到与专家人类综述相当的批判深度和新颖概念综合；避免无意义分析的引文堆砌。
    共识:
    - 具有专门角色（构思、编码、评审）的多智能体架构提高了生成研究输出的质量和鲁棒性。
    - 迭代反思、自我批判或失败归因机制对于纠正错误和超越单次生成优化假设至关重要。
    - 与可执行环境（代码解释器、模拟器）的集成是将想法建立在经验证据之上并避免幻觉结果的必要条件。
    - 完全自主生成可提交会议的论文仍然是所有当前系统未解决的挑战。
    分歧:
    - 是构建具有内置物理或领域知识验证的领域特定系统，还是追求可以用最少代码快速适应的领域无关框架。
    - 如何评估AI科学家：一些工作引入具有人类基线的精选基准，而另一些则依赖由AI专家评判的内部案例研究，导致主张不可比较。
    - 自我改进的机制各不相同，从对想法种群进行进化搜索，到基于结构化树的回溯，再到单轨迹多假设失败归因。
    开放问题:
