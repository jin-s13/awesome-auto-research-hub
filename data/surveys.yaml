      advocates multi-hypothesis causal attribution to isolate errors at the hypothesis,
      implementation, or design level.'
    - 'Evaluation philosophy: Some works rely on automated peer review scores, others
      use structured task benchmarks with multiple metrics, and a few employ human
      expert panels.'
    - 'Deployment mode: Systems differ in their degree of autonomy—fully automated
      paper generation versus interactive platforms with human-in-the-loop monitoring
      and rollback.'
    - 'Domain specificity: General-purpose ML agents are contrasted with domain-aware
      systems (e.g., CFD physics verification) that incorporate domain-specific validity
      gates.'
    open_questions:
    - How can we design evaluation protocols that robustly distinguish between superficial
      novelty and meaningful scientific progress in AI-generated research?
    - What verification mechanisms can scale across diverse scientific domains without
      requiring domain-specific retraining of the gate itself?
    - To what extent do current failure modes (e.g., context degradation, overexcitement)
      stem from agent architecture versus inherent limitations of underlying LLMs?
    - Can self-correction loops be extended to handle long-horizon experiments where
      errors compound over multiple iterations?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究智能体框架
      解决的问题: 自动化完整的科学发现周期——构思、代码实现、实验执行、结果可视化及论文撰写——以减少人工投入并实现高通量探索。
      尚未覆盖: 生成的论文往往缺乏可辩护的新颖性；通过同行评审门槛的表现不稳定；验证门控可能遗漏静默失败，例如物理感知智能体漏检了16个植入错误中的2个。
    - 路线: AI科学家的评估基准与虚拟环境
      解决的问题: 提供标准化任务和指标，以比较自主发现智能体的能力，包括任务完成度、解释质量及闭环决策。
      尚未覆盖: 基准大多局限于模拟或狭窄领域（如单细胞转录组学、符号任务）；向真实世界、跨学科科学工作流的迁移尚未验证。
    - 路线: 失败诊断与自我纠正机制
      解决的问题: 识别重复出现的失败模式（如实现漂移、过度兴奋、薄弱的科学品味），并通过将实验失败归因于根本原因来使智能体能够纠正路径。
      尚未覆盖: 多假设归因提升了工件质量，但并不能保证生成可上会的论文；长时程记忆退化和领域智能不足仍然限制着完全自主执行。
    共识:
    - 当前基于LLM的智能体尚不能进行完全自主、可靠的科学发现，需要结构化验证或人工监督。
    - 将研究分解为模块化阶段（构思、编码、执行、写作）是常见的架构模式。
    - 自动评估指标（如任务完成度、评审分数）是必要的，但不足以捕捉真正的科学价值。
    - 一个关键瓶颈是生成看似合理输出与产生可辩护、可复现的科学主张之间的差距。
    分歧:
    - 失败恢复策略：一方使用简单的反思循环，另一方主张通过多假设因果归因将错误隔离到假设、实现或设计层面。
    - 评估理念：部分工作依赖自动同行评审分数，另一些使用带有多个指标的结构化任务基准，还有少数采用人类专家面板。
    - 部署模式：系统在自主程度上存在差异——完全自动化的论文生成与人机协同的交互式平台（含监控和回滚）。
    - 领域特异性：通用ML智能体与包含领域特定有效性门控的领域感知系统（如CFD物理验证）形成对比。
    开放问题:
    - 如何设计评估协议，能够稳健地区分AI生成研究中的表面新颖性与有意义的科学进展？
    - 哪些验证机制能够跨多样科学领域扩展，而无需对门控本身进行领域特定重训练？
    - 当前的失败模式（如上下文退化、过度兴奋）在多大程度上源于智能体架构，而非底层LLM的固有限制？
    - 自我纠正循环能否扩展到处理长时程实验，其中错误会在多次迭代中复合？
