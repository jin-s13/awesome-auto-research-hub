      尚未覆盖: 除与人类综述的表面相似度外，事实准确性未经验证；评估仅限于少数数据集；可复现性信号弱（代码和工件未完全公开）。
    - 路线: 迭代与层次化文献组织
      解决的问题: 将大量科学研究组织为层次化或迭代优化的结构，以支持更深入的自动化综述和更便捷的人工导航。
      尚未覆盖: 证据包中未提供实证证据或方法细节；有效性、可扩展性以及与更简单的检索增强生成的对比尚不清楚。
    - 路线: 同行评审模拟与鲁棒性
      解决的问题: 用LLM智能体模拟同行评审动态，以理解自动化评审系统在对抗输入下的脆弱性、可操纵性和可靠性。
      尚未覆盖: 缺乏同行评审质量的标准化基准；没有证据表明这些模拟与真实人类评审结果的相关性；尚未提出对抗防御方案。
    - 路线: 自进化检索智能体
      解决的问题: 使文献检索智能体能够随时间自适应地改进搜索策略，无需人工重新设计。
      尚未覆盖: 没有可用的实现或评估证据；自进化检索的概念未与静态检索基线进行验证。
    - 路线: 研究自动化智能体基准
      解决的问题: 提供任务套件以衡量LLM智能体自动化研究工作流（如后训练流程）的能力，可能扩展至文献综述任务。
      尚未覆盖: 与文献综述的直接相关性不明确；未包含结果或分析；基准对综述特定子任务的覆盖未得到证明。
    共识:
    - 基于LLM的智能体是自动化文献综述及相关学术任务的主流方法。
    - 将综述过程分解为多个步骤或专用角色是共同的设计原则。
    - 普遍目标是通过自动化提升科学文献合成的效率和质量。
    分歧:
    - 自动化范围不一：有的系统瞄准完整综述写作，有的聚焦文献组织或同行评审，缺乏统一的任务定义。
