    of autonomous discoveries, and unresolved ethical concerns remain under-explored.'
  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，利用大语言模型完成从构思、实验、分析到论文写作的完整科学发现循环，并越来越强调验证、多智能体协作和人机交互。
