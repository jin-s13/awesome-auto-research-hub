      尚未覆盖: 对超越狭窄任务完成的完整发现周期的覆盖；代理指标（如自动评审分数）与真实科学贡献之间的一致性仍未得到验证。
    - 路线: 概念分类与理论
      解决的问题: 将碎片化的系统设计和失败模式组织为设计原则和挑战类别，如综述和失败分析研究中所示，识别出实现漂移和过度兴奋等反复出现的问题。
      尚未覆盖: 直接实证验证所提出的分类法或设计原则能否预测系统行为或提高不同架构和领域的成功率。
    共识:
    - 所有系统都将科学方法分解为由LLM编排的阶段，并使用某种形式的自动过滤（评审器、视觉门控或基准）来评估输出质量。
    - 当前的AI科学家尚无法达到人类水平的可靠性；即使是最好的系统也会产生有效和有缺陷的混合结果，失败模式包括代码错误、幻觉声明和领域知识不足。
    - 开源代码和工件越来越多地提供，但由于LLM的随机性和缺乏标准化评估协议，可复现性仍然有限。
    分歧:
    - 领域通用性与专业化：The AI Scientist和AI Scientist-v2旨在广泛的机器学习适用性，而AI CFD Scientist为单一领域嵌入物理感知验证，以灵活性换取可靠性。
    - 评估方法：一些工作依赖自动LLM评审器，其他工作使用具有预定义任务和人类基线的结构化基准环境，还有一项工作以真实同行评审接收作为最终指标。
    - 交互范式：Claw AI Lab提供具有人在回路控制的交互式仪表板，而The AI Scientist完全自主运行，反映了对人类监督角色的不同假设。
    开放问题:
    - 如何为AI科学家配备强大的自我验证能力，以检测和纠正自身错误，考虑到即使是领域特定的门控也会遗漏一部分静默失败？
    - 什么样的评估框架能够捕捉AI生成研究的新颖性、正确性和可复现性，并与长期科学影响力相关联？
    - 从失败分析中得出的设计原则能否被操作化为架构约束，从而在多样化的科学领域中可衡量地提高成功率？
