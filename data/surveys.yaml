      what_remains_open: Current benchmarks still rely on simulated tasks or narrow
        academic questions; the alignment between these proxy metrics and real-world
        scientific impact or novel discovery is not yet validated, and human baseline
        comparisons are scarce.
    - line: Failure analysis and reliability engineering
      what_it_solves: Identifies recurring failure modes (e.g., implementation drift,
        memory degradation, hallucination) and introduces self-correction mechanisms
        such as multi-hypothesis failure attribution or physics-aware verification
        gates to improve trustworthiness.
      what_remains_open: These mechanisms are mostly reactive and evaluated on limited
        domains; they have not yet demonstrated the ability to forestall all failure
        modes, and the long-term memory and context degradation across extended research
        loops remain unresolved.
    consensus:
    - LLM-powered agents can execute the core steps of the scientific method (hypothesis,
      experiment, analysis, writing) when the domain is structured and the evaluation
      criteria are codified.
    - Current autonomous scientists are not fully trustworthy; they exhibit hallucinations,
      premature success declarations, and fragile code execution, requiring human
      oversight or additional verification layers.
    - Open-source code and artifacts are essential for reproducibility, but the majority
      of systems still lack full external validation across diverse hardware and datasets.
    disagreements:
    - 'Evaluation strategy: some works rely on automated or simulated review scores,
      while others push for real peer review acceptance or task outcome metrics, leading
      to disagreements about what constitutes a valid scientific contribution.'
    - 'Reliability approach: the field is split between generic reflection-based error
      correction, structured causal failure attribution, and domain-specific validation
      gates (e.g., vision-language physics verification), each making different assumptions
      about where failures originate.'
    - 'Domain generalization: some systems are demonstrated only on narrow ML topics,
      while others target physics or biology, and it is unclear whether the same architecture
      can scale without domain-specific engineering.'
    open_questions:
    - What evaluation criteria can capture the novelty and impact of an AI-generated
      scientific finding beyond the current proxy metrics of paper score or task completion?
    - How can long-horizon memory and context be maintained across the multiple iterations
      of an autonomous research cycle when current agents suffer from memory degradation?
    - To what extent can domain-specific reliability gates (e.g., physics-awareness)
      be replaced by generalizable self-correction mechanisms that work across scientific
      disciplines?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自主科学家系统
      解决的问题: 将构思、代码执行、实验管理和论文写作整合到一个LLM驱动的工作流中，旨在自动化完整研究周期，降低每篇论文的成本和人力投入。
      尚未覆盖: 系统尚未足够可靠以支持高风险发现；它们成功率不一致，经常静默失败，且人类编写的代码模板或领域特定约束限制了其在新科学领域中的通用性。
    - 路线: 科学发现评估与基准
      解决的问题: 提供标准化的任务、环境和指标（如任务完成度、工件质量、同行评审分数）以比较AI科学家并衡量自主发现的进展。
      尚未覆盖: 当前基准仍依赖模拟任务或狭窄的学术问题；这些代理指标与真实世界科学影响或新颖发现之间的一致性尚未得到验证，且人类基线比较稀少。
    - 路线: 失败分析与可靠性工程
      解决的问题: 识别反复出现的失败模式（如实现漂移、记忆退化、幻觉），并引入自我纠正机制，如多假设失败归因或物理感知验证门控，以提高可信度。
      尚未覆盖: 这些机制大多是反应式的，并在有限领域上进行评估；它们尚未展示出能够预防所有失败模式的能力，跨长周期研究循环的长期记忆和上下文退化问题仍未解决。
    共识:
    - 当领域结构良好且评估标准被编码时，LLM驱动的智能体可以执行科学方法的核心步骤（假设、实验、分析、写作）。
    - 当前自主科学家尚不完全可靠；它们存在幻觉、过早宣布成功和代码执行脆弱等问题，需要人类监督或额外的验证层。
    - 开源代码和工件对可复现性至关重要，但大多数系统仍缺乏跨不同硬件和数据集的全面外部验证。
    分歧:
    - 评估策略：一些工作依赖自动或模拟评审分数，而另一些则追求真实同行评审接收或任务结果指标，导致对何为有效科学贡献的分歧。
    - 可靠性方法：领域分裂为基于通用反思的错误纠正、结构化因果失败归因和领域特定验证门控（如视觉-语言物理验证），每种方法对故障来源的假设不同。
    - 领域泛化：一些系统仅在狭窄的ML课题上展示，而另一些则针对物理或生物学，尚不清楚同一架构能否在没有领域特定工程的情况下扩展。
    开放问题:
    - 什么评估标准能够在当前论文分数或任务完成度等代理指标之外，捕捉AI生成科学发现的新颖性和影响力？
    - 当当前智能体面临记忆退化时，如何在自主研究周期的多次迭代中保持长程记忆和上下文？
    - 领域特定的可靠性门控（如物理感知）在多大程度上可以被跨科学学科工作的通用自我纠正机制所取代？
