  related_work_outline_zh:
  - 主流方向：构建标准化基准和虚拟环境以评估AI智能体的端到端科学发现能力，并日益关注安全性、推理忠实性和自主目标设计。
  - 研究共性：以大型语言模型为核心推理引擎，通过模拟环境或代码执行进行交互，并依赖自动指标进行评估。
  - 关键差异：评估目标分化——任务完成、机制忠实性、安全性和认知诚实性；智能体自主程度从固定目标到自我演化目标；部署设置从无约束到资源受限的单GPU。
