    peer review acceptance but still facing consistency gaps.'
  - 'Open questions: Can these agents produce novel, defensible scientific arguments
    beyond pattern recombination? How to close the gap between proxy metrics (automated
    review scores) and genuine scientific contribution? What architectural support
    is needed for long-horizon, causally grounded failure recovery?'
  related_work_outline_zh:
  - 主流方向：构建基于LLM的端到端智能体，实现从假设生成到论文撰写的科学工作流自动化，并日益强调自我纠正与可验证性。
  - 研究共性：LLM智能体被编排为多阶段流水线（想法、编码、实验、分析、写作），并通过自动评审或人类判断评估；失败处理正在成为核心关注点。
