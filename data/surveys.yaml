      what_remains_open: standardized external validation across hardware, datasets,
        and user settings; many systems lack open-source code or detailed reproducibility
        protocols.
    - line: Conceptual taxonomy and theory
      what_it_solves: organizing fragmented claims about autonomous research into
        failure modes and design principles, as in the analysis of six recurring failure
        patterns and the multi-hypothesis failure attribution schema.
      what_remains_open: direct empirical validation that the proposed failure categories
        or self-correction taxonomies actually predict and improve agent behavior
        in novel domains.
    consensus:
    - Automated research agents can produce papers that pass workshop-level peer review,
      indicating a baseline level of competence.
    - Evaluation is shifting from ad-hoc manual inspection to structured benchmarks
      and automated metrics, but human judgment remains the gold standard for final
      assessment.
    - Failure detection and correction are critical for reliability; vision-language
      verification gates, failure attribution, and design principles all aim to reduce
      silent errors.
    - Reproducibility is a recognized requirement, with most systems providing some
      form of code or environment, though completeness varies.
    disagreements:
    - 'Evaluation setting: virtual sandbox tasks (DISCOVERYWORLD) vs. real-world domain-specific
      data (BAISBench) vs. full paper submission to peer review (AI Scientist-v2).'
    - 'Reliability mechanism: pre-execution physics verification (AI CFD Scientist)
      vs. post-hoc multi-hypothesis failure attribution (SAGE) vs. workflow-level
      design principles (Why LLMs Aren''t Scientists Yet).'
    - 'Interaction mode: fully autonomous end-to-end generation vs. interactive multi-agent
      platforms with human-in-the-loop monitoring (Claw AI Lab).'
    - 'Supervision signal: some systems rely on automated LLM reviewers, while others
      use human experts or vision-language models for verification.'
    open_questions:
    - How well do benchmark scores for scientific discovery agents correlate with
      the downstream impact of their generated research?
    - Can multi-agent collaboration and structured failure attribution overcome the
      memory degradation and weak scientific taste observed in long-horizon autonomous
      research?
    - What is the minimum set of verification gates and reproducibility standards
      needed to ensure safe and trustworthy deployment of AI scientists in high-stakes
      domains?
