  related_work_outline_zh:
  - 主流方向：构建端到端AI智能体，自主完成科学研究并撰写完整论文，并越来越重视鲁棒性、可验证性和人机协作。
  - 研究共性：系统将科学工作流分解为LLM驱动的阶段——构思、执行、验证和写作，通常引入外部反馈循环（自动评审、物理检查或人工干预）以迭代改进输出。
  - 关键差异：完全自主 vs. 人机协作；通用机器学习框架 vs. 领域特定的物理感知智能体；单次生成 vs. 利用失败记忆的自纠正循环；评测目标从自动评审分数到真实工作坊接受。
  - 趋势演进：前沿从首次全自动论文生成（2024年）发展到AI生成论文被工作坊接收（2025年），再到引入结构化辩论、失败归因、负知识库和领域特定验证（2025–2026年），反映出从能力展示转向可靠性和科学严谨性的趋势。
  - 开放问题：自动评审能否可靠评估新颖性与正确性；如何将习得的失败知识跨学科迁移；在高风险科学交流中需要多大程度的人类监督。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research writing
      what_it_solves: Generates a complete research paper from idea to manuscript,
        including code execution, visualization, and self-review, dramatically lowering
        the cost and barrier of paper production.
      what_remains_open: Output quality is inconsistent (only one of three AI Scientist-v2
        submissions passed peer review), and validation relies on automated reviewers
        whose alignment with human judgment on novelty is not established.
    - line: Experiment planning and self-correction
      what_it_solves: Improves the reliability of auto-generated research by planning
        ablation studies, diagnosing failures, and reusing past negative results to
        avoid repeated mistakes.
      what_remains_open: Current language models achieve only 45% recall on ablation
        identification, and failure attribution mechanisms may misdiagnose root causes;
        cross-task transfer of negative knowledge is demonstrated only on limited
        PDE problems.
    - line: Review and evaluation assistance
      what_it_solves: Automates parts of the scientific review process, including
        scoring papers, detecting missing ablations, and verifying consistency between
        reported results and actual measurements.
      what_remains_open: Automated reviewers have not been validated for assessing
        scientific taste or long-term impact; gaps remain between proxy metrics and
        real decision utility in conference acceptance.
    - line: Human–AI collaboration in research workflows
      what_it_solves: Enables flexible interaction between human researchers and AI
        agents, allowing targeted intervention at high-leverage decision points to
        improve research outcomes over fully autonomous systems.
      what_remains_open: Optimal intervention strategies are not formalized; the trade-off
        between human effort and research quality across different domains and complexity
        levels is not quantified.
    consensus:
    - Large language models are the core engine for hypothesis generation, code implementation,
      and manuscript drafting across all systems.
    - Iterative feedback loops—whether through automated reviewers, physics verification
      gates, or human interventions—are necessary to produce defensible scientific
      claims.
    - Memory of past failures (negative knowledge) or structured self-correction improves
      the success rate and artifact quality of autonomous research agents.
    - Benchmarks and evaluation metrics for autonomous research writing are still
      immature; existing metrics (e.g., automated reviewer scores, artifact quality)
      are proxies that do not fully capture scientific value.
    disagreements:
    - 'Full autonomy vs. human-in-the-loop: some systems aim for fully automated discovery,
      while others demonstrate that targeted human collaboration at key decision points
      outperforms complete autonomy.'
    - 'Domain scope: general-purpose ML frameworks (AI Scientist, SAGE) target broad
      applicability, whereas domain-specific systems (AI CFD Scientist) embed physics-aware
      verification that is not present in generic approaches.'
    - 'Failure handling: approaches range from single-reflection loops to multi-hypothesis
      causal diagnosis and curated negative knowledge banks, differing in the granularity
      and persistence of failure memory.'
    - 'Evaluation targets: works are validated against varied criteria—automated reviewer
      scores, artifact quality ratings, benchmark metrics, and genuine workshop acceptance—making
      direct comparison difficult.'
    open_questions:
    - Can automated reviewers be calibrated to match human peer-review decisions on
      novelty, significance, and soundness at conference scale?
    - How can failure knowledge acquired in one scientific domain, such as PDE solving,
      be transferred to unrelated domains with different experimental patterns?
    - What metrics or evaluation protocols would reliably measure the scientific contribution
      of AI-generated papers beyond surface-level quality scores?
    - What is the minimal human oversight required to ensure that AI-generated research
      communications are trustworthy and free of hallucinated findings?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究写作
      解决的问题: 从想法到论文生成完整的研究论文，包括代码执行、可视化和自我评审，大幅降低论文生产成本和门槛。
      尚未覆盖: 产出质量不稳定（AI Scientist-v2三篇提交仅一篇通过同行评审），验证依赖自动评审器，其与人类判断在新颖性上的一致性尚未建立。
    - 路线: 实验规划与自我纠正
      解决的问题: 通过规划消融实验、诊断失败、重复利用过去的负面结果来避免重复错误，从而提高自动生成研究的可靠性。
      尚未覆盖: 当前语言模型在消融识别上仅达到45%召回率，失败归因机制可能误诊根本原因；负面知识的跨任务迁移仅在有限PDE问题上得到验证。
    - 路线: 评审与评估辅助
      解决的问题: 自动化科学评审过程的部分环节，包括论文评分、发现缺失消融、验证报告结果与实际测量的一致性。
      尚未覆盖: 自动评审器在评估科学品味或长期影响力方面尚未得到验证；代理指标与会议接受的真实决策效用之间存在差距。
    - 路线: 人机协作研究工作流
      解决的问题: 在人类研究人员与AI智能体之间实现灵活交互，允许在高杠杆决策点进行有针对性的干预，以改进完全自主系统的研究结果。
      尚未覆盖: 最优干预策略尚未形式化；不同领域和复杂度水平下人类努力与研究质量之间的权衡尚未量化。
    共识:
    - 大型语言模型是所有系统中假设生成、代码实现和论文起草的核心引擎。
    - 迭代反馈循环——无论是通过自动评审器、物理验证门控还是人类干预——对于产生可辩护的科学主张是必需的。
    - 对过去失败（负知识）的记忆或结构化自我纠正可以提高自主研究智能体的成功率和工件质量。
    - 自主研究写作的基准和评估指标仍不成熟；现有指标（如自动评审分数、工件质量）是代理指标，无法完全捕捉科学价值。
    分歧:
    - 完全自主 vs. 人机协作：一些系统追求完全自动化发现，而另一些系统证明在关键决策点进行精准的人工协作优于完全自主。
    - 领域范围：通用机器学习框架（AI Scientist, SAGE）追求广泛适用性，而领域特定系统（AI CFD Scientist）嵌入了物理感知验证，这是通用方法所不具备的。
    - 失败处理：从单次反思循环到多假设因果诊断和精心策划的负知识库，方法在失败记忆的粒度和持久性上存在差异。
    - 评测目标：各项工作的验证标准各不相同——自动评审分数、工件质量评分、基准指标和真正的工作坊接受——使得直接比较变得困难。
    开放问题:
    - 自动评审器能否被校准，以在会议规模上匹配人类同行评审在创新性、重要性和正确性上的决策？
    - 在一个科学领域（如PDE求解）获得的失败知识如何迁移到具有不同实验模式的不相关领域？
    - 哪些指标或评估协议能够可靠地衡量AI生成论文的科学贡献，而不仅仅是表面质量分数？
    - 确保AI生成的研究交流可信且无幻觉发现所需的最低限度人类监督是什么？
