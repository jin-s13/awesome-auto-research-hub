  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated paper generation pipelines
      what_it_solves: Producing a complete scientific manuscript from idea to final
        text, including code execution and figure generation, reducing the cost and
        turnaround time of initial research drafting.
      what_remains_open: Output quality is inconsistent; only a fraction of generated
        papers pass peer review; the current evaluation relies on automated reviewers
        or low-stakes workshops, not full conference or journal acceptance.
    - line: Self-correction and failure-aware memory in research writing
      what_it_solves: Diagnosing and recovering from failed experiments, implementation
        bugs, or hallucinated results, and preventing the same errors from recurring
        across research cycles.
      what_remains_open: These mechanisms are tested on small-scale benchmarks or
        single-domain tasks; transfer of failure knowledge across substantially different
        scientific problems and writing styles is not yet demonstrated.
    - line: Planning and evaluation of paper components (ablation, review)
      what_it_solves: Automating the logical structure of empirical papers by proposing
        necessary ablation experiments and identifying missing analyses, thereby supporting
        both authors and reviewers.
      what_remains_open: Current benchmarks cover only a narrow slice of paper planning
        (ablation experiments) and LM performance remains well below human experts;
        evaluation of other sections such as introduction, related work, or discussion
        is not addressed.
    - line: Domain-grounded verification for scientific writing
      what_it_solves: Integrating domain-specific validity checks (e.g., physics-based
        vision-language gates) into the writing pipeline to discard physically implausible
        results before they enter the manuscript.
      what_remains_open: Generalizing such verification gates to domains without well-defined
        visual or numeric ground truth is unproven; even in CFD, the gate missed some
        silent failures, indicating validation gaps.
    consensus:
    - LLM-based agents can now draft runnable research papers end-to-end, but the
      resulting manuscripts still lack the depth, critical thinking, and reliability
      of human-authored work.
    - Multi-stage pipelines with verification, reflection, or memory components consistently
      outperform single-pass generation, because they can detect and recover from
      execution errors and unfounded claims.
    - Even the best systems produce only a modest fraction of papers that meet human
      peer-review standards, and the evaluation protocols used (automated reviewers,
      workshop venues) are not yet equivalent to top-tier conference or journal acceptance.
    disagreements:
    - 'The role of human involvement: AutoResearchClaw demonstrates that targeted
      human collaboration at high-leverage decision points outperforms full autonomy,
      whereas the AI Scientist lineage pushes toward zero-human intervention with
      progressively stronger agentic tree search.'
    - 'The scope of verification: AI CFD Scientist enforces domain-specific physical
      validity through vision-language inspection, while generic systems rely on code
      execution success or automated reviewer scores, reflecting different assumptions
      about what constitutes a scientifically sound claim.'
    - 'The mechanism of learning from failure: SAGE uses multi-hypothesis causal attribution
      to correct within a single run, while Negative Knowledge stores failure records
      across runs to prevent recurrence, and AI Scientist-v2 relies on tree-search
      backtracking without explicit memory.'
    open_questions:
    - How can we align automated paper evaluation with human expert judgment across
      diverse fields, moving beyond simplistic scoring rubrics or workshop-level acceptance?
    - What is the minimal set of verification gates needed to ensure that AI-generated
      scientific claims are factually grounded, reproducible, and free of hallucinated
      numerical results?
    - Can failure-aware memory and self-correction generalize across different scientific
      domains, writing conventions, and experimental paradigms without costly domain-specific
      engineering?
