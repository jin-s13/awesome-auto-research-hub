      解决的问题: 识别和归因实验失败，以提高成功率和输出可靠性。
      尚未覆盖: 失败覆盖不完整（如视觉门控遗漏静默错误）；纠正机制限于预定义干预类别，可能无法泛化到新颖失败。
    - 路线: 实验规划与消融评估
      解决的问题: 自动设计消融研究以验证研究主张，并基准测试语言模型在此任务上的能力。
      尚未覆盖: 当前语言模型在消融识别上仅达到45%召回率，远低于人类水平；作者与审稿人任务间的反向性能表明基础问题。
    - 路线: 风险与局限性分类
      解决的问题: 对AI科学家系统的失败模式和风险进行分类，为设计原则提供信息。
      尚未覆盖: 分类源自有限案例研究；缺乏大规模实证验证和自动化缓解策略。
    共识:
    - AI科学家系统可以生成表面看似合理的论文，但难以保证科学深度和正确性。
    - 自动评审器可以近似人类评分，但尚不能可靠替代专家评估。
    - 引入失败记忆或归因可以提高任务成功率和输出质量。
    - 当前系统需要人类监督，尤其是在复杂或高风险研究中。
    分歧:
    - 自我纠正策略：有的使用多假设因果归因（如SAGE），有的使用共享负知识库，而AI Scientist-v2依赖智能体树搜索与VLM反馈。
    - 评估协议：工作使用自动评审器、人类同行评审或基准任务（如AblationBench），导致对系统能力的不同结论。
    - 领域范围：多数系统针对通用机器学习，但AI CFD Scientist展示了具有物理感知验证的领域专业化，引发领域无关与领域特定设计的讨论。
    - 模板依赖：AI Scientist-v2消除了人类编写的代码模板，而早期版本和其他系统仍依赖它们，影响可复现性和通用性。
    开放问题:
    - 哪些评估框架能够可靠衡量AI生成论文的科学有效性，超越表面指标？
    - 自我纠正机制如何处理超出预定义类别的新颖失败，如新型实验错误？
    - AI科学家系统能否扩展到需要深层领域专业知识的领域（如物理或生物），而不牺牲通用性？
    - 在自主研究中，确保安全和伦理标准所需的最小人类参与是什么？
