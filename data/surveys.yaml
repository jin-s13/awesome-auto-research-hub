  related_work_outline:
  - 'Mainstream direction: Building benchmarks and evaluation frameworks for research
    agents that perform complex, long-horizon scientific tasks such as literature
    review, coding, and hypothesis generation.'
  - 'Shared research pattern: Proposing a task suite or agent framework, then measuring
    end-to-end success rates or quality scores, often with LLM-based judges or automated
    metrics.'
  - 'Key differences: Some works focus on narrow, well-defined tasks (e.g., rebuttal
    writing, coding), while others target open-ended autonomous research loops; evaluation
    targets range from artifact quality to process adherence.'
  - 'Trend evolution: From 2024 to 2026, the field is shifting from single-task benchmarks
    (SciCode, Chain of Ideas) toward integrated, multi-stage autonomous research systems
    (Agent Laboratory, Hypothesis-Tree Refinement) and meta-evaluation of research
    agents (ReportBench).'
  - 'Open questions: How to validate that benchmark scores correlate with real-world
    research productivity, and whether current agents can handle the ambiguity and
    long feedback cycles of genuine scientific discovery.'
  related_work_outline_zh:
  - 主流方向：构建用于评估研究智能体的基准与评测框架，这些智能体执行文献综述、编码、假设生成等复杂长周期科学任务。
  - 研究共性：提出任务集或智能体框架，然后测量端到端成功率或质量分数，常使用基于大语言模型的评判或自动化指标。
  - 关键差异：部分工作聚焦于窄定义任务（如 rebuttal 写作、编码），另一些则瞄准开放式自主研究循环；评测目标从制品质量到流程遵循各不相同。
  - 趋势演进：从 2024 年到 2026 年，领域正从单任务基准（SciCode、Chain of Ideas）转向集成多阶段的自主研究系统（Agent Laboratory、Hypothesis-Tree
    Refinement）以及对研究智能体的元评测（ReportBench）。
  - 开放问题：如何验证基准分数与真实世界研究生产力的相关性，以及当前智能体能否处理真正科学发现中的模糊性和长反馈周期。
  literature_review:
    line_of_work_matrix:
    - line: Domain-specific research task benchmarks
      what_it_solves: Provides reproducible, scientist-curated tasks (e.g., coding,
        rebuttal) to measure agent capabilities on narrow research activities.
      what_remains_open: Whether success on these isolated tasks transfers to end-to-end
        research workflows, and coverage of diverse scientific domains beyond the
        curated set.
    - line: Autonomous research pipeline frameworks
      what_it_solves: Proposes agent architectures that chain multiple research stages
        (idea generation, experimentation, writing) to simulate autonomous scientific
        discovery.
      what_remains_open: Evaluation is often based on final output quality rather
        than intermediate decision quality; the frameworks lack standardized benchmarks
        for comparing different pipeline designs.
    - line: Idea generation and hypothesis refinement methods
      what_it_solves: Focuses on the early-stage research process of generating novel
        ideas or refining hypotheses using LLM agents, often with tree-search or iterative
        prompting.
      what_remains_open: Novelty and feasibility of generated ideas are hard to assess
        automatically; human expert validation is costly and not standardized across
        studies.
    - line: Meta-evaluation of research agents
      what_it_solves: Creates benchmarks that evaluate research agents by having them
        produce academic artifacts (e.g., surveys) and then judging the output with
        automated metrics or LLM judges.
      what_remains_open: The alignment between automated evaluation metrics and human
        peer review remains unverified; the benchmarks may not capture the iterative,
        collaborative nature of real research.
    consensus:
    - Research agents are evaluated primarily through task completion metrics on curated
      datasets or simulated research scenarios.
    - LLM-based judges are widely adopted as a scalable, albeit imperfect, substitute
      for human evaluation.
    - There is a shared assumption that decomposing research into sub-tasks (coding,
      writing, reviewing) makes the problem tractable for current agents.
    disagreements:
    - 'Evaluation granularity: some works assess the final artifact (e.g., a generated
      paper or code), while others evaluate the process (e.g., hypothesis tree correctness).'
    - 'Task scope: benchmarks like SciCode target a single skill (coding), whereas
      ReportBench and autonomous research frameworks require multi-step integration
      of several skills.'
    - 'Interaction mode: systems like Agent Laboratory position the agent as an assistant
      to a human researcher, while Hypothesis-Tree Refinement aims for fully autonomous
      operation.'
    open_questions:
    - How can we design benchmarks that capture the open-ended, iterative, and failure-tolerant
      nature of real scientific research?
    - What is the minimal set of research sub-tasks that, if mastered, would indicate
      general research capability?
    - To what extent do current evaluation metrics (e.g., LLM-as-judge scores) correlate
      with downstream impact measures like publication acceptance or citation?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 领域特定的研究任务基准
      解决的问题: 提供可复现、由科学家策划的任务（如编码、rebuttal），以测量智能体在窄研究活动上的能力。
      尚未覆盖: 这些孤立任务的成功是否能迁移到端到端研究流程，以及基准对策划集之外多样科学领域的覆盖度。
    - 路线: 自主研究流水线框架
      解决的问题: 提出串联多个研究阶段（想法生成、实验、写作）的智能体架构，以模拟自主科学发现。
      尚未覆盖: 评估常基于最终输出质量而非中间决策质量；框架缺乏用于比较不同流水线设计的标准化基准。
    - 路线: 想法生成与假设精炼方法
      解决的问题: 聚焦于使用大语言模型智能体生成新颖想法或精炼假设的早期研究过程，常采用树搜索或迭代提示。
      尚未覆盖: 生成想法的新颖性和可行性难以自动评估；人类专家验证成本高且在不同研究中缺乏标准化。
    - 路线: 研究智能体的元评测
      解决的问题: 创建基准，让研究智能体生成学术制品（如综述），然后用自动化指标或大语言模型评判来评估输出。
      尚未覆盖: 自动化评测指标与人类同行评审之间的一致性尚未验证；基准可能无法捕捉真实研究的迭代协作本质。
    共识:
    - 研究智能体主要通过策划数据集或模拟研究场景中的任务完成指标来评估。
    - 基于大语言模型的评判被广泛采用，作为人类评估的可扩展但不完美的替代。
    - 存在一个共同假设：将研究分解为子任务（编码、写作、评审）使问题对当前智能体变得可处理。
    分歧:
    - 评估粒度：部分工作评估最终制品（如生成的论文或代码），而另一些评估过程（如假设树的正确性）。
    - 任务范围：像 SciCode 这样的基准针对单一技能（编码），而 ReportBench 和自主研究框架需要多技能的多步集成。
    - 交互模式：Agent Laboratory 等系统将智能体定位为人类研究者的助手，而 Hypothesis-Tree Refinement 则瞄准完全自主运行。
    开放问题:
    - 如何设计能捕捉真实科学研究开放式、迭代和容错本质的基准？
    - 掌握哪些最小研究子任务集，能预示通用研究能力？
    - 当前评测指标（如大语言模型评判分数）在多大程度上与发表接受或引用等下游影响力指标相关？
