  related_work_outline:
  - 'Mainstream direction: Multi-agent LLM pipelines that automate literature review,
    hypothesis generation, experimental design, and manuscript writing, with internal
    verification loops and knowledge retrieval as core components.'
  - 'Shared research pattern: Iterative refine-and-critique cycles where specialized
    agents handle distinct scholarly tasks, guided by rubrics, world models, or evolutionary
    search, and evaluated against human baselines or LLM judges.'
  - 'Key differences: Systems target either survey generation (ARISE) or end-to-end
    discovery (ReasFlow, Kosmos, EvoMaster); some use domain-specific symbolic verification
    (ReasFlow in mathematics) while others rely on empirical benchmarks (BAISBench
    in biology); evaluation ranges from rubric-based LLM scores to human expert accuracy
    ratings.'
  - 'Trend evolution: From 2023–2026, the field moved from isolated literature generation
    tools to integrated, self-evolving agent frameworks operating across multiple
    scientific domains, with a growing emphasis on failure analysis, scalability,
    and reproducibility.'
  - 'Open questions: How to guarantee factual accuracy beyond 80% in long-horizon
    runs, how to design evaluation benchmarks that capture genuine scientific novelty,
    and how to mitigate memory degradation and implementation drift in autonomous
    pipelines.'
  related_work_outline_zh:
  - 主流方向：多智能体LLM流水线，自动化文献综述、假设生成、实验设计和手稿撰写，以内置验证循环和知识检索为核心组件。
  - 研究共性：迭代优化与批判循环，由专门智能体执行不同学术任务，通过评分准则、世界模型或进化搜索进行引导，并与人类基线或LLM评委进行对比评估。
  - 关键差异：系统目标分为综述生成（ARISE）和端到端发现（ReasFlow、Kosmos、EvoMaster）；部分依赖领域特定的符号验证（ReasFlow在数学中），部分依赖实证基准（BAISBench在生物学中）；评估方式从基于准则的LLM评分到人类专家准确率评级。
  - 趋势演进：2023至2026年间，领域从孤立的文献生成工具发展为跨多个科学领域的集成化、自演化智能体框架，越来越重视失败分析、可扩展性和可复现性。
  - 开放问题：长周期运行中如何保证事实准确性超过80%，如何设计能捕捉真正科学新颖性的评估基准，以及如何缓解自主流水线中的记忆退化和实现漂移。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey and literature synthesis engines
      what_it_solves: Generates structured, comprehensive academic surveys from large
        corpora by iteratively expanding topics, curating citations, and refining
        drafts through rubric-guided multi-agent review.
      what_remains_open: Assurance that rubric-aligned quality scores translate to
        real academic value, and coverage of non-English, low-resource, or rapidly
        evolving fields is unverified.
    - line: End-to-end autonomous scientific discovery pipelines
      what_it_solves: Performs full research cycles—data analysis, literature search,
        hypothesis generation, and experimental validation—resulting in traceable
        scientific manuscripts with minimal human intervention.
      what_remains_open: Factual accuracy of generated statements is capped around
        80%, and system behavior beyond 20 iterative cycles, or in domains with sparse
        training data, is unknown.
    - line: Benchmarks and evaluation frameworks for AI scientists
      what_it_solves: Provides standardized tasks, human baselines, and metrics to
        measure progress in autonomous biological discovery, enabling comparison across
        different agent architectures.
      what_remains_open: Existing benchmarks are limited to single-cell transcriptomics;
        they do not cover broader scientific reasoning, novel discovery assessment,
        or alignment with real-world expert utility.
    - line: Failure mode analysis and reliability engineering
      what_it_solves: Documents recurring failure patterns—bias toward training defaults,
        implementation drift, memory degradation, overexcitement—and derives design
        principles for more robust autonomous research systems.
      what_remains_open: The identified failure modes are based on a small number
        of case studies; no systematic, large-scale empirical validation of the proposed
        design principles has been conducted.
    consensus:
    - Multi-agent LLM architectures are the dominant paradigm for automating scholarly
      tasks, with agents assuming specialized roles such as ideation, implementation,
      review, and editing.
    - Iterative refinement with internal or external feedback loops improves output
      quality across survey generation, hypothesis formation, and manuscript writing.
    - Human expert baselines or curated benchmarks are essential for evaluating AI
      scientist systems, though the evaluation metrics (e.g., rubric scores, statement
      accuracy, task completion rate) vary widely.
    disagreements:
    - Some systems focus on producing polished literature surveys as the final product,
      while others aim for complete, data-driven scientific discoveries that include
      experimental results.
    - 'Verification strategies differ: one approach uses domain-specific symbolic
      reasoning to audit logical coherence, while others rely on empirical benchmarks
      or LLM-based review rubrics.'
    - 'Deployment assumptions vary: a few frameworks are designed to be domain-agnostic
      and self-evolving, whereas others are tightly coupled to a specific scientific
      domain (e.g., applied mathematics, computational biology) with hard-coded knowledge
      bases.'
    - 'Evaluation of success is multi-dimensional: some works measure rubric alignment
      or Jupyter notebook completion, others report human-rated accuracy of scientific
      statements, and at least one uses acceptance at a peer-reviewed workshop as
      a proxy.'
    open_questions:
    - How can we ensure that AI-generated scientific claims remain factually accurate
      and logically consistent over hundreds of autonomous cycles, given that current
      accuracy peaks at about 80%?
    - What benchmark designs can capture the novelty, reproducibility, and real-world
      impact of autonomous discoveries, beyond narrow task-specific metrics?
    - Can the failure modes identified in a small set of ML research attempts (e.g.,
      overexcitement, implementation drift) generalize to other scientific disciplines,
      and how should mitigation strategies differ?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述与文献综合引擎
      解决的问题: 通过迭代扩展主题、管理引用并通过评分准则引导的多智能体评审改进草稿，从大型语料库生成结构化、全面的学术综述。
      尚未覆盖: 评分准则对齐的质量分数能否转化为真实学术价值尚未得到保证，且对非英语、低资源或快速演进领域的覆盖未经证实。
    - 路线: 端到端自主科学发现流水线
      解决的问题: 执行完整研究循环——数据分析、文献搜索、假设生成和实验验证——最终产出可追溯的科学手稿，几乎无需人工干预。
      尚未覆盖: 生成陈述的事实准确性被限制在约80%，且超过20个迭代周期或在训练数据稀疏的领域中的系统行为未知。
    - 路线: AI科学家的基准与评估框架
      解决的问题: 提供标准化任务、人类基线和指标，以衡量自主生物学发现中的进展，使得不同智能体架构可进行比较。
      尚未覆盖: 现有基准仅限于单细胞转录组学；缺乏对更广泛科学推理、新颖发现评估或与真实世界专家效用对齐的覆盖。
    - 路线: 失败模式分析与可靠性工程
      解决的问题: 记录重复出现的失败模式——对训练数据默认值的偏见、实现漂移、记忆退化、过度兴奋——并推导出更稳健的自主研究系统的设计原则。
      尚未覆盖: 识别的失败模式仅基于少量案例研究；尚未对提出的设计原则进行系统化、大规模的实证验证。
    共识:
    - 多智能体LLM架构是自动化学术任务的主流范式，智能体扮演构思、实现、评审和编辑等专门角色。
    - 通过内部或外部反馈回路进行迭代优化，能够提升综述生成、假设形成和手稿撰写的输出质量。
    - 人类专家基线或精心策划的基准对于评估AI科学家系统至关重要，尽管评估指标（如评分准则分数、陈述准确率、任务完成率）差异很大。
    分歧:
    - 部分系统专注于生成精炼的文献综述作为最终产品，而其他系统则旨在实现包含实验结果的完整、数据驱动的科学发现。
    - 验证策略不同：一种方法使用领域特定的符号推理来审计逻辑一致性，而其他方法则依赖实证基准或基于LLM的评审准则。
    - 部署假设各异：少数框架被设计为领域无关且可自我演化，而其他框架则与特定科学领域（如应用数学、计算生物学）紧密耦合，并带有硬编码的知识库。
    - 成功的评估是多维度的：一些工作衡量评分准则对齐或Jupyter笔记本完成度，其他工作报告人类评定的科学陈述准确率，至少有一项工作以被同行评审研讨会接收作为代理指标。
    开放问题:
    - 鉴于当前准确率峰值约为80%，如何确保AI生成的科学主张在数百个自主周期中保持事实准确和逻辑一致？
    - 何种基准设计能够捕捉自主发现的新颖性、可复现性和真实世界影响力，而超越狭窄的特定任务指标？
    - 在少量ML研究尝试中识别的失败模式（如过度兴奋、实现漂移）能否推广到其他科学学科？缓解策略应如何因学科而异？
