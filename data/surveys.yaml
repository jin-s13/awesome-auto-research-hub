  related_work_outline:
  - 'Mainstream direction: Building end-to-end AI scientist systems that autonomously
    generate, evaluate, and refine hypotheses by integrating literature search, data
    analysis, and code execution within iterative loops.'
  - 'Shared research pattern: All systems rely on large language models as the core
    reasoning engine, decompose scientific discovery into multi-step workflows, and
    emphasize iterative optimization of hypotheses against experimental feedback.'
  - 'Key differences: Systems diverge in architecture (single-agent vs. multi-agent),
    search strategy (evolutionary, reinforcement learning, or direct LLM generation),
    use of structured world models for information sharing, and evaluation methodology
    (benchmark tasks vs. real-world experimental validation).'
  - 'Trend evolution: From 2023 to 2026, the field moved from isolated proof-of-concept
    agents to more complex multi-agent frameworks, standardized benchmarks, and systematic
    failure analysis, indicating a shift toward reliability and reproducibility.'
  - 'Open questions: How to guarantee novelty and practical utility of generated hypotheses;
    how to detect and prevent common failure modes such as data leakage and metric
    misuse; how to design cross-domain evaluation standards that align with real scientific
    impact.'
  related_work_outline_zh:
  - 主流方向：构建端到端的AI科学家系统，通过整合文献搜索、数据分析和代码执行，在迭代循环中自主生成、评估和优化假设。
  - 研究共性：所有系统均以大语言模型为核心推理引擎，将科学发现分解为多步骤工作流，并强调基于实验反馈对假设进行迭代优化。
  - 关键差异：系统在架构（单智能体 vs. 多智能体）、搜索策略（进化、强化学习或直接LLM生成）、是否使用结构化世界模型共享信息，以及评估方法（基准任务 vs.
    真实实验验证）上存在分歧。
  - 趋势演进：2023至2026年间，领域从孤立的概念验证智能体发展为更复杂的多智能体框架、标准化基准和系统性失败分析，表明向可靠性和可复现性转变。
  - 开放问题：如何确保生成假设的新颖性与实际效用；如何检测和防止数据泄露、指标误用等常见失败模式；如何设计跨领域且与真实科学影响一致的评估标准。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous discovery systems
      what_it_solves: Automating the full scientific discovery cycle—from hypothesis
        generation and experimental design to result interpretation and iterative
        refinement—within a single integrated framework.
      what_remains_open: Long-horizon reliability beyond limited cycles, cross-domain
        generalization without task-specific tuning, and objective metrics for hypothesis
        quality that go beyond downstream task performance.
    - line: Structured search and optimization for hypothesis generation
      what_it_solves: Efficiently exploring large combinatorial or symbolic hypothesis
        spaces by combining evolutionary algorithms, reinforcement learning, or tree-based
        backtracking with LLM-driven proposal and reflection.
      what_remains_open: Whether the search strategy itself introduces bias toward
        certain hypothesis forms, and how well these methods transfer to domains where
        the hypothesis space is not easily formalized as equations or discrete structures.
    - line: Evaluation frameworks and failure analysis for AI scientists
      what_it_solves: Providing taxonomies, benchmarks, and controlled experiments
        to systematically assess capabilities, limitations, and failure modes of automated
        research systems.
      what_remains_open: Lack of consensus on evaluation dimensions that capture scientific
        novelty and impact; limited coverage of embodied, delayed-feedback, or ethically
        constrained research settings.
    - line: Multi-agent collaboration and knowledge sharing
      what_it_solves: Enabling specialized agents (e.g., literature search, data analysis)
        to coordinate and share intermediate findings through structured representations,
        improving discovery efficiency and traceability.
      what_remains_open: Standardized inter-agent communication protocols, prevention
        of error propagation across agents, and validation that multi-agent setups
        outperform well-designed single-agent baselines under comparable compute budgets.
    consensus:
    - Large language models serve as the central reasoning and code-generation engine
      across all systems.
    - Iterative closed-loop workflows—where hypotheses are proposed, tested against
      data or simulation, and refined—are universally adopted.
    - Current systems exhibit significant reliability gaps, particularly in evidence
      preservation, reproducibility, and avoidance of subtle evaluation pitfalls.
    - Human oversight remains necessary for validating final outputs, despite increasing
      autonomy in intermediate steps.
    disagreements:
    - 'Architecture: single-agent systems with internal world models versus multi-agent
      systems with specialized roles and explicit communication channels.'
    - 'Search paradigm: evolutionary or reinforcement-learning-guided exploration
      versus direct LLM generation with backtracking versus purely prompt-based iterative
      refinement.'
    - 'Evaluation target: benchmark accuracy on curated tasks versus real-world experimental
      validation in wet-lab or simulation environments.'
    - 'Domain scope: general-purpose frameworks applicable across sciences versus
      systems tightly coupled to a specific discipline such as biology or symbolic
      regression.'
    open_questions:
    - What evaluation protocols can reliably measure the novelty and practical utility
      of AI-generated hypotheses beyond proxy metrics?
    - How can systems automatically detect and mitigate failure modes like data leakage,
      inappropriate baseline selection, and post-hoc selection bias without human
      intervention?
    - Under what conditions does increasing autonomy degrade the scientific quality
      of outputs, and how should the trade-off between automation and human judgment
      be managed?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主发现系统
      解决的问题: 在单一集成框架内自动化完整的科学发现循环——从假设生成、实验设计到结果解释和迭代优化。
      尚未覆盖: 有限周期之外的长期可靠性、无需任务特定调整的跨领域泛化，以及超越下游任务性能的假设质量客观指标。
    - 路线: 面向假设生成的结构化搜索与优化
      解决的问题: 通过将进化算法、强化学习或基于树的回溯与LLM驱动的提议和反思相结合，高效探索大型组合或符号假设空间。
      尚未覆盖: 搜索策略本身是否引入对特定假设形式的偏好，以及这些方法在假设空间不易形式化为方程或离散结构的领域中迁移效果如何。
    - 路线: AI科学家的评估框架与失败分析
      解决的问题: 提供分类法、基准测试和受控实验，以系统评估自动化研究系统的能力、局限性和失败模式。
      尚未覆盖: 缺乏对捕捉科学新颖性和影响力的评估维度的共识；对具身、延迟反馈或伦理受限研究环境的覆盖有限。
    - 路线: 多智能体协作与知识共享
      解决的问题: 使专业化智能体（如文献搜索、数据分析）能够通过结构化表示协调并共享中间发现，从而提高发现效率和可追溯性。
      尚未覆盖: 标准化的智能体间通信协议、防止错误在智能体间传播，以及在可比计算预算下多智能体设置是否优于设计良好的单智能体基线的验证。
    共识:
    - 大语言模型是所有系统的核心推理和代码生成引擎。
    - 迭代闭环工作流——提出假设、根据数据或仿真进行测试并优化——被普遍采用。
    - 当前系统在证据保存、可重复性和避免微妙评估陷阱方面存在显著的可靠性差距。
    - 尽管中间步骤的自主性不断提高，人类监督对于验证最终输出仍然必要。
    分歧:
    - 架构：具有内部世界模型的单智能体系统 vs. 具有专门角色和显式通信渠道的多智能体系统。
    - 搜索范式：进化或强化学习引导的探索 vs. 带有回溯的直接LLM生成 vs. 纯粹基于提示的迭代优化。
    - 评估目标：在策划任务上的基准准确率 vs. 在湿实验室或仿真环境中的真实实验验证。
    - 领域范围：适用于多科学的通用框架 vs. 与特定学科（如生物学或符号回归）紧密耦合的系统。
    开放问题:
    - 哪些评估协议能够可靠地衡量AI生成假设的新颖性和实际效用，而不仅仅是代理指标？
    - 系统如何在没有人工干预的情况下自动检测和缓解数据泄露、不恰当基线选择以及事后选择偏差等失败模式？
    - 在什么条件下，提高自主性会降低输出的科学质量，以及应如何管理自动化与人类判断之间的权衡？
