  - 'Trend evolution: From 2023–2026, the field is shifting from single-algorithm
    Bayesian optimization toward multi-agent LLM systems, from isolated experiments
    toward collaborative distributed labs, and from ignoring measurement noise toward
    actively co-optimizing noise and property discovery.'
