  related_work_outline_zh:
  - 主流方向：构建端到端自主研究流水线，将LLM驱动的构思、代码生成、实验和论文撰写串联为单一智能体工作流，并越来越强调通过验证门控和结构化多智能体协调来提升可靠性。
