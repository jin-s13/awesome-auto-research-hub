  related_work_outline:
  - 'Mainstream direction: building autonomous agents that perform end-to-end scientific
    discovery and evaluating them via standardized benchmark environments with realistic
    constraints.'
  - 'Shared research pattern: moving beyond outcome-only metrics to assess reasoning
    quality, experimental design soundness, and safety, often through structured audit
    or trajectory analysis.'
  - 'Key differences: some works target full-task completion on fixed benchmarks,
    while others focus on specific sub-problems such as question formation, code library
    distillation, objective function design, or safety reasoning, and they differ
    in whether they evaluate mechanism fidelity versus task success.'
  - 'Trend evolution: from 2024 environment-centric benchmarking toward 2025–2026
    method-centric enhancements (tool augmentation, goal evolution, safety) and reflective
    position papers that challenge evaluation assumptions.'
  - 'Open questions: how to design benchmarks that capture mechanism correctness and
