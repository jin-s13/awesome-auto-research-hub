  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，整合LLM驱动的假设生成、代码级实验执行和闭环优化，从单步自动化迈向完整研究管道。
  - 研究共性：多数工作将主动学习或贝叶斯优化与自动化数据采集结合，以仿真或简单物理系统作为概念验证，同时承认需要人类监督和数据质量管理。
  - 关键差异：部分系统追求最少人工干预的完全自主，另一些则嵌入人在回路进行指导；评测范围从玩具级调色任务到材料表征，基础设施从平台依赖（nanoHUB）到基于HPC的作业管理各异。
