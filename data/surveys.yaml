  related_work_outline:
  - 'Mainstream direction: LLM-based multi-agent systems that automate literature
    review, hypothesis generation, and report writing within scientific discovery,
    emphasizing self-evolution and human-AI collaboration.'
  - 'Shared research pattern: iterative loops combining literature retrieval, data
    analysis, internal verification, and reflective critique to produce structured,
    traceable outputs.'
  - 'Key differences: task granularity ranges from full survey generation to specific
    question answering; evaluation relies on either automated benchmarks or qualitative
    human expert judgment; system architecture varies from single-agent cycles to
    multi-agent tree-based workflows with evolutionary search.'
  - 'Trend evolution: between 2025 and 2026, the frontier shifted from single-task
    automation toward multi-agent, self-evolving, end-to-end discovery systems, while
    standardized benchmarks and reliability validation lag behind.'
  - 'Open questions: how to ensure long-horizon factual accuracy and narrative coherence
    in synthesized literature; how to design cross-domain evaluation that aligns with
    genuine scientific utility; how to prevent self-evolving systems from drifting
    away from intended goals.'
  related_work_outline_zh:
  - 主流方向：基于LLM的多智能体系统，在科学发现中自动化文献综述、假设生成和报告撰写，强调自我演化与人机协作。
  - 研究共性：采用迭代循环，结合文献检索、数据分析、内部验证和反思批判，生成结构化、可追溯的输出。
  - 关键差异：任务粒度从完整综述生成到特定科学问答不等；评估依赖自动化基准或人类专家定性判断；系统架构从单智能体固定循环到多智能体树形工作流结合进化搜索。
  - 趋势演进：2025至2026年间，前沿从单任务自动化快速转向多智能体、自我演化、端到端发现系统，而标准化基准和可靠性验证仍滞后。
  - 开放问题：如何确保长周期文献综合的事实准确性和叙述连贯性；如何设计跨领域、与真实科学价值对齐的评估框架；如何防止自演化系统偏离预期目标。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey and review generation
      what_it_solves: Automates the end-to-end pipeline of literature search, filtering,
        summarization, and structured writing to produce comprehensive academic surveys,
        reducing manual effort.
      what_remains_open: Factual accuracy, citation completeness, and critical depth
        still fall short of expert human review; verification beyond surface-level
        automatic metrics is missing.
    - line: Literature intelligence as a core module of AI scientist systems
      what_it_solves: Integrates literature retrieval and knowledge extraction into
        autonomous discovery loops, supporting hypothesis generation, result validation,
        and cross-domain synthesis within a single run.
      what_remains_open: The synergy between literature search and data analysis remains
        brittle; world models for sharing knowledge across agents lack validation
        for long-term coherence and scalability.
    - line: Benchmarking and evaluation of literature intelligence
      what_it_solves: Provides standardized tasks, datasets, and metrics to compare
        literature intelligence systems, and establishes human baselines for tasks
        such as scientific question answering.
      what_remains_open: Existing benchmarks are domain-specific and do not capture
        the novelty or real scientific impact of generated literature; alignment between
        proxy metrics and actual research utility is unproven.
    - line: Multi-agent and self-evolving frameworks for research automation
      what_it_solves: Enables flexible and scalable exploration of literature and
        hypotheses through agent specialization, evolutionary search, and self-reflection,
        improving research breadth and inspectability.
      what_remains_open: Reproducibility and external validation across diverse hardware
        and user settings are absent; self-evolution can drift from intended goals
        without proper guardrails.
    consensus:
    - All systems employ LLM-based agents as the core reasoning and generation engine
      for literature-related tasks.
    - They adopt iterative refinement loops that include verification, review, or
      self-critique to improve output quality.
    - Human-AI collaboration is emphasized, with the human serving as a reviewer or
      principal investigator rather than being fully replaced.
    disagreements:
    - 'Evaluation targets differ: some rely on automated benchmark scores, while others
      depend on qualitative human expert assessment, leading to claims that are not
      directly comparable.'
    - Task granularity varies from generating full survey papers to answering specific
      scientific questions, making cross-system comparison difficult.
    - Architectural choices range from single-agent finite cycles to multi-agent tree-based
      workflows with evolutionary search, affecting scalability and interpretability.
    - 'Domain specificity contrasts: some systems are built for a single scientific
      domain, while others claim domain-agnosticism, but evidence of cross-domain
      generalization is limited.'
    open_questions:
    - How can long-horizon literature synthesis maintain factual accuracy and coherent
      narrative when evidence is drawn from hundreds of agent cycles?
    - What evaluation framework can capture the scientific novelty and utility of
      automatically generated literature reviews beyond surface-level accuracy?
    - How do self-evolving literature systems avoid concept drift while exploring
      novel hypotheses, and what guardrails are needed for safe deployment in critical
      domains?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述与回顾生成
      解决的问题: 将文献搜索、筛选、总结和结构化写作合并为端到端流程，自动生成全面学术综述，减少人工负担。
      尚未覆盖: 事实准确性、引用完整性和批判性深度仍不及专家人工评审；缺乏超越表面自动化指标的验证手段。
    - 路线: 作为AI科学家核心模块的文献智能
      解决的问题: 将文献检索和知识提取整合到自主发现循环中，在一次运行中支持假设生成、结果验证和跨领域综合。
      尚未覆盖: 文献搜索与数据分析的协同仍较脆弱；用于跨智能体知识共享的世界模型缺乏长期连贯性和可扩展性验证。
    - 路线: 文献智能的基准与评估
      解决的问题: 提供标准化任务、数据集和指标，以比较文献智能系统，并为科学问答等任务建立人类基线。
      尚未覆盖: 现有基准针对特定领域，无法捕捉生成文献的新颖性或真实科学影响；代理指标与实际研究效用之间的对齐未经验证。
    - 路线: 多智能体与自演化研究自动化框架
      解决的问题: 通过智能体专业化、进化搜索和自我反思，实现对文献和假设的灵活、可扩展探索，提升研究广度和可检查性。
      尚未覆盖: 缺乏跨硬件和用户设置的可复现性和外部验证；自演化过程若无适当防护可能偏离预期目标。
    共识:
    - 所有系统均以基于LLM的智能体作为文献相关任务的核心推理和生成引擎。
    - 采用包含验证、评审或自我批判的迭代优化循环，以提升输出质量。
    - 强调人机协作，人类充当评审者或首席研究员，而不是完全被取代。
    分歧:
    - 评估目标不同：有的依赖自动化基准分数，有的依赖人类专家定性评估，导致性能主张不可直接比较。
    - 任务粒度差异大：从生成完整综述论文到回答特定科学问题，跨系统对比困难。
    - 架构选择多样：从单智能体有限循环到多智能体树形工作流结合进化搜索，影响可扩展性和可解释性。
    - 领域泛化性对立：部分系统为单一科学领域构建，另一些声称领域无关，但跨领域泛化的证据有限。
    开放问题:
    - 当证据来自数百个智能体周期时，长周期文献综合如何保持事实准确性和叙述连贯性？
    - 何种评估框架能够捕捉自动生成文献综述的科学新颖性和效用，而非仅停留在表面准确度？
    - 自演化文献系统在探索新假设时如何避免概念漂移，在关键领域安全部署需要哪些防护？
