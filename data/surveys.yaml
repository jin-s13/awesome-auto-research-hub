  related_work_outline:
  - 'Mainstream direction: Building autonomous AI agents that can propose hypotheses,
    design and execute experiments, and self-correct based on failures, with growing
    emphasis on domain-specific verification, human-in-the-loop collaboration, and
    scalability across scientific disciplines.'
  - 'Shared research pattern: All systems decompose the research loop into idea generation,
    experimentation, and result analysis, incorporating some form of verification
    or reflection to improve reliability; they increasingly adopt multi-agent architectures
    and structured workflows.'
  - 'Key differences: Hypothesis generation mechanisms range from structured debate
    to evolutionary search and tree-based exploration; verification strategies vary
    from physics-based vision-language gates to multi-hypothesis failure attribution;
    human involvement spans from full autonomy to selective high-leverage intervention.'
  - 'Trend evolution: From 2025 to 2026, the field shifted from single-domain autonomous
    scientists (e.g., CFD) to domain-agnostic frameworks, from basic reflection to
    causal failure diagnosis, and from fully autonomous operation to interactive human-AI
    research platforms, alongside the emergence of standardized benchmarks.'
  - 'Open questions: How to guarantee novelty and correctness of generated hypotheses;
    how to scale verification to diverse, noisy scientific domains; what is the optimal
    human-AI collaboration strategy; how to evaluate long-term scientific discovery
    rather than short-term task success.'
  related_work_outline_zh:
  - 主流方向：构建能自主提出假设、设计并执行实验、基于失败自我纠正的AI智能体，越来越强调领域特定验证、人机协作和跨学科可扩展性。
  - 研究共性：所有系统都将研究循环分解为构思、实验和结果分析，并引入某种验证或反思以提升可靠性；它们越来越多地采用多智能体架构和结构化工作流。
  - 关键差异：假设生成机制从结构化辩论到进化搜索和树形探索不等；验证策略从基于物理的视觉-语言门控到多假设失败归因；人类参与程度从完全自主到选择性高杠杆干预。
  - 趋势演进：从2025到2026年，领域从单域自主科学（如CFD）转向域无关框架，从简单反思转向因果失败诊断，从完全自主操作转向交互式人机研究平台，同时出现了标准化基准。
  - 开放问题：如何保证生成假设的新颖性和正确性；如何将验证扩展到多样、嘈杂的科学领域；最优人机协作策略是什么；如何评估长期科学发现而非短期任务成功。
  literature_review:
    line_of_work_matrix:
    - line: Autonomous research pipeline design
      what_it_solves: Automating the end-to-end scientific discovery loop from hypothesis
        generation to experimentation and reporting, often with multi-agent orchestration.
      what_remains_open: Reliability under domain-specific constraints, verification
        of intermediate results, and fully autonomous paper writing remain unresolved;
        most systems still exhibit brittle failures.
    - line: Hypothesis generation and refinement mechanisms
      what_it_solves: Producing testable, novel ideas through structured debate, evolutionary
        search, or multi-hypothesis failure attribution, thereby improving the quality
        of the research trajectory.
      what_remains_open: Ensuring generated ideas are genuinely novel beyond combinatorial
        variations and aligning them with expert human judgment; attribution accuracy
        for failure diagnosis still has gaps.
    - line: Failure diagnosis and self-correction
      what_it_solves: Detecting and recovering from experiment failures via causal
        analysis, self-healing execution, or physics-aware verification, thereby increasing
        the success rate of autonomous loops.
      what_remains_open: Coverage of failure modes is narrow; existing verification
        gates can miss silent errors (e.g., 2 of 16 missed in ablation), and diagnostic
        accuracy under novel conditions is untested.
    - line: Human-AI collaboration models
      what_it_solves: Integrating human judgment at critical decision points to steer
        research, prevent hallucinations, and provide domain expertise, balancing
        autonomy with oversight.
      what_remains_open: Optimal intervention granularity and timing are unclear;
        scaling to multiple users and cross-disciplinary teams requires further study.
    - line: Evaluation and benchmarking for AI scientists
      what_it_solves: Providing standardized tasks and metrics to compare systems,
        including domain-specific benchmarks (e.g., omics data) and human baselines.
      what_remains_open: Existing benchmarks cover limited domains; correlation between
        proxy metrics and real-world discovery impact is not established; long-term
        autonomous research remains unassessed.
    consensus:
    - Autonomous scientific discovery requires explicit verification mechanisms to
      prevent hallucinated or invalid results.
    - Multi-agent architectures and structured workflows improve reliability over
      monolithic single-agent approaches.
    - Human collaboration, even at selective points, boosts performance over full
      autonomy or exhaustive step-by-step oversight.
    - Current systems are not yet capable of fully autonomous, publication-ready research;
      generating conference-quality papers remains an open problem.
    - Standardized benchmarks are essential for measuring progress and comparing systems.
    disagreements:
    - 'Hypothesis generation approaches: structured debate vs. evolutionary search
      with tree-based exploration vs. self-improving iterative refinement.'
    - 'Verification strategy: physics-based vision-language gate checking rendered
      outputs vs. multi-hypothesis failure attribution from execution traces vs. verifiable
      result reporting that constrains outputs to measured values.'
    - 'Human role: targeted intervention at high-leverage decisions vs. interactive
      dashboard with continuous oversight vs. full autonomy with self-healing.'
    - 'Domain specificity: some systems are tightly coupled to a single domain (e.g.,
      CFD) with domain-aware verification, while others are domain-agnostic foundational
      frameworks.'
    - 'Evaluation scope: task-specific benchmarks (like cell annotation) vs. broader
      multi-domain experiment suites vs. internal case studies judged by AI experts.'
    open_questions:
    - How can verification gates be made robust to novel failure modes and domain
      shifts without extensive domain-specific engineering?
    - What metrics reliably predict the long-term scientific value of an autonomous
      research system, beyond short-term benchmark scores?
    - How can human-AI collaboration be optimized to minimize human effort while maximizing
      research quality and novelty?
    - Can current hypothesis generation methods produce truly paradigm-shifting ideas,
      or are they limited to combining known patterns?
    - What are the safety and ethical implications of deploying autonomous research
      agents in high-stakes scientific domains?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自主研究流水线设计
      解决的问题: 自动化从假设生成到实验和报告的全流程科学发现，常采用多智能体编排。
      尚未覆盖: 领域特定约束下的可靠性、中间结果验证和完全自主论文写作仍未解决；大多数系统仍存在脆性失败。
    - 路线: 假设生成与优化机制
      解决的问题: 通过结构化辩论、进化搜索或多假设失败归因产生可测试、新颖的想法，从而提升研究轨迹质量。
      尚未覆盖: 确保生成的想法在组合变异之外真正新颖，并与专家判断对齐；失败归因的准确性仍有缺口。
    - 路线: 失败诊断与自我纠正
      解决的问题: 通过因果分析、自愈执行或物理感知验证来检测和恢复实验失败，提高自主循环的成功率。
      尚未覆盖: 失败模式覆盖范围窄；现有验证门控可能遗漏静默错误（如消融中16个遗漏2个），新条件下的诊断准确性未经验证。
    - 路线: 人机协作模型
      解决的问题: 在关键决策点引入人类判断，引导研究、防止幻觉并提供领域知识，在自主与监督间取得平衡。
      尚未覆盖: 最优干预粒度和时机不明确；扩展到多用户和跨学科团队需要进一步研究。
    - 路线: AI科学家评测与基准
      解决的问题: 提供标准化任务和指标以比较系统，包括领域特定基准（如组学数据）和人类基线。
      尚未覆盖: 现有基准覆盖领域有限；代理指标与真实发现影响力之间的关联未建立；长期自主研究仍无法评估。
    共识:
    - 自主科学发现需要显式验证机制以防止幻觉或无效结果。
