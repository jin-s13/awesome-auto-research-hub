  - 'Trend evolution: From 2024 general frameworks and virtual benchmarks (The AI
    Scientist, DISCOVERYWORLD) to 2025–2026 domain-specific, self-correcting, and
    physically verified systems (AI Scientist-v2, SAGE, AI CFD Scientist), the frontier
    is shifting from feasibility to trustworthiness and real-world utility.'
  - 'Open questions: How to design evaluation protocols that correlate with genuine
