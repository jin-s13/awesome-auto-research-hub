  - 关键差异：系统在人类监督的角色（完全自主 vs. 人机协作）、验证机制的选择（自动评审、领域特定物理检查或基准任务）以及领域专业化程度（通用 vs. 流体力学、生物学等）上存在分歧。
  - 趋势演进：从2024年的概念验证（The AI Scientist）到2025年工作坊级同行评审（AI Scientist v2），再到2026年的多智能体、领域专用和人机协作系统，展现出当前前沿内的快速成熟。
  - 开放问题：如何确保AI生成研究的新颖性和正确性；人类干预的合适粒度和时机是什么；如何设计与真实科学影响相关的评估；以及如何从狭窄的ML子领域扩展到开放式发现。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research frameworks
      what_it_solves: Automating the full scientific pipeline from idea generation
        and experiment execution to paper writing and even simulated review, reducing
        the cost and effort of exploratory research.
      what_remains_open: Inconsistent success rates, lack of robust fact-checking,
        and reliance on template code or narrow domains; no evidence that generated
        papers contain genuine novel insights beyond known patterns.
    - line: Domain-specific AI scientists
      what_it_solves: Adapting the generic autonomous research loop to a particular
        scientific field (e.g., computational fluid dynamics) by embedding domain
        knowledge, physic-aware verification, and specialized code interfaces.
      what_remains_open: Whether the gain over general frameworks is due to the domain-specific
        verification gate or the physics-aware scaffolding; generalization to other
        domains remains untested.
    - line: Multi-agent collaboration and human-in-the-loop systems
      what_it_solves: Improving reliability and idea quality through structured debate,
        self-healing execution, and targeted human interventions at high-leverage
        decision points, rather than fully autonomous or exhaustive oversight.
      what_remains_open: Optimal mode and granularity of human intervention; the cost
        of debiasing multi-agent consensus; and whether improved paper quality translates
        to better scientific outcomes.
    - line: Benchmarking and evaluation environments
      what_it_solves: Providing standardized tasks, metrics, and human baselines to
        measure progress of AI scientists, replacing ad-hoc validation with reproducible
        comparisons.
      what_remains_open: Benchmarks are limited to narrow domains (synthetic text
        worlds, single-cell data) and may not capture open-ended discovery; alignment
        between benchmark performance and real-world scientific contribution is unproven.
    - line: Surveys and system taxonomies
      what_it_solves: Organizing fragmented agentic AI systems into categories by
        domain, capability, and evaluation framework, and identifying cross-cutting
        challenges such as literature review automation and ethical concerns.
      what_remains_open: Taxonomies lack empirical validation that the proposed categories
        predict system behavior; they do not resolve the reliability and reproducibility
        issues they catalog.
    consensus:
    - Large language models can drive a complete scientific discovery loop, covering
      ideation, coding, experimentation, and manuscript drafting.
    - Every system requires some form of verification or validation checkpoint, whether
      automatic review, physics-aware vision-language gates, or benchmark-based evaluation,
      because raw outputs are frequently unreliable.
    - Current AI scientists are not yet mature enough for fully autonomous high-stakes
      research; reliability, reproducibility, and hallucination remain universal bottlenecks.
    disagreements:
    - 'Degree of autonomy: some frameworks push for full end-to-end automation, while
      others argue that human collaboration at strategic points yields higher-quality
      results.'
    - 'Verification strategy: approaches range from LLM-based automated reviewers
      to domain-specific physical validity checks to standardized task-based benchmarks,
      with no consensus on which best predicts genuine scientific merit.'
    - 'Evaluation setting: work is divided between real-world code execution on actual
      datasets and simulated environments with ground-truth mechanisms, creating tension
      between ecological validity and controllability.'
    - 'Domain generality: one line of work builds general-purpose systems applicable
      across ML subfields, while another creates domain-specific agents (CFD, omics)
      that embed expert knowledge, raising questions about transferability versus
      depth.'
    open_questions:
    - Can AI scientists produce genuinely novel, non-incremental discoveries, or are
      they limited to recombining existing patterns from the training data?
    - What is the minimal set of verification gates (e.g., execution, physics, statistics,
      peer review) needed to trust an AI-generated scientific claim?
    - How should human roles be designed to maximize the complementary strengths of
      AI and human scientists without introducing excessive bias or cost?
    - Do current benchmark achievements (e.g., workshop paper acceptance, ARC-Bench
      scores) correlate with long-term scientific impact, and how can we measure open-ended
      discovery?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究框架
      解决的问题: 将完整的科学流水线自动化，从想法生成、实验执行到论文撰写乃至模拟评审，降低探索性研究的成本和工作量。
      尚未覆盖: 成功率不稳定，缺乏可靠的事实核查，依赖模板代码或狭窄领域；没有证据表明生成的论文包含超越已知模式的全新洞见。
    - 路线: 领域特定的AI科学家
      解决的问题: 通过嵌入领域知识、物理感知验证和专用代码接口，将通用自主研究循环适配到特定科学领域（如计算流体动力学）。
      尚未覆盖: 相比通用框架的提升来源于领域特定验证门控还是物理感知脚手架；向其他领域的泛化能力未经测试。
    - 路线: 多智能体协作与人机协同系统
      解决的问题: 通过结构化辩论、自愈执行和在高杠杆决策点进行精准人工干预，提高可靠性和想法质量，而非完全自主或全流程监督。
      尚未覆盖: 人工干预的最佳模式和粒度；消除多智能体共识偏见的成本；论文质量的提升是否转化为更好的科学成果。
    - 路线: 基准测试与评估环境
      解决的问题: 提供标准化任务、指标和人类基线，以衡量AI科学家的进展，用可复现的比较取代临时验证。
      尚未覆盖: 基准测试限于狭窄领域（合成文本世界、单细胞数据），可能无法捕捉开放式发现；基准性能与真实科学贡献之间的一致性尚未证明。
    - 路线: 综述与系统分类
      解决的问题: 将碎片化的智能体AI系统按领域、能力和评估框架进行分类，识别文献综述自动化、伦理等跨领域挑战。
      尚未覆盖: 分类缺乏实证验证来证明这些类别能预测系统行为；它们并未解决所记录的可信度和可复现性问题。
    共识:
    - 大型语言模型可以驱动完整的科学发现循环，涵盖构思、编码、实验和论文撰写。
    - 每个系统都需要某种形式的验证或检查点，无论是自动评审、物理感知的视觉-语言门控，还是基于基准的评估，因为原始输出经常不可靠。
    - 当前的AI科学家尚未成熟到可以完全自主进行高风险研究；可信度、可复现性和幻觉问题是普遍瓶颈。
    分歧:
    - 自主程度：某些框架推动完全端到端自动化，而另一些则认为在关键点进行人类协作能产生更高质量的结果。
    - 验证策略：方法从基于LLM的自动评审员，到特定领域的物理有效性检查，再到标准化任务基准，没有共识确定哪种最能预测真正的科学价值。
    - 评估场景：工作分为在真实数据集上的实际代码执行和有真实机制的模拟环境，在生态效度和可控性之间存在张力。
    - 领域通用性：一条路线构建适用于ML各子领域的通用系统，另一条创建嵌入专家知识的领域特定智能体（CFD、组学），引发了关于可迁移性与深度的权衡问题。
    开放问题:
    - AI科学家能否产生真正新颖、非增量式的发现，还是仅限于重组训练数据中的既有模式？
    - 信任AI生成的科学主张所需的最小验证门控集（如执行、物理、统计、同行评审）是什么？
    - 应如何设计人类角色以最大化AI与人类科学家的互补优势，同时避免引入过多偏见或成本？
    - 当前的基准成就（如工作坊论文接收、ARC-Bench分数）是否与长期科学影响相关，以及如何衡量开放式发现？
