  - 主流方向：构建基于大语言模型的端到端智能体，自主完成从想法生成、编码、实验执行、结果分析到论文撰写的完整研究循环，并具备迭代改进能力。
  - 研究共性：系统将科学发现分解为假设、实验、撰写等子任务，利用LLM配合工具、记忆或多智能体角色执行，并通过自动评审或基准任务评估。
