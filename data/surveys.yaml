  - 开放问题：如何保证跨领域的科学有效性与可靠性，代理指标（任务完成度、审稿分数）是否与真实科学进步一致，以及如何从狭窄的工作坊级验证扩展到可复现的跨学科发现。
  literature_review:
    line_of_work_matrix:
    - line: End-to‑end autonomous discovery pipelines (e.g., The AI Scientist, AI
        Scientist‑v2, AI CFD Scientist)
      what_it_solves: automating the full research cycle from idea generation, code
        creation, and experiment execution to paper writing, reducing per‑paper cost
        and human labor.
      what_remains_open: inconsistent success rates (only 1 of 3 v2 papers passed
        peer review), missing verification gates for silent failures, and reliance
        on templated or narrow code‑generation paths that may not generalize to novel
        experimental paradigms.
    - line: Evaluation environments and benchmarks for scientific discovery agents
        (e.g., DISCOVERYWORLD, BAISBench)
      what_it_solves: providing standardized tasks and metrics (task completion, explanation
        quality, cell‑annotation accuracy) to enable apples‑to‑apples comparison of
        AI scientists.
      what_remains_open: coverage of diverse scientific disciplines and alignment
        between simulated task scores and real‑world scientific impact; current benchmarks
        are limited to 8–25 topics and may not reflect the complexity of open‑ended
        discovery.
    - line: Multi‑agent collaboration and human‑in‑the‑loop architectures (e.g., AutoResearchClaw,
        Claw AI Lab)
      what_it_solves: improving robustness and result quality through structured debate,
        self‑healing execution, and selective human intervention at high‑leverage
        decision points.
      what_remains_open: these systems are early prototypes evaluated on small case
        studies or a single benchmark; the optimal human‑AI interaction mode and the
        scalability to larger research teams remain unexplored.
    - line: Domain‑specialized AI scientists (e.g., AI CFD Scientist for fluid dynamics,
        BAISBench for single‑cell omics)
      what_it_solves: embedding domain‑specific verification (physics‑aware vision‑language
        gates, expert‑labeled datasets) to catch subtle errors that generic review
        loops miss.
      what_remains_open: verification gates still miss silent failures (2 of 16 in
        CFD ablation); the domain‑specific components are not easily transferable,
        and the cost of extending such systems to new fields is unproven.
    - line: Survey and taxonomy of agentic AI for science (e.g., Agentic AI for Scientific
        Discovery survey)
      what_it_solves: organizing existing systems into categories by domain and capability,
        and identifying cross‑cutting challenges such as literature review automation,
        reliability, and ethics.
      what_remains_open: the proposed taxonomies lack direct empirical validation
        that they predict agent behavior or guide system design; the survey does not
        provide quantitative benchmarks to compare categorized systems.
    consensus:
    - 'All systems decompose scientific discovery into a sequence of LLM‑guided steps:
      ideation, experiment design/coding, execution, and result analysis or manuscript
      writing.'
    - Automated or semi‑automated validation is considered essential; whether through
      AI reviewers, physics‑aware gates, or benchmark metrics, every work attempts
      to close the loop between generation and evaluation.
    - Current AI scientists are not yet reliable enough for unsupervised high‑stakes
      discovery; they show promise but require further verification, human oversight,
      or domain‑specific guarding.
    disagreements:
    - 'Verification mechanism: one line uses vision‑language physics inspection of
      rendered outputs (CFD), another employs LLM‑based automated reviewers with near‑human
      scoring, while multi‑agent systems rely on debate and self‑healing loops rather
      than external physical ground truth.'
    - 'Human involvement: works range from fully autonomous (The AI Scientist, AI
      Scientist‑v2) to targeted human‑AI collaboration at high‑leverage decisions
      (AutoResearchClaw) and interactive dashboards with rollback control (Claw AI
      Lab); the optimal human‑in‑the‑loop granularity is unsettled.'
    - 'Evaluation target: DISCOVERYWORLD and BAISBench measure task completion or
      multiple‑choice accuracy in simulated/real data, while AI Scientist‑v2 and Claw
      AI Lab use peer‑review acceptance or expert preference; these proxy metrics
      may not capture the same qualities of scientific contribution.'
    open_questions:
    - How can we verify that an AI‑generated claim is scientifically sound when the
      validation gate itself (AI reviewer, physics checker) has known failure modes
      and misses silent errors?
    - What benchmark design and metric set would reliably predict whether an AI scientist’s
      output will be judged as a genuine scientific advance by domain experts?
    - Can the improvements observed in multi‑agent debate and human‑in‑the‑loop systems
      scale to larger, interdisciplinary research problems without prohibitive human
      effort or computational cost?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主发现流水线（如 The AI Scientist、AI Scientist‑v2、AI CFD Scientist）
      解决的问题: 自动化从想法生成、代码编写、实验执行到论文写作的完整研究循环，降低单篇论文成本与人力投入。
      尚未覆盖: 成功率不稳定（v2 三篇论文仅一篇通过评审），缺乏对静默失败的验证机制，且代码生成依赖模板或窄路径，难以泛化到全新实验范式。
    - 路线: 科学发现智能体的评估环境与基准（如 DISCOVERYWORLD、BAISBench）
      解决的问题: 提供标准化任务与指标（任务完成度、解释质量、细胞注释准确率），使 AI 科学家的能力可横向比较。
      尚未覆盖: 覆盖的科学领域有限，模拟任务得分与真实科学影响力之间的对齐尚不明确；当前基准仅覆盖 8–25 个主题，可能无法反映开放式发现的复杂度。
    - 路线: 多智能体协作与人机回路架构（如 AutoResearchClaw、Claw AI Lab）
      解决的问题: 通过结构化辩论、自愈执行和在高杠杆决策点引入人类干预，提升结果的鲁棒性与质量。
      尚未覆盖: 这些系统尚属早期原型，仅在少量案例或单一基准上评测；最优人机交互粒度及向更大研究团队的扩展性均未探索。
    - 路线: 领域专用 AI 科学家（如 AI CFD Scientist 用于流体力学，BAISBench 中的组学任务）
      解决的问题: 嵌入领域特定验证（物理感知视觉‑语言门控、专家标注数据集），以捕捉通用评审循环难以发现的细微错误。
      尚未覆盖: 验证门控仍会遗漏静默失败（CFD 消融中遗漏 2/16 例），领域专用组件不易迁移，且将此类系统扩展到新领域的成本尚未得到验证。
    - 路线: 面向科学的智能体 AI 综述与分类（如 Agentic AI for Scientific Discovery 综述）
      解决的问题: 按领域和能力对现有系统进行分类，并识别文献综述自动化、系统可靠性和伦理等跨领域挑战。
      尚未覆盖: 所提出的分类法缺乏直接实证验证，难以证明其能预测智能体行为或指导系统设计；综述未提供量化基准以比较被分类的各系统。
    共识:
    - 所有系统均将科学发现分解为由大语言模型引导的步骤序列：构思、实验设计/编码、执行以及结果分析或论文撰写。
    - 自动或半自动验证被视为必要环节；无论是通过 AI 审稿人、物理感知门控还是基准指标，各工作均试图闭合生成与评估之间的循环。
    - 当前 AI 科学家尚不足以在无监督的高风险发现中可靠运行；它们展现出潜力，但需要进一步验证、人类监督或领域专用把关。
    分歧:
    - 验证机制：一条路线采用对渲染输出的视觉‑语言物理检查（CFD），另一条使用接近人类评分的 LLM 自动评审器，而多智能体系统则依赖辩论和自愈循环，而非外部物理真值。
    - 人类参与程度：从完全自主（The AI Scientist、AI Scientist‑v2）到在高杠杆决策点进行精准人机协作（AutoResearchClaw），再到提供回滚控制的交互式仪表板（Claw
      AI Lab），最优人机回路的粒度尚无定论。
    - 评估目标：DISCOVERYWORLD 和 BAISBench 测量模拟/真实数据中的任务完成度或多选题准确率，而 AI Scientist‑v2 和
      Claw AI Lab 则使用同行评审接受或专家偏好；这些代理指标未必能捕捉到相同的科学贡献品质。
    开放问题:
    - 当验证门控（AI 审稿人、物理检查器）本身存在已知失败模式并会遗漏静默错误时，如何验证 AI 生成的科学主张是否可靠？
    - 何种基准设计与指标集能够可靠预测 AI 科学家的产出是否会被领域专家视为真正的科学进步？
    - 在多智能体辩论和人机回路系统中观察到的改进，能否在不付出过高人力或计算成本的前提下，扩展到更大的跨学科研究问题？
