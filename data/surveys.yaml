  related_work_outline:
  - 'Mainstream direction: building and evaluating autonomous research agents (AI
    scientists) that generate hypotheses, run experiments, and produce papers, with
    growing emphasis on reliability through benchmarking, self-correction, and domain-specific
    verification gates.'
  - 'Shared research pattern: all systems rely on LLM-based agents orchestrating code
    execution, result analysis, and manuscript writing; they all acknowledge that
    current outputs are not yet fully trustworthy and require some form of evaluation
    or review loop.'
  - 'Key differences: evaluation strategy differs substantially—some use automated
    reviewer scores, others use structured benchmark tasks with human baselines, and
    still others rely on expert judges. Failure handling ranges from simple reflection
    to multi-hypothesis causal attribution and physics-based verification. Interaction
    modes also diverge: fully autonomous versus human-in-the-loop dashboards.'
  - 'Trend evolution: from 2024 proof-of-concept frameworks (AI Scientist, DISCOVERYWORLD)
    to 2025–2026 systems that add tree search, multi-agent collaboration, domain-specific
    safety gates, and explicit failure analysis. The frontier is shifting from “can
    it produce a paper” to “can it produce a defensible, reproducible, and safe result.”'
  - 'Open questions: how to validate that proxy metrics (automated reviewer scores,
    benchmark completion) align with genuine scientific utility; how to generalize
    domain-specific verification gates across disciplines; how to prevent silent failures
    and hallucinated findings in fully autonomous loops; and what governance mechanisms
    are needed for open-ended research agents.'
  related_work_outline_zh:
  - 主流方向：构建并评估自主研究智能体（AI科学家），使其能生成假设、执行实验并撰写论文，并通过基准测试、自我纠正和领域特定验证门控逐步提升可靠性。
  - 研究共性：所有系统都依赖基于LLM的智能体来编排代码执行、结果分析和论文写作；它们都承认当前输出尚不完全可信，需要某种形式的评估或审阅循环。
  - 关键差异：评估策略差异显著——有的采用自动评审分数，有的使用结构化基准任务并配有人类基线，还有的依赖专家评判。失败处理方式从简单反思到多假设因果归因和物理验证。交互模式也分化为完全自主和人在环中的仪表板。
  - 趋势演进：从2024年的概念验证框架（AI Scientist, DISCOVERYWORLD）到2025–2026年引入树搜索、多智能体协作、领域特定安全门控和显式失败分析的系统。前沿正从“能否生成论文”转向“能否生成可辩护、可复现且安全的结果”。
  - 开放问题：如何验证代理指标（自动评审分数、基准完成度）与真实科学效用的一致性；如何将领域特定验证门控跨学科推广；如何在完全自主循环中防止静默失败和幻觉发现；以及面向开放式研究智能体需要何种治理机制。
  literature_review:
    line_of_work_matrix:
    - line: Benchmarking environments for autonomous research agents
      what_it_solves: Provides standardized tasks, metrics, and human baselines to
        compare AI scientists across diverse scientific domains, surfacing capability
        gaps and enabling systematic progress tracking.
      what_remains_open: Task coverage remains limited relative to the breadth of
        real science; the alignment between benchmark performance and downstream scientific
        impact is empirically unverified, and human baselines are often small-scale
        or domain-specific.
    - line: End-to-end autonomous research system architectures
      what_it_solves: Integrates the full research lifecycle—idea generation, experiment
        execution, visualization, and paper writing—into a single agentic workflow,
        reducing the cost and manual effort of iterative scientific exploration.
      what_remains_open: Output quality is inconsistent (only a fraction of generated
        papers pass peer review, and many attempts fail silently); cross-domain generalization
        beyond the training data distribution of the underlying LLM remains weak,
        and the stability of long-horizon autonomous runs is not guaranteed.
    - line: Failure analysis and self-correction for autonomous research
      what_it_solves: Identifies recurring failure modes such as implementation drift,
        memory degradation, and overexcitement, and introduces structured causal attribution
        or reflection loops to automatically route interventions and improve the reliability
        of generated results.
      what_remains_open: Self-correction mechanisms can still miss failures; fully
        autonomous scientific writing and conference-ready paper generation remain
        open problems even with improved artifact quality, and the risk of introducing
        new biases through automated correction is not yet characterized.
    - line: Domain-specific verification and safety gates
      what_it_solves: Prevents silent failures in specialized scientific domains by
        inspecting outputs against physical constraints (e.g., vision-language physics
        verification for flow fields) before accepting results, thereby increasing
        the trustworthiness of autonomous discoveries.
      what_remains_open: Verification gates are not perfect (they can miss planted
        failures as shown in ablation studies) and are tightly coupled to domain-specific
        visual or numerical regularities; extending such gates to less structured
        or non-visual scientific domains remains an open challenge.
    consensus:
    - Current AI scientists are not yet capable of fully autonomous, reliable scientific
      discovery and require rigorous evaluation and safety mechanisms.
    - Executable code and experiment-level validation are essential to ground claims,
      but these alone do not guarantee scientific soundness.
    - Benchmarking and human baselines are necessary to measure progress, yet existing
      proxy metrics (automated reviewer scores, task completion) lack a proven link
      to real-world scientific utility.
    - Open-ended autonomous research introduces risks of silent failures, hallucinated
      findings, and reward hacking, making governance and transparency critical.
    disagreements:
    - 'Evaluation modality: some lines rely on automated reviewer scoring to judge
      paper quality, others use predefined structured tasks with success criteria,
      and yet others employ human expert judges or domain-specific validity gates.'
    - 'Interaction model: systems range from fully autonomous generation without human
      intervention to interactive platforms that allow real-time monitoring, rollback,
      and human-in-the-loop control.'
    - 'Failure mitigation strategy: approaches differ between simple reflection, multi-hypothesis
      causal failure attribution with deterministic routing, and physics-based visual
      verification, reflecting different assumptions about where and how failures
      occur.'
    - 'Domain scope: some systems are designed for general machine learning subfields,
      while others are tailored to a specific scientific discipline (computational
      fluid dynamics, single-cell omics), with no consensus on whether domain-specific
      engineering is required for reliability.'
    open_questions:
    - How can we design evaluation protocols that go beyond proxy metrics and capture
      the long-term epistemic value and reproducibility of autonomously generated
      scientific claims?
    - Can domain-specific verification gates be generalized or learned across disciplines,
      or will each scientific field require bespoke safety infrastructure?
    - What governance frameworks are needed to oversee autonomous research agents
      that can generate and execute experiments without human oversight, particularly
      in high-stakes or dual-use domains?
    - How can we systematically prevent the silent failure modes identified (e.g.,
      implementation drift, memory degradation, overexcitement) without over-constraining
      the creative exploration that makes autonomous research valuable?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 面向自主研究智能体的基准测试环境
      解决的问题: 提供标准化任务、指标和人类基线，以在不同科学领域比较AI科学家，揭示能力差距并支持系统性的进展跟踪。
      尚未覆盖: 任务覆盖度相对于真实科学的广度仍然有限；基准表现与下游科学影响力之间的对应关系尚未被实证验证；人类基线通常规模较小或局限于特定领域。
    - 路线: 端到端自主研究系统架构
      解决的问题: 将完整的研究生命周期——想法生成、实验执行、可视化和论文撰写——整合为单一智能体工作流，降低迭代科学探索的成本和人工投入。
      尚未覆盖: 输出质量不稳定（只有部分生成的论文通过同行评审，且许多尝试会静默失败）；跨领域泛化能力受限于底层LLM的训练分布；长周期自主运行的稳定性无法保证。
    - 路线: 自主研究的失败分析与自我纠正
      解决的问题: 识别重复出现的失败模式（如实现漂移、记忆退化、过度兴奋），并引入结构化因果归因或反思循环来自动路由干预，提高生成结果的可靠性。
      尚未覆盖: 自我纠正机制仍可能遗漏失败；即使在工件质量提升后，完全自主的科学写作和生成可投稿论文仍然是一个开放问题；自动纠正可能引入新偏见的风险尚未被刻画。
    - 路线: 领域特定验证与安全门控
      解决的问题: 在结果被接受前，通过对照物理约束检查输出（例如对流场进行视觉-语言物理验证），防止特定科学领域中的静默失败，从而提升自主发现的可信度。
      尚未覆盖: 验证门控并非完美（消融实验显示其会遗漏植入的失败），且紧密耦合于领域特定的视觉或数值规律；将此类门控扩展到非结构化或非视觉科学领域仍是开放挑战。
    共识:
    - 目前的AI科学家尚不能进行完全自主、可靠的科学发现，需要严格的评估和安全机制。
    - 可执行代码和实验层面的验证是支撑发现主张的基础，但仅凭这些不能保证科学性。
    - 基准测试和人类基线是衡量进展所必需的，但现有的代理指标（自动评审分数、任务完成度）与真实科学效用之间缺乏经过验证的联系。
    - 开放式自主研究引入了静默失败、幻觉发现和奖励黑客等风险，使得治理和透明性变得至关重要。
    分歧:
    - 评估模态：一些路线依赖自动评审打分来评判论文质量，另一些采用预定义的结构化任务与成功标准，还有一些则使用人类专家评判或领域特定有效性门控。
    - 交互模式：系统从无需人工干预的全自动生成，到允许实时监控、回滚和人在环中控制的交互式平台，在设计上存在分歧。
    - 失败缓解策略：方法在简单反思、带有确定性路由的多假设因果失败归因，以及基于物理的视觉验证之间有所不同，反映了对失败发生位置和原因的不同假设。
    - 领域范围：一些系统为通用机器学习子领域设计，另一些针对特定学科（计算流体动力学、单细胞组学）定制，对于可靠性是否需要领域特定工程尚未达成共识。
    开放问题:
    - 如何设计能超越代理指标，并捕捉自主生成科学主张的长期认知价值和可复现性的评估协议？
    - 领域特定验证门控能否跨学科泛化或学习，还是每个科学领域都需要定制化的安全基础设施？
    - 对于能够无需人类监督即生成和执行实验的自主研究智能体，需要怎样的治理框架，尤其是在高风险或双重用途领域？
    - 如何在不限制创造性探索的前提下，系统性地防止已识别的静默失败模式（如实现漂移、记忆退化、过度兴奋），以保持自主研究的价值？
