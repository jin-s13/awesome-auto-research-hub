    - line: Evaluation and evidence design
      what_it_solves: Provides standardized tasks and metrics for benchmarking automated
        experiment agents, such as discovery cycles in virtual environments (e.g.,
        DISCOVERYWORLD) and ablation planning (e.g., AblationBench), enabling comparison
        and progress measurement.
      what_remains_open: Alignment between proxy metrics (e.g., task completion, recall)
