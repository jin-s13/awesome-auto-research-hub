    - 路线: 评测与证据设计
      解决的问题: 提供基准和指标来评估自动生成的研究制品的质量，聚焦于消融实验规划、制品完整性和评审一致性。
      尚未覆盖: 当前LM评判器在消融识别上仅达到45%召回率，且在作者与审稿人任务上表现相反，表明接地气差异；代理指标尚未针对长期科学影响力进行验证。
    - 路线: 系统与可复现基础设施
      解决的问题: 端到端智能体流水线，可生成想法、执行实验、撰写论文并通过反馈循环迭代改进，通常以开源形式发布。
      尚未覆盖: 一致性仍然较低：某案例中三篇论文仅有1篇通过同行评审；在研讨会设置和窄领域之外的泛化能力未经证实；长跨度记忆和处理执行压力下的实现漂移问题尚未解决。
    - 路线: 概念分类与理论
      解决的问题: 对自主研究智能体的失败模式和设计原则进行分类，指出训练数据默认偏见、记忆退化、科学品味不足等问题。
      尚未覆盖: 分类源自有限的案例研究；没有直接实证验证采纳这些分类是否能提高下游论文质量或降低特定失败率。
    共识:
    - LLM智能体能够自动完成科学流水线的部分环节，但在实现漂移、幻觉结果和过早宣布成功方面表现出系统性失败。
    - 多步反思和外部记忆相比单次生成能提高智能体的鲁棒性。
    - 自动评审员可以近似人类打分，但尚不能作为科学有效性的可靠守门人。
    - 开源系统和共享基准对于该领域的可复现进展至关重要。
    分歧:
    - 完全自主与在高杠杆决策点进行精准人机协作之间的取舍；一项研究显示人机协作优于两个极端。
    - 失败归因策略：单一反思 vs. 多假设因果诊断 vs. 策展人管理的负知识；后者显示出迁移效益但增加了复杂性。
    - 评估范围：部分工作瞄准完整论文生成和同行评审接收，而另一些仅聚焦于实验规划或制品质量，不涉及完整论文撰写。
    - 领域特异性：通用机器学习研究智能体 vs. 具有领域特定视觉-语言门控的物理感知验证智能体；后者能更好地检测静默失败，但难以迁移。
    开放问题:
    - 需要何种因果机制来确保生成的科学声明不仅是看似合理的，而是真实的，尤其是在智能体无法检测到静默执行错误时？
    - 如何将失败实验的负知识系统性地跨研究任务共享，同时避免引入噪声或冲突建议？
    - 消融规划和自我纠正能否泛化到不存在真实消融基准的新颖科学问题，以及如何为这种开放式设置设计评测基准？
