  related_work_outline_zh:
  - 主流方向：构建端到端自主流水线，通过多智能体LLM协作，以最少人工干预完成假设生成、代码实验执行和论文撰写。
  - 研究共性：系统均以大型语言模型为核心，结合代码执行沙箱，迭代实验结果，并采用自动评审或基准指标评估输出质量。
  - 关键差异：实验规划策略不同（树搜索、失败记忆、基线局限性分析），人类监督程度不同（全自动 vs. 仪表板监控），以及评估目标不同（内部评审分数 vs. 外部基准任务）。
  - 趋势演进：从2024年的单一全自动框架发展到2025–2026年更细粒度的智能体架构、失败感知记忆和专用基准（DISCOVERYWORLD、AblationBench），表明领域正转向可靠性和可衡量性。
  - 开放问题：当前智能体规划消融实验的可靠性不足（召回率45%），失败记忆的跨领域泛化未经证实，任务表现不一致，尚无基准能将代理指标确证为真正的科学新颖性。
  literature_review:
    line_of_work_matrix:
    - line: Action-conditioned control and planning for experiments
      what_it_solves: Automating the choice of next experimental steps, ablation configurations,
        and iteration direction, reducing manual trial-and-error in the research process.
      what_remains_open: Planning still relies on predefined search spaces or heuristic
        adoption of past failures; recall on ablation identification remains only
        45% (AblationBench), and failure memory transfer across domains is shown only
        on narrow PDE tasks.
    - line: Evaluation and evidence design for automated discovery
      what_it_solves: Providing standardized tasks, metrics, and automated judges
        to compare the capabilities of scientific discovery agents, making performance
        claims comparable.
      what_remains_open: Existing benchmarks (DISCOVERYWORLD, AblationBench) cover
        only a subset of scientific activities, and the relationship between proxy
        metrics (task completion, reviewer score) and real-world scientific contribution
        is unvalidated.
    - line: Systems and reproducible infrastructure for autonomous research
      what_it_solves: Integrating multi-agent orchestration, code execution, knowledge
        retrieval, and paper generation into reusable platforms with human monitoring
        and intervention capabilities.
      what_remains_open: Platforms are early-stage demonstrations; standardized external
        validation across hardware, datasets, and user settings is missing, and reproducibility
        signals vary from weak to moderate.
    consensus:
    - Large language models serve as the core reasoning engine for autonomous scientific
      discovery, combined with code execution sandboxes to iteratively run experiments.
    - Automated reviewers (e.g., DeepReviewer) provide a low-cost feedback signal
      for evaluating generated papers, and multi-agent role specialization (experiment
      manager, reviewer, coder) improves output quality.
    - Current systems can produce plausible papers on simple tasks, but all require
      substantial human filtering or oversight to ensure reliability.
    disagreements:
    - 'Experiment planning methods differ: agentic tree search for active exploration
      vs. negative knowledge memory for passive avoidance of past failures vs. analyzing
      limitations of a baseline paper to plan next steps.'
    - 'Evaluation targets diverge: some works treat automated reviewer scores as the
      primary gold standard, while others emphasize task completion rates on external
      benchmarks like DISCOVERYWORLD.'
    - 'Level of human involvement varies: some systems aim for full autonomy, while
      others keep a human as principal investigator or provide a dashboard for real-time
      monitoring and intervention.'
    - 'Code generation assumptions differ: early frameworks rely on human-authored
      code templates, but later versions attempt to eliminate them, though implicit
      library dependencies may remain.'
    open_questions:
    - How can we reliably evaluate the true novelty of automatically generated scientific
      work, beyond surface-level similarity to known papers?
    - Can the skills learned in virtual environments like DISCOVERYWORLD transfer
      to real-world laboratory settings, and what evidence is needed to prove such
      transfer?
    - To what extent does failure memory generalize across scientific domains with
      different experimental constraints and cost structures?
    - What is the quantified gap between automated reviewer judgments and human peer
      review in assessing scientific contribution, and how consistent is this gap
      across subfields?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 动作条件实验规划与控制
      解决的问题: 自动化决定实验步骤、消融配置和迭代方向，减少研究过程中的人工试错。
      尚未覆盖: 规划仍依赖预定义搜索空间或对过去失败的启发式采纳；消融识别召回率仅45%（AblationBench），失败记忆的跨领域迁移仅在狭窄的PDE任务上得到验证。
    - 路线: 面向自动化发现的评测与证据设计
      解决的问题: 提供标准化任务、指标和自动评审，以比较科学发现智能体的能力，使性能主张可比。
      尚未覆盖: 现有基准（DISCOVERYWORLD、AblationBench）仅覆盖部分科学活动，代理指标（任务完成度、评审分数）与真实科学贡献之间的关联未经证实。
    - 路线: 自主研究系统与可复现基础设施
      解决的问题: 将多智能体编排、代码执行、知识检索和论文生成集成到可复用平台，并提供人类监控与干预能力。
      尚未覆盖: 平台多为早期演示，缺少跨硬件、数据集和用户设置的标准化外部验证，可复现性信号从弱到中等不等。
    共识:
    - 大型语言模型是自主科学发现的核心推理引擎，与代码执行沙箱结合以迭代运行实验。
    - 自动评审器（如DeepReviewer）为评估生成论文提供了低成本反馈信号，多智能体角色分工（实验管理器、评审员、编码员）能提升输出质量。
    - 当前系统能在简单任务上生成看似合理的论文，但都需要大量人工筛选或监督以确保可靠性。
    分歧:
    - 实验规划方法不同：智能体树搜索用于主动探索，负知识记忆用于被动避免过往失败，分析基线论文局限性以规划后续步骤。
    - 评估目标不同：部分工作将自动评审分数视为主要黄金标准，另一些则强调外部基准（如DISCOVERYWORLD）上的任务完成率。
    - 人类参与程度不同：一些系统追求全自主，另一些则保留人类作为首席研究员，或提供仪表板进行实时监控和干预。
    - 代码生成假设不同：早期框架依赖人类编写的代码模板，后续版本试图消除模板，但可能仍存在隐含的库依赖。
    开放问题:
    - 如何可靠地评估自动生成科学工作的真实新颖性，而不仅仅是与已知论文的表面相似度？
    - 在虚拟环境（如DISCOVERYWORLD）中学到的技能能否迁移到真实实验室环境，需要哪些证据来证明这种迁移？
    - 失败记忆在具有不同实验约束和成本结构的科学领域间泛化程度如何？
    - 自动评审器与人类同行评审在评价科学贡献方面的量化差距有多大，该差距在子领域间的一致性如何？
