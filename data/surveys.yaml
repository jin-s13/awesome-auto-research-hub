      on agentic tree search with VLM feedback.'
    - 'Evaluation protocol: works use automated reviewers, human peer review, or benchmark
      tasks like AblationBench, leading to different conclusions about system capability.'
    - 'Domain scope: most systems target general ML, but AI CFD Scientist demonstrates
      specialization with physics-aware verification, raising questions about domain-agnostic
      vs. domain-specific design.'
    - 'Template dependence: AI Scientist-v2 eliminates human-authored code templates,
      while earlier versions and some other systems still rely on them, affecting
      reproducibility and generality.'
    open_questions:
