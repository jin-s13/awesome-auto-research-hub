  related_work_outline:
  - 'Mainstream direction: building autonomous agents that perform end-to-end scientific
    discovery and evaluating them via standardized benchmark environments with realistic
    constraints.'
  - 'Shared research pattern: moving beyond outcome-only metrics to assess reasoning
    quality, experimental design soundness, and safety, often through structured audit
    or trajectory analysis.'
  - 'Key differences: some works target full-task completion on fixed benchmarks,
    while others focus on specific sub-problems such as question formation, code library
    distillation, objective function design, or safety reasoning, and they differ
    in whether they evaluate mechanism fidelity versus task success.'
  - 'Trend evolution: from 2024 environment-centric benchmarking toward 2025–2026
    method-centric enhancements (tool augmentation, goal evolution, safety) and reflective
    position papers that challenge evaluation assumptions.'
  - 'Open questions: how to design benchmarks that capture mechanism correctness and
    epistemic honesty, how to ensure safety in open-ended exploration, and how to
    generalize across scientific domains.'
  related_work_outline_zh:
  - 主流方向：构建执行端到端科学发现的自主代理，并通过具有现实约束的标准化基准环境进行评估。
  - 研究共性：超越仅看结果的指标，转向评估推理质量、实验设计合理性和安全性，常通过结构化审计或轨迹分析实现。
  - 关键差异：部分工作聚焦固定基准上的完整任务完成，另一些则关注问题形成、代码库蒸馏、目标函数设计或安全推理等子问题，且在评估机制保真度还是任务成功上存在分歧。
  - 趋势演进：从2024年以环境为中心的基准测试，发展到2025–2026年以方法为中心的增强（工具增强、目标演化、安全），以及挑战评估假设的反思性立场论文。
  - 开放问题：如何设计能捕捉机制正确性和认知诚实性的基准，如何在开放式探索中确保安全，以及如何跨科学领域泛化。
  literature_review:
    line_of_work_matrix:
    - line: Benchmarking environments for scientific discovery agents
      what_it_solves: Provides standardized tasks and metrics to quantify end-to-end
        discovery capability, including experiment design, hypothesis testing, and
        resource constraints.
      what_remains_open: Current benchmarks do not evaluate whether the agent's underlying
        reasoning mechanism is correct; task coverage is limited to specific domains
        and may not capture open-ended discovery or cross-domain generalization.
    - line: Agent augmentation with tools and objective design
      what_it_solves: Enhances the quality of agent-generated experiments by distilling
        domain-specific code libraries or by automating the search over objective
        functions, thereby improving experimental outcomes.
      what_remains_open: Assessments are often confined to one scientific domain;
        the contribution of the augmentation versus the base agent's planning ability
        is not isolated, and proxy metrics like LLM-as-a-judge show only moderate
        agreement with human experts.
    - line: Safety and auditability in agent reasoning
      what_it_solves: Integrates safety checks into the agent pipeline and produces
        auditable artifacts (e.g., research question certificates) to make reasoning
        transparent and prevent compositional tool-chain risks.
      what_remains_open: Evaluations rely on LLM judges rather than domain experts,
        and the detection of mechanism-level errors under truly open-ended conditions
        where ground truth is unknown remains unverified.
    - line: Multi-dimensional evaluation of agent reasoning
      what_it_solves: Proposes evaluating agents on mechanism fidelity and epistemic
        honesty alongside task outcomes, identifying failure modes where agents produce
        correct-looking results through incorrect reasoning.
      what_remains_open: The proposed detection methods assume availability of ground-truth
        mechanisms or correct observables, limiting applicability to genuine open-ended
        discovery; evidence is drawn from a single simulation-based task.
    consensus:
    - Existing strong baseline agents perform poorly on complex, constrained scientific
      discovery tasks, exposing the limits of current LLM-based approaches.
    - Evaluation must move beyond task completion scores to assess the correctness
      of the reasoning process, the soundness of the experimental design, and the
      trustworthiness of the conclusions.
    - Realistic constraints such as limited compute, no internet, and no pretrained
      weights are essential for testing an agent's independent discovery capability.
    - Safety and auditability are becoming critical requirements, especially when
      agents interact with tools and propose potentially risky experiments.
    disagreements:
    - 'The primary evaluation target varies: some works prioritize end-to-end task
      success on a diverse set of challenges, while others prioritize the internal
      consistency of the agent''s reasoning or the absence of safety violations.'
    - 'Supervision signals differ: fully automatic metrics, LLM-based judges, and
      human domain expert assessments are used, but there is no agreement on which
      constitutes a reliable proxy for true scientific merit.'
    - 'Interaction modes differ: some frameworks use purely text-based virtual environments
      with optional 2D overlays, while others operate on code generation within constrained
      compute environments, affecting what kind of scientific work can be evaluated.'
    open_questions:
    - How can we design benchmarks that reveal when an agent reaches a correct result
      through a wrong mechanism, given that ground-truth mechanisms are often unknown
      in open-ended science?
    - What safety guarantees can be provided for autonomous exploration agents when
      compositional tool use can create risks that single-step monitors miss?
    - To what extent do findings from a single scientific domain (e.g., materials
      science, particle physics simulation) generalize to others, and what makes a
      discovery task a valid proxy for real scientific progress?
    - How can human expert judgment be effectively and scalably integrated into the
      evaluation loop without relying solely on imperfect LLM-as-a-judge proxies?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 科学发现代理的基准测试环境
      解决的问题: 提供标准化任务和指标，量化端到端发现能力，涵盖实验设计、假设检验和资源约束。
      尚未覆盖: 当前基准不评估代理底层推理机制是否正确；任务覆盖局限于特定领域，可能无法捕捉开放式发现或跨领域泛化。
    - 路线: 通过工具和目标设计增强代理
      解决的问题: 通过蒸馏领域特定代码库或自动搜索目标函数，提升代理生成实验的质量，从而改善实验结果。
      尚未覆盖: 评估常局限于单一科学领域；增强组件与基础代理规划能力各自的贡献未被分离，且LLM-as-a-judge等代理指标与人类专家仅具中等一致性。
    - 路线: 代理推理的安全性与可审计性
      解决的问题: 将安全检查融入代理流水线，并生成可审计工件（如研究问题证书），使推理透明化，防止组合工具链风险。
      尚未覆盖: 评估依赖LLM评审而非领域专家，在真实情况未知的开放式条件下对机制层面错误的检测尚未验证。
    - 路线: 代理推理的多维度评估
      解决的问题: 提出在任务结果之外，从机制保真度和认知诚实性维度评估代理，识别代理通过错误推理得出看似正确结果的失败模式。
      尚未覆盖: 所提检测方法假设存在真实机制或已知正确可观测量，限制了在真正开放式发现中的适用性；证据仅来自单一模拟任务。
    共识:
    - 现有强基线代理在复杂、受限的科学发现任务上表现不佳，暴露了当前基于LLM方法的局限性。
    - 评估必须超越任务完成得分，转向评估推理过程的正确性、实验设计的合理性以及结论的可信度。
    - 有限算力、无互联网、无预训练权重等现实约束对于测试代理的独立发现能力至关重要。
    - 安全性和可审计性正成为关键要求，尤其是在代理与工具交互并可能提出有风险实验的情况下。
    分歧:
    - 主要评估目标不同：有的优先考虑在多样化挑战上的端到端任务成功率，有的则优先考虑代理推理的内在一致性或无安全违规。
    - 监督信号不同：全自动指标、基于LLM的评审和人类领域专家评估并存，但未就哪种能可靠代表真实科学价值达成一致。
    - 交互模式不同：有的采用纯文本虚拟环境加可选二维叠加，有的则在受限计算环境中进行代码生成，影响可评估的科学工作类型。
    开放问题:
    - 在开放式科学中真实机制往往未知，如何设计能揭示代理以错误机制得出正确结果的基准？
    - 当组合工具使用可能产生单步监控器遗漏的风险时，如何为自主探索代理提供安全保障？
    - 来自单一科学领域（如材料科学、粒子物理模拟）的发现能在多大程度上泛化到其他领域，以及什么使发现任务成为真实科学进展的有效代理？
    - 如何在不完全依赖不完美的LLM-as-a-judge代理的情况下，有效且可扩展地将人类专家判断融入评估循环？
