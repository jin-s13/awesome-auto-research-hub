  related_work_outline_zh:
  - 主流方向：多智能体与迭代优化框架主导自动综述生成，利用LLM进行文献检索、组织、综合与评估，并引入评分准则引导或层次化反馈循环。
  - 研究共性：系统将综述写作分解为专门子任务（检索、聚类、起草、评审），通过迭代改进提升质量，常采用结构化指标评估连贯性、覆盖度和引用准确性。
  - 关键差异：架构从单流水线迭代工作流到多智能体协作不等；评估策略从自动指标到专家对齐基准；分析深度从摘要级总结到全文跨论文建模。
