  - 主流方向：构建多智能体LLM系统，自动化或辅助学术论文写作、编辑、评审以及海报生成、实验复现等相关任务。
  - 研究共性：将复杂的论文写作流程分解为多个子任务，由专业化智能体协作完成，常集成到现有编辑器或独立流水线中。
  - 关键差异：目标子任务差异显著——全篇论文生成、交互式辅导、评审依据性、海报创作、论文搜索或复现基准——导致交互模式和评测标准各不相同。
  - 趋势演进：2025–2026年该主题迅速涌现，从孤立的写作辅助工具发展为综合性多智能体框架和专用基准，整体处于当前前沿。
  - 开放问题：如何超越表面指标严格评估生成论文质量；确保事实准确性与创新性；定义有效的人机协作模式；评估对科研诚信的长期影响。
  literature_review:
    line_of_work_matrix:
    - line: Automated paper drafting and generation
      what_it_solves: Producing a complete research paper from a high-level idea or
        outline, reducing manual writing effort.
      what_remains_open: Quality, originality, and factual reliability of generated
        content; lack of standardized evaluation against human-written papers.
    - line: Interactive writing assistance and tutoring
      what_it_solves: Providing real-time feedback, editing suggestions, and writing
        guidance within an editor to improve draft quality.
      what_remains_open: Adaptation to diverse writing styles and disciplines; measurable
        impact on final paper acceptance or readability.
    - line: Paper review and critique
      what_it_solves: Generating or evaluating critiques of scientific papers, aiming
        to support or automate peer review.
      what_remains_open: Groundedness of critiques beyond surface claims; coverage
        of nuanced methodological flaws and integration into real review workflows.
    - line: Multimodal paper transformation
      what_it_solves: Converting paper content into other formats such as posters,
        slides, or visual summaries.
      what_remains_open: Design quality, content selection accuracy, and user customization;
        evaluation beyond aesthetic appeal.
    - line: Paper understanding for reproduction and search
      what_it_solves: Extracting experimental details or search intent from papers
        to automate reproduction or comprehensive literature retrieval.
      what_remains_open: Success rate across diverse domains and incomplete information;
        handling of tacit knowledge not explicit in papers.
    - line: Benchmarks for paper-writing agents
      what_it_solves: Providing standardized tasks and metrics to measure AI capabilities
        in paper writing, replication, or critique.
      what_remains_open: Correlation with real-world research productivity; coverage
        of diverse research fields and writing genres.
    consensus:
    - All works leverage large language models as the core reasoning engine for paper-related
      tasks.
    - Multi-agent architectures are widely adopted to decompose complex writing or
      analysis workflows.
    - The research is concentrated in 2025–2026, indicating a nascent but rapidly
      growing area.
    - There is a shared emphasis on integrating tools into existing academic environments
      (e.g., Overleaf) or providing reproducible artifacts.
    disagreements:
    - 'Task scope: some systems target end-to-end paper generation, while others focus
      on editing, review, poster creation, or experiment reproduction.'
    - 'Autonomy level: fully automated generation versus human-in-the-loop tutoring
      or assistance.'
    - 'Interaction mode: in-editor plugins, standalone frameworks, or benchmark suites
      with no direct user interaction.'
    - 'Evaluation target: output text quality, critique groundedness, reproduction
      success rate, or search recall/precision.'
    open_questions:
    - How can we evaluate the novelty and scientific contribution of automatically
      generated papers beyond surface-level metrics?
    - What mechanisms ensure factual accuracy, proper citation, and avoidance of plagiarism
      in generated content?
    - How do these agents perform on papers requiring deep domain expertise or novel
      experimental designs?
    - What are the ethical implications and potential for misuse in academic publishing,
      and how can they be mitigated?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化论文起草与生成
      解决的问题: 从高层想法或大纲生成完整研究论文，减少人工写作负担。
      尚未覆盖: 生成内容的质量、原创性和事实可靠性；缺乏与人类撰写论文的标准化评估对比。
    - 路线: 交互式写作辅助与辅导
      解决的问题: 在编辑器内提供实时反馈、修改建议和写作指导，提升草稿质量。
      尚未覆盖: 对不同写作风格和学科的适应性；对最终论文接收或可读性的可衡量影响。
    - 路线: 论文评审与批判
      解决的问题: 生成或评估对科学论文的批判意见，旨在支持或自动化同行评审。
      尚未覆盖: 批判意见超越表面陈述的依据性；对细微方法论缺陷的覆盖及与实际审稿流程的整合。
    - 路线: 多模态论文转换
      解决的问题: 将论文内容转换为海报、幻灯片或可视化摘要等其他格式。
      尚未覆盖: 设计质量、内容选取准确性和用户定制化；超越美学吸引力的评估。
    - 路线: 面向复现与检索的论文理解
      解决的问题: 从论文中提取实验细节或检索意图，以自动化复现或全面文献检索。
      尚未覆盖: 跨领域和不完整信息下的成功率；处理论文中未明示的隐性知识。
    - 路线: 论文写作智能体基准
      解决的问题: 提供标准化任务和指标，衡量AI在论文写作、复现或批判方面的能力。
      尚未覆盖: 与真实世界研究生产力的相关性；对不同研究领域和写作体裁的覆盖。
    共识:
    - 所有工作均以大语言模型作为论文相关任务的核心推理引擎。
    - 广泛采用多智能体架构分解复杂的写作或分析流程。
    - 研究集中在2025–2026年，表明这是一个新兴但快速发展的领域。
    - 共同强调将工具集成到现有学术环境（如Overleaf）或提供可复现工件。
    分歧:
    - 任务范围：部分系统瞄准端到端论文生成，其他则聚焦编辑、评审、海报创作或实验复现。
    - 自主程度：全自动生成对比人机协作的辅导或辅助。
    - 交互模式：编辑器内插件、独立框架或无直接用户交互的基准套件。
    - 评测目标：输出文本质量、批判依据性、复现成功率或检索召回率/精确率。
    开放问题:
    - 如何超越表面指标评估自动生成论文的创新性和科学贡献？
    - 何种机制能确保生成内容的事实准确性、恰当引用并避免抄袭？
    - 这些智能体在需要深厚领域知识或新颖实验设计的论文上表现如何？
    - 学术出版中的伦理影响和潜在滥用风险是什么，如何缓解？
