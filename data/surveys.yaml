  - 'Key differences: Some works target end-to-end paper generation (e.g., The AI
    Scientist, Jr. AI Scientist), while others focus on a single phase like ablation
    planning (AblationBench) or build shared infrastructure (DISCOVERYWORLD, Claw
    AI Lab). They diverge in supervision: simulated peer review, task-completion metrics,
    or negative knowledge from failed trials.'
  - 'Trend evolution: From monolithic autonomous scientist (2024) to agentic tree
