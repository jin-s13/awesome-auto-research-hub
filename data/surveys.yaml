    data, physics-aware rejection sampling) to steer search, and emphasizing integration
    with existing lab infrastructure.'
  - 'Key differences: Automation scope ranges from isolated data cleaning (kNN noise
    detection) to full-pipeline autonomy (AutoRecLab, MLIPilot); decision mechanisms
    vary from explicit digital-twin predictions to implicit LLM reasoning; human involvement
    ranges from human-in-the-loop (SciLink) to fully autonomous operation.'
  - 'Trend evolution: Moving from domain-specific ML for materials discovery (early
    2025) toward generic autonomous research frameworks with LLM agents and physics-aware
    reasoning (2025–2026), with a growing focus on reproducibility, multi-agent coordination,
    and physical admissibility.'
  - 'Open questions: Validation of autonomous discoveries in unseen domains, generalization
    of LLM reasoning to out-of-distribution physics, standardization of evaluation
    benchmarks for autonomous labs, and management of data ownership and privacy in
    distributed collaborative settings.'
