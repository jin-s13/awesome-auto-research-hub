  literature_review:
    line_of_work_matrix:
    - line: Autonomous research agents
      what_it_solves: Automating the full research cycle—ideation, coding, experimentation,
        and paper writing—to accelerate scientific discovery end-to-end.
      what_remains_open: They frequently produce inconsistent results, hallucinate
        findings, and lack rigorous internal verification; reliability beyond workshop-level
        acceptance is unproven.
    - line: Evaluation benchmarks for AI scientists
      what_it_solves: Providing standardized tasks and metrics to compare AI scientists
        in controlled settings, bridging the gap between capability claims and measurable
        evidence.
      what_remains_open: Benchmarks are limited to narrow domains (e.g., single-cell
        transcriptomics, CFD) and proxy metrics; their alignment with real scientific
        contribution is unclear.
    - line: Failure diagnosis and self-correction
      what_it_solves: Improving agent robustness by attributing experiment failures
        to root causes (hypothesis, design, implementation) and applying targeted
        interventions.
      what_remains_open: Diagnostic mechanisms may miss subtle failures; the approach
        has been demonstrated on a limited set of topics and may not capture all scientific
        error modes.
    - line: Multi-agent research platforms
      what_it_solves: Enabling collaborative, role-based research with human oversight,
        real-time monitoring, and integration of local codebases for scalable experimentation.
      what_remains_open: Validation is limited to internal case studies; the platforms
        are early-stage and lack external validation across diverse scientific domains
        and hardware settings.
    consensus:
    - Current AI scientists are not yet reliable for fully autonomous research and
      require structured evaluation.
    - Verification gates, whether visual, metric-based, or human-mediated, are essential
      to catch silent failures and hallucinated results.
    - Existing benchmarks expose a significant gap between AI and human performance,
      especially on tasks requiring novel experimental design.
    - Artifact quality and scientific soundness must be evaluated beyond simple task
      completion rates.
    disagreements:
    - 'Evaluation philosophy: some works use simulated peer review with automated
      scores, others use domain-specific factual questions, and others rely on human
      expert preference judgments.'
    - 'Reliability mechanism: vision-language verification of physical outputs (AI
      CFD Scientist) vs. multi-hypothesis causal failure attribution (SAGE) vs. interactive
      dashboard monitoring (Claw AI Lab).'
    - 'Scope of automation: some systems aim to produce full papers, while others
      focus only on experiment execution and reporting, leaving writing to humans.'
    - 'Agent architecture: single-agent pipelines with linear stages vs. multi-agent
      teams with customizable roles and collaborative workflows.'
    open_questions:
    - How can we move beyond proxy metrics and simulated review to evaluate the actual
      scientific contribution of AI-generated research?
    - What is the minimal set of verification gates and failure attribution mechanisms
      required for an AI scientist to be trusted in high-stakes domains?
    - Can current diagnostic and self-correction methods generalize to the full diversity
      of scientific error modes and domain-specific reasoning?
    - How do we design evaluation frameworks that are both standardized and flexible
      enough to cover open-ended scientific discovery across fields?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自主研究智能体
      解决的问题: 自动化整个研究周期——构思、编码、实验、论文写作——以端到端加速科学发现。
      尚未覆盖: 经常产生不一致的结果、虚构发现，且缺乏严格的内部验证；工作坊级别以上的可靠性未被证实。
    - 路线: AI科学家评估基准
      解决的问题: 提供标准化任务和指标，在受控环境中比较AI科学家，弥合能力声明与可衡量证据之间的差距。
      尚未覆盖: 基准局限于狭窄领域（如单细胞转录组学、CFD）和代理指标；其与真实科学贡献的对齐尚不明确。
    - 路线: 失败诊断与自我纠正
      解决的问题: 通过将实验失败归因于根本原因（假设、设计、实现）并施加针对性干预，提高智能体的鲁棒性。
      尚未覆盖: 诊断机制可能遗漏细微失败；方法仅在有限主题上展示，未必涵盖所有科学错误模式。
    - 路线: 多智能体研究平台
      解决的问题: 实现基于角色的协作研究，具备人类监督、实时监控和本地代码库集成，以支持可扩展实验。
      尚未覆盖: 验证仅限于内部案例研究；平台处于早期阶段，缺乏跨领域和跨硬件的外部验证。
    共识:
    - 当前的AI科学家尚不可靠，无法完全自主研究，需要结构化评估。
    - 验证门控（视觉、指标或人工介入）对捕捉静默失败和虚构结果至关重要。
    - 现有基准显示AI与人类表现之间存在显著差距，尤其是在需要新颖实验设计的任务上。
    - 工件质量和科学严谨性必须超越简单的任务完成率来评估。
    分歧:
    - 评估理念：部分工作使用模拟同行评审和自动评分，其他使用领域特定事实问题，还有的依赖人类专家偏好判断。
    - 可靠性机制：基于视觉-语言的物理输出验证（AI CFD Scientist）对比多假设因果失败归因（SAGE）对比交互式仪表板监控（Claw AI Lab）。
    - 自动化范围：一些系统旨在生成完整论文，另一些仅聚焦实验执行和报告，写作留给人类。
    - 智能体架构：线性阶段的单智能体流水线对比具有可定制角色和协作工作流的多智能体团队。
    开放问题:
    - 如何超越代理指标和模拟评审，评估AI生成研究的真实科学贡献？
    - 在高风险领域中，AI科学家被信任所需的最低验证门控和失败归因机制是什么？
    - 目前的诊断和自我纠正方法能否泛化到科学错误模式和领域特定推理的全部多样性？
    - 如何设计既标准化又足够灵活、能覆盖跨领域开放式科学发现的评估框架？
