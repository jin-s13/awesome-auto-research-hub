  related_work_outline_zh:
  - 主流方向：采用多智能体和迭代工作流自动生成文献综述，重点关注可读性、引用质量和事实准确性。
  - 研究共性：将文献综述过程分解为检索、组织、写作、评审等子任务，并为每个子任务分配基于LLM的专用智能体或步骤。
  - 关键差异：部分系统面向端到端的综述生成，部分专注于文献检索与层次化组织，另一条线索则研究自动化同行评审的鲁棒性与脆弱性。
  - 趋势演进：从2024年到2026年，工作从辅助性组织工具转向全自主生成和自进化检索，并开始关注对抗鲁棒性和评审动态。
  - 开放问题：如何确保生成综述的事实可靠性和批判深度；如何构建与人类专家判断一致的标准基准；以及如何在自动化评审流程中防御操纵。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation via multi-agent or iterative pipelines
      what_it_solves: Producing structured, readable literature reviews from a corpus
        of papers by coordinating outlining, writing, editing, and reviewing agents.
      what_remains_open: Whether the generated reviews capture deep critical analysis
        and cross-domain generalization, and how factual accuracy is maintained without
        human-in-the-loop verification.
    - line: Intelligent literature retrieval and hierarchical organization
      what_it_solves: Efficiently finding relevant papers and organizing them into
        topic hierarchies to support human or machine review writing.
      what_remains_open: Balancing retrieval recall and precision, and enabling dynamic,
        self-evolving updates without introducing retrieval bias or concept drift.
    - line: Automated peer review simulation and robustness analysis
      what_it_solves: Modeling peer review dynamics with LLM agents and testing the
        vulnerability of automated review systems to adversarial inputs or presentation-only
        revisions.
      what_remains_open: Alignment between simulated reviews and real expert judgments,
        fairness across different paper types, and defenses against gaming behaviors.
    - line: Benchmarking and evaluation for literature review agents
      what_it_solves: Providing standardized tasks and metrics to compare agent capabilities
        in post-training or review-related scenarios.
      what_remains_open: Lack of dedicated benchmarks that directly measure literature
        review quality, and the gap between proxy metrics (e.g., similarity scores)
        and true utility for researchers.
    consensus:
    - LLM-based agents can automate substantial portions of the literature review
      workflow when the process is decomposed into manageable subtasks.
    - Iterative or multi-step designs outperform single-pass generation by allowing
      refinement and self-critique.
    - Evaluation must go beyond surface-level similarity to human-written reviews
      and include factual consistency and citation accuracy.
    disagreements:
    - 'The primary output differs: some works produce a complete review text, others
      output a hierarchical organization of papers, and still others analyze the review
      process itself.'
    - Supervision signals vary from human-written gold reviews to self-evolution through
      retrieval feedback, leading to different training and adaptation strategies.
    - Interaction modes range from fully autonomous generation to assistive tools
      that require human curation, reflecting different assumptions about the role
      of the user.
    open_questions:
    - How can automated literature review agents ensure factual accuracy and avoid
      hallucinated citations when generating long-form surveys?
    - What evaluation protocols can replace or complement human judgment for assessing
      the coherence, novelty, and critical insight of generated reviews?
    - To what extent are current multi-agent review systems vulnerable to adversarial
      papers or biased retrieval, and how can they be made robust?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于多智能体或迭代流程的自动综述生成
      解决的问题: 通过协调大纲、写作、编辑和审阅智能体，从论文集合中生成结构化、可读的文献综述。
      尚未覆盖: 生成的综述是否具备深度批判性分析和跨领域泛化能力，以及如何在无人类参与验证的情况下保持事实准确性。
    - 路线: 智能文献检索与层次化组织
      解决的问题: 高效查找相关论文并将其组织为主题层次结构，以支持人工或机器撰写综述。
      尚未覆盖: 检索召回率与精确度的平衡，以及在不引入检索偏差或概念漂移的情况下实现动态、自进化的更新。
    - 路线: 自动化同行评审模拟与鲁棒性分析
      解决的问题: 用LLM智能体建模同行评审动态，并测试自动评审系统对对抗输入或仅展示性修订的脆弱性。
      尚未覆盖: 模拟评审与真实专家判断的一致性，不同论文类型间的公平性，以及防御博弈行为的机制。
    - 路线: 文献综述智能体的基准与评估
      解决的问题: 提供标准化任务和指标，以比较智能体在后训练或评审相关场景中的能力。
      尚未覆盖: 缺乏直接衡量文献综述质量的专用基准，以及代理指标（如相似度分数）与研究人员真实效用之间的差距。
    共识:
    - 当流程被分解为可管理的子任务时，基于LLM的智能体能够自动化文献综述工作流的相当一部分。
    - 迭代或多步骤设计通过允许自我完善和自我批评，优于单次生成。
    - 评估必须超越与人类撰写综述的表面相似度，纳入事实一致性和引用准确性。
    分歧:
    - 主要产出不同：部分工作生成完整综述文本，部分输出论文的层次化组织，还有部分分析评审过程本身。
    - 监督信号从人类撰写的黄金综述到通过检索反馈的自进化各不相同，导致不同的训练和适应策略。
    - 交互模式从全自主生成到需要人工策展的辅助工具，反映了对用户角色的不同假设。
    开放问题:
    - 自动化文献综述智能体在生成长篇综述时如何确保事实准确性并避免虚构引用？
    - 何种评估协议能够替代或补充人类判断，以评估生成综述的连贯性、新颖性和批判性见解？
    - 当前多智能体评审系统在多大程度上易受对抗性论文或偏差检索的影响，以及如何使其鲁棒？
