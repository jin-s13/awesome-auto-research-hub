  literature_review:
    line_of_work_matrix:
    - line: Autonomous research pipelines with verification and self-correction (e.g.,
        AI CFD Scientist, AutoResearchClaw, SAGE, Claw AI Lab)
      what_it_solves: End-to-end automation of hypothesis generation, experiment execution,
        and result reporting, with mechanisms to detect and correct errors such as
        hallucinated metrics or silent simulation failures.
      what_remains_open: Verification gates can miss subtle failures (e.g., 2 of 16
        planted failures in CFD); fully autonomous paper writing remains unsolved;
        generalizability across scientific domains is limited.
    - line: Structured experiment planning and search (e.g., OR-Agent, EvoMaster)
      what_it_solves: Efficient exploration of hypothesis space via tree search, evolutionary
        algorithms, or multi-agent debate, enabling systematic backtracking, knowledge
        accumulation, and self-evolution.
      what_remains_open: Balancing exploration with exploitation in open-ended discovery;
        reliance on human-defined search spaces or reward signals; scalability to
        real-world laboratory settings.
    - line: Benchmarks and evaluation frameworks for AI scientists (e.g., BAISBench,
        ARC-Bench)
      what_it_solves: Providing standardized tasks and metrics, including human baselines,
        to compare AI scientist systems on cell annotation, scientific discovery questions,
        or experiment-stage challenges.
      what_remains_open: Current benchmarks cover limited domains (single-cell transcriptomics,
        ML topics); proxy metrics may not correlate with real scientific novelty or
        impact; human baselines are small-scale.
    - line: Research state modeling and failure diagnosis (e.g., SAGE's Multi-Hypothesis
        Failure Attribution)
      what_it_solves: Identifying root causes of experiment failures through causal
        diagnosis, enabling targeted self-correction at the hypothesis, design, or
        implementation level.
      what_remains_open: Failure attribution may not cover all failure modes; requires
        accurate modeling of experiment dynamics; effectiveness depends on the quality
        of trajectory features.
    - line: Surveys and taxonomies of agentic AI for science (e.g., Agentic AI for
        Scientific Discovery survey)
      what_it_solves: Organizing the landscape of AI scientist systems by domain and
        capability, identifying challenges like literature review automation, system
        reliability, and ethical concerns.
      what_remains_open: Taxonomies are descriptive; empirical validation that proposed
        categories predict system performance or guide design choices is lacking.
    consensus:
    - LLM-based agents can automate hypothesis generation and experimentation but
      require verification mechanisms to catch errors and hallucinations.
    - Structured workflows (multi-agent debate, tree search, evolutionary loops) outperform
      naive single-agent generation in producing defensible results.
    - Human collaboration at high-leverage decision points improves outcomes over
      both full autonomy and exhaustive step-by-step oversight.
    - Evaluation benchmarks are essential for measuring progress, but existing benchmarks
      are narrow in domain coverage and may not reflect real scientific value.
    - Self-correction and failure diagnosis are critical for robust autonomous research,
      as single-pass generation often produces invalid or unreproducible outputs.
    disagreements:
    - 'Verification strategy: some systems embed domain-specific physics-aware gates
      (CFD flow field inspection), while others rely on general self-healing loops
      or human feedback.'
    - 'Human involvement: approaches range from fully autonomous execution (EvoMaster,
      SAGE) to human-in-the-loop collaboration with multiple intervention modes (AutoResearchClaw,
      Claw AI Lab).'
    - 'Evaluation setting: domain-specific benchmarks (BAISBench for biology) vs.
      broad AI benchmarks (Humanity''s Last Exam) vs. task-specific experiment-stage
      metrics (ARC-Bench).'
    - 'Hypothesis generation mechanism: evolutionary search with structured trees
      (OR-Agent) vs. multi-agent debate (AutoResearchClaw) vs. continuous self-evolution
      (EvoMaster).'
    - 'Domain scope: domain-agnostic foundational frameworks (EvoMaster) vs. systems
      tightly integrated with a scientific domain''s toolchain and physics knowledge
      (AI CFD Scientist).'
    open_questions:
    - How can verification mechanisms be made robust enough to catch all critical
      failures without human intervention, especially in safety-critical scientific
      domains?
    - What metrics beyond task success rate can capture the novelty, reproducibility,
      and long-term impact of AI-generated hypotheses?
    - How can AI scientists handle open-ended discovery where the hypothesis space
      is unbounded and no ground-truth reward signal exists?
    - What is the optimal balance between autonomy and human oversight for different
      scientific domains, and how should intervention points be chosen?
    - How can we ensure that AI-generated hypotheses are ethically sound, do not reinforce
      biases, and are aligned with responsible research practices?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 具备验证与自我纠正的自主研究流水线（如AI CFD Scientist、AutoResearchClaw、SAGE、Claw AI Lab）
      解决的问题: 端到端自动化假设生成、实验执行和结果报告，并通过机制检测和纠正错误，例如幻觉指标或静默仿真失败。
      尚未覆盖: 验证门控可能遗漏细微失败（如CFD中16个植入失败漏掉2个）；完全自主的论文写作仍未解决；跨科学领域的泛化能力有限。
    - 路线: 结构化实验规划与搜索（如OR-Agent、EvoMaster）
      解决的问题: 通过树搜索、进化算法或多智能体辩论高效探索假设空间，实现系统回溯、知识积累和自我演化。
      尚未覆盖: 在开放式发现中平衡探索与利用；依赖人类定义的搜索空间或奖励信号；向真实实验室环境的可扩展性。
    - 路线: AI科学家的基准与评估框架（如BAISBench、ARC-Bench）
      解决的问题: 提供标准化任务和指标（含人类基线），用于在细胞注释、科学发现选择题或实验阶段挑战上比较AI科学家系统。
      尚未覆盖: 当前基准覆盖领域有限（单细胞转录组学、ML主题）；代理指标可能与真实科学新颖性或影响力不相关；人类基线规模较小。
    - 路线: 研究状态建模与失败诊断（如SAGE的多假设失败归因）
      解决的问题: 通过因果诊断识别实验失败的根本原因，从而在假设、设计或实现层面进行针对性自我纠正。
      尚未覆盖: 失败归因可能无法覆盖所有失败模式；需要准确建模实验动态；效果取决于轨迹特征的质量。
    - 路线: 面向科学的智能体AI综述与分类法（如Agentic AI for Scientific Discovery综述）
      解决的问题: 按领域和能力梳理AI科学家系统，识别文献综述自动化、系统可靠性和伦理问题等挑战。
      尚未覆盖: 分类法多为描述性；缺乏实证验证表明所提出的类别能预测系统性能或指导设计选择。
    共识:
    - 基于LLM的智能体可以自动化假设生成和实验，但需要验证机制来捕捉错误和幻觉。
    - 结构化工作流（多智能体辩论、树搜索、进化循环）在产生可辩护结果方面优于简单的单智能体生成。
    - 在高杠杆决策点进行人类协作，其效果优于完全自主或详尽的逐步监督。
    - 评估基准对于衡量进展至关重要，但现有基准在领域覆盖上较窄，可能无法反映真实科学价值。
    - 自我纠正和失败诊断对于鲁棒的自主研究至关重要，因为单次生成经常产生无效或不可复现的输出。
    分歧:
    - 验证策略：部分系统嵌入领域特定的物理感知门控（CFD流场检查），其他则依赖通用自愈循环或人类反馈。
    - 人类参与程度：从完全自主执行（EvoMaster、SAGE）到具有多种干预模式的人机协作（AutoResearchClaw、Claw AI Lab）。
    - 评估设置：领域特定基准（BAISBench针对生物学） vs. 广泛AI基准（Humanity's Last Exam） vs. 任务特定的实验阶段指标（ARC-Bench）。
    - 假设生成机制：进化搜索与结构化树（OR-Agent） vs. 多智能体辩论（AutoResearchClaw） vs. 持续自我演化（EvoMaster）。
    - 领域范围：领域无关的基础框架（EvoMaster） vs. 与科学领域工具链和物理知识紧密集成的系统（AI CFD Scientist）。
    开放问题:
    - 如何使验证机制足够鲁棒，以在无需人类干预的情况下捕捉所有关键失败，尤其是在安全攸关的科学领域？
    - 除了任务成功率，哪些指标能够衡量AI生成假设的新颖性、可复现性和长期影响力？
    - AI科学家如何处理假设空间无界且不存在真实奖励信号的开放式发现？
    - 对于不同科学领域，自主性与人类监督之间的最佳平衡是什么？应如何选择干预点？
    - 如何确保AI生成的假设在伦理上合理、不强化偏见，并与负责任的研究实践保持一致？
