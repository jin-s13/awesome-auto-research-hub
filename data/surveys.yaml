  related_work_outline:
  - 'Mainstream direction: Building end-to-end, self-evolving multi-agent systems
    that automate the full scientific discovery pipeline—literature search, data analysis,
    hypothesis generation, and manuscript writing—with iterative verification and
    human-in-the-loop oversight.'
  - 'Shared research pattern: Most works decompose the scientific workflow into specialized
    LLM-based agents (e.g., literature reviewer, analyst, writer) and orchestrate
    them through iterative loops, often with internal verification or rubric-guided
    refinement to improve output quality.'
  - 'Key differences: Systems diverge in knowledge representation (world model vs.
    tree-based workflow vs. evolutionary search), evaluation methodology (LLM-judge
    rubrics, human expert benchmarks, independent scientist ratings), and scope (survey
    generation only vs. full-cycle discovery).'
  - 'Trend evolution: From 2023 to 2026, the field moved from isolated survey generation
    engines toward comprehensive, self-evolving agent frameworks with explicit failure
    analysis. Evaluation shifted from automated metrics to human-aligned quality assessments
    and dedicated benchmarks.'
  - 'Open questions: How to guarantee factual accuracy and novelty of autonomously
    generated content; how to equip systems with domain depth and scientific taste
    beyond surface-level patterns; and how to validate that these systems accelerate
    genuine scientific progress rather than just produce well-formatted papers.'
  related_work_outline_zh:
  - 主流方向：构建端到端、自我演化的多智能体系统，自动化从文献搜索、数据分析、假设生成到论文撰写的完整科学发现流程，并引入迭代验证与人机协作。
  - 研究共性：多数工作将科学工作流分解为文献评审、分析、写作等基于LLM的专门智能体，通过迭代循环、内部验证或评分准则引导的优化来提升输出质量。
  - 关键差异：系统在知识表示（世界模型 vs. 树形工作流 vs. 进化搜索）、评估方法（LLM评审准则、人类专家基准、独立科学家评分）和任务范围（仅综述生成
    vs. 全周期发现）上存在分歧。
  - 趋势演进：2023至2026年，领域从独立的综述生成引擎发展为具有自我演化能力和失败分析的综合性智能体框架，评估重心从自动化指标转向人类对齐的质量评估和专项基准。
  - 开放问题：如何保证自主生成内容的真实性和新颖性；如何赋予系统超越表面模式的领域深度和科学品味；如何验证这些系统能加速真正的科学进步，而不仅仅是生成格式良好的论文。
  literature_review:
    line_of_work_matrix:
    - line: Automated literature synthesis and survey generation
      what_it_solves: Transforming fragmented collections of papers into structured,
        rubric-aligned academic surveys, reducing manual effort in literature review
        writing.
      what_remains_open: Verification that the generated surveys match the accuracy,
        comprehensiveness, and critical insight of human expert surveys across diverse
        fields, and whether they can correctly identify research gaps.
    - line: End-to-end agentic scientific discovery
      what_it_solves: Integrating literature search, data analysis, hypothesis generation,
        and experimental verification into a closed-loop, multi-agent system capable
        of producing novel, traceable scientific findings over extended periods.
      what_remains_open: System reliability over long horizons, degradation of reasoning
        due to memory limitations, susceptibility to shallow patterns, and ability
        to generate truly non-trivial hypotheses rather than reformulating known results.
    - line: Benchmarking and evaluation of AI scientists
      what_it_solves: Providing structured tasks, human performance baselines, and
        failure mode taxonomies to measure progress and identify capability gaps of
        autonomous research systems.
      what_remains_open: How well proxy metrics and curated benchmarks predict real-world
        scientific impact; coverage of diverse scientific disciplines and open-ended
        discovery tasks.
    - line: Self-evolving and structured reasoning architectures
      what_it_solves: Enabling agents to iteratively refine hypotheses, accumulate
        knowledge across cycles, and organize exploration through tree search or evolutionary
        mechanisms, improving long-term research quality.
      what_remains_open: Whether the self-evolution mechanisms generalize to open-ended
        scientific problems beyond the training or benchmark distribution, and whether
        they avoid overfitting to specific evaluation rubrics.
    - line: Conceptual taxonomy and failure analysis
      what_it_solves: Classifying existing agentic AI systems, identifying recurring
        failure modes, and deriving design principles to guide more robust system
        development.
      what_remains_open: Lack of direct empirical evidence that the proposed taxonomies
        or principles reliably predict system behavior or improve downstream research
        outcomes when applied in practice.
    consensus:
    - LLM-based agents are the dominant building block, with multi-agent orchestration
      used to decompose the scientific workflow into manageable subtasks such as literature
      search, analysis, and writing.
    - Iterative refinement loops—through internal verification, reviewer agents, or
      self-critique—are critical for improving output quality and reducing factual
      errors.
    - Current systems demonstrate substantial potential in assisting literature review
      and hypothesis generation, but they are not yet fully autonomous or reliable
      enough to replace human scientists in open-ended discovery.
    - Human evaluation, either via independent scientists or standardized rubrics,
      is increasingly adopted as a necessary complement to automated metrics, because
      surface-level format quality does not guarantee scientific validity.
    disagreements:
    - 'Knowledge representation: some systems use a centralized world model to share
      information between agents, while others employ tree-based workflows with explicit
      branching and backtracking, or pure evolutionary search without a shared state.'
    - 'Evaluation methodology: works differ in using LLM-based rubrics, human expert
      benchmarks with graduate students, or independent scientist ratings of generated
      reports; there is no agreed-upon standard for judging scientific novelty or
      depth.'
    - 'Task scope: some focus narrowly on generating survey papers or solving specific
      research tasks, while others aim for end-to-end, multi-cycle scientific discovery
      across multiple domains, leading to different assumptions about required agent
      capabilities.'
    - 'Supervision signal: systems vary from fully autonomous operation with minimal
      human prompts to tightly coupled human-in-the-loop collaboration where the human
      acts as principal investigator guiding the agent.'
    open_questions:
    - How can we verify that the findings reported by AI scientists are not only accurate
      but also novel and non-trivial, given that 20.6% of statements in one system
      were rated inaccurate?
    - What evaluation frameworks would reliably predict the impact of an AI scientist
      on real-world research progress, beyond benchmark scores or rubric-based quality
      ratings?
    - How can these systems acquire deep domain knowledge and scientific taste to
      avoid rediscovering known results or generating well-formatted but superficial
      papers?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化文献综合与综述生成
      解决的问题: 将碎片化的论文集合转化为结构化、符合评分准则的学术综述，减少人工撰写综述的负担。
      尚未覆盖: 生成的综述在准确性、全面性和批判性洞察力上是否与人类专家综述匹配，以及能否正确识别研究空白，尚缺乏跨领域验证。
    - 路线: 端到端智能体科学发现
      解决的问题: 将文献搜索、数据分析、假设生成和实验验证整合为闭环的多智能体系统，能够在长时间内产生新颖、可追溯的科学发现。
      尚未覆盖: 长时间跨度下的系统可靠性、记忆限制导致的推理退化、对表面模式的易感性，以及生成真正非平凡假设的能力，而非重新表述已知结果。
    - 路线: AI科学家的基准测试与评估
      解决的问题: 提供结构化任务、人类表现基线和失败模式分类，以衡量自主研究系统的进展并识别能力差距。
      尚未覆盖: 代理指标和精心设计的基准能在多大程度上预测真实世界的科学影响；不同科学学科和开放式发现任务的覆盖程度。
    - 路线: 自我演化与结构化推理架构
      解决的问题: 使智能体能够迭代优化假设，在周期中积累知识，并通过树搜索或进化机制组织探索，从而提高长期研究质量。
      尚未覆盖: 自我演化机制是否能泛化到训练或基准分布之外的开放式科学问题，以及是否能避免对特定评估准则的过拟合。
    - 路线: 概念分类与失败分析
      解决的问题: 对现有智能体AI系统进行分类，识别反复出现的失败模式，并推导出指导更稳健系统开发的设计原则。
      尚未覆盖: 缺乏直接经验证据证明所提出的分类法或原则能可靠预测系统行为，或在实践中应用时能改善下游研究结果。
    共识:
    - 基于LLM的智能体是主要构建模块，多智能体编排用于将科学工作流分解为文献搜索、分析和写作等可管理的子任务。
    - 通过内部验证、评审智能体或自我批判进行的迭代优化循环，对于提高输出质量和减少事实错误至关重要。
    - 当前系统在辅助文献综述和假设生成方面展现出巨大潜力，但尚未达到完全自主或在开放式发现中足够可靠以取代人类科学家的程度。
    - 通过独立科学家或标准化评分准则进行的人类评估，越来越多地被采用为自动化指标的必要补充，因为表面格式质量并不保证科学有效性。
    分歧:
    - 知识表示：有的系统使用中心化世界模型在智能体间共享信息，有的采用带显式分支和回溯的树形工作流，或纯粹的无共享状态的进化搜索。
    - 评估方法：不同工作在使用基于LLM的评分准则、研究生水平的人类专家基准，还是独立科学家对生成报告的评分上存在差异；目前尚无评判科学新颖性或深度的统一标准。
    - 任务范围：有的专注于生成综述论文或解决特定研究任务，有的则瞄准跨领域、多周期的端到端科学发现，导致对智能体所需能力的假设不同。
    - 监督信号：系统从几乎全自主运行并接受极少人类提示，到紧密耦合的人机协作（人类作为首席研究员指导智能体），控制程度各异。
    开放问题:
    - 鉴于某系统报告中有20.6%的陈述被评定为不准确，如何验证AI科学家所报告的发现不仅准确，而且是新颖且非平凡的？
    - 什么样的评估框架能够可靠地预测AI科学家对真实世界研究进展的影响，而不仅仅依赖基准分数或基于评分准则的质量评级？
    - 这些系统如何获取深层的领域知识和科学品味，以避免重新发现已知结果，或生成格式良好但内容肤浅的论文？
