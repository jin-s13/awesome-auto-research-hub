  literature_review:
    line_of_work_matrix:
    - line: State and representation modeling
      what_it_solves: Recovering reliable predictive states from noisy experimental
        observations and optimizing measurement quality to improve downstream decision-making.
      what_remains_open: Generalization to more complex noise models and diverse instrument
        modalities beyond the studied DFT and SDL datasets.
    - line: Action-conditioned control and planning
      what_it_solves: Automatically selecting experimental parameters and next-step
        actions via LLM agents or Bayesian optimization to close the loop between
        prediction and intervention.
      what_remains_open: Interpretability of agent decisions, long-horizon planning
        under safety constraints, and quantifying how much gain comes from the agent
        versus task-specific priors.
    - line: Evaluation and evidence design
      what_it_solves: Proposing benchmarks, metrics, and reproducibility standards
        to make claims about autonomous research systems comparable and verifiable.
      what_remains_open: Concrete implementation and community adoption of such benchmarks;
        empirical validation that proposed metrics correlate with real scientific
        discovery utility.
    - line: Systems and reproducible infrastructure
      what_it_solves: Building distributed, FAIR-data-driven self-driving laboratories
        that enable collaborative experimentation, automatic model updating, and repeatable
        workflows.
      what_remains_open: Standardized external validation across hardware platforms,
        scalability to complex scientific problems, and independence from specific
        cyberinfrastructure.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing fragmented approaches into task boundaries, assumptions,
