  related_work_outline_zh:
  - 主流方向：构建能迭代生成、执行和优化科学假设的自主AI研究智能体，常采用多智能体架构并结合人机协作。
  - 研究共性：通过多智能体辩论、自我改进循环以及显式验证或约束机制，将LLM的推理能力转化为可复现的实验工作流。
  - 关键差异：系统在验证机制（基于物理的视觉门控 vs. 基于事实的报告）、交互模式（完全自主 vs. 结构化人工干预）和领域特异性（通用框架 vs. 嵌入CFD、生物学或优化等特定领域）上存在分化。
  - 趋势演进：2025至2026年间，焦点从单一智能体流水线转向自我演化的多智能体框架、集成失败归因和可扩展的领域无关平台，同时评测基准开始涌现。
