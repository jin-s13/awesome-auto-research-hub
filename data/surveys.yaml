  related_work_outline_zh:
  - 主流方向：构建自主AI研究智能体，并通过基准测试、模拟同行评审和失败诊断评估其可靠性，代表性系统如The AI Scientist和DISCOVERYWORLD。
  - 研究共性：将科学工作流（构思、编码、实验、写作）自动化，然后通过任务完成度、工件质量和与人类表现的对比来衡量可信度。
