  related_work_outline:
  - 'Mainstream direction: Building multi-agent AI scientist systems that can autonomously
    perform literature search, data analysis, hypothesis generation, and paper writing,
    with iterative refinement or self-evolution.'
  - 'Shared research pattern: All systems rely on LLM-powered agents that mimic parts
    of the scientific workflow, and they attempt to improve output quality through
    feedback loops, rubric-guided evaluation, or world-model-based information sharing.'
  - 'Key differences: The degree of autonomy ranges from survey generation with human-in-the-loop
    rubric review to fully autonomous open-ended discovery; some systems embed deep
    domain-specific knowledge, while others aim for domain-agnostic self-evolution;
    evaluation approaches differ between human expert scoring, fixed benchmarks, and
    traceable statement verification.'
  - 'Trend evolution: From 2025 to 2026, the focus shifted from single-task automation
    like survey generation toward end-to-end autonomous research, incorporating structured
    world models, evolutionary search, and self-evolution; concurrently, benchmarking
    and failure analysis emerged to measure progress and identify systematic limitations.'
  - 'Open questions: How to guarantee long-term factual accuracy and reliability of
    generated content; how to balance autonomy with human-AI collaboration; the trade-off
    between cross-domain generalization and domain-specific knowledge embedding; management
    of memory and context degradation in long-horizon tasks; and how to evaluate scientific
    creativity and taste.'
  related_work_outline_zh:
  - 主流方向：构建能够自主执行文献搜索、数据分析、假设生成和论文撰写的多智能体AI科学家系统，通过迭代优化或自我演化提升输出质量。
  - 研究共性：所有系统都依赖LLM驱动的智能体模拟科研工作流，并尝试通过反馈循环、评分准则引导或世界模型信息共享来改进输出。
  - 关键差异：自主程度从有人类参与评分准则的综述生成到完全自主的开放式发现不等；部分系统深度嵌入领域知识，部分追求领域无关的自我演化；评估方式包括人类专家评分、固定基准测试和可追溯陈述验证。
  - 趋势演进：2025至2026年，焦点从单一任务自动化（如综述生成）转向端到端自主研究，引入结构化世界模型、进化搜索和自我演化；同时，基准测试和失败分析开始出现，以衡量进展并识别系统缺陷。
  - 开放问题：如何保证生成内容的长期事实准确性和可靠性；如何平衡自主性与人机协作；跨领域泛化与领域知识嵌入的权衡；长周期任务中记忆和上下文退化的管理；以及如何评估科学创造力和品味。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Establishes comparable tasks, baselines, and metrics for AI
        scientist systems, quantifying the gap between AI and human research capabilities
        on concrete discovery tasks.
      what_remains_open: Whether benchmark metrics predict real-world research productivity,
        and the coverage of diverse scientific domains beyond the evaluated single-cell
        transcriptomics scenario.
    - line: Systems and reproducible infrastructure
      what_it_solves: Integrates LLM capabilities into runnable multi-agent pipelines
        that automatically produce literature surveys or research manuscripts with
        traceable citations and validated code execution.
      what_remains_open: Cross-domain, cross-dataset external validation is missing;
        factual accuracy of generated content remains imperfect (e.g., 20.6% of statements
        may be inaccurate in one system), and reliability under long-horizon autonomous
        runs is unverified.
    - line: Conceptual taxonomy and theory
      what_it_solves: Catalogs failure modes of autonomous research systems through
        case studies and derives design principles to guide future system development,
        moving beyond ad-hoc fixes.
      what_remains_open: Direct empirical evidence that these taxonomies and principles
        can predict system behavior on new tasks or in new domains is lacking; the
        identified failure modes may not be exhaustive.
    - line: Agent architecture and self-evolution
      what_it_solves: Designs self-evolving, evolutionary search, or multi-agent coordination
        mechanisms that enable systems to iteratively refine hypotheses, accumulate
        knowledge, and achieve state-of-the-art results on multiple benchmarks.
      what_remains_open: Controllability of the self-evolution process and whether
        the marginal gain from self-evolution outweighs a well-engineered static pipeline
        remain unclear; scaling beyond 20 cycles is untested.
    consensus:
    - LLM-powered agents can perform parts of the scientific pipeline, such as literature
      summarization, code analysis, and draft generation, but end-to-end fully autonomous
      research is still unreliable and lacks scientific taste.
    - Iterative refinement loops—whether through rubric-guided review, multi-agent
      criticism, or world-model-based reasoning—are essential for improving output
      quality over single-pass generation.
    - Embedding domain-specific knowledge (e.g., via a data registry with educational
      expertise or a structured world model) improves the relevance and correctness
      of the system's outputs in specialized fields.
    disagreements:
    - 'System scope: Some systems target a single output type like a survey paper,
      while others aim for open-ended discovery across multiple scientific fields.'
    - 'Evaluation: One line relies on human expert rating of report accuracy, another
      uses fixed benchmark scores, and a third conducts controlled case studies with
      failure analysis.'
    - 'Autonomy level: Systems vary from fully autonomous runs that receive only an
      open-ended objective and dataset, to those that require a human-provided research
      prompt or rubric.'
    - 'Domain generality: Some frameworks are explicitly domain-agnostic and claim
      to be instantiable in ~100 lines of code, while others invest heavily in domain-specific
      encodings and data registries.'
    open_questions:
    - How can we prevent memory degradation and context loss in autonomous research
      cycles that span hundreds of agent rollouts?
    - What metrics or evaluation protocols can reliably capture scientific creativity,
      novelty, and taste beyond surface-level accuracy?
    - How can the factual accuracy of every generated statement be guaranteed, especially
      when the system synthesizes knowledge across multiple cited sources?
    - To what extent will the scientific community accept autonomously generated research
      manuscripts, and what verification standards are needed?
    - When building domain-specific versus domain-agnostic systems, what is the optimal
      depth of domain knowledge embedding to balance generality and performance?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 评测与证据设计
      解决的问题: 为AI科学家系统建立可比的任务、基线和评估指标，量化AI与人类在具体发现任务上的能力差距。
      尚未覆盖: 基准指标能否预测真实研究生产力，以及评估的领域多样性是否覆盖单细胞转录组学以外的场景。
    - 路线: 系统与可复现基础设施
      解决的问题: 将LLM能力整合为可运行的多智能体流水线，自动生成文献综述或研究手稿，并提供可追溯的引用和经过验证的代码执行。
      尚未覆盖: 跨领域、跨数据集的外部验证缺失；生成内容的事实准确性仍不完美（例如某系统20.6%的陈述可能不准确），长周期自主运行的可靠性未经验证。
    - 路线: 概念分类与理论
      解决的问题: 通过案例研究对自主研究系统的失败模式进行分类，并提炼设计原则，以指导后续系统构建，避免临时修补。
      尚未覆盖: 这些分类和原则能否在新任务或新领域中预测系统行为，缺乏直接实证；已识别的失败模式可能不完整。
    - 路线: 智能体架构与自我演化
      解决的问题: 设计自我演化、进化搜索或多智能体协调机制，使系统能迭代优化假设、积累知识，并在多个基准上取得最优结果。
      尚未覆盖: 自我演化过程的可控性，以及自我演化带来的边际收益是否超过设计良好的静态管道仍不明确；超过20个周期的扩展行为未经测试。
    共识:
    - LLM驱动的智能体能够执行部分科研流程，如文献总结、代码分析和草稿生成，但端到端完全自主的科研仍不可靠且缺乏科学品味。
    - 迭代优化循环——无论是通过评分准则引导的评审、多智能体批评还是基于世界模型的推理——对于提升输出质量至关重要，优于单次生成。
    - 嵌入领域特定知识（例如通过具有教育专业知识的数据注册表或结构化世界模型）能够提高系统在专业领域输出的相关性和正确性。
    分歧:
    - 系统范围：部分系统专注于单一输出类型（如综述论文），而其他系统则瞄准跨多个科学领域的开放式发现。
    - 评估方式：一条路线依赖人类专家对报告准确性的评分，另一条路线使用固定基准得分，第三条路线进行带有失败分析的受控案例研究。
    - 自主程度：系统从仅接收开放式目标和数据集的完全自主运行，到需要人类提供研究提示或评分准则的不同程度。
    - 领域通用性：部分框架明确声称领域无关，并可用约100行代码实例化，而其他框架则深度投入领域特定编码和数据注册表。
    开放问题:
    - 在跨越数百次智能体展开的自主研究周期中，如何防止记忆退化与上下文丢失？
    - 哪些指标或评估协议能够可靠地捕捉超越表面准确性的科学创造力、新颖性和品味？
    - 如何保证每个生成陈述的事实准确性，特别是当系统综合多个引用来源的知识时？
    - 科学界在多大程度上会接受自主生成的研究手稿，以及需要哪些验证标准？
    - 在构建领域特定与领域无关的系统时，领域知识嵌入的最佳深度是什么，以平衡通用性和性能？
