  related_work_outline:
  - 'Mainstream direction: Building LLM-driven multi-agent or iterative pipelines
    that automate literature survey generation, citation curation, and research-gap
    discovery by decomposing scholarly tasks into specialized roles.'
  - 'Shared research pattern: Systems simulate academic workflows—search, extraction,
    synthesis, review—and refine output through structured feedback loops, often producing
    a structured manuscript or report.'
  - 'Key differences: Output type (survey vs. hypothesis report vs. full paper), evaluation
    method (human rubric scores vs. automated benchmarks), and whether literature
    search is tightly coupled with data analysis or a standalone module.'
  - 'Trend evolution: Within 2023–2026 the frontier moves from single-pass literature
    tools toward self-evolving, traceable, domain-agnostic agents that embed literature
    intelligence as a core component of autonomous scientific discovery.'
  - 'Open questions: Can automated surveys achieve genuine critical synthesis beyond
    summarization? How to verify coverage, timeliness, and factual accuracy of retrieved
    literature across long-horizon runs?'
  related_work_outline_zh:
  - 主流方向：构建以大语言模型驱动的多智能体或迭代流水线，自动完成文献综述生成、引文管理和研究缺口发现，将学术任务分解为专业化角色。
  - 研究共性：系统模拟学术工作流（搜索、提取、综合、评审），通过结构化反馈循环优化输出，通常生成结构化手稿或报告。
  - 关键差异：输出类型（综述 vs. 假设报告 vs. 完整论文），评估方式（人工评分准则 vs. 自动基准），文献搜索与数据分析是紧密耦合还是独立模块。
  - 趋势演进：2023–2026年间，前沿从单次文献工具转向具备自演化、可追溯、领域无关的智能体，文献智能正成为自主科学发现的核心组件。
  - 开放问题：自动综述能否实现真正的批判性综合而不仅仅是摘要？如何验证长周期运行中文献检索的覆盖度、时效性和事实准确性？
  literature_review:
    line_of_work_matrix:
    - line: Automated survey synthesis
      what_it_solves: Generating structured, coherent academic surveys from large
        paper collections, reducing manual drafting effort.
      what_remains_open: Critical synthesis depth, handling of unpublished or conflicting
        viewpoints, and long-document coherence remain unverified.
    - line: Literature search and knowledge integration
      what_it_solves: Dynamically retrieving, filtering, and cross-referencing literature
        within a research pipeline to inform hypothesis generation and validation.
      what_remains_open: Retrieval recall over fast-moving fields, mitigation of factually
        incorrect citations, and contamination of downstream reasoning by outdated
        sources.
    - line: Evaluation and benchmarking for literature intelligence
      what_it_solves: Providing standardized tasks, metrics, and human baselines to
        assess citation accuracy, survey quality, and literature-driven discovery.
      what_remains_open: Existing benchmarks are domain-specific; no agreed-upon proxy
        for long-term scholarly utility, and alignment between rubric scores and real
        research impact is untested.
    - line: Multi-agent collaborative literature workflows
      what_it_solves: Decomposing literature tasks across specialized agents (retrieval,
        summarization, review) and iteratively refining output through role-based
        feedback.
      what_remains_open: Consistency and efficiency of agent communication, and the
        effect of reviewer subjectivity on final quality, especially under ambiguous
        academic criteria.
    consensus:
    - All systems adopt LLM-based iterative or multi-agent architectures that treat
      literature processing as a multi-step workflow.
    - Structured output (LaTeX manuscript, traceable report) is the standard deliverable,
      aligning with academic communication norms.
    - Current methods acknowledge significant gaps in factual accuracy, critical depth,
      and handling of long-tail or contradictory literature.
    disagreements:
    - 'Target output differs: some systems produce a standalone survey, others generate
      a hypothesis-driven research report, and a few output a full paper with experimental
      results.'
    - 'Evaluation settings diverge: rubric-based human scoring, automated benchmarks
      on domain-specific datasets, and qualitative case studies with no standardized
      metric.'
    - 'The role of external knowledge varies: some systems perform live retrieval
      and cross-validation, while others rely on pre-trained model knowledge without
      real-time search, affecting claim timeliness and verifiability.'
    open_questions:
    - What verification mechanism can ensure that cited literature is up-to-date,
      accurately represented, and not hallucinated across hundreds of agent rollouts?
    - Can automated literature synthesis move beyond extractive summarization to produce
      novel, critical insights comparable to human-written surveys?
    - How should we design longitudinal, multi-domain benchmarks that measure the
      real scholarly utility of generated literature artifacts rather than surface-level
      proxy scores?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述合成
      解决的问题: 从大量论文中自动生成结构化、连贯的学术综述，减少人工撰写工作量。
      尚未覆盖: 批判性综合深度、对未发表或冲突观点的处理，以及长文档的连贯性尚未验证。
    - 路线: 文献搜索与知识整合
      解决的问题: 在研究流程中动态检索、筛选和交叉验证文献，以支持假设生成与验证。
      尚未覆盖: 快速变化领域的检索召回率、事实错误引用的缓解，以及过时来源对下游推理的污染。
    - 路线: 文献智能的评估与基准
      解决的问题: 提供标准化任务、指标和人类基线，以评估引用准确性、综述质量和文献驱动的发现。
      尚未覆盖: 现有基准多为领域特定，缺乏公认的长期学术价值代理指标，评分准则与真实研究影响力之间的一致性未经测试。
    - 路线: 多智能体协作的文献工作流
      解决的问题: 将文献任务分解到不同专业智能体（检索、总结、评审），通过角色反馈迭代优化输出。
      尚未覆盖: 智能体通信的一致性和效率，以及评审者主观性对最终质量的影响，尤其在学术标准模糊时。
    共识:
    - 所有系统均采用基于大语言模型的迭代或多智能体架构，将文献处理视为多步骤工作流。
    - 结构化输出（LaTeX 手稿、可追溯报告）是标准交付物，符合学术传播规范。
    - 当前方法普遍承认在事实准确性、批判深度和处理长尾或矛盾文献方面存在显著不足。
    分歧:
    - 目标输出不同：有的生成独立综述，有的生成假设驱动的研究报告，少数生成包含实验结果的完整论文。
    - 评估设置各异：基于评分准则的人工评分、在领域特定数据集上的自动基准，以及缺乏标准化指标的定性案例研究。
    - 外部知识依赖程度不同：部分系统进行实时检索与交叉验证，另一些则依赖预训练模型知识而缺乏实时搜索，影响主张的时效性和可验证性。
    开放问题:
    - 什么样的验证机制能确保所引文献在数百次智能体展开中保持最新、准确且不产生幻觉？
    - 自动化文献综合能否超越抽取式摘要，产生与人类撰写综述相当的新颖、批判性见解？
    - 如何设计纵向、多领域基准，以衡量生成文献成果的真实学术价值，而非表面代理分数？
