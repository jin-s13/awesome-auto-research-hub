  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Automating the full cycle of ideation, code implementation,
        experiment execution, and manuscript writing without human intervention, as
        demonstrated by frameworks like The AI Scientist and its successor.
      what_remains_open: Reliability across diverse domains, mitigation of recurring
        failure modes such as implementation drift and overexcitement, and whether
        generated claims withstand rigorous peer review beyond workshop level.
    - line: Domain-specific verification and safety gates
      what_it_solves: Ensuring physical or factual validity of AI-generated experiments
        by integrating vision-language checks or physics-aware modules that detect
        silent failures, exemplified by AI CFD Scientist.
      what_remains_open: Generalizability of verification gates to other scientific
        disciplines, residual risk of missed failures, and the trade-off between gate
        strictness and research exploration.
    - line: Benchmarks and evaluation environments
      what_it_solves: Providing standardized tasks and metrics to compare AI scientist
        agents on scientific discovery capabilities, such as DISCOVERYWORLD and BAISBench.
      what_remains_open: Alignment of proxy tasks with real-world scientific impact,
        coverage of diverse scientific practices, and the gap between benchmark performance
        and actual autonomous discovery.
    - line: Multi-agent collaboration platforms
      what_it_solves: Enabling customizable research teams with role specialization,
        real-time monitoring, and human-in-the-loop control, as seen in Claw AI Lab.
      what_remains_open: Scalability beyond limited case studies, integration with
        physical laboratory infrastructure, and consistent superiority over single-agent
        approaches.
    - line: Failure analysis and design principles
      what_it_solves: Cataloging recurring failure modes of LLM-based research agents—such
        as bias toward training data defaults, memory degradation, and weak scientific
        taste—to inform robust system design.
      what_remains_open: Empirical validation that applying these design principles
        improves success rates across multiple independent attempts and domains.
    consensus:
    - Large language models serve as the core reasoning and generation engine across
      all autonomous research systems.
    - The scientific discovery process is modeled as a cyclic workflow of hypothesis
      generation, experiment design and execution, result analysis, and manuscript
      writing.
    - Current systems are not yet fully reliable or generalizable, and all acknowledge
      significant gaps in evaluation, robustness, and domain coverage.
    - Automation aims to reduce human effort but not necessarily eliminate human oversight;
      most systems include some form of review or monitoring.
    disagreements:
    - 'Verification mechanisms differ: some rely on automated reviewer scores, others
      on physics-based simulation checks, and still others on benchmark task completion
      metrics.'
    - Interaction modes vary from fully autonomous operation to interactive platforms
      with human-in-the-loop control and real-time monitoring.
    - Application scope ranges from general machine learning subfields to specialized
      scientific domains such as computational fluid dynamics and single-cell transcriptomics.
    - 'Evaluation strategies diverge: some use internal automated reviewers, others
      use external benchmark environments, and a few submit to real peer review.'
    open_questions:
    - How can AI scientist systems guarantee the statistical and scientific validity
      of their claims beyond surface-level metrics?
    - Can domain-specific verification gates be generalized across scientific fields,
      or must each domain develop its own validity checks?
    - To what extent do existing benchmark tasks capture the complexity and creativity
      of real-world scientific discovery?
    - What mechanisms can systematically reduce the six documented failure modes,
      such as implementation drift and overexcitement, across diverse research attempts?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流水线
      解决的问题: 无需人工干预，自动完成构思、代码实现、实验执行和论文撰写的完整循环，如The AI Scientist及其后续版本所示。
      尚未覆盖: 跨领域的可靠性，对实现漂移和过度兴奋等重复失败模式的缓解，以及生成的声明能否在研讨会级别之外经受严格同行评审。
    - 路线: 领域特定验证与安全门控
      解决的问题: 通过集成视觉语言检查或物理感知模块来确保AI生成实验的物理或事实有效性，检测静默失败，以AI CFD Scientist为代表。
      尚未覆盖: 验证门控对其他科学学科的泛化能力，漏检的残余风险，以及门控严格性与研究探索性之间的权衡。
    - 路线: 基准与评估环境
      解决的问题: 提供标准化任务和指标，以比较AI科学家智能体的科学发现能力，如DISCOVERYWORLD和BAISBench。
      尚未覆盖: 代理任务与真实世界科学影响的对齐，多样化科学实践的覆盖，以及基准表现与实际自主发现之间的差距。
    - 路线: 多智能体协作平台
      解决的问题: 支持角色专业化、实时监控和人机协作的可定制研究团队，如Claw AI Lab所示。
      尚未覆盖: 在有限案例研究之外的可扩展性，与物理实验室基础设施的集成，以及相对于单智能体方法的一致优越性。
    - 路线: 失败分析与设计原则
      解决的问题: 对基于LLM的研究智能体的重复失败模式进行分类——如对训练数据默认值的偏见、记忆退化和薄弱的科学品味——以指导稳健系统设计。
      尚未覆盖: 应用这些设计原则能否在多个独立尝试和领域中提高成功率，尚缺乏实证验证。
