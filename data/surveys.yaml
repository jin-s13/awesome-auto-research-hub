  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous discovery frameworks
      what_it_solves: Automating the full scientific workflow from idea generation
        and code implementation to experiment execution and manuscript writing, reducing
        per-paper cost and human effort.
      what_remains_open: Cross-domain generalization beyond the demonstrated ML subfields;
        consistent production of peer-review-ready papers; and verification that generated
        claims are not hallucinated or based on flawed experiments.
    - line: Benchmarks and virtual environments for scientific discovery agents
      what_it_solves: Providing standardized, reproducible tasks and metrics to compare
        AI scientists on hypothesis formation, experimentation, and knowledge discovery,
        with human baselines for calibration.
      what_remains_open: Alignment of benchmark performance with real-world scientific
        impact; coverage of the full diversity of scientific reasoning beyond text-based
        or simplified simulators; and validation that proxy metrics correlate with
        genuine discovery utility.
    - line: Reliability and self-correction mechanisms
      what_it_solves: Detecting and diagnosing experiment failures through structured
        causal attribution, physics-informed verification, or reflection loops, thereby
        increasing the fraction of valid, metrics-bearing outputs.
      what_remains_open: Handling complex, multi-cause failures that span hypothesis,
        implementation, and evaluation; integrating domain-specific validity checks
        without hard-coding them per field; and scaling self-correction to long-horizon,
        open-ended research campaigns.
    consensus:
    - Large language models are currently the only viable backbone for open-ended
      scientific reasoning in automated research agents.
    - Closed-loop experimentation with execution feedback is essential for producing
