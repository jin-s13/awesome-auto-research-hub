  related_work_outline:
  - 'Mainstream direction: Building and evaluating autonomous AI research agents with
    increasing emphasis on reliability, verification, and standardized benchmarks.'
  - 'Shared research pattern: Systems decompose the scientific workflow into stages
    (hypothesis, experiment, analysis, writing) and use LLMs as core reasoning engines,
    with evaluation via task completion, artifact quality, or peer review.'
  - 'Key differences: Some focus on end-to-end paper generation in ML, others on domain-specific
