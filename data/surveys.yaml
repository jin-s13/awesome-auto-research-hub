    研究路线矩阵:
    - 路线: 端到端自动论文生成流水线
      解决的问题: 从想法到最终文本生成完整科学手稿，包括代码执行和图表生成，降低初期研究起草的成本和周转时间。
      尚未覆盖: 输出质量不稳定，仅小部分论文通过同行评审；当前评估依赖自动评审或低风险工作坊，未达到完整会议或期刊接收水平。
    - 路线: 研究写作中的自我纠正与失败感知记忆
      解决的问题: 诊断并恢复实验失败、实现错误或幻觉结果，并防止相同错误在研究循环中重复出现。
      尚未覆盖: 这些机制仅在小规模基准或单一领域任务上验证；失败知识在不同科学问题和写作风格之间的迁移尚未得到证明。
    - 路线: 论文组成部分（消融、评审）的规划与评估
      解决的问题: 通过提出必要的消融实验和识别缺失分析，自动化实证论文的逻辑结构，同时支持作者和审稿人。
      尚未覆盖: 当前基准仅覆盖论文规划的狭窄部分（消融实验），语言模型性能仍远低于人类专家；引言、相关工作或讨论等其他部分的评估尚未涉及。
    - 路线: 领域锚定的科学写作验证
      解决的问题: 将领域特定的有效性检查（如基于物理的视觉-语言门控）集成到写作流水线中，在结果进入手稿前丢弃物理上不可信的结果。
      尚未覆盖: 将此类验证门控推广到缺乏明确定义视觉或数值真值的领域尚未得到验证；即使在CFD中，门控仍遗漏了一些静默失败，表明存在验证缺口。
    共识:
    - 基于LLM的智能体现在可以端到端草拟可运行的研究论文，但生成的手稿仍然缺乏人类作者工作的深度、批判性思维和可靠性。
    - 具有验证、反思或记忆组件的多阶段流水线一贯优于单次生成，因为它们能够检测并从执行错误和缺乏根据的主张中恢复。
    - 即使是最先进的系统，也只有一小部分论文能达到人类同行评审标准，并且所使用的评估协议（自动评审、工作坊场所）尚不等同于顶级会议或期刊的接收。
    分歧:
    - 人类参与的角色：AutoResearchClaw展示在高杠杆决策点进行精准人机协作优于完全自主，而AI Scientist系列则通过更强的智能体树搜索推动零人类干预。
    - 验证的范围：AI CFD Scientist通过视觉-语言检查强制执行领域特定的物理有效性，而通用系统依赖代码执行成功或自动评审分数，这反映出对什么构成科学上可靠主张的不同假设。
    - 从失败中学习的机制：SAGE在单次运行中使用多假设因果归因进行纠正，Negative Knowledge将失败记录跨运行存储以防止复发，AI Scientist-v2则依赖树搜索回溯，没有显式记忆。
    开放问题:
    - 如何使自动论文评估与多样领域的人类专家判断对齐，超越简单的评分量表或工作坊级别的接受？
    - 确保AI生成的科学主张在事实上可靠、可复现且无幻觉数值结果所需的最小验证门控集合是什么？
    - 失败感知记忆和自我纠正能否在不同科学领域、写作惯例和实验范式之间泛化，而无需昂贵的领域特定工程？
