      what_remains_open: Alignment of automated review with human judgment on long-term
        scientific value, and how to embed ethical and safety review.
    consensus:
    - Automated research systems require repeatable evaluation workflows beyond single-task
      success.
    - Current systems still show significant gaps in producing fully autonomous reliable
      scientific results, necessitating verification and correction.
    - Benchmarks and simulated environments are critical infrastructure for advancing
      system development.
    disagreements:
    - 'Evaluation target: some aim for peer-review acceptance of generated papers,
      others target physical simulation correctness or biological discovery quality.'
    - 'Interaction mode: some advocate fully autonomous end-to-end pipelines, while
      others design interactive platforms with human monitoring and intervention.'
    - 'Verification strategy: some rely on external benchmarks and virtual environments,
      others adopt internal multi-hypothesis failure attribution and physics-aware
      gates.'
    open_questions:
    - How to design benchmarks that capture the creativity of open-ended scientific
      discovery rather than only reproducing known tasks?
    - Can self-correction mechanisms operate effectively in open-domain science where
      ground truth is unavailable?
    - What governance frameworks are needed to ensure safety and accountability when
      AI scientist systems are deployed in high-stakes domains?
