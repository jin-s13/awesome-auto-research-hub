    - 路线: 端到端自动综述生成系统
      解决的问题: 从大量文献中自动检索、综合并撰写结构化综述，减少人工工作量。
      尚未覆盖: 分析深度与批判性仍落后于人类撰写的综述；引用幻觉与忠实性问题依然存在；在超大规模文献集（数千篇）上的可扩展性和跨领域泛化能力尚不稳健。
    - 路线: 分类法生成与文献组织
      解决的问题: 自动构建层次化分类体系，将论文组织为有意义的类别，支撑综述结构。
      尚未覆盖: 与人类专家分类体系的对齐有限（如高兄弟节点重叠、MECE违反）；现有树编辑指标可能未捕捉实际效用；分类法质量对下游综述质量的因果影响尚未验证。
    - 路线: 评估基准与指标设计
      解决的问题: 提供标准化协议和指标，评估综述的内容覆盖度、引用准确性、结构连贯性和分类对齐等质量维度。
      尚未覆盖: 自动指标与人类专家判断的一致性尚未充分建立；基准在领域和时间覆盖上往往较窄；衡量分析深度和批判性综合的指标发展不足。
    共识:
    - 所有方法均以大语言模型为核心生成引擎。
    - 普遍采用迭代优化，无论是通过多智能体评审、大纲更新还是反馈循环，以提升输出质量。
    - 引用准确性和内容覆盖度被视为主要质量维度。
    - 评估结合自动指标与某种形式的人工评估或专家参考。
    分歧:
    - 系统架构：部分采用分阶段模块的单一流水线，另一些则使用多个专门智能体异步协作。
    - 输入粒度：方法在仅处理标题和摘要，还是进行全文分析以提取结构化要点和跨论文关系上存在差异。
    - 评估理念：一条路线使用基于参考的与专家分类体系对齐（如树编辑距离），另一条使用无参考的自动指标衡量连贯性和相关性，第三条依赖成对人工偏好判断。
    - 分类法角色：分类法生成在部分工作中是显式的独立任务，而在其他工作中层次化组织被隐式嵌入综述撰写过程。
    开放问题:
    - 何种机制能缩小自动综述与人工综述在批判性分析和论证深度上的差距？
    - 如何设计评估基准，使其覆盖多样研究领域和时间动态，同时与人类专家偏好保持强相关性？
    - 提升分类法结构质量是否直接带来更有用的综述，以及如何衡量？
    - 在扩展到数千篇文献时，需要哪些架构或检索创新来保持引用精确性和内容连贯性？
