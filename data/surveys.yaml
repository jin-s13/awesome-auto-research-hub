        adversarial defenses are not yet proposed.
    - line: Self-evolving retrieval agents
      what_it_solves: Enables literature retrieval agents that adapt and improve their
        search strategies over time without manual redesign.
      what_remains_open: No implementation or evaluation evidence is available; the
        concept of self-evolution in retrieval is not validated against static retrieval
        baselines.
    - line: Benchmarking research automation agents
      what_it_solves: Provides task suites to measure LLM agents' ability to automate
