  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous scientific discovery systems
      what_it_solves: Automating the full research cycle—idea generation, code implementation,
        experiment execution, manuscript writing, and simulated review—to produce
        conference-level papers with minimal human intervention.
      what_remains_open: Inconsistent output quality (only 1/3 of AI Scientist-v2
        papers passed peer review), dependence on automated reviewer validity, and
        lack of rigorous external validation across diverse scientific domains beyond
        machine learning.
    - line: Experiment planning and ablation automation
      what_it_solves: Benchmarking and improving language model agents on planning
        ablation experiments, identifying missing ablations, and grounding experiment
        design in method descriptions.
      what_remains_open: Current systems achieve only ~45% recall of human-designed
        ablations, and inverse performance between author and reviewer tasks suggests
        grounding gaps that prevent consistent behavior.
    - line: Failure-aware memory and knowledge reuse
      what_it_solves: Capturing failed experiment attempts as structured negative
        knowledge, enabling agents to avoid repeated mistakes and transfer failure
        insights across related scientific tasks.
      what_remains_open: Generalizability of negative knowledge across broader task
        families and whether the approach scales to open-ended exploration where failure
        modes are less bounded.
    - line: Virtual environments for scientific discovery agents
      what_it_solves: Providing a controlled, reproducible benchmark with 120 tasks
        spanning multiple science topics to evaluate agents on hypothesis formation,
        experiment design, and conclusion drawing.
      what_remains_open: Transfer of skills from text-based virtual environments to
        real-world lab experimentation and integration of physical constraints and
        sensor data.
    - line: Conceptual design and governance of autonomous research labs
      what_it_solves: Outlining community agendas, task boundaries, and ethical frameworks
        for building autonomous research pipelines in specific domains like recommender
        systems.
      what_remains_open: Entirely conceptual with no prototype or empirical validation;
        realization depends on unproven community consensus and resource investment.
    consensus:
    - Large language models can serve as the reasoning backbone for autonomous experiment
      agents, iterating over hypothesis, code, execution, and analysis.
    - Agentic architectures with tool use and feedback loops outperform simpler prompt-based
      baselines on experiment-oriented tasks.
    - Automated evaluation and benchmarking are critical for progress, but current
      automated reviewers and benchmarks are imperfect proxies for real scientific
      merit.
    - Multi-agent collaboration and role specialization improve research quality over
      single-agent setups.
    - Current systems remain below expert human performance and require human oversight
      for safety, correctness, and novelty assessment.
    disagreements:
    - 'Automation scope: full paper generation vs. focused experiment planning vs.
      failure-memory augmentation, each prioritizing different stages of the research
      pipeline.'
    - 'Evaluation target: reliance on automated reviewer scores vs. human peer review
      vs. benchmark task completion metrics, leading to different claims of success.'
    - 'Interaction model: single-agent end-to-end loops vs. multi-agent teams with
      customizable roles and real-time human monitoring, affecting reproducibility
      and scalability.'
    - 'Deployment setting: pure code-based experimentation in machine learning vs.
      domain-specific virtual environments vs. purely conceptual position papers,
      resulting in varying levels of empirical evidence.'
    open_questions:
    - Can automated experiment planning agents achieve human-level recall and precision
      on ablation design, and what grounding mechanisms are needed to close the gap?
    - How do negative knowledge banks scale to open-ended scientific domains where
      failure modes are not enumerable?
    - What is the transfer validity from virtual discovery environments to real-world
      lab automation, and which missing physical/safety constraints must be modeled?
    - What rigorous external validation protocols can certify that an AI-generated
      paper represents genuine scientific progress rather than plausible mimicry?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端全自动科学发现系统
      解决的问题: 自动化完整研究循环——从想法生成、代码实现、实验执行到论文撰写和模拟评审，以最少人工干预产出会议级别论文。
      尚未覆盖: 输出质量不稳定（AI Scientist-v2 仅 1/3 论文通过同行评审），依赖自动评审的有效性，且缺乏跨机器学习以外领域的严格外部验证。
    - 路线: 实验规划与消融自动化
      解决的问题: 基准测试和改进语言模型智能体在规划消融实验、发现缺失消融以及将实验设计建立于方法描述之上的能力。
      尚未覆盖: 当前系统仅能召回人类设计消融的约 45%，作者任务与审稿人任务之间的反向表现表明存在基础性缺口，阻碍行为一致性。
    - 路线: 失败感知记忆与知识复用
      解决的问题: 将失败的实验尝试转化为结构化的负知识，使智能体能够避免重复错误，并在相关科学任务间迁移失败洞察。
      尚未覆盖: 负知识在更广泛任务族上的泛化能力，以及该方法在失败模式不封闭的开放式探索中是否可扩展。
    - 路线: 科学发现智能体的虚拟环境
      解决的问题: 提供受控、可复现的基准，包含 120 个跨多科学主题的任务，用于评估智能体在假设形成、实验设计和得出结论方面的能力。
      尚未覆盖: 从基于文本的虚拟环境到真实世界实验室实验的技能迁移，以及物理约束与传感器数据的集成。
    - 路线: 自主研究实验室的概念设计与治理
      解决的问题: 为特定领域（如推荐系统）构建自主研究管道，概述社区议程、任务边界和伦理框架。
      尚未覆盖: 纯概念性，无原型或实证验证；实现取决于未经证实的社区共识和资源投入。
    共识:
    - 大语言模型可作为自主实验智能体的推理骨干，在假设、代码、执行和分析之间迭代。
    - 具备工具使用和反馈循环的智能体架构在面向实验的任务上优于简单的提示基线。
    - 自动评估和基准测试对进步至关重要，但当前的自动评审和基准是真实科学价值的非完美代理。
    - 多智能体协作和角色专业化相比单智能体设置能提高研究质量。
    - 当前系统仍低于人类专家水平，在安全性、正确性和新颖性评估方面需要人类监督。
    分歧:
    - 自动化范围：完整论文生成 vs. 聚焦实验规划 vs. 失败记忆增强，各自强调研究管道的不同阶段。
    - 评估目标：依赖自动评审分数 vs. 人类同行评审 vs. 基准任务完成指标，导致不同的成功主张。
    - 交互模式：单智能体端到端循环 vs. 具有可定制角色和实时人类监控的多智能体团队，影响可复现性与可扩展性。
    - 部署设置：纯基于代码的机器学习实验 vs. 领域特定虚拟环境 vs. 纯概念立场论文，致使实证证据水平参差不齐。
    开放问题:
    - 自动实验规划智能体能否在消融设计上达到人类水平的召回率和精确率，需要何种根基机制来弥合差距？
    - 负知识库如何扩展到失败模式不可枚举的开放式科学领域？
    - 从虚拟发现环境到真实世界实验室自动化的迁移有效性如何，必须建模哪些缺失的物理/安全约束？
    - 何种严格的外部验证协议能够证明 AI 生成的论文代表真正的科学进步，而非貌似合理的模仿？
