        Scientist引入自动审稿人；SAGE追踪包含指标的输出和盲评分数。
      尚未覆盖: 覆盖ML和生物学之外的多样科学领域，代理指标与真实科学影响力的一致性，以及检测静默失败等细微错误（AI CFD Scientist的视觉门控遗漏了16个植入失败中的2个）。
    - 路线: 系统与可复现基础设施
      解决的问题: 将单点模型想法转化为可运行的系统、工件和可重复流程。AI CFD Scientist开源并包含Foam-Agent和验证门控；AI Scientist及v2提供代码和框架；Claw
        AI Lab提供代码工具和交互式仪表板。
