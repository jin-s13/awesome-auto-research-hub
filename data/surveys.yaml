  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research and writing pipelines
      what_it_solves: Automates the full scientific discovery cycle from idea generation,
        code implementation, and experiment execution to paper writing and simulated
        review, aiming to produce complete manuscripts at low cost.
      what_remains_open: Consistency of output quality; only a fraction of generated
        papers pass real peer review; domain generalization beyond machine learning
        subfields is largely unverified; and the systems still lack the nuanced scientific
        taste required for high-impact contributions.
    - line: Failure diagnosis and self-correction mechanisms
      what_it_solves: Addresses the brittleness of autonomous agents by detecting
        and attributing experiment failures, then routing corrections to the appropriate
        stage (hypothesis, design, implementation) or recording negative results to
        avoid repetition.
      what_remains_open: Coverage of failure modes is limited to common patterns observed
        in a few case studies; the long-term accumulation and transfer of negative
        knowledge across diverse research topics is not yet demonstrated; and the
        interaction between failure correction and creative hypothesis generation
        is underexplored.
    - line: Human-AI collaboration design for scientific writing
      what_it_solves: Integrates human judgment at high-leverage decision points,
        such as hypothesis prioritization or result verification, to combine the efficiency
        of autonomous agents with human expertise, achieving better outcomes than
        fully autonomous or fully manual workflows.
      what_remains_open: Optimal collaboration modes and intervention timing are task-specific;
        the cost-benefit trade-off between human effort and output quality has not
        been systematically studied; and the approach relies on the availability of
        domain experts, limiting scalability.
    - line: Evaluation benchmarks for AI research agents
      what_it_solves: Provides standardized tasks and metrics to assess specific research
        skills such as ablation planning, experimental execution, and paper writing,
        enabling comparison across different agent architectures.
      what_remains_open: Existing benchmarks cover only narrow slices of the research
        process (e.g., ablation design) and rely on LLM-based judges whose alignment
        with human expert evaluation is not fully validated; real-world scientific
        impact remains unmeasured.
    consensus:
    - LLM-based agents can execute parts of the scientific workflow and produce papers
      that occasionally pass initial review filters, but their outputs are not yet
      consistently reliable.
    - A naive end-to-end pipeline without error handling or human oversight suffers
      from high failure rates due to implementation drift, hallucinated results, and
      poor experimental design.
    - Incorporating feedback loops — whether through automated review, failure attribution,
      or human intervention — significantly improves the quality and trustworthiness
      of generated research.
    - The cost of running these systems is low enough to enable large-scale experimentation,
      but the value of the resulting science remains an open question.
    disagreements:
    - 'Fully autonomous vs. human-in-the-loop: Some argue that complete autonomy is
      the ultimate goal, while others demonstrate that targeted human collaboration
      at key decision points outperforms both full autonomy and exhaustive oversight.'
    - 'Failure handling: Approaches range from simple reflection and retry to structured
      multi-hypothesis causal attribution, to external memory banks of negative knowledge
      — with no consensus on which is most effective or generalizable.'
    - 'Search strategy: Some systems use linear agent pipelines, others adopt progressive
      tree search, and yet others employ multi-agent debate — the relationship between
      search complexity and scientific quality is not settled.'
    - 'Evaluation rigor: One line of work evaluates via internal benchmarks and automated
      reviewers, while another submits papers to real workshops or conferences, leading
      to different claims about what constitutes a successful AI scientist.'
    open_questions:
    - What evaluation protocol can reliably measure the long-term scientific value
      of AI-generated papers, beyond short-term acceptance rates?
    - How can these systems generalize beyond well-structured ML domains to fields
      where experiments are expensive, data is scarce, or physical validation is required?
    - To what extent can failure memory and self-correction mechanisms substitute
      for human insight when the research direction itself is flawed?
    - What is the minimal human intervention required to guarantee scientific honesty
      and reproducibility, and how can that interaction be made scalable?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主科研与写作管线
      解决的问题: 自动化从想法生成、代码实现、实验执行到论文撰写和模拟评审的完整科学发现循环，以低成本产出完整论文。
      尚未覆盖: 输出质量不稳定；只有少数论文能通过真实同行评审；在机器学习子领域之外的泛化能力未经验证；系统仍缺乏做出高影响力贡献所需的科学品味。
    - 路线: 失败诊断与自我纠正机制
      解决的问题: 通过检测和归因实验失败，并将纠正路由到适当阶段（假设、设计、实现）或记录负面结果避免重复，来解决自主智能体的脆弱性。
      尚未覆盖: 失败模式覆盖率仅限于少数案例研究中观察到的常见类型；负面知识在不同研究主题间的长期积累和迁移尚未得到验证；失败修正与创造性假设生成之间的相互作用未被充分探索。
    - 路线: 人机协作设计
      解决的问题: 在假设优先级排序或结果验证等高杠杆决策点引入人类判断，结合自主智能体的效率和人类专业知识，取得优于全自主或全人工流程的结果。
      尚未覆盖: 最优协作模式和干预时机因任务而异；人类投入与输出质量之间的成本效益权衡缺乏系统研究；方法依赖领域专家，可扩展性受限。
    - 路线: AI科研智能体评测基准
      解决的问题: 提供标准化任务和指标，评估消融规划、实验执行和论文写作等特定科研技能，使不同智能体架构可比较。
      尚未覆盖: 现有基准仅覆盖科研过程的狭窄环节（如消融设计），并依赖基于LLM的评判器，其与人类专家评估的一致性尚未充分验证；真实科学影响力仍未测量。
    共识:
    - 基于LLM的智能体能够执行部分科学工作流，并产出偶尔通过初步评审过滤的论文，但输出尚不能持续可靠。
    - 缺乏错误处理或人类监督的朴素端到端管线，因实现漂移、幻觉结果和糟糕的实验设计而失败率很高。
    - 引入反馈循环——无论是通过自动评审、失败归因还是人类干预——都能显著提高生成研究的质量和可信度。
    - 运行这些系统的成本足够低，可支持大规模实验，但由此产生的科学价值仍是未决问题。
    分歧:
    - 完全自主 vs. 人机协同：一方认为完全自主是终极目标，另一方证明在关键决策点进行精准的人类协作优于全自主和全面监督。
    - 失败处理：从简单的反思重试，到结构化多假设因果归因，再到外部负面知识记忆库——尚无共识哪种方法最有效或最具泛化性。
    - 搜索策略：有的使用线性代理管线，有的采用渐进式树搜索，还有的采用多智能体辩论——搜索复杂度与科学质量之间的关系尚未确定。
    - 评估严格性：一类工作通过内部基准和自动评审员评估，另一类则投稿至真实研讨会或会议，对何谓成功的AI科学家存在不同主张。
    开放问题:
    - 何种评估协议能可靠衡量AI生成论文的长期科学价值，而不仅仅是短期接受率？
    - 这些系统如何从结构良好的ML领域泛化到实验昂贵、数据稀缺或需要物理验证的领域？
    - 当研究方向本身存在缺陷时，失败记忆和自我纠正机制能在多大程度上替代人类洞察？
    - 保证科学诚实性和可重复性所需的最少人类干预是什么，以及如何使这种交互具备可扩展性？
