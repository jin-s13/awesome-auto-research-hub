        metrics like task completion may not reflect true discovery utility.
    - line: Systems and reproducible infrastructure
      what_it_solves: Provides runnable stacks, code harnesses, and dashboard monitors
        that transform isolated model ideas into repeatable autonomous research pipelines.
      what_remains_open: Standardized external validation across hardware, data, and
        user settings is absent; most systems are evaluated only by their own developers
        or on a small set of internal case studies.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizes fragmented claims about AI scientists into failure
        modes, design principles, and evaluation criteria for robustness.
      what_remains_open: The proposed categories (e.g., six failure modes in Why LLMs
        Aren't Scientists Yet) are derived from a small number of attempts and have
        not been empirically shown to predict system behavior in new contexts.
    consensus:
    - LLM-based agents can autonomously execute parts of the research workflow, but
      they still produce inconsistent and often incorrect scientific outputs.
    - Automated review and evaluation (simulated or human-peer) serve as a necessary
      feedback mechanism, but current automated reviewers are not fully reliable.
    - Domain-specific verification gates (e.g., vision-language physics checks) are
      critical for preventing silent failures in simulation-based experiments.
    disagreements:
    - 'Evaluation setting: Some works use synthetic virtual environments with pre-defined
      tasks, while others submit to real peer review (workshop venues) or use domain-specific
      numerical benchmarks like CFD wall shear stress.'
    - 'Self-correction strategy: SAGE employs multi-hypothesis causal attribution
      to route interventions, whereas AI Scientist-v2 relies on a VLM feedback loop
      and a broader tree search, and the CFM paper uses a single vision-language gate.'
    - 'Generality vs. specialization: AI Scientist-v2 and Claw AI Lab target general
      ML research, while AI CFD Scientist and BAISBench are tailored to a single scientific
      discipline (fluid dynamics, genomics), leading to different verification and
      tooling requirements.'
    open_questions:
    - How can we verify the correctness of an AI-generated scientific claim when the
      ground truth is unknown, beyond checking for coding errors or physics violations
      in simulations?
    - What is the minimal set of evaluation dimensions (e.g., novelty, reproducibility,
      experimental rigor) that ensures a generated paper is not merely a well-formatted
      but scientifically hollow artifact?
    - Can self-correction mechanisms based on failure attribution generalize beyond
      the specific domains and failure modes already documented, or will new failure
      modes continuously emerge?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 评测与证据设计
      解决的问题: 通过任务、指标和基线使自动化科学发现的主张具有可比性和严谨性。
      尚未覆盖: 现有基准（DISCOVERYWORLD、BAISBench）覆盖领域有限，尚未捕捉真实实验室科学的完整周期；任务完成度等代理指标可能无法反映真正的发现效用。
    - 路线: 系统与可复现基础设施
      解决的问题: 提供可运行的堆栈、代码工具和仪表板监控，将孤立的模型想法转化为可重复的自主研究流程。
      尚未覆盖: 跨硬件、数据和用户设置的标准化外部验证缺失；多数系统仅由开发者自身或内部案例评估，缺乏独立验证。
    - 路线: 概念分类与理论
      解决的问题: 将关于AI科学家的碎片化主张组织为失败模式、设计原则和鲁棒性评估标准。
      尚未覆盖: 所提出的分类（如《Why LLMs Aren't Scientists Yet》中的六种失败模式）仅来自少数尝试，尚未被实证证明能预测新情境下的系统行为。
    共识:
    - 基于LLM的智能体能够自主执行研究流程的部分环节，但目前仍会产生不一致且常具错误的科学输出。
    - 自动评审与评估（模拟或人工同行评审）是必要的反馈机制，但当前自动评审器尚不完全可靠。
    - 领域特定的验证门控（如视觉-语言物理检查）对于防止基于模拟的实验中的静默失败至关重要。
    分歧:
    - 评估设置：部分工作使用带有预定义任务的合成虚拟环境，而其他工作则提交至真实同行评审（工作坊）或使用领域特定的数值基准（如CFD壁面剪切应力）。
    - 自我纠正策略：SAGE采用多假设因果归因来路由干预，AI Scientist-v2依赖VLM反馈循环和更广泛的树搜索，而AI CFD Scientist仅使用单一视觉-语言门控。
    - 通用性与专业化：AI Scientist-v2和Claw AI Lab面向通用机器学习研究，而AI CFD Scientist和BAISBench则针对单一科学学科（流体动力学、基因组学），这导致验证和工具需求不同。
    开放问题:
    - 当真实答案未知时，除了检查模拟中的编码错误或物理违规外，如何验证AI生成的科学主张的正确性？
    - 确保生成论文不是一篇格式良好但科学空洞的制品所需的最少评估维度（如新颖性、可复现性、实验严谨性）是什么？
    - 基于失败归因的自我纠正机制能否泛化到已记录的领域和失败模式之外，还是新的失败模式会不断涌现？
