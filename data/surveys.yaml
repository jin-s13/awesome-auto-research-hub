  related_work_outline:
  - 'Mainstream direction: Building autonomous AI research agents that propose hypotheses,
    design and execute experiments, and iteratively refine ideas, often using multi-agent
    or self-evolving architectures.'
  - 'Shared research pattern: Systems decompose the scientific discovery loop into
    modular components (ideation, execution, verification, writing) and use LLMs as
    the core reasoning engine, with increasing emphasis on failure recovery and knowledge
    accumulation.'
  - 'Key differences: Domain specificity vs. generality, level of human involvement
    (fully autonomous vs. interactive dashboards), evaluation methodology (benchmarks
    vs. human judges vs. task-specific metrics), and the mechanism for error correction
    (single reflection vs. multi-hypothesis attribution vs. evolutionary search).'
  - 'Trend evolution: The field is rapidly moving from isolated proof-of-concept systems
    (2023-2024) toward more robust, self-correcting, and domain-agnostic frameworks
    (2025-2026), with growing attention to verification gates, benchmark standardization,
    and multi-agent coordination.'
  - 'Open questions: How to validate the scientific novelty and correctness of AI-generated
    hypotheses beyond proxy metrics; how to build comprehensive benchmarks that capture
    real-world discovery; and how to ensure reliability and safety in fully autonomous
    research loops.'
  related_work_outline_zh:
  - 主流方向：构建能够提出假设、设计并执行实验、迭代优化想法的自主AI研究智能体，常采用多智能体或自演化架构。
  - 研究共性：系统将科学发现循环分解为构思、执行、验证、写作等模块化组件，以LLM为核心推理引擎，并日益重视失败恢复与知识积累。
  - 关键差异：领域专一性与通用性、人类参与程度（完全自主 vs. 交互式仪表板）、评估方法（基准测试 vs. 人类专家 vs. 任务特定指标）以及纠错机制（单次反思
    vs. 多假设归因 vs. 进化搜索）。
  - 趋势演进：该领域正从孤立的概念验证系统（2023-2024）快速转向更鲁棒、自我纠正且领域无关的框架（2025-2026），验证门控、基准标准化和多智能体协调受到更多关注。
  - 开放问题：如何超越代理指标验证AI生成假设的科学新颖性与正确性；如何构建捕捉真实世界发现的全面基准；如何确保完全自主研究循环中的可靠性与安全性。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous scientific discovery systems
      what_it_solves: Automating the full research cycle from hypothesis generation
        and experimental design to execution, verification, and manuscript drafting.
      what_remains_open: Cross-domain generalization, long-term scientific impact
        assessment, and robustness against silent experimental failures that evade
        verification gates.
    - line: Multi-agent collaborative research frameworks
      what_it_solves: Coordinating specialized AI roles to tackle complex research
        tasks through role division, parallel exploration, and structured workflows.
      what_remains_open: Scalability to large interdisciplinary teams, seamless human-AI
        collaboration, and standardized evaluation of multi-agent research outputs.
    - line: Self-improvement and reflection for hypothesis refinement
      what_it_solves: Diagnosing experiment failures and iteratively correcting hypotheses,
        experimental designs, or implementations through causal attribution or evolutionary
        mechanisms.
      what_remains_open: Accuracy of causal failure attribution, prevention of knowledge
        drift or collapse over iterative cycles, and integration of long-term memory
        without catastrophic forgetting.
    - line: Automated literature review and knowledge synthesis
      what_it_solves: Extracting structured insights, taxonomies, and research directions
        from large volumes of scientific literature to guide hypothesis generation.
      what_remains_open: Ensuring factual accuracy and novelty of synthesized claims,
        avoiding hallucinated references, and maintaining critical depth comparable
        to human experts.
    - line: Benchmarks and evaluation for AI scientists
      what_it_solves: Providing standardized tasks and metrics to measure the performance
        of AI research agents on hypothesis generation, experimental design, and discovery
        tasks.
      what_remains_open: Alignment of benchmark metrics with genuine scientific progress,
        coverage of diverse scientific domains, and establishment of human baseline
        comparisons.
    consensus:
    - All systems rely on large language models as the core reasoning and generation
      engine for scientific tasks.
    - Fully autonomous scientific discovery remains an unsolved challenge; current
      systems require human oversight or fail in unconstrained settings.
    - Modular decomposition of the research process (ideation, execution, verification,
      writing) is a common architectural pattern.
    - Verification and evaluation are recognized as critical bottlenecks, yet no unified
      standard exists across systems.
    disagreements:
    - 'Domain specificity: some systems target a single scientific discipline (e.g.,
      fluid dynamics, single-cell biology), while others claim domain-agnostic operation.'
    - 'Human involvement: systems range from fully autonomous loops to interactive
      platforms with real-time human monitoring and intervention capabilities.'
    - 'Error correction strategy: approaches vary from simple reflection loops to
      structured multi-hypothesis causal attribution or evolutionary search with population
      management.'
    - 'Evaluation methodology: comparisons rely on different signals—human expert
      judgment, automated rubric scores, task-specific metrics, or benchmark performance—making
      cross-system comparison difficult.'
    open_questions:
    - How can we verify that an AI-generated hypothesis is scientifically novel rather
      than a trivial recombination of known ideas?
    - Do current benchmarks (e.g., BAISBench) capture the complexity of real-world
      scientific discovery, or do they reward shallow pattern matching?
    - What mechanisms prevent self-improving research agents from drifting toward
      degenerate or uninteresting research directions over multiple cycles?
    - How should roles and responsibilities be allocated in multi-agent research systems
      to maximize both efficiency and scientific rigor?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主科学发现系统
      解决的问题: 自动化从假设生成、实验设计到执行、验证和论文撰写的完整研究循环。
      尚未覆盖: 跨领域泛化、长期科学影响评估，以及针对逃避验证门控的静默实验失败的鲁棒性。
    - 路线: 多智能体协作研究框架
      解决的问题: 通过角色分工、并行探索和结构化工作流协调专用AI角色以处理复杂研究任务。
      尚未覆盖: 大规模跨学科团队的可扩展性、无缝人机协作，以及多智能体研究成果的标准化评估。
    - 路线: 面向假设优化的自我改进与反思
      解决的问题: 通过因果归因或进化机制诊断实验失败，并迭代修正假设、实验设计或实现。
      尚未覆盖: 因果失败归因的准确性、迭代周期中知识漂移或坍塌的预防，以及无灾难性遗忘的长期记忆整合。
    - 路线: 自动化文献综述与知识综合
      解决的问题: 从大量科学文献中提取结构化见解、分类体系和研究方向，以指导假设生成。
      尚未覆盖: 确保综合结论的事实准确性与新颖性、避免幻觉引用，并保持与人类专家相当的批判深度。
    - 路线: AI科学家的基准与评估
      解决的问题: 提供标准化任务和指标，衡量AI研究智能体在假设生成、实验设计和发现任务上的表现。
      尚未覆盖: 基准指标与真实科学进步的一致性、对不同科学领域的覆盖，以及人类基线对比的建立。
    共识:
    - 所有系统均依赖大语言模型作为科学任务的核心推理与生成引擎。
    - 完全自主的科学发现仍是一个未解决的挑战；当前系统需要人类监督或在无约束环境中失败。
    - 将研究过程模块化分解（构思、执行、验证、写作）是常见的架构模式。
    - 验证与评估被认为是关键瓶颈，但各系统之间缺乏统一标准。
    分歧:
    - 领域专一性：部分系统针对单一科学学科（如流体力学、单细胞生物学），而其他系统声称领域无关。
    - 人类参与程度：系统范围从完全自主循环到具备实时人类监控与干预能力的交互式平台。
    - 纠错策略：方法从简单反思循环到结构化多假设因果归因或带种群管理的进化搜索不等。
    - 评估方法：对比依赖不同信号——人类专家评判、自动评分准则、任务特定指标或基准性能——使得跨系统比较困难。
    开放问题:
    - 如何验证AI生成的假设在科学上是新颖的，而非已知思想的简单重组？
    - 当前基准（如BAISBench）是否捕捉了真实世界科学发现的复杂性，还是仅奖励浅层模式匹配？
    - 何种机制能防止自我改进的研究智能体在多个周期后漂移到退化或无趣的研究方向？
    - 如何在多智能体研究系统中分配角色与职责，以同时最大化效率和科学严谨性？
