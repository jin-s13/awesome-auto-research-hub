  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated research pipelines
      what_it_solves: Automating the full scientific cycle from hypothesis generation
        to paper writing, reducing human effort and cost per paper.
      what_remains_open: Reliability across open-ended domains, detection of silent
        failures, and validation that generated claims are scientifically sound beyond
        auto-review scores.
    - line: Multi-agent and structured decision-making
      what_it_solves: Improving exploration quality and robustness through agentic
        tree search, structured debate, or dedicated experiment managers, moving beyond
        single-step generation.
      what_remains_open: Optimal agent organization strategies and the trade-off between
        coordination overhead and decision quality; guarantees against hallucinated
        or fabricated results.
    - line: Domain-specific verification and physical alignment
      what_it_solves: Preventing nonsensical outputs in specialized sciences by embedding
        domain constraints (e.g., physics-aware vision-language gates) into the research
        loop.
      what_remains_open: Generalizability of verification gates to new domains without
        redesign; balancing strict verification with the openness needed for novel
        discoveries.
    - line: Evaluation benchmarks and human baselines
      what_it_solves: Providing standardized tasks, metrics, and human performance
        comparisons to quantify progress of AI scientist systems.
      what_remains_open: Whether benchmark tasks (e.g., simulated environments, MCQ-based
        discovery) represent the ill-structured, long-horizon nature of real scientific
        inquiry.
    - line: Human-AI collaboration and interaction models
      what_it_solves: Mitigating unreliability at critical decision points by allowing
        human intervention, with modes ranging from sparse high-leverage feedback
        to step-by-step oversight.
      what_remains_open: The optimal granularity and timing of human input; how collaboration
        scales when the number of research problems grows.
    consensus:
    - All systems adopt a macro-level workflow of ideation, experimentation, analysis,
      and manuscript generation, though implementation details vary.
    - Current AI scientists can produce plausible results in low-risk subfields (e.g.,
      ML method exploration) but remain unreliable in high-stakes, domain-knowledge-intensive
      settings.
    - Silent failures and hallucinations are a central bottleneck, driving the introduction
      of explicit verification mechanisms beyond simple auto-review scores.
    - Evaluation is moving from single-dimensional auto-review toward multi-dimensional
      benchmarks and human baselines to better capture research quality.
    disagreements:
    - 'System architecture: single-agent tree search (e.g., AI Scientist-v2) versus
      multi-agent collaboration with debate or specialized roles (e.g., AutoResearchClaw).'
    - 'Automation stance: fully autonomous discovery without human intervention versus
      human-in-the-loop collaboration with varying degrees of oversight.'
    - 'Verification strategy: reliance on LLM-based auto-review scores versus domain-specific
      validity gates (physics, visual inspection) versus structural constraints on
      output correctness.'
    - 'Evaluation method: simulated review, benchmark environment tasks, real peer-review
      acceptance, and expert human judgment—with no consensus on which best predicts
      genuine scientific contribution.'
    open_questions:
    - Can a general verification mechanism be designed to catch silent failures across
      diverse scientific domains without domain-specific engineering?
    - Do current benchmarks (DISCOVERYWORLD, ARC-Bench, BAISBench) capture the open-ended,
      iterative, and knowledge-intensive nature of real scientific discovery, or do
      they primarily measure narrow task completion?
    - What is the optimal granularity of human intervention to maximize reliability
      while preserving scalability and autonomy?
    - How can domain-specific systems (e.g., AI CFD Scientist) transfer their verification
      strategies to new fields without rebuilding from scratch?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动化研究流水线
      解决的问题: 自动化从假设生成到论文撰写的完整科学循环，降低人类工作量与单篇成本。
      尚未覆盖: 在开放式领域中的可靠性，静默失败的检测，以及对生成主张在自动评审分数之外是否科学合理的验证。
    - 路线: 多智能体与结构化决策
      解决的问题: 通过智能体树搜索、结构化辩论或专用实验管理器提升探索质量与鲁棒性，超越单步生成模式。
      尚未覆盖: 最优智能体组织策略，以及协调开销与决策质量之间的权衡；对幻觉和伪造结果的保障机制。
    - 路线: 领域特定验证与物理对齐
      解决的问题: 通过在研究循环中嵌入领域约束（如物理感知视觉语言门控），防止在专业科学中产生无意义的输出。
      尚未覆盖: 验证门控在不重新设计的情况下向新领域泛化的能力；在严格验证与发现所需的开放性之间的平衡。
    - 路线: 评估基准与人类基线
      解决的问题: 提供标准化任务、指标和人类表现对比，以量化AI科学家系统的进展。
      尚未覆盖: 基准任务（如模拟环境、基于选择题的发现）是否能代表真实科学探究中结构不良、长周期的特性。
    - 路线: 人机协作与交互模式
      解决的问题: 通过在关键决策点允许人类干预来缓解不可靠性，干预模式从稀疏的高杠杆反馈到逐步监督不等。
      尚未覆盖: 人类输入的最优粒度和时机；当研究问题数量增长时，协作模式如何扩展。
    共识:
    - 所有系统均采用构思、实验、分析与论文撰写的宏观工作流，但实现细节各不相同。
    - 当前AI科学家能在低风险子领域（如ML方法探索）产出看似合理的结果，但在高风险、依赖领域知识的场景中仍不可靠。
    - 静默失败与幻觉是核心瓶颈，促使系统在简单的自动评审分数之外引入显式验证机制。
    - 评估正从单维度的自动评审向多维基准和人类基线扩展，以更全面地捕捉研究质量。
    分歧:
    - 系统架构：单智能体树搜索（如AI Scientist-v2）与采用辩论或专门角色的多智能体协作（如AutoResearchClaw）之间的路线差异。
    - 自动化立场：追求完全无人类干预的自主发现，与在不同程度上引入人机协作的分化。
    - 验证策略：有的依赖基于LLM的自动评审分数，有的采用领域专用有效性门控（物理、视觉检查），有的通过结构性约束保证输出正确性。
    - 评估方法：模拟评审、基准环境任务、真实同行评审接受、专家人工判断并用，但对哪种方法最能预测真实科学贡献尚未达成共识。
    开放问题:
    - 能否设计一个通用的验证机制，在不依赖领域定制的情况下，在多样化科学中捕获静默失败？
    - 当前基准（DISCOVERYWORLD、ARC-Bench、BAISBench）是否捕捉了真实科学发现的开放式、迭代性和知识密集型特征，还是主要衡量狭义的任务完成度？
    - 在最大化可靠性的同时保持可扩展性和自主性，人类干预的最优粒度是什么？
    - 领域特定系统（如AI CFD Scientist）如何将其验证策略迁移到新领域，而无需从头构建？
