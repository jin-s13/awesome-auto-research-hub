  related_work_outline:
  - 'Mainstream direction: Building and benchmarking autonomous agents that perform
    end-to-end scientific discovery cycles, from hypothesis generation to experiment
    design and conclusion, with growing emphasis on the correctness of the reasoning
    process rather than just task outcomes.'
  - 'Shared research pattern: Augmenting large language model agents with domain-specific
    tools, code libraries, or structured interfaces to improve experiment quality,
    while evaluating them on standardized tasks that measure completion, accuracy,
    and increasingly mechanism fidelity.'
  - 'Key differences: Evaluation targets diverge—some works measure task completion
    in simulated environments, others assess code correctness under resource constraints,
    and a third line demands epistemic honesty and mechanism fidelity; agent architectures
    range from single-agent with fixed objectives to multi-agent systems with evolving
    goals.'
  - 'Trend evolution: From 2024 to 2026, the field moved from constructing virtual
    discovery environments to enhancing agent capabilities with distilled code and
    automated objective design, and most recently toward deeper evaluation of reasoning
    validity and autonomous self-improvement.'
  - 'Open questions: How to verify mechanism correctness in open-ended discovery where
    ground-truth answers are unknown; whether proxy metrics like LLM-as-judge align
    with domain expert judgments across fields; and how to prevent error accumulation
    in agents that autonomously evolve their own objectives or training pipelines.'
  related_work_outline_zh:
  - 主流方向：构建并评测能完成端到端科学发现循环（从假设生成到实验设计与结论）的自主智能体，且越来越重视推理过程的正确性而非仅看任务结果。
  - 研究共性：用领域特定工具、代码库或结构化接口增强大语言模型智能体以提升实验质量，并在标准化任务上评测其完成度、准确性以及日益关注的机制忠实性。
  - 关键差异：评测目标分化——有的测量模拟环境中的任务完成度，有的评估资源约束下的代码正确性，还有的要求认知诚实性与机制忠实性；智能体架构从固定目标的单智能体到目标演化的多智能体系统不等。
  - 趋势演进：2024至2026年，领域从构建虚拟发现环境，发展到用蒸馏代码和自动目标设计增强智能体能力，最近则转向对推理有效性和自主自我改进的深层评估。
  - 开放问题：在无标准答案的开放式发现中如何验证机制正确性；LLM-as-judge等代理指标在不同领域与专家判断的一致性如何；自主演化目标或训练流程的智能体如何避免错误累积。
  literature_review:
    line_of_work_matrix:
    - line: Scientific discovery benchmark environments
      what_it_solves: Provides standardized virtual tasks that require agents to form
        hypotheses, design experiments, and interpret results, enabling reproducible
        comparison of discovery capabilities.
      what_remains_open: Whether these simulated tasks capture the full complexity
        of real-world scientific reasoning, and whether task-completion metrics correlate
        with genuine scientific insight.
    - line: Automated code library distillation for agents
      what_it_solves: Extracts vetted, domain-specific code examples from repositories
        so that coding agents can produce more accurate and scientifically sound experiments.
      what_remains_open: Generalizability beyond the source domain (e.g., materials
        science) and the reliability of LLM-as-judge as a proxy for expert evaluation.
    - line: Objective function and governing equation discovery
      what_it_solves: Automates the design of optimization objectives or the joint
        discovery of PDE structure and parameters, reducing the need for manual specification
        and exploring trade-offs across objectives.
      what_remains_open: Validation that automatically discovered objectives or equations
        remain physically plausible and useful under distribution shift, and detection
        of correct-answer-wrong-mechanism failures.
    - line: Mechanism fidelity and epistemic honesty evaluation
      what_it_solves: Introduces evaluation dimensions beyond task outcome—mechanism
        fidelity and epistemic honesty—to catch agents that produce right-looking
        results via incorrect reasoning.
      what_remains_open: Scalable detection methods when ground-truth mechanisms are
        unknown, and applicability to broader agent architectures beyond coding agents
        in simulation.
    - line: Autonomous self-improvement and multi-agent evolution
      what_it_solves: Enables language model agents to autonomously run post-training
        pipelines or evolve in multi-agent settings, aiming for open-ended discovery
        and continuous capability improvement.
      what_remains_open: Stability and safety of self-referential improvement loops,
        and empirical evidence that such systems yield discoveries beyond those reachable
        by static agents.
    consensus:
    - Scientific discovery agents must be evaluated on more than final task success;
      the quality of experiments, reasoning correctness, and reproducibility are essential.
    - Large language models serve as the core reasoning engine, but their raw capabilities
      are insufficient without domain-specific augmentation such as code libraries,
      structured interfaces, or objective design modules.
    - Standardized benchmarks with diverse tasks and controlled constraints are necessary
      for comparing agents, though no single benchmark yet covers all critical dimensions
      of discovery.
    disagreements:
    - 'Evaluation focus: some works prioritize task completion in rich simulated worlds,
      others emphasize code correctness under compute budgets, and a third line demands
      mechanism-level honesty even when outcomes appear correct.'
    - 'Agent architecture: single-agent systems with fixed objectives versus multi-agent
      or bi-level systems where objectives evolve over time, leading to different
      assumptions about autonomy and human oversight.'
    - 'Domain scope: general-purpose discovery environments contrast with domain-specific
      systems tied to materials science, particle physics, or machine learning, raising
      questions about transferability.'
    - 'Interaction mode: text-based virtual labs, code-execution sandboxes with GPU
      constraints, and simulation-based discovery each impose different requirements
      on agent perception and action spaces.'
    open_questions:
    - How can we detect when an agent achieves a correct-looking result through incorrect
      reasoning in truly open-ended discovery where no ground-truth answer exists?
    - To what extent do proxy evaluation metrics (e.g., LLM-as-judge, task completion
      scores) align with the judgments of domain experts across different scientific
      fields?
    - What architectures enable a single agent to generalize across diverse scientific
      domains without sacrificing the depth needed for domain-specific discovery?
    - How can autonomous self-improvement or multi-agent evolutionary systems be designed
      to avoid error amplification and maintain scientific rigor over many iterations?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 科学发现基准环境构建
      解决的问题: 提供标准化的虚拟任务，要求智能体形成假设、设计实验并解释结果，从而可复现地比较发现能力。
      尚未覆盖: 这些模拟任务是否捕捉了真实科学推理的全部复杂性，以及任务完成指标是否与真正的科学洞察相关。
    - 路线: 代码库自动蒸馏与增强
      解决的问题: 从代码仓库中提取经过验证的领域特定代码示例，使编码智能体能生成更准确、科学上更合理的实验。
      尚未覆盖: 在源领域（如材料科学）之外的泛化能力，以及LLM-as-judge作为专家评估代理指标的可靠性。
    - 路线: 目标函数与控制方程自动发现
      解决的问题: 自动化设计优化目标或联合发现偏微分方程的结构与参数，减少人工指定需求并探索目标间的权衡。
      尚未覆盖: 自动发现的目标或方程在分布偏移下是否保持物理合理性和实用性，以及如何检测“正确答案、错误机制”的失败。
    - 路线: 机制忠实性与认知诚实性评估
      解决的问题: 引入超越任务结果的评估维度——机制忠实性和认知诚实性，以捕捉通过错误推理得出看似正确结果的智能体。
      尚未覆盖: 在真实机制未知时的可扩展检测方法，以及该方法对模拟中编码智能体以外更广泛架构的适用性。
    - 路线: 自主自我改进与多智能体进化
      解决的问题: 使语言模型智能体能够自主运行后训练流程或在多智能体环境中进化，旨在实现开放式发现和持续能力提升。
      尚未覆盖: 自我指涉改进循环的稳定性和安全性，以及此类系统能否产生超越静态智能体的发现的实证证据。
    共识:
    - 科学发现智能体的评估必须超越最终任务成功，实验质量、推理正确性和可复现性至关重要。
    - 大语言模型是核心推理引擎，但若无领域特定增强（如代码库、结构化接口或目标设计模块），其原始能力不足。
    - 具有多样化任务和受控约束的标准化基准对于比较智能体是必要的，但目前尚无单一基准覆盖发现的所有关键维度。
    分歧:
    - 评估重点：有的工作优先考虑丰富模拟世界中的任务完成度，有的强调计算预算下的代码正确性，还有的要求即使结果看似正确也要检测机制层面的诚实性。
    - 智能体架构：固定目标的单智能体系统与目标随时间演化的多智能体或双层系统，导致对自主性和人类监督的不同假设。
    - 领域范围：通用发现环境与绑定材料科学、粒子物理或机器学习的领域特定系统形成对比，引发可迁移性问题。
    - 交互模式：基于文本的虚拟实验室、带GPU约束的代码执行沙箱以及基于模拟的发现，各自对智能体的感知和动作空间提出不同要求。
    开放问题:
    - 在无标准答案的真正开放式发现中，如何检测智能体通过错误推理得出看似正确结果的情况？
    - LLM-as-judge、任务完成分数等代理评估指标在不同科学领域与领域专家判断的一致性程度如何？
    - 何种架构能使单一智能体在多个科学领域泛化，同时不牺牲领域特定发现所需的深度？
    - 如何设计自主自我改进或多智能体进化系统，以避免错误放大并在多次迭代中保持科学严谨性？
