  related_work_outline:
  - 'Mainstream direction: building and evaluating LLM-based scientific discovery
    agents that autonomously plan experiments, generate code, and reason about results,
    with growing emphasis on safety, auditability, and mechanism fidelity beyond task
    completion.'
  - 'Shared research pattern: multi-stage agent architectures (hypothesis, experiment,
    analysis, reporting) augmented with domain-specific tools, code libraries, or
    safety loops, evaluated on simulated or constrained ML tasks rather than real-world
    laboratories.'
  - 'Key differences: some works focus on benchmarking agent capabilities (e.g., DISCOVERYWORLD,
    1GC-7RC), others on enhancing agent performance through automatically distilled
    code libraries or goal evolution (CodeDistiller, SAGA), and a third cluster on
    trustworthiness including safety reasoning and epistemic honesty (SciTrace, FirstResearch,
    Correct Answer Wrong Mechanism).'
  - 'Trend evolution: from 2024–2025 emphasis on building environments and automated
    experiment pipelines to 2026 works that introduce safety, auditability, and mechanism-level
    evaluation, reflecting a shift from ''can agents do science?'' to ''can we trust
    their reasoning?'''
  - 'Open questions: how to detect incorrect reasoning when ground truth is absent,
    how to generalize safety and code libraries across scientific domains, and how
    to validate agents in real-world labs with physical experiments.'
  related_work_outline_zh:
  - 主流方向：构建并评估基于LLM的科学发现智能体，使其能自主规划实验、生成代码和推理结果，并越来越关注任务完成之外的安全性、可审计性和机制忠实性。
  - 研究共性：多阶段智能体架构（假设、实验、分析、报告），辅以领域专用工具、代码库或安全循环，并在模拟或受限的ML任务上评估，而非真实实验室。
  - 关键差异：部分工作聚焦于基准测试智能体能力（如DISCOVERYWORLD、1GC-7RC），部分通过自动蒸馏代码库或目标演化增强智能体性能（CodeDistiller、SAGA），第三类关注可信性，包括安全推理和认知诚实（SciTrace、FirstResearch、Correct
    Answer Wrong Mechanism）。
  - 趋势演进：从2024–2025年构建环境和自动化实验流程，到2026年引入安全、可审计性和机制层面评估，反映了从“智能体能做科学吗？”到“我们能否信任其推理？”的转变。
  - 开放问题：在缺失真实答案时如何检测错误推理，安全框架和代码库如何跨科学领域泛化，以及如何在真实世界实验室中验证智能体。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Enables comparable assessment of scientific discovery agents
        through standardized tasks, baselines, and metrics, moving beyond toy examples
        to capture hypothesis formation, experimentation, and conclusion.
      what_remains_open: Alignment between proxy metrics (task completion, LLM-as-judge)
        and genuine scientific insight; automatic detection of mechanism fidelity
        and epistemic honesty without ground-truth answers.
    - line: Systems and reproducible infrastructure
      what_it_solves: Transforms ad-hoc agent prototypes into runnable frameworks
        with vetted code libraries, safety reasoning loops, goal evolution, and structured
        research question certificates, improving experimental quality and reproducibility.
      what_remains_open: Generalization across scientific domains beyond the original
        engineering or materials science context; standardized external validation
        on diverse hardware, datasets, and user settings; and mitigation of compositional
        tool-chain risks.
    - line: Conceptual taxonomy and theory
      what_it_solves: Identifies evaluation blind spots such as the 'Correct Answer,
        Wrong Mechanism' failure mode, and proposes multi-dimensional assessment (outcome,
        mechanism fidelity, epistemic honesty) to organize fragmented claims about
        agent capabilities.
      what_remains_open: Direct empirical evidence that the proposed categories predict
        agent behavior in open-ended discovery; lightweight detection methods that
        work without knowing the correct answer beforehand.
    consensus:
    - Agents based on LLMs can perform multi-step scientific reasoning, but outcome-only
      evaluation is insufficient; mechanism fidelity, safety, and honesty must be
      measured.
    - Simulated or constrained environments (text-based virtual labs, single-GPU ML
      tasks) are the current proving ground; real-world laboratory validation is absent.
    - Multi-stage architectures (hypothesis, experiment, analysis) and tool augmentation
      are common design patterns, with varying degrees of domain-specific scaffolding.
    disagreements:
    - 'Evaluation target: some works target task completion rates, others emphasize
      safety from tool-chain attacks, and a third stream demands that the reasoning
      behind a correct answer be scientifically sound.'
    - 'Intervention strategy: one group augments agents with external code libraries
      or goal-evolving loops, while another embeds safety checks or structured certificates
      into the agent''s internal reasoning loop.'
    - 'Domain dependence: CodeDistiller relies on domain-specific GitHub repositories
      to boost performance, whereas other frameworks aim for domain-agnostic reasoning
      with minimal curated knowledge.'
    open_questions:
    - How can we detect mechanism errors when the correct answer is unknown, and how
      do such errors affect downstream discovery in open-ended tasks?
    - Can safety frameworks like SciTrace generalize to physical lab settings where
      tool chains involve wet-lab equipment and chemical risks?
    - What is the minimal set of evaluation dimensions that guarantees a scientific
      discovery agent is both capable and trustworthy?
