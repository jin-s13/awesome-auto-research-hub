  related_work_outline:
  - 'Mainstream direction: LLM-driven autonomous agents and Bayesian optimization
    are converging to automate experimental design, execution, and analysis, primarily
    demonstrated in materials science and microscopy.'
  - 'Shared research pattern: Iterative closed-loop workflows that combine machine
    learning models with experimental or simulation feedback to optimize a target
    property or discover new knowledge.'
  - 'Key differences: Autonomy level (fully autonomous code-editing agents vs. human-in-the-loop
    optimization), optimization strategy (single-objective vs. multi-objective Pareto
    methods), and integration of theoretical reasoning (theory-in-the-loop vs. pure
    data-driven).'
  - 'Trend evolution: From 2023 to 2026, the field moved from proof-of-concept self-driving
    labs and Bayesian optimization toward LLM-powered multi-agent systems that handle
    code, hypothesis generation, and serendipity, with growing attention to data quality
    and collaborative infrastructure.'
  - 'Open questions: Standardized benchmarks for autonomous research agents, reproducibility
    of fully automated discoveries, scalability beyond simple demonstrations, and
    validation of novelty claims remain unresolved.'
  related_work_outline_zh:
  - 主流方向：LLM驱动的自主智能体与贝叶斯优化正在融合，以自动化实验设计、执行和分析，主要在材料科学和显微镜领域展示。
  - 研究共性：迭代闭环工作流，将机器学习模型与实验或仿真反馈相结合，以优化目标属性或发现新知识。
  - 关键差异：自主程度（全自主代码编辑智能体 vs. 人在回路优化）、优化策略（单目标 vs. 多目标帕累托方法）以及理论推理的整合方式（理论在环 vs. 纯数据驱动）。
  - 趋势演进：2023至2026年间，领域从概念验证的自驱动实验室和贝叶斯优化，转向能够处理代码、假设生成和偶然发现的LLM多智能体系统，并越来越关注数据质量和协作基础设施。
  - 开放问题：自主研究智能体的标准化基准、全自动发现的可复现性、超越简单演示的可扩展性以及新颖性声明的验证仍是未解决的空白。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research agents (LLM-driven)
      what_it_solves: Reducing human effort in iterative research cycles by having
        agents propose hypotheses, edit code, run jobs, and interpret results.
      what_remains_open: Generalization beyond narrow domains, reliability of agent
        decisions, and lack of standardized benchmarks or governance frameworks.
    - line: Bayesian optimization and active learning for experiment design
      what_it_solves: Efficient exploration of parameter spaces with minimal trials,
        often balancing multiple objectives or measurement noise.
      what_remains_open: Handling high-dimensional, noisy, and multi-fidelity spaces;
        integration with real-time constraints and human preferences.
    - line: Data quality and noise management in self-driving labs
      what_it_solves: Ensuring reliable inputs for downstream models by detecting
        and correcting noisy or erroneous experimental features.
      what_remains_open: Applicability to diverse data types and low-noise regimes,
        and seamless integration with active learning loops.
    - line: Multi-agent and theory-in-the-loop frameworks for discovery
      what_it_solves: Linking experimental observations with theoretical reasoning
        and literature to generate and assess novel hypotheses.
      what_remains_open: Scalability across scientific domains, objective validation
        of novelty, and effective human-AI collaboration protocols.
    - line: Collaborative and FAIR infrastructure for distributed experimentation
      what_it_solves: Enabling shared data, automatic model updates, and coordinated
        optimization across geographically dispersed laboratories.
      what_remains_open: Platform dependence, scalability to complex workflows, and
        quantitative performance comparisons against non-collaborative baselines.
    consensus:
    - Automating experimentation can drastically reduce time and resource costs for
      materials discovery and characterization.
    - Closed-loop workflows combining ML models with experimental feedback are essential
      for adaptive experimentation.
    - Data quality and noise handling are critical bottlenecks that directly impact
      the reliability of automated decisions.
    - LLMs and Bayesian optimization are key enablers, but human oversight remains
      important for trust and safety.
    disagreements:
    - 'Degree of autonomy: some works pursue fully autonomous agent-driven loops that
      edit code and manage jobs, while others retain human-in-the-loop for critical
      decisions or preference articulation.'
    - 'Optimization strategy: single-objective Bayesian optimization is used for property
      maximization, whereas multi-objective Pareto methods explicitly balance competing
      goals like quality, speed, and reproducibility.'
    - 'Role of theory: one line integrates theoretical simulations and novelty scoring
      directly into the agent loop, while others rely purely on data-driven model
      updates without explicit theory linkage.'
    - 'Evaluation setting: demonstrations range from recommender system research pipelines
      to atomic-scale microscopy and molecular dynamics, with no common task or metric
      for comparing automation frameworks.'
    open_questions:
    - What benchmarks can fairly compare the research productivity of autonomous agents
      across different scientific domains?
    - How can we verify the novelty and correctness of discoveries made by fully automated
      systems without human expert validation?
    - Can data-cleaning and noise-optimization methods developed on DFT and SDL datasets
      transfer to other experimental modalities?
    - What governance and provenance standards are needed to ensure reproducibility
      and ethical use of autonomous research labs?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究智能体（LLM驱动）
      解决的问题: 通过智能体提出假设、编辑代码、运行作业并解释结果，减少迭代研究周期中的人力投入。
      尚未覆盖: 在狭窄领域之外的泛化能力、智能体决策的可靠性，以及缺乏标准化基准或治理框架。
    - 路线: 面向实验设计的贝叶斯优化与主动学习
      解决的问题: 以最少试验次数高效探索参数空间，通常平衡多个目标或测量噪声。
      尚未覆盖: 处理高维、噪声和多保真空间；与实时约束和人类偏好的集成。
    - 路线: 自驱动实验室中的数据质量与噪声管理
      解决的问题: 通过检测和纠正噪声或错误的实验特征，确保下游模型获得可靠输入。
      尚未覆盖: 对多样化数据类型和低噪声场景的适用性，以及与主动学习循环的无缝集成。
    - 路线: 面向发现的多智能体与理论在环框架
      解决的问题: 将实验观察与理论推理和文献关联，生成并评估新颖假设。
      尚未覆盖: 跨科学领域的可扩展性、新颖性的客观验证以及有效的人机协作协议。
    - 路线: 面向分布式实验的协作与FAIR基础设施
      解决的问题: 在地理分散的实验室之间实现共享数据、自动模型更新和协调优化。
      尚未覆盖: 平台依赖性、对复杂工作流的可扩展性，以及与非协作基线的定量性能比较。
    共识:
    - 自动化实验可以大幅降低材料发现和表征的时间与资源成本。
    - 结合机器学习模型与实验反馈的闭环工作流对于自适应实验至关重要。
    - 数据质量和噪声处理是直接影响自动化决策可靠性的关键瓶颈。
    - LLM和贝叶斯优化是关键使能技术，但人类监督对于信任和安全仍然重要。
    分歧:
    - 自主程度：部分工作追求全自主的智能体驱动循环，可编辑代码和管理作业，而其他工作则在关键决策或偏好表达中保留人在回路。
    - 优化策略：单目标贝叶斯优化用于属性最大化，而多目标帕累托方法显式平衡质量、速度和可重复性等竞争目标。
    - 理论角色：一条路线将理论模拟和新颖性评分直接集成到智能体循环中，另一条路线则完全依赖数据驱动的模型更新，没有显式的理论连接。
    - 评测场景：演示范围从推荐系统研究管道到原子尺度显微镜和分子动力学，缺乏用于比较自动化框架的通用任务或指标。
    开放问题:
    - 哪些基准能够公平比较自主智能体在不同科学领域的研究生产力？
    - 如何在没有人类专家验证的情况下，核实全自动系统所发现的新颖性和正确性？
    - 在DFT和SDL数据集上开发的数据清洗与噪声优化方法能否迁移到其他实验模态？
    - 需要哪些治理和溯源标准来确保自主研究实验室的可复现性和伦理使用？
