    - 路线: 自动化实验优化与噪声管理
      解决的问题: 通过贝叶斯优化或kNN插补协同优化测量参数和纠正噪声特征，提升自驱动实验室的数据质量和效率。
      尚未覆盖: 离散或狭窄分布特征恢复效果差；无足够干净训练集时低强度噪声难以检测；缺乏与物理模型结合的多目标权衡。
    - 路线: 理论在环的多智能体AI科学发现
      解决的问题: 将实验观测与理论模拟和新颖性评估连接，实现物理一致推理，使材料表征中的偶然发现可操作化。
      尚未覆盖: 推理轨迹的计算开销；缺乏标准化新颖性指标；人类专家指导与全自主的最佳平衡点不明确；局限于特定表征模态。
