  related_work_outline:
  - 'Mainstream direction: Building end-to-end autonomous research pipelines using
    multi-agent LLM systems for literature review, survey generation, and hypothesis-driven
    discovery, with growing emphasis on evaluation and failure diagnosis.'
  - 'Shared research pattern: Decomposing the scientific workflow into specialized
    agent roles (search, analysis, synthesis, review) and orchestrating them through
    iterative refinement loops or structured state management.'
  - 'Key differences: Systems vary in internal representation (shared world model
    vs. tree-based vs. linear pipelines), domain specificity (domain-agnostic frameworks
    vs. domain-embedded systems), and evaluation strategy (benchmark scores vs. human
    accuracy judgments vs. failure mode analysis).'
  - 'Trend evolution: The field is moving from descriptive surveys and benchmark creation
    (2025) toward concrete multi-agent systems and systematic failure analysis (2025–2026),
    signaling a shift from conceptualization to engineering and robustness.'
  - 'Open questions: Long-horizon reliability, cross-domain generalization, alignment
    of proxy metrics with real scientific utility, and integration of deep domain
    reasoning and scientific taste remain unresolved.'
  related_work_outline_zh:
  - 主流方向：构建端到端自主研究流水线，使用多智能体大语言模型系统进行文献综述、调查报告生成和假设驱动的发现，并越来越重视评估与失败诊断。
  - 研究共性：将科学工作流分解为专门智能体角色（搜索、分析、综合、评审），并通过迭代优化循环或结构化状态管理编排它们。
  - 关键差异：系统在内部表示（共享世界模型 vs. 树形结构 vs. 线性流水线）、领域特异性（领域无关框架 vs. 领域嵌入式系统）和评估策略（基准分数 vs.
    人类准确性判断 vs. 失败模式分析）上存在分歧。
  - 趋势演进：从描述性综述和基准测试（2025年）走向具体的多智能体系统和系统化失败分析（2025–2026年），标志着从概念化向工程化和鲁棒性转变。
  - 开放问题：长周期可靠性、跨领域泛化、代理指标与真实科学效用的一致性，以及深层领域推理和科学品味的集成仍未解决。
  literature_review:
    line_of_work_matrix:
    - line: Systems and reproducible infrastructure
      what_it_solves: Turning LLM-based agents into end-to-end automated pipelines
        for literature review, survey generation, hypothesis formulation, and paper
        writing, enabling repeatable and scalable research workflows.
      what_remains_open: Generalization across disciplines, reliability over long-horizon
        tasks, and verification that generated outputs meet scholarly standards beyond
        surface-level formatting.
    - line: Evaluation and evidence design
      what_it_solves: Creating benchmarks and failure analysis frameworks to assess
        the capabilities and limitations of AI scientists and literature intelligence
        systems, providing comparability and diagnosing weaknesses.
      what_remains_open: Whether proxy metrics (e.g., accuracy of generated statements,
        benchmark scores) align with real scientific utility; coverage of diverse
        scientific tasks and domains.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing the landscape of agentic AI for scientific discovery,
        cataloging systems, challenges, and evaluation metrics into coherent taxonomies
        to guide future research.
      what_remains_open: Empirical validation that the proposed taxonomies predict
        system behavior or inform design choices; most taxonomies remain descriptive
        rather than predictive.
    consensus:
    - Decomposing the scientific workflow into manageable sub-tasks executed by specialized
      LLM agents is the dominant architectural pattern.
    - Current AI scientist systems fall short of expert-level performance on tasks
      requiring deep domain knowledge, critical thinking, and scientific taste.
    - Evaluation must go beyond surface quality to assess factual accuracy, traceability,
      and genuine scientific value of generated outputs.
    - Literature review automation and long-horizon autonomous research are widely
      recognized as central unsolved challenges.
    disagreements:
    - 'Internal representation and coordination: some systems employ a shared structured
      world model for inter-agent communication, while others use tree-based exploration
      with backtracking or linear state-machine pipelines.'
    - 'Domain specificity: several frameworks aim for domain-agnostic generality,
      whereas others embed domain expertise directly into agent roles, data registries,
      or task definitions.'
    - 'Evaluation focus: one line of work designs benchmarks and case studies to diagnose
      failure modes and limitations, while another reports state-of-the-art scores
      on standardized tasks, reflecting different priorities between understanding
      and performance.'
    - 'Quality assurance: iterative rubric-guided review with multi-agent critics
      differs from post-hoc human accuracy judgments and from self-evolution mechanisms
      that rely on automatic self-critique and knowledge accumulation.'
    open_questions:
    - How can long-horizon reliability be maintained as autonomous systems scale to
      multi-cycle experiments beyond the tested 20-cycle limit?
    - Can proxy metrics like statement accuracy or benchmark scores reliably predict
      whether generated research leads to meaningful scientific impact?
    - What mechanisms are needed to embed domain intuition and scientific taste into
      agents without compromising generality or introducing brittle heuristics?
    - How do representations and workflow structures affect the adaptability of these
      systems to entirely new disciplines or research paradigms?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 系统与可复现基础设施
      解决的问题: 将基于大语言模型的智能体转化为端到端自动化流水线，用于文献综述、调查报告生成、假设提出和论文写作，实现可重复和可扩展的研究工作流。
      尚未覆盖: 跨学科泛化、长周期任务的可靠性，以及验证生成成果是否达到超越表面格式的学术标准。
    - 路线: 评测与证据设计
      解决的问题: 创建基准测试和失败分析框架，评估AI科学家和文献智能系统的能力与局限性，提供可比性并诊断弱点。
      尚未覆盖: 代理指标（如生成陈述的准确性、基准分数）是否与真实科学效用一致；多样化科学任务和领域的覆盖。
    - 路线: 概念分类与理论
      解决的问题: 组织面向科学发现的智能体人工智能的格局，将系统、挑战和评估指标编入连贯的分类法，以指导未来研究。
      尚未覆盖: 实证验证所提出的分类法能预测系统行为或为设计选择提供信息；大多数分类法仍为描述性而非预测性。
    共识:
    - 将科学工作流分解为由专门大语言模型智能体执行的可管理子任务，是当前主流架构模式。
    - 当前AI科学家系统在需要深层领域知识、批判性思维和科学品味的任务上，仍远未达到专家水平。
    - 评估必须超越表面质量，关注生成陈述的事实准确性、可追溯性和真正的科学价值。
    - 文献综述自动化和长周期自主研究被普遍认为是核心未解决挑战。
    分歧:
    - 内部表示与协调：某些系统采用共享结构化世界模型进行智能体间通信，而其他系统使用带有回溯的树形探索或线性状态机流水线。
    - 领域特异性：部分框架追求领域无关的通用性，而另一些则将领域专业知识直接嵌入智能体角色、数据注册表或任务定义中。
    - 评估重点：一类工作设计基准测试和案例研究以诊断失败模式和局限性，另一类则报告在标准化任务上的最先进分数，反映了理解与性能之间的不同优先级。
    - 质量保证：基于评分准则的迭代多智能体评审，与事后人类准确性判断，以及依赖自动自我批判和知识积累的自我演化机制，三者之间存在差异。
    开放问题:
    - 当自主系统扩展到超出已测试的20周期限制的多周期实验时，如何保持长周期可靠性？
    - 代理指标（如陈述准确性或基准分数）能否可靠预测生成的研究是否带来有意义的科学影响？
    - 需要何种机制将领域直觉和科学品味嵌入智能体，而不损害通用性或引入脆弱的启发式方法？
    - 表示形式和工作流结构如何影响这些系统适应全新学科或研究范式的能力？
