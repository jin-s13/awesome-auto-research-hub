  literature_review:
    line_of_work_matrix:
    - line: Agentic multi-stage survey generation
      what_it_solves: Automatically producing structured, citation-backed literature
        surveys from a paper corpus by decomposing the task into retrieval, planning,
        drafting, and refinement stages.
      what_remains_open: Achieving human-level analytical depth and critical synthesis;
        scaling to very large corpora without degradation; ensuring factual consistency
        and avoiding hallucination across long documents.
    - line: Evaluation and benchmarking of survey quality
      what_it_solves: Providing standardized metrics and benchmarks to compare survey
        generation systems on coverage, structure, citation accuracy, and taxonomy
        alignment.
      what_remains_open: Alignment of automated metrics with expert human judgment;
        coverage of diverse research domains beyond computer science; capturing critical
        analysis and gap identification beyond surface-level coverage.
    - line: Taxonomy and hierarchical organization generation
      what_it_solves: Automatically organizing papers into meaningful hierarchical
        categories that form the backbone of a survey's structure.
      what_remains_open: Generating taxonomies that are mutually exclusive and collectively
        exhaustive; aligning generated categories with expert mental models; handling
        structural imbalance and sibling overlap.
    consensus:
    - Iterative refinement with feedback loops improves survey coherence and citation
      quality over single-pass generation.
    - Retrieval-augmented generation is essential for grounding survey content in
      the actual literature.
    - Multi-agent systems that separate retrieval, planning, writing, and evaluation
      outperform monolithic approaches.
    - Evaluation should combine automated metrics (coverage, structure, citation F1)
      with human studies to capture nuanced quality dimensions.
    disagreements:
    - 'Architecture: single integrated pipeline with parallel section generation versus
      multi-agent frameworks with specialized roles and hierarchical reflection.'
    - 'Depth of evidence: reliance on abstracts and metadata versus full-text analysis
      with code-repository integration for implementation-level details.'
    - 'Primary quality target: citation accuracy and fidelity versus analytical depth
      and cross-paper comparative insights.'
    - 'Evaluation design: rubric-guided scoring by LLM reviewers versus alignment
      with expert-authored taxonomies and human preference judgments.'
    open_questions:
    - How can automated systems move beyond summarization to produce critical synthesis
      that identifies research gaps and future directions?
    - What evaluation protocols best predict the real-world usefulness of a generated
      survey for researchers?
    - How can systems scale to thousands of papers while maintaining coherent narrative
      structure and avoiding topic drift?
    - What mechanisms can ensure factual grounding of every claim and prevent hallucinated
      citations or findings?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 智能体多阶段综述生成
      解决的问题: 通过将任务分解为检索、规划、起草和优化阶段，从论文语料库自动生成结构化、有引用支撑的文献综述。
      尚未覆盖: 达到人类水平的分析深度和批判性综合；扩展到极大规模语料库而不损失质量；在长文档中确保事实一致并避免幻觉。
    - 路线: 综述质量的评测与基准
      解决的问题: 提供标准化指标和基准，用于比较综述生成系统在覆盖度、结构、引用准确性和分类对齐方面的表现。
      尚未覆盖: 自动指标与专家人类判断的对齐；覆盖计算机科学以外的多样研究领域；捕捉超越表面覆盖度的批判性分析和研究缺口识别。
    - 路线: 分类体系与层次组织生成
      解决的问题: 自动将论文组织成有意义的层次类别，构成综述结构的骨架。
      尚未覆盖: 生成互斥且集体穷尽的分类体系；使生成的类别与专家心智模型对齐；处理结构不平衡和兄弟节点重叠问题。
    共识:
    - 带有反馈循环的迭代优化比单次生成更能提升综述的连贯性和引用质量。
    - 检索增强生成对于将综述内容建立在真实文献基础上至关重要。
    - 将检索、规划、写作和评估分离的多智能体系统优于单体方法。
    - 评估应结合自动指标（覆盖度、结构、引用F1）与人工研究，以捕捉细微的质量维度。
    分歧:
    - 架构：单一集成流水线并行章节生成 vs. 具有专门角色和层次化反思的多智能体框架。
    - 证据深度：依赖摘要和元数据 vs. 全文分析并集成代码仓库以获取实现级细节。
    - 主要质量目标：引用准确性和忠实度 vs. 分析深度和跨论文比较洞察。
    - 评估设计：由LLM评审员进行的评分准则引导评分 vs. 与专家撰写的分类体系对齐及人类偏好判断。
