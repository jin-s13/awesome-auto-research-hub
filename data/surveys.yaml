  - 开放问题：自动综述能否实现超越总结的真正批判性分析？如何确保长文生成中的引用忠实性并避免幻觉？哪些评估协议能跨领域可靠预测人类专家判断？
  literature_review:
    line_of_work_matrix:
    - line: Multi-agent survey generation with rubric-guided refinement
      what_it_solves: Decomposes survey writing into specialized agent roles (e.g.,
        retrieval, drafting, reviewing) and uses structured rubrics or hierarchical
        reflection to iteratively improve manuscript quality, achieving high scores
        on coherence and scholarly rigor.
      what_remains_open: Whether rubric-based evaluation correlates with human expert
        judgment; scalability to very large paper sets; and the ability to inject
        genuine critical analysis rather than polished summarization.
    - line: Iterative retrieval-augmented workflows with paper-level grounding
      what_it_solves: Incrementally retrieves and reads papers to update an outline,
        distills each paper into structured cards for faithful grounding, and applies
        review-and-refine loops to enhance content coverage and citation quality.
      what_remains_open: Dependence on initial retrieval quality; limited evidence
        of how well these workflows handle contradictory findings or rapidly evolving
        fields; and the risk of perpetuating retrieval bias.
    - line: Evaluation benchmarks and metrics for survey synthesis
      what_it_solves: Provides standardized testbeds (e.g., TaxoBench, CS-TaxoBench,
        SurveyScope) and metrics (e.g., US-TED, Sem-Path, 12-dimension evaluation)
        to measure retrieval recall, taxonomy organization, and synthesis quality
        against expert references.
      what_remains_open: Alignment between automatic metrics and human preferences
        is still weak (e.g., Sem-Path 28–29% for LLMs vs. 47–58% for humans); benchmarks
        are mostly limited to computer science and may not transfer to other disciplines.
    - line: Deep analysis and evidence-constrained citation
      what_it_solves: Enhances analytical depth by extracting structured keynotes
        from full-text, modeling cross-paper relationships, and enforcing citation
        via evidence grounding, leading to higher content scores and citation precision/recall.
      what_remains_open: Computational cost of full-text processing; generalizability
        beyond CS demonstrated only on a small scale; and the need for external validation
        on whether evidence-constrained citation eliminates hallucination in practice.
    consensus:
    - Automated survey generation is framed as a complex multi-step process requiring
      specialized handling of retrieval, organization, drafting, and evaluation.
    - Iterative refinement, whether through multi-agent debate or single-pipeline
      loops, is essential for improving coherence, coverage, and citation quality.
    - Citation accuracy and content faithfulness are recognized as critical challenges,
      with all systems incorporating some mechanism to ground claims in source papers.
    - Evaluation goes beyond surface-level metrics to include structural coherence,
      taxonomy alignment, and expert-informed criteria, though no single metric is
      universally adopted.
    disagreements:
    - 'Architecture: Some systems use a single planning agent with iterative outline
      updates, while others employ multiple specialized agents with distinct roles
      and communication protocols.'
    - 'Depth of analysis: Approaches differ in whether they operate on abstracts only
      or ingest full-text and code repositories, leading to trade-offs between scalability
      and analytical richness.'
    - 'Evaluation philosophy: One line of work builds reference-based benchmarks with
      expert taxonomies to measure alignment, while another relies on multi-LLM evaluation
      frameworks or pairwise human preference without a fixed reference.'
    - 'Citation grounding: Methods range from simple retrieval-augmented generation
      to evidence-constrained assignment with multi-granularity verification, reflecting
      different assumptions about what constitutes a faithful citation.'
    open_questions:
    - How can automated surveys move beyond descriptive synthesis to produce critical
      analysis that identifies research gaps and contradictions?
    - What is the minimal supervision or reference needed to reliably evaluate survey
      quality across diverse scientific domains?
    - Can evidence-constrained citation mechanisms scale to thousands of papers without
      introducing latency or coverage loss?
    - To what extent do current benchmarks (mostly CS-focused) capture the challenges
      of survey generation in fields with different publication practices and argumentation
      styles?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基于评分准则引导的多智能体综述生成
      解决的问题: 将综述写作分解为专门智能体角色（检索、起草、评审），利用结构化评分准则或层次化反思迭代提升稿件质量，在连贯性和学术严谨性上取得高分。
      尚未覆盖: 评分准则评估与人类专家判断的相关性；对大规模论文集的扩展性；能否注入真正的批判性分析而非仅仅是润色后的总结。
    - 路线: 基于论文级基础的迭代检索增强工作流
      解决的问题: 逐步检索并阅读论文以更新大纲，将每篇论文提炼为结构化卡片以实现忠实基础，并通过审查-优化循环提升内容覆盖度和引用质量。
      尚未覆盖: 依赖初始检索质量；处理矛盾发现或快速演变领域的能力证据有限；存在延续检索偏差的风险。
    - 路线: 综述综合的评估基准与指标
      解决的问题: 提供标准化测试平台（如TaxoBench、CS-TaxoBench、SurveyScope）和指标（如US-TED、Sem-Path、12维评估），以衡量检索召回率、分类法组织和综合质量与专家参考的对齐程度。
      尚未覆盖: 自动指标与人类偏好之间的对齐仍然较弱（如LLM的Sem-Path为28–29%，人类为47–58%）；基准大多局限于计算机科学，可能无法迁移到其他学科。
    - 路线: 深度分析与证据约束引用
      解决的问题: 通过从全文中提取结构化要点、建模跨论文关系、并基于证据基础强制引用，提升分析深度，从而获得更高的内容得分和引用精确率/召回率。
      尚未覆盖: 全文处理的计算成本；跨领域泛化仅在小规模上得到验证；需要外部验证证据约束引用在实践中是否真正消除幻觉。
    共识:
    - 自动综述生成被定义为一个复杂的多步骤过程，需要专门处理检索、组织、起草和评估。
    - 迭代优化，无论是通过多智能体辩论还是单流水线循环，对于提高连贯性、覆盖度和引用质量至关重要。
    - 引用准确性和内容忠实性被认为是关键挑战，所有系统都包含某种将主张建立在源论文基础上的机制。
    - 评估超越了表面指标，包括结构连贯性、分类法对齐和专家知情标准，但没有单一指标被普遍采用。
    分歧:
    - 架构：一些系统使用单一规划智能体进行迭代大纲更新，而另一些则采用多个专门智能体，具有不同角色和通信协议。
    - 分析深度：方法在仅处理摘要还是摄入全文和代码仓库上存在差异，导致可扩展性与分析丰富性之间的权衡。
    - 评估理念：一类工作构建基于参考的基准，使用专家分类法衡量对齐程度，另一类则依赖多LLM评估框架或无固定参考的成对人类偏好。
    - 引用基础：方法从简单的检索增强生成到具有多粒度验证的证据约束分配不等，反映了对什么构成忠实引用的不同假设。
    开放问题:
    - 自动综述如何超越描述性综合，产生识别研究空白和矛盾的批判性分析？
    - 在不同科学领域可靠评估综述质量所需的最少监督或参考是什么？
    - 证据约束引用机制能否在不引入延迟或覆盖损失的情况下扩展到数千篇论文？
    - 当前基准（主要关注计算机科学）在多大程度上捕捉了具有不同出版实践和论证风格的领域的综述生成挑战？
