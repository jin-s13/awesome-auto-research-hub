  - 'Shared research pattern: Decomposing complex paper-writing workflows into sub-tasks
    handled by specialized agents, often integrated into existing editor environments
    or standalone pipelines.'
  - 'Key differences: The target sub-task varies widely—full paper generation, interactive
    tutoring, critique grounding, poster creation, paper search, or replication benchmarking—leading
    to different interaction modes and evaluation criteria.'
  - 'Trend evolution: The topic surged in 2025–2026, shifting from isolated writing
