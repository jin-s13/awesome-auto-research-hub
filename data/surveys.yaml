    - 路线: 综述质量的评估基准与指标
      解决的问题: 提供标准化测试平台和指标（如TaxoBench、Survey-Arena、12维度评估），定量比较自动综述生成系统在检索、组织、内容深度和引用准确性方面的表现。
      尚未覆盖: 代理指标与真实学术效用之间的差距；依赖单一专家分类法作为参考可能惩罚有效的替代组织方式；非计算机科学或非英语综述任务的覆盖有限。
    - 路线: 分类法和知识组织
      解决的问题: 从参考论文构建研究主题的层次或平面分类法，以结构化综述，实现清晰的论文到类别映射和主题导航。
      尚未覆盖: 自动生成的分类法在读者效用上是否优于人工策划的分类法；验证基于分类法的组织是否能改善下游理解，而不仅仅是提升结构指标。
    共识:
    - 基于LLM的智能体是综述生成的核心引擎，简单的单次生成不足，必须进行迭代精炼。
    - 引用准确性和内容覆盖度是首要质量维度，系统必须包含显式机制，根据源论文验证主张。
    - 综述的结构连贯性和逻辑组织与事实正确性同等重要，因此需要大纲规划和分类法引导的章节划分。
    分歧:
    - 系统采用单一多阶段流水线（如AutoSurvey2）或多智能体协作（如ARISE、Agentic AutoSurvey、DeepSurvey），对于哪种范式能带来更好的可靠性–成本权衡尚无共识。
    - 评估方法存在分歧：一些依赖带有专家标注的定制基准（TaxoBench、CS-TaxoBench），而其他则构建临时人工评估或使用LLM作为评判；缺乏被所有工作接受的标准化外部基准。
    - 源分析深度各异：多数系统在摘要和元数据上操作，但DeepSurvey推动全文和代码库分析，这引发了关于高质量合成所需证据充分性的问题。
    - 人类监督的角色不同：NVAITC AI Scientist强调治理和科学家在环，而许多其他系统瞄准完全自主生成，使得辅助与自动化之间的边界尚未确定。
    开放问题:
    - 我们如何验证生成综述中的引用真正支持所归属的主张，而不仅仅是基于关键词重叠？
    - 自动化综述在实际工作流中是否能提高研究人员效率或理解力，需要什么样的实验来证明？
    - 当应用于包含不完整或矛盾主张的快速演进预印本文献时，多智能体迭代精炼的失败模式是什么？
    - 能否设计出无参考、但仍与人类对综述组织偏好一致的分类法评估指标？
