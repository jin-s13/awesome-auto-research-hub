  related_work_outline:
  - 'Mainstream direction: Building standardized benchmarks and automated toolchains
    to evaluate and enhance end-to-end capabilities of LLM-based agents in scientific
    discovery, with growing attention to evaluation completeness beyond task success.'
  - 'Shared research pattern: Decomposing scientific discovery into subtasks (hypothesis,
    experiment, analysis) and using LLM agents to close the loop; leveraging environments
    or benchmarks for reproducible feedback.'
  - 'Key differences: Evaluation targets (outcome-only vs. mechanism fidelity), task
    domains (materials science, particle physics, ML, fluid dynamics), agent interaction
    modes (code generation, objective design, multi-source fusion), and constraints
    on external knowledge.'
  - 'Trend evolution: From general virtual environments (2024) toward domain-specific
    automation components and evaluation theory (2025–2026), with a shift from measuring
    task completion to scrutinizing reasoning correctness.'
  - 'Open questions: How to detect incorrect mechanisms in open-ended discovery, bridge
    simulation-to-reality gaps, unify evaluation across domains, and prevent reward
    hacking in automated objective design.'
  related_work_outline_zh:
  - 主流方向：构建标准化基准和自动化工具链，评估并提升基于LLM的智能体在科学发现中的端到端能力，并开始关注超越任务成功率的评估完备性。
  - 研究共性：将科学发现分解为假设、实验、分析等子任务，由LLM智能体闭环执行；利用环境或基准提供可复现的反馈。
  - 关键差异：评估目标（仅结果 vs. 机制忠实性）、任务领域（材料科学、粒子物理、ML、流体力学）、智能体交互模式（代码生成、目标设计、多源融合）以及对外部知识的约束设定不同。
  - 趋势演进：从2024年的通用虚拟环境，到2025–2026年领域特定的自动化组件和评估理论，重心从测量任务完成度转向审视推理正确性。
  - 开放问题：如何在开放式发现中检测错误机制，弥合仿真到现实的差距，统一跨领域评估标准，以及防止自动化目标设计中的奖励黑客。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark and environment design
      what_it_solves: Provides standardized tasks, metrics, and constraints to compare
        scientific discovery agents and expose their limitations in hypothesis formation,
        experiment design, and result interpretation.
      what_remains_open: Limited task diversity and domain coverage; proxy metrics
        (e.g., task completion) may not align with true scientific value; environments
        remain simplified relative to real-world lab conditions.
    - line: Automated tooling and infrastructure for agents
      what_it_solves: Generates vetted, domain-specific code libraries or structured
        workflows that agents can use to conduct experiments reliably, reducing errors
        from ad-hoc coding and missing domain knowledge.
      what_remains_open: Generalization beyond the source domain (e.g., materials
        science); reliability of LLM-as-a-judge for quality assessment; integration
        with physical lab equipment and real-world constraints.
    - line: Objective and planning automation
      what_it_solves: Automates the design of objective functions that guide optimization
        loops, enabling agents to explore trade-offs and discover solutions without
        manually specified goals.
      what_remains_open: Completeness of objective space exploration; safeguards against
        misspecified or hackable objectives that lead to invalid discoveries; validation
        on a wider range of scientific problems.
    - line: Evaluation theory and epistemic honesty
      what_it_solves: Proposes dimensions beyond task outcome—mechanism fidelity and
        epistemic honesty—to detect when agents produce correct-looking results via
        flawed reasoning that fails under distribution shift.
      what_remains_open: Detection methods require known ground-truth mechanisms or
        re-computation checks, which are unavailable in true open discovery; evidence
        is limited to small-scale simulation studies.
    - line: Multi-source data fusion for equation discovery
      what_it_solves: Recovers governing physical laws from heterogeneous, multi-source
        datasets by learning neural surrogates and applying competitive optimization
        to aggregate a consensus model.
      what_remains_open: Robustness to noisy, missing, or conflicting data sources;
        scalability to complex multi-physics systems; reliance on pre-defined function
        libraries for structure search.
    consensus:
    - Scientific discovery can be operationalized as a closed-loop process where agents
      generate hypotheses, design and run experiments, and interpret results.
    - LLMs serve as the core reasoning engine for scientific discovery agents, but
      their raw outputs require structuring through environments, workflows, or code
      libraries.
    - Evaluation must move beyond aggregate task success rates and incorporate process-level
      or mechanism-level checks to ensure scientific validity.
    - Automated tools that provide domain-specific code examples or objective functions
      substantially improve the quality and soundness of agent-generated experiments.
    disagreements:
    - Whether evaluation should prioritize final task outcome or the correctness of
      the underlying reasoning mechanism; some works accept outcome-only metrics while
      others argue this masks the 'correct answer, wrong mechanism' failure mode.
    - 'Agent interaction modes differ: some operate in text-based virtual labs, others
      execute real code with GPU constraints, and yet others directly optimize experimental
      parameters, leading to different assumptions about observability and action
      space.'
    - 'The role of external knowledge varies: some benchmarks forbid internet access
      and pretrained weights to test core reasoning, while others allow controlled
      exceptions or curated code libraries, reflecting different stances on realistic
      development settings.'
    - Task domains span materials science, particle physics, ML model design, and
      fluid dynamics, with no agreed-upon cross-domain evaluation protocol or success
      criterion.
    open_questions:
    - How can we automatically detect incorrect mechanisms in open-ended discovery
      where no ground-truth answer exists?
    - To what extent do current simulated benchmarks predict agent performance in
      real-world laboratory settings with physical constraints and safety requirements?
    - How can automated objective design avoid generating reward functions that are
      gamed by the inner optimizer, leading to trivial or unsafe discoveries?
    - What is the minimal set of evaluation dimensions (outcome, mechanism, honesty,
      reproducibility) needed to certify an AI scientist as trustworthy?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 基准与环境设计
      解决的问题: 提供标准化任务、指标和约束，用于比较科学发现智能体，并暴露其在假设形成、实验设计和结果解释中的局限。
      尚未覆盖: 任务多样性和领域覆盖有限；代理指标（如任务完成度）可能与真实科学价值不一致；环境相比真实实验室条件仍过于简化。
    - 路线: 面向智能体的自动化工具与基础设施
      解决的问题: 生成经过验证的领域特定代码库或结构化工作流，使智能体能够可靠地进行实验，减少临时编码和领域知识缺失带来的错误。
      尚未覆盖: 对源领域（如材料科学）之外的泛化能力；LLM-as-a-judge 作为质量评估的可靠性；与物理实验设备和现实约束的集成。
    - 路线: 目标与规划自动化
      解决的问题: 自动化设计指导优化循环的目标函数，使智能体能够在没有人工指定目标的情况下探索权衡并发现解决方案。
      尚未覆盖: 目标空间探索的完备性；防止错误或可被操纵的目标导致无效发现的安全措施；在更广泛的科学问题上的验证。
    - 路线: 评估理论与认知诚实性
      解决的问题: 提出超越任务结果的评估维度——机制忠实性和认知诚实性——以检测智能体是否通过错误推理得出看似正确的结果，该推理在分布变化下失效。
      尚未覆盖: 检测方法依赖已知的真实机制或重新计算检查，在真正的开放式发现中不可用；证据仅限于小规模仿真研究。
    - 路线: 多源数据融合与方程发现
      解决的问题: 通过学习神经代理模型并应用竞争优化来聚合共识模型，从异质多源数据中恢复控制物理定律。
      尚未覆盖: 对噪声、缺失或冲突数据源的鲁棒性；向复杂多物理场系统的可扩展性；结构搜索依赖预定义的函数库。
    共识:
    - 科学发现可被操作化为一个闭环过程，智能体在其中生成假设、设计和运行实验并解释结果。
    - LLM 是科学发现智能体的核心推理引擎，但其原始输出需要通过环境、工作流或代码库进行结构化。
    - 评估必须超越总体任务成功率，纳入过程或机制层面的检查，以确保科学有效性。
    - 提供领域特定代码示例或目标函数的自动化工具能显著提升智能体生成实验的质量和科学性。
    分歧:
    - 评估应优先考虑最终任务结果还是底层推理的正确性存在分歧；部分工作接受仅以结果衡量，而另一些认为这会掩盖“正确答案，错误机制”的失败模式。
    - 智能体的交互模式不同：有的在基于文本的虚拟实验室中操作，有的在真实 GPU 约束下执行代码，还有的直接优化实验参数，导致对可观测性和动作空间的不同假设。
    - 对外部知识的使用设定不同：一些基准禁止互联网访问和预训练权重以测试核心推理能力，另一些则允许受控例外或精选代码库，反映了对现实开发流程模拟程度的不同立场。
    - 任务领域涵盖材料科学、粒子物理、ML 模型设计和流体力学，缺乏统一的跨领域评估协议或成功标准。
    开放问题:
    - 在无已知正确答案的开放式发现中，如何自动检测智能体是否使用了错误机制？
    - 当前的仿真基准在多大程度上能预测智能体在具有物理约束和安全要求的真实实验室环境中的表现？
    - 自动化目标设计如何避免生成被内部优化器利用的奖励函数，从而导致无意义或不安全的发现？
    - 认证一个 AI 科学家为可信所需的最小评估维度集（结果、机制、诚实性、可复现性）是什么？
