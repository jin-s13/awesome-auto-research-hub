    - Current systems are not yet capable of fully autonomous, reliable scientific
      discovery and require further advances in verification, failure recovery, and
      evaluation.
    disagreements:
    - 'Evaluation methodology: some works rely on automated reviewer scores or benchmark
      task completion, while others use human expert judgment or blind comparison
      of artifacts, leading to different conclusions about system capability.'
    - 'Domain generality vs. specificity: general frameworks (e.g., AI Scientist)
