  literature_review:
    line_of_work_matrix:
    - line: Autonomous hypothesis generation loops
      what_it_solves: Integrates hypothesis proposal, literature grounding, data analysis,
        and experimental validation into a closed-loop system that can run for many
        cycles with minimal human intervention.
      what_remains_open: Long-horizon reliability beyond 20 cycles, cross-domain generalization,
        and systematic detection of failure modes such as data leakage or post-hoc
        selection bias.
    - line: Structured search and planning over hypothesis spaces
      what_it_solves: Organizes hypothesis exploration through tree-based workflows,
        evolutionary selection, or world-model-guided information sharing to improve
        efficiency and inspectability.
      what_remains_open: Theoretical guarantees on search optimality, integration
        of human intuition, and whether the learned state representations are sufficient
        for decisions outside the training distribution.
    - line: Evaluation and benchmark design for hypothesis generation
      what_it_solves: Provides tasks, metrics, and controlled experiments to compare
        AI scientist systems and quantify progress in realistic scientific contexts.
      what_remains_open: Alignment between proxy metrics and real scientific utility,
        coverage of diverse research workflows, and standardized protocols for detecting
        hidden pitfalls.
    - line: Conceptual taxonomy and workflow analysis
      what_it_solves: Defines autonomy spectra, workflow conditions, and evaluation
        dimensions to organize fragmented system designs and guide future development.
      what_remains_open: Direct empirical validation that proposed categories predict
        model behavior, and translation of taxonomies into actionable design principles.
    - line: Failure mode identification and mitigation
      what_it_solves: Reveals systematic vulnerabilities in AI scientist systems,
        such as inappropriate benchmark selection, metric misuse, and data leakage,
        and demonstrates that trace logs improve detection.
      what_remains_open: Standardized detection protocols, cross-system generalization
        of failure patterns, and integration of safeguards into autonomous workflows
        without sacrificing flexibility.
    consensus:
    - Hypothesis generation must be embedded in an iterative cycle that includes evidence
      gathering, experimentation, and refinement rather than treated as a one-shot
      task.
    - LLMs serve as the central reasoning and code-generation engine, with tool use
      (code interpreters, literature search) being essential for grounding hypotheses
      in data and prior work.
    - Traceability and reproducibility are critical; systems should produce logs,
      code, and cited evidence to enable verification of generated hypotheses.
    - Evaluation requires both benchmark tasks and real-world scientific validation,
      as proxy metrics alone may not capture the quality or novelty of discoveries.
    disagreements:
    - 'System architecture: multi-agent collaboration versus single-agent world models
      versus evolutionary tree search, each with different assumptions about modularity
      and information sharing.'
    - 'Degree of autonomy: fully autonomous systems that run for hours without human
      input versus semi-autonomous lab-in-the-loop frameworks that keep a human in
      the experimental validation step.'
    - 'Evaluation target: some works prioritize benchmark performance on curated tasks,
      while others emphasize end-to-end scientific discovery with experimental validation
      in a specific domain.'
    - 'Handling of failure modes: only a subset of works explicitly design controlled
      experiments to audit for data leakage, metric misuse, and selection bias; others
      focus on positive results without systematic failure analysis.'
    open_questions:
    - How can we guarantee the accuracy and novelty of generated hypotheses when current
      systems still produce ~20% inaccurate statements?
    - What standardized protocols can detect and prevent data leakage, metric misuse,
      and post-hoc selection bias across diverse AI scientist architectures?
    - How do we scale hypothesis generation systems to domains with embodied, delayed,
      or ethically constrained feedback where rapid iteration is impossible?
    - What is the relationship between the structure of the hypothesis search space
      (tree, world model, evolutionary) and the quality of final discoveries, and
      can we predict which structure suits which scientific domain?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自主假设生成循环
      解决的问题: 将假设提出、文献依据、数据分析和实验验证整合为闭环系统，能够在最少人工干预下运行多个周期。
      尚未覆盖: 超过20个周期的长程可靠性、跨领域泛化，以及数据泄露或事后选择偏差等失败模式的系统检测。
    - 路线: 假设空间的结构化搜索与规划
      解决的问题: 通过树形工作流、进化选择或世界模型引导的信息共享来组织假设探索，以提高效率和可检查性。
      尚未覆盖: 搜索最优性的理论保证、人类直觉的整合，以及学习到的状态表示在训练分布之外是否足以支撑决策。
    - 路线: 假设生成的评估与基准设计
      解决的问题: 提供任务、指标和受控实验，以比较AI科学家系统并量化在真实科学情境中的进展。
      尚未覆盖: 代理指标与真实科学效用之间的一致性、多样研究工作流的覆盖，以及检测隐藏陷阱的标准化协议。
    - 路线: 概念分类与工作流分析
      解决的问题: 定义自主性谱系、工作流条件和评估维度，以组织碎片化的系统设计并指导未来发展。
      尚未覆盖: 所提出分类能预测模型行为的直接实证验证，以及将分类转化为可操作设计原则的方法。
    - 路线: 失败模式识别与缓解
      解决的问题: 揭示AI科学家系统中的系统性漏洞，如不恰当的基准选择、指标误用和数据泄露，并证明跟踪日志能改善检测。
      尚未覆盖: 标准化检测协议、失败模式跨系统泛化，以及在不牺牲灵活性的前提下将防护措施集成到自主工作流中。
    共识:
    - 假设生成必须嵌入包含证据收集、实验和优化的迭代循环中，而非作为一次性任务处理。
    - LLM作为核心推理和代码生成引擎，工具使用（代码解释器、文献搜索）对于将假设建立在数据和先前工作基础上至关重要。
    - 可追溯性和可重复性至关重要；系统应产生日志、代码和引用证据，以便验证生成的假设。
    - 评估既需要基准任务，也需要真实科学验证，因为仅靠代理指标可能无法捕捉发现的质量或新颖性。
    分歧:
    - 系统架构：多智能体协作对比单智能体世界模型对比进化树搜索，各自对模块化和信息共享有不同的假设。
    - 自主程度：完全自主系统在无人工输入下运行数小时，对比半自主实验室在环框架在实验验证步骤中保留人类参与。
    - 评估目标：部分工作优先考虑在策划任务上的基准性能，而其他工作则强调在特定领域进行端到端科学发现并实验验证。
    - 失败模式处理：仅部分工作明确设计受控实验来审计数据泄露、指标误用和选择偏差；其他工作聚焦于正面结果，缺乏系统性失败分析。
    开放问题:
    - 当前系统仍有约20%的陈述不准确，如何保证生成假设的准确性和新颖性？
    - 什么样的标准化协议能够检测并防止不同AI科学家架构中的数据泄露、指标误用和事后选择偏差？
    - 如何将假设生成系统扩展到具身、延迟或伦理受限的领域，这些领域无法进行快速迭代？
    - 假设搜索空间的结构（树形、世界模型、进化）与最终发现质量之间存在什么关系，能否预测哪种结构适合哪个科学领域？
