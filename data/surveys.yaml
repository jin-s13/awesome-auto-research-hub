  - 开放问题：如何自动验证科学新颖性和长期影响；失败记忆能否跨领域迁移；多智能体协作在何种条件下优于单智能体；如何确保全自动研究的安全性和可复现性。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated research pipelines
      what_it_solves: Integrates hypothesis generation, experiment design, code implementation,
        result analysis, and manuscript writing into a fully autonomous workflow,
        reducing human effort and cost per study.
      what_remains_open: Output quality is inconsistent; only a fraction of generated
        papers pass peer review; systems rely on pretrained knowledge boundaries and
        lack safeguards for experimental safety and reproducibility.
    - line: Evaluation benchmarks and environments
      what_it_solves: Provides standardized tasks, metrics, and virtual environments
        for comparing the capabilities of automated discovery agents across diverse
        scientific scenarios.
      what_remains_open: Existing benchmarks are mostly text-based or simple simulations,
        not real lab experiments; alignment between automatic metrics and human expert
        judgment is unverified; task diversity and difficulty gradation remain limited.
    - line: Memory and experience utilization
      what_it_solves: Records failed attempts as structured negative knowledge to
        help agents avoid repeated errors, improving sample efficiency and success
        rate on novel tasks.
      what_remains_open: Generalization of negative knowledge across domains is unknown;
        the trade-off between exploiting failure memory and exploring new directions
        is unresolved.
    - line: Multi-agent collaboration architectures
      what_it_solves: Mimics human research teams through role specialization and
        inter-agent communication, aiming to improve flexibility and output quality
        in complex research workflows.
      what_remains_open: Platform maturity is low, evaluated on few case studies;
        controlled comparisons against single-agent systems are lacking; collaboration
        overhead and communication efficiency are not quantified.
    - line: Domain-specific automated labs
      what_it_solves: Adapts the autonomous research paradigm to specific fields (e.g.,
        recommender systems) and outlines community agendas for building, evaluating,
        and governing such labs.
      what_remains_open: Remains a conceptual proposal without implementation or empirical
        validation; domain-specific challenges like data privacy and fairness are
        not yet addressed within an automated framework.
    consensus:
    - Large language models serve as the core reasoning engine for automated scientific
      discovery, handling ideation, coding, analysis, and writing.
    - Current systems still underperform human researchers in generation quality,
      reliability, and generalization, necessitating better evaluation and iterative
      refinement mechanisms.
    - Standardized benchmarks and reproducibility standards are critical for advancing
      automated research agents.
    - Incorporating failure handling and memory mechanisms is a promising direction
      to improve agent robustness.
    disagreements:
    - 'Automation scope: some systems target full end-to-end automation while others
      focus on specific substeps like ablation planning or experiment execution.'
    - 'Evaluation methodology: approaches vary between automated reviewer scores,
      human expert judgments, and benchmark task completion, with no unified success
      criterion.'
    - 'Agent architecture: evidence is insufficient to determine whether single-agent
      with search or multi-agent collaboration yields superior results.'
    - 'Domain generality: tension exists between building general-purpose frameworks
      and domain-specific customization, with most systems validated only in narrow
      domains.'
    open_questions:
    - How can we design automatic metrics that assess scientific novelty and long-term
      impact rather than superficial paper quality?
    - Under what conditions can negative knowledge or failure memory transfer across
      different scientific domains?
    - At what task complexity does multi-agent collaboration begin to outperform single-agent
      systems in research automation?
    - What mechanisms can ensure safety and ethical compliance in fully automated
      experiment generation and execution?
    - To what extent do current benchmark tasks reflect the challenges of real-world
      scientific discovery, and how can we build more realistic lab-based evaluations?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动化研究流水线
      解决的问题: 将假设生成、实验设计、代码实现、结果分析和论文撰写整合为全自动流程，降低人工投入和单次研究成本。
      尚未覆盖: 输出质量不稳定，仅少数生成论文通过同行评审；系统依赖预训练知识边界，缺乏实验安全性和可复现性的保障机制。
    - 路线: 评估基准与环境设计
      解决的问题: 提供标准化任务、指标和虚拟环境，用于比较自动化发现智能体在多种科学场景下的能力。
      尚未覆盖: 现有基准多为文本或简单模拟，未涉及真实实验室实验；自动指标与人类专家判断的一致性未经验证；任务多样性和难度分级仍有限。
    - 路线: 记忆与经验利用
      解决的问题: 将失败尝试记录为结构化负知识，帮助智能体避免重复错误，提高在新任务上的样本效率和成功率。
      尚未覆盖: 负知识的跨领域泛化能力未知；利用失败记忆与探索新方向之间的权衡尚未解决。
    - 路线: 多智能体协作架构
      解决的问题: 通过角色分工和智能体间通信模拟人类研究团队，旨在提升复杂研究流程的灵活性和产出质量。
      尚未覆盖: 平台成熟度低，仅在少量案例上评估；缺乏与单智能体系统的受控对比；协作开销和通信效率未量化。
    - 路线: 领域特定自动化实验室
      解决的问题: 将自主研究范式适配到特定领域（如推荐系统），并规划构建、评估和治理该类实验室的社区议程。
      尚未覆盖: 仅为概念性提议，无实现和实证验证；数据隐私、公平性等领域特定挑战尚未在自动化框架内解决。
    共识:
    - 大型语言模型是当前自动化科学发现的核心推理引擎，承担构思、编码、分析和写作任务。
    - 现有系统在生成质量、可靠性和泛化性上仍落后于人类研究者，需要更好的评估和迭代改进机制。
    - 标准化基准和可复现性标准对推动自动化研究智能体发展至关重要。
    - 引入失败处理和记忆机制是提高智能体鲁棒性的有前景方向。
    分歧:
    - 自动化范围：部分系统追求全流程端到端自动化，另一些聚焦于消融规划或实验执行等特定子任务。
    - 评估方法：有的依赖自动评审器评分，有的采用人类专家评判或基准任务完成度，缺乏统一的成功标准。
    - 智能体架构：现有证据不足以判断单智能体加搜索与多智能体协作哪种架构更优。
    - 领域通用性：通用框架与领域特定定制之间存在张力，多数系统仅在狭窄领域得到验证。
    开放问题:
    - 如何设计能评估科学新颖性和长期影响的自动指标，而非仅评价表面论文质量？
    - 负知识或失败记忆在什么条件下能够跨科学领域有效迁移？
    - 在何种任务复杂度下，多智能体协作开始在研究自动化中超越单智能体系统？
    - 何种机制能确保全自动实验生成和执行的安全性与伦理合规？
    - 当前基准任务在多大程度上反映真实科学发现的挑战，如何构建更贴近实际实验室环境的评估？
