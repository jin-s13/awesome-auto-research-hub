  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated research pipelines
      what_it_solves: Automating the full scientific discovery cycle from hypothesis
        generation to paper writing, reducing human effort in routine and novel research
        tasks.
      what_remains_open: Output quality is inconsistent; systems often operate at
        a novice student level and rely on human-authored templates or domain-specific
        scaffolding; generalization beyond the training distribution of the base LLM
        is unproven.
    - line: Experiment planning and ablation automation
      what_it_solves: Automatically deciding which experiments to run, particularly
        ablations, to validate a method or identify missing evidence.
      what_remains_open: Current language models achieve only partial recall on ablation
        identification (e.g., 45% vs. humans), and the gap between author-side and
        reviewer-side planning indicates grounding issues that limit consistent behavior.
    - line: Virtual environments for discovery benchmarking
      what_it_solves: Providing controllable, reproducible sandboxes with diverse
        tasks and metrics to evaluate how well agents perform novel scientific discovery
        cycles.
      what_remains_open: Transfer from simulated environments to real-world lab settings
        remains unverified; the automatic metrics may not capture the explanatory
        depth or practical utility of the discovered knowledge.
    - line: Failure-aware memory and learning
      what_it_solves: Capturing failed attempts and converting them into reusable
        negative knowledge to improve subsequent experimental efficiency and success
        rate.
      what_remains_open: The approach has been demonstrated on same-task and cross-task
        science problems but its scalability to long-horizon, multi-failure chains
        and its integration with diverse agent architectures are not yet studied.
    - line: Multi-agent collaborative research platforms
      what_it_solves: Enabling customizable research teams with role specialization,
        real-time monitoring, and code harnesses to run complex experiments with human-in-the-loop
        oversight.
      what_remains_open: Evaluation is limited to a small number of internal case
        studies; the platform's maturity and generalizability to real-world multi-disciplinary
        research are uncertain.
    consensus:
    - LLM-driven agents can generate plausible research ideas, execute code, and write
      presentable papers across a few machine learning subfields.
    - Automated reviewers and benchmark tasks serve as necessary but insufficient
      proxies for the scientific value of automatically generated outputs.
    - Current systems function best as assistants or novice-level researchers, not
      as fully autonomous scientific experts capable of producing reliable, impactful
      findings without human oversight.
    - Learning from past experiments—whether by recording failures, using tree search,
      or adopting multi-agent critique—is critical for improving the quality and efficiency
      of automated research.
    disagreements:
    - 'The scope of automation: some works target only code-based ML experiments,
      while others aim for broader simulated scientific discovery involving hypothesis
      testing in virtual worlds.'
    - 'Agent architecture: approaches range from single-agent sequential pipelines,
      to tree-search-based progressive refinement, to multi-agent teams with role
      specialization, with no clear winner.'
    - 'Evaluation methodology: benchmarks like AblationBench measure recall against
      human ablations, platforms like DISCOVERYWORLD use task completion metrics,
      and other works rely on automated reviewer scores or human preference judgments,
      leading to incomparable conclusions.'
    - 'Failure handling: one line of work explicitly builds a shared negative knowledge
      memory, while others implicitly handle failure through tree search backtracking
      or human feedback, without a standard mechanism.'
    open_questions:
    - How can we close the gap between proxy evaluation metrics (auto-review scores,
      task completion) and the actual scientific impact of the generated discoveries?
    - What mechanisms are needed to ensure the reproducibility of experiments designed
      and executed by automated agents, especially when they interact with live codebases
      and evolving benchmarks?
    - Can failure-aware memory and multi-agent deliberation scale to interdisciplinary,
      long-horizon research problems that require multi-modal experiments or physical
      lab work?
    - What are the minimal human oversight requirements to prevent reward hacking,
      data contamination, and unsafe outcomes in automated research systems?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动化研究流水线
      解决的问题: 将科学发现全周期（从假设生成到论文撰写）自动化，减少常规和新型研究任务中的人工投入。
      尚未覆盖: 产出质量不稳定，系统常运行于新手学生水平，依赖人类编写的模板或领域特定脚手架；在底层LLM训练分布之外的泛化能力未经验证。
    - 路线: 实验规划与消融自动化
      解决的问题: 自动决定需要运行哪些实验（尤其是消融实验），以验证方法或发现证据缺失。
      尚未覆盖: 当前语言模型在消融识别上仅达到部分召回率（如45%），与人类相比仍有差距；作者端与审稿人端规划之间的性能差异表明基础对齐问题，限制了模型行为的一致性。
    - 路线: 虚拟发现环境与基准
      解决的问题: 提供可控、可复现的沙盒环境，包含多样化任务和指标，用于评估智能体在新型科学发现循环中的表现。
      尚未覆盖: 从模拟环境到真实世界实验室的迁移尚未验证，自动指标可能无法捕捉已发现知识的解释深度或实际效用。
    - 路线: 失败感知记忆与学习
      解决的问题: 捕获失败尝试并将其转化为可复用的负知识，以提高后续实验的效率和成功率。
      尚未覆盖: 方法已在相同任务和跨任务科学问题上得到验证，但其在长周期、多失败链中的可扩展性以及与不同智能体架构的集成尚未研究。
    - 路线: 多智能体协作研究平台
      解决的问题: 提供可定制的研究团队，支持角色分工、实时监控和代码工具，以运行复杂实验并保持人类监督。
      尚未覆盖: 评估仅限于少量内部案例研究，平台的成熟度和对真实世界多学科研究的泛化性尚不确定。
    共识:
    - LLM驱动的智能体能够在少数机器学习子领域内生成合理的研究想法、执行代码并撰写可呈现的论文。
    - 自动评审和基准任务可作为自动化产出的科学价值的必要但不充分的代理。
    - 当前系统最适合作为助手或新手级研究员，而非能够无需人类监督即可产生可靠、有影响力成果的完全自主的科学专家。
    - 从过去实验中学习——无论是通过记录失败、使用树搜索还是采用多智能体批判——对于提升自动化研究质量和效率至关重要。
    分歧:
    - 自动化范围：部分工作仅针对基于代码的ML实验，而其他工作则致力于更广泛的模拟科学发现，涉及虚拟世界中的假设检验。
    - 智能体架构：方法各异，从单智能体顺序流水线到基于树搜索的渐进式优化，再到具有角色分工的多智能体团队，尚无明确胜者。
    - 评估方法论：像AblationBench这样的基准测量与人类消融的召回率，DISCOVERYWORLD使用任务完成度指标，而其他工作则依赖自动评审分数或人类偏好判断，导致结论难以比较。
    - 失败处理：一条路线显式构建了共享负知识记忆，而其他路线则通过树搜索回溯或人类反馈隐式处理失败，缺乏标准机制。
    开放问题:
    - 如何缩小代理评估指标（自动评审分数、任务完成度）与生成发现的真实科学影响力之间的差距？
    - 需要何种机制来确保自动化智能体设计和执行的实验具有可复现性，尤其是在与实时代码库和不断演进的基准交互时？
    - 失败感知记忆与多智能体协商能否扩展到需要多模态实验或物理实验室工作的跨学科、长周期研究问题？
    - 在自动化研究系统中，防止奖励攻击、数据污染和不安全结果所需的最低限度人类监督是什么？
