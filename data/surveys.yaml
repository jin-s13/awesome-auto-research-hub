  related_work_outline:
  - 'Mainstream direction: Building autonomous AI agent systems that generate complete
    scientific papers, covering the workflow from hypothesis generation, experiment
    execution, manuscript drafting, to peer review assistance.'
  - 'Shared research pattern: Systems use large language models as the core scheduler
    and decompose the scientific process into steps such as idea generation, code
    implementation, experimentation, result analysis, and paper writing, often with
    an automatic reviewer or verification gate.'
  - 'Key differences: Approaches vary in autonomy level (fully autonomous vs. human-in-the-loop),
    domain scope (general ML vs. domain-specific like CFD), error handling (failure
    attribution, negative knowledge memory, tree search), and validation (vision-language
    gate, verifiable reporting, simulated review, real peer review).'
  - 'Trend evolution: Starting from the first end-to-end paper generation demonstration
    in 2024, the 2025-2026 frontier shifts toward improving reliability, self-correction,
    domain-specific applications, failure mode analysis, and human collaboration,
    with benchmarks emerging for evaluation.'
  - 'Open questions: How to guarantee factual accuracy and scientific integrity in
    generated papers, align automatic evaluation with human judgment, and scale systems
    from workshop-level to full conference publications.'
  related_work_outline_zh:
  - 主流方向：构建自主生成完整科学论文的AI智能体系统，覆盖从假设生成、实验执行、论文撰写到同行评审辅助的全流程。
  - 研究共性：系统以大型语言模型为核心调度器，将科学过程分解为想法生成、代码实现、实验、结果分析和论文写作等步骤，常集成自动评审或验证门控。
  - 关键差异：方法在自主程度（全自动 vs. 人机协作）、领域范围（通用ML vs. 特定领域如CFD）、错误处理策略（失败归因、负知识记忆、树搜索）和验证方式（视觉语言门控、可验证报告、模拟评审、真实同行评审）上存在显著差异。
  - 趋势演进：从2024年首次端到端论文生成展示开始，2025-2026年研究重点转向提高可靠性、自我纠正、特定领域应用、失败模式分析以及人机协作，并出现了用于评估的基准。
  - 开放问题：如何保证生成论文的事实准确性和科学完整性，使自动评估与人类判断对齐，以及将系统从工作坊水平扩展到正式会议出版物。
  literature_review:
    line_of_work_matrix:
    - line: Systems and reproducible infrastructure
      what_it_solves: Turning LLM-driven generation into end-to-end autonomous paper
        writing pipelines that include experiment execution and manuscript production,
        as demonstrated by systems like AI Scientist and AutoResearchClaw.
      what_remains_open: Standardized external validation across different domains
        and review venues is missing; output consistency and reproducibility across
        runs remain unverified.
    - line: Evaluation and evidence design
      what_it_solves: Making generated papers' claims comparable through automated
        review, ablation benchmarks, and result verification tasks, as seen in AblationBench
        and AI reviewer components.
      what_remains_open: Alignment between proxy metrics (e.g., automated reviewer
        scores) and real human scientific utility is not established; task coverage
        for diverse subfields is limited.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing failure modes of AI research systems into taxonomies
        and deriving design principles, exemplified by the documentation of implementation
        drift, hallucination, and weak scientific taste.
      what_remains_open: Direct empirical evidence that these taxonomies predict behavior
        of new systems is lacking; the principles have not been tested across a wide
        range of scientific domains.
    consensus:
    - All systems rely on large language models as the core reasoning engine and decompose
      the scientific workflow into multiple stages.
    - Automatic review or verification is widely adopted as a quality control mechanism,
      either through simulated reviewers or vision-language gates.
    - Factual accuracy of generated content (hallucination) is a common concern, and
      most systems include some form of result grounding or constraint.
    - Experiments demonstrate system outputs, but no system consistently reaches human
      expert-level performance in full paper generation.
    disagreements:
    - 'Autonomy level: some systems pursue full automation without human intervention,
      while others argue that targeted human feedback at high-leverage decision points
      improves outcomes.'
    - 'Domain scope: systems range from general-purpose ML research to specialized
      domains like computational fluid dynamics, affecting the required validation
      mechanisms and domain knowledge integration.'
    - 'Error recovery: strategies differ, including multi-hypothesis failure attribution,
      curated negative knowledge memory, and progressive tree search with experiment
      management.'
    - 'Validation approach: verification methods vary from physics-based visual inspection
      of figures to verifiable reporting that constrains outputs to measured values,
      and from simulated review to actual peer review acceptance.'
    open_questions:
    - Can automatically generated papers meet the scientific rigor and novelty required
      for top-tier conference acceptance beyond workshop level?
    - What is the optimal balance between human intervention and full autonomy in
      scientific writing, and how can intervention points be determined without sacrificing
      efficiency?
    - Do current self-correction mechanisms (failure attribution, negative memory)
      fully address core failure modes like implementation drift and hallucination,
      or are more fundamental architectural changes needed?
    - How can automatic evaluation metrics be validated against real-world scientific
      impact and long-term reproducibility?
