    or human judgment; failure handling is emerging as a central concern.'
  - 'Key differences: Full autonomy vs. human-in-the-loop collaboration; failure attribution
    via reflection, multi-hypothesis causal diagnosis, or shared negative memory;
    evaluation target ranges from experiment planning, artifact quality, to full-paper
    acceptance; domain generality varies from broad ML to specialized CFD.'
  - 'Trend evolution: 2024–2026 shows a shift from monolithic paper-generation agents
