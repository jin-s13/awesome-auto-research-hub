  related_work_outline:
  - 'Mainstream direction: Building multi-agent LLM systems that automate literature
    review, survey generation, and literature-grounded scientific discovery, with
    a strong emphasis on iterative refinement and self-evolution.'
  - 'Shared research pattern: Systems decompose the literature workflow into specialized
    agents (search, curation, analysis, writing, review) and coordinate them through
    structured state machines or tree-based workflows, often incorporating human or
    rubric-based feedback loops.'
  - 'Key differences: Some systems target standalone survey generation (e.g., ARISE),
    while others embed literature intelligence as a component within broader autonomous
    research pipelines (e.g., Kosmos, EvoMaster). Evaluation strategies diverge sharply:
    rubric-based human scoring, benchmark accuracy on multiple-choice questions, or
    end-to-end task success.'
  - 'Trend evolution: The evidence spans 2023–2026, concentrated in 2025–2026, indicating
    a rapidly emerging frontier. Early work focused on benchmarking and survey generation;
    recent systems increasingly pursue domain-agnostic, self-evolving frameworks that
    integrate literature search with hypothesis generation and experimental cycles.'
  - 'Open questions: Factual verification of generated literature claims remains unsolved;
    the alignment between proxy metrics (e.g., rubric scores) and real-world research
    utility is unproven; and systematic handling of cross-disciplinary literature
    conflicts is absent.'
  related_work_outline_zh:
  - 主流方向：构建多智能体大模型系统，自动化文献综述、综述生成和基于文献的科学发现，重点强调迭代优化和自我演化。
  - 研究共性：系统将文献工作流分解为专门智能体（搜索、策展、分析、写作、评审），并通过结构化状态机或树形工作流协调，常结合人类反馈或评分准则反馈循环。
  - 关键差异：部分系统专注于独立综述生成（如ARISE），其他则将文献智能作为更广泛自主研究流水线的一个组件（如Kosmos、EvoMaster）。评估策略差异显著：基于评分准则的人工评分、选择题基准准确率或端到端任务成功率。
  - 趋势演进：证据覆盖2023–2026年，集中于2025–2026年，表明这是一个快速兴起的前沿。早期工作侧重基准测试和综述生成；近期系统越来越多地追求领域无关、自我演化的框架，将文献搜索与假设生成和实验循环集成。
  - 开放问题：生成文献陈述的事实核查仍未解决；代理指标（如评分准则得分）与真实研究效用之间的一致性未经验证；跨学科文献冲突的系统性处理尚属空白。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation systems
      what_it_solves: Producing structured, comprehensive academic surveys from large
        paper collections by orchestrating retrieval, summarization, drafting, and
        reviewing agents with rubric-guided iterative refinement.
      what_remains_open: Critical depth, factual consistency of individual claims,
        and the ability to synthesize novel conceptual frameworks beyond summarizing
        existing papers.
    - line: State modeling for literature search and knowledge integration
      what_it_solves: Maintaining a structured, updatable representation of literature-derived
        knowledge that can be shared across data analysis and hypothesis generation
        agents during long-horizon scientific discovery.
      what_remains_open: Resolving contradictions across sources, scaling the representation
        to multiple domains, and ensuring the state remains faithful to the original
        evidence without hallucination.
    - line: Evaluation and benchmark design for literature intelligence
      what_it_solves: Measuring AI capabilities in literature understanding, survey
        quality, and literature-based scientific discovery through human baselines,
        multiple-choice questions, and rubric-based scoring.
      what_remains_open: Coverage of diverse research fields, alignment between proxy
        metrics and real decision utility, and standardized protocols for comparing
        systems with different output formats.
    - line: Taxonomy of failure modes and design principles
      what_it_solves: Categorizing recurring errors (e.g., implementation drift, overexcitement,
        weak scientific taste) in literature-involved AI systems and deriving guidelines
        for more robust architectures.
      what_remains_open: Empirical validation that applying these design principles
        reduces failure rates, and generalization beyond the specific domains and
        agent architectures studied.
    consensus:
    - Multi-agent decomposition with specialized roles (search, analysis, writing,
      review) is the dominant architecture for automating literature-related tasks.
    - Iterative refinement, whether through rubric-guided feedback, self-critique,
      or human-in-the-loop, is considered essential for improving output quality beyond
      single-pass generation.
    - Current systems perform well on surface-level literature tasks (citation formatting,
      summarization) but struggle with deep comprehension, critical analysis, and
      novel insight generation.
    - Evaluation must combine automated metrics with human judgment, but no single
      protocol has been widely adopted across different system designs.
    disagreements:
    - 'Scope of literature intelligence: some treat it as a standalone product (a
      survey paper), while others treat it as a continuous service within an autonomous
      discovery loop.'
    - 'Representation of literature knowledge: systems differ on whether to use unstructured
      context, structured world models, or tree-based research plans to capture and
      reason over literature.'
    - 'Supervision signal: rubric-based scoring by LLM reviewers versus human expert
      ratings versus downstream task success (e.g., reproducing unpublished results)
      as the primary quality signal.'
    - 'Interaction mode: fully autonomous generation versus human-in-the-loop revision;
      some systems assume a human provides the initial prompt and dataset, others
      aim for open-ended self-direction.'
    open_questions:
    - How can automatically generated literature claims be verified against source
      papers at scale without introducing new hallucination risks?
    - What evaluation design would reliably predict whether a literature intelligence
      system improves real researcher productivity or discovery outcomes?
    - Can literature intelligence systems detect and resolve contradictory findings
      across papers, or do they merely reflect the majority view in the training data?
    - How do failure modes evolve as systems move from single-survey generation to
      continuous, self-evolving literature integration over months or years?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述生成系统
      解决的问题: 通过编排检索、总结、起草和评审智能体，结合评分准则引导的迭代优化，从大量论文中生成结构化、全面的学术综述。
      尚未覆盖: 批判性深度、单个陈述的事实一致性，以及超越总结现有论文的综合新概念框架的能力。
    - 路线: 文献搜索与知识整合的状态建模
      解决的问题: 维护一个结构化、可更新的文献知识表示，使其能在长周期科学发现中供数据分析和假设生成智能体共享。
      尚未覆盖: 解决来源之间的矛盾，将表示扩展到多个领域，并确保状态忠实于原始证据而不产生幻觉。
    - 路线: 文献智能的评估与基准设计
      解决的问题: 通过人类基线、选择题和基于评分准则的打分，衡量AI在文献理解、综述质量和基于文献的科学发现方面的能力。
      尚未覆盖: 覆盖多样化的研究领域，代理指标与真实决策效用之间的一致性，以及比较不同输出格式系统的标准化协议。
    - 路线: 失败模式与设计原则的分类
      解决的问题: 对涉及文献的AI系统中反复出现的错误（如实现漂移、过度兴奋、科学品味薄弱）进行分类，并推导出更稳健架构的指南。
      尚未覆盖: 应用这些设计原则能降低失败率的实证验证，以及超越所研究的特定领域和智能体架构的泛化性。
    共识:
    - 具有专门角色的多智能体分解（搜索、分析、写作、评审）是自动化文献相关任务的主导架构。
    - 迭代优化，无论是通过评分准则反馈、自我批判还是人机协作，都被认为对提升单次生成之外的输出质量至关重要。
    - 当前系统在表层文献任务（引文格式、总结）上表现良好，但在深度理解、批判性分析和新颖见解生成方面仍有困难。
    - 评估必须结合自动化指标与人类判断，但尚无单一协议被不同系统设计广泛采用。
    分歧:
    - 文献智能的范围：有些将其视为独立产品（一篇综述论文），有些则将其视为自主发现循环中的持续服务。
    - 文献知识的表示：系统在是否使用非结构化上下文、结构化世界模型或基于树的研究计划来捕获和推理文献上存在差异。
    - 监督信号：基于评分准则的LLM评审员打分、人类专家评分或下游任务成功（如复现未发表结果）作为主要质量信号。
    - 交互模式：全自动生成与人机协作修订；有些系统假设人类提供初始提示和数据集，另一些则追求开放式的自我导向。
    开放问题:
    - 如何大规模验证自动生成的文献陈述与源论文的一致性，而不引入新的幻觉风险？
    - 什么样的评估设计能可靠预测文献智能系统是否提高了真实研究者的生产力或发现成果？
    - 文献智能系统能否检测并解决论文间的矛盾发现，还是仅仅反映训练数据中的多数观点？
    - 当系统从单次综述生成转向持续、自我演化的文献整合（数月或数年）时，失败模式会如何演变？
