  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究框架
      解决的问题: 自动化从想法生成到论文撰写的完整科学发现循环，降低单篇论文成本并实现快速迭代。
      尚未覆盖: 输出质量不稳定（例如某系统三篇论文仅一篇通过同行评审）；框架常局限于狭窄的机器学习子领域，缺乏深度的领域特定验证。
    - 路线: AI科学家的评估基准与环境
      解决的问题: 提供标准化任务和指标，衡量智能体在假设形成、实验和知识发现方面的能力，揭示当前系统的不足。
      尚未覆盖: 基准任务可能无法捕捉真实科学发现的复杂性；代理指标与真实研究效用之间的相关性不明确；跨科学领域的覆盖有限。
    - 路线: 领域特定的验证与可靠性机制
      解决的问题: 嵌入物理感知或专家知识门控，以检测特定领域（如计算流体动力学）中的静默失败，提高结果可信度。
      尚未覆盖: 验证门控可能遗漏失败（例如16个植入错误中漏检2个）；此类机制难以泛化到其他学科，需要大量重新设计。
    - 路线: 人机协作与交互式研究平台
      解决的问题: 通过在高杠杆决策点允许针对性的人类干预，并提供监控和回滚仪表板，平衡完全自主与人类判断。
      尚未覆盖: 最优协作模式尚未确立；平台处于早期阶段，仅在少量案例上评估；人类投入与系统性能之间的权衡未量化。
    - 路线: 智能体科学发现的概念分类与综述
      解决的问题: 将碎片化的系统按领域、能力和挑战进行分类，识别文献自动化、可靠性和伦理等跨领域问题。
      尚未覆盖: 分类缺乏实证验证，无法证明所提出的类别能预测系统行为；综述本身不直接产生新系统或基准。
    共识:
    - 所有系统均依赖大型语言模型作为核心推理和生成引擎。
    - 科学工作流普遍被分解为构思、实验、分析和论文撰写等阶段。
    - 自动验证或评审被认为是过滤低质量或错误输出的必要环节。
    - 当前系统共同面临可靠性、狭窄领域之外的泛化能力以及缺乏标准化评估等挑战。
    分歧:
    - 验证设计：通用自动评审器 vs. 领域特定的物理或知识门控 vs. 基于基准的评估。
    - 人类角色：完全自主运行 vs. 可选的人机干预 vs. 交互式实时协作平台。
    - 领域范围：通用机器学习研究 vs. 计算流体动力学或单细胞转录组学等专业科学领域。
    - 系统架构：单智能体流水线 vs. 多智能体辩论与协作结构。
    - 对人类编写代码模板的依赖：部分框架消除了模板，而早期版本依赖它们。
    开放问题:
    - 如何使验证机制足够鲁棒，以捕获多样且领域特定的静默失败，同时避免过多误报？
    - 统一的跨学科AI科学家基准应如何设计，其指标如何根据真实世界的研究影响进行验证？
    - 自主智能体与人类科学家之间的最优分工是什么，在研究各阶段如何变化？
    - 当底层模型和代码生成具有非确定性时，如何确保AI生成发现的可重复性？
    - 需要怎样的伦理框架来治理完全自主的科学发现，特别是在责任归属和智力贡献方面？
