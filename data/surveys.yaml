      解决的问题: 将假设生成、实验执行、结果分析和论文写作全流程自动化，减少人工干预。
      尚未覆盖: 实验失败的鲁棒性、防止虚构结果，以及产出满足同行评审标准的可发表论文的能力。
    - 路线: 验证与自我纠正机制
      解决的问题: 通过视觉-语言门控、多假设失败归因或事实报告检测静默失败和幻觉，提高自主输出的可信度。
      尚未覆盖: 验证工具本身可能遗漏失败模式（如植入的16个静默失败中遗漏2个），且没有单一机制能覆盖所有科学错误。
    - 路线: 人机协作与交互设计
      解决的问题: 在高杠杆决策点插入人类判断，平衡自主性与准确性，往往优于完全自主和逐步监督。
      尚未覆盖: 最佳干预点与模式，以及人类反馈质量如何影响整体研究轨迹与效率。
    - 路线: 评估基准与度量
      解决的问题: 提供标准化任务和人类基线（如BAISBench, ARC-Bench），比较AI科学家在实验执行和生物学发现等方面的端到端研究能力。
      尚未覆盖: 领域覆盖有限，代理指标（如基准分数）与生成科学主张的实际效用之间存在差距。
    - 路线: 可扩展与通用框架
      解决的问题: 利用领域无关的架构（进化搜索、结构化研究树）以最少代码构建跨学科的自演化科学智能体。
      尚未覆盖: 领域无关设计是否会牺牲领域特定优化，以及如何将积累的知识从一个科学领域迁移到另一个领域。
    共识:
    - 自主研究系统需要多层验证（如结果检查、物理合理性）以减少幻觉和静默执行错误。
    - 多智能体或结构化工作流（辩论、树形、进化）通过生成和评估多个假设，优于单次流水线。
    - 在关键决策点进行精准的人机协作，比完全自主或持续人工监督更有效。
    - 评估正从浅层任务完成转向包含实验执行、工件质量和科学发现能力的基准。
    分歧:
    - 验证策略：有的使用视觉-语言模型检查视觉输出（如渲染流场），有的依赖因果多假设失败归因，或基于事实的报告将数值约束在测量值内。
    - 探索范式：系统在假设空间搜索方式上不同，包括进化算法、带回溯的结构化研究树，或具有自愈执行器的多智能体辩论。
    - 人机交互模态：从带有实时监控和回滚的仪表板，到七种明确的干预模式，再到抽象的高杠杆协作点，交互设计差异明显。
    - 领域特异性：部分系统紧密耦合单一领域（CFD、单细胞转录组学）并具备领域感知验证，另一些则提出可跨任意学科使用的通用框架。
    开放问题:
    - 如何使验证门控足够全面，能捕获所有关键的静默失败，鉴于证据显示它们仍存在遗漏？
    - 在最大化研究质量的同时不造成瓶颈，人机干预的最佳粒度和时机是什么？
    - 通用自主研究框架在迁移到新科学领域时，能否真正匹配领域专用系统的性能？
    - 除当前基准分数外，哪些评估指标最能预测AI生成假设的真实世界影响？
    - 为防止完全自主的科学发现智能体被滥用，需要何种伦理和安全监督？
