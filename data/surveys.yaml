  - 趋势演进：2024年以通用单智能体框架（The AI Scientist）为起点，2025–2026年出现领域专用系统（CFD、组学）和多人机协作平台（AutoResearchClaw、Claw
    AI Lab），表明领域向鲁棒性、领域基础化和协作控制方向演进。
  - 开放问题：如何在不依赖昂贵领域专家的情况下确保发现的正确性和可靠性；如何检测静默失败（如幻觉引用、物理推理缺陷）；如何平衡自主与人类指导以优化研究产出。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated research pipelines
      what_it_solves: Integrates the full scientific discovery loop—ideation, coding,
        experiment, visualization, and paper writing—into a single LLM-driven agent,
        drastically reducing the cost and manual effort of producing research outputs.
      what_remains_open: Generated papers often fail to meet rigorous peer-review
        standards; the pipeline lacks domain-specific validity checks, leading to
        plausible but incorrect results; reliance on human-written code templates
        or narrow problem scopes limits true open-endedness.
    - line: Multi-agent collaboration and human-in-the-loop research
      what_it_solves: Improves research robustness and output veracity by structuring
        debates among agents, implementing self-healing execution loops, enforcing
        verifiable reporting, and strategically inserting human interventions at decision
        points.
      what_remains_open: Optimal granularity and timing of human involvement remain
        unclear; multi-agent coordination overhead may limit scalability; demonstrated
        only on a small number of case studies, with uncertainty about generalization
        to novel domains.
    - line: Domain-specific AI scientists
      what_it_solves: Embeds domain knowledge (e.g., physics-aware vision gates, cell-type
        annotation) into the discovery loop to catch errors that generic systems miss,
        enabling credible autonomous experimentation in specialized fields like CFD
        or genomics.
      what_remains_open: Verification gates themselves can miss silent failures; the
        approach is tightly coupled to simulation environments or expert-curated datasets,
        making it hard to transfer across domains; building such systems requires
        substantial domain-specific infrastructure.
    - line: Evaluation benchmarks and environments
      what_it_solves: Provides standardized tasks, metrics, and human baselines for
        comparing AI scientist agents, revealing capability gaps in hypothesis formation,
        experimental design, and knowledge discovery.
      what_remains_open: Existing benchmarks simplify real scientific complexity;
        automatic metrics do not fully capture the value of a discovery; there is
        no unified cross-domain benchmark, and the step from benchmark success to
        real-world scientific impact is unproven.
    - line: Surveys and conceptual frameworks
      what_it_solves: Organizes the landscape of agentic AI for scientific discovery
        into taxonomies of capabilities, domains, and challenges, providing a structured
        overview for future system design.
      what_remains_open: Proposed taxonomies lack empirical validation; the identified
        challenges (reliability, ethics, literature automation) are diagnosed but
        not yet solved, and the frameworks do not prescribe concrete engineering pathways.
    consensus:
    - All systems use large language models as the core reasoning engine and follow
      a closed-loop scientific method of hypothesis, experiment, and reporting.
    - Open-sourcing of code, artifacts, and sometimes data is treated as a default
      practice, reflecting a shared commitment to reproducibility and incremental
      progress.
    - An explicit verification or review stage—whether automated reviewer, physics-based
      gate, or human check—is considered essential to prevent meaningless or incorrect
      outputs.
    - Modular architectures that separate roles such as experiment manager, analyst,
      and writer are becoming the norm, improving flexibility and error isolation.
    disagreements:
    - 'Generality vs. domain specificity: some systems aim for broad applicability
      across ML subfields, while others incorporate domain-specific validators to
      achieve credibility in physics or biology, trading flexibility for reliability.'
    - 'Supervision signal: systems differ in whether they rely solely on LLM-based
      automatic review, physical simulation verification, or human expert intervention
      to judge the quality of generated results.'
    - 'Evaluation target: success is measured by different standards—passing an automated
      reviewer threshold, clearing workshop peer review, or achieving high task completion
      scores on benchmarks—making cross-system comparisons difficult.'
    - 'Interaction mode: designs range from single monolithic agents to multi-agent
      debate teams, and from fully autonomous loops to human-in-the-loop collaboration,
      reflecting divergent assumptions about error recovery and decision authority.'
    open_questions:
    - How can we verify the correctness and reliability of autonomous discoveries
      without costly domain expert involvement, especially when the system produces
      novel claims outside existing knowledge?
    - What mechanisms can robustly detect and repair silent failures such as hallucinated
      references, flawed physical reasoning, or fabricated experimental numbers, beyond
      the limited checks reported so far?
    - Can current AI scientist systems truly operate in open-ended, high-stakes research
      problems, or are they inherently bounded by the human-designed templates, simulation
      backends, and benchmark tasks they are evaluated on?
    - What is the optimal division of labor between autonomous agents and human scientists,
      and how does this change as the system matures or as the research domain becomes
      more complex?
    - How should the scientific community assess the value and validity of AI-generated
      research outputs, and what ethical, attribution, and quality-control frameworks
      are needed to prevent flooding the literature with low-quality papers?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动化研究流水线
      解决的问题: 将科学发现全流程——构思、编码、实验、可视化和论文撰写——整合为单一LLM驱动的智能体，大幅降低研究产出的成本与人工投入。
      尚未覆盖: 生成论文大多未通过严格的同行评审；流水线缺乏领域特异性校验，易产生看似合理但错误的结果；依赖人类编写的代码模板或狭窄问题设定，限制了真正的开放式探索。
    - 路线: 多智能体协作与人在回路自主研究
      解决的问题: 通过智能体间结构化辩论、自愈执行循环、可验证报告以及在决策点精准插入人类干预，提升研究鲁棒性与输出真实性。
      尚未覆盖: 人类介入的最佳粒度和时机仍不明确；多智能体协调开销可能限制可扩展性；仅在少量案例研究中验证，对新领域的泛化能力存疑。
    - 路线: 领域专用AI科学家
      解决的问题: 将领域知识（如物理感知视觉门控、细胞类型注释）嵌入发现循环，捕获通用系统遗漏的错误，在CFD或基因组学等专业领域实现可信的自主实验。
      尚未覆盖: 验证门控本身可能漏检静默失败；该方法与仿真环境或专家标注数据集紧密耦合，跨领域迁移困难；构建此类系统需要大量领域专用基础设施。
    - 路线: 评估基准与环境设计
      解决的问题: 为AI科学家智能体提供标准化任务、指标和人类基线，量化进展并揭示假设构建、实验设计和知识发现中的能力短板。
      尚未覆盖: 现有基准简化了真实科学复杂性；自动指标无法完全捕捉发现的价值；缺乏跨领域统一基准，从基准成功到产生真实科学影响的跨越尚未得到验证。
    - 路线: 综述与概念框架
      解决的问题: 将面向科学发现的智能体AI系统按能力、领域和挑战进行分类，为后续系统设计提供结构化认知地图。
      尚未覆盖: 提出的分类法缺乏实证验证；诊断出的挑战（可靠性、伦理、文献自动化）尚未得到解决，框架未提供具体工程路径。
    共识:
    - 所有系统均以大语言模型作为核心推理引擎，并遵循观察-假设-实验-报告的闭环科学方法。
    - 代码、工件乃至数据的开源已成为默认实践，反映出对可复现性和增量进步的普遍承诺。
    - 显式验证或评审环节——无论是自动评审器、物理门控还是人工检查——被视为防止无意义或错误输出的必要组件。
    - 实验管理器、分析员与写作者等角色分离的模块化架构渐成主流，提升了灵活性和错误隔离能力。
    分歧:
    - 通用性与领域专用性：部分系统追求跨ML子领域的广泛适用，另一些则嵌入领域校验器以在物理或生物学中取得可信性，以灵活性换取可靠性。
    - 监督信号：系统在依赖LLM自动评审、物理仿真验证或人类专家干预来评判生成结果质量方面存在差异。
    - 评估目标：成功标准不一——通过自动评审器阈值、通过工作坊同行评审或在基准测试中达到高任务完成分——导致跨系统比较困难。
    - 交互模式：设计从单一单体智能体到多智能体辩论团队，从完全自主循环到人机协作，反映了对错误恢复和决策权限的不同假设。
    开放问题:
    - 如何在不依赖昂贵领域专家的情况下验证自主发现的正确性和可靠性，尤其是当系统提出的主张超出已有知识范围时？
    - 何种机制能够稳健地检测并修复静默失败（如幻觉引用、物理推理缺陷或捏造实验数据），超越目前报道的有限检查？
    - 当前AI科学家系统能否真正处理开放式、高风险的研究问题，还是本质上受限于其依赖的人类模板、仿真后端和评估基准？
    - 自主智能体与人类科学家之间的最佳分工是什么？随着系统成熟或研究领域复杂化，这一分工又将如何变化？
    - 科学界应如何评估AI生成的研究成果的价值与有效性？需要何种伦理、署名与质量管控框架，以避免低质量论文淹没文献？
