  related_work_outline:
  - 'Mainstream direction: Building and evaluating AI agent systems that autonomously
    conduct scientific discovery, with emphasis on reproducibility, reliability, failure
    correction, and physical/empirical grounding.'
  - 'Shared research pattern: All systems use large language models as the core planner/coder,
    decompose discovery into hypothesis generation, experiment execution, and paper
    writing, and incorporate some form of automated evaluation or verification gate.'
  - 'Key differences: Evaluation targets diverge: task completion scores, automated
