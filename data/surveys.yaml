    multi-step scientific workflows (literature review, coding, experiment, writing)
    and evaluating them on curated benchmarks that simulate real academic tasks.'
  - 'Shared research pattern: Decomposing complex research processes into modular
    subtasks (search, read, code, reason) and using LLM-based agents with tool use,
    memory, and iterative refinement loops.'
  - 'Key differences: Evaluation targets vary from isolated coding (SciCode) to survey
    generation (ReportBench) to full paper rebuttal (DRPG); agent autonomy ranges
    from human-in-the-loop assistants to fully autonomous pipelines; some works provide
    public benchmarks while others remain system descriptions without standardized
    metrics.'
  - 'Trend evolution: 2024 focused on single-skill benchmarks and idea-generation
    methods; 2025 introduced evaluation of deep research agents via academic surveys;
    2026 shifted toward end-to-end autonomous research systems and generalist frameworks,
    indicating a move from component evaluation to holistic research automation.'
  - 'Open questions: Whether existing benchmarks capture open-ended discovery and
    long-horizon planning; how proxy metrics align with real scientific impact; and
    the lack of standardized, cross-system evaluation protocols for research agents.'
  related_work_outline_zh:
  - 主流方向：构建能执行长期、多步骤科研工作流（文献综述、编码、实验、写作）的自主研究智能体，并在模拟真实学术任务的精选基准上进行评估。
  - 研究共性：将复杂研究过程分解为模块化子任务（搜索、阅读、编码、推理），使用基于LLM的智能体，结合工具使用、记忆和迭代优化循环。
  - 关键差异：评估目标从孤立的编码（SciCode）到综述生成（ReportBench）再到完整论文反驳（DRPG）各不相同；智能体自主程度从人在环辅助到完全自主流水线不等；部分工作提供公开基准，而其他仅为系统描述，缺乏标准化指标。
  - 趋势演进：2024年聚焦单一技能基准和想法生成方法；2025年引入通过学术综述评估深度研究智能体；2026年转向端到端自主研究系统和通用框架，表明从组件评估向整体研究自动化的转变。
  - 开放问题：现有基准是否捕捉到开放式发现和长期规划；代理指标如何与真实科学影响力对齐；以及缺乏针对研究智能体的标准化跨系统评估协议。
  literature_review:
    line_of_work_matrix:
    - line: Benchmark and evaluation design for research agents
      what_it_solves: Provides reproducible tasks, datasets, and metrics to measure
        agent capabilities in research-related activities such as coding, literature
        survey, and rebuttal.
      what_remains_open: Coverage of open-ended discovery, long-horizon planning,
        interdisciplinary reasoning, and alignment of proxy metrics with real-world
        research quality and human judgment.
    - line: Autonomous research agent architectures and workflows
      what_it_solves: Enables LLM-based agents to execute complex research pipelines—idea
        generation, experiment, writing—through modular decomposition, tool integration,
        and iterative refinement.
      what_remains_open: Generalization across domains, reproducibility of results,
        standardized comparison across systems, and the extent to which autonomy replaces
        rather than augments human researchers.
    consensus:
    - LLM agents can meaningfully assist or automate parts of the research workflow,
      from literature review to code generation and manuscript drafting.
    - Decomposing research into subtasks and applying iterative feedback loops (e.g.,
      tree search, chain-of-thought) improves agent performance.
    - Evaluation is critical but currently fragmented; there is a shared need for
      benchmarks that reflect authentic research challenges.
    disagreements:
    - 'Evaluation scope: some works target narrow, verifiable skills (coding benchmarks),
      while others assess open-ended generation (survey writing, rebuttal).'
    - 'Autonomy level: systems range from human-in-the-loop assistants to fully autonomous
      agents, with differing assumptions about human oversight.'
    - 'Reproducibility and openness: a few papers release code and datasets, while
      many remain descriptive, making cross-system comparison difficult.'
    open_questions:
    - How can benchmarks evolve to evaluate long-term, creative, and collaborative
      aspects of research?
    - What metrics reliably predict the real-world utility of a research agent's output?
    - Can autonomous research agents handle the full cycle of hypothesis formation,
      experimental design, and peer review without human intervention?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 研究智能体的基准与评估设计
      解决的问题: 提供可复现的任务、数据集和指标，衡量智能体在编码、文献综述、反驳等研究相关活动中的能力。
      尚未覆盖: 对开放式发现、长期规划、跨学科推理的覆盖，以及代理指标与真实研究质量和人类判断的对齐。
    - 路线: 自主研究智能体架构与工作流
      解决的问题: 通过模块化分解、工具集成和迭代优化，使基于LLM的智能体能够执行想法生成、实验、写作等复杂研究流程。
      尚未覆盖: 跨领域泛化、结果可复现性、系统间标准化比较，以及自主性在多大程度上替代而非增强人类研究者。
    共识:
    - LLM智能体能够有意义地辅助或自动化部分研究工作流，从文献综述到代码生成和手稿撰写。
    - 将研究分解为子任务并应用迭代反馈循环（如树搜索、思维链）可提高智能体性能。
    - 评估至关重要但目前碎片化；普遍需要反映真实研究挑战的基准。
    分歧:
    - 评估范围：部分工作针对狭窄、可验证的技能（编码基准），而其他工作评估开放式生成（综述写作、反驳）。
    - 自主程度：系统从人在环辅助到完全自主智能体不等，对人类监督的假设不同。
    - 可复现性与开放性：少数论文发布代码和数据集，许多仍为描述性，导致跨系统比较困难。
    开放问题:
    - 基准如何演进以评估研究的长期、创造性和协作方面？
    - 哪些指标能可靠预测研究智能体输出的实际效用？
    - 自主研究智能体能否在没有人类干预的情况下处理假设形成、实验设计和同行评审的完整循环？
