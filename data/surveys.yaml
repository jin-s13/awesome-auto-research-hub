  literature_review:
    line_of_work_matrix:
    - line: Automated survey generation
      what_it_solves: Producing comprehensive academic survey papers via multi-agent
        LLM systems, reducing manual effort in literature search, citation curation,
        and drafting.
      what_remains_open: Real-time dynamic updating, cross-domain synthesis depth,
        and verification of factual accuracy against source materials, especially
        when evidence shows 20%+ error rates in generated statements.
    - line: Autonomous discovery agents
      what_it_solves: End-to-end research cycles from data analysis and literature
        search to hypothesis generation and report writing, aiming to replicate and
        accelerate the scientific process.
      what_remains_open: Guaranteeing accuracy and reliability over long horizons,
        avoiding failure modes like implementation drift and overexcitement, and scaling
        beyond the tested 20 cycles.
    - line: Benchmarking and evaluation for AI scientists
      what_it_solves: Providing standardized tasks and metrics to compare the capabilities
        of AI scientists on tasks such as cell annotation or scientific question answering.
      what_remains_open: Alignment of proxy metrics (e.g., benchmark accuracy) with
        real-world scientific impact and discovery utility; coverage of diverse scientific
        domains beyond the few tested.
    - line: Agent architecture and infrastructure
      what_it_solves: Enabling reusable, scalable, and reproducible frameworks for
        building scientific agents, often with state-machine coordinators, checkpoint
        recovery, and sandboxed execution.
      what_remains_open: Standardized external validation across datasets and hardware,
        interpretability of agent reasoning, and robust integration of domain-specific
        expertise without manual re-engineering.
    - line: Failure analysis and design principles
      what_it_solves: Cataloging common failure modes of LLM-based research agents
        (e.g., bias toward defaults, memory degradation, overexcitement) to derive
        design guidelines.
      what_remains_open: Empirical validation that the proposed principles systematically
        improve outcomes across diverse domains and tasks; translation of qualitative
        guidelines into quantitative engineering constraints.
    consensus:
    - Multi-agent architectures are the dominant paradigm for automating literature
      and science tasks.
    - Iterative refinement loops (reflection, evolution, rubric-guided feedback) are
      universally employed to improve output quality.
    - Structured workflows (tree-based, state-machine, shared world model) are necessary
      to manage long-horizon, branching research trajectories.
    - All systems face accuracy and reliability challenges and rely on external evaluation
      (human judges, benchmarks, or reviewer agents) to validate outputs.
    - Current systems are narrow in scope and require task-specific datasets or prompts;
      true open-ended autonomous science remains unsolved.
    disagreements:
    - 'Task objective: Some systems target survey synthesis, others target data-driven
      scientific discovery or algorithm design, leading to different agent role designs
      and workflows.'
    - 'Evaluation methodology: A rubric-based auto-review score is used in one line,
      while independent human scientist ratings and benchmark accuracy are used in
      others; no consensus on a unified evaluation protocol.'
    - 'Domain scope: Domain-specific systems embed expert knowledge into data registries
      and agent roles, whereas domain-agnostic frameworks claim flexibility with minimal
      code, creating a trade-off between depth and generality.'
    - 'Interaction mode: Fully autonomous systems run for hours without human intervention,
      while others assume human-in-the-loop for prompt specification or final review,
      affecting reproducibility and use cases.'
    - 'Representation: Some use a shared world model to coordinate data and literature
      agents, others use evolutionary tree search with backtracking, and still others
      use a state-machine coordinator; the optimal representation for long-cycle research
      is unsettled.'
    open_questions:
    - How can factual accuracy of autonomously generated literature reviews or scientific
      reports be guaranteed, given evidence of 20% inaccurate statements?
    - What evaluation metrics align with genuine scientific discovery value rather
      than proxy task performance?
    - How do these systems scale beyond the tested cycle limits (e.g., 20 cycles)
      and maintain stability and novelty?
    - Can failure modes identified in case studies be systematically prevented across
      diverse domains without sacrificing flexibility?
    - What is the minimal set of design principles that ensures robust, trustworthy
      autonomous research agents?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述生成
      解决的问题: 通过多智能体大语言模型系统生成综合性学术综述，减少文献检索、引文整理和初稿撰写的人工工作。
      尚未覆盖: 实时动态更新、跨领域综合深度，以及基于源材料的事实准确性验证，尤其当证据显示生成陈述错误率超过20%时。
    - 路线: 自主发现智能体
      解决的问题: 覆盖从数据分析、文献搜索到假设生成和报告撰写的端到端研究循环，旨在复现和加速科学过程。
      尚未覆盖: 长周期内的准确性和可靠性保证，避免实现漂移和过度兴奋等失败模式，并扩展至已测试的20个周期以上。
    - 路线: AI科学家基准测试与评估
      解决的问题: 提供标准化任务和指标，以比较AI科学家在细胞注释或科学问答等任务上的能力。
      尚未覆盖: 代理指标（如基准准确率）与真实世界科学影响和发现效用之间的对齐；覆盖已测试少数领域之外的多样化科学领域。
    - 路线: 智能体架构与基础设施
      解决的问题: 实现可复用、可扩展和可复现的框架，用于构建科学智能体，通常包含状态机协调器、检查点恢复和沙盒执行。
      尚未覆盖: 跨数据集和硬件的标准化外部验证，智能体推理的可解释性，以及无需手动重构即可稳健集成领域专业知识。
    - 路线: 失败分析与设计原则
      解决的问题: 编目基于大语言模型的研究智能体的常见失败模式（如对默认值的偏见、记忆退化、过度兴奋），以推导设计指南。
      尚未覆盖: 实证验证这些原则能在不同领域和任务中系统性地改善结果；将定性指南转化为可量化的工程约束。
    共识:
    - 多智能体架构是自动化文献和科学任务的主流范式。
    - 迭代精炼循环（反思、演化、评分准则反馈）被普遍用于提升输出质量。
    - 结构化工作流（基于树、状态机、共享世界模型）对于管理长周期、分支式研究轨迹是必要的。
    - 所有系统都面临准确性和可靠性挑战，并依赖外部评估（人类评审、基准或评审智能体）来验证输出。
    - 当前系统范围狭窄，需要特定任务的数据集或提示；真正的开放式自主科学仍未解决。
    分歧:
    - 任务目标：有的系统专注于综述合成，有的专注于数据驱动的科学发现或算法设计，导致智能体角色设计和工作流不同。
    - 评估方法：一条路线使用基于评分准则的自动评审分数，另一条路线使用独立人类科学家评分和基准准确率；缺乏统一的评估协议。
    - 领域范围：领域特定系统将专家知识嵌入数据注册表和智能体角色，而领域无关框架声称以最少代码实现灵活性，造成深度与通用性之间的权衡。
    - 交互模式：完全自主系统在无人干预下运行数小时，而其他系统假设人机协作以指定提示或最终审核，影响可复现性和使用场景。
    - 表示方式：有的使用共享世界模型协调数据与文献智能体，有的使用带回溯的进化树搜索，还有的使用状态机协调器；长周期研究的最优表示方式尚未确定。
    开放问题:
    - 鉴于证据显示20%的陈述不准确，如何保证自主生成的文献综述或科学报告的事实准确性？
    - 哪些评估指标能与真实的科学发现价值对齐，而非仅仅代理任务表现？
    - 这些系统如何扩展到已测试的周期限制（如20个周期）之外，并保持稳定性和新颖性？
    - 案例研究中识别的失败模式能否在不牺牲灵活性的前提下，在不同领域被系统性地预防？
    - 确保稳健、可信的自主研究智能体所需的最小设计原则集是什么？
