    retained (fully autonomous vs. human-in-the-loop dashboard), and the evaluation
    target (internal reviewer scores vs. external benchmark tasks).'
  - 'Trend evolution: The field moved from a single monolithic framework in 2024 to
    more granular agentic architectures, failure-aware memory, and dedicated benchmarks
    (DISCOVERYWORLD, AblationBench) in 2025–2026, indicating a shift toward reliability
