    研究路线矩阵:
    - 路线: 系统与可复现基础设施
      解决的问题: 将LLM驱动的生成能力转化为端到端的自主论文写作流水线，涵盖实验执行和论文生成，如AI Scientist和AutoResearchClaw等系统所示。
      尚未覆盖: 跨不同领域和评审场所的标准化外部验证缺失；输出一致性和跨运行的可复现性尚未得到验证。
    - 路线: 评测与证据设计
      解决的问题: 通过自动评审、消融基准和结果验证任务，使生成论文的主张可比，如AblationBench和AI评审组件所示。
      尚未覆盖: 代理指标（如自动评审分数）与真实人类科学效用之间的对齐尚未建立；针对多样性子领域的任务覆盖有限。
    - 路线: 概念分类与理论
      解决的问题: 将AI研究系统的失败模式组织为分类体系，并推导设计原则，例如对实现漂移、幻觉和科学品味薄弱的记录。
      尚未覆盖: 缺乏直接实证证据表明这些分类能预测新系统的行为；这些原则尚未在广泛的科学领域中得到检验。
    共识:
    - 所有系统均依赖大型语言模型作为核心推理引擎，并将科学工作流分解为多个阶段。
    - 自动评审或验证被广泛采用作为质量控制机制，无论是通过模拟评审还是视觉语言门控。
    - 生成内容的事实准确性（幻觉）是普遍关注的问题，大多数系统都包含某种形式的结果约束或基于事实的报告。
    - 实验展示了系统输出，但在完整论文生成上，没有系统能持续达到人类专家水平的表现。
    分歧:
    - 自主程度：一些系统追求完全无需人工干预的自动化，而另一些则主张在关键决策点引入精准的人工反馈以改善结果。
    - 领域范围：系统从通用机器学习研究到特定领域（如计算流体动力学）各不相同，影响了所需的验证机制和领域知识整合。
    - 错误恢复：策略存在差异，包括多假设失败归因、策划的负知识记忆，以及带有实验管理的渐进式树搜索。
    - 验证方式：从基于物理的图形视觉检查，到将输出约束为测量值的可验证报告，再到模拟评审和真实同行评审接受，验证方法多种多样。
    开放问题:
    - 自动生成的论文能否达到顶级会议所要求的科学严谨性和新颖性，超越工作坊水平？
    - 在科学写作中，人类干预与完全自主之间的最佳平衡点是什么，如何在不牺牲效率的情况下确定干预点？
    - 当前的自我纠正机制（失败归因、负记忆）能否完全解决实现漂移和幻觉等核心失败模式，还是需要更根本的架构改变？
    - 如何根据真实世界的科学影响和长期可复现性来验证自动评估指标？
