      解决的问题: 将碎片化主张组织为任务边界、假设和评测标准。Why LLMs Aren't Scientists Yet识别六种重复失败模式并推导设计原则；SAGE的多假设失败归因提供因果诊断分类法。
      尚未覆盖: 这些分类法能否在不同系统和领域中预测模型行为仍缺少直接实证验证；设计原则能否泛化到所研究案例之外。
    共识:
    - 自主研究智能体需要超越简单任务成功的结构化评估，包括验证门控、工件质量检查和失败分析。
    - 当前基于LLM的智能体存在幻觉、实现漂移、记忆退化和领域知识不足等可靠性问题。
    - 基准和标准化任务对于系统比较至关重要，但现有基准仅覆盖科学发现的一小部分。
    分歧:
    - 评测目标不同：部分工作通过自动或人工审稿评估最终论文质量，另一些则通过任务完成度和工件正确性评估发现过程。
    - 人类监督的角色各异：部分系统追求完全自主且最少干预，另一些则强调交互式人机协同控制。
