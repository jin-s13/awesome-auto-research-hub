  related_work_outline:
  - 'Mainstream direction: Building autonomous AI agents that generate hypotheses,
    design and execute experiments, and iteratively refine ideas, often using multi-agent
    or self-evolving architectures.'
  - 'Shared research pattern: Decomposing the research process into stages (ideation,
    experimentation, verification, writing) with LLM-based agents, incorporating feedback
    loops like reflection or failure attribution to improve outputs.'
  - 'Key differences: Level of autonomy (fully autonomous vs. human-in-the-loop),
    hypothesis refinement mechanism (evolutionary search, tree-based backtracking,
    multi-hypothesis failure attribution), and domain-specific verification strategies.'
  - 'Trend evolution: From isolated idea generation to integrated autonomous research
    systems combining hypothesis generation with experimental execution and self-correction;
    recent works emphasize multi-agent collaboration, self-evolution, and domain-agnostic
    frameworks.'
  - 'Open questions: Ensuring scientific validity and reproducibility across domains,
    evaluating novelty and impact beyond proxy metrics, handling long-tail failure
    modes in autonomous experimentation, and integrating human oversight effectively.'
  related_work_outline_zh:
  - 主流方向：构建能够生成假设、设计并执行实验、迭代优化想法的自主AI智能体，常采用多智能体或自我演化架构。
  - 研究共性：将研究过程分解为构思、实验、验证、写作等阶段，使用基于LLM的智能体，并引入反思或失败归因等反馈循环来提升输出质量。
  - 关键差异：自主程度（完全自主 vs. 人机协同）、假设优化机制（进化搜索、树形回溯、多假设失败归因）以及领域特定的验证策略。
  - 趋势演进：从孤立的创意生成发展到集成自主研究系统，将假设生成与实验执行和自我纠正相结合；近期工作强调多智能体协作、自我演化和领域无关框架。
  - 开放问题：如何确保跨领域的科学有效性和可复现性，如何评估生成想法的新颖性和影响力（超越代理指标），如何处理自主实验中长尾失败模式，以及如何有效整合人类监督。
  literature_review:
    line_of_work_matrix:
    - line: Autonomous hypothesis-driven experimentation agents
      what_it_solves: Automating the full cycle from hypothesis generation to experimental
        validation, reducing human effort in routine discovery.
      what_remains_open: Reliability of self-verification, generalization across domains,
        and handling of silent failures (e.g., missed physics verification failures).
    - line: Multi-agent collaborative research platforms
      what_it_solves: Enabling flexible, role-based research workflows where multiple
        agents collaborate on ideation, coding, and review.
      what_remains_open: Scalability to complex, long-horizon research projects and
        ensuring coherent coordination without human intervention.
    - line: Benchmarking and evaluation of AI scientists
      what_it_solves: Providing standardized tasks and metrics to compare hypothesis
        generation and discovery capabilities.
      what_remains_open: Alignment of benchmark metrics with real-world scientific
        impact, and coverage of diverse scientific domains beyond omics.
    - line: Self-correction and failure attribution for research agents
      what_it_solves: Improving robustness by diagnosing and fixing errors in the
        research loop, increasing the yield of valid results.
      what_remains_open: Handling complex, multi-step failures where root causes are
        ambiguous, and avoiding overfitting to known failure patterns.
    - line: Automated literature synthesis and survey generation
      what_it_solves: Organizing and summarizing scientific knowledge to aid hypothesis
        generation.
      what_remains_open: Ensuring factual accuracy, avoiding hallucinated references,
        and generating truly novel insights rather than recombining existing knowledge.
    consensus:
    - LLM-based agents can effectively generate hypotheses and research ideas when
      combined with structured workflows and verification mechanisms.
    - Modular, multi-agent architectures with specialized roles (ideation, experimentation,
      review) are widely adopted.
    - Evaluation should include both task performance and artifact quality, often
      using human or automated judges.
    disagreements:
    - 'Necessity of domain-specific verification gates: some systems use physics-aware
      vision gates, while others rely on generic code execution checks.'
    - 'Hypothesis refinement approach: evolutionary search, tree-based backtracking,
      and multi-hypothesis failure attribution represent distinct strategies.'
    - 'Role of human interaction: platforms range from fully autonomous to human-in-the-loop
      monitoring and control.'
    - 'Evaluation targets: biological discovery tasks, AI research case studies, and
      general benchmarks reflect different priorities.'
    open_questions:
    - How can AI scientists generate hypotheses that are both novel and feasible,
      avoiding trivial or impossible ideas?
    - What verification mechanisms are sufficient to trust autonomous experimental
      results without human replication?
    - How can we measure the long-term scientific impact of AI-generated hypotheses?
    - Can these systems adapt to entirely new domains without extensive retraining
      or prompt engineering?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自主假设驱动的实验智能体
      解决的问题: 自动化从假设生成到实验验证的完整循环，减少常规发现中的人力投入。
      尚未覆盖: 自我验证的可靠性、跨领域泛化能力，以及对静默失败（如遗漏的物理验证失败）的处理。
    - 路线: 多智能体协作研究平台
      解决的问题: 实现灵活、基于角色的研究工作流，让多个智能体协作完成构思、编码和评审。
      尚未覆盖: 扩展到复杂、长周期研究项目的可扩展性，以及无需人工干预的协调一致性。
    - 路线: AI科学家的基准测试与评估
      解决的问题: 提供标准化任务和指标，以比较假设生成和发现能力。
      尚未覆盖: 基准指标与真实世界科学影响力的一致性，以及覆盖组学以外的多样科学领域。
    - 路线: 研究智能体的自我纠正与失败归因
      解决的问题: 通过诊断和修复研究循环中的错误来提高鲁棒性，增加有效结果的产出。
      尚未覆盖: 处理根因模糊的复杂多步失败，以及避免对已知失败模式的过拟合。
    - 路线: 自动化文献综合与综述生成
      解决的问题: 组织和总结科学知识以辅助假设生成。
      尚未覆盖: 确保事实准确性，避免虚构参考文献，并生成真正新颖的见解而非重组现有知识。
    共识:
    - 基于LLM的智能体结合结构化工作流和验证机制，能够有效生成假设和研究想法。
    - 广泛采用模块化、多智能体架构，并赋予专门角色（构思、实验、评审）。
    - 评估应同时包含任务性能和产出物质量，常借助人类或自动化评审。
    分歧:
    - 领域特定验证门控的必要性：部分系统使用物理感知视觉门控，其他则依赖通用代码执行检查。
    - 假设优化方法：进化搜索、树形回溯和多假设失败归因代表了不同的策略。
    - 人类交互的角色：平台从完全自主到人机协同监控不等。
    - 评估目标：生物学发现任务、AI研究案例和通用基准反映了不同的侧重点。
    开放问题:
    - AI科学家如何生成既新颖又可行的假设，避免琐碎或不可能的想法？
    - 何种验证机制足以在无需人类复现的情况下信任自主实验结果？
    - 如何衡量AI生成假设的长期科学影响力？
    - 这些系统能否在不进行大量重新训练或提示工程的情况下适应全新领域？
