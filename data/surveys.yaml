    survey generation with improved readability and citation quality.'
  - 'Shared research pattern: LLM-based agents are organized into workflows—iterative
    retrieval, hierarchical organization, or peer review simulation—to handle scientific
    literature at scale, with a focus on role specialization and process decomposition.'
  - 'Key differences: The target task splits into full review generation, study organization
    support, and peer review automation; evaluation metrics range from surface similarity
    to human reviews to adversarial robustness, with no agreed standard.'
  - 'Trend evolution: From static hierarchical organization (2024) to multi-agent
    generation and iterative workflows (2025), then toward robustness analysis and
    self-evolving retrieval (2026), indicating a shift toward dynamic, resilient,
    and adaptive review agents.'
  - 'Open questions: Factual accuracy and hallucination in generated reviews remain
    unverified; cross-domain generalization is untested; standardized benchmarks and
    reproducibility are largely absent; adversarial vulnerabilities are only beginning
    to be explored.'
