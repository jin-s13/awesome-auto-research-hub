  - 趋势演进：2024年建立了带有模拟评审的基础流水线；2025年引入了树搜索、真实同行评审里程碑和多智能体辩论；2026年正在增加领域特定的验证门控、交互式人机平台以及对人类干预何时最有价值的深入分析。
  - 开放问题：如何界定自主验证门控的可靠性边界，哪种人机协作模式能在不过度增加监督成本的情况下最大化科学产出，以及基于基准的评估还是基于同行评审的评估更能预测真正的科学贡献。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Automating the full scientific discovery cycle—ideation, code
        implementation, experiment execution, visualization, and manuscript generation—without
        requiring human-authored code templates or per-paper intervention.
      what_remains_open: 'Reliability is inconsistent: only one of three AI Scientist-v2
        submissions passed real peer review, and the lack of reported limitation analysis
        in several systems leaves failure boundaries uncharacterized beyond anecdotal
        evidence.'
    - line: Domain-specific verification-augmented discovery
      what_it_solves: Embedding domain-specific validity checks—such as vision-language
        physics verification for CFD simulations—into the autonomous pipeline to detect
        silent failures that generic code-level checks would miss.
      what_remains_open: The verification gate itself is imperfect (missed 2 of 16
        planted failures in AI CFD Scientist), and the approach has only been demonstrated
        in a single domain; generalizability to other scientific fields remains unverified.
    - line: Standardized evaluation environments for AI scientists
      what_it_solves: Providing reproducible benchmarks with diverse tasks, difficulty
        levels, and automatic metrics so that different AI scientist systems can be
        compared on their ability to complete discovery cycles rather than just final
        output quality.
      what_remains_open: Current benchmarks cover limited scientific domains (8 topics
        in DISCOVERYWORLD, single-cell transcriptomics in BAISBench), and the relationship
        between benchmark scores and real scientific impact is not empirically established.
    - line: Multi-agent collaborative architectures with human oversight
      what_it_solves: Replacing monolithic agents with structured debate, self-healing
        execution loops, and targeted human intervention at high-leverage decision
        points to improve hypothesis quality and reduce fabricated results.
      what_remains_open: Evaluation is limited to small-scale case studies (5 topics
        in Claw AI Lab, 25 topics in ARC-Bench), and the optimal granularity of human
        intervention—when to pivot versus refine, which decision points benefit most
        from oversight—is not yet systematically characterized.
    - line: Taxonomy and landscape organization
      what_it_solves: Organizing the fragmented space of agentic AI systems for science
        by domain, capability stage, and evaluation methodology, identifying gaps
        in literature review automation, system reliability, and ethical safeguards.
      what_remains_open: The proposed categories are descriptive rather than predictive;
        no empirical study validates whether these taxonomies predict downstream performance,
        failure modes, or adoption barriers across different scientific workflows.
    consensus:
    - LLM-based agents can traverse the full scientific discovery pipeline but their
      outputs are not yet consistently reliable enough for fully autonomous deployment
      without verification mechanisms.
    - Verification—whether through domain-specific physics checks, automated review,
      or benchmark tasks—is a critical missing component in early systems, and its
      absence leads to undefended claims or silent failures.
    - Human collaboration, when targeted at high-leverage decision points rather than
      exhaustive step-by-step oversight, can improve outcomes over both full autonomy
      and complete human control.
    - Standardized benchmarks with automated metrics are necessary for comparing AI
      scientist systems, and existing strong baselines from other domains perform
      poorly on discovery-specific tasks, confirming that these benchmarks capture
      distinct challenges.
    disagreements:
    - 'Full autonomy versus human-in-the-loop: some systems pursue complete independence
      from human input, while others design explicit intervention modes and argue
      that targeted human collaboration outperforms full autonomy.'
    - 'Evaluation philosophy: internal simulated review scores, real workshop peer
      review acceptance, and benchmark task completion metrics represent three different
      evaluation targets that are not yet calibrated against each other, making cross-system
      comparison ambiguous.'
    - 'Architecture: single-agent pipelines with staged modules versus multi-agent
      debate systems with experiment manager agents and self-healing loops—these represent
      fundamentally different approaches to error recovery and hypothesis refinement.'
    - 'General-purpose versus domain-specific design: whether a single framework can
      serve all scientific domains or whether domain-specific embedded verification
      (like physics-aware gates) is necessary for producing defensible results.'
    open_questions:
    - What is the failure boundary of automated verification gates, and can they be
      made robust enough to replace human oversight in safety-critical scientific
      domains?
    - How should the trade-off between autonomy and human intervention be measured—by
      scientific output quality, cost per discovery, or reliability—and does the optimal
      point vary by domain?
    - Do benchmark scores on DISCOVERYWORLD or BAISBench correlate with real-world
      scientific contribution, or are they measuring a proxy capability that does
      not transfer to genuine discovery?
    - Can the multi-agent debate and self-healing mechanisms demonstrated in AutoResearchClaw
      and Claw AI Lab generalize beyond the small-scale AI case studies they were
      evaluated on?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流水线
      解决的问题: 自动化完整的科学发现循环——构思、代码实现、实验执行、可视化和论文生成——无需人类编写的代码模板或逐篇干预。
      尚未覆盖: 可靠性不一致：AI Scientist-v2提交的三篇论文中仅一篇通过真实同行评审，且部分系统缺乏局限性分析报告，使得失败边界缺乏系统性描述。
    - 路线: 嵌入领域验证的自主发现
      解决的问题: 将领域特定的有效性检查（如CFD仿真中的视觉-语言物理验证）嵌入自主流水线，以检测通用代码级检查会遗漏的静默失败。
      尚未覆盖: 验证门控本身不完美（AI CFD Scientist在消融中遗漏了16个植入失败中的2个），且该方法仅在一个领域得到验证，向其他科学领域的泛化能力未经证实。
    - 路线: AI科学家标准化评估环境
      解决的问题: 提供具有多样化任务、难度等级和自动化指标的可复现基准，以便能够比较不同AI科学家系统完成发现循环的能力，而非仅比较最终输出质量。
      尚未覆盖: 当前基准覆盖的科学领域有限（DISCOVERYWORLD有8个主题，BAISBench仅针对单细胞转录组学），且基准分数与真实科学影响力之间的关系缺乏实证支持。
    - 路线: 多智能体协作架构与人类监督
      解决的问题: 用结构化辩论、自愈执行循环和高杠杆决策点上的精准人类干预替代单体智能体，以提高假设质量并减少伪造结果。
      尚未覆盖: 评估仅限于小规模案例研究（Claw AI Lab有5个案例，ARC-Bench有25个主题），且人类干预的最优粒度——何时转向而非细化、哪些决策点最受益于监督——尚未被系统性地刻画。
    - 路线: 分类法与领域概览
      解决的问题: 按领域、能力阶段和评估方法组织碎片化的科学智能体AI系统空间，识别文献综述自动化、系统可靠性和伦理保障方面的缺口。
      尚未覆盖: 提出的分类是描述性的而非预测性的；没有实证研究验证这些分类法是否能预测不同科学工作流中的下游性能、失败模式或采用障碍。
    共识:
    - 基于LLM的智能体能够遍历完整的科学发现流水线，但其输出在缺乏验证机制的情况下尚未达到足够一致的可靠性以支持完全自主部署。
    - 验证——无论是通过领域特定的物理检查、自动评审还是基准任务——是早期系统中缺失的关键组件，其缺失会导致无法辩护的主张或静默失败。
    - 人类协作在面向高杠杆决策点而非详尽的逐步监督时，可以同时优于完全自主和完全人工控制。
    - 具有自动化指标的标准化基准对于比较AI科学家系统是必要的，并且来自其他领域的强基线模型在发现特定任务上表现不佳，证实这些基准确实捕捉到了独特的挑战。
    分歧:
    - 完全自主与人在回路：部分系统追求完全独立于人类输入，而其他系统设计了显式的干预模式，并主张精准的人类协作优于完全自主。
    - 评估理念：内部模拟评审分数、真实工作坊同行评审接受率以及基准任务完成指标代表三种不同的评估目标，它们之间尚未相互校准，使得跨系统比较存在歧义。
    - 架构选择：具有分阶段模块的单智能体流水线与具备实验管理器智能体和自愈循环的多智能体辩论系统，代表了错误恢复和假设优化的根本不同方法。
    - 通用与领域特定的设计选择：一个框架能否服务所有科学领域，还是说领域特定的嵌入验证（如物理感知门控）对于产生可辩护的结果是必要的。
    开放问题:
    - 自动化验证门控的失效边界是什么，它们能否被构建得足够鲁棒以在安全关键的科学领域中替代人类监督？
    - 自主性与人类干预之间的权衡应如何衡量——通过科学产出质量、每次发现成本还是可靠性——以及最优平衡点是否因领域而异？
    - DISCOVERYWORLD或BAISBench上的基准分数是否与真实的科学贡献相关，还是它们衡量的是一种无法迁移到真正发现的代理能力？
    - AutoResearchClaw和Claw AI Lab中展示的多智能体辩论和自愈机制能否泛化到它们被评估的小规模AI案例研究之外？
