  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research labs
      what_it_solves: Automating the complete research pipeline, from ideation and
        literature analysis to experimental design, execution, and manuscript drafting,
        reducing human involvement.
      what_remains_open: Lack of implemented prototypes with empirical validation;
        dependence on community consensus and resource investment; generalization
        beyond recommender systems or specific molecular dynamics tasks.
    - line: Digital-twin-driven autonomous decision-making
      what_it_solves: Predicting experimental outcomes, uncertainties, and risks to
        guide autonomous operations in microscopy and self-driving labs, enabling
        open decision-making and collaborative optimization.
      what_remains_open: Validation limited to specific microscopy modalities or simple
        color-mixing tasks; noise dynamics and missing physical mechanisms still cause
        prediction residuals; scalability to complex scientific problems not demonstrated.
    - line: LLM-based reasoning and multi-agent workflows
      what_it_solves: Using LLM agents to propose hypotheses, edit code, assess novelty,
        and reason about experimental data, operationalizing serendipity and improving
        sampling efficiency.
      what_remains_open: Trustworthiness of LLM reasoning and physical admissibility
        under distribution shift; overhead of multi-agent coordination; lack of standardized
        benchmarks for scientific reasoning.
    - line: Data quality and experimental infrastructure
      what_it_solves: Ensuring data reliability and reproducibility in self-driving
        labs through noise detection and correction (kNN) and FAIR data pipelines
        with automatic indexing.
      what_remains_open: Methods are sensitive to feature distribution and noise type;
        not validated across diverse instrument modalities; reliance on specific infrastructure
        (nanoHUB) limits adoption.
    - line: Conceptual frameworks and surveys
      what_it_solves: Organizing existing approaches, identifying challenges, and
        proposing roadmaps for autonomous experimentation, AutoML, and AI-driven materials
        discovery.
      what_remains_open: No empirical validation of proposed frameworks; roadmaps
        are aspirational and require broad community buy-in; integration with quantum
        computing and other emerging technologies remains speculative.
    consensus:
    - Integrating physical constraints or domain knowledge is essential for reliable
      autonomous experimentation.
    - LLMs and foundation models are becoming central components in automating scientific
      reasoning and experiment planning.
    - Data quality, FAIR principles, and reproducibility are critical bottlenecks
      for deploying self-driving labs in practice.
    - Standardized benchmarks and evaluation protocols are needed to compare different
      autonomous experimentation approaches.
    disagreements:
    - 'Scope of automation: some works target full end-to-end autonomy, while others
      keep a human-in-the-loop for critical decisions or serendipity.'
    - 'Decision mechanism: explicit world models (digital twins) vs. implicit LLM
      reasoning without explicit state representation.'
    - 'Application domain: materials science imposes physical constraints and multi-modal
      data, whereas recommender systems face fairness and governance challenges.'
    - 'Role of human guidance: SciLink actively integrates real-time expert feedback,
      whereas MLIPilot and AutoRecLab aim to minimize human intervention.'
    open_questions:
    - How can a unified evaluation framework balance scientific validity, computational
      cost, and reproducibility across diverse autonomous experimentation systems?
    - Are LLM reasoning trajectories reliable when encountering novel physical phenomena
      outside the training distribution?
    - What mechanisms ensure that autonomous labs produce repeatable and verifiable
      scientific results?
    - How should data ownership, privacy, and governance be managed in distributed
      collaborative self-driving laboratories?
    - Can noise detection and imputation methods generalize to highly heterogeneous
      and out-of-distribution experimental data?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究实验室
      解决的问题: 自动化从构思、文献分析到实验设计、执行和手稿撰写的完整研究管道，减少人类参与。
      尚未覆盖: 缺少实证验证及实现原型；依赖社区共识和资源投入；尚未证明在推荐系统或特定分子动力学任务之外的泛化能力。
    - 路线: 数字孪生驱动的自主决策
      解决的问题: 预测实验结果、不确定性和风险，指导显微镜和自驱动实验室的自主操作，实现开放决策与协同优化。
      尚未覆盖: 验证局限于特定显微镜模态或简单颜色混合任务；噪声动力学和缺失物理机制仍导致预测残差；尚未展示对复杂科学问题的可扩展性。
    - 路线: 基于LLM的推理与多智能体工作流
      解决的问题: 利用LLM智能体提出假设、编辑代码、评估新颖性并推理实验数据，实现偶然发现的操作化并提高采样效率。
      尚未覆盖: LLM推理在分布偏移下的可信度和物理可接受性；多智能体协调的开销；缺乏科学推理的标准化基准。
    - 路线: 数据质量与实验基础设施
      解决的问题: 通过噪声检测与纠正（kNN）和FAIR数据管道及自动索引，确保自驱动实验室的数据可靠性和可复现性。
      尚未覆盖: 方法对特征分布和噪声类型敏感；未在不同仪器模态上验证；依赖特定基础设施（如 nanoHUB）限制了采用。
    - 路线: 概念框架与综述
      解决的问题: 梳理现有方法，识别挑战，并为自主实验、AutoML 和 AI 驱动材料发现提出路线图。
      尚未覆盖: 提出的框架缺乏实证验证；路线图具有前瞻性，需广泛社区共识；与量子计算等新兴技术的集成仍属推测。
    共识:
    - 集成物理约束或领域知识对于可靠的自主实验至关重要。
    - LLM 和基础模型正在成为自动化科学推理和实验规划的核心组件。
    - 数据质量、FAIR 原则和可复现性是部署自驱动实验室的关键瓶颈。
    - 需要标准化的基准和评估协议来比较不同的自主实验方法。
    分歧:
    - 自动化范围：部分工作瞄准完全端到端自主，而其他工作保留人在环以进行关键决策或捕捉偶然发现。
    - 决策机制：显式模型（数字孪生）与不依赖显式状态表示的隐式 LLM 推理之间存在差异。
    - 应用领域：材料科学强调物理约束和多模态数据，推荐系统则面临公平性和治理挑战。
    - 人类指导的角色：SciLink 主动集成实时专家反馈，而 MLIPilot 和 AutoRecLab 旨在最小化人类干预。
    开放问题:
    - 如何设计统一的评估框架，平衡科学有效性、计算成本和可复现性，适用于多样化的自主实验系统？
    - LLM 推理轨迹在遇到训练分布之外的新颖物理现象时是否可靠？
    - 何种机制能确保自主实验室产生可重复、可验证的科学结果？
    - 在分布式协同自驱动实验室中，应如何管理数据所有权、隐私和治理？
    - 噪声检测与插补方法能否泛化到高度异构和分布外的实验数据？
