  - 'Shared research pattern: Using realistic scientific tasks as benchmarks and designing
    multi-step evaluation loops, such as held-out validation or recursive self-improvement,
    to measure sustained research capability.'
  - 'Key differences: Evaluation domains range from general academic surveys to specific
    materials science; supervision signals include held-out performance, reinforcement
    learning rewards, and human evaluation; agent interaction modes span single-shot
    search and recursive loops.'
  - 'Trend evolution: From static coding benchmarks in 2024 (SciCode) to academic
    survey tasks in 2025 (ReportBench), and then to closed-loop self-improving agents
    (AREX) and domain-specific auditable workflows (Auto Research for Materials) in
    2026, showing a shift from isolated skill tests to full research-cycle evaluation.'
  - 'Open questions: How to design cross-domain generalizable benchmarks, how to align
    agent metrics with real scientific discovery utility, and how to balance agent
    autonomy with auditability and computational cost.'
  related_work_outline_zh:
  - 主流方向：构建和评估能够执行长期研究任务的AI代理，侧重闭环验证、可审计性和跨领域迁移。
  - 研究共性：采用真实科学任务作为基准，设计多步骤评估循环（如留出验证或递归自改进）来衡量代理的持续研究能力。
  - 关键差异：评估领域从通用学术调查到特定材料科学不等；监督信号包括留出性能、强化学习奖励和人工评测；代理交互模式有单次搜索和递归循环。
  - 趋势演进：从2024年的静态编码基准（SciCode）到2025年的学术调查任务（ReportBench），再到2026年的闭环自改进代理（AREX）和领域内可审计工作流（如Auto
    Research for Materials），趋势是从孤立能力测试转向全研究循环评估。
  - 开放问题：如何设计跨领域泛化的评估，如何确保代理指标与真实科学发现效用一致，以及如何平衡代理自主性与可审计性和计算成本。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Making research agent capabilities comparable and verifiable
        through realistic scientific tasks, multi-step evaluation loops, and auditable
        metrics. For example, Auto Research for Materials uses held-out transfer evaluation
        to test whether AI-scientist decisions survive unseen data, and AREX employs
        constraint-wise auditing and recursive self-improvement loops for deep research
        evaluation.
      what_remains_open: Coverage of cross-domain generalization, alignment between
        proxy metrics (e.g., MAE reduction) and real scientific discovery utility,
        and the balance between agent autonomy and human oversight in evaluation.
    - line: Systems and reproducible infrastructure
      what_it_solves: Turning research agent ideas into runnable, reproducible code
        and artifacts, such as frozen code in Auto Research for Materials evaluated
        on untouched holdout data, and the autonomous context-update tool and training
        pipeline in AREX.
      what_remains_open: Standardized external validation across hardware, datasets,
        and user settings; full reproducibility of experimental setups (e.g., limited
        benefit of external data screening in Auto Research, and unstated limitations
        in AREX).
    consensus:
    - Research agent evaluation requires closed-loop feedback rather than one-shot
      task completion.
    - Benchmarks should be curated by domain experts to ensure task realism and challenge.
    - Self-improvement capability is a key dimension for measuring advanced research
      agents.
    - Agent decision processes should be auditable to support trustworthiness in scientific
      discovery.
    disagreements:
    - 'Evaluation domain: general academic tasks (e.g., surveys, coding) versus specific
      scientific domains (e.g., materials science) present a trade-off in breadth
      versus depth.'
    - 'Supervision signal: static performance-based evaluation (e.g., held-out MAE)
      versus process-reward-based reinforcement learning (e.g., AREX''s RL) may steer
      agent behavior differently.'
    - 'Interaction mode: single-shot search (e.g., Auto Research''s search) versus
      recursive multi-round self-improvement loops (e.g., AREX) differ in complexity
      and resource demands.'
    - 'Benchmark granularity: decomposed subtask problems (e.g., SciCode''s coding
      challenges) versus full research pipelines (e.g., Auto Research''s end-to-end
      materials discovery) raise disagreement on what best measures real research
      capability.'
    open_questions:
    - How can we construct cross-domain generalizable research agent benchmarks while
      preserving task depth?
    - To what extent do agent evaluation metrics (e.g., accuracy gains) predict real-world
      scientific breakthroughs?
    - How can reward hacking and mode collapse be detected in recursive self-improvement
      evaluation?
    - How can auditability and reproducibility be guaranteed without sacrificing agent
      autonomy?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 评估与证据设计
      解决的问题: 通过真实科学任务、多步骤评估循环和可审计指标，使研究代理的能力可比较和可验证。例如，Auto Research for Materials利用留出迁移评估测试AI科学家决策在未见数据上的存续性，AREX使用约束式审计和递归自改进循环进行深度研究评估。
      尚未覆盖: 跨领域泛化评估的覆盖度，代理指标（如MAE降低）与真实科学发现效用的对应关系，以及评估中代理自主性与人类监督的平衡。
    - 路线: 系统与可复现基础设施
      解决的问题: 将研究代理想法转化为可运行、可复现的代码和工件，如Auto Research for Materials冻结代码并在留出数据上评估，AREX提供自主上下文更新工具和训练流程。
      尚未覆盖: 跨硬件、数据集和用户设置的标准化外部验证，以及实验设置的完全可复现性（如Auto Research中外部数据筛选维度收益有限，AREX的局限性未详述）。
    共识:
    - 研究代理评估需要闭环反馈，而非单次任务完成。
    - 基准测试应由领域专家设计，以确保任务真实性和挑战性。
    - 自我改进能力是衡量高级研究代理的关键维度。
    - 代理的决策过程应可审计，以支持科学发现的可信度。
    分歧:
    - 评估领域：通用学术任务（如调查、编码）与特定科学领域（如材料科学）之间存在广度与深度的权衡。
    - 监督信号：基于最终性能的静态评估（如留出MAE）与基于过程奖励的强化学习评估（如AREX的RL）可能引导出不同的代理行为。
    - 交互模式：单次搜索（如Auto Research的搜索）与递归多轮自我改进循环（如AREX）在评估复杂性和资源需求上不同。
    - 基准粒度：分解子任务问题（如SciCode的编码挑战）与完整研究管道（如Auto Research端到端材料发现）在衡量真实研究能力上存在分歧。
    开放问题:
    - 如何构建跨领域通用的研究代理基准，同时保持任务深度？
    - 代理评估指标（如精度提升）在多大程度上能预测真实世界中的科学突破？
    - 递归自我改进评估中的奖励盗用和模式坍缩如何检测？
    - 如何在不牺牲代理自主性的前提下保证可审计性和可复现性？
