  related_work_outline:
  - 'Mainstream direction: building AI research agents that automate parts of the
    scientific workflow—from idea generation and coding to survey writing—evaluated
    via specialized benchmarks that stress code correctness, literature synthesis,
    or held-out experimental performance.'
  - 'Shared research pattern: decomposition of the research process into search, execution,
    and verification steps with LLM agents iterating over a feedback signal, often
    using internal folds or reference-based metrics to guide improvement.'
  - 'Key differences: domain-specific vs. generalist agents; evaluation targets vary
    from single-step coding accuracy to multi-step survey quality; supervision ranges
    from fully automated metrics to human-in-the-loop review; and some systems emphasize
    transferability to unseen held-out data while others prioritize scaling to long-horizon
    tasks.'
  - 'Trend evolution: from 2024 to 2026, benchmarks moved from curated coding problems
    (SciCode) toward more complex, open-ended tasks like academic surveys (ReportBench);
    research agents progressed from isolated idea development (Chain of Ideas) to
    autonomous long-horizon engineering and hypothesis-tree refinement, indicating
    a push toward general-purpose, end-to-end scientific discovery.'
  - 'Open questions: whether current benchmarks capture genuine research creativity
    or only narrow skills; how to prevent agents from overfitting to proxy metrics;
    how to guarantee robustness and reproducibility in long autonomous runs; and what
    safety or ethical constraints are needed for fully autonomous research.'
  related_work_outline_zh:
  - 主流方向：构建能自动执行科学工作流（从想法生成、编码到综述撰写）的AI研究智能体，并通过专门基准测试（侧重代码正确性、文献综合或留出实验性能）进行评估。
  - 研究共性：将研究过程分解为搜索、执行和验证步骤，由LLM智能体根据反馈信号（如内部折叠多折平均或基于参考的指标）迭代优化。
  - 关键差异：领域专用与通用智能体；评估目标从单步编码准确度到多步综述质量不等；监督方式从全自动指标到人机协作回环；部分系统强调对未见留出数据的可迁移性，而另一些则优先扩展至长周期任务。
  - 趋势演进：2024至2026年间，基准测试从策划的编码问题（如SciCode）转向更复杂的开放式任务，如学术综述（ReportBench）；研究智能体从孤立的想法开发（Chain
    of Ideas）发展为自主长周期工程和假设树精炼，表明向通用、端到端科学发现推进的趋势。
  - 开放问题：当前基准测试是否捕捉到真正的研究创造力，还是仅测量狭窄技能；如何防止智能体过度拟合代理指标；如何保证长周期自主运行中的鲁棒性和可复现性；以及完全自主研究需要何种安全或伦理约束。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design for research agents
      what_it_solves: provides standardized tasks, metrics, and protocols to compare
        research agent capabilities—such as coding benchmarks (e.g., SciCode) or survey-quality
        rubrics (e.g., ReportBench)—and isolates the impact of agent decisions via
        held-out transfer designs (e.g., Auto Research for Materials).
      what_remains_open: alignment between proxy metrics and real-world research impact;
        risk of agents overfitting to specific benchmark quirks; and sparse coverage
        of scientific domains beyond materials, mathematics, and computer science.
    - line: Autonomous research agent systems
      what_it_solves: automates end-to-end research workflows—hypothesis generation,
        experiment design, code execution, and manuscript drafting—by coupling LLM
        planners with tools, as seen in long-horizon engineering (Toward Autonomous
        Long-Horizon Engineering for ML Research), mathematics exploration (Towards
        Autonomous Mathematics Research), and hypothesis-tree refinement (Toward Generalist
        Autonomous Research via Hypothesis-Tree Refinement).
      what_remains_open: guaranteeing the validity and reproducibility of agent-generated
        results; enabling generalization across scientific disciplines with minimal
        human redesign; and preventing cascading errors in long, unsupervised runs.
    - line: Conceptual frameworks and search strategies for research ideation
      what_it_solves: organizes the space of research ideas into structured representations—such
        as hypothesis trees or rebuttal flows—to guide agent exploration and decision-making,
        aiming to improve efficiency and novelty of generated ideas (e.g., Chain of
        Ideas, DRPG, Hypothesis-Tree Refinement).
      what_remains_open: empirical proof that these frameworks outperform random or
        naive search in diverse fields; and whether the induced structure inadvertently
        limits creative leaps outside the predefined categories.
    consensus:
    - LLM agents can serve as effective engines for research automation when equipped
      with appropriate feedback and tool interfaces.
    - Holdout or cross-validation protocols are critical to distinguish genuine agent-driven
      improvements from overfitting to a development environment.
    - Decomposing the research process into modular sub-tasks (search, code, evaluate)
      improves controllability and interpretability of autonomous agents.
    - Evaluation must move beyond simple accuracy and include measures of reproducibility,
      transferability, and long-horizon resilience.
    disagreements:
    - 'Granularity of evaluation: some works target atomic coding correctness (SciCode),
      while others assess the quality of an entire written survey (ReportBench) or
      the downstream performance of a discovered model (Auto Research for Materials).'
    - 'Level of autonomy: systems span from human-in-the-loop rebuttal assistants
      (DRPG) to fully autonomous long-horizon agents, leading to different assumptions
      about safety, verification, and acceptable failure modes.'
    - 'Domain generality: several systems are designed for a single scientific domain
      (materials, mathematics), while others explicitly claim a generalist scope (Hypothesis-Tree
      Refinement), yet evidence of cross-domain transfer remains thin.'
    open_questions:
    - Can any existing benchmark predict whether an agent will produce a genuinely
      impactful research outcome, or are they all measuring necessary but insufficient
      sub-skills?
    - How can we design agent architectures and evaluation protocols that prevent
      reward hacking on automatically computed metrics, especially when human judgment
      is too slow or expensive for frequent feedback?
    - What are the minimal verification requirements for a long-running autonomous
      agent to ensure that its discoveries are both correct and reproducible by an
      independent team?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 研究智能体的评测与证据设计
      解决的问题: 提供标准化任务、指标和协议，以比较研究智能体能力——如编码基准（如SciCode）或综述质量量规（如ReportBench），并通过留出迁移设计（如
        Auto Research for Materials）隔离智能体决策的影响。
      尚未覆盖: 代理指标与现实世界研究影响力之间的对齐；智能体过度拟合特定基准特征的风险；以及除材料、数学和计算机科学外科学领域覆盖的稀疏性。
    - 路线: 自主研究智能体系统
      解决的问题: 通过将LLM规划器与工具耦合，自动化端到端研究流程——假设生成、实验设计、代码执行和手稿撰写，如长周期工程（Toward Autonomous
        Long-Horizon Engineering for ML Research）、数学探索（Towards Autonomous Mathematics
        Research）和假设树精炼（Toward Generalist Autonomous Research via Hypothesis-Tree
        Refinement）。
      尚未覆盖: 保证智能体生成结果的有效性和可复现性；在最少人工重新设计的情况下实现跨学科泛化；以及防止长时间无监督运行中的级联错误。
    - 路线: 研究构思的概念框架与搜索策略
      解决的问题: 将研究想法空间组织为结构化表示——如假设树或反驳流程——以指导智能体探索和决策，旨在提高生成想法的效率和新颖性（如 Chain of Ideas、DRPG、Hypothesis-Tree
        Refinement）。
      尚未覆盖: 这些框架在多样化领域中是否真正优于随机或朴素搜索尚缺实证；以及诱导的结构是否不经意间限制了在预定义类别之外的创造性飞跃。
    共识:
    - 当配备适当的反馈和工具接口时，LLM智能体可以作为研究自动化的有效引擎。
    - 留出或交叉验证协议对于区分真正的智能体驱动改进与对开发环境的过拟合至关重要。
    - 将研究过程分解为模块化子任务（搜索、编码、评估）提高了自主智能体的可控性和可解释性。
    - 评估必须超越简单的准确性，纳入可复现性、可迁移性和长周期韧性等度量。
    分歧:
    - 评估粒度：部分工作针对原子级代码正确性（SciCode），另一些则评估整篇书面综述的质量（ReportBench）或发现模型的下游性能（Auto Research
      for Materials）。
    - 自主程度：系统从人机协作的反驳助手（DRPG）到完全自主的长周期智能体不等，导致对安全、验证和可接受失败模式的不同假设。
    - 领域通用性：多个系统专为单一科学领域设计（材料、数学），而其他系统明确声称通用范围（Hypothesis-Tree Refinement），但跨领域迁移的证据仍然薄弱。
    开放问题:
    - 现有基准测试能否预测智能体是否会产生真正有影响力的研究成果，还是它们都只测量了必要但不充分的子技能？
    - 如何设计智能体架构和评估协议，以防止在自动计算指标上的奖励作弊，尤其当人类判断因太慢或太昂贵而无法频繁反馈时？
    - 对于长时间运行的自主智能体，最低验证要求是什么，以确保其发现既正确又能被独立团队复现？
