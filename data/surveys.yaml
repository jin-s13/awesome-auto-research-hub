    - 路线: 端到端自主研究写作系统
      解决的问题: 自动化从想法生成、代码实现、实验执行到论文撰写的完整周期，大幅降低单篇论文的成本和时间（如AI Scientist、AI Scientist-v2、AI
        CFD Scientist）。
      尚未覆盖: 生成主张的可靠性；逃脱自动检查的静默实验失败；超越模式匹配的深层领域推理；多次运行间的不一致表现。
    - 路线: 失败感知记忆与自我纠正
      解决的问题: 通过存储负知识或进行多假设失败归因，检测、归因并恢复自主研究流水线中的错误，从而提高成功率和工件质量（如SAGE、Negative Knowledge）。
      尚未覆盖: 失败处理跨科学领域的泛化能力；在无人类监督下防止级联错误；存储的负知识是否能有效迁移到新任务。
    - 路线: 评估基准与自动评审
      解决的问题: 提供标准化任务、指标和自动评审器，以评估AI生成的研究工件、实验计划和论文的质量（如AblationBench、AI Scientist中的自动评审器）。
      尚未覆盖: 自动指标与真正科学价值之间的一致性；覆盖消融规划以外的多样化研究活动；基于LM的评判器在作者和审稿人视角间的一致表现。
    - 路线: 人机协作框架
      解决的问题: 在关键决策点整合人类判断，以提高自主研究的鲁棒性和可信度，提供从完全自主到逐步监督的多种干预模式（如AutoResearchClaw）。
      尚未覆盖: 人类干预的最佳粒度和时机；在人类专家稀缺时的可扩展性；精准协作是否在不同研究阶段始终优于完全自主。
    共识:
    - 基于LLM的智能体可以起草看似合理的研究论文，但经常引入事实错误、遗漏关键验证步骤或产生不可复现的结果。
    - 自动验证门控（如视觉-语言物理检查、基于事实的报告）对于捕捉代码级检查遗漏的静默失败是必要的。
    - 当前系统在结合过去失败的结构化记忆或在关键决策点引入人类反馈时表现更好。
    - AI生成研究的评估仍是一个开放挑战；自动评审分数不能完全反映科学有效性，而像AblationBench这样的基准揭示了与人类表现的显著差距。
    分歧:
    - 自主程度：一些系统追求完全无人类干预的自主，而另一些则证明精准的人机协作能产生更高质量和更可辩护的主张。
    - 失败处理策略：一种方法使用多假设因果归因将纠正路由到正确层级，另一种则存储显式的负知识记录以供后续检索和拒绝。
    - 评估目标：一些工作通过自动或同行评审评估端到端论文质量，另一些则专注于消融规划等特定子任务，使得跨系统比较困难。
    - 领域特异性：通用系统旨在跨ML子领域工作，而领域适配系统则融入物理感知验证，引发了可迁移性问题。
    开放问题:
    - 自主研究系统如何确保生成的论文包含可验证、可复现的结果，而不仅仅是表面上的合理性？
    - 这些系统能否超越重组已知模式，产生真正新颖的假设，以及我们如何验证这种新颖性？
    - 领域特定验证（如物理信息门控）与通用科学推理各自应扮演什么角色，单一架构能否同时服务于两者？
    - 如何构建人机协作以最大化科学严谨性，同时避免造成瓶颈，尤其是在专家资源有限的领域？
