      尚未覆盖: 失败模式跨领域的泛化能力；长期记忆与知识复用；以及这些机制是否能完全替代人类调试直觉
    - 路线: 研究组件的自动评估与规划
      解决的问题: 自动化子任务如消融实验设计和实验规划，将研究流程中的特定瓶颈隔离出来进行基准测试
      尚未覆盖: 与完整研究流水线的集成；代理指标与真实科学贡献的一致性；以及覆盖机器学习之外的多样化研究方法
    共识:
    - 大型语言模型是自主研究智能体的核心引擎，驱动想法生成、编码和写作。
    - 验证机制（代码执行检查、视觉-语言门控、基于事实的报告）对于防止幻觉结果和无根据的主张至关重要。
    - 当前系统仍缺乏一致高质量产出所需的可靠性和科学品味，失败案例很常见。
    - 基准测试和评估至关重要但目前碎片化，没有广泛接受的标准来衡量 AI 科学家的表现。
    分歧:
    - 自主性理念：全自动方法（AI Scientist, AI CFD Scientist）假设 AI 最终能完全胜任，而人在回路方法（AutoResearchClaw）认为战略性人类输入对质量是必要的。
    - 失败处理策略：一些系统使用带有多假设归因的反思性自我纠正（SAGE），另一些使用过去失败的共享记忆（Negative Knowledge），还有的通过记录失败模式来推导设计原则（Why
