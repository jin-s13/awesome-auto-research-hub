  related_work_outline:
  - 'Mainstream direction: Building LLM-based multi-agent systems that automate literature
    search, data analysis, hypothesis generation, and manuscript writing for scientific
    discovery.'
  - 'Shared research pattern: Iterative refinement loops with specialized agents (e.g.,
    reviewer, analyst) and structured knowledge sharing (e.g., world models, research
    trees).'
  - 'Key differences: Domain generality vs. specificity (e.g., EvoMaster vs. EDM-ARS);
    evaluation by human judges vs. rubric-based scoring; end-to-end paper generation
    vs. component-level assistance.'
  - 'Trend evolution: Rapid shift from 2023 surveys and benchmarks to 2025-2026 autonomous
    systems that run for hours, produce manuscripts, and are evaluated against human
    researchers.'
  - 'Open questions: How to guarantee factual accuracy and avoid overexcitement; how
    to measure long-term scientific impact; how to embed deep domain expertise without
    brittle pipelines.'
  related_work_outline_zh:
  - 主流方向：构建基于大语言模型的多智能体系统，自动化文献搜索、数据分析、假设生成和论文撰写，以辅助科学发现。
  - 研究共性：采用专门化智能体（如评审、分析）的迭代优化循环，以及结构化知识共享（如世界模型、研究树）。
  - 关键差异：领域通用性 vs. 领域特异性（如EvoMaster对比EDM-ARS）；人类评估 vs. 评分准则自动评估；端到端论文生成 vs. 组件级辅助。
  - 趋势演进：从2023年的综述和基准快速演进到2025-2026年可运行数小时、生成手稿并与人类研究者对比的自主系统。
  - 开放问题：如何保证事实准确性并避免过度兴奋；如何衡量长期科学影响力；如何在不依赖脆弱流水线的情况下嵌入深层领域专业知识。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey and review generation
      what_it_solves: Producing structured, citation-backed survey papers from a topic
        query, reducing manual literature synthesis effort.
      what_remains_open: Generalization to emerging topics with sparse literature;
        ensuring factual correctness of generated claims and citations.
    - line: End-to-end autonomous research systems
      what_it_solves: 'Performing full-cycle scientific discovery: data analysis,
        literature search, hypothesis generation, and report writing with minimal
        human input.'
      what_remains_open: Reliability over long horizons (e.g., memory degradation,
        implementation drift); scientific taste and novelty assessment; scaling beyond
        20 cycles.
    - line: Domain-specific research automation
      what_it_solves: Embedding domain knowledge (e.g., educational data mining, single-cell
        biology) into the research pipeline to improve relevance and validity.
      what_remains_open: Transferability across domains without re-engineering; balancing
        domain constraints with model flexibility.
    - line: Evaluation and failure analysis for AI scientists
      what_it_solves: Defining benchmarks, metrics, and human baselines to measure
        progress and diagnose failure modes of autonomous research systems.
      what_remains_open: Alignment of proxy metrics with real scientific value; coverage
        of diverse research activities beyond prediction tasks.
    - line: Multi-agent orchestration and knowledge management
      what_it_solves: Coordinating specialized agents (problem formulation, coding,
        criticism) and maintaining shared state (world models, research trees) for
        coherent long-running investigations.
      what_remains_open: Error propagation across agents; efficient communication
        protocols; scaling to larger agent collectives.
    consensus:
    - LLM-based agents can automate significant portions of the research workflow,
      including literature review, data analysis, and drafting.
    - Iterative refinement with feedback loops (reviewer agents, self-critique) improves
      output quality over single-pass generation.
    - Current systems still fall short of fully autonomous scientific discovery, with
      factual inaccuracies and reasoning errors being common.
    - Human evaluation remains a critical component for validating system outputs,
      though automated rubrics are emerging as complements.
    disagreements:
    - 'Evaluation methodology: some works rely on human expert judgment, while others
      use rubric-based automatic scoring or benchmark task performance.'
    - 'Domain scope: systems like EvoMaster aim for domain-agnostic operation, whereas
      EDM-ARS and BAISBench are tightly coupled to specific scientific fields.'
    - 'Output granularity: ARISE focuses on survey paper generation, while Kosmos
      and OR-Agent produce research reports with novel findings, and EDM-ARS generates
      full LaTeX manuscripts.'
    - 'Knowledge representation: Kosmos uses a structured world model shared between
      agents; OR-Agent uses a tree-based workflow with backtracking; others use simpler
      state machines or implicit context.'
    open_questions:
    - How can we systematically verify the factual accuracy of AI-generated scientific
      claims, especially when they reference external literature?
    - What metrics beyond human preference scores can capture the long-term impact
      and novelty of AI-generated research?
    - How can domain expertise be injected without hard-coding brittle rules, enabling
      adaptation to new fields?
    - What are the ethical boundaries for autonomous systems that generate scientific
      manuscripts, and how should authorship be attributed?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述与评论生成
      解决的问题: 根据主题查询生成结构化、带引用的综述论文，减少人工文献综合工作量。
      尚未覆盖: 对文献稀疏的新兴主题的泛化；确保生成声明和引用的真实性。
    - 路线: 端到端自主研究系统
      解决的问题: 执行全周期科学发现：数据分析、文献搜索、假设生成和报告撰写，仅需最少人工输入。
      尚未覆盖: 长周期可靠性（如记忆退化、实现漂移）；科学品味与新颖性评估；超过20个周期的扩展性。
    - 路线: 领域特定研究自动化
      解决的问题: 将领域知识（如教育数据挖掘、单细胞生物学）嵌入研究流水线，以提高相关性和有效性。
      尚未覆盖: 无需重新工程即可跨领域迁移；平衡领域约束与模型灵活性。
    - 路线: AI科学家的评估与失败分析
      解决的问题: 定义基准、指标和人类基线，以衡量进展并诊断自主研究系统的失败模式。
      尚未覆盖: 代理指标与真实科学价值的一致性；覆盖预测任务之外的多样化研究活动。
    - 路线: 多智能体编排与知识管理
      解决的问题: 协调专门化智能体（问题制定、编码、批评）并维护共享状态（世界模型、研究树），以实现连贯的长期研究。
      尚未覆盖: 智能体间错误传播；高效通信协议；扩展到更大智能体集合。
    共识:
    - 基于大语言模型的智能体可以自动化研究流程的重要部分，包括文献综述、数据分析和草稿撰写。
    - 带有反馈循环（评审智能体、自我批评）的迭代优化比单次生成能提高输出质量。
    - 当前系统仍无法实现完全自主的科学发现，事实不准确和推理错误普遍存在。
    - 人类评估仍然是验证系统输出的关键组成部分，尽管自动化评分准则正作为补充出现。
    分歧:
    - 评估方法：一些工作依赖人类专家判断，而其他工作使用基于评分准则的自动评分或基准任务性能。
    - 领域范围：EvoMaster等系统追求领域无关操作，而EDM-ARS和BAISBench则与特定科学领域紧密耦合。
    - 输出粒度：ARISE专注于综述论文生成，Kosmos和OR-Agent生成带有新发现的研究报告，EDM-ARS生成完整LaTeX手稿。
    - 知识表示：Kosmos使用在智能体间共享的结构化世界模型；OR-Agent使用带回溯的树形工作流；其他系统使用更简单的状态机或隐式上下文。
    开放问题:
    - 如何系统验证AI生成的科学声明的真实性，尤其是当它们引用外部文献时？
    - 除了人类偏好分数，哪些指标能捕捉AI生成研究的长期影响力和新颖性？
    - 如何在不硬编码脆弱规则的情况下注入领域专业知识，以便适应新领域？
    - 对于生成科学手稿的自主系统，伦理边界是什么，以及如何归属作者身份？
