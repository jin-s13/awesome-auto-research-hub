  related_work_outline_zh:
  - 主流方向：端到端自主研究系统，将论文写作与验证、自我纠正和多智能体协作相结合，从纯生成向可靠的科学交流演进。
  - 研究共性：所有系统都将写作嵌入到构思、实验和验证的更大流水线中，将手稿视为可验证的产物，需经过事实核查和审稿反馈。
  - 关键差异：验证机制从逻辑一致性检查到基于物理的视觉门控各不相同；人类参与程度从完全自主到精准协作不同；性能评估基准不同（如研讨会投稿、ARC-Bench、领域特定PDE任务）。
  - 趋势演进：2024至2026年的前沿显示，从单智能体论文生成转向具有显式失败处理、记忆和人机协作模式的多智能体系统，反映出对鲁棒性的重视超过单纯流畅性。
  - 开放问题：全自主系统能否生成科学严谨、可发表的论文；如何跨学科泛化写作质量；如何缩小自动评审分数与真实科学价值之间的差距。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Designing tasks, baselines, metrics, and automated review processes
        to assess the quality of AI-generated scientific manuscripts and detect errors
        or hallucinations.
      what_remains_open: Whether proxy metrics like automated reviewer scores align
        with genuine scientific utility and whether evaluations generalize across
        diverse disciplines and problem types.
    - line: Systems and reproducible infrastructure
      what_it_solves: Turning isolated model ideas into runnable pipelines for autonomous
        paper writing, including code, artifact management, and repeatable workflows
        from ideation to manuscript.
      what_remains_open: Standardized external validation across hardware, datasets,
        and user settings, and the reproducibility of generated papers themselves
        beyond the system's own runtime.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing fragmented claims into failure modes, design principles,
        and causal attribution mechanisms for robust autonomous writing, guiding intervention
        strategies.
      what_remains_open: Direct empirical validation that the proposed categories
        or failure attributions predict writing behavior and improve final manuscript
        quality in unseen settings.
    - line: State and representation modeling
      what_it_solves: Turning failed experiments and raw observations into compact,
        retrievable memory states that inform future writing decisions and prevent
        repeated errors.
      what_remains_open: Whether the learned negative knowledge or memory representations
        are sufficient for writing decisions in tasks outside the training distribution
        of the system.
    - line: Action-conditioned control and planning
      what_it_solves: Connecting validation feedback to concrete writing interventions,
        such as revising text, correcting figures, or rerunning experiments, to improve
        manuscript accuracy.
      what_remains_open: How much improvement comes from the planning and correction
        policy rather than the underlying language model's generative capabilities.
    consensus:
    - Autonomous paper writing requires tight integration with verification loops
      to catch factual errors and hallucinations before human inspection.
    - Multi-agent collaboration, where agents take roles like writer, reviewer, and
      executor, improves the reliability of generated manuscripts over single-pass
      generation.
    - Human-in-the-loop intervention, even at a few key decision points, significantly
      boosts output quality and reduces silent failures.
    - Automated review systems can approximate human scoring but are not yet a substitute
      for true scientific peer review, especially in detecting subtle flaws.
    - Memory of past failures, whether through negative knowledge banks or cross-run
      evolution, is a crucial component for iterative improvement in writing systems.
    disagreements:
    - 'The primary verification mechanism varies: some systems rely on internal logical
      consistency checks, others on domain-specific physics-based visual gates, and
      yet others on generic multi-hypothesis failure attribution.'
    - 'The role of human involvement differs: some systems target full autonomy with
      zero human intervention, while others demonstrate that targeted human collaboration
      at high-leverage moments outperforms both full autonomy and exhaustive step-by-step
      supervision.'
    - 'Evaluation benchmarks are not standardized: comparisons are made using workshop
      acceptance rates, experiment-stage benchmarks like ARC-Bench, or domain-specific
      tasks such as PDE solving, making it hard to compare writing quality across
      systems.'
    - 'Approaches to factual grounding diverge: some enforce verifiable reporting
      that constrains outputs to measured values, while others rely on curated knowledge
      retrieval or internal debate to suppress hallucinations.'
    open_questions:
    - Can fully autonomous writing systems produce manuscripts that are scientifically
      rigorous and free of subtle flaws, or will human oversight always be required
      for high-stakes communication?
    - How do we design evaluation procedures that capture the true scientific value
      of a generated paper, beyond surface-level metrics and automated reviewer scores?
    - What are the necessary components for an autonomous writing system to generalize
      across disciplines, given that current systems are often demonstrated in narrow
      domains like machine learning or fluid dynamics?
    - How can we ensure that negative knowledge and failure memories transfer effectively
      to novel writing tasks without catastrophic forgetting or overfitting to past
      errors?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 评测与证据设计
      解决的问题: 设计任务、基线、指标和自动评审流程，以评估AI生成的科学手稿质量，并检测错误或幻觉。
      尚未覆盖: 自动评审分数等代理指标是否与真实科学效用一致，以及评估能否跨学科和问题类型泛化。
    - 路线: 系统与可复现基础设施
      解决的问题: 将孤立的模型想法转化为可运行的自主论文写作流水线，包括代码、工件管理和从构思到手稿的可重复工作流。
      尚未覆盖: 跨硬件、数据集和用户设置的标准化外部验证，以及生成论文本身在系统运行时之外的可复现性。
    - 路线: 概念分类与理论
      解决的问题: 将碎片化主张组织为失败模式、设计原则和因果归因机制，以指导鲁棒自主写作，并指导干预策略。
      尚未覆盖: 所提出的分类或失败归因是否能预测写作行为并提高最终手稿质量，仍需直接实证验证。
    - 路线: 状态与表示建模
      解决的问题: 将失败实验和原始观察转化为紧凑、可检索的记忆状态，为未来的写作决策提供信息，避免重复错误。
      尚未覆盖: 学习到的负知识或记忆表示是否足以支撑系统训练分布之外的写作任务决策。
    - 路线: 动作条件控制与规划
      解决的问题: 将验证反馈连接到具体的写作干预，如修改文本、修正图表或重新运行实验，以提高手稿准确性。
      尚未覆盖: 性能提升有多少来自规划与修正策略，而不是底层语言模型的生成能力。
    共识:
    - 自主论文写作需要与验证循环紧密集成，以在人工审查前捕获事实错误和幻觉。
    - 多智能体协作，其中代理扮演作者、审稿人和执行者等角色，提高了生成手稿的可靠性，超过单次生成。
    - 即使在少数关键决策点的人机协作干预，也能显著提升输出质量并减少静默失败。
    - 自动评审系统可近似人类评分，但尚不能替代真正的科学同行评审，尤其在检测细微缺陷方面。
    - 对过去失败的记忆，无论是通过负知识库还是跨运行进化，都是写作系统迭代改进的关键组成部分。
    分歧:
    - 主要验证机制不同：一些系统依赖内部逻辑一致性检查，另一些依赖领域特定的基于物理的视觉门控，还有的依赖通用的多假设失败归因。
    - 人类参与的角色不同：一些系统追求零人类干预的全自主，而另一些则证明在高杠杆时刻进行精准的人机协作优于完全自主和详尽的逐步监督。
    - 评估基准不统一：比较时使用研讨会接受率、ARC-Bench等实验阶段基准，或PDE求解等特定领域任务，使得跨系统写作质量难以比较。
    - 事实基础的方法存在分歧：有些系统强制执行可验证报告，将输出约束为测量值，而另一些则依赖精选知识检索或内部辩论来抑制幻觉。
    开放问题:
    - 全自主写作系统能否生成科学严谨、无细微缺陷的手稿，还是高风险科学交流必须始终依赖人类监督？
    - 如何设计评估程序，以捕获生成论文的真实科学价值，超越表面指标和自动评审分数？
    - 鉴于当前系统通常仅在机器学习或流体动力学等狭窄领域展示，自主写作系统跨学科泛化需要哪些必要组件？
    - 如何确保负知识和失败记忆能有效迁移到新的写作任务，而不会出现灾难性遗忘或对过去错误过拟合？
