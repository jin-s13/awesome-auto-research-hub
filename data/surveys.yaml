  related_work_outline:
  - 'Mainstream direction: Building multi-agent LLM systems that autonomously perform
    literature review, hypothesis generation, experiment execution, and paper writing,
    with emphasis on iterative refinement and self-improvement.'
  - 'Shared research pattern: Modular agent architectures with specialized roles (literature
    searcher, analyst, critic, writer) connected by structured workflows; evaluation
    via human judgment, rubric scores, or domain-specific benchmarks; and use of external
    tools like code execution and citation databases.'
  - 'Key differences: Workflow design varies from fixed state-machine pipelines (EDM-ARS)
    to evolutionary tree search (OR-Agent) and self-evolving loops (EvoMaster); scope
    ranges from domain-specific (EDM-ARS, BAISBench) to domain-agnostic (Kosmos, EvoMaster);
    evaluation targets differ—some prioritize survey comprehensiveness (ARISE), others
    end-to-end research soundness (Kosmos, the failure case study).'
  - 'Trend evolution: Within the 2025–2026 frontier, systems are moving from single-paper
    generation to continuous, multi-cycle autonomous research agents that accumulate
    knowledge; early work focused on pipeline design, while later papers introduce
    self-evolution and long-horizon operation (up to 12 hours).'
  - 'Open questions: Scalability of autonomous research beyond a few cycles or a single
    dataset; how to embed genuine scientific taste and avoid overexcitement about
    false discoveries; how to benchmark across diverse scientific domains without
    overfitting to narrow tasks; and whether iterative self-improvement leads to genuine
    progress or merely metric overfitting.'
  related_work_outline_zh:
  - 主流方向：构建能自主完成文献综述、假设生成、实验执行和论文撰写的多智能体LLM系统，重点在于迭代优化与自我改进。
  - 研究共性：模块化智能体架构，包含文献搜索、分析、批评、写作等专门角色，通过结构化工作流连接；评估依赖人类判断、评分准则或领域特定基准；使用代码执行、引文数据库等外部工具。
  - 关键差异：工作流设计从固定状态机流水线（EDM-ARS）到进化树搜索（OR-Agent）和自我演化循环（EvoMaster）不等；范围从领域特定（EDM-ARS,
    BAISBench）到领域无关（Kosmos, EvoMaster）；评测目标不同——有的注重综述全面性（ARISE），有的注重端到端研究合理性（Kosmos，失败案例研究）。
  - 趋势演进：在2025–2026前沿内，系统正从单篇论文生成向持续多周期的自主研究智能体发展，知识可积累；早期工作侧重流水线设计，后期论文引入自我演化和长周期运行（长达12小时）。
  - 开放问题：自主研究在少数周期或单一数据集之外的扩展性；如何嵌入真正的科学品味并避免对虚假发现的过度兴奋；如何跨科学领域基准测试而不陷入狭隘任务；以及迭代自我改进是否导致真正进步还是仅对指标过拟合。
  literature_review:
    line_of_work_matrix:
    - line: Automated survey and review generation
      what_it_solves: Generating comprehensive, structured literature surveys using
        multi-agent LLM pipelines with iterative refinement against rubric-based evaluation.
      what_remains_open: Factual accuracy beyond rubric scores, handling of contradictory
        evidence, coverage of non-English literature, and mechanisms for long-term
        updating as new papers appear.
    - line: Autonomous research agent pipelines
      what_it_solves: End-to-end execution of scientific workflows—from hypothesis
        formulation and data analysis to manuscript writing—using LLM agents that
        interact with tools and external knowledge.
      what_remains_open: Robustness against failure modes (implementation drift, memory
        degradation, overexcitement on false results), sufficient domain- and task-specific
        intelligence, and scalability beyond single-dataset or short-horizon tasks.
    - line: Evaluation and benchmarking of AI scientists
      what_it_solves: Providing standardized tasks, human baselines, and metrics to
        assess the scientific reasoning and research capabilities of autonomous AI
        systems.
      what_remains_open: Generalizability of benchmarks across scientific domains,
        alignment of proxy metrics with real-world scientific impact, and evaluation
        of long-term autonomous research cycles.
    - line: Multi-agent coordination and self-improvement architectures
      what_it_solves: Orchestration of specialized agents with memory, backtracking,
        evolutionary search, or self-critique to enable iterative improvement and
        knowledge accumulation over time.
      what_remains_open: Trade-off between exploration and exploitation, verification
        that self-evolution yields genuine capability gains versus metric overfitting,
        and computational cost of sustained iterative cycles.
    consensus:
    - Systems employ modular LLM-based agents with separate roles for searching, analyzing,
      critiquing, and writing, coordinated by a workflow engine.
    - Iterative refinement loops—often aided by rubric-based or multi-agent review—are
      central to improving output quality.
    - External tools (code sandboxes, literature databases, citation services) are
      integrated to ground generation in real data and references.
    - Evaluation relies on human judgment, rubric scores, or domain-specific benchmarks;
      no single automatic metric is accepted as fully sufficient.
    - Current systems frequently fail due to lack of deep domain knowledge, memory
      limitations, and inability to verify intermediate results, motivating further
      research on robustness.
    disagreements:
    - 'Workflow structure: some systems use fixed, state-machine pipelines (EDM-ARS),
      while others adopt flexible evolutionary search (OR-Agent) or self-evolving
      loops (EvoMaster).'
    - 'Domain specificity: EDM-ARS and BAISBench are tightly coupled to a single domain
      (educational data mining, single-cell transcriptomics), whereas Kosmos and EvoMaster
      claim domain-agnostic design.'
    - 'Evaluation target: ARISE aims to maximize a rubric-based survey quality score;
      Kosmos and the failure case study assess the scientific soundness of the entire
      research output; benchmarks like BAISBench measure performance on narrow tasks
      like cell-type annotation.'
    - 'Agent autonomy: most systems operate fully autonomously after initial prompt,
      but the failure case study explicitly highlights the need for human oversight
      to correct overexcitement and implementation drift.'
    open_questions:
    - How can autonomous research agents be evaluated on tasks that require long-horizon
      planning and novel insight, beyond isolated benchmark tasks?
    - What mechanisms can prevent agents from ‘overexcitement’—declaring success despite
      obvious failures—as documented in the LLM failure study?
    - Can self-evolving agents (EvoMaster) consistently improve on truly novel problems,
      or do they overfit to the distribution of training data and evaluation metrics?
    - How do we benchmark the literature review capability of AI scientists across
      languages, disciplines, and levels of evidence quality, given that current benchmarks
      cover only a few domains?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自动化综述与评论生成
      解决的问题: 使用多智能体LLM流水线，通过迭代优化和评分准则评估，生成全面、结构化的文献综述。
      尚未覆盖: 评分准则之外的事实准确性、矛盾证据的处理、非英语文献覆盖率，以及新论文出现时的长期更新机制。
    - 路线: 自主研究智能体流水线
      解决的问题: 从假设提出、数据分析到论文撰写的端到端科学工作流，LLM智能体通过与工具和外部知识交互执行。
      尚未覆盖: 对失败模式（实现漂移、记忆退化、对虚假结果过度兴奋）的鲁棒性，足够的领域与任务特定智能，以及在单数据集或短周期任务之外的扩展性。
    - 路线: AI科学家的评测与基准测试
      解决的问题: 提供标准化任务、人类基线和指标，以评估自主AI系统的科学推理和研究能力。
      尚未覆盖: 基准跨科学领域的泛化性，代理指标与真实科学影响的一致性，以及长期自主研究周期的评估。
    - 路线: 多智能体协调与自我改进架构
      解决的问题: 通过记忆、回溯、进化搜索或自我批判编排专门智能体，实现迭代改进和知识积累。
      尚未覆盖: 探索与利用的权衡，验证自我演化是否带来真实能力提升还是对指标过拟合，以及持续迭代循环的计算成本。
    共识:
    - 系统采用模块化LLM智能体，分别承担搜索、分析、批评和写作等角色，由工作流引擎协调。
    - 迭代优化循环——通常借助评分准则或多智能体评审——是提升产出质量的核心手段。
    - 集成外部工具（代码沙箱、文献数据库、引文服务）以将生成内容建立在真实数据和参考文献之上。
    - 评估依赖人类判断、评分准则或领域特定基准，尚无单一自动化指标被普遍接受为充分。
    - 当前系统常因缺乏深层领域知识、记忆限制和无法验证中间结果而失败，推动了对鲁棒性的进一步研究。
    分歧:
    - 工作流结构：部分系统采用固定的状态机流水线（EDM-ARS），而其他系统采用灵活的进化搜索（OR-Agent）或自我演化循环（EvoMaster）。
    - 领域特异性：EDM-ARS和BAISBench紧密耦合于单一领域（教育数据挖掘、单细胞转录组学），而Kosmos和EvoMaster声称领域无关设计。
    - 评测目标：ARISE旨在最大化基于评分准则的综述质量分数；Kosmos和失败案例研究评估整个研究产出的科学合理性；BAISBench等基准测试在细胞类型注释等窄任务上的表现。
    - 智能体自主性：多数系统在初始提示后完全自主运行，但失败案例研究明确强调需要人类监督以纠正过度兴奋和实现漂移。
    开放问题:
    - 如何评估自主研究智能体在需要长期规划和新颖洞察的任务上的表现，而不仅限于孤立基准任务？
    - 什么机制能防止智能体出现“过度兴奋”——即在明显失败时仍宣称成功——如LLM失败研究中所记录的？
    - 自我演化智能体（EvoMaster）能否在真正新颖的问题上持续改进，还是仅对训练数据分布和评估指标过拟合？
    - 如何跨语言、学科和证据质量水平对AI科学家的文献综述能力进行基准测试，鉴于当前基准仅覆盖少数领域？
