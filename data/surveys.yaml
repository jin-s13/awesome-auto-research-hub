  related_work_outline:
  - 'Mainstream direction: Building end-to-end autonomous AI scientist systems that
    can propose hypotheses, design and execute experiments, verify results, and generate
    reports, often with multi-agent architectures and human-in-the-loop options.'
  - 'Shared research pattern: Structuring the research loop as a framework of ideation,
    execution, validation, and reflection, where agents debate, evolve, or search
    through hypothesis spaces, and failures are diagnosed to improve subsequent cycles.'
  - 'Key differences: Some systems focus on domain-specific discovery (e.g., CFD)
    with built-in physics verification, while others aim for domain generality; hypothesis
    generation varies from multi-agent debate to evolutionary search and tree-based
    branching; human-AI collaboration modes range from full autonomy to selective
    intervention at high-leverage decisions.'
  - 'Trend evolution: Within the 2025–2026 frontier, the field is moving from single-shot
    autonomous experimentation toward self-evolving, multi-agent frameworks with structured
    failure recovery and standardized benchmarks for measuring progress.'
  - 'Open questions: How to ensure generated hypotheses are scientifically novel and
    non-trivial; how to generalize verification beyond simulation-accessible domains;
    how well current benchmarks capture real scientific discovery vs. code generation.'
  related_work_outline_zh:
  - 主流方向：构建端到端的自主AI科学家系统，能够提出假设、设计并执行实验、验证结果并生成报告，通常采用多智能体架构并支持人机协作。
  - 研究共性：将研究循环结构化为构思、执行、验证与反思的框架，智能体通过辩论、进化或搜索假设空间，并利用失败诊断改进后续周期。
  - 关键差异：部分系统聚焦领域特定发现（如CFD）并内置物理验证，其他系统追求领域通用性；假设生成策略从多智能体辩论、进化搜索到树状分支各不相同；人机协作模式从完全自主到高杠杆决策点选择性干预。
  - 趋势演进：在2025–2026前沿期内，该领域正从单次自主实验转向具备结构化失败恢复和标准化基准的自演化多智能体框架。
  - 开放问题：如何确保生成的假设具有科学新颖性而非表面变化；如何将验证机制推广到仿真之外的领域；当前基准测试在多大程度上反映真实科学发现能力而非代码生成能力。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research loops
      what_it_solves: Automating the full scientific discovery pipeline—ideation,
        experiment design, execution, verification, and reporting—to produce reproducible,
        inspectable results.
      what_remains_open: Reliability under complex, open-ended scenarios; verification
        gates can miss silent failures (e.g., 2 of 16 planted failures in one study);
        fully autonomous writing remains unsolved.
    - line: Hypothesis generation and search strategies
      what_it_solves: Generating diverse, non-trivial hypotheses through structured
        representations (trees, evolutionary populations) and search mechanisms (debate,
        backtracking) to avoid random exploration.
      what_remains_open: Ensuring scientific soundness and avoiding hallucinated ideas;
        balancing search efficiency with depth; scaling to truly novel combinatorial
        spaces.
    - line: Experiment planning and self-correcting execution
      what_it_solves: Translating hypotheses into executable steps, handling runtime
        failures, and dynamically adjusting plans through causal diagnosis and intervention.
      what_remains_open: Accuracy of failure attribution (e.g., routing to correct
        intervention level); generalization to settings with scarce execution feedback
        or long-running experiments.
    - line: Evaluation and benchmarking
      what_it_solves: Providing standardized tasks, datasets, and metrics to compare
        AI scientist systems, including human baselines to gauge progress.
      what_remains_open: Coverage of diverse scientific domains; alignment between
        proxy metrics (e.g., RMSE, blind scores) and genuine discovery utility; human
        baselines are often limited.
    - line: Conceptual taxonomy and surveys
      what_it_solves: Organizing fragmented AI scientist systems into categories based
        on scientific domain, capability, and architecture, and identifying challenges
        and ethical concerns.
      what_remains_open: Lack of empirical validation that the proposed taxonomies
        predict system behavior or drive design choices; surveys remain descriptive
        rather than prescriptive.
    consensus:
    - Current AI scientists are not yet fully autonomous and require human oversight
      or collaboration at critical decision points.
    - Multi-agent architectures and structured workflows (debate, evolution, tree
      search) improve hypothesis quality and experiment robustness over single-agent
      baselines.
    - Self-verification mechanisms (e.g., vision-language gates, grounded reporting)
      are essential to prevent hallucinated results and ensure scientific integrity.
    - Benchmarking is needed but existing benchmarks are narrow in domain coverage
      and may not fully capture the depth of scientific discovery.
    disagreements:
    - 'Domain specificity vs. generality: some systems tightly integrate domain-specific
      verification (physics simulation for CFD) while others propose domain-agnostic
      frameworks requiring only ~100 lines of code for a new discipline; the trade-off
      between domain depth and breadth is unresolved.'
    - 'Hypothesis generation mechanism: multi-agent debate (AutoResearchClaw) vs.
      evolutionary search with tree-based backtracking (OR-Agent) vs. continuous self-evolution
      (EvoMaster); each approach makes different assumptions about the structure of
      the hypothesis space.'
    - 'Human-AI interaction mode: targeted collaboration at high-leverage points (AutoResearchClaw)
      vs. interactive dashboard with customizable roles (Claw AI Lab) vs. fully autonomous
      with self-correction (SAGE); the optimal level and timing of human involvement
      remains an open question.'
    - 'Evaluation paradigm: use of internal AI case studies (Claw AI Lab) vs. domain-specific
      benchmarks with human baselines (BAISBench) vs. multi-domain benchmarks (ARC-Bench,
      FrontierScience); no consensus on how to measure scientific progress.'
    open_questions:
    - How can AI scientists be equipped to distinguish between trivial parameter variations
      and genuinely novel scientific hypotheses, especially in unexplored regimes?
    - What verification strategies are effective when ground-truth simulators are
      unavailable, e.g., in wet-lab biology or social sciences?
    - Do current benchmarks (e.g., BAISBench, ARC-Bench) mainly test code generation
      and execution skills rather than the ability to formulate and test meaningful
      scientific questions?
    - Under what conditions does human-AI collaboration degrade or improve the scientific
      discovery process, and how can interfaces be designed to avoid cognitive biases
      or over-reliance?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究循环
      解决的问题: 自动化从构思、实验设计、执行、验证到报告的全流程，产出可复现、可检查的结果。
      尚未覆盖: 在复杂开放式场景下的可靠性；验证门控可能遗漏静默失败（如一项研究中遗漏了16个植入失败中的2个）；完全自主写作仍很困难。
    - 路线: 假设生成与搜索策略
      解决的问题: 通过结构化表示（树、进化种群）和搜索机制（辩论、回溯）生成多样化的非平凡假设，避免随机探索。
      尚未覆盖: 确保假设的科学合理性并避免幻觉；平衡搜索效率与深度；扩展到真正新颖的组合空间。
    - 路线: 实验规划与自我纠正执行
      解决的问题: 将假设转化为可执行步骤，处理运行时失败，并通过因果诊断和干预动态调整计划。
      尚未覆盖: 失败归因的准确性（例如路由到正确的干预级别）；在反馈稀少或实验耗时的场景下的泛化能力。
    - 路线: 评估与基准测试
      解决的问题: 提供标准化任务、数据集和指标，以比较AI科学家系统，并包含人类基线以衡量进展。
      尚未覆盖: 多样化科学领域的覆盖；代理指标（如RMSE、盲评分数）与真实发现效用之间的一致性；人类基线往往有限。
    - 路线: 概念分类与综述
      解决的问题: 将碎片化的AI科学家系统按科学领域、能力和架构进行分类，并识别挑战与伦理问题。
      尚未覆盖: 缺乏实证验证来证明分类法能预测系统行为或驱动设计选择；综述仍偏描述性而非指导性。
    共识:
    - 当前AI科学家尚未完全自主，仍需在关键决策点进行人类监督或协作。
    - 多智能体架构和结构化工作流（辩论、进化、树搜索）相比单智能体基线能提升假设质量和实验鲁棒性。
    - 自我验证机制（如视觉-语言门控、基于事实的报告）对防止幻觉结果和确保科学诚信至关重要。
    - 基准测试是必要的，但现有基准在领域覆盖上较窄，可能无法完全捕捉科学发现的深度。
    分歧:
    - 领域专用与通用性：一些系统紧密集成领域验证（如CFD物理仿真），另一些提出只需约100行代码即可适配新学科的领域无关框架；领域深度与广度的权衡尚未解决。
    - 假设生成机制：多智能体辩论（AutoResearchClaw） vs. 带树状回溯的进化搜索（OR-Agent） vs. 持续自演化（EvoMaster）；每种方法对假设空间的结构做了不同假设。
    - 人机交互模式：高杠杆点精准协作（AutoResearchClaw） vs. 可定制角色的交互式仪表板（Claw AI Lab） vs. 带自我纠正的完全自主（SAGE）；人类参与的最佳层级和时机仍是开放问题。
    - 评估范式：使用内部AI案例研究（Claw AI Lab） vs. 带人类基线的领域基准（BAISBench） vs. 多领域基准（ARC-Bench,
      FrontierScience）；如何衡量科学进步尚无共识。
