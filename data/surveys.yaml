  - 'Shared research pattern: Using LLM-based agents with tool use, planning, and
    memory to automate parts of the research pipeline, then measuring success via
    task-specific metrics on human-curated datasets.'
  - 'Key differences: Task scope varies from narrow coding (SciCode) to full paper
    writing (Agent Laboratory); evaluation targets differ (survey quality, code correctness,
    idea novelty); agent architectures range from single-prompt chains to multi-agent
    systems with hypothesis-tree refinement.'
  - 'Trend evolution: From 2024 static benchmarks (SciCode, Chain of Ideas) to 2025
    task-specific evaluation (ReportBench) to 2026 integrated autonomous systems (Toward
    Autonomous Long-Horizon Engineering, Agent Laboratory), showing a shift from component
    evaluation to end-to-end research automation.'
  - 'Open questions: How to standardize evaluation across diverse research tasks;
    whether proxy metrics (e.g., survey completeness) correlate with real scientific
    impact; how to ensure reproducibility and safety in fully autonomous research
    loops.'
  related_work_outline_zh:
  - 主流方向：构建能执行长周期科学任务（文献综述、编码、实验、反驳）的自主研究代理，并通过精心设计的基准进行评估。
  - 研究共性：使用基于LLM的代理，结合工具使用、规划和记忆来自动化研究流程的各个环节，然后在人工整理的数据集上通过任务特定指标衡量成功。
  - 关键差异：任务范围从狭窄的编码（SciCode）到完整的论文撰写（Agent Laboratory）；评估目标不同（综述质量、代码正确性、想法新颖性）；代理架构从单提示链到具有假设树细化的多代理系统。
  - 趋势演进：从2024年的静态基准（SciCode、Chain of Ideas）到2025年特定任务评估（ReportBench），再到2026年集成式自主系统（Toward
    Autonomous Long-Horizon Engineering、Agent Laboratory），显示出从组件评估到端到端研究自动化的转变。
  - 开放问题：如何标准化跨不同研究任务的评估；代理指标（如综述完整性）是否与真实科学影响相关；如何在完全自主的研究循环中确保可复现性和安全性。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Provides curated tasks, datasets, and metrics to measure research
        agent capabilities in coding, literature survey, and idea generation.
      what_remains_open: Coverage of diverse scientific domains and alignment between
        proxy metrics (e.g., BLEU, pass@k) and real-world research utility; most benchmarks
        lack longitudinal studies of agent-generated research outcomes.
    - line: Systems and reproducible infrastructure
      what_it_solves: Integrates LLM agents into runnable pipelines for autonomous
        paper writing, rebuttal, or experiment management, often with human-in-the-loop
        interfaces.
      what_remains_open: Standardized external validation across different hardware,
        datasets, and user settings; reproducibility is limited by missing code or
        environment details in several systems.
    - line: Action-conditioned control and planning
      what_it_solves: Enables agents to decompose long-horizon research goals into
        sub-tasks, refine hypotheses via tree search, and adapt plans based on intermediate
        results.
      what_remains_open: How much improvement comes from the planning algorithm versus
        the underlying LLM capabilities; robustness to unexpected obstacles in real
        lab environments is untested.
    consensus:
    - LLM agents can perform non-trivial research sub-tasks such as literature synthesis,
      code generation, and experiment debugging when given appropriate tools and prompts.
    - Human-curated benchmarks are necessary because generic NLP metrics fail to capture
      scientific validity and novelty.
    - Autonomous research systems still require human oversight for quality control,
      especially in critical stages like hypothesis formulation and result interpretation.
    disagreements:
    - 'Task granularity: some works target narrow, well-defined coding problems (SciCode),
      while others attempt end-to-end paper production (Agent Laboratory), leading
      to different evaluation criteria and success definitions.'
    - 'Interaction mode: systems vary from fully autonomous execution (Toward Autonomous
      Long-Horizon Engineering) to interactive assistants (DRPG), implying different
      assumptions about human involvement and error tolerance.'
    - 'Evaluation target: benchmarks focus on different aspects—code correctness,
      survey completeness, rebuttal quality, or idea novelty—making cross-comparison
      difficult.'
    open_questions:
    - How can we design a unified evaluation framework that covers the full research
      lifecycle and is accepted across disciplines?
    - What are the minimal reproducibility requirements (code, data, environment)
      for claiming an autonomous research agent works, given that many current systems
      lack public artifacts?
    - Can agents trained or prompted on existing literature generate truly novel hypotheses,
      or do they only recombine known ideas?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 评测与证据设计
      解决的问题: 提供精心设计的任务、数据集和指标，用于衡量研究代理在编码、文献综述和想法生成等方面的能力。
      尚未覆盖: 对多样科学领域的覆盖不足，代理指标（如BLEU、pass@k）与真实研究效用之间的一致性未经验证；多数基准缺乏对代理生成研究成果的纵向研究。
    - 路线: 系统与可复现基础设施
      解决的问题: 将LLM代理集成到可运行的流程中，用于自主论文撰写、反驳或实验管理，通常包含人机交互界面。
      尚未覆盖: 跨硬件、数据集和用户设置的标准化外部验证；多个系统因缺少代码或环境细节而可复现性受限。
    - 路线: 动作条件控制与规划
      解决的问题: 使代理能够将长周期研究目标分解为子任务，通过树搜索细化假设，并根据中间结果调整计划。
      尚未覆盖: 性能提升有多少来自规划算法而非底层LLM能力；在真实实验室环境中面对意外障碍的鲁棒性尚未测试。
    共识:
    - 当给予适当的工具和提示时，LLM代理可以执行非平凡的研究子任务，如文献综合、代码生成和实验调试。
    - 人工整理的基准是必要的，因为通用的NLP指标无法捕捉科学有效性和新颖性。
    - 自主研究系统仍需要人类监督以保证质量，特别是在假设形成和结果解释等关键阶段。
    分歧:
    - 任务粒度：一些工作针对狭窄、定义明确的编码问题（如SciCode），而另一些尝试端到端的论文生产（如Agent Laboratory），导致评估标准和成功定义不同。
    - 交互模式：系统从完全自主执行（如Toward Autonomous Long-Horizon Engineering）到交互式助手（如DRPG）不等，意味着对人类参与和容错性的假设不同。
    - 评估目标：基准关注不同方面——代码正确性、综述完整性、反驳质量或想法新颖性——使得交叉比较困难。
    开放问题:
    - 如何设计一个覆盖完整研究生命周期并被跨学科接受的统一评估框架？
    - 鉴于许多当前系统缺乏公开工件，声称自主研究代理有效的最低可复现性要求（代码、数据、环境）是什么？
    - 在现有文献上训练或提示的代理能否产生真正新颖的假设，还是它们只是重新组合已知想法？
