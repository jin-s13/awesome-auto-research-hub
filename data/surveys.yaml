      解决的问题: 通过主动学习和贝叶斯优化高效探索实验参数空间，通常处理多目标权衡和协作数据共享。
      尚未覆盖: 从简单演示扩展到高维真实科学问题的可扩展性；实时噪声管理的集成以及跨平台可复现性。
    - 路线: 自动化循环中的数据质量与噪声鲁棒性
      解决的问题: 在迭代实验过程中检测并纠正噪声测量，以维持模型可靠性，使用kNN插补或噪声感知采集函数等技术。
      尚未覆盖: 在没有大型干净训练集的情况下处理低强度噪声，以及将噪声模型泛化到不同实验模态和特征分布。
    - 路线: 自主实验室的基础设施与可复现性
      解决的问题: 实现符合FAIR标准的数据管理、来源记录和协作工作流，使自动化实验可重复并在研究组间共享。
      尚未覆盖: 在特定平台（如nanoHUB）之外的采用，跨硬件和数据集的标准化外部验证，以及与现有实验室信息系统的集成。
    - 路线: 概念框架与综述
      解决的问题: 将自动化实验的碎片化图景组织为分类体系，识别挑战，并为未来发展提出社区路线图。
      尚未覆盖: 所提出的分类和路线图是否能带来研究产出或采用率的可衡量改进，仍缺乏直接实证验证。
    共识:
    - 自动化可以通过减少实验设计和执行中的人工试错，显著加速科学发现。
    - LLM和贝叶斯优化是自主实验的关键使能技术，LLM处理高层推理，贝叶斯方法指导高效参数探索。
    - 即使在高度自动化系统中，人类监督对于验证结果、提供领域专业知识和处理意外异常仍然重要。
    - 数据质量、噪声和可复现性是可靠自主实验必须解决的关键瓶颈。
    分歧:
    - 自主程度：部分工作主张以最少人工输入实现完全自主研究实验室，而另一些则嵌入人在回路进行实时指导和决策。
    - 评测范围：概念验证从简单物理系统（食用色素调色、PFM成像）到更复杂的材料发现不等，导致发现跨领域迁移的可行性不明确。
    - 理论的角色：一些框架明确集成理论模拟和针对文献的新颖性评估，而另一些则纯粹依赖数据驱动优化，未引入理论在环。
    - 基础设施依赖：解决方案常绑定特定平台（nanoHUB、HPC作业调度器）或自定义代码库，限制了可复现性和跨实验室采用。
    开放问题:
    - 如何设计标准化基准，以公平比较不同科学领域和自动化水平的自主研究智能体？
    - 完全自主与人在回路交互之间的最优平衡是什么？该平衡是否随任务复杂性或领域成熟度而变化？
    - 噪声处理策略如何在不同实验设置中泛化，以应对变化的噪声特性和有限的干净数据？
    - 在高风险材料或药物发现中部署自驱动实验室需要哪些伦理、治理和来源标准？
