  related_work_outline_zh:
  - 主流方向：构建和评估自主AI研究智能体，越来越重视可靠性、验证和标准化基准。
  - 研究共性：系统将科学工作流分解为假设、实验、分析、写作等阶段，以LLM为核心推理引擎，通过任务完成度、工件质量或同行评审进行评估。
  - 关键差异：部分工作聚焦端到端论文生成（如ML领域），另一些则面向特定领域（如CFD、组学）并引入物理或生物学验证；评估方式从自动指标到人类专家判断不等；有的引入自我纠正循环，有的依赖单次生成。
  - 趋势演进：从2024年的初始框架发展到2025-2026年的领域专用和自我纠正系统，失败分析和基准驱动评估日益受到重视。
  - 开放问题：如何确保AI生成科学主张的认知可靠性；如何设计能捕捉真正科学新颖性的基准；如何在自动化与人类监督之间取得平衡。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Making claims comparable through tasks, baselines, metrics,
        and failure cases. DISCOVERYWORLD provides 120 tasks with automatic metrics;
        BAISBench offers cell annotation and MCQ tasks with a human baseline; AI Scientist
        introduces an automated reviewer; SAGE tracks metrics-bearing outputs and
        blind scores.
      what_remains_open: Coverage of diverse scientific domains beyond ML and biology,
        alignment of proxy metrics with real scientific impact, and detection of subtle
        failures such as silent errors (AI CFD Scientist's vision gate missed 2 of
        16 planted failures).
    - line: Systems and reproducible infrastructure
      what_it_solves: Turning isolated model ideas into runnable stacks, artifacts,
        and repeatable workflows. AI CFD Scientist is open-source with Foam-Agent
        and a verification gate; AI Scientist and v2 provide code and frameworks;
        Claw AI Lab offers a code harness and interactive dashboard.
      what_remains_open: Standardized external validation across hardware, datasets,
        and user settings; reproducibility of AI-generated experiments remains inconsistent
        (only one of three AI Scientist-v2 papers passed peer review); platforms are
        still early-stage (Claw AI Lab described as an early step).
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing fragmented claims into task boundaries, assumptions,
        and evaluation criteria. Why LLMs Aren't Scientists Yet identifies six recurring
        failure modes and derives design principles; SAGE's multi-hypothesis failure
        attribution provides a causal diagnosis taxonomy.
      what_remains_open: Direct empirical validation that these taxonomies predict
        model behavior across different systems and domains; whether design principles
        generalize beyond the studied cases.
    consensus:
    - Autonomous research agents require structured evaluation beyond simple task
      success, including verification gates, artifact quality checks, and failure
      analysis.
    - Current LLM-based agents suffer from reliability issues such as hallucination,
      implementation drift, memory degradation, and insufficient domain knowledge.
    - Benchmarks and standardized tasks are essential for comparing systems, but existing
      benchmarks cover only a narrow slice of scientific discovery.
    disagreements:
    - 'Evaluation targets differ: some assess final paper quality via automated or
      human review, while others evaluate the discovery process through task completion
      and artifact correctness.'
    - 'The role of human oversight varies: some systems aim for full autonomy with
      minimal intervention, while others emphasize interactive human-in-the-loop control.'
    - 'Error handling approaches diverge: SAGE uses multi-hypothesis causal attribution
      and self-correction, AI CFD Scientist relies on a vision-language physics gate,
      and Why LLMs Aren''t Scientists Yet catalogs failures without an automatic correction
      mechanism.'
    open_questions:
    - How can evaluation benchmarks capture the open-endedness and novelty of real
      scientific discovery rather than rewarding narrow task optimization?
    - What verification mechanisms can guarantee the physical or factual validity
      of AI-generated claims across diverse scientific domains?
    - How do we ensure that improvements in benchmark scores translate to genuine
      scientific progress rather than overfitting to proxy metrics?
    - What are the minimal human oversight requirements to prevent silent failures
      in autonomous research loops?
  literature_review_zh:
    研究路线矩阵:
