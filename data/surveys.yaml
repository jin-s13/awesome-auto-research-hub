  related_work_outline:
  - 'Mainstream direction: Building end-to-end autonomous research pipelines that
    integrate LLM-powered hypothesis generation, code execution, and multi-modal verification,
    with a shift toward self-improving, multi-agent, and human-in-the-loop architectures.'
  - 'Shared research pattern: All systems rely on a closed-loop of ideation, experimentation,
    and reflection, using structured workflows (trees, debates, evolutionary search)
    and verification gates to suppress hallucinated or invalid scientific claims.'
  - 'Key differences: Systems diverge in their error-recovery strategies (single-step
    reflection vs. multi-hypothesis causal attribution), domain specificity (tailored
    for CFD/biology vs. generalist frameworks), and the role of human oversight (full
    autonomy vs. strategic human intervention at high-leverage decision points).'
  - 'Trend evolution: Within 2025–2026, the field moved from domain-specific AI scientists
    (CFD, biology) to generalist, self-evolving agent frameworks (EvoMaster) and established
    standardized benchmarks (ARC-Bench, BAISBench, FrontierScience), with a growing
    emphasis on verifiable reporting and failure attribution.'
  - 'Open questions: How to formally measure the novelty of generated hypotheses;
    whether verification gates can guarantee safety in high-stakes domains; and the
    optimal granularity of human-AI collaboration for long-term scientific discovery.'
  related_work_outline_zh:
  - 主流方向：构建端到端自主研究流水线，整合LLM驱动的假设生成、代码执行与多模态验证，并朝向自我改进、多智能体和人在环架构演进。
  - 研究共性：所有系统依赖构思-实验-反思的闭环，采用结构化工作流（树、辩论、进化搜索）和验证门控来抑制幻觉或无效的科学主张。
  - 关键差异：系统在错误恢复策略（单步反思 vs 多假设因果归因）、领域专一性（针对CFD/生物学定制 vs 通用框架）以及人类监督角色（完全自主 vs 在关键决策点进行战略干预）上存在分歧。
  - 趋势演进：2025–2026年间，领域从特定学科的AI科学家（CFD、生物学）快速转向通用、自我演化的智能体框架（EvoMaster），并建立了标准化基准（ARC-Bench、BAISBench、FrontierScience），日益重视可验证报告和失败归因。
  - 开放问题：如何形式化度量生成假设的新颖性；验证门控能否在高风险领域保证安全；以及人类与AI在长期科学发现中的最优协作粒度。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Automates the full research cycle from hypothesis generation
        and experiment design to execution and manuscript drafting, reducing manual
        effort and enabling rapid iteration.
      what_remains_open: Cross-domain generalization, reliability of fully autonomous
        writing, and systematic detection of all silent failures during experimentation.
    - line: Self-correction and causal failure attribution
      what_it_solves: Equips autonomous agents with mechanisms to diagnose experiment
        failures, attribute them to root causes (hypothesis, design, implementation),
        and apply targeted corrections, improving success rates and artifact quality.
      what_remains_open: Coverage of rare or out-of-distribution failure modes; whether
        causal attribution scales to complex, multi-step experiments with confounding
        variables.
    - line: Human-AI collaboration modes
      what_it_solves: Balances autonomy and accuracy by inserting human judgment at
        high-leverage decision points, yielding better outcomes than either full autonomy
        or exhaustive oversight.
      what_remains_open: Optimal intervention granularity, generalizable across scientific
        domains and researcher expertise levels; potential for human bias to steer
        the system away from surprising discoveries.
    - line: Multi-agent debate and structured ideation
      what_it_solves: Enhances hypothesis quality and experimental design through
        structured debate, evolutionary search, and tree-based exploration with backtracking,
        producing more robust and diverse ideas.
      what_remains_open: Whether the computational overhead of multi-agent debate
        is justified by measurable gains in downstream discovery; risk of convergence
        to consensus rather than breakthrough ideas.
    - line: Domain-specific AI scientists with physical/biological verification
      what_it_solves: Integrates domain-specific simulators and physical validity
        gates (e.g., vision-language physics checks, biological benchmarks) to ensure
        generated hypotheses are consistent with known laws and data.
      what_remains_open: Transferability of the verification methodology to other
        disciplines; completeness of the verification gate in catching all safety-critical
        violations.
    - line: Evaluation benchmarks and standards for AI scientists
      what_it_solves: Provides standardized tasks, metrics, and human baselines to
        compare AI scientist capabilities in cell annotation, combinatorial optimization,
        and interdisciplinary problem-solving.
      what_remains_open: Alignment of proxy metrics with real-world scientific impact;
        coverage of long-term, open-ended discovery rather than well-defined, short-term
        tasks.
    consensus:
    - LLM-based agents serve as the core reasoning engine, orchestrating code execution,
      data analysis, and natural language reporting.
    - Verification gates (metric-based, physics-based, or human-reviewed) are essential
      to prevent fabricated results and hallucinated citations.
    - Closed-loop iteration with feedback from experiment outcomes is a necessary
      component for autonomous research.
    - Current systems are not yet capable of fully independent, high-quality scientific
      discovery and require further work on reliability, generalization, and evaluation.
    disagreements:
    - 'Error recovery strategy: some systems rely on simple reflection and retry,
      while others introduce multi-hypothesis causal attribution to distinguish between
      hypothesis, design, and implementation failures.'
    - 'Role of human oversight: designs range from fully autonomous execution to fine-grained
      human intervention at every step, with evidence that targeted collaboration
      at key decision points outperforms both extremes.'
    - 'Domain scope: specialized AI scientists (e.g., CFD, single-cell biology) embed
      domain-specific physics or biology priors, whereas generalist frameworks (e.g.,
      EvoMaster) aim for domain-agnostic self-evolution with minimal domain-specific
      code.'
    - 'Evaluation setting: benchmarks vary from internal, small-scale case studies
      (5 AI research topics) to multi-disciplinary suites (ARC-Bench, BAISBench, FrontierScience)
      and evolutionary optimization tasks, making cross-system comparison difficult.'
    open_questions:
    - How can we formally measure the novelty and scientific value of AI-generated
      hypotheses beyond proxy metrics like benchmark scores or artifact quality?
    - What verification gate designs are sufficient to guarantee safety and correctness
      in high-stakes scientific domains such as clinical biology or fluid dynamics?
    - What is the optimal balance between human guidance and AI autonomy to maximize
      long-term scientific throughput without introducing human bias?
    - Can self-evolution mechanisms accumulate knowledge across diverse experiments
      without catastrophic forgetting or overfitting to a narrow training distribution?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流水线
      解决的问题: 自动化从假设生成、实验设计到执行和论文草拟的完整研究周期，减少人工工作并实现快速迭代。
      尚未覆盖: 跨领域泛化、完全自主写作的可靠性，以及在实验过程中系统性检测所有静默失败。
    - 路线: 自我纠正与因果失败归因
      解决的问题: 赋予自主智能体诊断实验失败、将其归因于根本原因（假设、设计、实现）并应用针对性修正的能力，提高成功率和工件质量。
      尚未覆盖: 覆盖罕见或分布外故障模式；因果归因是否能够扩展到具有混淆变量的复杂多步骤实验。
    - 路线: 人类-AI协作模式
      解决的问题: 通过在高杠杆决策点插入人类判断来平衡自主性与准确性，获得优于完全自主或详尽监督的结果。
      尚未覆盖: 最优干预粒度，能否跨科学领域和研究者专业水平泛化；人类偏见可能引导系统偏离令人惊讶的发现。
    - 路线: 多智能体辩论与结构化构思
      解决的问题: 通过结构化辩论、进化搜索和带回溯的树形探索增强假设质量和实验设计，产生更稳健和多样化的想法。
      尚未覆盖: 多智能体辩论的计算开销是否被下游发现的可衡量增益所证明；存在收敛到共识而非突破性想法的风险。
    - 路线: 具有物理/生物验证的领域特定AI科学家
      解决的问题: 集成领域特定仿真器和物理有效性门控（如视觉-语言物理检查、生物学基准），确保生成的假设与已知定律和数据一致。
      尚未覆盖: 验证方法学能否迁移到其他学科；验证门控在捕获所有安全关键违规方面的完整性。
    - 路线: AI科学家的评估基准与标准
      解决的问题: 提供标准化任务、指标和人类基线，以比较AI科学家在细胞注释、组合优化和跨学科问题解决中的能力。
      尚未覆盖: 代理指标与现实世界科学影响的一致性；对长期、开放式发现的覆盖，而非仅限于定义良好的短期任务。
    共识:
    - 基于LLM的智能体作为核心推理引擎，协调代码执行、数据分析和自然语言报告。
    - 验证门控（基于指标、物理或人工审查）对于防止伪造结果和虚构引用至关重要。
    - 从实验结果反馈的闭环迭代是自主研究的必要组成部分。
    - 当前系统尚未能完全独立地完成高质量科学发现，需要进一步在可靠性、泛化性和评估方面开展工作。
    分歧:
