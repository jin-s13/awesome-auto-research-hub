  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous paper generation
      what_it_solves: Automates the full research cycle—idea generation, code implementation,
        experiment execution, and manuscript writing—to produce complete scientific
        papers with minimal human intervention.
      what_remains_open: Generated papers often lack deep scientific novelty and may
        contain undetected errors; only one workshop-level peer-review acceptance
        has been demonstrated, and reproducibility across diverse domains is unproven.
    - line: Failure-aware self-correction and memory
      what_it_solves: Improves the robustness of autonomous research agents by diagnosing
        experiment failures, attributing root causes, and storing negative results
        to avoid repeating mistakes.
      what_remains_open: Current mechanisms are evaluated on narrow benchmarks; long-horizon
        cumulative error accumulation and cross-domain transfer of failure knowledge
        remain unaddressed.
    - line: Automated experiment planning and ablation design
      what_it_solves: Assesses and automates the design of ablation studies and experimental
        plans to validate research hypotheses, using LLM-based agents or chain-of-thought
        prompting.
      what_remains_open: Best systems achieve only 45% recall on ablation identification,
        well below human performance; the gap between author- and reviewer-perspective
        planning indicates grounding inconsistencies.
    - line: Automated review and quality assessment
      what_it_solves: Provides scalable, low-cost evaluation of generated papers through
        simulated peer review, often using LLM or VLM judges to score and give feedback.
      what_remains_open: Automated reviewers show near-human scoring on surface metrics
        but may miss subtle flaws; their alignment with real expert judgment, especially
        on novelty and ethical risks, is not fully validated.
    consensus:
    - LLM-based agents can produce papers that superficially resemble human scientific
      writing and sometimes exceed automated acceptance thresholds.
    - Incorporating failure memory, verification gates, or iterative feedback improves
      the completeness and metric-bearing content of generated outputs.
    - Current systems operate at the level of a novice student or workshop contribution
      and are not yet reliable for full conference publication without human oversight.
    - Automated evaluation pipelines (reviewer agents) correlate moderately with human
      judgments but are insufficient as the sole quality gate.
    disagreements:
    - 'Autonomy starting point: some systems generate research from scratch, while
      others require a baseline paper to analyze limitations and extend, affecting
      the scope of claimed autonomy.'
    - 'Failure handling strategy: one line uses multi-hypothesis causal attribution
      to route corrections, another uses a shared negative knowledge bank, and a third
      only documents failure modes without online correction.'
    - 'Evaluation setting: works differ in using purely automated reviewer scores
      versus submission to real workshops with human peer review, leading to different
      claims about acceptance.'
    - 'Domain specificity: one system is tightly coupled to a physics simulation domain
      (CFD) with vision-based verification, while others target general ML subfields,
      raising questions about domain-agnostic validity.'
    open_questions:
    - What evaluation benchmarks can move beyond surface-level paper quality to measure
      genuine scientific discovery and reproducibility?
    - How can autonomous research agents detect and correct their own reasoning errors
      when the ground truth is not known in advance?
    - Under what conditions do failure-aware memories transfer across different scientific
      tasks, and how should negative knowledge be curated to avoid biasing future
      hypotheses?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动论文生成
      解决的问题: 自动化完整研究周期——从想法生成、代码实现、实验执行到论文撰写——以最少人工干预产出完整科学论文。
      尚未覆盖: 生成的论文往往缺乏深度科学新颖性，可能包含未被发现的错误；仅有一篇获得研讨会级别同行评审接收，跨领域可复现性未经验证。
    - 路线: 失败感知的自我纠正与记忆
      解决的问题: 通过诊断实验失败、归因根本原因并存储负面结果，提升自主研究智能体的鲁棒性，避免重复错误。
      尚未覆盖: 当前机制在狭窄基准上评估；长周期累积错误和失败知识的跨任务迁移仍未被解决。
    - 路线: 自动化实验规划与消融设计
      解决的问题: 评估并自动化消融研究和实验计划的设计，以验证研究假设，使用基于LLM的智能体或思维链提示。
      尚未覆盖: 最佳系统在消融识别上仅达到45%召回率，远低于人类水平；作者视角与审稿人视角规划之间的差距表明基础不一致。
    - 路线: 自动化评审与质量评估
      解决的问题: 通过模拟同行评审提供可扩展、低成本的生成论文评估，通常使用LLM或VLM评委进行评分和反馈。
      尚未覆盖: 自动评审在表面指标上接近人类评分，但可能遗漏细微缺陷；其与真实专家判断的一致性，尤其是在新颖性和伦理风险方面，尚未充分验证。
    共识:
    - 基于LLM的智能体能够生成表面上类似人类科学写作的论文，有时能超过自动接受阈值。
    - 引入失败记忆、验证门控或迭代反馈能提高生成输出的完整性和包含指标的内容比例。
    - 当前系统运行在新手学生或研讨会贡献水平，尚不能在没有人类监督的情况下可靠地用于完整会议发表。
    - 自动评估流水线（审稿智能体）与人类判断存在中等相关性，但不足以作为唯一的质量关口。
    分歧:
    - 自主起点：部分系统从零开始生成研究，另一些则需要基线论文来分析局限并进行扩展，影响了所声称的自主范围。
    - 失败处理策略：一条路线使用多假设因果归因来路由修正，另一条使用共享负知识库，还有一条仅记录失败模式而不进行在线纠正。
    - 评估设置：工作在使用纯自动审稿人评分与提交至真实研讨会进行人类同行评审之间存在差异，导致对接收性的不同主张。
    - 领域特异性：一个系统与物理仿真领域（CFD）紧密耦合，并采用基于视觉的验证，而其他系统针对通用机器学习子领域，引发了对领域无关有效性的质疑。
    开放问题:
    - 哪些评估基准能够超越表面论文质量，衡量真正的科学发现和可复现性？
    - 当真实答案未知时，自主研究智能体如何检测并纠正自身的推理错误？
    - 在什么条件下，失败感知记忆能在不同科学任务间迁移？应如何管理负知识以避免对未来假设产生偏见？
