      systems (e.g., AI CFD Scientist) embed physics verification but are not portable.'
    - 'Reliability approach: reflection-based error recovery, multi-hypothesis causal
      attribution, and vision-language physics gates represent fundamentally different
      assumptions about how to detect and correct scientific errors.'
    - 'Role of human scaffolding: early systems depend on human-written code templates,
      while later systems strive for full autonomy, yet the optimal division of labor
      between human and AI remains unresolved.'
    open_questions:
    - What evaluation protocols can reliably measure the novelty, correctness, and
      reproducibility of AI-generated scientific claims without relying on imperfect
