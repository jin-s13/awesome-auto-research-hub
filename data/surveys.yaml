  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous paper generation pipelines
      what_it_solves: Converts the entire scientific discovery process—idea generation,
        coding, experimentation, paper writing, and simulated review—into a single
        automated workflow, enabling rapid, low-cost paper production.
      what_remains_open: The papers generated often fail to meet full conference acceptance
        standards; systems lack robust mechanisms to catch silent failures, fabrications,
        and missing ablations, and the evaluation is largely limited to automated
        reviewer scores rather than real peer review.
    - line: Self-correcting and failure-aware research agents
      what_it_solves: Improves the reliability of autonomous research by attributing
        failures to specific causes (hypothesis, design, implementation) and converting
        past failures into reusable knowledge that prevents repetition.
      what_remains_open: These methods are tested on narrow task suites or limited
        domains; the generalization of failure attribution across diverse scientific
        fields is unverified, and the systems still struggle with long-horizon consistency
        and scientific taste.
    - line: Benchmarking and evaluation of automated research planning
      what_it_solves: Provides standardized tasks and metrics to assess an agent's
        ability to plan ablation studies, a critical component of sound empirical
        research, thus enabling comparison between different LM-based approaches.
      what_remains_open: Current benchmarks only cover ablation planning, not the
        full paper-writing pipeline; automatic evaluation relies on LM judges whose
        alignment with human expert judgment is not fully established, and the gap
        between author and reviewer task performance remains unexplained.
    consensus:
    - LLM-based agents can autonomously generate research papers that occasionally
      pass workshop-level peer review, but output quality is inconsistent and often
      below human expert standards.
    - Structured feedback, whether through automated review, failure attribution,
      or negative knowledge, significantly improves the measurable quality of agent-generated
      artifacts.
    - Hallucination, implementation drift, and weak scientific taste are recurring
      failure modes that current systems cannot eliminate.
    disagreements:
    - 'The optimal level of human involvement: some systems aim for full autonomy,
      while others argue that targeted human intervention at decision points yields
      higher performance and is more practical.'
    - 'The best mechanism for failure recovery: single-pass reflection, multi-hypothesis
      causal diagnosis, and curated negative memory are proposed as competing solutions,
      with no clear winner across all settings.'
    - 'Evaluation scope: one line of work evaluates end-to-end paper acceptance, another
      focuses on the specific sub-task of ablation planning, making it difficult to
      compare overall system competence.'
    open_questions:
    - What is the minimal set of verification gates needed to guarantee that an AI-generated
      paper contains no fabricated results or hallucinated citations?
    - Can self-improvement mechanisms like negative knowledge or multi-hypothesis
      attribution scale to the open-ended diversity of real scientific research, beyond
      the narrow domains tested so far?
    - How should the scientific community establish standardized, human-calibrated
      benchmarks that cover the entire writing and communication pipeline, including
      clarity, argumentation, and contribution significance?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动论文生成流水线
      解决的问题: 将整个科学发现过程——想法生成、编码、实验、论文写作和模拟评审——转化为单一自动化工作流，实现快速、低成本的论文产出。
      尚未覆盖: 生成的论文往往达不到正式会议接收标准；系统缺乏鲁棒机制来捕获静默失败、编造和缺失的消融实验，评估主要限于自动评审分数而非真实同行评审。
    - 路线: 自我纠正与失败感知的研究智能体
      解决的问题: 通过将失败归因于特定原因（假设、设计、实现）并将过往失败转化为可复用知识，提高自主研究的可靠性，避免重复错误。
      尚未覆盖: 这些方法在狭窄任务集或有限领域进行测试；失败归因在不同科学领域的泛化能力未经验证，系统仍难以处理长周期一致性和科学品味问题。
    - 路线: 自动化研究规划的基准评测
      解决的问题: 提供标准化任务和指标，评估智能体规划消融实验的能力，这是健全实证研究的关键组成部分，使得不同基于LM的方法可以比较。
      尚未覆盖: 当前基准仅覆盖消融规划，而非整个论文写作流水线；自动评估依赖LM裁判，其与人类专家判断的一致性尚未完全建立，作者与审稿人任务表现的差距仍无解释。
    共识:
    - 基于LLM的智能体可以自主生成研究论文，偶尔通过工作坊级别的同行评审，但产出质量不稳定，通常低于人类专家标准。
    - 无论是通过自动评审、失败归因还是负知识，结构化反馈都能显著提升智能体产出的可测量质量。
    - 幻觉、实现漂移和薄弱的科学品味是反复出现的失败模式，当前系统无法消除。
    分歧:
    - 人类参与的最佳程度：一些系统追求完全自主，而另一些认为在决策点进行精准人工干预能获得更高性能且更实用。
    - 失败恢复的最佳机制：单次反思、多假设因果诊断和整理的负记忆被提出作为竞争方案，在所有设置中尚无明确赢家。
    - 评估范围：一条路线评估端到端的论文接受率，另一条聚焦于消融规划这一子任务，使得整体系统能力难以比较。
    开放问题:
    - 需要多少最低限度的验证门控，才能保证AI生成的论文不含编造结果或幻觉引用？
    - 负知识或多假设归因等自我改进机制能否从当前测试的狭窄领域扩展到真实科学研究的开放性多样性？
    - 科学界如何建立标准化、经人类校准的基准，覆盖整个写作与交流流程，包括清晰度、论证力和贡献意义？
