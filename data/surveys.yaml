    drift and overexcitement; whether self-correction can scale to hypothesis-level
    revision; and how to standardize reproducibility across diverse scientific domains.'
  related_work_outline_zh:
  - 主流方向：构建并评估能自主进行科学发现的AI智能体系统，重点提升可复现性、可靠性、失败纠正及物理/实证依据。
  - 研究共性：以LLM为核心规划/编码器，将发现分解为假设生成、实验执行和论文撰写，并引入自动评估或验证门控。
  - 关键差异：评估目标分歧于任务完成度、自动评审分数、同行评审接受率和人类专家判断；纠正策略从单步反思到多假设失败归因；系统架构从单智能体流水线到多智能体树搜索。
  - 趋势演进：从2024年的通用框架和虚拟基准（The AI Scientist, DISCOVERYWORLD）到2025‑2026年领域专用、自我纠正和物理验证系统（AI
    Scientist‑v2, SAGE, AI CFD Scientist），前沿正从可行性转向可信性和实际效用。
  - 开放问题：如何设计能关联真实科学新颖性的评估协议；如何缓解实现漂移和过度兴奋等系统性失败模式；自我纠正能否扩展到假设层面修订；以及如何标准化跨科学领域的可复现性。
  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Provides comparable tasks, metrics, and baselines to assess
        discovery capabilities of AI scientists; detects silent failures and validates
        scientific claims.
      what_remains_open: Benchmark coverage is limited to a few domains (e.g., CFD,
        single-cell omics, text-based physics puzzles); current proxy metrics have
        not been shown to correlate with downstream scientific impact; failure detection
        gates still miss non-trivial errors (e.g., 2 of 16 silent failures missed
        in the AI CFD Scientist).
    - line: Systems and reproducible infrastructure
      what_it_solves: Integrates idea generation, code execution, experiment management,
        and manuscript authoring into runnable, shareable workflows; reduces template
        reliance and improves reproducibility.
      what_remains_open: Inconsistent performance across runs (e.g., only 1/3 papers
        passed peer review in AI Scientist-v2); long-horizon memory degradation, implementation
        drift, and overexcitement remain unresolved; no standardized external validation
        across hardware, datasets, or scientific communities.
    - line: Conceptual taxonomy and theory
      what_it_solves: Identifies and organizes recurring failure modes (e.g., bias
        toward defaults, memory degradation, weak scientific taste) and derives design
        principles for more robust AI research systems.
      what_remains_open: Direct empirical validation that the proposed categories
        predict agent behavior in new domains is missing; the design principles are
        derived from a small set of case studies and have not been tested in large-scale,
        diverse settings.
    consensus:
    - Current AI scientist systems show potential for generating novel ideas, running
      experiments, and writing papers, but are not yet capable of fully autonomous,
      trustworthy scientific discovery.
    - Evaluation infrastructure and benchmarks are essential for measuring progress,
      but existing benchmarks are narrow in domain scope and do not capture the long-term
      value of discoveries.
    - Verification and self-correction mechanisms (e.g., physics-informed gates, vision-language
      checks, multi-hypothesis failure attribution) are critical for moving from plausible
      outputs to reliable results.
    - Multi-agent or multi-step workflows that decompose the research process outperform
      single-agent approaches in terms of completeness and robustness.
    disagreements:
    - 'Evaluation signal: Some works rely on automated reviewer scores, others on
      human expert judgment, task completion, or peer-review acceptance; there is
      no agreement on which signal best predicts real scientific merit.'
    - 'System architecture: Single-agent pipelines, multi-agent teams, and progressive
      tree search are all used, but the trade-offs between generality, controllability,
      and reliability remain unresolved.'
    - 'Failure correction depth: Whether single-step reflection suffices or whether
      structured causal attribution (multi-hypothesis) is necessary for robust self-correction
      is still debated.'
    - 'Domain specialization: General-purpose AI scientists (e.g., The AI Scientist)
      versus domain-specific ones (e.g., AI CFD Scientist) show different reliability
      profiles; the community has not converged on whether to prioritize breadth or
      depth.'
    open_questions:
    - How can we build evaluation benchmarks that span multiple scientific disciplines
      and measure the actual novelty and reproducibility of AI-generated discoveries?
    - What mechanisms can mitigate systematic failure modes such as memory degradation,
      implementation drift, and overexcitement during long-horizon autonomous research?
    - Can self-correction processes reliably revise not only code but also the underlying
      hypotheses or experimental designs when initial results are negative?
    - How should we compare the output of AI scientist systems to human scientists
      in terms of creativity, robustness, and long-term impact, beyond surface-level
      paper acceptance?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 评测与证据设计
      解决的问题: 提供可比较的任务、指标和基线来评估AI科学家的发现能力；检测静默失败并验证科学主张。
      尚未覆盖: 基准覆盖仅限于少数领域（如CFD、单细胞组学、文本物理谜题）；现有代理指标尚未证明与下游科学影响力相关；失败检测门控仍会遗漏非平凡错误（如AI
        CFD Scientist遗漏了16个静默失败中的2个）。
    - 路线: 系统与可复现基础设施
      解决的问题: 将想法生成、代码执行、实验管理和论文撰写整合为可运行、可共享的工作流；减少模板依赖并提高可复现性。
      尚未覆盖: 多次运行性能不一致（如AI Scientist-v2仅1/3论文通过评审）；长周期任务中的记忆退化、实现漂移和过度兴奋问题仍未解决；缺乏跨硬件、数据集或科学社区的标准化外部验证。
    - 路线: 概念分类与理论
      解决的问题: 识别并归纳重复出现的失败模式（如偏向默认值、记忆退化、科学品味薄弱）并推导出设计原则，以指导更稳健的AI研究系统。
      尚未覆盖: 缺少直接实证验证来证明这些分类能预测智能体在新领域中的行为；设计原则仅从少量案例研究中得出，尚未在大规模多样化环境中检验。
    共识:
    - 当前AI科学家系统在生成新想法、运行实验和撰写论文方面展现出潜力，但尚不具备完全自主、可信的科学发现能力。
    - 评估基础设施和基准对于衡量进展至关重要，但现有基准在领域覆盖上较窄，且无法捕捉发现的长期价值。
    - 验证和自我纠正机制（如物理信息门控、视觉-语言检查、多假设失败归因）对于从合理输出走向可靠结果至关重要。
    - 分解研究过程的多智能体或多步骤工作流在完整性和稳健性上优于单智能体方法。
    分歧:
    - 评估信号：有些工作依赖自动评审分数，有些依赖人类专家判断、任务完成度或同行评审接受率，尚无共识表明哪种信号最能预测真实科学价值。
    - 系统架构：单智能体流水线、多智能体团队和渐进式树搜索均有使用，但通用性、可控性和可靠性之间的权衡尚未解决。
    - 失败纠正深度：单步反思是否足够，还是需要结构化因果归因（多假设）才能实现稳健的自我纠正，仍在争论中。
    - 领域专业化：通用AI科学家（如The AI Scientist）与领域专用AI科学家（如AI CFD Scientist）展现出不同的可靠性表现，社区尚未就优先广度还是深度达成一致。
    开放问题:
    - 如何构建跨多学科的评估基准，并衡量AI生成发现的真实新颖性和可复现性？
    - 何种机制能缓解长周期自主研究中的记忆退化、实现漂移和过度兴奋等系统性失败模式？
    - 当初始结果为负时，自我纠正过程能否可靠地修正代码，同时修正背后的假设或实验设计？
    - 如何超越表面上的论文接受，将AI科学家系统的输出与人类科学家在创造力、稳健性和长期影响方面进行比较？
