      尚未覆盖: 生成主张和实验结果的可靠性不一致；成功往往依赖于人类编写的代码模板或狭窄领域，完整的同行评审接受仍属罕见。
    - 路线: 领域专用验证与物理感知发现
      解决的问题: 将领域知识（如物理模拟）集成到智能体循环中，捕获通用系统遗漏的静默失败，并产生可辩护的领域结果。
      尚未覆盖: 验证门控并非完美（存在遗漏失败），且方法绑定特定模拟环境；向其他科学领域的泛化能力未经证实。
    - 路线: 面向AI科学家的基准与评估环境
