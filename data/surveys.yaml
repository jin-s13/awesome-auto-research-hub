  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Transforming LLM capabilities into complete, runnable scientific
        workflows that generate novel ideas, execute experiments, and produce full
        manuscripts, thereby drastically reducing the cost and time per discovery
        cycle.
      what_remains_open: The reliability of fully autonomous output is inconsistent;
        few papers pass rigorous peer review, and the systems lack robust mechanisms
        for error correction and long-horizon project management.
    - line: Domain-specific verification and constraint enforcement
      what_it_solves: Embedding physics-aware or domain-knowledge-based validation
        gates into the agent loop to catch silent failures that purely syntactic or
        reviewer-based checks miss, ensuring scientific claims are physically or biologically
        plausible.
      what_remains_open: Current verification gates can still miss non-trivial failures
        (e.g., 2 out of 16 planted errors in CFD), and the approach has not been generalized
        to disciplines without clear computational simulators.
    - line: Evaluation benchmarks and evidence design
      what_it_solves: Providing standardized tasks, datasets, and metrics (e.g., DISCOVERYWORLD,
        BAISBench, ARC-Bench) to make the performance of AI scientists comparable
        and to probe specific discovery skills like hypothesis formation or experimental
        design.
      what_remains_open: Benchmarks are recent and limited in scope; alignment between
        proxy metrics (task completion, reviewer scores) and genuine scientific insight
        remains unproven, and human baselines are rarely established.
    - line: Conceptual taxonomy and survey
      what_it_solves: Organizing the proliferating array of AI scientist systems and
        tools into coherent categories by scientific domain, capability, and evaluation
        framework, thereby identifying shared challenges and guiding future research.
      what_remains_open: The proposed taxonomies are purely descriptive; there is
        no empirical evidence that the categories predict system behavior or that
        the identified challenges (e.g., ethics, literature review automation) are
        being addressed by current systems.
    consensus:
    - LLMs serve as the central reasoning engine for automating multiple stages of
      the scientific process, from ideation to writing.
    - External validation—whether through simulated reviewers, physics simulators,
      or benchmark tasks—is necessary because purely generative outputs often contain
      hidden errors or unsupported claims.
    - Current systems perform well on narrowly defined tasks but struggle to match
      human-level scientific judgment in open-ended or interdisciplinary discovery.
    - Cost and speed are frequently cited advantages, with per-paper costs dropping
      to tens of dollars, but reproducibility and reliability remain secondary concerns
      in evaluation.
    disagreements:
    - 'The optimal role of humans is contested: some systems advocate for full autonomy
      with occasional oversight, while others demonstrate that targeted human intervention
      at high-leverage decision points outperforms both complete autonomy and exhaustive
      step-by-step supervision.'
    - 'Verification strategies differ fundamentally: one line of work relies on simulated
      NLP-based peer review, another on domain-specific physics or biology simulation
      gates, and a third on standardized task-completion metrics, with no consensus
      on which method best captures scientific validity.'
    - There is a split between general-purpose AI scientist frameworks designed to
      work across machine learning subfields and domain-specific agents built for
      a single scientific discipline (e.g., CFD, single-cell omics), which trade generality
      for more reliable validation.
    open_questions:
    - How can verification mechanisms be hardened to guarantee that AI-generated scientific
      claims are not only plausible but also reproducible and physically consistent?
    - What is the right level of human-AI interaction to maximize both research productivity
      and novel insight, and how should intervention points be designed?
    - Can AI scientist systems transition from workshop-level contributions to sustained,
      long-term research programs that build on their own previous discoveries?
    - How should the ethical and epistemological implications of fully autonomous
      scientific discovery be systematically evaluated and governed?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流水线
      解决的问题: 将LLM能力转化为可运行的完整科学工作流，自动生成新想法、执行实验并撰写论文，大幅降低每个发现周期的成本和时间。
      尚未覆盖: 完全自主输出的可靠性不稳定；仅有少数论文通过严格同行评审；系统缺乏稳健的错误纠正和长期项目管理机制。
    - 路线: 领域特定验证与约束执行
      解决的问题: 在智能体循环中嵌入基于物理或领域知识的验证门控，以捕获纯语法或评审方式遗漏的静默失败，确保科学主张在物理或生物学上合理。
      尚未覆盖: 当前验证门控仍可能遗漏非平凡失败（如CFD中16个植入错误漏检2个），且该方法尚未推广到缺乏清晰计算模拟器的学科。
    - 路线: 评测基准与证据设计
      解决的问题: 提供标准化任务、数据集和指标（如DISCOVERYWORLD、BAISBench、ARC-Bench），使AI科学家的表现可比较，并探测假设形成或实验设计等特定发现技能。
      尚未覆盖: 基准较新且范围有限；代理指标（任务完成度、评审分数）与真实科学洞察之间的对齐性尚未得到证明，且人类基线很少建立。
    - 路线: 概念分类与综述
      解决的问题: 将激增的AI科学家系统和工具按科学领域、能力和评估框架组织成连贯类别，识别共性挑战并指导未来研究。
      尚未覆盖: 提出的分类仅是描述性的；没有实证证据表明这些类别能预测系统行为，或当前系统正在解决识别出的挑战（如伦理、文献综述自动化）。
    共识:
    - LLM是自动化从构思到写作等科学发现多阶段的核心推理引擎。
    - 外部验证（无论是通过模拟评审、物理模拟器还是基准任务）是必要的，因为纯生成式输出往往包含隐藏错误或无支撑的主张。
    - 当前系统在狭义任务上表现良好，但在开放式或跨学科发现中难以匹敌人类水平的科学判断。
    - 成本和速度是常被引用的优势，每篇论文成本降至数十美元，但可复现性和可靠性在评估中仍是次要关注点。
    分歧:
    - 人类的最优角色存在争议：一些系统主张完全自主并辅以偶尔监督，而另一些系统则证明，在高杠杆决策点进行精准人机协作，效果优于完全自主和详尽的逐步监督。
    - 验证策略存在根本差异：一条路线依赖基于模拟自然语言处理的同行评审，另一条依赖领域特定的物理或生物学模拟门控，第三条依赖标准化任务完成度指标，尚未就哪种方法最能捕捉科学有效性达成共识。
    - 通用型AI科学家框架（旨在跨机器学习子领域工作）与为单一科学学科（如CFD、单细胞组学）构建的领域特定智能体之间存在分歧，后者以通用性换取更可靠的验证。
    开放问题:
    - 如何强化验证机制，以保证AI生成的科学主张不仅合理，而且可复现、物理上一致？
    - 什么是最大化研究生产力和新颖洞察的最优人机交互水平，以及应如何设计干预点？
    - AI科学家系统能否从工作坊级别的贡献过渡到能够基于自身先前发现进行持续、长期的研究项目？
    - 应如何系统评估和治理完全自主科学发现所带来的伦理和认识论影响？
