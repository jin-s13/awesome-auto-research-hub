  literature_review:
    line_of_work_matrix:
    - line: Multi-agent review generation
      what_it_solves: Automates end-to-end literature review writing by assigning
        outlining, drafting, editing, and reviewing to specialized agents, improving
        readability and citation quality over single-pass generation.
      what_remains_open: Factual accuracy beyond surface similarity to human reviews
