    (internal benchmarks vs. real workshop/conference submission).'
  - 'Trend evolution: Starting from 2024 with the initial AI Scientist, the field
    moved to workshop-level acceptance in 2025, and by 2026 diversified into robust
    self-correction, human-AI collaboration modes, and dedicated evaluation benchmarks
    for ablation planning and experiment execution.'
  - 'Open questions: Can AI-generated papers consistently meet top-tier peer-review
    standards? How to guarantee scientific honesty and reproducibility without human
    oversight? What is the optimal division of labor between human and AI in scientific
    writing?'
  related_work_outline_zh:
  - 主流方向：构建端到端的AI科研智能体，能自主构思、实验、撰写论文，并朝着自我纠正、失败记忆和多智能体协作的方向演进，以提高可靠性。
  - 研究共性：大多数系统采用LLM驱动的代理循环，模拟科学工作流——提出假设、设计和执行实验、分析结果、起草论文、模拟评审——然后基于反馈或失败信号进行迭代。
