  - 'Key differences: Target tasks diverge into full review generation, hierarchical
    organization support, peer review dynamics, and agentic retrieval; evaluation
    settings range from standard similarity metrics to adversarial robustness and
    gaming scenarios.'
  - 'Trend evolution: From 2024 hierarchical organization support (CHIME) to 2025
    multi-agent generation (LiRA, IterSurvey) and adversarial analysis, then to 2026
    self-evolving retrieval and peer review gaming, indicating a shift toward more
    autonomous, robust, and comprehensive systems.'
  - 'Open questions: How to guarantee factual accuracy beyond surface similarity,
