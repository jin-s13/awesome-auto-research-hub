  related_work_outline:
  - 'Mainstream direction: Building end-to-end autonomous research agents that can
    generate hypotheses, design and execute code-based experiments, analyze results,
    and write full scientific papers, often with automated review loops.'
  - 'Shared research pattern: All systems decompose the scientific workflow into sub-tasks
    assigned to LLM-powered agents, rely on execution feedback or simulation, and
    evaluate through automated metrics, LLM judges, or peer review, but none yet matches
    human-level reliability or breadth.'
  - 'Key differences: Systems differ in scope—full paper generation vs. experiment
    planning only; in learning from failure—some use explicit negative knowledge memory
    while others restart from scratch; in interaction mode—single-agent pipelines
    vs. multi-agent teams with customizable roles; and in evaluation targets—custom
    benchmarks, automated reviewers, or real workshop submissions.'
  - 'Trend evolution: From 2024 proof-of-concepts (AI Scientist, DISCOVERYWORLD) to
    2025–2026 systems that pass peer review, incorporate tree search, multi-agent
    orchestration, and failure memory, indicating a shift toward robustness and controllable
    automation within the current frontier.'
  - 'Open questions: How to guarantee the correctness and reproducibility of fully
    automated experiments; how to evaluate novel scientific contributions beyond proxy
    metrics; how to mitigate risks of misuse, hallucinated results, and unsafe code
    execution; and whether failure-aware memory generalizes across diverse research
    domains.'
  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，能够生成假设、设计并执行基于代码的实验、分析结果并撰写完整科学论文，常伴随自动评审循环。
  - 研究共性：所有系统均将科学工作流分解为分配给LLM驱动的子任务，依赖执行反馈或模拟，并通过自动指标、LLM评审或同行评审进行评估，但至今无一达到人类水平的可靠性或广度。
  - 关键差异：系统在范围上不同——全论文生成 vs. 仅实验规划；在失败学习上——有的使用显式负知识记忆，有的每次从头开始；在交互模式上——单智能体管道 vs.
    可定制角色的多智能体团队；在评测目标上——自定义基准、自动评审员或真实工作坊投稿。
  - 趋势演进：从2024年的概念验证（AI Scientist、DISCOVERYWORLD）到2025–2026年通过同行评审、融入树搜索、多智能体编排和失败记忆的系统，表明在当前前沿内正朝着鲁棒性和可控自动化方向转变。
  - 开放问题：如何保证全自动化实验的正确性和可复现性；如何超越代理指标评价新颖科学贡献；如何减轻误用、幻觉结果和不安全代码执行的风险；失败感知记忆能否泛化到多样研究领域。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipeline
      what_it_solves: Automates the full cycle from idea generation, experiment coding,
        and result visualization to manuscript writing, aiming to produce complete,
        publication-ready papers without human intervention.
      what_remains_open: Success rate is inconsistent (e.g., only one of three AI
        Scientist-v2 papers passed peer review); performance is still below expert
        human level; and the approach is constrained to domains where all experiments
        can be run as code with limited real-world lab interaction.
    - line: Evaluation benchmarks and task design for automated discovery
      what_it_solves: Provides standardized environments and metrics (e.g., 120 tasks
        in DISCOVERYWORLD, ablation planning in AblationBench) to measure agent capabilities
        in hypothesis formation, experimental design, and reasoning, revealing failure
        modes of current agents.
      what_remains_open: Existing benchmarks focus on narrow, simulated science tasks;
        they do not capture the full uncertainty and physical constraints of real
        laboratories; and automatic evaluation metrics may not align with the true
        scientific merit of a discovery.
    - line: Multi-agent collaboration and interactive platforms
      what_it_solves: Orchestrates multiple specialized AI agents (customizable roles,
        real-time monitoring, artifact inspection) within a shared research environment,
        allowing flexible workflows that can incorporate human feedback and code harnesses.
      what_remains_open: The platform is an early prototype evaluated only on a handful
        of internal AI case studies; generalization to broader research fields and
        comparison with single-agent pipelines remain unverified; and the reliability
        of inter-agent coordination over long-running experiments is not yet demonstrated.
    - line: Failure-aware memory for adaptive experiment planning
      what_it_solves: Introduces a shared negative knowledge bank that records failed
        attempts as typed records, enabling downstream agents to avoid repeating errors
        and to solve new tasks that baselines cannot, while reducing token consumption.
      what_remains_open: The approach is demonstrated on a limited set of PDE tasks
        and ScienceAgentBench; evidence is missing for its effectiveness in highly
        stochastic or multi-modal experimental settings, and the memory representation
        may not scale to diverse failure types.
    - line: Domain-specific autonomous research lab concepts
      what_it_solves: Proposes a conceptual framework (e.g., AutoRecLab for recommender
        systems) that extends automation beyond algorithm tuning to the full research
        pipeline, including ideation, literature analysis, and provenance logging.
      what_remains_open: The proposal is purely conceptual with no implemented prototype
        or empirical validation; realization depends on community consensus and resource
        investment, and critical ethical, governance, and fairness challenges are
        acknowledged but not addressed.
    consensus:
    - Current autonomous agents cannot yet match human scientists in novelty, reliability,
      and breadth; all papers report performance gaps that require human oversight
      or intervention.
    - Large language models serve as the core reasoning engine, but their effectiveness
      is limited by the quality of code execution feedback, task representation, and
      failure handling.
    - 'Evaluation is a central challenge: automated metrics and LLM judges are used
      as proxies, yet their correlation with genuine scientific quality and real-world
      utility remains uncertain.'
    disagreements:
    - 'Scope of automation: some systems target full paper generation including manuscript
      writing, while others focus exclusively on experiment planning and execution,
      arguing that writing is a separate downstream task.'
    - 'Learning from failure: one line explicitly stores and reuses negative knowledge
      across experiments, whereas other systems restart each experiment from scratch
      or rely on human feedback without persistent memory.'
    - 'Interaction mode: single-agent architectures (monolithic pipeline) contrast
      with multi-agent platforms that assign distinct roles (e.g., experiment manager,
      reviewer) and enable real-time user intervention, reflecting different assumptions
      about controllability and modularity.'
    - 'Evaluation targets: some works prioritize internal automated review scores,
      others submit to real workshops, and still others propose dedicated simulation
      benchmarks, implying no agreement on what constitutes a valid measure of scientific
      progress by an AI.'
    open_questions:
    - How can we verify that an automatically generated experiment and its conclusions
      are correct, reproducible, and free from hallucinated results when the only
      verification agents are themselves LLMs?
    - What evaluation framework can capture the epistemic value of a scientific discovery
      beyond task completion rates or reviewer scores, especially for open-ended research?
    - Under what conditions does failure-aware memory transfer across disciplines,
      and what representation is sufficient to encode the causal structure of experimental
      failures?
    - How can autonomous research platforms be safely deployed in real-world labs
      without risking equipment damage, safety violations, or ethical breaches, given
      the evidence that all current demonstrations are purely code-based or simulated?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究管线
      解决的问题: 自动化从想法生成、实验编码、结果可视化到论文撰写的完整循环，旨在无需人类干预即可产出可发表的完整论文。
      尚未覆盖: 成功率不稳定（如AI Scientist-v2三篇中仅一篇通过同行评审）；性能仍低于专家水平；方法局限于所有实验可作为代码运行的领域，缺乏真实实验室交互。
    - 路线: 自动化发现的评估基准与任务设计
      解决的问题: 提供标准化环境和指标（如DISCOVERYWORLD的120个任务、AblationBench的消融规划），衡量智能体在假设形成、实验设计和推理方面的能力，揭示当前智能体的失败模式。
      尚未覆盖: 现有基准侧重于狭窄的模拟科学任务，无法捕捉真实实验室的完整不确定性和物理约束；自动评估指标可能与发现的真正科学价值不一致。
    - 路线: 多智能体协作与交互式平台
      解决的问题: 在共享研究环境中编排多个专业化AI智能体（可定制角色、实时监控、工件检查），允许纳入人类反馈和代码工具以形成灵活工作流。
      尚未覆盖: 该平台为早期原型，仅在少数内部AI案例研究上评估；对更广泛研究领域的泛化能力及与单智能体管道的对比尚待验证；长时间实验中智能体间协调的可靠性未经验证。
    - 路线: 失败感知记忆用于自适应实验规划
      解决的问题: 引入共享负知识库，将失败尝试记录为类型化条目，使下游智能体能够避免重复错误并解决基线无法解决的新任务，同时减少令牌消耗。
      尚未覆盖: 方法仅在有限的PDE任务和ScienceAgentBench上展示；缺乏在高随机性或多模态实验设置下有效性的证据；记忆表示可能无法扩展到多样化的失败类型。
    - 路线: 领域特定的自主研究实验室概念
      解决的问题: 提出概念框架（如推荐系统的AutoRecLab），将自动化从算法调优扩展到包括构思、文献分析、来源记录在内的完整研究管道。
      尚未覆盖: 提案纯属概念性，无已实现的原型或实证验证；实现依赖社区共识和资源投入；关键的伦理、治理和公平挑战被承认但未解决。
    共识:
    - 当前自主智能体在新颖性、可靠性和广度上仍无法匹敌人类科学家；所有论文都报告了需要人类监督或干预的性能差距。
    - 大型语言模型是核心推理引擎，但其有效性受限于代码执行反馈质量、任务表示和失败处理。
    - 评估是核心挑战：自动指标和LLM评审被用作代理，但它们与真正科学品质和现实世界效用的相关性仍不确定。
    分歧:
    - 自动化范围：部分系统以完整论文生成为目标，包括手稿撰写；而其他系统仅专注于实验规划与执行，认为写作是独立的下游任务。
    - 失败学习方式：一条路线显式存储并跨实验重用负知识，而其他系统每次实验从头开始或依赖人类反馈而无持久记忆。
    - 交互模式：单智能体架构（整体管道）与分配不同角色（如实验管理器、评审员）并允许实时用户干预的多智能体平台形成对比，反映了对可控性和模块化的不同假设。
    - 评估目标：部分工作优先考虑内部自动评审分数，部分向真实工作坊投稿，另一些则提出专门的模拟基准，表明对于AI科学进步的有效衡量标准尚无共识。
    开放问题:
    - 当唯一验证代理本身是LLM时，如何验证自动生成的实验及其结论是正确的、可复现的且无幻觉结果？
    - 何种评估框架能够超越任务完成率或评审分数，捕捉科学发现的认识论价值，尤其是对开放式研究？
    - 在何种条件下失败感知记忆能跨学科迁移，以及何种表示足以编码实验失败的因果结构？
    - 鉴于所有当前演示均纯基于代码或模拟，如何将自主研究平台安全地部署到真实实验室，避免设备损坏、安全违规或伦理突破？
