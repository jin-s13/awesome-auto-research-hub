  literature_review:
    line_of_work_matrix:
    - line: Evaluation and evidence design
      what_it_solves: Provides benchmarks and metrics to assess the quality of automatically
        generated research artifacts, focusing on ablation planning, artifact completeness,
        and reviewer alignment.
      what_remains_open: Current LM evaluators achieve only 45% recall on ablation
        identification and show inverse performance between author and reviewer tasks,
        indicating grounding mismatches; proxy metrics have not been validated against
        long-term scientific impact.
    - line: Systems and reproducible infrastructure
      what_it_solves: End-to-end agentic pipelines that generate ideas, execute experiments,
        produce manuscripts, and iteratively improve through feedback loops, often
        with open-source release.
      what_remains_open: 'Consistency remains low: only 1 of 3 manuscripts passed
        peer review in one case; generalization beyond workshop settings and narrow
        domains is unproven; handling of long-horizon memory and implementation drift
        under execution pressure is unresolved.'
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizes failure modes and design principles for autonomous
        research agents, categorizing issues like bias toward training defaults, memory
        degradation, and insufficient scientific taste.
      what_remains_open: Taxonomies are derived from limited case studies; no direct
        empirical validation that adopting these categories improves downstream paper
        quality or reduces specific failure rates.
    consensus:
    - LLM agents can autocomplete portions of the scientific pipeline but exhibit
      systematic failures in implementation drift, hallucinated results, and premature
      success declarations.
    - Multi-step reflection and external memory improve agent robustness compared
      to single-pass generation.
    - Automated reviewers can approximate human scoring but are not yet reliable gatekeepers
      for scientific validity.
    - Open-source systems and shared benchmarks are critical for reproducible progress
      in this area.
    disagreements:
    - Whether full autonomy is desirable vs. targeted human collaboration at high-leverage
      decision points; one study shows human-AI collaboration outperforms both extremes.
    - 'Failure attribution strategy: single reflection vs. multi-hypothesis causal
      diagnosis vs. curator-curated negative knowledge; the latter shows transfer
      benefits but adds complexity.'
    - 'Evaluation scope: some works target full paper generation and peer review acceptance,
      while others focus narrowly on experiment planning or artifact quality without
      full manuscript production.'
    - 'Domain specificity: general-purpose ML research agents vs. physics-aware verification
      agents with domain-specific vision-language gates; the latter detects silent
      failures better but is not easily transferable.'
    open_questions:
    - What causal mechanisms are needed to ensure generated scientific claims are
      not just plausible but true, especially when the agent fails to detect silent
      execution errors?
    - How can negative knowledge from failed experiments be systematically shared
      across diverse research tasks without introducing noise or conflicting advice?
    - Can ablation planning and self-correction generalize to novel scientific problems
      where no ground-truth ablations exist, and how should evaluation benchmarks
      be designed for such open-ended settings?
