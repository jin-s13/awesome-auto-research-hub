  literature_review:
    line_of_work_matrix:
    - line: Structured representation of research state for automated writing
      what_it_solves: Transforms raw experimental outcomes, code execution traces,
        and visualizations into coherent, verifiable textual narratives that form
        the core of a scientific paper.
      what_remains_open: Whether the learned representation is sufficient to prevent
        hallucinated numbers and citations when the underlying experiment is noisy
        or incomplete.
    - line: Planning and execution of writing and review actions
      what_it_solves: Connects high-level research goals to concrete writing steps,
        experimental designs, and reviewer feedback loops, enabling closed-loop improvement
        of paper quality.
      what_remains_open: The extent to which performance gains come from the planning
        architecture rather than the base language model's pre-existing writing capabilities.
    - line: Automated evaluation and benchmarking of AI-generated scientific writing
      what_it_solves: Provides tasks, metrics, and simulated review processes to assess
        the completeness, correctness, and persuasiveness of AI-written papers.
      what_remains_open: Coverage of diverse scientific domains and alignment between
        proxy metrics (e.g., ablation recall, review scores) and real-world scientific
        impact.
    - line: End-to-end automated writing pipelines with reproducible infrastructure
      what_it_solves: Integrates idea generation, code execution, result visualization,
        and paper compilation into a single, runnable system that outputs a complete
        manuscript.
      what_remains_open: Standardized external validation across different conferences,
        hardware setups, and user preferences; most pipelines are validated only on
        in-house benchmarks or specific workshops.
    - line: Conceptual taxonomy of failure modes and design principles for AI writing
        agents
      what_it_solves: Organizes observed failures (e.g., implementation drift, overexcitement,
        weak scientific taste) into categories that inform the design of more robust
        writing agents.
      what_remains_open: Direct empirical validation that adherence to these design
        principles predicts higher acceptance rates in real peer review.
    consensus:
    - Large language models can generate plausible scientific manuscripts that mimic
      the structure and style of human-written papers.
    - Current systems are prone to hallucinated numerical results, fabricated citations,
      and implementation drift, necessitating explicit verification gates.
    - Iterative feedback loops, whether from simulated reviewers or self-reflection,
      are essential to improve the quality of AI-generated papers.
    - Human collaboration at key decision points significantly boosts writing quality
      compared to fully autonomous approaches, but the optimal granularity of human
      intervention remains undetermined.
    disagreements:
    - 'Fully autonomous writing vs. human-in-the-loop: some systems target complete
      autonomy, while others show that targeted human intervention is more effective.'
    - 'Domain-specific verification: physics-aware verification gates are used in
      computational fluid dynamics, whereas general-purpose ML writing systems rely
      on LLM-based self-checking, leading to different failure profiles.'
    - 'Failure memory design: single-step reflection, multi-hypothesis causal attribution,
      and persistent negative knowledge banks represent fundamentally different approaches
      to learning from mistakes.'
    - 'Evaluation target: systems are evaluated on internal metrics (e.g., artifact
      quality, metrics-bearing output rate) versus external blind review scores, and
      these measures do not always correlate.'
    open_questions:
    - How can automated writing systems guarantee the factual correctness of numbers
      and references in generated papers without relying on exhaustive human verification?
    - What evaluation benchmarks can holistically capture the quality of scientific
      writing beyond the identification of missing ablations or simulated review scores?
    - To what extent do the reported improvements in paper quality transfer to real
      conference submissions beyond the specific workshops or domains tested?
