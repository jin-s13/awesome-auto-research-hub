  related_work_outline:
  - 'Mainstream direction: Building autonomous multi-agent pipelines that iteratively
    generate, evaluate, and refine scientific hypotheses by integrating LLM reasoning
    with tool use (literature search, code execution) and structured workflows.'
  - 'Shared research pattern: Systems adopt a closed-loop cycle of hypothesis proposal,
    experimental feedback, and iterative optimization, often enhanced by structured
    debate, tree search, or evolutionary mechanisms to explore the hypothesis space.'
  - 'Key differences: Systems vary in autonomy level (fully autonomous vs. human-in-the-loop),
    search strategy (evolutionary, reinforcement learning, debate), domain specificity
    (general-purpose vs. biology/equation discovery), and evaluation approach (benchmarks
    vs. expert review vs. wet-lab validation).'
  - 'Trend evolution: From 2023 to 2026, the field moved from single-agent scripts
    to multi-agent architectures with explicit world models, backtracking, and verifiable
    reporting; human-AI collaboration is increasingly framed as a targeted intervention
    rather than full manual oversight.'
  - 'Open questions: How to guarantee novelty and avoid rediscovery; how to scale
    reliable hypothesis generation beyond 20–30 cycles; how to align proxy metrics
    with real scientific impact; and where to place human judgment for optimal cost–quality
    trade-offs.'
  related_work_outline_zh:
  - 主流方向：构建自主多智能体流水线，通过整合LLM推理与工具使用（文献搜索、代码执行）及结构化工作流，迭代生成、评估和优化科学假设。
  - 研究共性：系统采用假设提出、实验反馈和迭代优化的闭环，常通过结构化辩论、树搜索或进化机制增强假设空间探索。
  - 关键差异：系统在自主程度（完全自主 vs. 人机协作）、搜索策略（进化、强化学习、辩论）、领域特异性（通用 vs. 生物学/方程发现）和评估方式（基准 vs.
    专家评审 vs. 湿实验验证）上存在分化。
  - 趋势演进：2023至2026年，领域从单智能体脚本演进到具有显式世界模型、回溯和可验证报告的多智能体架构；人机协作日益被定位为针对性干预而非全手动监督。
