    line_of_work_matrix:
    - line: Systems and reproducible infrastructure
      what_it_solves: Integrates ideation, coding, execution, analysis, and writing
        into a runnable agent loop, supporting multi-agent roles, failure memory,
        and artifact tracking to automate experimental research. Example systems include
        end-to-end pipelines like The AI Scientist and Jr. AI Scientist, multi-agent
        platforms like Claw AI Lab, and memory-enhanced agents like Negative Knowledge.
