    - 交互模式：智能体在基于文本的模拟环境中操作，直接生成代码，或通过结构化接口控制实验装置。
    - 监督信号：方法涵盖人工设计的奖励函数、竞争优化和进化压力。
    - 部署设置：部分系统针对特定领域（材料科学、粒子物理），其他则试图在ML或科学任务中更通用。
    开放问题:
    - 如何设计自动化评估方法，在不知道真实机制的情况下检测“正确答案、错误机制”的失败？
