    platforms; evaluation is shifting from automated reviewer scores toward standardized
    benchmarks with human baselines.'
  - 'Open questions: How to guarantee reproducibility and factual correctness of autonomously
    generated results; what are the optimal human-AI collaboration strategies for
    different research phases; how well do existing benchmarks capture real scientific
    progress; can these systems handle long-horizon experimental campaigns requiring
    physical lab interaction.'
  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究流水线，将构思、代码执行、实验管理和论文生成整合为闭环，并日益重视多智能体架构和领域特定的验证机制。
  - 研究共性：系统以大型语言模型为核心推理引擎，将研究工作流程分解为假设、实验、分析和写作等模块化阶段，并引入审核机制在最终输出前捕获错误。
  - 关键差异：架构从单智能体到多智能体辩论不等；验证方式从内部逻辑检查到物理感知视觉门控；协作模式涵盖完全自主、固定人类检查点和自适应人在回路；通用性在领域专用（如计算流体力学、应用数学）与跨领域之间分化。
  - 趋势演进：从2024年通用框架，经2025年工作坊级同行评审产出，到2026年领域专用系统和多智能体协作平台；评估正从自动评审评分转向带有真人基线的标准化基准。
  - 开放问题：如何保证自主生成结果的可重复性和事实正确性；不同研究阶段的最佳人机协作策略是什么；现有基准在多大程度上反映真正的科学进步；这些系统能否处理需要物理实验室交互的长期实验活动。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous discovery pipelines
      what_it_solves: Automating the full research cycle from idea generation through
        code execution, experiment, and manuscript writing, reducing the cost and
        time per paper.
      what_remains_open: Reliability across diverse domains, consistency of output
        quality, and the ability to produce truly novel insights beyond incremental
        recombination of known patterns.
    - line: Verification and self-correction mechanisms
      what_it_solves: Catching factual errors, code bugs, hallucinated citations,
        and physically invalid results within the automated workflow before human
        review.
      what_remains_open: Coverage of silent failures remains incomplete (e.g., 2 of
        16 planted failures missed in one study); mechanisms are often domain-specific
        and not easily transferred.
    - line: Benchmarks and evaluation environments
      what_it_solves: Providing standardised tasks, metrics, and human baselines to
        compare different AI scientist systems and reveal their limitations.
      what_remains_open: Whether proxy metrics (task completion, reviewer scores)
        align with real scientific value; limited diversity of topics and lack of
        long-horizon, open-ended challenges.
    - line: Human-AI collaboration and interaction modes
      what_it_solves: Balancing autonomy with human oversight by allowing targeted
        interventions at high-leverage decision points, which can outperform both
        full autonomy and exhaustive oversight.
      what_remains_open: Optimal intervention granularity and timing; cognitive load
        on human experts; how collaboration patterns should differ across creative,
        execution, and verification phases.
    - line: Multi-agent architectures and structured search
      what_it_solves: Improving idea quality and robustness through agentic debate,
        tree search, and dedicated manager agents that coordinate experimentation.
      what_remains_open: Computational overhead of branching and debate; whether the
        gains are due to the search strategy or the additional inference budget; generalisability
        beyond ML domains.
    consensus:
    - Large language models serve as the backbone for all reported systems, enabling
      hypothesis generation, code writing, and text composition.
    - Modular decomposition of the research workflow into hypothesis, experiment,
      analysis, and writing stages is a shared design pattern.
    - Automated verification or review gates are necessary because purely generative
      pipelines produce errors that undermine scientific credibility.
    - Current AI scientist systems perform well on narrow, well-defined tasks but
      struggle with the open-ended exploration and deep domain reasoning required
      for breakthrough discoveries.
    - Human-AI collaboration, even in minimal forms, significantly improves the quality
      and trustworthiness of the output compared to fully autonomous runs.
    disagreements:
    - 'Full autonomy vs. human-in-the-loop: some systems target complete independence,
      while others demonstrate that selective human intervention at key decision points
      yields better results.'
    - 'Single-agent vs. multi-agent design: early frameworks use a monolithic agent,
      whereas later work introduces structured debate, tree search, and role-based
      teams, with no consensus on which architecture is more effective.'
    - 'Domain-specific vs. general-purpose: certain systems couple tightly with domain
      tools and physics simulators (e.g., OpenFOAM, symbolic math), betting on deep
      verification; others claim broad applicability across ML subfields.'
    - 'Evaluation standard: automated reviewer scores, benchmark task completion,
      and real peer-review outcomes are used interchangeably, but their correlation
      with genuine scientific contribution is unproven.'
    open_questions:
    - What mix of verification gates (logical, physical, visual, statistical) is necessary
      and sufficient for reliable autonomous science across disciplines?
    - How can systems distinguish between true novelty and plausible-looking recombination
      of known results, given that LLMs are trained on existing literature?
    - Do current benchmarks like DISCOVERYWORLD or BAISBench measure the same competencies
      needed for real-world scientific discovery, or do they reward superficial pattern
      matching?
    - Under what conditions does multi-agent debate or tree search offer a net benefit
      over a well-prompted single agent with a strong verification loop?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主发现流水线
      解决的问题: 自动化从构思到代码执行、实验和论文撰写的完整研究循环，降低单篇论文的成本和时间。
      尚未覆盖: 在不同领域的可靠性、输出质量的一致性，以及产生超越已知模式增量重组的新颖见解的能力。
    - 路线: 验证与自愈机制
      解决的问题: 在人工审查前，在自动化工作流中捕获事实错误、代码漏洞、虚构引用和物理上无效的结果。
      尚未覆盖: 静默失败的覆盖仍不完整（如一项研究中16个植入失败遗漏2个）；机制多为领域专用，难以迁移。
    - 路线: 基准与评估环境
      解决的问题: 提供标准化任务、指标和人类基线，以比较不同AI科学家系统并揭示其局限性。
      尚未覆盖: 代理指标（任务完成度、评审分数）是否与真实科学价值一致；主题多样性有限，缺乏长期、开放式挑战。
    - 路线: 人机协作与交互模式
      解决的问题: 通过在高杠杆决策点进行精准干预，在自主性与人类监督之间取得平衡，其表现可优于完全自主和详尽监督。
      尚未覆盖: 最优干预粒度和时机；人类专家的认知负荷；协作模式应如何在创意、执行和验证阶段有所不同。
    - 路线: 多智能体架构与结构化搜索
      解决的问题: 通过智能体辩论、树搜索和专用实验管理器智能体来提升想法质量和鲁棒性。
      尚未覆盖: 分支和辩论的计算开销；收益是源于搜索策略还是额外的推理预算；在ML领域之外的泛化能力。
    共识:
    - 大型语言模型是所有报告系统的核心引擎，支撑假设生成、代码编写和文本撰写。
    - 将研究工作流程模块化分解为假设、实验、分析和写作阶段是共享的设计模式。
    - 自动化验证或评审门控是必要的，因为纯生成式流水线会产生损害科学可信度的错误。
    - 当前的AI科学家系统在狭义、定义明确的任务上表现良好，但在突破性发现所需的开放式探索和深层领域推理上仍面临困难。
    - 人机协作，即便是最小形式，也能显著提升输出的质量和可信度，优于完全自主运行。
    分歧:
    - 完全自主 vs. 人在回路：部分系统以完全独立为目标，而另一些系统证明在关键决策点进行选择性人类干预能获得更好结果。
    - 单智能体 vs. 多智能体设计：早期框架使用单体智能体，后续工作引入结构化辩论、树搜索和角色化团队，对于哪种架构更有效尚无共识。
    - 领域专用 vs. 通用：部分系统与领域工具和物理仿真器（如OpenFOAM、符号数学）紧密耦合，押注于深度验证；其他系统则声称跨ML子领域广泛适用。
    - 评估标准：自动评审分数、基准任务完成度和真实同行评审结果被交替使用，但它们与真正科学贡献的相关性未经验证。
    开放问题:
    - 跨学科实现可靠自主科学需要哪些验证门控（逻辑、物理、视觉、统计）的组合，以及多少才足够？
    - 鉴于LLM基于现有文献训练，系统如何区分真正的创新与看似合理的已知结果重组？
    - 当前的基准如DISCOVERYWORLD或BAISBench是否衡量了真实世界科学发现所需的能力，还是仅仅奖励表面模式匹配？
    - 在什么条件下，多智能体辩论或树搜索能比配备强验证循环的精心提示的单智能体带来净收益？
