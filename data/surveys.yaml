  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Automates the full cycle from idea generation, code implementation,
        and experiment execution to paper writing and review, aiming to produce complete
        scientific manuscripts with minimal human intervention.
      what_remains_open: Generated paper quality is inconsistent; only a fraction
        pass peer review; systems often rely on human-authored baseline papers or
        code templates; cross-domain generalization and long-term scientific impact
        are unverified.
    - line: Experiment planning and ablation automation
      what_it_solves: Automates the design of ablation studies to validate components
        of a proposed method, helping researchers or reviewers identify missing experiments.
      what_remains_open: Current language models achieve only 45% recall on ablation
        identification, well below human performance; the inverse performance trend
        between author and reviewer tasks indicates grounding gaps that limit consistent
        behavior.
    - line: Failure-aware memory for iterative experimentation
      what_it_solves: Captures failed attempts as structured negative knowledge, allowing
        downstream agents to avoid repeating mistakes and improve sample efficiency
        on scientific tasks.
      what_remains_open: Evaluated only on a narrow set of PDE tasks; the transferability
        of the negative knowledge bank to broader scientific domains and its scalability
        to long research histories remain untested.
    - line: Benchmarks and virtual environments for discovery agents
      what_it_solves: Provides standardized tasks and metrics to evaluate how well
        agents perform hypothesis formation, experiment design, and conclusion drawing
        in simulated scientific scenarios.
      what_remains_open: Task coverage is limited to a few scientific topics; it is
        unclear whether success on these simulated tasks correlates with genuine scientific
        discovery or real-world lab experimentation.
    - line: Domain-specific autonomous lab concepts
      what_it_solves: Proposes architectural blueprints and community agendas for
        fully automated research labs in specific fields, such as recommender systems,
        integrating ideation, experimentation, and governance.
      what_remains_open: Purely conceptual with no implemented prototype or empirical
        validation; realization depends on community consensus and resource investment,
        and ethical, privacy, and fairness challenges are identified but not resolved.
    consensus:
    - LLM-based agents can perform meaningful subtasks of scientific experimentation,
      such as code generation, experiment execution, and results summarization.
    - Current systems are not yet reliable enough for fully autonomous high-stakes
      research; human oversight, benchmarks, and risk mitigation are necessary.
    - Standardized evaluation environments and metrics are critical for measuring
      progress, as automated review scores may not align with human scientific judgment.
    disagreements:
    - Whether the goal should be full end-to-end paper generation or narrower task
      automation like ablation planning and experiment management.
    - 'Single-agent versus multi-agent architectures: some systems use a monolithic
      agent while others decompose the workflow into specialized roles with coordination
      overhead.'
    - 'Evaluation methodology: automated AI reviewers, benchmark task completion,
      human expert judgment, and real conference submission outcomes are used across
      papers, with no consensus on which best captures scientific merit.'
    - 'Domain scope: most systems target general ML research, while one position paper
      argues for field-specific autonomous labs, raising questions about the transferability
      of approaches across disciplines.'
    open_questions:
    - How can we verify that an agent-generated experiment is reproducible and its
      conclusions are scientifically sound, given that code and data artifacts may
      contain subtle errors?
    - Can failure memory mechanisms generalize beyond the narrow PDE domains tested,
      and how should negative knowledge be represented to support long-term, cumulative
      research?
    - What is the right balance between exploration (novel idea generation) and exploitation
      (rigorous verification) in automated experimentation, and how should an agent
      decide when to abandon a failing direction?
    - How should the risks of fully autonomous research—such as generating plausible
      but incorrect findings, amplifying biases, or violating ethical norms—be systematically
      detected and governed?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流程
      解决的问题: 自动化从想法生成、代码实现、实验执行到论文撰写和评审的完整循环，旨在以最少人工干预产出完整科学手稿。
      尚未覆盖: 生成论文质量不稳定，仅部分通过同行评审；系统常依赖人类编写的基线论文或代码模板；跨领域泛化能力和长期科学影响未经证实。
    - 路线: 实验规划与消融自动化
      解决的问题: 自动设计消融研究以验证所提方法的组件，帮助研究者或审稿人发现缺失的实验。
      尚未覆盖: 当前语言模型在消融识别上仅达到45%召回率，远低于人类水平；作者与审稿人任务间的反向性能趋势表明存在基础偏差，限制了行为一致性。
    - 路线: 面向迭代实验的失败感知记忆
      解决的问题: 将失败尝试捕获为结构化的负知识，使下游智能体避免重复错误，提高科学任务的样本效率。
      尚未覆盖: 仅在狭窄的PDE任务集上评估；负知识库向更广泛科学领域的可迁移性及其在长周期研究历史中的可扩展性尚未测试。
    - 路线: 面向发现智能体的基准与虚拟环境
      解决的问题: 提供标准化任务和指标，评估智能体在模拟科学场景中进行假设形成、实验设计和结论推断的能力。
      尚未覆盖: 任务覆盖的科学主题有限；尚不清楚在这些模拟任务上的成功是否与真正的科学发现或真实实验室实验相关。
    - 路线: 领域特定的自主实验室概念
      解决的问题: 为特定领域（如推荐系统）的全自动研究实验室提出架构蓝图和社区议程，整合构思、实验和治理。
      尚未覆盖: 纯概念性，无实现原型或实证验证；实现依赖社区共识和资源投入；伦理、隐私和公平挑战已被识别但未解决。
    共识:
    - 基于LLM的智能体能够执行科学实验的有意义子任务，如代码生成、实验执行和结果总结。
    - 当前系统尚不足以可靠地进行完全自主的高风险研究；人类监督、基准测试和风险缓解是必要的。
    - 标准化的评估环境和指标对于衡量进展至关重要，因为自动评审分数可能与人类科学判断不一致。
    分歧:
    - 目标应是全端到端论文生成，还是更窄的任务自动化，如消融规划和实验管理。
    - 单智能体与多智能体架构：部分系统使用单体智能体，而其他系统将工作流分解为专门角色，带来协调开销。
    - 评估方法：各论文使用自动AI评审、基准任务完成度、人类专家判断和真实会议投稿结果，未就哪种方式最能捕捉科学价值达成共识。
    - 领域范围：多数系统针对通用机器学习研究，而一篇立场论文主张领域特定的自主实验室，引发了对跨学科方法可迁移性的疑问。
    开放问题:
    - 如何验证智能体生成的实验是可复现的且其结论在科学上可靠，因为代码和数据工件可能包含细微错误？
    - 失败记忆机制能否泛化到已测试的狭窄PDE领域之外，以及负知识应如何表示以支持长期累积研究？
    - 自动化实验中探索（新颖想法生成）与利用（严格验证）之间的最佳平衡是什么，智能体应如何决定何时放弃失败方向？
    - 应如何系统性地检测和治理全自主研究的风险，例如生成看似合理但错误的发现、放大偏见或违反伦理规范？
