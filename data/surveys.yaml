    architectures, and rigorous benchmarks; the first AI-generated workshop paper
    passing peer review marks a shift toward external validation.'
  - 'Open questions: How to guarantee the scientific correctness of generated claims
    beyond surface-level metrics, what degree of human involvement is necessary for
    high-stakes discovery, and how to build evaluation protocols that capture true
    novelty rather than pattern matching against existing literature.'
  related_work_outline_zh:
  - 主流方向：构建端到端自主研究智能体，整合构思、代码执行、实验管理和论文撰写，日益强调通过验证门控、多智能体协作和人机监督来增强可靠性。
  - 研究共性：以大型语言模型为核心推理引擎，将科学工作流分解为模块化阶段，通过自动或人工评审验证输出，并通常发布代码和基准以展示可复现性。
  - 关键差异：系统在领域通用性（通用与特定领域如CFD或组学）、交互模式（完全自主与人机协作）、验证机制（视觉-语言物理门控、自愈执行器或模拟审稿人）和评估目标（基准分数、同行评审接受度或专家判断）上存在分歧。
  - 趋势演进：从2024年到2026年，前沿从端到端论文生成的初始框架，发展到专用物理科学智能体、多智能体架构和严格的基准测试；首个AI生成的工作坊论文通过同行评审，标志着向外部验证的转变。
  - 开放问题：如何在表面指标之外保证生成主张的科学正确性，高风险发现需要何种程度的人类参与，以及如何构建能够捕捉真正新颖性而非仅模式匹配现有文献的评估协议。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Automates the full scientific discovery cycle from hypothesis
        generation to manuscript writing, reducing cost and enabling rapid exploration
        of ideas.
      what_remains_open: The reliability of generated claims and experimental results
        is inconsistent; success often depends on human‑authored code templates or
        narrow domains, and full peer‑review acceptance remains rare.
    - line: Domain‑specific verification and physics‑aware discovery
      what_it_solves: Integrates domain knowledge (e.g., physics simulations) into
        the agent loop, catching silent failures that generic systems miss, and producing
        defensible domain results.
      what_remains_open: Verification gates are not perfect (missed failures), and
        the approach is tied to specific simulation environments; generalization to
        other scientific fields is unproven.
    - line: Benchmarks and evaluation environments for AI scientists
      what_it_solves: Provides standardized tasks and metrics to compare different
        AI scientist systems, replacing ad‑hoc demonstrations with reproducible evaluation.
      what_remains_open: Current benchmarks focus on narrow tasks or proxy metrics;
        they may not correlate with genuine scientific discovery ability, and human
        baseline data is limited.
    - line: Multi‑agent collaboration and human‑in‑the‑loop architecture
      what_it_solves: Improves robustness and interpretability by structuring research
        as a multi‑agent debate, adding self‑healing execution, and allowing human
        intervention at critical decision points.
      what_remains_open: The optimal balance between autonomy and human guidance is
        unclear, and the platforms are still early‑stage with limited external validation
        beyond a few case studies.
    - line: Surveys and taxonomies of agentic AI for science
      what_it_solves: Organizes the fragmented landscape of systems, tools, and evaluation
        practices, highlighting challenges and future directions.
      what_remains_open: The proposed taxonomies lack direct empirical validation
        that they predict system performance or guide practical design choices.
    consensus:
    - Large language models serve as the central reasoning and planning component
      across all implementations.
    - 'The scientific discovery workflow is universally decomposed into stages: literature
      review, hypothesis generation, experiment design, execution, analysis, and writing.'
    - Verification or validation steps are recognized as critical to avoid fabricated
      results, although their implementation varies.
    - Reproducibility is promoted through open-source code, benchmarks, and shared
      artifacts.
    disagreements:
    - 'Domain scope: general-purpose systems aim for broad applicability, while domain‑specific
      agents embed expert knowledge to achieve reliability in one field.'
    - 'Interaction paradigm: some systems pursue full automation, others emphasize
      human collaboration at key decision points, and a few offer flexible modes.'
    - 'Verification strategy: physics‑aware vision‑language gates, self‑healing code
      executors, and simulated reviewer scores represent fundamentally different trust
      mechanisms.'
    - 'Evaluation target: success is measured by internal benchmark scores, external
      peer review acceptance, or expert preference, with no agreed‑upon standard.'
    open_questions:
    - What evaluation protocol can reliably distinguish true novelty from plausible‑looking
      but trivial contributions?
    - How can we ensure that domain‑specific verification generalizes to fields without
      clear simulation environments?
    - What is the minimal human intervention needed to prevent silent failures while
      preserving the speed and scale of autonomous discovery?
    - Can AI scientist systems move beyond workshop‑level novelty to produce findings
      that impact real‑world scientific practice?
