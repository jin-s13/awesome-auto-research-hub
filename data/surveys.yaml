    研究路线矩阵:
    - 路线: 系统与可复现基础设施
      解决的问题: 将单点模型想法转化为端到端自主研究管线，以可重复的方式处理构思、代码执行、实验管理和手稿撰写。
      尚未覆盖: 跨多种科学领域的标准化外部验证，以及在没有人类编写代码模板或领域特定脚手架的情况下，产生真正新颖且可辩护成果的能力。
    - 路线: 评测与证据设计
      解决的问题: 通过基准任务、自动评审量表以及检查逻辑一致性或物理有效性的显式验证门控，使自主研究系统的主张具有可比性。
      尚未覆盖: 多样化真实科学任务的覆盖度，以及代理指标（如自动评审分数）与实际科学贡献或真实性之间的对齐。
    - 路线: 动作条件控制与规划
      解决的问题: 将失败诊断与研究循环中的具体干预连接起来，例如从假设重新路由到实现修复，或在实验失败后触发自愈执行。
      尚未覆盖: 性能提升有多少来自干预逻辑本身，而非底层失败归因的质量，以及学习到的控制策略能否跨任务泛化。
    - 路线: 概念分类与理论
      解决的问题: 将碎片化的失败观察组织为结构化分类和设计原则，以指导构建更稳健的AI科学家。
      尚未覆盖: 直接实证验证所提出的失败类别或设计原则是否能在新条件下预测下游系统行为。
    共识:
    - 自主研究系统需要内部验证环路，以便在人工审查之前捕获逻辑错误、幻觉结果或物理上无效的输出。
    - 简单的单步反思或检索是不够的；结构化的失败处理，如多假设归因或策展的负知识，能显著提升研究产出质量。
    - 基于LLM的科学家仍然存在领域智能不足、过早宣布成功的过度兴奋倾向以及薄弱的科学品味，这限制了它们当前作为完全独立研究者的能力。
    - 在关键决策点注入人机协作，其效果优于完全自主和详尽的逐步人工监督。
    分歧:
    - 自主程度：一些系统主张以最少人工干预实现完全自主，而另一些则集成七种人机协同模式，表明最优研究需要不同程度的人类指导。
    - 失败处理策略：一种路线使用共享负知识库避免重复错误，另一种使用多假设因果归因并路由到正确的干预级别，第三种则依赖领域专用验证门控（如视觉-语言物理检查）而非通用失败记忆。
    - 验证范围：AI CFD Scientist采用领域专用的物理验证门控，而ReasFlow使用通用逻辑一致性审计，SAGE则将报告约束为实测值，反映出领域内验证与领域无关验证之间的分野。
    - 评测方法：一些工作通过自动评审分数评估，其他使用工件质量评分或任务特定指标如壁面Cf RMSE，还有一项依赖真实同行评审接受，这反映了对何为有效评估科学产出的不同假设。
    开放问题:
    - 如何设计验证门控，既能检测微妙、非灾难性的失败（如AI CFD Scientist中16个植入失败遗漏2个），又不会因过多误报而扼杀创新探索？
    - 负知识或失败记忆能在多大程度上跨科学领域迁移，以及何种机制可防止记忆退化为限制新颖假设生成的陈旧约束列表？
    - 在自动生成论文仍需领域专家验证的情况下，能最大化研究质量同时保持系统可扩展的最小人机干预点集是什么？
    - 社区应如何建立长期评估框架，以衡量自主生成研究的科学影响力，而非短期代理指标如基准分数或接受率？
