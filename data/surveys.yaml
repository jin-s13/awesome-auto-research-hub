    - line: End-to-end autonomous research agent frameworks
      what_it_solves: Automating the full scientific discovery cycle—ideation, code
        implementation, experiment execution, result visualization, and manuscript
        writing—to reduce human effort and enable high-throughput exploration.
      what_remains_open: The generated papers often lack defensible novelty; inconsistency
