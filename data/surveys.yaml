  literature_review:
    line_of_work_matrix:
    - line: Autonomous hypothesis generation pipelines
      what_it_solves: End-to-end automation of the scientific discovery loop—literature
        grounding, hypothesis formation, experimental design, and iterative refinement—reducing
        researcher manual effort and accelerating exploration.
      what_remains_open: Long-horizon reliability beyond ~20 cycles, formal guarantees
        against hallucinated or trivial hypotheses, and generalization across disciplines
        without task-specific retuning.
    - line: Human-AI collaborative hypothesis generation
      what_it_solves: Injecting human judgment at high-leverage decision points to
        improve hypothesis quality, catch errors early, and maintain scientific accountability
        in otherwise autonomous workflows.
      what_remains_open: Optimal intervention granularity and timing; cost–benefit
        trade-offs between human effort and hypothesis gain; and standardized protocols
        for measuring collaboration efficiency.
    - line: Structured search and optimization over hypothesis spaces
      what_it_solves: Systematic exploration of combinatorial or continuous hypothesis
        spaces via evolutionary algorithms, tree search with backtracking, or reinforcement
        learning, avoiding local optima and premature convergence.
      what_remains_open: Theoretical efficiency bounds, integration of prior knowledge
        as inductive bias, and empirical evidence that structured search yields hypotheses
        beyond what random or greedy baselines can find.
    - line: Evaluation and benchmarking for hypothesis generation
      what_it_solves: Providing reproducible tasks, metrics, and baselines to compare
        hypothesis generation systems, revealing capability gaps and tracking progress
        over time.
      what_remains_open: Alignment between benchmark scores and real-world scientific
        utility; coverage of open-ended, long-term, and interdisciplinary hypothesis
        quality; and dynamic benchmarks that resist saturation.
    consensus:
    - LLMs serve as the central reasoning engine, orchestrating tool calls (literature
      search, code execution) to ground hypothesis generation in external evidence.
    - Iterative closed-loop architectures—propose, test, refine—are essential; single-pass
      generation is insufficient for non-trivial scientific hypotheses.
    - 'Verifiability and traceability are critical: systems increasingly require that
      every claim be backed by executable code or literature references to combat
      hallucination.'
    - Fully autonomous systems still underperform on tasks requiring deep novelty,
      contextual judgment, or ethical accountability, motivating hybrid human-AI designs.
    disagreements:
    - 'Autonomy boundary: some systems aim for full autonomy with human oversight
      only at the final report stage, while others interleave human feedback at multiple
      intermediate steps.'
    - 'Search paradigm: evolutionary methods, tree-based backtracking, and RL-based
      optimization represent fundamentally different assumptions about how to explore
      the hypothesis space, with no clear winner across domains.'
    - 'Domain generality vs. specificity: general-purpose systems (e.g., Kosmos) claim
      broad applicability but may miss domain-specific inductive biases, whereas domain-tuned
      systems (e.g., Robin in biology) risk overfitting to narrow workflows.'
    - 'Evaluation philosophy: benchmark-driven evaluation (ARC-Bench, LABBench2) emphasizes
      standardized comparison, while expert review and wet-lab validation prioritize
      scientific truth, creating tension between reproducibility and ecological validity.'
    open_questions:
    - What formal guarantees can be provided that an AI-generated hypothesis is both
      novel and scientifically sound, beyond post-hoc expert review?
    - How can hypothesis generation systems maintain reliability when scaled to hundreds
      of cycles, given current evidence is limited to 20–30 iterations?
    - Under what conditions does human intervention most improve hypothesis quality,
      and can these conditions be learned automatically from task difficulty or system
      confidence?
    - How should we design evaluation protocols that capture the long-term impact
      and cross-disciplinary value of a hypothesis, rather than only immediate proxy
      metrics?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 自主假设生成流水线
      解决的问题: 端到端自动化科学发现循环——文献基础、假设形成、实验设计和迭代优化——减少研究人员手动工作并加速探索。
      尚未覆盖: 超过约20个循环的长期可靠性、对幻觉或平凡假设的形式化保证，以及无需任务特定重调的跨学科泛化。
    - 路线: 人机协作假设生成
      解决的问题: 在高杠杆决策点注入人类判断，以提高假设质量、早期捕获错误，并在其他方面自主的工作流中维持科学问责。
      尚未覆盖: 最优干预粒度和时机；人类努力与假设收益之间的成本效益权衡；以及衡量协作效率的标准化协议。
    - 路线: 假设空间的结构化搜索与优化
      解决的问题: 通过进化算法、带回溯的树搜索或强化学习，系统探索组合或连续假设空间，避免局部最优和过早收敛。
      尚未覆盖: 理论效率边界、将先验知识作为归纳偏置的整合，以及结构化搜索能产生超越随机或贪心基线假设的经验证据。
    - 路线: 假设生成的评估与基准测试
      解决的问题: 提供可复现的任务、指标和基线，以比较假设生成系统，揭示能力差距并追踪进展。
      尚未覆盖: 基准分数与真实世界科学效用之间的一致性；对开放式、长期和跨学科假设质量的覆盖；以及能抵抗饱和的动态基准。
    共识:
    - LLM作为核心推理引擎，协调工具调用（文献搜索、代码执行），将假设生成建立在外部证据之上。
    - 迭代闭环架构——提出、测试、优化——至关重要；单次生成不足以应对非平凡的科学假设。
    - 可验证性和可追溯性至关重要：系统日益要求每个声明都有可执行代码或文献引用支持，以对抗幻觉。
    - 完全自主系统在需要深度新颖性、情境判断或伦理问责的任务上仍表现不足，推动了混合人机设计。
    分歧:
    - 自主边界：部分系统追求完全自主，仅在最终报告阶段接受人类监督，而其他系统在多个中间步骤穿插人类反馈。
    - 搜索范式：进化方法、基于树的回溯和基于强化学习的优化代表了探索假设空间的根本不同假设，跨领域尚无明确胜者。
    - 领域通用性与特异性：通用系统（如Kosmos）声称广泛适用但可能缺失领域特定的归纳偏置，而领域调优系统（如Robin在生物学中）则面临过度拟合狭窄工作流的风险。
    - 评估哲学：基准驱动的评估（ARC-Bench、LABBench2）强调标准化比较，而专家评审和湿实验验证优先考虑科学真实性，在可复现性和生态效度之间产生张力。
    开放问题:
    - 除了事后专家评审，能提供何种形式化保证，确保AI生成的假设既新颖又科学可靠？
    - 鉴于当前证据仅限于20–30次迭代，假设生成系统在扩展到数百个循环时如何保持可靠性？
    - 在何种条件下人类干预最能提升假设质量，这些条件能否根据任务难度或系统置信度自动学习？
    - 如何设计评估协议，以捕捉假设的长期影响和跨学科价值，而非仅关注即时代理指标？
