  - 'Mainstream direction: Building LLM-based autonomous agent systems that iteratively
    generate and refine scientific hypotheses by integrating literature search, data
    analysis, and experimental feedback.'
  - 'Shared research pattern: All systems adopt a closed-loop paradigm where hypothesis
    generation is coupled with verification steps, using LLMs as the core reasoning
    and code-generation engine.'
  - 'Key differences: Autonomy level (fully autonomous vs. human-in-the-loop), hypothesis
    representation (natural language vs. formal equations), evaluation target (end-to-end
    report accuracy vs. benchmark task scores vs. failure mode auditing), and domain
    specificity (general-purpose vs. biology/chemistry-focused).'
  - 'Trend evolution: From 2023–2026, the field moved rapidly from conceptual surveys
    and early prototypes to concrete system implementations, specialized benchmarks,
    and critical failure-mode analyses, indicating a shift toward empirical rigor
    and reliability assessment.'
  - 'Open questions: How to prevent error accumulation over long-horizon discovery
    cycles, how to design metrics that align with real scientific utility, and how
    to balance autonomy with human oversight to avoid hidden pitfalls.'
  related_work_outline_zh:
  - 主流方向：构建基于大语言模型的自主智能体系统，通过整合文献搜索、数据分析和实验反馈，迭代生成并优化科学假设。
  - 研究共性：所有系统均采用闭环范式，将假设生成与验证步骤耦合，并以LLM作为核心推理与代码生成引擎。
  - 关键差异：自主程度（完全自主 vs. 人机协同）、假设表示形式（自然语言 vs. 形式化方程）、评测目标（端到端报告准确性 vs. 基准任务得分 vs. 失败模式审计）以及领域专长（通用
    vs. 聚焦生物/化学）。
  - 趋势演进：2023至2026年间，领域从概念综述和早期原型迅速转向具体系统实现、专用基准和失败模式分析，表明正朝着实证严谨性和可靠性评估方向发展。
  - 开放问题：如何防止长周期发现中的错误累积，如何设计反映真实科学效用的指标，以及如何在自主性与人类监督间取得平衡以避免隐藏陷阱。
  literature_review:
    line_of_work_matrix:
    - line: Iterative autonomous hypothesis generation and verification systems
      what_it_solves: Automating the full cycle from raw data and literature to testable
        hypotheses, experiment design, and result interpretation using LLM agents.
      what_remains_open: Reliability over long horizons, error accumulation across
        cycles, and generalization beyond the training distribution of the underlying
        LLMs.
    - line: Conceptual taxonomy and workflow analysis for automated research
      what_it_solves: Providing structured frameworks to categorize levels of automation,
        workflow conditions, and evaluation dimensions for AI scientist systems.
      what_remains_open: Direct empirical validation that the proposed categories
        predict system behavior or guide design choices in practice.
    - line: Benchmarking and failure-mode analysis
      what_it_solves: Creating standardized tasks and controlled experiments to measure
        capability and expose hidden pitfalls such as data leakage, metric misuse,
        and selection bias.
      what_remains_open: Coverage of diverse scientific domains and alignment between
        proxy metrics and real-world discovery impact.
    consensus:
    - LLMs serve as the central reasoning engine for hypothesis generation, often
      augmented with code execution for data analysis and equation fitting.
    - Iterative feedback loops that incorporate experimental results or literature
      evidence are essential for refining initial hypotheses.
    - Current systems lack robust safeguards against subtle failures, and transparency
      via execution traces is critical for trustworthiness.
    disagreements:
    - 'Interaction mode: some systems pursue full autonomy over multi-hour runs, while
      others advocate mixed-initiative collaboration with human researchers.'
    - 'Hypothesis representation: natural language hypotheses dominate general-purpose
      systems, whereas domain-specific systems favor formal symbolic expressions like
      mathematical equations.'
    - 'Evaluation philosophy: one line emphasizes end-to-end accuracy of generated
      scientific reports, another focuses on benchmark task performance, and a third
      audits failure modes directly.'
    open_questions:
    - How can we bound error propagation when hypotheses from earlier cycles condition
      later search and experimentation?
    - What evaluation protocols can capture the novelty and long-term impact of a
      generated hypothesis beyond immediate accuracy?
    - Under what conditions does increased automation reduce the detectability of
      flawed reasoning, and how should human oversight be structured to mitigate this?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 迭代式自主假设生成与验证系统
      解决的问题: 利用LLM智能体自动化从原始数据和文献到可检验假设、实验设计与结果解释的完整循环。
      尚未覆盖: 长周期可靠性、跨循环错误累积，以及超出底层LLM训练分布的泛化能力。
    - 路线: 自动化研究的概念分类与工作流分析
      解决的问题: 提供结构化框架，对AI科学家系统的自动化程度、工作流条件和评估维度进行分类。
      尚未覆盖: 所提出的分类能否预测系统行为或指导实际设计选择，仍缺乏直接实证验证。
    - 路线: 基准构建与失败模式分析
      解决的问题: 创建标准化任务和受控实验，以衡量能力并暴露数据泄露、指标误用和选择偏差等隐藏陷阱。
      尚未覆盖: 对多样科学领域的覆盖，以及代理指标与真实世界发现影响力之间的一致性。
    共识:
    - LLM作为假设生成的核心推理引擎，通常辅以代码执行进行数据分析和方程拟合。
    - 包含实验结果或文献证据的迭代反馈循环对于优化初始假设至关重要。
    - 当前系统缺乏针对细微失败的鲁棒防护，通过执行轨迹实现透明性对可信度至关重要。
    分歧:
    - 交互模式：部分系统追求数小时完全自主运行，而另一些则主张与人类研究者进行混合主动协作。
    - 假设表示：通用系统多采用自然语言假设，而领域专用系统倾向于形式化符号表达，如数学方程。
    - 评估理念：一条路线强调生成科学报告的端到端准确性，另一条关注基准任务性能，第三条则直接审计失败模式。
    开放问题:
    - 当早期循环的假设影响后续搜索和实验时，如何限制错误传播？
    - 何种评估协议能够捕捉生成假设的新颖性和长期影响，而非仅衡量即时准确性？
    - 在何种条件下，增加自动化会降低有缺陷推理的可检测性，应如何构建人类监督以缓解此问题？
