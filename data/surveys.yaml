  literature_review:
    line_of_work_matrix:
    - line: Multi-agent review generation
      what_it_solves: Automates end-to-end literature review writing by assigning
        outlining, drafting, editing, and reviewing to specialized agents, improving
        readability and citation quality over single-pass generation.
      what_remains_open: Factual accuracy beyond surface similarity to human reviews
        is unverified; evaluation is limited to a few datasets; reproducibility signals
        are weak (code and artifacts not fully available).
    - line: Iterative and hierarchical literature structuring
      what_it_solves: Organizes large collections of scientific studies into hierarchical
        or iteratively refined structures to support deeper survey automation and
        easier human navigation.
      what_remains_open: No empirical evidence or methodology details are provided
        in the packet; effectiveness, scalability, and comparison to simpler retrieval-augmented
        generation remain unknown.
    - line: Peer review simulation and robustness
      what_it_solves: Simulates peer review dynamics with LLM agents to understand
        vulnerabilities, gaming, and reliability of automated review systems under
        adversarial inputs.
      what_remains_open: Lack of standardized benchmarks for peer review quality;
        no evidence on how these simulations correlate with real human review outcomes;
        adversarial defenses are not yet proposed.
    - line: Self-evolving retrieval agents
      what_it_solves: Enables literature retrieval agents that adapt and improve their
        search strategies over time without manual redesign.
      what_remains_open: No implementation or evaluation evidence is available; the
        concept of self-evolution in retrieval is not validated against static retrieval
        baselines.
    - line: Benchmarking research automation agents
      what_it_solves: Provides task suites to measure LLM agents' ability to automate
        research workflows, such as post-training pipelines, which could extend to
        literature review tasks.
      what_remains_open: Direct relevance to literature review is unclear; no results
        or analysis are included; the benchmark's coverage of review-specific subtasks
        is not demonstrated.
    consensus:
    - LLM-based agents are the dominant approach for automating literature review
      and related scholarly tasks.
    - Decomposing the review process into multiple steps or specialized roles is a
      shared design principle.
    - There is a common goal of improving the efficiency and quality of scientific
      literature synthesis through automation.
    disagreements:
    - 'The scope of automation varies: some systems target full survey writing, others
      focus on study organization or peer review, with no unified task definition.'
    - 'Evaluation practices diverge: one line uses similarity to human-written reviews,
      another examines adversarial robustness, and most systems lack reported empirical
      results.'
