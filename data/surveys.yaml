      尚未覆盖: 自动评审的准确性和泛化能力，以及其捕捉细微科学缺陷或评估长期影响的能力。
    共识:
    - 基于LLM的智能体可以部分自动化科学工作流，但仍缺乏可靠性和深层领域智能。
    - 需要多维度评估，结合任务完成度、结果质量和过程有效性。
    - 人类监督或真实同行评审仍然是AI生成研究的关键验证步骤。
    分歧:
    - 评估方式不同：有的使用自动指标和模拟评审员，有的依赖真实同行评审或基于物理的验证门控。
    - 系统架构从单智能体迭代循环到具有专门角色的多智能体团队不等。
    - 领域焦点从通用机器学习到专业科学领域，影响了验证机制的设计。
    开放问题:
    - 自动评审员如何在跨领域评估新颖性和正确性时达到人类水平的准确性？
    - 何种机制可以赋予AI科学家科学品味并防止“过度兴奋”？
    - 如何确保AI生成的发现具有可复现性，而非特定代码或数据环境的产物？
