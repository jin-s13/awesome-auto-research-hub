  related_work_outline:
  - 'Mainstream direction: Building multi-agent or LLM-driven autonomous scientific
    discovery pipelines that tightly integrate hypothesis generation with iterative
    cycles of data analysis, literature search, and experimental feedback, mostly
    evaluated on synthetic benchmarks or domain-specific wet-lab tasks.'
  - 'Shared research pattern: Framing hypothesis generation as a search or optimization
    problem within a closed-loop system, using LLM-based reasoning or code generation,
    and emphasizing traceability, reproducibility, and varying degrees of human collaboration.'
  - 'Key differences: Hypothesis generation strategies range from evolutionary tree
    search and structured debate to world-model-driven information sharing and direct
    code-based optimization; human intervention modes differ in granularity and timing;
    evaluation settings span synthetic benchmarks, real biomedical experiments, and
    conceptual taxonomies without empirical validation.'
  - 'Trend evolution: From 2025 proof-of-concept systems (Kosmos, Robin, SR-Scientist)
    to 2026 more complex architectures with branching, backtracking, and cross-run
    evolution (AutoResearchClaw, OR-Agent), alongside improved benchmarks (LABBench2)
    and comprehensive surveys codifying design principles and challenges.'
  - 'Open questions: Alignment of generated hypotheses with real scientific novelty
    and utility; error accumulation and reliability over long cycles; weak-direction
    rejection and resource efficiency; cross-domain generalization; metrics that correlate
    with actual scientific progress; ethical and accountability frameworks for autonomous
    research.'
  related_work_outline_zh:
  - 主流方向：构建多智能体或LLM驱动的自主科学发现流水线，将假设生成与数据分析、文献搜索和实验反馈的迭代循环紧密集成，多在合成基准或领域特定的湿实验任务上评估。
  - 研究共性：将假设生成视为闭环系统中的搜索或优化问题，利用基于LLM的推理或代码生成，强调可追溯性、可重复性以及不同程度的人机协作。
  - 关键差异：假设生成策略涵盖进化树搜索、结构化辩论、世界模型驱动的信息共享和直接代码优化；人机干预的粒度和时机不同；评测设置涵盖合成基准、真实生物医学实验和缺乏实证验证的概念分类框架。
  - 趋势演进：从2025年的概念验证系统（Kosmos、Robin、SR-Scientist）到2026年具有分支、回溯和跨运行进化能力的更复杂架构（AutoResearchClaw、OR-Agent），同时改进的基准（LABBench2）和综合综述工作将设计原则与挑战体系化。
  - 开放问题：生成的假设与真实科学新颖性和效用的对齐；长周期运行中的错误累积与可靠性；弱方向拒绝与资源效率；跨领域泛化；与真实科学进步相关的评估指标；自主研究的伦理与问责框架。
  literature_review:
    line_of_work_matrix:
    - line: Action-conditioned control and planning
      what_it_solves: Automating the search, optimization, and decision-making of
        the hypothesis generation process by guiding exploration through evolutionary
        algorithms, tree-based branching with backtracking, multi-agent debate, or
        iterative code-driven refinement.
      what_remains_open: Balancing search efficiency with hypothesis novelty, avoiding
        local optima, and rapidly rejecting unpromising directions without human intervention;
        most evidence is limited to a few runs or cycles.
    - line: Evaluation and evidence design
      what_it_solves: Providing benchmarks, metrics, and baselines that enable comparable
        measurement of hypothesis generation systems, covering aspects such as novelty,
        validity, reliability, and provenance of generated findings.
      what_remains_open: Proxy metrics lack validated correlation with real-world
        scientific utility; benchmarks are mostly narrow in domain coverage, and the
        reproducibility of evaluation protocols themselves remains under-examined.
    - line: Systems and reproducible infrastructure
      what_it_solves: Integrating hypothesis generation algorithms into runnable,
        end-to-end scientific discovery pipelines with shared code, data, and agent
        orchestration, enabling repeatable workflows and artifact reuse.
      what_remains_open: Standardized validation across heterogeneous hardware, cloud
        environments, and external lab interfaces; long-run stability and error recovery
        beyond the demonstrated number of cycles.
    - line: Conceptual taxonomy and theory
      what_it_solves: Organizing the space of autonomous research systems into stages,
        autonomy levels, and evaluation dimensions, providing a shared vocabulary
        for comparing designs and identifying gaps.
      what_remains_open: Direct empirical validation that these taxonomies predict
        actual system behavior, failure modes, or task suitability; frameworks are
        mostly derived from survey synthesis rather than controlled experiments.
    consensus:
    - Hypothesis generation is embedded in an iterative closed-loop that includes
      data analysis, literature grounding, and experimental feedback.
    - LLM-based agents or multi-agent architectures serve as the core engine for proposing,
      refining, and selecting hypotheses.
    - Human collaboration improves the quality and trustworthiness of automatically
      generated hypotheses, especially at high-leverage decision points.
    - Traceability and verifiability of generated hypotheses are critical, driving
      the need for explicit provenance and report accuracy metrics.
    - The field lacks a unified evaluation protocol; current systems rely on a mix
      of custom benchmarks, domain-specific tasks, and qualitative human judgment.
    disagreements:
    - 'Hypothesis generation strategy: some systems use evolutionary search and structured
      backtracking, while others use world-model-driven information sharing, multi-agent
      debate, or direct code-based optimization without explicit search.'
    - 'Human intervention model: systems differ in whether humans intervene at coarse-grained
      high-leverage points, through fine-grained step-by-step oversight, or only as
      external validators after full autonomy.'
    - 'Evaluation setting: some works evaluate on synthetic algorithm benchmarks,
      others on biological wet-lab experiments, and others only propose conceptual
      frameworks without empirical validation, making direct comparison difficult.'
    - 'Domain specificity: systems are designed and tested on a single scientific
      domain (e.g., combinatorial optimization, biology, equation discovery) versus
      being presented as general-purpose frameworks.'
    - 'Autonomy scope: fully autonomous lab-in-the-loop systems with real experimental
      feedback versus simulation-only or text-based verification loops, affecting
      the credibility of the generated hypotheses.'
    open_questions:
    - How can we verify that a generated hypothesis is truly novel and not merely
      a recombination of known ideas, without exhaustive human review?
    - What mechanisms can reliably detect and terminate unproductive research directions
      early, preventing waste of compute and human effort?
    - Do current evaluation metrics (e.g., report accuracy, benchmark score) actually
      predict the long-term scientific value of a hypothesis?
    - What is the minimal human intervention required to maintain hypothesis quality
      as system autonomy scales to longer cycles and more diverse domains?
    - How should responsibility and accountability be assigned when an autonomous
      system generates a plausible but ultimately incorrect or harmful hypothesis?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 动作条件控制与规划
      解决的问题: 通过进化算法、基于树的分支与回溯、多智能体辩论或迭代代码驱动优化，自动化假设生成过程的搜索、优化和决策。
      尚未覆盖: 搜索效率与假设新颖性的平衡，避免局部最优，以及无需人工干预即可快速拒绝错误方向；现有证据大多限于少数运行或周期。
    - 路线: 评测与证据设计
      解决的问题: 提供基准、指标和基线，使假设生成系统的新颖性、有效性、可靠性和来源等方面可比较衡量。
      尚未覆盖: 代理指标与真实科学效用的验证关联不足；基准在领域覆盖上大多较窄，且评估协议本身的可重复性尚未得到充分检验。
    - 路线: 系统与可复现基础设施
      解决的问题: 将假设生成算法集成到可运行的端到端科学发现流水线中，提供共享代码、数据和智能体编排，实现可重复的工作流和工件复用。
      尚未覆盖: 跨异构硬件、云环境和外部实验室接口的标准化验证；超出已论证周期数的长期运行稳定性与错误恢复。
    - 路线: 概念分类与理论
      解决的问题: 将自主研究系统空间组织为阶段、自主性级别和评估维度，为比较设计和识别缺口提供共享词汇。
      尚未覆盖: 这些分类能预测实际系统行为、失败模式或任务适用性的直接实证验证；框架多源于综述综合，而非受控实验。
    共识:
    - 假设生成被嵌入到包含数据分析、文献基础和实验反馈的迭代闭环中。
    - 基于LLM的智能体或多智能体架构是提出、优化和选择假设的核心引擎。
    - 人机协作能提升自动生成假设的质量和可信度，尤其是在高杠杆决策点。
    - 生成假设的可追溯性和可验证性至关重要，推动了对显式来源和报告准确度指标的需求。
    - 该领域缺乏统一的评估协议；当前系统依赖自定义基准、领域特定任务和定性人工判断的混合。
    分歧:
    - 假设生成策略：一些系统采用进化搜索和结构化回溯，另一些使用世界模型驱动的信息共享、多智能体辩论或无需显式搜索的直接代码优化。
    - 人机干预模式：系统在人类介入的粒度上存在差异，有的在粗粒度高杠杆点，有的通过细粒度逐步监督，有的仅在完全自主后作为外部验证者。
    - 评测设置：部分工作在合成算法基准上评估，部分在生物湿实验上，还有部分仅提出概念框架而无实证验证，难以直接比较。
    - 领域特异性：系统被设计和测试于单一科学领域（如组合优化、生物学、方程发现），而非作为通用框架呈现。
    - 自主性范围：具有真实实验反馈的完全自主实验室在环系统，与仅仿真或基于文本的验证循环，影响生成假设的可信度。
    开放问题:
    - 如何在不依赖详尽人工审查的情况下，验证一个生成假设确实是新颖的，而非已知想法的重新组合？
    - 什么机制可以在早期可靠地检测和终止无产出的研究方向，防止浪费计算和人力？
    - 当前的评估指标（如报告准确度、基准分数）是否真的能预测假设的长期科学价值？
    - 当系统自主性扩展到更长周期和更多样领域时，维持假设质量所需的最少人工干预是什么？
    - 当自主系统生成一个看似合理但最终错误或有害的假设时，责任与问责应如何分配？
