  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipelines
      what_it_solves: Fully automates the closed-loop from ideation, code generation,
        and experiment execution to result analysis and paper writing, aiming to reduce
        research cost and accelerate discovery.
      what_remains_open: Stability of generated papers across domains, real-world
        peer review validation beyond internal metrics, and integration of deep domain-specific
        constraints without human intervention.
    - line: Domain-aware scientific discovery agents
      what_it_solves: Embeds physics laws, domain knowledge bases, or task-specific
        verification gates into the agent workflow to produce defensible discoveries
        in fields like CFD or applied mathematics.
      what_remains_open: Verification gates still miss some silent failures (e.g.,
        2 of 16 planted cases in one study), and automatic injection of domain knowledge
        remains a manual design step per field.
    - line: Evaluation benchmarks and virtual environments
      what_it_solves: Provides standardized tasks and metrics, such as virtual experiment
        cycles or expert-labeled datasets, to compare AI scientist capabilities and
        reveal failure modes.
      what_remains_open: Coverage of real scientific discovery complexity, and alignment
        between automated proxy metrics and long-term human judgment of research impact.
    - line: Human-AI collaboration and interactive research
      what_it_solves: Introduces human oversight at high-leverage decision points
        to improve quality and reliability, balancing autonomy with expert judgment.
      what_remains_open: The optimal collaboration granularity and mode (e.g., targeted
        intervention outperforms both full autonomy and exhaustive oversight in one
        study, but generalization is unclear).
    - line: Verification and self-correction mechanisms
      what_it_solves: Adds internal critique loops, self-healing execution, and fact-checking
        steps to prevent hallucinated results and improve the trustworthiness of AI-generated
        research.
      what_remains_open: Current verification gates have limited coverage, and mechanisms
        for turning failures into long-term system improvements across runs are still
        nascent.
    consensus:
    - Large language models serve as the core reasoning engine, and the research cycle
      is structured as iterative loops of generation, execution, and feedback.
    - Automated evaluation or self-review is employed to guide iteration, though its
      reliability varies.
    - Code and artifact availability is emphasized, but actual reproducibility remains
      inconsistent across systems.
    - All systems aim to produce a full research paper, but the maturity of the output
      depends heavily on the domain and the verification mechanisms in place.
    disagreements:
    - 'Autonomy philosophy: Some systems target full end-to-end automation without
      human in the loop, while others treat the human as a principal investigator
      or collaborator with selective intervention rights.'
    - 'Domain integration: Generic systems rely on the broad knowledge of base models,
      whereas domain-specific systems build in physics verifiers or knowledge bases,
      leading to different strengths and failure modes.'
    - 'Evaluation methodology: Systems are validated via LLM-based automated reviewers,
      virtual environment completion rates, domain-specific multiple-choice questions,
      or real peer review at workshops, making cross-system comparison difficult.'
    open_questions:
    - Can current AI scientist systems deliver reproducible, impactful findings in
      real-world scientific settings, beyond curated benchmarks?
    - How to design a unified evaluation framework that captures both the process
      and the outcome of scientific discovery across disciplines?
    - What is the optimal human-AI teaming strategy, and at which stages of research
      does human input most improve quality without negating the speed advantage?
    - How can verification gates be made more robust to catch silent failures, especially
      those that violate domain-specific physical or logical constraints?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流程
      解决的问题: 将构思、代码生成、实验执行、结果分析和论文撰写完全自动化，以降低研究成本并加速发现。
      尚未覆盖: 生成论文在跨领域时的稳定性，超越内部指标的真实同行评审验证，以及无需人工干预即可深度整合领域特定约束的能力。
    - 路线: 领域感知的科学发现智能体
      解决的问题: 将物理定律、领域知识库或任务特定验证门控嵌入智能体工作流，以在CFD或应用数学等中产生可辩护的发现。
      尚未覆盖: 验证门控仍会漏掉一些静默失败（如一项研究中漏检16个植入失败中的2个），且领域知识的自动注入仍是每个领域的手工设计步骤。
    - 路线: 评估基准与虚拟环境
      解决的问题: 提供标准化任务和指标，如虚拟实验循环或专家标注数据集，以比较AI科学家能力并揭示失效模式。
      尚未覆盖: 对真实科学发现复杂性的覆盖度，以及自动化代理指标与人类长期研究影响力判断之间的一致性。
    - 路线: 人机协作与交互式研究
      解决的问题: 在高杠杆决策点引入人类监督，以提高质量和可靠性，平衡自主性与专家判断。
      尚未覆盖: 最佳协作粒度和模式（例如，一项研究中精准干预优于完全自主和详尽监督，但其泛化性尚不清楚）。
    - 路线: 验证与自我修正机制
      解决的问题: 添加内部批判循环、自愈执行和事实核查步骤，以防止幻觉结果，提高AI生成研究的可信度。
      尚未覆盖: 当前验证门控覆盖率有限，且将失败转化为跨运行长期改进的机制仍处于早期阶段。
    共识:
    - 大语言模型作为核心推理引擎，研究循环被构建为生成、执行和反馈的迭代过程。
    - 自动评估或自评审被用于指导迭代，但其可靠性参差不齐。
    - 代码和工件可用性受到强调，但实际可复现性在不同系统间不一致。
    - 所有系统旨在产出完整研究论文，但输出的成熟度高度依赖领域和所部署的验证机制。
    分歧:
    - 自主性哲学：部分系统追求无人在环的全端到端自动化，而另一些则将人类视为首席研究员或协作者，拥有选择性干预权限。
    - 领域集成：通用系统依赖基础模型的广泛知识，而领域特定系统构建物理验证器或知识库，导致不同的优势与失效模式。
    - 评估方法论：各系统通过基于LLM的自动评审、虚拟环境完成率、领域特定选择题或工作坊真实同行评审来验证，使得跨系统比较困难。
    开放问题:
    - 当前的AI科学家系统能否在真实世界科学场景中，超越精心设计的基准，产生可复现且有影响力的发现？
    - 如何设计一个跨学科、同时捕捉科学发现过程和结果的统一评估框架？
    - 什么是最佳的人机团队协作策略，在研究的哪些阶段人类输入能最大程度提升质量而不抵消速度优势？
    - 如何使验证门控更鲁棒，以捕捉静默失败，尤其是那些违反领域特定物理或逻辑约束的失败？
