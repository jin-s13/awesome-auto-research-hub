    loops, shared memory, and curated benchmarks. The frontier is shifting from proof-of-concept
    towards reliability and risk assessment.'
  - 'Open questions: How well automated reviewers correlate with human judgment; whether
    negative knowledge transfers across scientific domains; how to close the gap between
    LLM and human performance in experiment design; and whether virtual environments
    adequately capture the physical-world constraints of lab-based experimentation.'
  related_work_outline_zh:
  - 主流方向：利用基于LLM的智能体构建全自动科学发现工作流，涵盖想法生成、代码实现、实验执行和论文撰写，并逐步重视多智能体协作、失败记忆和风险意识。
  - 研究共性：多数系统将研究流程分解为模块化智能体角色或迭代步骤，通过基于LLM的模拟评审器或基准任务评估输出，并报告相对于基础LLM或先前自动研究系统的提升。
  - 关键差异：部分工作瞄准端到端论文生成（如The AI Scientist、Jr. AI Scientist），另一些专注于消融实验规划等单一阶段（AblationBench）或构建共享基础设施（DISCOVERYWORLD、Claw
    AI Lab）。监督信号不同：模拟同行评审、任务完成度指标或来自失败尝试的负知识。
  - 趋势演进：从单一自主科学家（2024年）到智能体树搜索和多智能体实验室（2025-2026年），越来越多地集成验证循环、共享记忆和精心设计的基准。前沿正从概念验证转向可靠性和风险评估。
  - 开放问题：自动评审器与人类判断的相关性如何；负知识能否跨科学领域迁移；如何缩小LLM与人类在实验设计上的差距；虚拟环境能否充分捕捉基于实验室的物理世界约束。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous paper generation
      what_it_solves: Automating the complete research cycle—idea generation, code
        writing, experiment execution, visualization, and manuscript composition—to
        reduce human effort.
      what_remains_open: Generated papers pass only workshop-level peer review inconsistently;
        human evaluation reveals important limitations and risks; the systems heavily
        rely on code-generation capabilities of frontier LLMs and may not handle complex,
        multi-file experimental setups robustly.
    - line: Experiment planning and ablation design
      what_it_solves: Improving the quality of empirical studies by automating the
        selection of ablation conditions or experiment sequences, using LLMs to propose
        or critique study designs.
      what_remains_open: Current LLMs identify only 45% of human-authored ablations;
        performance on authoring vs. reviewing ablations shows inverse trends, indicating
        grounding gaps; the approach has not been tested beyond text-based AI research
        settings.
    - line: Benchmark environments and evaluation frameworks
      what_it_solves: Providing standardized tasks and metrics to measure scientific
        discovery capabilities of agents, covering exploration, hypothesis testing,
        and knowledge interpretation.
      what_remains_open: Virtual environments like DISCOVERYWORLD may not capture
        physical lab constraints; automatic metrics (task completion, explanation
        quality) are not yet validated against real scientific impact; human baseline
        performance is often missing.
    - line: Multi-agent orchestration and knowledge memory
      what_it_solves: Enhancing research throughput and reliability by assigning specialized
        roles (curator, experiment manager, reviewer) and maintaining shared memory
        of past failures.
      what_remains_open: Negative knowledge transfer is demonstrated only on same-family
        PDE tasks; the scalability of multi-agent coordination to large-scale, long-running
        experiments is unknown; the platforms are described as early steps and lack
        external validation.
    consensus:
    - LLM-based agents can produce research papers that score above acceptance thresholds
      under automated review, but achieving consistent, human-level quality remains
      unsolved.
    - Automated reviewers (e.g., simulated review, DeepReviewer) are widely used for
      evaluation, yet their reliability as a proxy for expert human judgment is openly
      questioned across multiple works.
    - Incorporating intermediate verification, failure memory, or iterative refinement
      improves agent performance over vanilla auto-research baselines.
    - Current systems are primarily validated on machine learning or applied mathematics
      tasks, with limited evidence of generalization to wet-lab or physical experimentation.
    disagreements:
    - 'Scope of automation: Some systems aim to generate a full paper from scratch,
      while others target a single methodological step like ablation planning or focus
      on providing a reusable research platform.'
    - 'Evaluation target: Works differ in whether they assess system output via LLM-based
      judges, task-completion scores in a virtual environment, or actual peer review
      at a workshop, leading to incomparable claims.'
    - 'Reliance on human templates: The AI Scientist-v2 explicitly removes the human-authored
      code templates used in v1, while Jr. AI Scientist integrates modern coding agents
      to handle complex codebases; other systems do not report this dependency.'
    - 'Interaction mode: Systems range from a single agent with tree search to multi-agent
      teams with dashboards, reflecting different assumptions about how human researchers
      should supervise or intervene.'
    open_questions:
    - Can automated scientific discovery agents achieve acceptance at a top-tier conference
      without human cherry-picking, and what would constitute a rigorous, unbiased
      evaluation protocol?
    - How does the negative knowledge collected from failed experiments generalize
      to unseen scientific problems outside the training distribution of the underlying
      LLMs?
    - What is the minimum set of experiment design skills (e.g., ablation planning,
      control variable selection) that an agent must master to be considered a reliable
      research assistant, and how should these skills be benchmarked?
    - To what extent do virtual simulation environments (DISCOVERYWORLD) transfer
      to real-world lab automation, and what additional sensing, actuator, and safety
      constraints are needed?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动论文生成
      解决的问题: 自动化完整研究周期——想法生成、代码编写、实验执行、可视化和论文撰写——以减少人工投入。
      尚未覆盖: 生成的论文仅在不稳定的工作坊级别通过同行评审；人类评估揭示了重要的局限性和风险；系统严重依赖前沿LLM的代码生成能力，可能无法稳健处理复杂的多文件实验设置。
    - 路线: 实验规划与消融设计
      解决的问题: 通过自动选择消融条件或实验序列来提高实证研究质量，利用LLM提出或批判研究设计。
      尚未覆盖: 当前LLM仅能识别45%的人类设计的消融实验；在创作和评审消融实验上的表现呈反向趋势，表明存在基础差距；该方法尚未在基于文本的AI研究环境之外进行测试。
    - 路线: 基准环境与评估框架
      解决的问题: 提供标准化任务和指标来衡量智能体的科学发现能力，涵盖探索、假设检验和知识解释。
      尚未覆盖: DISCOVERYWORLD等虚拟环境可能无法捕捉物理实验室约束；自动指标（任务完成度、解释质量）尚未针对真实科学影响进行验证；通常缺少人类基线表现。
    - 路线: 多智能体编排与知识记忆
      解决的问题: 通过分配专门角色（策展者、实验管理者、评审者）并维护过去失败的共享记忆，来提高研究吞吐量和可靠性。
      尚未覆盖: 负知识迁移仅在同类PDE任务上得到验证；多智能体协调对大规模、长时间实验的可扩展性未知；这些平台被描述为早期步骤，缺少外部验证。
    共识:
    - 基于LLM的智能体能够生成在自动评审下超过接受阈值的论文，但实现一致的人类水平质量仍未解决。
    - 自动评审器（如模拟评审、DeepReviewer）被广泛用于评估，但其作为专家人类判断代理的可靠性在多项工作中被公开质疑。
    - 纳入中间验证、失败记忆或迭代改进相比普通自动研究基线能提升智能体性能。
    - 当前系统主要在机器学习或应用数学任务上验证，缺乏推广到湿实验或物理实验的证据。
    分歧:
    - 自动化范围：一些系统旨在从头生成完整论文，而另一些则针对消融规划等单一方法步骤，或专注于提供可重用的研究平台。
    - 评估目标：工作在评估系统输出时采用基于LLM的评判器、虚拟环境中的任务完成分数或工作坊实际同行评审，导致声明不可比较。
    - 对人类模板的依赖：The AI Scientist-v2明确移除了v1中使用的人类编写代码模板，而Jr. AI Scientist集成现代编码代理处理复杂代码库；其他系统未报告此依赖。
    - 交互模式：系统从带有树搜索的单一智能体到带有仪表板的多智能体团队，反映了关于人类研究者应如何监督或干预的不同假设。
    开放问题:
    - 自动科学发现智能体能否在没有人工挑选的情况下在顶级会议上获得接收，以及什么构成严格、无偏的评估协议？
    - 从失败实验中收集的负知识如何泛化到基础LLM训练分布之外的科学问题？
    - 智能体必须掌握哪些最低限度的实验设计技能（如消融规划、控制变量选择）才能被视为可靠的研究助手，以及应如何对这些技能进行基准测试？
    - 虚拟仿真环境（DISCOVERYWORLD）在多大程度上能迁移到真实世界实验室自动化，以及需要哪些额外的传感、执行器和安全约束？
