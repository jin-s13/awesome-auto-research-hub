  related_work_outline_zh:
  - 主流方向：基于多智能体的大语言模型系统，用于自动化或辅助研究论文的撰写、编辑与评审，常集成到 Overleaf 等现有编辑环境中。
  - 研究共性：将论文生产流程分解为起草、批评、修订、排版等子任务，并为每个子任务分配专用智能体或插件，同时保留人类在最终决策中的参与。
  - 关键差异：部分系统面向从零开始的完整论文生成，另一些则聚焦于写作辅导、批评依据、实验复现或多模态海报生成；交互模式从自主流水线到以人为中心的互动式导师不等。
  - 趋势演进：在 2025–2026 年间，前沿从单一功能智能体（搜索、复现）转向综合性多智能体写作框架和人机协作编辑，同时对批评质量的评估日益受到关注。
  - 开放问题：如何可靠评估 AI 生成科学文本的事实依据与新颖性；如何确保写作智能体本身的可复现性；以及如何在不损害作者自主性的前提下将这些工具融入真实研究工作流。
  literature_review:
    line_of_work_matrix:
    - line: Multi-agent automated paper writing
      what_it_solves: End-to-end generation of research papers by orchestrating specialized
        agents for literature review, experimentation, writing, and revision.
      what_remains_open: Verification of factual correctness and novelty in generated
        content; reliance on proprietary LLMs and lack of open-source reproducibility
        for the agent framework itself.
    - line: In-editor writing assistance and tutoring
      what_it_solves: Real-time, human-centered support for drafting, revising, and
        learning academic writing within familiar LaTeX editors, using multi-agent
        critique and suggestion.
      what_remains_open: Long-term impact on writer skill development; evaluation
        beyond user satisfaction, such as improvement in paper acceptance rates or
        writing quality metrics.
    - line: Grounded critique and review of scientific papers
      what_it_solves: Assessing whether LLM-generated critiques are supported by evidence
        in the paper, aiming to improve the reliability of automated review.
      what_remains_open: Coverage of diverse scientific fields and critique types;
        alignment between proxy metrics of groundedness and real peer-review utility.
    - line: Multimodal poster generation from papers
      what_it_solves: Automatically converting scientific paper content into visually
        coherent posters, reducing manual design effort.
      what_remains_open: Evaluation of design quality and information fidelity; generalization
        across highly varied paper layouts and disciplines.
    - line: Experiment reproduction and paper lineage
      what_it_solves: Automatically reproducing AI experiments described in papers
        to verify results and trace lineage, bridging the gap between reading and
        replication.
      what_remains_open: Handling ambiguous or incomplete experimental descriptions;
        scaling beyond well-documented AI papers to broader scientific domains.
    - line: Comprehensive paper search agents
      what_it_solves: Using LLM agents to perform deep, iterative literature search
        that goes beyond keyword matching to understand research intent.
      what_remains_open: Integration with downstream writing and synthesis tasks;
        evaluation against human expert recall in systematic reviews.
    consensus:
    - LLM-based agents can meaningfully decompose the paper writing workflow into
      manageable subtasks.
    - Human oversight remains necessary for quality control, especially for factual
      accuracy and high-level argumentation.
    - Multi-agent architectures are preferred over monolithic models for handling
      the diversity of writing, reviewing, and editing tasks.
    - Evaluation of these systems is still nascent, with most relying on qualitative
      or small-scale human studies rather than standardized benchmarks.
    disagreements:
    - Whether the primary interaction mode should be fully autonomous generation or
      interactive tutoring and suggestion.
    - 'How to measure success: some works emphasize end-product quality, others focus
      on user experience, learning outcomes, or critique groundedness.'
    - 'The level of integration with existing tools: some are standalone frameworks,
      others are tightly coupled with Overleaf or similar editors.'
    - Whether experiment reproduction and paper search are part of the writing agent's
      scope or separate auxiliary tasks.
    open_questions:
    - What evaluation benchmarks can capture the factual groundedness, novelty, and
      overall quality of AI-written scientific papers?
    - How can writing agents be made reproducible and open-source, given current reliance
      on proprietary LLM APIs?
    - What are the long-term effects on researcher skills and the peer-review ecosystem
      if AI writing assistants become widespread?
    - Can multimodal generation from papers maintain the nuanced semantics of scientific
      figures and tables without human correction?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 多智能体自动论文写作
      解决的问题: 通过协调文献综述、实验、写作和修订等专门智能体，端到端生成研究论文。
      尚未覆盖: 生成内容的事实正确性与新颖性验证；对专有大语言模型的依赖以及智能体框架本身缺乏开源可复现性。
    - 路线: 编辑器内写作辅助与辅导
      解决的问题: 在熟悉的 LaTeX 编辑器中，利用多智能体批评和建议，实时、以人为中心地支持起草、修订和学习学术写作。
      尚未覆盖: 对写作者技能发展的长期影响；超越用户满意度的评估，如论文接收率或写作质量指标的提升。
    - 路线: 有依据的科学论文批评与评审
      解决的问题: 评估大语言模型生成的批评是否得到论文中证据的支持，旨在提高自动评审的可靠性。
      尚未覆盖: 覆盖多样化的科学领域和批评类型；有依据性的代理指标与真实同行评审效用之间的一致性。
    - 路线: 从论文到多模态海报生成
      解决的问题: 自动将科学论文内容转换为视觉连贯的海报，减少手动设计工作。
      尚未覆盖: 设计质量和信息保真度的评估；在高度变化的论文布局和学科间的泛化能力。
    - 路线: 实验复现与论文谱系
      解决的问题: 自动复现论文中描述的 AI 实验以验证结果并追踪谱系，弥合阅读与复现之间的鸿沟。
      尚未覆盖: 处理模糊或不完整的实验描述；从文档完善的 AI 论文扩展到更广泛的科学领域。
    - 路线: 综合论文搜索智能体
      解决的问题: 使用大语言模型智能体进行深度、迭代的文献搜索，超越关键词匹配以理解研究意图。
      尚未覆盖: 与下游写作和综合任务的集成；在系统综述中与人类专家召回率的对比评估。
    共识:
    - 基于大语言模型的智能体能够将论文写作工作流有意义地分解为可管理的子任务。
    - 人类监督对于质量控制仍然必要，尤其是在事实准确性和高层论证方面。
    - 多智能体架构比单一模型更受青睐，以处理写作、评审和编辑任务的多样性。
    - 这些系统的评估仍处于早期阶段，多数依赖定性或小规模人类研究，而非标准化基准。
    分歧:
    - 主要交互模式应为完全自主生成还是互动式辅导与建议。
    - 如何衡量成功：部分工作强调最终产品质量，另一些则关注用户体验、学习成果或批评的有依据性。
    - 与现有工具的集成程度：有些是独立框架，有些则与 Overleaf 或类似编辑器紧密耦合。
    - 实验复现和论文搜索是否属于写作智能体的范畴，还是独立的辅助任务。
    开放问题:
    - 什么样的评估基准能够捕捉 AI 撰写科学论文的事实依据、新颖性和整体质量？
    - 在当前依赖专有大语言模型 API 的情况下，如何使写作智能体具备可复现性和开源性？
    - 如果 AI 写作助手普及，对研究者技能和同行评审生态系统的长期影响是什么？
    - 从论文生成的多模态内容能否在没有人工纠正的情况下保持科学图表和表格的细微语义？
