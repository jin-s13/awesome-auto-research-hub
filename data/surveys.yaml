  - 'Open questions: How to guarantee long-term scientific validity and citation trustworthiness
    of AI-generated papers; whether domain-specific verification can generalize across
    disciplines; what is the optimal human intervention granularity and cost-effectiveness;
    how to systematically eliminate hallucinations and erroneous causal attributions.'
  related_work_outline_zh:
  - 主流方向：构建端到端自主系统，利用LLM智能体从研究构思、实验执行到完整论文撰写，并集成验证与自我纠正。
  - 研究共性：采用多智能体或链式流水线将科学工作流分解为构思、执行、写作、评审等阶段，并通过反思、记忆或验证门控增强生成内容的正确性。
  - 关键差异：监督方式从完全自主到人机协作；自我纠正策略包括单步反思、多假设失败归因和负知识记忆；验证方法涵盖领域特定的物理感知视觉门控和通用自动评审。
  - 趋势演进：从2024年首个综合框架，到2025年首次通过同行评审的工作坊论文，再到2026年涌现出多个高可靠性系统，重点从“能否生成”转向“生成的科学性”，强调可验证性与失败恢复。
  - 开放问题：AI生成论文的长期科学有效性与引用可信度；领域特定验证机制能否跨学科泛化；人机协作的最佳介入粒度与成本效益；如何系统性消除幻觉和错误归因。
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research and paper generation systems
      what_it_solves: Automating the full scientific pipeline from hypothesis generation,
        code implementation, and experiment execution to manuscript writing and simulated
        review, reducing per-paper cost and human effort.
      what_remains_open: Generated paper quality is unstable across runs; domain generalization
        beyond the tested subfields is unverified; complex reasoning and subtle scientific
        taste are not yet reliably captured.
    - line: Self-correction and failure attribution mechanisms
      what_it_solves: Detecting experiment failures, diagnosing root causes via structured
        causal hypotheses, and deterministically correcting the hypothesis, design,
        or implementation to raise the rate of meaningful outputs.
      what_remains_open: Attribution accuracy depends on the predefined causal model
        and may miss unknown failure modes; the approach has been demonstrated on
        limited benchmarks and not yet on open-ended multi-month research cycles.
    - line: Human-AI collaboration models for research writing
      what_it_solves: Integrating human decision-making at high-leverage decision
        points to balance autonomy and accuracy, resulting in higher quality outputs
        than fully autonomous or exhaustively step-by-step oversight.
      what_remains_open: Optimal collaboration granularity likely varies across tasks
        and expert backgrounds; the cost and cognitive load imposed on human experts
        are not quantified, and the approach is validated on a single benchmark.
    - line: Verification and evaluation gates
      what_it_solves: Ensuring generated results and manuscripts adhere to scientific
        norms by inspecting rendered outputs (e.g., flow fields) or applying automated
        reviewers, catching silent failures before human consumption.
      what_remains_open: Most verification gates are domain-specific (e.g., physics-aware
        vision) and miss certain planted failures; automated reviewer reliability
        has not been validated at scale in real conference settings against human
        reviewers.
    - line: Negative knowledge and failure memory
      what_it_solves: Converting failed attempts into typed, reusable records that
        prevent downstream agents from repeating known mistakes, improving task success
        while reducing token usage.
      what_remains_open: Long-term memory coherence and retrieval quality in open-ended
        research has not been studied; the system was evaluated on narrow PDE tasks,
        and scaling to diverse, evolving research domains remains untested.
    consensus:
    - LLM-powered agents can be composed into pipelines that generate plausible research
      papers, covering ideation, coding, experimentation, and drafting.
    - Unassisted generation is brittle; every system requires some form of verification,
      self-reflection, or memory to reduce hallucinations and execution errors.
    - Automated review (simulated or VLM-based) can provide a useful signal, but it
      is not yet a sufficient substitute for rigorous human peer review.
    - Failures in autonomous research are systematic and can be categorized into recurring
      patterns (e.g., implementation drift, overexcitement, insufficient domain intelligence).
    disagreements:
    - Whether fully autonomous generation is the right target or human-in-the-loop
      collaboration at critical decision points yields better scientific quality.
    - 'The granularity of self-correction: some systems rely on a single reflection
      step, while others advocate multi-hypothesis causal attribution or a dedicated
      negative knowledge bank.'
    - 'Verification modality: physics-aware vision-language gates are effective for
      domain-specific silent failures, whereas general-purpose systems rely on automated
      review rubrics, leading to different failure coverage.'
    - 'How to define and measure success: acceptance by a workshop, blind scores against
      a baseline, tokens used, or metrics-bearing output rate—there is no agreed-upon
      evaluation standard.'
    open_questions:
    - Can the verification and self-correction techniques developed in narrow domains
      (CFD, applied math) be transferred to open-ended scientific discovery in less
      structured fields?
    - What is the failure mode coverage of current verification gates, and how many
      silent errors pass through to the final manuscript?
    - Under what conditions does human-AI collaboration produce a net gain in scientific
      productivity rather than adding overhead, and how should collaboration be measured?
    - Do negative knowledge approaches scale to long-lived research projects where
      the relevant failure set is non-stationary and context-dependent?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究与论文生成系统
      解决的问题: 自动化从假设生成、代码实现、实验执行到论文写作和模拟评审的完整科学流程，降低单篇论文成本与人力投入。
      尚未覆盖: 生成论文质量在不同运行间不稳定；在测试子领域之外的泛化能力未经验证；复杂推理与科学品味尚不能可靠捕捉。
    - 路线: 自我纠正与失败归因机制
      解决的问题: 检测实验失败，通过结构化因果假设诊断根本原因，并确定性修正假设、设计或实现，提高有意义输出的比例。
      尚未覆盖: 归因准确性依赖于预设因果模型，可能遗漏未知失败模式；方法仅在有限基准上展示，未在开放式长期研究周期中验证。
    - 路线: 人机协作研究写作模式
      解决的问题: 在高杠杆决策点引入人类决策，平衡自主性与准确性，产出高于完全自主或逐步监督的成果质量。
      尚未覆盖: 最优协作粒度可能因任务和专家背景而异；人类专家的成本与认知负荷未被量化；方法仅在一个基准上验证。
    - 路线: 验证与评估门控
      解决的问题: 通过检查渲染输出（如流场）或应用自动评审器，确保生成结果和论文符合科学规范，在人工查验前捕获静默失败。
      尚未覆盖: 大多数验证门控具有领域特定性（如物理感知视觉），且会遗漏某些植入失败；自动评审器在真实会议环境中与人类评审员对比的大规模验证缺失。
    - 路线: 负知识与失败记忆
      解决的问题: 将失败尝试转化为可复用的类型化记录，防止下游代理重复已知错误，提高任务成功率同时减少令牌消耗。
      尚未覆盖: 开放式研究中长期记忆一致性与检索质量尚未研究；系统仅在狭窄PDE任务上评估，扩展至多样化、不断演化的研究领域仍待测试。
    共识:
    - 基于LLM的智能体可组合成流水线，生成包含构思、编码、实验和起草的合理研究论文。
    - 无辅助生成是脆弱的；每个系统都需要某种形式的验证、自我反思或记忆来减少幻觉和执行错误。
    - 自动评审（模拟或基于VLM）可提供有用信号，但尚不能充分替代严格的人类同行评审。
    - 自主研究中的失败具有系统性，可归类为重复出现的模式（如实现漂移、过度兴奋、领域智能不足）。
    分歧:
    - 目标是完全自主生成还是在高杠杆决策点引入人机协作，何者能产生更好的科学质量。
    - 自我纠正的粒度：一些系统依赖单步反思，另一些则主张多假设因果归因或专用的负知识记忆库。
    - 验证模态：物理感知的视觉-语言门控在领域特定静默失败中有效，而通用系统依赖自动评审标准，导致不同的失败覆盖范围。
    - 如何定义和衡量成功：以工作坊接收、盲评分数、令牌消耗或含指标输出的比例为准，缺乏统一的评估标准。
    开放问题:
    - 在狭窄领域（CFD、应用数学）开发的验证和自我纠正技术能否迁移到结构松散领域中的开放式科学发现？
    - 当前验证门控的失败模式覆盖率如何，有多少静默错误会漏入最终稿件？
    - 在何种条件下人机协作能带来科学生产力的净增益而非增加开销，协作应如何衡量？
    - 负知识方法能否扩展到长期研究项目，其中相关失败集合是非平稳且依赖于上下文的？
