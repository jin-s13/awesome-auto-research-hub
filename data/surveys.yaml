  literature_review:
    line_of_work_matrix:
    - line: End-to-end automated survey generation systems
      what_it_solves: Automatically retrieving, synthesizing, and composing structured
        literature surveys from large paper collections, reducing manual effort.
      what_remains_open: Analytical depth and critical insight still lag behind human-written
        surveys; citation hallucination and faithfulness remain issues; scalability
        to very large paper sets (thousands) and cross-domain generalization are not
        yet robust.
    - line: Taxonomy generation and literature organization
      what_it_solves: Automatically constructing hierarchical taxonomies to organize
        papers into meaningful categories, supporting survey structure.
      what_remains_open: Alignment with human expert taxonomies is limited (e.g.,
        high sibling overlap, MECE violations); current tree-edit metrics may not
        capture practical utility; causal effect of taxonomy quality on downstream
        survey quality is unvalidated.
    - line: Evaluation benchmarks and metric design
      what_it_solves: Providing standardized protocols and metrics to assess survey
        quality dimensions such as content coverage, citation accuracy, structural
        coherence, and taxonomy alignment.
      what_remains_open: Agreement between automatic metrics and human expert judgment
        is not fully established; benchmarks are often narrow in domain and time coverage;
        metrics for analytical depth and critical synthesis are underdeveloped.
    consensus:
    - All approaches leverage large language models as the core generation engine.
    - Iterative refinement, whether through multi-agent review, outline updating,
      or feedback loops, is universally adopted to improve output quality.
    - Citation accuracy and content coverage are treated as primary quality dimensions.
    - Evaluation combines automatic metrics with some form of human assessment or
      expert-derived reference.
    disagreements:
    - 'System architecture: some use a single pipeline with staged modules, while
      others employ multiple specialized agents communicating asynchronously.'
    - 'Input granularity: methods differ in whether they process only titles and abstracts
      or perform full-text analysis to extract structured keynotes and cross-paper
      relationships.'
    - 'Evaluation philosophy: one line uses reference-based alignment with expert
      taxonomies (e.g., tree edit distance), another uses reference-free automatic
      metrics for coherence and relevance, and a third relies on pairwise human preference
      judgments.'
