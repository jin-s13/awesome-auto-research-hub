  related_work_outline_zh:
  - 主流方向：构建端到端的自主研究智能体，能够生成想法、运行实验并撰写完整论文，越来越注重可靠性和自我纠正。
  - 研究共性：所有系统都将科学工作流分解为由LLM驱动的阶段（构思、编码、评估、写作），并通过自动或人工评审来评估输出。
  - 关键差异：系统在范围（完整论文 vs. 实验规划）、失败处理（无、反思、多假设归因、负记忆）和领域通用性（机器学习 vs. 物理）上存在差异。
  - 趋势演进：从2024年首个全自动框架，到2025年通过同行评审的工作坊论文，再到2026年具备失败感知和自我纠正能力的智能体及领域专用科学家，显示出向鲁棒性和真实世界验证的转变。
  - 开放问题：这些系统能否产生超越增量改进的真正新颖且有影响力的科学？如何确保生成手稿的事实准确性并避免幻觉？
  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous paper generation
      what_it_solves: Automates the full research cycle from idea generation to manuscript
        writing, reducing human effort and cost per paper.
      what_remains_open: Generated papers often lack deep novelty and may contain
        factual errors; acceptance in rigorous peer review remains rare and inconsistent.
    - line: Failure diagnosis and self-correction
      what_it_solves: Detects and attributes experiment failures to specific causes
        (hypothesis, design, implementation) and routes corrective actions, improving
        success rates and output quality.
      what_remains_open: Failure attribution accuracy across diverse domains is unproven;
        systems still struggle with long-horizon memory and can declare success prematurely.
    - line: Automated review and experiment planning evaluation
      what_it_solves: Provides scalable, low-cost assessment of paper quality or ablation
        completeness, enabling iterative improvement without human reviewers.
      what_remains_open: Automated reviewers do not fully align with human judgment;
        current LMs underperform humans in identifying necessary ablation experiments.
    - line: Domain-specific scientific writing with verification
      what_it_solves: Integrates physics-aware verification gates (e.g., vision-language
        checks) to ensure generated manuscripts meet domain validity constraints,
        reducing silent errors.
      what_remains_open: Verification gates can miss failure modes; the approach is
        demonstrated only in computational fluid dynamics, with unclear transfer to
        other disciplines.
    - line: Memory-augmented research agents
      what_it_solves: Accumulates negative knowledge from failed attempts in a shared
        bank, allowing agents to avoid repeated mistakes and solve previously unsolvable
        tasks with fewer tokens.
      what_remains_open: Long-term utility and interference across unrelated tasks
        are not studied; the memory structure may not scale to diverse research workflows.
    consensus:
    - Large language models can be orchestrated to perform sequential scientific reasoning,
      code execution, and structured writing.
    - Automated evaluation (AI reviewers, benchmarks) is necessary for scalable assessment,
      but human validation remains the gold standard.
    - 'Current systems are brittle: they suffer from implementation drift, hallucinated
      results, and insufficient scientific taste.'
    - Open-source code and artifacts are critical for reproducibility and community
      progress.
    disagreements:
    - 'Scope of autonomy: some systems target full paper generation, while others
      focus on sub-tasks like ablation planning or failure correction.'
    - 'Failure handling strategy: reflection-based retry vs. structured multi-hypothesis
      attribution vs. curated negative knowledge banks.'
    - 'Evaluation setting: simulated automated review vs. real workshop/conference
      submission vs. benchmark-based metric comparison.'
    - 'Domain assumption: general-purpose ML research vs. physics-grounded discovery
      with domain-specific verification gates.'
    open_questions:
    - How to guarantee that an AI-generated paper contains a genuine, non-incremental
      contribution that advances the field?
    - What verification mechanisms can reliably prevent hallucinated numerical results
      and false claims in the final manuscript?
    - Can failure-aware memory systems transfer across radically different scientific
      domains without catastrophic interference?
    - How should the research community establish standards for evaluating the scientific
      merit of AI-generated papers beyond surface-level review scores?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自动论文生成
      解决的问题: 自动化从想法生成到论文撰写的完整研究周期，减少人力投入和单篇成本。
      尚未覆盖: 生成的论文往往缺乏深度新颖性，可能包含事实错误；在严格同行评审中的接受率仍然很低且不稳定。
    - 路线: 失败诊断与自我纠正
      解决的问题: 检测实验失败并将其归因于具体原因（假设、设计、实现），并路由纠正动作，提高成功率和输出质量。
      尚未覆盖: 跨领域的失败归因准确性未经证实；系统仍难以处理长时记忆，并可能过早宣布成功。
    - 路线: 自动评审与实验规划评估
      解决的问题: 提供可扩展、低成本的论文质量或消融完整性评估，无需人类评审即可迭代改进。
      尚未覆盖: 自动评审与人类判断不完全一致；当前语言模型在识别必要消融实验方面表现不如人类。
    - 路线: 带验证的领域专用科学写作
      解决的问题: 集成物理感知验证门（如视觉-语言检查），确保生成的手稿满足领域有效性约束，减少静默错误。
      尚未覆盖: 验证门可能遗漏失败模式；该方法仅在计算流体动力学中演示，向其他学科的迁移尚不明确。
    - 路线: 记忆增强的研究智能体
      解决的问题: 将失败尝试中的负知识积累到共享库中，使智能体避免重复错误，并以更少的令牌解决此前无法解决的任务。
      尚未覆盖: 长期效用和跨无关任务的干扰未被研究；该记忆结构可能无法扩展到多样化的研究工作流。
    共识:
    - 大型语言模型可以被编排以执行顺序科学推理、代码执行和结构化写作。
    - 自动评估（AI评审、基准）对于可扩展的评估是必要的，但人类验证仍是黄金标准。
    - 当前系统脆弱：存在实现漂移、幻觉结果和科学品味不足的问题。
    - 开源代码和工件对于可复现性和社区进步至关重要。
    分歧:
    - 自主范围：部分系统瞄准完整论文生成，其他则聚焦于消融规划或失败纠正等子任务。
    - 失败处理策略：基于反思的重试 vs. 结构化多假设归因 vs. 策展的负知识库。
    - 评估设置：模拟自动评审 vs. 真实工作坊/会议投稿 vs. 基于基准的指标比较。
    - 领域假设：通用机器学习研究 vs. 具有领域特定验证门的物理基础发现。
    开放问题:
    - 如何保证AI生成的论文包含真正新颖、非增量性的贡献，能够推动领域发展？
    - 哪些验证机制能够可靠地防止最终手稿中出现幻觉数值结果和虚假声明？
    - 失败感知记忆系统能否在截然不同的科学领域之间迁移而不发生灾难性干扰？
    - 研究社区应如何建立标准，以评估AI生成论文的科学价值，而不仅仅是表面评审分数？
