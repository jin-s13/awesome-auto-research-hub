  literature_review:
    line_of_work_matrix:
    - line: End-to-end autonomous research pipeline orchestration
      what_it_solves: Automates the full scientific workflow—ideation, code implementation,
        experiment execution, result analysis, and manuscript writing—reducing human
        labor and accelerating discovery cycles.
      what_remains_open: Output quality is inconsistent (only one of three AI Scientist-v2
        papers passed peer review); systems still require human expertise for non-trivial
        contributions; cross-domain generalization and long-term reproducibility remain
        unverified; ethical and governance frameworks are identified but not implemented.
    - line: Evaluation environments and benchmarks for automated discovery
      what_it_solves: Provides standardized tasks and metrics to assess agent capabilities
        in hypothesis formation, experimental design, and ablation planning, enabling
        comparable progress measurement.
      what_remains_open: Current language models achieve only 45% recall on ablation
        identification, below human level; strong baselines struggle on DISCOVERYWORLD,
        but the ecological validity of such virtual environments for real scientific
        reasoning is not established; proxy metrics may not align with genuine research
        utility.
    - line: Failure-aware memory and knowledge accumulation for research agents
      what_it_solves: Captures failed attempts as structured negative knowledge records,
        allowing downstream agents to avoid repeated errors, improve task success,
        and reduce token consumption.
      what_remains_open: Validated only on a limited set of tasks (ScienceAgentBench
        and two PDE problems); cross-task and cross-domain transferability is underexplored;
        scalability of the memory bank and coverage of diverse failure modes are unknown.
    - line: Conceptual frameworks and community roadmaps for autonomous research labs
      what_it_solves: Organizes fragmented efforts into a coherent vision, defining
        agendas for building, evaluating, and governing domain-specific autonomous
        research labs (e.g., recommender systems).
      what_remains_open: Purely conceptual with no implemented prototype or empirical
        validation; realization depends on community consensus and resource investment;
        ethical, privacy, and fairness challenges are acknowledged but not addressed
        with concrete mechanisms.
    consensus:
    - Large language models can serve as the core engine for automated scientific
      discovery, generating plausible hypotheses, code, and papers.
    - Current automated systems perform adequately on templated or narrow tasks but
      fall short of human experts on tasks requiring deep reasoning, novelty, or complex
      multi-step experimentation.
    - Dedicated benchmarks and environments are necessary because general NLP benchmarks
      fail to capture the unique challenges of scientific experimentation, such as
      hypothesis testing and ablation design.
    - Incorporating failure information, whether implicitly through iterative refinement
      or explicitly through memory banks, improves agent performance and efficiency.
    disagreements:
    - 'System architecture: single-agent iterative loops versus multi-agent teams
      with role specialization versus tree-search-based planning with dedicated experiment
      managers.'
    - 'Evaluation methodology: reliance on automated LLM reviewers versus submission
      to real peer-reviewed venues versus author-led qualitative assessments, leading
      to different conclusions about system capability.'
    - 'Memory implementation: explicit, curated negative knowledge banks that agents
      adopt or reject versus implicit in-context learning from previous runs without
      structured failure records.'
    - 'Domain scope: general-purpose ML research automation versus domain-specific
      frameworks (e.g., recommender systems) that require tailored pipelines and governance.'
    - 'Starting point for ideation: generating novel ideas from scratch versus analyzing
      limitations of a given baseline paper to propose incremental improvements.'
    open_questions:
    - What evaluation protocols can ensure that improvements on benchmarks like DISCOVERYWORLD
      or AblationBench translate to real-world scientific productivity, given the
      observed gap between proxy metrics and human judgment?
    - How can failure-aware memory systems scale to large, diverse scientific domains
      without introducing memory pollution or retrieval noise, and what representation
      is sufficient to cover the variety of experimental failures?
    - Under what conditions can fully automated research pipelines produce reproducible
      results, especially when code, data, and environment dependencies are complex
      and not fully captured by the agent's execution trace?
    - What governance mechanisms are needed to mitigate risks such as generating flawed
      but plausible papers at scale, and how can the community establish standards
      for attribution and accountability in AI-generated research?
  literature_review_zh:
    研究路线矩阵:
    - 路线: 端到端自主研究流水线编排
      解决的问题: 自动化完整科学工作流——构思、代码实现、实验执行、结果分析和论文撰写——减少人工劳动并加速发现周期。
      尚未覆盖: 输出质量不稳定（AI Scientist-v2三篇论文仅一篇通过同行评审）；系统在非平凡贡献上仍需人类专业知识；跨领域泛化和长期可复现性未经验证；伦理和治理框架已被识别但未实现。
    - 路线: 自动化发现的评估环境与基准
      解决的问题: 提供标准化任务和指标，评估智能体在假设形成、实验设计和消融规划方面的能力，使进展可比较。
      尚未覆盖: 当前语言模型在消融识别上仅达到45%召回率，低于人类水平；强基线在DISCOVERYWORLD上表现困难，但此类虚拟环境对真实科学推理的生态效度尚未建立；代理指标可能与真实研究效用不一致。
    - 路线: 研究智能体的失败感知记忆与知识积累
      解决的问题: 将失败尝试捕获为结构化的负知识记录，使下游智能体避免重复错误，提高任务成功率并减少令牌消耗。
      尚未覆盖: 仅在有限任务集（ScienceAgentBench和两个PDE问题）上验证；跨任务和跨领域迁移性探索不足；记忆库的可扩展性和对多样化失败模式的覆盖未知。
    - 路线: 自主研究实验室的概念框架与社区路线图
      解决的问题: 将碎片化努力组织为连贯愿景，定义构建、评估和治理特定领域自主研究实验室（如推荐系统）的议程。
      尚未覆盖: 纯概念，无实现原型或实证验证；实现依赖社区共识和资源投入；伦理、隐私和公平挑战被承认但未用具体机制解决。
    共识:
    - 大型语言模型可作为自动化科学发现的核心引擎，生成看似合理的假设、代码和论文。
    - 当前自动化系统在模板化或狭窄任务上表现尚可，但在需要深度推理、新颖性或复杂多步实验的任务上仍落后于人类专家。
    - 需要专用基准和环境，因为通用NLP基准无法捕捉科学实验的独特挑战，如假设检验和消融设计。
    - 纳入失败信息，无论是通过迭代优化隐式进行还是通过记忆库显式进行，都能提升智能体性能和效率。
    分歧:
    - 系统架构：单智能体迭代循环 vs. 角色专业化的多智能体团队 vs. 基于树搜索的规划与专用实验管理器。
    - 评估方法：依赖自动化LLM评审 vs. 提交至真实同行评审场所 vs. 作者主导的定性评估，导致对系统能力的不同结论。
    - 记忆实现：显式的、经策展的负知识库，智能体可采纳或拒绝 vs. 从先前运行中隐式上下文学习，无结构化失败记录。
    - 领域范围：通用机器学习研究自动化 vs. 需要定制流水线和治理的特定领域框架（如推荐系统）。
    - 构思起点：从零生成新颖想法 vs. 分析给定基线论文的局限性以提出增量改进。
    开放问题:
    - 鉴于代理指标与人类判断之间的观察差距，何种评估协议能确保在DISCOVERYWORLD或AblationBench等基准上的改进转化为真实世界的科学生产力？
    - 失败感知记忆系统如何扩展到大型、多样化的科学领域而不引入记忆污染或检索噪声，以及何种表示足以覆盖各种实验失败？
    - 在何种条件下全自动研究流水线能产出可复现结果，特别是当代码、数据和环境依赖复杂且未被智能体执行轨迹完全捕获时？
    - 需要何种治理机制来减轻大规模生成有缺陷但看似合理论文的风险，社区如何建立AI生成研究的归属和问责标准？
