    Search Specialist、Topic Mining & Clustering、Academic Survey Writer、Quality Evaluator）协同工作，生成具有卓越综合质量的全面文献综述。通过在来自COLM
    2024类别的六个代表性LLM研究主题上的实验，我们证明了多智能体方法相比现有基线取得了显著改进，得分为8.18/10，而AutoSurvey为4.77/10。该多智能体架构每个主题处理75–443篇论文（六个主题共847篇），并通过专门智能体编排实现高引用覆盖率（在75–100篇论文集合上通常≥80%；在非常大的集合如RLHF上较低）。我们的12维度评估捕捉了组织、综合整合和批判性分析，超越了基本指标。这些发现表明，多智能体架构代表了在快速发展的科学领域中自动文献综述生成的有意义进步。
