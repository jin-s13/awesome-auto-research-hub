  title_cn: 低通道脑电图代理的边界感知上下文接地
  abstract_cn: 大型语言模型（LLMs）可以使科学软件更易于使用。然而，通用模型无法自动知道特定传感器支持哪些测量、当前软件实现了哪些算法，或者计算结果能证明哪些结论。这些区别对于低通道脑电图（EEG）尤为重要，因为稀疏的空间覆盖和变化的信号质量使得容易产生看似合理但无根据的解释。我们提出了NeuraDock
    Agent，一种开源架构，它将确定性的本地EEG引擎与硬件感知的语言层分离。数值引擎解析记录、执行质量控制、运行经过审查的频谱工作流，并写入机器可读的工件。LLM仅接收紧凑的、经过允许列表的摘要和版本化的上下文包。上下文描述了七通道硬件、经过审查的工作流、结果字段、实现边界、科学限制和参考案例。原始EEG和密集的逐样本数组保留在本地。我们在三个层面评估该系统。首先，12个记录在十次数值重复中产生相同的结构化结果，完整的Rest/Task运行在三次重复中产生相同的结果、报告和图形哈希值。其次，请求捕获和故障注入实验确认了测试的数据边界以及在HTTP、格式错误输出和连接故障下本地工件的保留。第三，一个边界感知基准测试在四种上下文消融和两个LLM下测试了36个普通和对抗性问题，产生了288个输出。这些结果支持硬件和实现感知的接地作为校准EEG代理接受、限定或拒绝内容的实用机制；它们并未建立临床有效性或经过验证的绝对认知负荷指数。
  tldr_cn: NeuraDock Agent通过边界感知上下文接地，使低通道脑电图分析可靠且避免无根据解释。
