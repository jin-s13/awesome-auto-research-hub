  abstract_cn: 在本研究中，我们提出了一种为软X射线光谱仪构建鲁棒逆代理模型的方法。在电子储存环（如BESSY II）的束流实验中，仪器和光束线需要正确对准和校准以获得最佳实验条件。为了实现这些过程的自动化，可以开发并应用机器学习方法，但在许多情况下，这些方法需要使用逆模型，将实验输出（如探测器图像）映射到设备参数。由于实验数据有限，此类模型通常使用模拟数据进行训练，这带来了补偿模拟与实验之间固有差异的挑战。为了弥合这一差距，我们展示了数据增强和对抗性领域自适应技术的应用，通过这些技术，我们可以预测用于光谱仪自动对准的绝对坐标。以最少的真实数据弥合模拟与实验之间的差距，为在科学仪器中利用机器学习实现自动化实验开辟了新途径。
