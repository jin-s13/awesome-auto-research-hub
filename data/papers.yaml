  title_cn: AI城市科学家：面向城市研究的多智能体协同自动化
  abstract_cn: 城市研究旨在理解城市作为复杂适应系统如何运作和演化。随着城市数据和分析方法的快速增长，该领域的核心挑战已从数据可用性转向通过多学科方法将异构数据整合为连贯、可验证的城市知识。人工智能的最新进展，特别是大型语言模型（LLMs）的出现，使得能够自主推理、生成假设和进行数据驱动实验的AI科学家得以发展，展示了自主城市研究的巨大潜力。然而，大多数通用AI系统与城市研究所需的领域特定知识、方法论惯例和推理标准仍存在偏差。在此，我们提出AI城市科学家，一个知识驱动的多智能体框架，旨在支持自主城市研究。该系统基于从大规模先前研究中提炼的假设、同行评审反馈、数据集和研究方法论，构建结构化领域知识，引导基于LLM的智能体自动生成假设、识别并整合多源城市数据集、进行实证分析和模拟，并迭代优化分析方法。通过这一过程，该框架综合了城市科学的新见解，加速了城市研究生命周期。
