- id: openlens-ai-fully-autonomous-research-agent-for-health-info-2025
  title: 'OpenLens AI: Fully Autonomous Research Agent for Health Infomatics'
  authors:
  - Yuxiao Cheng
  - Jinli Suo
  abstract: Health informatics research is characterized by diverse data modalities,
    rapid knowledge expansion, and the need to integrate insights across biomedical
    science, data analytics, and clinical practice. These characteristics make it
    particularly well-suited for agent-based approaches that can automate knowledge
    exploration, manage complex workflows, and generate clinically meaningful outputs.
    Recent progress in large language model (LLM)-based agents has demonstrated promising
    capabilities in literature synthesis, data analysis, and even end-to-end research
    execution. However, existing systems remain limited for health informatics because
    they lack mechanisms to interpret medical visualizations and often overlook domain-specific
    quality requirements. To address these gaps, we introduce OpenLens AI, a fully
    automated framework tailored to health informatics. OpenLens AI integrates specialized
    agents for literature review, data analysis, code generation, and manuscript preparation,
    enhanced by vision-language feedback for medical visualization and quality control
    for reproducibility. The framework automates the entire research pipeline, producing
    publication-ready LaTeX manuscripts with transparent and traceable workflows,
    thereby offering a domain-adapted solution for advancing health informatics research.
