  title_cn: 基于迭代工作流的深度文献综述自动化
  abstract_cn: 自动文献综述生成已引起越来越多的关注，然而现有系统大多遵循一次性范式，即一次性检索大量论文并在起草前生成静态大纲。这种设计常导致检索噪声大、结构碎片化和上下文过载，最终限制了综述质量。受人类研究者迭代阅读过程的启发，我们提出IterSurvey，一种基于循环大纲生成的框架，其中规划智能体逐步检索、阅读并更新大纲，以确保探索性和连贯性。为了提供忠实的论文级基础，我们设计了论文卡片，将每篇论文提炼为其贡献、方法和发现，并引入结合可视化增强的审查与优化循环，以改善文本流畅度并整合图表等多模态元素。在成熟和新兴主题上的实验表明，IterSurvey在内容覆盖度、结构连贯性和引用质量方面显著优于最先进基线，同时生成更易获取且组织更佳的综述。为了更可靠地评估这些改进，我们进一步引入了Survey-Arena，一种成对基准，它补充了绝对评分，并更清晰地定位机器生成综述相对于人工撰写综述的位置。代码见https://github.com/HancCui/IterSurvey_Autosurveyv2。
  tldr_cn: 提出一种基于循环大纲生成和论文卡片的迭代工作流用于自动文献综述生成，性能优于基线方法。
  analysis_cn:
    innovations:
    - 基于循环大纲生成的迭代工作流，规划智能体逐步检索、阅读并更新大纲
    - 论文卡片将每篇论文提炼为贡献、方法和发现，实现忠实的论文级基础
    - 结合可视化增强的审查与优化循环，改善文本流畅度并整合多模态元素（图表）
    - Survey-Arena，一种成对基准，用于更可靠地评估机器生成综述相对于人工撰写的综述
    methodology: 该框架使用一个规划智能体，逐步检索论文、阅读并迭代更新大纲。论文卡片总结每篇论文的贡献、方法和发现。结合可视化增强的审查与优化循环改善文本并整合图表。在成熟和新兴主题上，使用内容覆盖度、结构连贯性和引用质量等指标，与最先进基线进行对比评估，并引入新的成对基准Survey-Arena。
    key_results: 所提方法在内容覆盖度、结构连贯性和引用质量方面显著优于最先进基线，生成更易获取且组织更佳的综述。
