  title_cn: EvoScientist：迈向用于端到端科学发现的多智能体演化AI科学家
  abstract_cn: 大型语言模型（LLM）的日益普及使得AI科学家能够执行复杂的端到端科学发现任务，这些任务需要协调专门角色，包括想法生成和实验执行。然而，大多数最先进的AI科学家系统依赖于静态的手工设计流程，无法根据积累的交互历史进行适应。因此，这些系统会忽略有前景的研究方向、重复失败的实验并追求不可行的想法。为了解决这一问题，我们引入了EvoScientist，一个通过持久记忆和自我演化持续改进研究策略的演化多智能体AI科学家框架。EvoScientist包含三个专门智能体：负责科学想法生成的研究者智能体（RA）、负责实验实施与执行的工程师智能体（EA），以及将先前交互中的见解提炼为可重用知识的演化管理智能体（EMA）。EvoScientist包含两个持久记忆模块：（i）构思记忆，总结排名靠前想法中的可行研究方向，同时记录先前不成功的方向；（ii）实验记忆，捕获从代码搜索轨迹和最佳执行实现中得出的有效数据处理和模型训练策略。这些模块使RA和EA能够检索相关的先前策略，从而随时间提高想法质量和代码执行成功率。实验表明，EvoScientist在科学想法生成方面优于7个开源和商业最先进系统，通过自动和人工评估在新颖性、可行性、相关性和清晰度上取得更高分数。EvoScientist还通过多智能体演化显著提高了代码执行成功率，证明了持久记忆在端到端科学发现中的有效性。
  tldr_cn: EvoScientist是一个具有持久记忆和自我演化的多智能体AI科学家框架，用于端到端科学发现。
  analysis_cn:
