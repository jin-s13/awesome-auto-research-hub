    innovations:
    - 引入LABBench2基准，包含近1900项任务，用于衡量AI在生物学研究中的真实世界能力，从LAB-Bench演进而来，背景更真实。
    - 公开发布任务数据集和评估工具，以促进社区使用。
    methodology: 该基准包含近1900项任务，延续了LAB-Bench对类似能力的衡量，但置于更真实的背景下。评估当前前沿模型在LABBench2上的性能，并与LAB-Bench上的性能进行比较，以量化难度提升。
    key_results: 前沿模型在两个基准上的表现均有显著提升，但LABBench2难度明显更高，各子任务中模型特定准确率下降幅度为-26%至-46%，凸显了剩余的性能差距。
