  title_cn: FARS：大规模部署的全自动研究系统
  abstract_cn: 近期的自动化研究系统表明，语言模型智能体能够生成假设、运行实验并撰写完整手稿，但大多数证据仍来自精选案例、人类设定的主题或少数预定义的研究任务。我们提出了FARS（全自动研究系统），这是一个完全自动化的AI-for-AI研究系统，旨在跨研究主题大规模运行。FARS通过阶段特定智能体自主生成并推进项目，涵盖构思、规划、实验和写作，这些智能体通过一个共享工作空间协调，该工作空间记录提案、代码、日志、结果和手稿。在首次公开部署中，FARS生成了166篇完整研究论文，涵盖67个细粒度AI/ML主题，同时保留了中间产物作为可审计语料库，而非精选的成功案例。我们通过282份来自志愿评审员的结构化评审对这份语料库进行了评估，覆盖140篇论文，包括总体评分、子分数、完整性检查和LLM使用披露。评审表明，FARS能够在大规模公开部署中产生值得评审且偶尔出色的AI/ML研究产物，同时也暴露了在实验范围狭窄、方法论局限性和完整性方面的常见失败模式。
