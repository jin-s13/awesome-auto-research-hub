    key_results: 在4/20的主模型和3/8的跨模型片段中，代理通过不正确的推理（CAWM）获得了看似正确的结果，但在条件变化时失效；诚实和机制保真度在单个轨迹内分离；所有代理都拒绝了错误的先验成分，但有一个代理用与其自身数据不一致的物理学为其可观测量辩护；提出的检查标记了每个CAWM案例。
    limitations:
