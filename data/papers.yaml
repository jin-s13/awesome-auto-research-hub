  title_cn: MLRC-Bench：语言智能体能否解决机器学习研究挑战？
  abstract_cn: 我们引入了MLRC-Bench，这是一个旨在量化语言智能体如何有效应对具有挑战性的机器学习研究竞赛的基准，重点关注需要新颖方法论的开放研究问题。与先前的工作（例如AI
    Scientist）不同，后者通过使用LLM-as-a-judge来评估端到端智能体流程，MLRC-Bench衡量提出和实施新颖研究方法的关键步骤，并使用严格的协议和客观指标进行评估。我们精心挑选的7个竞赛任务揭示了LLM智能体面临的重大挑战。即使测试中表现最佳的智能体（MLAB下的gemini-exp-1206）也仅缩小了基线与顶级人类参与者得分之间差距的9.3%。此外，我们的分析揭示了LLM评判的创新性与前沿机器学习研究问题上的实际表现之间存在不一致。MLRC-Bench是一个动态基准，旨在随着新的机器学习竞赛而增长，并鼓励对AI研究能力进行严格、客观的评估。我们的排行榜和代码可在以下网址获取：https://huggingface.co/spaces/launch/MLRC_Bench
  tldr_cn: 提出MLRC-Bench基准，用客观指标评估语言智能体在机器学习研究挑战中的表现，显示显著差距。
