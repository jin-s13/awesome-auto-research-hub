  analysis:
    innovations:
    - Introduces PRL-Bench, a benchmark for evaluating LLMs on end-to-end physics
      research tasks that require exploration-oriented formulation, long-horizon workflows,
      and objective verifiability.
    - Shifts evaluation beyond domain knowledge and complex reasoning to the procedural
      and exploratory demands of real scientific research.
    - 'Constructs tasks from 100 curated papers in the latest issues of Physical Review
      Letters (since August 2025), validated by domain experts, covering five theory-
      and computation-intensive subfields: astrophysics, condensed matter physics,
      high-energy physics, quantum information, and statistical physics.'
    methodology: PRL-Bench is built from 100 recent Physical Review Letters papers,
      curated and validated by domain experts, to replicate core properties of authentic
      physics research. Tasks are designed to require exploration-oriented problem
      formulation, long-horizon reasoning, and produce objectively verifiable outcomes.
      Frontier LLMs are evaluated on these tasks, and overall performance is reported
      as a score.
    key_results: The best-performing frontier model achieves an overall score below
      50, indicating a significant gap between current LLM capabilities and the demands
      of real physics research.
    limitations:
    - The benchmark is restricted to theoretical and computational physics, excluding
      experimental research workflows.
    - Tasks are derived from a single journal (Physical Review Letters) and a narrow
      temporal window (since August 2025), which may limit the generalizability of
      findings across the broader physics literature.
    - The abstract reports only an aggregate score without detailed breakdowns by
      subfield, model, or failure modes, limiting insight into specific capability
      boundaries.
  title_cn: PRL-Bench：评估大语言模型在前沿物理研究中能力的综合基准
  abstract_cn: 智能体科学的范式要求AI系统进行稳健推理并开展长周期自主探索。然而，当前的科学基准仍局限于领域知识理解和复杂推理，未能评估真实研究的探索性和过程复杂性。本文提出了理论物理与计算物理中的研究导向评估——一个兼具全面领域知识、复杂推理以及无需实验即可验证的端到端工作流的天然测试平台。我们在此介绍PRL-Bench（Physics
    Research by LLMs），一个旨在系统映射LLM在执行端到端物理研究时能力边界的基准。该基准从2025年8月以来《物理评论快报》最新期中的100篇精选论文构建，并经领域专家验证，涵盖现代物理学的五个理论和计算密集型子领域：天体物理学、凝聚态物理、高能物理、量子信息和统计物理。基准中的每个任务都旨在复现真实科学研究的核心特性，包括探索导向的问题构建、长周期工作流和客观可验证性，从而重构真实物理研究的基本推理过程和研究工作流。对前沿模型的评估显示，其表现仍然有限，最佳总分低于50，揭示了当前LLM能力与真实科学研究需求之间的显著差距。PRL-Bench为评估下一代AI科学家、推动AI系统迈向自主科学发现提供了可靠的测试平台。
  tldr_cn: PRL-Bench利用《物理评论快报》100篇论文评估LLM的端到端物理研究能力，表现有限。
  analysis_cn:
    innovations:
    - 提出了PRL-Bench，一个评估LLM在端到端物理研究任务中表现的基准，这些任务需要探索导向的问题构建、长周期工作流和客观可验证性。
    - 将评估从领域知识和复杂推理转向真实科学研究的过程性和探索性需求。
    - 从《物理评论快报》最新期（2025年8月起）中精选100篇论文构建任务，经领域专家验证，涵盖五个理论和计算密集型子领域：天体物理学、凝聚态物理、高能物理、量子信息和统计物理。
    methodology: PRL-Bench基于100篇近期《物理评论快报》论文构建，经领域专家精选和验证，以复现真实物理研究的核心特性。任务设计需要探索导向的问题构建、长周期推理，并产生客观可验证的结果。对前沿LLM在这些任务上进行评估，并以总分形式报告整体表现。
    key_results: 表现最佳的前沿模型总分低于50，表明当前LLM能力与真实物理研究需求之间存在显著差距。
    limitations:
    - 该基准仅限于理论和计算物理，排除了实验研究工作流。
    - 任务来源于单一期刊（《物理评论快报》）且时间窗口狭窄（2025年8月起），这可能限制了研究结果在更广泛物理学文献中的泛化性。
    - 摘要仅报告了总分，未按子领域、模型或失败模式进行详细分解，限制了对特定能力边界的洞察。
