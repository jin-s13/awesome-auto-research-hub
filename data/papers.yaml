  title_cn: BoxingGym：自动化实验设计与模型发现进展的基准测试
  abstract_cn: 理解世界并用科学理论解释它是人工智能研究的核心目标。提出理论、设计实验验证理论、并根据数据修正理论是科学发现的基础。尽管基于LLM的科学智能体展现出巨大潜力，但目前尚无基准能够系统测试LLM提出科学模型、收集实验数据以及根据新数据修正模型的能力。我们提出了BoxingGym，一个包含10个环境的基准，用于系统评估实验设计（例如收集数据以检验科学理论）和模型发现（例如提出和修正科学理论）。为了实现可处理且量化的评估，我们将每个环境实现为一个生成式概率模型，科学智能体可以与之进行交互式实验。这些概率模型来自从心理学到生态学等多个真实科学领域。为了定量评估科学智能体收集信息性实验数据的能力，我们计算了期望信息增益（EIG），这是一种信息论度量，衡量实验在多大程度上减少了对生成模型参数的不确定性。一个好的科学理论是简洁且具有预测性的解释。因此，为了定量评估模型发现，我们要求科学智能体解释其模型，然后评估该解释是否能使另一个科学智能体对该环境做出可靠的预测。除了这种基于解释的评估，我们还计算了预测误差等标准模型评估指标。我们发现，当前的LLM（如GPT-4o）在实验设计和模型发现两方面都表现不佳。我们还发现，为基于LLM的智能体增加显式统计模型并不能可靠地改善这些结果。
  tldr_cn: BoxingGym基准含10个真实科学领域概率模型环境，评估LLM实验设计与模型发现能力。
  analysis_cn:
    innovations:
    - 提出了BoxingGym基准，包含10个环境，用于评估自动化实验设计和模型发现。
    - 使用来自真实科学领域的生成式概率模型作为交互环境。
    - 通过期望信息增益（EIG）对实验设计进行定量评估。
    - 通过另一个智能体基于解释的预测以及标准预测误差指标来评估模型发现。
    - 发现LLM表现不佳，且增加显式统计模型并不能可靠地提升性能。
    methodology: BoxingGym包含10个环境，每个环境实现为来自心理学和生态学等领域的生成式概率模型。智能体与这些环境交互以设计实验并提出/修正科学模型。实验设计通过期望信息增益（EIG）评估，模型发现则通过让智能体解释其模型，然后衡量另一个智能体利用该解释进行预测的能力，同时结合标准预测误差指标进行评估。
    key_results: 当前LLM（如GPT-4o）在实验设计和模型发现两方面均表现不佳；为基于LLM的智能体增加显式统计模型并不能可靠地提升性能。
