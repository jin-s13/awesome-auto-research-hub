    innovations:
    - Conceptualizes the AARR benchmark series that evaluates agents on granular research
      scenarios requiring professionalism, thoroughness, and nuanced reasoning, shifting
      focus from macro-level execution.
    - Introduces AARRI-Bench, the first benchmark in the series, specifically targeting
      research intern-level tasks to assess whether agents can emulate human researcher
      qualities.
    methodology: The authors designed AARRI-Bench, a benchmark of granular research
      tasks that test agents' ability to exhibit professionalism, thoroughness, and
      nuanced reasoning. They evaluated multiple frontier models and agentic harnesses
      (e.g., Mini-SWE-Agent with Claude Opus 4.7) by measuring success rate on these
      tasks.
    key_results: The best configuration, Mini-SWE-Agent with Claude Opus 4.7, achieved
      only a 68.3% success rate, with agents frequently overlooking subtle yet critical
      details that are obvious to human researchers.
    limitations:
    - Agents exhibit significant limitations in field sensitivity, research ethics,
      and nuanced scientific judgment.
    - Current frontier agents cannot fully replace human researchers.
    - The benchmark is limited to research intern-level scenarios, not covering the
      full range of research activities.
    - Developing researcher-like AI requires further exploration of research behavior
      beyond complex scaffolding.
  title_cn: 像真正的科研人员一样行动：一套评估前沿大语言模型及智能体框架在研究生命周期中表现的基准
  abstract_cn: 随着基础模型的进步和智能体框架日益复杂，智能体在复杂的长期编码任务甚至自主实验执行中展现出卓越的能力。尽管它们已从研究助手演变为自主研究智能体，但这些系统在领域敏感性、研究伦理和细微科学判断方面仍存在显著局限。因此，前沿智能体仍无法完全取代人类研究人员。为弥合这一差距，我们提出了AARR（像真正的科研人员一样行动）基准系列。与现有主要评估宏观执行能力的基准不同，AARR聚焦于智能体能否在细粒度研究场景中模仿人类研究人员的专业性、全面性和细致推理。在本工作中，我们提出了AARRI-Bench（像真正的研究实习生一样行动），这是该系列的第一个基准。我们在前沿模型和智能体系统上进行了大量实验，结果显示，即使是最佳配置（Mini-SWE-Agent与Claude
    Opus 4.7）也仅达到68.3%的成功率，且经常忽略真实人类研究人员显而易见的细微但关键细节。我们的结果表明，开发类似研究人员的AI需要进一步探索研究行为，而不仅仅是复杂的框架。我们的数据发布在https://github.com/AARR-bench/AARRI-bench。
  tldr_cn: 一套评估前沿LLM和智能体在研究任务中的基准，显示其仍不及人类研究人员。
  analysis_cn:
    innovations:
    - 提出了AARR基准系列，该系列在需要专业性、全面性和细致推理的细粒度研究场景中评估智能体，将关注点从宏观执行能力转移。
    - 引入了AARRI-Bench，作为该系列的第一个基准，专门针对研究实习生级别的任务，评估智能体能否模仿人类研究人员的特质。
    methodology: 作者设计了AARRI-Bench，这是一个由细粒度研究任务组成的基准，测试智能体展现专业性、全面性和细致推理的能力。他们通过测量这些任务的成功率，评估了多个前沿模型和智能体框架（例如Mini-SWE-Agent与Claude
      Opus 4.7）。
    key_results: 最佳配置（Mini-SWE-Agent与Claude Opus 4.7）仅达到68.3%的成功率，智能体经常忽略对人类研究人员而言显而易见的细微但关键细节。
    limitations:
    - 智能体在领域敏感性、研究伦理和细微科学判断方面存在显著局限。
    - 当前的前沿智能体无法完全取代人类研究人员。
    - 该基准仅限于研究实习生级别的场景，未覆盖全部研究活动。
    - 开发类似研究人员的AI需要进一步探索研究行为，而不仅仅是复杂的框架。
    tech_stack: []
