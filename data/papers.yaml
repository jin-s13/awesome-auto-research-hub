    methodology: 该基准包含12,553个未解决的生物医学问题，要求代理在基于检索的设置中执行多次工具调用。难度通过选择三个开放权重参考模型无法回答的问题来经验性确定。评估使用冻结的每问题检查清单判断答案正确性，开放性通过真实后续证据验证。
    key_results: 在最难子集上，与难度锚点同系列的保留模型解决约17%，而前沿代理（Gemini-3-Pro、Opus-4.7、GPT-5.5）达到29-60%，最佳代理仍有33-40%未解决。最难问题上出现代理崩溃，对于最易崩溃的模型，阻止工具访问几乎不改变其得分。
