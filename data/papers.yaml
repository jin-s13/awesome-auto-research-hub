  title_cn: 初级AI科学家及其风险报告：基于基线论文的自主科学探索
  abstract_cn: 理解AI科学家系统（自动研究）的当前能力和风险，对于确保可信赖和可持续的AI驱动科学进步，同时维护学术生态系统的完整性至关重要。为此，我们开发了Jr.
    AI Scientist，一个最先进的自主AI科学家系统，它模拟新手学生研究员的核心研究工作流程：给定人类导师的基线论文，分析其局限性，提出改进的新假设，迭代实验直至实现改进，并撰写包含结果的论文。与之前假设完全自动化或在小型代码上运行的方法不同，Jr.
    AI Scientist遵循明确的研究工作流程，并利用现代编码代理处理复杂的多文件实现，从而产生有科学价值的贡献。通过我们的实验，Jr. AI Scientist成功生成了基于真实NeurIPS、IJCV和ICLR作品的新研究论文，提出并实现了新颖方法。在评估方面，我们使用AI评审者进行了自动评估、作者主导的评估，并向专门致力于AI驱动贡献的会议Agents4Science投稿。结果表明，Jr.
    AI Scientist生成的论文在DeepReviewer中获得的评审分数高于现有全自动系统。然而，作者评估和Agents4Science的评审指出了重要局限性，表明直接应用当前AI科学家系统的潜在风险以及未来研究的关键挑战。最后，我们全面报告了开发过程中识别的各种风险。我们相信这项研究阐明了AI科学家系统的当前角色和局限性，为仍需人类专业知识的领域以及随着这些系统发展可能出现的风险提供了见解。
  tldr_cn: 初级AI科学家自主分析基线论文局限、实验并撰写论文，生成新颖研究，获得更高评审分数。
