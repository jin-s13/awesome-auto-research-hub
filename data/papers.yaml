- id: smcevolve-principled-scientific-discovery-via-sequential-mo-2026
  title: 'SMCEvolve: Principled Scientific Discovery via Sequential Monte Carlo Evolution'
  authors:
  - Jiachen Jiang
  - Huminhao Zhu
  - Zhihui Zhu
  abstract: 'LLM-driven program evolution has emerged as a powerful tool for automated
    scientific discovery, yet existing frameworks offer no principled guide for designing
    their individual components and provide no guarantee that the search converges.
    We introduce SMCEvolve, which recasts program search as sampling from a reward-tilted
    target distribution and approximates it with a Sequential Monte Carlo (SMC) sampler.
    From this view, three core mechanisms emerge as principled components: adaptive
    parent resampling, mixture of mutation with acceptance, and automatic convergence
    control. We further provide a finite-sample complexity analysis that bounds the
    LLM-call budget required to reach a target approximation error. Across math, algorithm
    efficiency, symbolic regression, and end-to-end ML research benchmarks, SMCEvolve
    surpasses state-of-the-art evolving systems while using fewer LLM calls under
    self-determined termination. The code is available at https://github.com/kongwanbianjinyu/SMCEvolve.'
  year: 2026
  venue: arXiv
