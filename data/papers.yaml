    methodology: 训练神经网络作为Finesse模拟器的代理。算法在训练代理、使用代理进行新实验的逆向设计、用慢速模拟器验证候选方案以及用新数据重新训练代理之间迭代。自动微分和GPU并行性加速搜索过程。
