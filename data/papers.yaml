  title_cn: AI科学家：迈向全自动开放式科学发现
  abstract_cn: 人工智能通用智能的重大挑战之一是开发能够进行科学研究并发现新知识的智能体。虽然前沿模型已被用作人类科学家的助手，例如用于头脑风暴想法、编写代码或预测任务，但它们仅执行科学过程中的一小部分。本文提出了首个全自动科学发现的综合框架，使前沿大型语言模型能够独立进行研究并交流其发现。我们介绍了AI科学家，它能够生成新颖的研究想法、编写代码、执行实验、可视化结果、通过撰写完整的科学论文来描述其发现，然后运行模拟评审过程进行评估。原则上，这一过程可以重复进行，以开放式的方式迭代发展想法，类似于人类科学社区。我们通过将其应用于机器学习的三个不同子领域来展示其多功能性：扩散建模、基于Transformer的语言模型和学习动力学。每个想法都被实现并发展成一篇完整的论文，每篇论文的成本不到15美元。为了评估生成的论文，我们设计并验证了一个自动评审器，我们证明它在评估论文分数方面达到了接近人类的性能。根据我们的自动评审器判断，AI科学家能够生成超过顶级机器学习会议接受阈值的论文。这种方法标志着机器学习科学发现新时代的开始：将AI智能体的变革性益处带给AI自身的整个研究过程，并使我们更接近一个世界，在那里无尽的负担得起的创造力和创新可以被释放到世界上最棘手的问题上。我们的代码已在https://github.com/SakanaAI/AI-Scientist开源。
  tldr_cn: 提出一个使用LLMs进行全自动科学发现的框架，包括生成想法、编写代码、运行实验、撰写论文和模拟评审。
  analysis_cn:
    innovations:
    - 首个全自动科学发现的综合框架
    - AI科学家智能体，能够自主生成新颖研究想法、编写代码、执行实验、可视化结果并撰写完整科学论文
    - 具有接近人类性能的模拟自动评审过程，用于评估生成的论文
    - 开放式迭代发现过程，可像人类科学社区一样反复发展想法
    methodology: AI科学家框架使用前沿大型语言模型独立生成研究想法、实现代码、运行实验、可视化结果并撰写完整论文。一个经过验证达到接近人类评分性能的模拟自动评审器对论文进行评估。该方法在三个机器学习子领域得到展示：扩散建模、基于Transformer的语言模型和学习动力学。
    key_results: AI科学家生成的论文在自动评审器的评判下超过了顶级机器学习会议的接受阈值，每篇论文成本低于15美元。自动评审器在评估论文分数方面达到了接近人类的性能。
