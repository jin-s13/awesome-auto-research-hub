- id: towards-end-to-end-automation-of-ai-research-2026
  title: Towards End-to-End Automation of AI Research
  authors:
  - Yutaro Yamada
  - Robert Tjarko Lange
  - Cong Lu
  - Chris Lu
  - Shengran Hu
  - Jakob Foerster
  - David Ha
  - Jeff Clune
  abstract: 'The automation of science is a long-standing ambition in the field of
    AI. While the community has made significant progress in automating individual
    components of the scientific process, a system that autonomously navigates the
    entire research lifecycle -- from conception to publication -- has remained out
    of reach. Here, we present the strongest demonstration to date toward automating
    the entire process end-to-end. We present The AI Scientist, which creates research
    ideas, writes code, runs experiments, plots and analyzes data, writes the entire
    scientific manuscript and performs its own peer review. Its ideas, execution,
    and presentation are of sufficient quality to produce a manuscript generated by
    an AI system that passes the first round of peer review at a major machine learning
    conference workshop. The workshop has an acceptance rate of 70 percent. Our system
    leverages modern foundation models within a complex agentic system. We evaluate
    The AI Scientist in two settings: a focused mode using human-provided code templates
    as an initial scaffold to conduct research on a specific topic, and a template-free,
    open-ended mode that leverages agentic search for wider scientific exploration.
    Both settings produce diverse ideas and automatically test, report on, and evaluate
    them. This achievement demonstrates AI''s growing capacity for scientific contribution
    and signifies a potential paradigm shift in how research is conducted. As with
    any impactful new technology, there could be significant risks, including taxing
    overwhelmed review systems and adding noise to scientific literature. However,
    if developed responsibly, such autonomous systems could greatly accelerate scientific
    discovery.'
