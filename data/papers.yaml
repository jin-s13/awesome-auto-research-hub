  title_cn: AI辅助研究中的校准转向：面向证据许可主张的概念与方法论框架
  abstract_cn: AI辅助研究已进入一个阶段，其中核心问题不仅是系统能否生成假设、运行实验或撰写手稿，而是其科学主张是否与支持它们的证据相校准。这篇视角型论文为AI辅助研究中的证据许可主张开发了一个概念与方法论框架。受代表性路径（包括专门化科学基础模型、LLM研究助手、多智能体协同科学家、AI科学家流水线、数学发现智能体以及自动驾驶实验室）的启发，它将AI辅助研究表示为五个算子：假设生成、模型中介的后果推导、外部验证、信念更新和主张校准。核心主张是，校准不仅是谨慎措辞，而是一种管理科学断言权利的机制：证据许可某些形式的言论，并拒绝其他形式。论文区分了语言语义、基于后果的语义、干预语义和证据许可语义；定义了主张-证据差距和认知债务；并将跨异构输出的最小结构重构视为一种向上的主张校准形式。AISim-Cal作为一个说明性的合成动态练习被包含在内，而非经验预测或基准。由此产生的原则是：无许可则无主张，验证不决定主张层级，自动化放大了校准的需求。因此，可靠的AI辅助研究被评估为一个循环：生成假设、推导可检验的后果、接受独立裁决、更新信念，并仅输出证据许可的主张。
  tldr_cn: AI辅助研究中证据许可主张的概念框架，强调校准而非单纯假设生成或自动化。
  analysis_cn:
    innovations:
    - 用于校准AI辅助研究输出的证据许可主张的概念框架
    - AI辅助研究的五算子模型：假设生成、模型中介的后果推导、外部验证、信念更新和主张校准
    - 科学主张的语言语义、基于后果的语义、干预语义和证据许可语义之间的区分
    - 主张-证据差距和认知债务的定义，用于量化主张与支持证据之间的错位
    - 最小结构重构作为跨异构输出的向上主张校准形式
    - AISim-Cal合成动态练习，说明校准原则而不进行经验预测
    methodology: 该论文通过将代表性AI辅助研究路径（专门化科学基础模型、LLM研究助手、多智能体协同科学家、AI科学家流水线、数学发现智能体、自动驾驶实验室）抽象为五个算子，发展了一个概念框架。它引入了语义区分，定义了主张-证据差距和认知债务等关键概念，并包含AISim-Cal作为说明性的合成动态练习，而非经验基准。
    key_results: 该框架得出三个原则：无许可则无主张，验证不决定主张层级，自动化放大了校准的需求。可靠的AI辅助研究被描述为一个循环：生成假设、推导可检验的后果、接受独立裁决、更新信念，并仅输出证据许可的主张。
    limitations:
    - 该框架纯属概念性，缺乏经验验证
    - AISim-Cal是说明性的合成练习，而非经验预测或基准
  grade: worth_reading
- id: the-scientific-contribution-graph-automated-literature-base-2026
  title: 'The Scientific Contribution Graph: Automated Literature-based Technological
    Roadmapping at Scale'
  authors:
  - Peter A. Jansen
  abstract: Scientific contributions rarely develop in isolation, but instead build
    upon prior discoveries. We formulate the task of automated technological roadmapping
    as extracting scientific contributions from scholarly articles and linking them
    to their prerequisites. We present the Scientific Contribution Graph, a large-scale
    AI/NLP-domain resource containing 2 million detailed scientific contributions
    extracted from 230k open-access papers and connected by 12.5 million prerequisite
    edges. We further introduce scientific prerequisite prediction, a scientific discovery
    task in which models predict which existing technologies can enable future discoveries,
    and show that contemporary models are rapidly improving on this task, reaching
    0.48 MAP when evaluated using temporally filtered backtesting. We anticipate technological
    roadmapping resources such as this will support scientific impact assessment and
    automated scientific discovery.
