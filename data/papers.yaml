  title_cn: CodeDistiller：自动为科学编码代理生成代码库
  abstract_cn: 自动科学发现（ASD）系统能够帮助自动生成并运行基于代码的实验，但其能力受限于仅凭参数化知识可靠生成的代码。因此，当前系统要么对少量手工制作的实验示例进行变异，要么完全依赖参数化知识，从而限制了质量和覆盖范围。我们提出CodeDistiller，该系统自动将大量科学GitHub仓库提炼为经过验证的领域特定工作代码示例库，使ASD代理无需人工干预即可扩展能力。通过对250个材料科学仓库进行自动和领域专家评估，我们发现最佳模型能够为74%的仓库生成功能示例；下游评估表明，使用CodeDistiller生成库增强的ASD代理比仅使用通用材料科学代码示例的代理能产生更准确、完整且科学合理的实验。我们还采用A/B测试范式将LLM-as-a-judge评分与领域专家评分进行比较，发现两者具有中等一致性，表明廉价的代理指标可能适用于大规模评估科学发现系统。
  tldr_cn: CodeDistiller自动从GitHub仓库提取并验证代码示例，提升科学发现代理的实验质量。
  analysis_cn:
    innovations:
    - CodeDistiller：一种自动将大量科学GitHub仓库提炼为经过验证的领域特定工作代码示例库的系统，用于ASD代理。
    - 使用CodeDistiller生成的库增强ASD代理，使其比仅使用通用代码示例能产生更准确、完整且科学合理的实验。
    - 采用LLM-as-a-judge作为廉价代理指标评估科学发现系统，与领域专家评分具有中等一致性。
    methodology: CodeDistiller处理250个材料科学GitHub仓库，提取并验证功能代码示例。通过自动和领域专家评估最佳模型生成工作示例的能力。下游评估将使用蒸馏库增强的ASD代理与仅使用通用材料科学代码示例的代理在准确性、完整性和科学合理性方面进行比较。采用A/B测试范式将LLM-as-a-judge评分与领域专家评分进行比较。
