  title_cn: AutoResearchClaw：基于人机协作的自我强化自主研究
  abstract_cn: 自动化科学发现不仅仅是根据想法生成论文。真正的研究是迭代的：假设从多个角度受到挑战，实验失败并指导下一次尝试，经验在循环中积累。现有的自主研究系统通常将此过程建模为线性流水线：它们依赖单智能体推理，在执行失败时停止，并且不跨运行传递经验。我们提出AutoResearchClaw，这是一个基于五种机制的多智能体自主研究流水线：用于假设生成和结果分析的结构化多智能体辩论；具有Pivot/Refine决策循环的自愈执行器，将失败转化为信息；可验证的结果报告，防止捏造的数字和幻觉引用；人机协作，具有七种干预模式，涵盖从完全自主到逐步监督；以及跨运行演化，将过去的错误转化为未来的保障。在ARC-Bench（一个包含25个主题的实验阶段基准）上，AutoResearchClaw比AI
