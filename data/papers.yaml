  title_cn: GoodPoint：从作者回复中学习建设性的科学论文反馈
  abstract_cn: 虽然大语言模型在变革科学研究方面具有巨大潜力，但我们主张将其用于增强和赋能研究人员，而非在没有人类监督的情况下自动化研究。为此，我们研究了建设性反馈生成任务，即生成有针对性的、可操作的反馈，帮助作者改进其研究及其呈现。在本工作中，我们沿着两个以作者为中心的维度——有效性和作者行动——来操作化反馈的有效性。我们首先整理了GoodPoint-ICLR数据集，包含19K篇ICLR论文及其审稿反馈，并利用作者回复对这两个维度进行了标注。在此基础上，我们提出了GoodPoint训练方法，该方法通过微调有效且可操作的反馈来利用作者回复中的成功信号，并结合对真实和合成偏好对进行偏好优化。我们在包含1.2K篇ICLR论文的基准测试上的评估表明，经过GoodPoint训练的Qwen3-8B在预测成功率上比基础模型提高了83.7%，并在黄金人类反馈集上的反馈匹配中达到了同类规模大语言模型的最先进水平，甚至在精确度上超越了Gemini-3-flash。我们通过一项专家人工研究进一步验证了这些发现，证明GoodPoint能够持续提供作者认为具有更高实用价值的反馈。
