  - Seonghyun Park
  - Jaehyung Kim
  - Sungsoo Ahn
  abstract: 'Multi-agent systems have emerged as a powerful paradigm for automating
    scientific discovery. To differentiate agent behavior in the multi-agent system,
    current frameworks typically assign generic role-based personas such as ''''reviewer''''
    or ''''writer'''' or rely on coarse grained keyword-based personas. While functional,
    this approach oversimplifies how human scientists operate, whose contributions
    are shaped by their unique research trajectories. In response, we propose INDIBATOR,
    a framework for molecular discovery that grounds agents in individualized scientist
    profiles constructed from two modalities: publication history for literature-derived
    knowledge and molecular history for structural priors. These agents engage in
    multi-turn debate through proposal, critique, and voting phases. Our evaluation
    demonstrates that these fine-grained individuality-grounded agents consistently
    outperform systems relying on coarse-grained personas, achieving competitive or
    state-of-the-art performance. These results validate that capturing the ``scientific
    DNA'''' of individual agents is essential for high-quality discovery.'
