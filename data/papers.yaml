- id: 1gc-7rc-one-graphic-card-seven-research-challenges-how-2026
  title: '1GC-7RC: One Graphic Card -- Seven Research Challenges! How Good Are AI
    Agents at Doing Your Job?'
  authors:
  - Robin-Nico Kampa
  - Fabian Deuser
  - Anna Bößendörfer
  - Konrad Habel
  - Norbert Oswald
  abstract: 'Autonomous AI coding agents are becoming a core tool for ML practitioners
    in industry and research alike. Despite this growing adoption, no standardized
    benchmark exists to evaluate their ability to design, implement, and train models
    from scratch across diverse domains. We introduce **1GC-7RC** (*Single Graphic
    Card: Seven Research Challenges*), a benchmark comprising seven ML tasks spanning
    language modeling, image classification, semantic segmentation, graph learning,
    tabular prediction, time-series forecasting, and text classification. Each task
    provides a locked data-preparation and evaluation script together with a baseline
    training script; the agent may only modify the training code, has no access to
    pretrained weights (with one controlled exception for semantic segmentation),
    no internet access, and must complete each task within a task-specific wall-clock
    budget (40-120 minutes) on a single GPU. We evaluate seven coding agents: five
    proprietary (Claude Code with Sonnet 4.6, Opus 4.6, and Opus 4.7; Codex CLI with
    GPT 5.5; and OpenCode with Qwen 3.6+) and two open-source (OpenCode with Kimi
    K2.5, Kimi K2.6). Across 5 runs per agent-task pair, we report substantial performance
    differences that reveal varying levels of implicit ML knowledge, planning ability,
    and time-budget management. The benchmark, harness, and all evaluation artifacts
    are publicly available on GitHub at https://github.com/Strolchii/1GC-7RC-Benchmark
    to facilitate reproducible comparison of future agents. Because our benchmark
    design is modular, the benchmark can be extended to new tasks and domains, adapted
    to different GPU budgets, and used to study multi-agent settings, making it a
    flexible platform for future research on autonomous research agents.'
