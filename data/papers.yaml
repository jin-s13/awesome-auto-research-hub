  title_cn: 解锁材料科学的视觉记录：来自科学文献的大规模多模态数据集
  abstract_cn: 材料科学文献以图表形式编码了数十年的实验知识，然而这一视觉记录仍被锁定，无法大规模地被人工智能访问。核心困难在于结构性问题：大多数科学图表是复合的，单个标题同时描述多个子面板，使得直接的图像-文本配对不可靠。我们提出了MatMMExtract，一个端到端的开源流程，通过将复合图表分解为单个子面板，并利用由精心策划的材料科学分类法引导的大语言模型生成结构化、有依据的注释来解决这一问题。应用于14,810篇开放获取文章后，MatMMExtract生成了MatSciFig：来自180,571个图表的391,606个面板级图像-文本对，每个对都配有子标题、涵盖19个类别和超过100个子类型的二级可视化类别，以及科学摘要。为了实现准确的面板定位，我们引入了MaterialScope，一个包含2,811个手动标注的材料科学图表的领域特定检测数据集，在该数据集上微调的YOLO12-m检测器达到了0.9227的mAP_50。在六个基准语言模型中，Gemini
    3.1 Flash Lite在注释生成方面提供了最佳的成本-质量权衡，82%的输出被评为良好，幻觉率为4.8%。在MatSciFig上的双编码器检索基线相比零样本CLIP在R@1上提升了4.4倍，证明了该数据集在视觉-语言学习中的即时实用性。所有资源均已向社区开放。
  tldr_cn: 分解材料科学论文复合图为子面板并生成结构化注释，构建大规模多模态数据集。
