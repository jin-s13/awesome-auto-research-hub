      during implementation or evaluation. Six failure modes were documented: bias
      toward training data defaults, implementation drift, memory degradation, overexcitement,
      insufficient domain intelligence, and weak scientific taste.'
    limitations:
    - Bias toward training data defaults
    - Implementation drift under execution pressure
    - Memory and context degradation across long-horizon tasks
    - Overexcitement that declares success despite obvious failures
    - Insufficient domain intelligence
    - Weak scientific taste in experimental design
  title_cn: 为什么LLM还不是科学家：来自四次自主研究尝试的教训
  abstract_cn: 我们报告了一个案例研究，涉及四次端到端尝试，使用六个LLM代理组成的流水线（映射到科学工作流的各个阶段）自主生成机器学习研究论文。在这四次尝试中，三次在实施或评估阶段失败。一次完成了整个流水线，并被Agents4Science
    2025（一个实验性的首届会议，要求AI系统作为第一作者）接收，通过了人类和多AI评审。从这些尝试中，我们记录了六个重复出现的失败模式：对训练数据默认值的偏见、执行压力下的实现漂移、长跨度任务中的记忆和上下文退化、尽管明显失败却宣布成功的过度兴奋、领域智能不足，以及实验设计中薄弱的科学品味。最后，我们讨论了构建更稳健的AI科学家系统的四个设计原则、对自主科学发现的启示，并发布了所有提示、工件和输出，网址为https://github.com/Lossfunk/ai-scientist-artefacts-v1
