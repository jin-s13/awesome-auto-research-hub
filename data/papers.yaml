- id: an-axiomatic-benchmark-for-evaluation-of-scientific-novelty-2026
  title: An Axiomatic Benchmark for Evaluation of Scientific Novelty Metrics
  authors:
  - Miri Liu
  - ChengXiang Zhai
  abstract: The rigorous evaluation of the novelty of a scientific paper is, even
    for human scientists, a challenging task. With the increasing interest in AI scientists
    and AI involvement in scientific idea generation and paper writing, it also becomes
    increasingly important that this task be automatable and reliable, lest both human
    attention and compute tokens be wasted on ideas that have already been explored.
    Due to the challenge of quantifying ground-truth novelty, however, existing novelty
    metrics for scientific papers generally validate their results against noisy,
    confounded signals such as citation counts or peer review scores. These proxies
    can conflate novelty with impact, quality, or reviewer preference, which in turn
    makes it harder to assess how well a given metric actually evaluates novelty.
    We therefore propose an axiomatic benchmark for scientific novelty metrics. We
    first define a set of axioms that a well-behaved novelty metric should satisfy,
    grounded in human scientific norms and practice, then evaluate existing metrics
    across ten tasks spanning three domains of AI research. Our results reveal that
    no existing metric satisfies all axioms consistently, and that metrics fail on
    systematically different axioms, reflecting their underlying architectures. Additionally,
    we show that combining metrics of complementary architectures leads to consistent
    improvements on the benchmark, with per-axiom weighting achieving 90.1% versus
    71.5% for the best individual metric, suggesting that developing architecturally
    diverse metrics is a promising direction for future work. We release the benchmark
    code as supplementary material to encourage the development of more robust scientific
    literature novelty metrics.
