- id: autoresearchclaw-self-reinforcing-autonomous-research-with-2026
  title: 'AutoResearchClaw: Self-Reinforcing Autonomous Research with Human-AI Collaboration'
  authors:
  - Jiaqi Liu
  - Shi Qiu
  - Mairui Li
  - Bingzhou Li
  - Haonian Ji
  - Siwei Han
  - Xinyu Ye
  - Peng Xia
  - Zihan Dong
  - Meng Chen
