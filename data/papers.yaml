  title_cn: 重新思考AI科学家：面向科学发现的交互式多智能体工作流
  abstract_cn: 用于科学发现的人工智能系统已展现出显著潜力，然而现有方法大多为专有系统，并以批处理模式运行，每个研究周期需要数小时，无法实现实时研究者指导。本文介绍了Deep
    Research，一个多智能体系统，能够实现交互式科学探究，周转时间以分钟计。该架构包括用于规划、数据分析、文献搜索和新颖性检测的专门智能体，通过一个持久的世界状态统一起来，该状态在迭代研究周期中保持上下文。两种操作模式支持不同的工作流：半自主模式（带有选择性人工检查点）和全自主模式（用于扩展研究）。在BixBench计算生物学基准上的评估展示了最先进的性能，开放回答准确率达到48.8%，多项选择评估准确率达到64.4%，超过现有基线14到26个百分点。对架构约束的分析，包括开放获取文献的限制和自动新颖性评估固有的挑战，为AI辅助科学工作流的实际部署考虑提供了信息。
  tldr_cn: 提出Deep Research多智能体系统，实现分钟级交互式科学发现，在BixBench上达到最优。
  analysis_cn:
    innovations:
    - 交互式多智能体系统用于科学发现，周转时间以分钟计，与批处理方法形成对比。
    - 专门用于规划、数据分析、文献搜索和新颖性检测的智能体。
    - 持久世界状态在迭代研究周期中保持上下文。
    - 双操作模式：半自主模式（带有选择性人工检查点）和全自主模式（用于扩展研究）。
    methodology: 本文提出Deep Research，一种具有专门智能体和持久世界状态的多智能体架构，在BixBench计算生物学基准上进行评估。性能通过开放回答和多项选择准确率衡量，并与现有基线进行比较。
    key_results: Deep Research在BixBench上取得了最先进的结果，开放回答准确率48.8%，多项选择准确率64.4%，超过基线14到26个百分点。
    limitations:
    - 依赖开放获取文献可能限制系统可用的科学知识范围。
    - 自动新颖性评估仍然具有挑战性，是架构固有的约束。
