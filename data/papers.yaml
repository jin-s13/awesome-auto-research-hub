- id: bioinsight-multi-agent-orchestration-for-interactive-biomed-2026
  title: 'BioInsight: Multi-Agent Orchestration for Interactive Biomedical Knowledge
    Discovery'
  authors:
  - Jieyi Wang
  - Bingxuan Li
  - Nanyi Jiang
  - Desong Meng
  - Zirui Fan
  - Yuxin Guo
  - Jiayu Liu
  - Kunlun Zhu
  - Eddie Yang
  - Xiusi Chen
  - Pan Lu
  - Bingxin Zhao
  abstract: Biomedical researchers increasingly use AI-generated analyses and reports
    to interpret protein-level signals, but static outputs are often insufficient
    for research decision-making, where users need to inspect evidence, assess uncertainty,
    compare mechanisms, and refine hypotheses. We present BioInsight, a multi-agent
    system that moves from static biomedical report generation to interactive evidence-centered
    interactive interface generation. Given a disease name, a protein association
    table, and optional cohort metadata, BioInsight organizes disease-specific evidence
    through typed intermediate artifacts, including ranked pathways, literature evidence
    packets, protein-level reasoning notes, citation-grounded reports, dashboard schemas,
    and rendered interactive interfaces. The system decomposes evidence retrieval
    from mechanistic reasoning, normalizes citations through deterministic components,
    and converts the same structured evidence used in the report into an interactive
    interface. We evaluate BioInsight on standardized biomedical QA, challenging protein-function
    reasoning, and end-to-end biomedical evidence synthesis. Results show that BioInsight
    achieves best, and suggest that biomedical AI systems should move beyond text-only
    and static reports toward provenance-preserving, interactive evidence artifacts.
