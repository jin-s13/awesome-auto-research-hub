  title_cn: 使AI科学家能够识别创新：一种评估新颖性的领域无关算法
  abstract_cn: 在追求通用人工智能（AGI）的过程中，自动化生成和评估新颖研究想法是AI驱动科学发现中的一个关键挑战。本文提出了相对邻居密度（RND），一种用于研究想法新颖性评估的领域无关算法，通过比较一个想法的局部密度与其相邻邻居的密度，克服了现有方法的局限性。我们首先开发了一种可扩展的方法论，无需专家标注即可创建测试集，解决了新颖性评估中的一个基本挑战。利用这些测试集，我们证明了我们的RND算法在计算机科学（AUROC=0.820）和生物医学研究（AUROC=0.765）领域达到了最先进（SOTA）性能。最重要的是，尽管像Sonnet-3.7这样的SOTA模型和现有指标表现出领域特定的性能下降，但RND凭借其领域不变特性，在各领域保持一致的准确性，在跨领域评估中以显著优势（0.795对比0.597）超越了所有基准。这些结果验证了RND作为科学研究中自动化新颖性评估的可泛化解决方案。
  tldr_cn: 一种无需专家标注、跨领域SOTA性能的研究想法新颖性评估领域无关算法（RND）。
