  title_cn: SciAtlas：面向自动化科学研究的大规模知识图谱
  abstract_cn: 全球学术产出的指数级增长使研究人员和AI代理面临前所未有的“信息爆炸”，碎片化、非结构化的知识组织阻碍了深层次的跨学科整合。当前的学术检索工具主要依赖浅层关键词匹配或向量空间语义检索，缺乏导航复杂逻辑连接所需的拓扑推理能力。基于代理的深度研究框架容易出现逻辑幻觉且推理成本高昂。为弥补这一差距，本报告介绍了SciAtlas——一个大规模、多学科、异构的学术资源知识图谱，设计为全景式科学演化网络。通过整合来自26个学科的超过4300万篇论文，总计1.57亿个实体和30亿个三元组，SciAtlas提供了结构化的拓扑认知基底，打破了学科壁垒，为AI代理提供了全局视角。此外，我们开发了一种神经符号检索算法，采用三路径协同召回和图重排序，实现了从简单语义匹配到确定性关联发现的无缝过渡。我们还展示了SciAtlas的关键应用方向，包括文献综述、自动研究趋势综合、创意定位和学术轨迹探索，证明SciAtlas可以作为有效的“认知地图”赋能自动化科学研究的全流程，同时显著降低推理成本。我们已在GitHub仓库中发布了知识图谱检索及各种下游任务的接口。
  tldr_cn: SciAtlas是一个大规模多学科知识图谱，含4300万论文及神经符号检索算法，支持自动化科研。
  analysis_cn:
    innovations:
    - 大规模多学科异构知识图谱（SciAtlas），整合了4300万篇论文、1.57亿个实体和30亿个三元组
    - 神经符号检索算法，采用三路径协同召回和图重排序，实现确定性关联发现
    - 将SciAtlas作为认知地图应用于自动化科学研究任务，包括文献综述、趋势综合、创意定位和轨迹探索
    methodology: SciAtlas构建为一个异构知识图谱，来源于26个学科的超过4300万篇论文，产生1.57亿个实体和30亿个三元组。开发了一种结合三路径协同召回和图重排序的神经符号检索算法，实现从语义匹配到确定性关联发现的过渡。该系统应用于文献综述、自动研究趋势综合、创意定位和学术轨迹探索。
    key_results: 知识图谱构建达到4300万篇论文、1.57亿个实体和30亿个三元组的规模；检索算法实现了确定性关联发现；应用演示表明可降低自动化研究的推理成本。
    limitations: []
    tech_stack:
    - Knowledge Graph
    - Neuro-symbolic Retrieval
    - Tri-path Collaborative Recall
    - Graph Reranking
