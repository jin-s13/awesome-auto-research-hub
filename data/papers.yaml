  title_cn: 指导大语言模型逐步生成科学文献综述
  abstract_cn: 自动生成科学文献综述是一项有价值的任务，可以显著提升研究效率。然而，文献综述中信息的多样性和复杂性给生成模型带来了巨大挑战。本文设计了一系列提示，系统性地利用大语言模型（LLMs），通过逐步方法生成全面的文献综述。具体而言，我们设计提示引导LLMs依次生成文献综述的标题、摘要、层次化标题和主要内容。我们认为这种设计能够从高层视角生成标题。在内容生成过程中，该设计通过限制LLM查询中输入和输出内容的长度，有效利用相关信息并降低成本。我们使用Qwen-long的实现方案在NLPCC
    2024科学文献综述生成评测任务中获得第三名，总分仅比第二名低0.03%。此外，我们的软标题召回率为95.84%，在所有提交中排名第二。得益于高效的提示设计和Qwen-long
    API的低成本，我们的方法将每篇文献综述的生成成本降至0.1元人民币，提升了方法的实用价值。
  tldr_cn: 一种基于提示的逐步方法，利用LLMs生成科学文献综述，成本低且性能有竞争力。
  analysis_cn:
    innovations:
    - 逐步提示设计，依次生成文献综述的标题、摘要、层次化标题和主要内容
    - 通过限制LLM查询中输入和输出长度实现成本高效的生成
    - 从顶层视角生成高层标题
    methodology: 作者设计了一系列提示，引导大语言模型（特别是Qwen-long）以逐步方式生成科学文献综述：首先生成标题，然后是摘要，接着是层次化标题，最后是主要内容。通过限制输入和输出长度来最小化API成本。该方法在NLPCC
      2024科学文献综述生成任务中进行了评估。
    key_results: 该方法获得第三名，总分仅比第二名低0.03%，软标题召回率为95.84%（排名第二），每篇综述的生成成本为0.1元人民币。
