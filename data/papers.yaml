  title_cn: 间歇性、异步专家反馈对贝叶斯优化有多大用处？
  abstract_cn: 贝叶斯优化（BO）是自动化科学发现（即所谓的自动驾驶实验室）中不可或缺的一部分，其中人类输入最好是最小化的，或者至少是非阻塞的。然而，科学家通常具有强烈的直觉，因此人类反馈仍然有用。尽管如此，先前通过专家反馈增强BO的工作，例如以离线或在线但阻塞（在每个BO迭代时到达）的方式纳入反馈，与自动驾驶实验室的精神不符。在这项工作中，我们研究了少量随机到达并以非阻塞方式纳入的专家反馈是否能够改善BO活动。为此，我们在BO循环之上运行一个额外的独立计算线程来处理反馈收集过程。收集到的反馈用于学习一个贝叶斯偏好模型，该模型可以轻松地纳入BO线程，以引导其探索-利用过程。在玩具数据集和化学数据集上的实验表明，即使只是少量间歇性、异步的专家反馈，也能有效改善或约束BO。这尤其有助于改进自动驾驶实验室，例如使其更加数据高效且成本更低。
  tldr_cn: 间歇性异步专家反馈能改善自动驾驶实验室中的贝叶斯优化，在玩具和化学数据集上验证。
  grade: worth_reading
