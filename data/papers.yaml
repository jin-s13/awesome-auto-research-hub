  title_cn: 'Idea2Plan: 探索AI驱动的研究规划'
  abstract_cn: 大型语言模型（LLM）在分析数据、生成假设以及支持各科学领域的创新方法方面，已展现出加速科学发现的巨大潜力。本文研究LLM如何实现从概念性研究想法到结构化研究计划的过渡。有效的研究规划不仅有助于科学家推进研究，也是开发自主研究代理的关键能力。尽管其重要性，该领域缺乏对LLM研究规划能力的系统理解。为严格衡量这一能力，我们引入了Idea2Plan任务和Idea2Plan
    Bench，这是一个基于200篇在主要LLM训练截止日期后发布的ICML 2025 Spotlight和Oral论文构建的基准。每个基准实例包含一个研究想法和一个涵盖有效计划关键组成部分的评分标准。我们进一步提出Idea2Plan
    JudgeEval，一个补充基准，用于评估基于LLM的评判者与专家标注的一致性。实验结果表明，GPT-5和GPT-5-mini在基准上取得了最强性能，但仍有很大的改进空间。我们的研究为LLM的研究规划能力提供了新见解，并为未来进展奠定了基础。
