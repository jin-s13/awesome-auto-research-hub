    innovations:
    - 引入QMBench，一个用于评估量子材料研究中的大语言模型智能体的综合基准。
    - 基准涵盖多个领域：结构性质、电子性质、热力学及其他性质、对称性原理和计算方法。
    - 旨在提供标准化评估框架，以加速AI科学家在量子材料领域做出创造性贡献的发展。
    methodology: QMBench被设计为一个基准，评估大语言模型智能体应用凝聚态物理知识和计算技术（如密度泛函理论）的能力。它包括涵盖结构、电子、热力学、对称性和计算方法领域的任务，以评估量子材料科学中的研究问题解决能力。
