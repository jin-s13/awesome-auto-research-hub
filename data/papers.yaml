  title_cn: 面向科学发现的智能体人工智能：进展、挑战与未来方向综述
  abstract_cn: 将智能体人工智能（Agentic AI）融入科学发现标志着研究自动化的新前沿。这些具备推理、规划和自主决策能力的AI系统正在改变科学家进行文献综述、提出假设、开展实验和分析结果的方式。本综述全面概述了面向科学发现的智能体人工智能，对现有系统与工具进行了分类，并强调了在化学、生物学和材料科学等领域的最新进展。我们讨论了关键评估指标、实施框架和常用数据集，以提供对该领域现状的详细理解。最后，我们探讨了关键挑战，如文献综述自动化、系统可靠性和伦理问题，同时指出了强调人机协作和增强系统校准的未来研究方向。
