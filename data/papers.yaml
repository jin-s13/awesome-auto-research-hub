  title_cn: 迈向医学AI科学家
  abstract_cn: 最近，能够生成科学假设、进行实验并撰写手稿的自主系统已成为加速科学发现的一种有前景的范式。然而，现有的AI科学家大多领域无关，限制了其在临床医学中的应用，因为临床医学要求研究基于医学证据并涉及专门的数据模态。本文介绍了Medical
    AI Scientist，这是首个专为临床自主研究定制的自主研究框架。它通过临床医生-工程师协同推理机制，将广泛调研的文献转化为可操作证据，从而增强生成研究思路的可追溯性，实现基于临床的构思。该框架进一步遵循结构化的医学写作规范和伦理政策，进行基于证据的手稿撰写。框架支持三种研究模式：paper-based
    reproduction、literature-inspired innovation和task-driven exploration，分别对应自主性逐步递增的不同层次的自动化科学探究。大型语言模型和人类专家的综合评估表明，在171个案例、19项临床任务和6种数据模态上，Medical
    AI Scientist生成的研究思路质量显著优于商业LLM。同时，我们的系统在提出方法与实现之间实现了强对齐，并且在可执行实验中的成功率显著更高。人类专家和Stanford
    Agentic Reviewer的双盲评估表明，生成的手稿接近MICCAI级别质量，并持续超越ISBI和BIBM。提出的Medical AI Scientist凸显了利用AI在医疗领域进行自主科学发现的潜力。
  tldr_cn: 提出医学AI科学家，一个面向临床医学的领域特定自主研究框架，具有协同推理和三种研究模式。
