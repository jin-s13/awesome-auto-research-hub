  title_cn: LiRA：一个用于生成可靠且可读文献综述的多智能体框架
  abstract_cn: 科学出版物的快速增长使得保持文献综述的全面性和时效性变得越来越困难。尽管先前的工作集中于自动化检索和筛选，但系统综述的写作阶段仍然在很大程度上未被充分探索，尤其是在可读性和事实准确性方面。为了解决这一问题，我们提出了LiRA（文献综述智能体），一种多智能体协作工作流，模拟人类文献综述过程。LiRA利用专门的智能体进行内容大纲、子节写作、编辑和审阅，生成连贯且全面的综述文章。在SciReviewGen和一个专有的ScienceDirect数据集上的评估表明，LiRA在写作和引用质量上优于当前基线（如AutoSurvey和MASS-Survey），同时保持与人类撰写综述的竞争力相似度。我们进一步在真实场景中使用文档检索评估LiRA，并测试其对审阅模型变化的鲁棒性。我们的研究结果突显了智能体LLM工作流（即使没有领域特定微调）在提高自动化科学写作的可靠性和可用性方面的潜力。
