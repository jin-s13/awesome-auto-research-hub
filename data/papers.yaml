  title_cn: PiFlow：基于原则感知的多智能体协作科学发现
  abstract_cn: 基于大语言模型（LLM）的多智能体系统（MAS）在科学发现方面展现出显著潜力。然而，现有方法通常使用预定义工作流来自动化科学发现，缺乏合理性约束。这常常导致无目的的假设生成，并且无法持续地将假设与证据联系起来，从而阻碍了不确定性的系统性减少。克服这些限制从根本上需要一种基于原则的探索方法。我们提出PiFlow，一个信息论框架，将自动化科学发现视为由原则（例如科学定律）引导的结构化不确定性减少问题。在三个不同科学领域的广泛评估表明，PiFlow（I）相比最先进方法将发现效率提升31.18%–41.73%，解决方案质量提升12.47%–31.72%；（II）相比原始智能体，求解时间加速5.6倍，令牌消耗降低最多27%；（III）可作为即插即用模块泛化至现有智能体架构。总体而言，PiFlow开创了高效智能体科学发现的新范式，为更稳健、更快速的AI驱动研究铺平了道路。
  tldr_cn: PiFlow是一个信息论多智能体框架，通过原则引导探索提升科学发现效率与质量。
