    - 持续自我演化机制，使智能体能够迭代优化假设、自我批判并在实验周期中积累知识
    - 领域无关的基础框架，允许用约100行代码构建任意学科的自演化科学智能体
    - 在机器学习、物理学和通用科学领域实例化的SciMaster生态系统
    methodology: EvoMaster是一个基础演化智能体框架，使智能体能够通过优化假设、自我批判和积累知识来持续自我演化。它是领域无关的，并用于构建SciMaster生态系统，在四个基准（Humanity's
      Last Exam、MLE-Bench Lite、BrowseComp、FrontierScience）上以OpenClaw为基线进行评估。
    key_results: EvoMaster在Humanity's Last Exam、MLE-Bench Lite、BrowseComp和FrontierScience上分别取得了41.1%、75.8%、73.3%和53.3%的最先进分数，相对于OpenClaw的相对提升幅度为+159%至+316%。
