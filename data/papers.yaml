    - QUAL-SG框架：一种质量感知的综述生成框架，通过将质量指标融入文献检索以选择更高质量的源论文，从而增强标准RAG流程
    methodology: 作者构建了包含质量元数据的人工撰写综述数据集SurveyGen，然后提出了QUAL-SG，一种质量感知的RAG框架，利用质量指标检索和选择更高质量的论文。他们系统评估了最先进的LLM在不同人类参与程度下的表现，从全自动生成到人工引导生成。
