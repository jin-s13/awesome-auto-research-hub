  title_cn: ARISE：基于智能体评分准则的迭代式调查引擎，用于自动生成学术论文
  abstract_cn: 学术文献的快速扩张给综合、高质量学术综述的撰写带来了巨大挑战。近年来，智能体系统的发展为自动化完成传统上需要人类专家参与的任务（包括文献综述、综合和迭代优化）提供了巨大潜力。然而，现有的自动综述生成解决方案往往存在质量控制不足、格式不佳以及对迭代反馈适应性有限等问题，而这些正是学术写作的核心要素。为了解决这些局限性，我们提出了ARISE，一种基于智能体评分准则的迭代式调查引擎，用于自动生成和持续优化学术综述论文。ARISE采用模块化架构，由专门的大型语言模型智能体组成，每个智能体模拟不同的学术角色，如主题扩展、引文管理、文献总结、手稿起草和基于同行评审的评估。ARISE的核心是一个基于评分准则的迭代优化循环，其中多个评审智能体使用结构化的、基于行为的评分准则独立评估手稿草稿，通过综合反馈系统性地提升内容质量。将ARISE与最先进的自动化系统以及近期人类撰写的综述进行比较，我们的实验结果表明其性能优越，平均评分准则对齐质量得分为92.48。ARISE在全面性、准确性、格式和整体学术严谨性等指标上持续优于基线方法。所有代码、评估准则和生成输出均开源提供：https://github.com/ziwang11112/ARISE
  tldr_cn: ARISE利用专用LLM智能体和评分准则引导的迭代优化自动生成高质量学术综述论文。
  analysis_cn:
    innovations:
    - 基于智能体评分准则的迭代优化循环，包含多个评审智能体
    - 模块化架构，由专门的大语言模型智能体模拟不同学术角色（主题扩展、引文管理、总结、起草、同行评审）
    - 用于结构化多智能体评估的基于行为的评分准则
    methodology: ARISE采用模块化智能体系统，其中LLM智能体执行不同的学术任务，并通过一个基于评分准则的迭代优化循环，多个评审智能体使用结构化的、基于行为的评分准则评估草稿，综合反馈以改进手稿。评估将ARISE与最先进的自动化系统和近期人类撰写的综述进行比较。
    key_results: ARISE实现了平均评分准则对齐质量得分92.48，在全面性、准确性、格式和学术严谨性方面持续优于基线方法。
    limitations: []
