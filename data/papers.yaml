  title_cn: DeepSurvey：提升自动综述生成中的分析深度与引用可靠性
  abstract_cn: 随着科学文献的快速增长，自动综述生成已成为AI科学家和人类研究者的关键能力。然而，现有系统由于依赖摘要和孤立论文处理，分析深度有限；同时由于检索不精确和事后归因，引用不可靠，导致生成的综述肤浅且可能误导研究者。我们提出DeepSurvey，一个智能体系统，同时解决这两个问题。为提升深度，DeepSurvey从全文论文中提取结构化要点，通过聚类和比较分析建模跨论文关系，并集成代码仓库分析以恢复实现级细节。为增强可靠性，它结合引文图扩展与混合过滤进行主题聚焦检索，实施证据约束的引用分配，并部署多粒度智能体精炼以验证引用与主张的一致性。实验表明，DeepSurvey取得了最高的内容得分（8.644/10）和引用质量（召回率和精确率分别比最强基线提升12.3%和9.3%），跨领域泛化更稳健（CS到非CS下降0.14，对比0.22至0.69），并且领域专家更偏好DeepSurvey生成的综述而非人工撰写的综述（整体质量83.3%，内容深度100%）。
  tldr_cn: DeepSurvey利用全文分析、跨论文建模和证据约束引用，提升自动综述的分析深度与引用可靠性。
  analysis_cn:
    innovations:
    - 从全文论文中提取结构化要点以增强分析深度
    - 通过聚类和比较分析建模跨论文关系
    - 集成代码仓库分析以恢复实现级细节
    - 结合引文图扩展与混合过滤进行主题聚焦检索
    - 实施证据约束的引用分配
    - 部署多粒度智能体精炼以验证引用与主张的一致性
    methodology: DeepSurvey是一个智能体系统，通过从全文论文中提取结构化要点、通过聚类和比较分析建模跨论文关系、以及集成代码仓库分析来增强深度。对于引用可靠性，它使用引文图扩展与混合过滤、证据约束的引用分配、以及多粒度智能体精炼来验证引用与主张的一致性。
    key_results: DeepSurvey取得了最高的内容得分（8.644/10），引用质量在召回率和精确率上分别比最强基线提升12.3%和9.3%，跨领域泛化稳健（CS到非CS下降0.14，对比0.22至0.69），并且领域专家更偏好DeepSurvey生成的综述而非人工撰写的综述（整体质量83.3%，内容深度100%）。
    limitations: []
