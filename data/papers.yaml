  title_cn: 有德机器：迈向人工通用科学
  abstract_cn: 人工智能系统正在通过加速特定研究任务（从蛋白质结构预测到材料设计）来转变科学发现，但仍局限于需要大量人类监督的狭窄领域。科学文献的指数增长和日益增加的领域专业化限制了研究人员跨学科综合知识和发展统一理论的能力，这促使人们探索更通用的科学AI系统。在这里，我们展示了一个领域无关的、自主的AI科学家系统能够独立导航科学工作流程——从假设生成到数据收集再到手稿准备。该系统自主设计并执行了关于视觉工作记忆、心理旋转和表象生动性的三项心理学研究，执行了一项包含288名参与者的新在线数据收集，通过8小时以上的连续编码会话开发了分析流程，并生成了完成的手稿。结果表明，AI科学发现流程能够进行非平凡的研究，其理论推理和方法论严谨性与经验丰富的研究人员相当，尽管在概念细微差别和理论解释方面存在局限性。这是迈向具身AI的一步，该AI可以通过真实世界实验测试假设，通过自主探索人类认知和资源限制可能无法探索的科学空间区域来加速发现。它引发了关于科学理解的性质和科学信用归属的重要问题。
