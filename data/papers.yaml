  title_cn: 通过竞争优化从多源数据集中联合发现控制偏微分方程
  abstract_cn: 直接从观测数据中发现控制方程是实现可解释科学机器学习的关键步骤。当前的数据驱动方法通常基于单一数据集，在观测受限时性能有限。实践中，同一物理系统常有多源数据集可用，仅初始条件或边界配置不同。本文提出一种竞争优化框架（MCO-PDE），用于从多源数据集中发现共享偏微分方程（PDE）。该框架首先为每个数据源训练独立的神经代理，然后采用软竞争加权机制动态评估数据集可信度并聚合共识全局系数。结合遗传算法进行结构搜索，该方法同时识别控制定律的函数形式和参数。我们证明，在七个案例中，每个数据集仅融合50个观测值即可高精度恢复经典方程。该框架天然处理具有不规则边界和异质系数的二维和三维区域，并从真实波浪水槽实验中提取了物理上有意义的定律。总体而言，这项工作为通过异构数据融合实现自动化科学发现开辟了有前景的途径。
