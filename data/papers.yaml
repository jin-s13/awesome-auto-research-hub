  title_cn: 立场：智能科学实验室需要认知与具身人工智能的融合
  abstract_cn: 科学发现长期以来受到人类在专业知识、身体能力和睡眠周期方面的限制。近年来，AI科学家和自动化实验室的兴起加速了研究的认知和操作层面。然而，关键局限依然存在：AI系统往往局限于虚拟环境，而自动化实验室缺乏灵活性和自主性，无法在物理世界中自适应地测试新假设。具身人工智能的最新进展，如通用机器人基础模型、基于扩散的动作策略、精细操作学习以及仿真到现实迁移，凸显了融合认知与具身智能的前景。这种融合为支持迭代、自主实验以及偶然发现的闭环系统打开了大门。在这篇立场论文中，我们提出了智能科学实验室（ISL）范式：一个深度融合认知与具身智能的多层闭环框架。ISL统一了用于科学推理的基础模型、基于智能体的工作流编排以及用于稳健物理实验的具身智能体。我们认为，这样的系统对于克服当前科学发现的局限、实现AI驱动科学的全部变革潜力至关重要。
  tldr_cn: 提出智能科学实验室（ISL）范式，融合认知与具身AI实现闭环自主实验。
  analysis_cn:
    innovations:
    - 将认知与具身人工智能整合为统一的科学发现框架
    - 多层闭环智能科学实验室（ISL）范式
    - 在循环中使用基础模型进行科学推理
    - 基于智能体的工作流编排实现自主实验
    - 具身智能体实现稳健的物理实验和自适应假设检验
    methodology: 这篇立场论文提出了智能科学实验室（ISL）框架，这是一个概念性的多层架构，结合了用于科学推理的基础模型、基于智能体的编排以及具身机器人智能体，以创建闭环自主实验系统。
    key_results: 论文提出了ISL的愿景，可能克服当前仅限虚拟的AI科学家和僵化的自动化实验室的局限，但未报告任何实验或实证结果。
    limitations: []
    tech_stack: []
  grade: must_read
