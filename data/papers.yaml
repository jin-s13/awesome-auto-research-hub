    - 将科学中向自主AI的转变定性为质变而非增量，AI系统演变为'AI科学家'，扩展假设生成与验证能力。
    - 提出多智能体架构（以Denario原型为例），加速发现周期并探索人类无法触及的模型空间。
    - 论证科学机构必须为验证、问责、可解释性和双重用途安全进行重新设计，以适应AI科学家。
    - 将AI治理概念化为认知主体而非单纯工具。
    methodology: 本文为概念分析与立场论文。它勾勒了多智能体系统架构，并引入Denario原型框架作为示例，但未提供实证实验、数据集或定量评估。
    key_results: 未报告实验结果；本文提出一个定性论证，即自主AI系统可以成为发现引擎，并概述了必要的机构改革。
