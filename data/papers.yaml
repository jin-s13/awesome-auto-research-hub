  abstract_cn: 直接从观测数据中发现控制方程是实现可解释科学机器学习的关键步骤。当前的数据驱动方法通常基于单一数据集，在观测受限时性能固有地受到限制。实践中，同一物理系统往往有多个数据集可用，仅因初始条件或边界配置不同而区分。本文提出一种竞争优化框架，用于从多源数据集中发现共享的偏微分方程（PDE），称为MCO-PDE。该框架首先为每个数据源训练独立的神经代理模型，然后采用软竞争加权机制动态评估数据集可信度并聚合共识全局系数。结合遗传算法进行结构搜索，该方法同时识别控制定律的函数形式和参数。我们证明，在七个案例中，每个数据集仅融合50个观测值即可高精度恢复典型方程。该框架天然处理具有不规则边界和异质系数的二维及三维域，并能从真实水槽实验中提取具有物理意义的定律。总体而言，这项工作为通过异质数据融合实现自动化科学发现开辟了一条有前景的路径。
  tldr_cn: MCO-PDE竞争优化框架从多源数据中发现共享偏微分方程，经真实水槽实验验证。
  analysis_cn:
    innovations:
    - 用于从多源数据集中发现共享偏微分方程的竞争优化框架（MCO-PDE）
    - 动态评估数据集可信度并聚合共识全局系数的软竞争加权机制
    - 与遗传算法集成，实现控制方程的结构与参数同步识别
    methodology: 该框架为每个数据源训练独立的神经代理模型，然后应用软竞争加权机制动态评估数据集可信度并聚合共识全局系数。遗传算法搜索函数形式空间，从而从异质多源数据中联合发现PDE结构与参数。
    key_results: 在七个案例中，每个数据集仅融合50个观测值即可高精度恢复典型方程；该方法处理具有不规则边界和异质系数的二维/三维域，并从真实水槽实验中提取具有物理意义的定律。
    limitations: []
