- id: automating-experimental-optics-with-sample-efficient-machine-2025
  title: Automating Experimental Optics with Sample Efficient Machine Learning Methods
  authors:
  - Arindam Saha
  - Baramee Charoensombutamon
  - Thibault Michel
  - V. Vijendran
  - Lachlan Walker
  - Akira Furusawa
  - Syed M. Assad
  - Ben C. Buchler
  - Ping Koy Lam
  - Aaron D. Tranter
  abstract: As free-space optical systems grow in scale and complexity, troubleshooting
    becomes increasingly time-consuming and, in the case of remote installations,
    perhaps impractical. An example of a task that is often laborious is the alignment
    of a high-finesse optical resonator, which is highly sensitive to the mode of
    the input beam. In this work, we demonstrate how machine learning can be used
    to achieve autonomous mode-matching of a free-space optical resonator with minimal
    supervision. Our approach leverages sample-efficient algorithms to reduce data
    requirements while maintaining a simple architecture for easy deployment. The
    reinforcement learning scheme that we have developed shows that automation is
    feasible even in systems prone to drift in experimental parameters, as may well
    be the case in real-world applications.
