- id: externalizing-research-synthesis-and-validation-in-ai-scient-2026
  title: Externalizing Research Synthesis and Validation in AI Scientists through
    a Research Harness
  authors:
  - Zijian Wang
  - Hanqi Li
  - Ziyue Yang
  - Zijian Hu
  - Shenghan Zuo
  - Yunzhe Zhang
  - Da Ma
