  abstract_cn: 流动物理学以及更广泛的由偏微分方程（PDE）控制的物理现象本质上是连续的、高维的且常常是混沌的。传统上，研究人员通过实验室实验和/或计算昂贵的数值模拟来探索这些丰富的时空PDE解空间。这严重限制了自动化和大规模探索，与药物发现或材料科学等领域不同，在这些领域中，离散的、可标记化的表示自然能与大型语言模型交互。我们通过将多智能体LLM与潜在基础模型（LFM）耦合来解决这一问题，LFM是一种基于参数化模拟的生成模型，学习流动场的显式、紧凑且解耦的潜在表示，从而能够跨控制PDE参数和边界条件进行连续探索。LFM充当按需替代模拟器，允许智能体以可忽略的成本查询任意参数配置。分层智能体架构通过假设、实验、分析和验证的闭环协调探索，并采用无需用户支持的工具模块化接口。应用于雷诺数Re=500的串联圆柱绕流，该框架自主评估了超过1600个参数-位置对，并发现了发散的标度律：最小位移厚度的依赖于状态的二模结构和最大动量厚度的稳健线性标度，两种景观均表现出在近尾流到共脱落状态转变时出现的双极值结构。学习到的物理表示与智能体推理的结合，为PDE控制系统的自动化科学发现建立了一种通用范式。
  tldr_cn: 将多智能体LLM与潜在基础模型结合，自主探索PDE参数空间，发现流体动力学中的标度律。
  analysis_cn:
    innovations:
    - 将多智能体LLM与潜在基础模型（LFM）耦合，用于PDE参数空间的连续探索
    - LFM作为生成模型，学习流动场的显式、紧凑、解耦潜在表示，充当按需替代模拟器
    - 分层智能体架构，具有假设、实验、分析和验证的闭环，使用工具模块化接口
    - 发现发散的标度律（最小位移厚度的二模结构，最大动量厚度的线性标度）以及状态转变时的双极值结构
    methodology: 训练潜在基础模型（LFM）于参数化流动模拟，提供低成本替代。多智能体LLM在分层架构中迭代提出假设、查询LFM获取选定参数-位置对的流动场、分析结果并验证发现，实现PDE解空间的自主探索。
    key_results: 对Re=500串联圆柱绕流自主评估超过1600个参数-位置对，揭示了最小位移厚度的依赖于状态的二模标度和最大动量厚度的稳健线性标度，两种景观在近尾流到共脱落转变时均表现出双极值结构。
    limitations:
    - 仅针对单一流动配置（Re=500串联圆柱）进行演示，未展示对其他PDE系统的泛化能力。
