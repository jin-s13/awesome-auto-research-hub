  title_cn: AI科学家产出结果但未进行科学推理
  abstract_cn: 基于大型语言模型（LLM）的系统正越来越多地被部署用于自主开展科学研究，但其推理是否遵循使科学探究具有自我修正能力的认知规范，目前尚不清楚。本文通过超过25,000次智能体运行，从两个互补视角评估了LLM科学智能体在八个领域中的表现，涵盖工作流执行到假设驱动探究：（i）系统性的性能分析，分解基础模型与智能体框架的贡献；（ii）智能体推理认知结构的行为分析。我们观察到，基础模型是性能和行为的主要决定因素，解释了41.4%的方差，而框架仅解释1.5%。在所有配置中，68%的轨迹中证据被忽略，反驳驱动的信念修正仅占26%，汇聚的多测试证据极为罕见。无论智能体执行计算工作流还是进行假设驱动探究，均出现相同的推理模式。即使智能体在上下文中获得近乎完整的成功推理轨迹，这些模式依然存在，且由此产生的不可靠性在认知要求高的领域中随重复试验而加剧。因此，当前基于LLM的智能体执行科学工作流，但并未展现出科学推理的认知模式。基于结果的评估无法检测这些失败，仅靠框架工程也无法修复。在推理本身成为训练目标之前，此类智能体产生的科学知识无法通过其生成过程得到辩护。
  tldr_cn: LLM科学智能体执行工作流但缺乏认知推理，68%轨迹忽略证据
