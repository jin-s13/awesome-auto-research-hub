- id: beyond-optimization-exploring-novelty-discovery-in-autonomo-2025
  title: 'Beyond Optimization: Exploring Novelty Discovery in Autonomous Experiments'
  authors:
  - Ralph Bulanadi
  - Jawad Chowdhury
  - Funakubo Hiroshi
  - Maxim Ziatdinov
  - Rama Vasudevan
  - Arpan Biswas
  - Yongtao Liu
  abstract: 'Autonomous experiments (AEs) are transforming how scientific research
    is conducted by integrating artificial intelligence with automated experimental
    platforms. Current AEs primarily focus on the optimization of a predefined target;
    while accelerating this goal, such an approach limits the discovery of unexpected
    or unknown physical phenomena. Here, we introduce a novel framework, INS2ANE (Integrated
    Novelty Score-Strategic Autonomous Non-Smooth Exploration), to enhance the discovery
    of novel phenomena in autonomous experimentation. Our method integrates two key
    components: (1) a novelty scoring system that evaluates the uniqueness of experimental
    results, and (2) a strategic sampling mechanism that promotes exploration of under-sampled
    regions even if they appear less promising by conventional criteria. We validate
    this approach on a pre-acquired dataset with a known ground truth comprising of
    image-spectral pairs. We further implement the process on autonomous scanning
    probe microscopy experiments. INS2ANE significantly increases the diversity of
    explored phenomena in comparison to conventional optimization routines, enhancing
    the likelihood of discovering previously unobserved phenomena. These results demonstrate
    the potential for AE to enhance the depth of scientific discovery; in combination
    with the efficiency provided by AEs, this approach promises to accelerate scientific
    research by simultaneously navigating complex experimental spaces to uncover new
    phenomena.'
