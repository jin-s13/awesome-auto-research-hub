  title_cn: 用于LLM辅助临床手稿准备的确定性完整性门控：一种可审计的生物医学信息学架构
  abstract_cn: 随着自主研究代理和AI共同科学家系统推动大语言模型（LLM）从草拟向端到端手稿生产转变，瓶颈从生成转向验证。流畅的LLM输出可能隐藏虚构的引用、偏离源表格的数字以及未满足的报告指南项目；现有工具生成而不验证，自我批评则继承了产生自信虚构的盲点。我们描述了一种将生成与验证配对的架构，基于三个原则：将工作流分解为自包含技能，用失败即停止门控每个阶段转换，并以最便宜的足够机制解决每个完整性问题——在可能的情况下使用确定性、可重新执行的检查，仅在不可避免时使用散文级探针。这种尽可能确定性的分割，组织为完整性门控分类法，是核心贡献。该架构实现为MedSci
    Skills，一个包含43个技能的开源工具包，其中21个检测器为确定性层级，在三个公共数据集流水线（STARD、PRISMA、STROBE）和种子缺陷消融上进行评估。在三个流水线上，每个内容哈希清单验证为干净，门控暴露了真实缺陷；在27个相同的注入缺陷上，确定性门控检测到全部27个，且在匹配的干净夹具上无假阳性，而单提示LLM评审员检测到11个，其遗漏的代码、参考文献和风格缺陷被散文掩盖。尽可能确定性的验证产生可审计、可重新执行的轨迹，暴露人类检查LLM辅助手稿所需的证据：可行性和可重复性证据，而非人类竞争质量的声明，后者由单独的盲法研究处理。MedSci
    Skills采用MIT许可并归档（v3.8.0）。
