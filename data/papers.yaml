  title_cn: 'SurveyGen-I: 基于演化规划与记忆引导的连贯科学综述生成'
  abstract_cn: 综述论文通过整合某一领域的进展，在科学交流中发挥着关键作用。大型语言模型（LLMs）的最新进展为自动化综述生成流程中的关键步骤（如检索、结构化与摘要）提供了有前景的解决方案。然而，现有基于LLM的方法在维持长篇幅、多章节综述的连贯性以及提供全面的引用覆盖方面往往存在困难。为解决这些局限，我们提出了SurveyGen-I，一种自动综述生成框架，它结合了由粗到精检索、自适应规划和记忆引导生成。SurveyGen-I首先进行综述级检索以构建初始大纲和写作计划，然后在生成过程中通过一种存储先前撰写内容和术语的记忆机制动态优化大纲和写作计划，确保各子节之间的连贯性。当系统检测到上下文不足时，会触发细粒度的子节级检索。在生成过程中，SurveyGen-I利用该记忆机制维持各子节间的连贯性。在四个科学领域的实验表明，SurveyGen-I在内容质量、一致性和引用覆盖率方面持续优于先前工作。
  tldr_cn: SurveyGen-I采用由粗到精检索、自适应规划和记忆引导生成，生成连贯且引用丰富的科学综述，在四个领域超越先前方法。
  analysis_cn:
    innovations:
    - 由粗到精检索：先进行综述级检索以构建初始大纲和写作计划，当检测到上下文不足时触发细粒度子节级检索。
    - 自适应规划：在生成过程中动态优化大纲和写作计划。
    - 记忆引导生成：一种存储先前撰写内容和术语的记忆机制，以保持各子节之间的连贯性。
    methodology: SurveyGen-I首先进行综述级检索以构建初始大纲和写作计划，然后利用存储先前内容和术语的记忆机制动态优化它们。当检测到上下文不足时，触发细粒度子节级检索。该框架在四个科学领域进行了评估。
