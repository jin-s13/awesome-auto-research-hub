  abstract_cn: 自动化是科学和工业领域进步的基础。然而，自动化需要解释抽象视觉信息的任务仍然具有挑战性。例如，晶体对齐强烈依赖于能够理解衍射图样的人类。在这里，我们介绍了一种自主系统，它无需晶体学和衍射理论即可对齐单晶。使用无模型强化学习框架，智能体直接从劳厄衍射图样中学习识别并导航至高对称取向。尽管没有人类监督，智能体仍能发展出类人策略，在不同晶体对称类别中实现高效的时间对齐。由此，我们为智能衍射仪提供了一个计算框架。因此，我们的方法推动了材料科学中自动化实验工作流的发展。
