  abstract_cn: 科学研究工作流的自动化已成为人工智能领域的一个变革性前沿，然而现有的自主研究智能体大多领域无关，缺乏严谨空间数据科学所需的专门推理、方法选择和数据获取能力。本文介绍了NORA（Night
    Owl Research Agent），一个专为地理信息科学和空间数据科学构建的、采用Harness工程化的多智能体自主研究系统。NORA通过一种技能优先架构编排完整的研究生命周期，该架构包含21个领域专用工作流技能、9个专家子智能体以及自定义模型上下文协议（MCP）服务器。系统设计的核心是两个新颖的领域专用技能：一个空间分析技能单元，编码了探索性空间数据分析、空间回归和诊断的决策框架；以及一个空间数据下载技能，支持从权威地理空间数据源进行可重复获取。我们形式化了科学研究智能体的Harness工程概念，展示了生命周期钩子、安全门、生成器-评估器分离、人在回路以及状态持久化如何确保可靠且可重复的自主研究。我们通过6位领域专家和3位LLM评审员在七个维度（新颖性、质量、严谨性等）上的案例研究来评估NORA。结果表明，与通用智能体配置相比，领域专用的Harness工程显著提高了研究输出的效率和质量。
