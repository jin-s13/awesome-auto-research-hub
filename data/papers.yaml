- id: bloclaw-an-omniscient-multi-modal-agentic-workspace-for-ne-2026
  title: 'BloClaw: An Omniscient, Multi-Modal Agentic Workspace for Next-Generation
    Scientific Discovery'
  authors:
  - Yao Qin
  - Yangyang Yan
  - Jinhua Pang
  - Xiaoming Zhang
  abstract: 'The integration of Large Language Models (LLMs) into life sciences has
    catalyzed the development of "AI Scientists." However, translating these theoretical
    capabilities into deployment-ready research environments exposes profound infrastructural
    vulnerabilities. Current frameworks are bottlenecked by fragile JSON-based tool-calling
    protocols, easily disrupted execution sandboxes that lose graphical outputs, and
    rigid conversational interfaces inherently ill-suited for high-dimensional scientific
    data.We introduce BloClaw, a unified, multi-modal operating system designed for
    Artificial Intelligence for Science (AI4S). BloClaw reconstructs the Agent-Computer
    Interaction (ACI) paradigm through three architectural innovations: (1) An XML-Regex
    Dual-Track Routing Protocol that statistically eliminates serialization failures
    (0.2% error rate vs. 17.6% in JSON); (2) A Runtime State Interception Sandbox
    that utilizes Python monkey-patching to autonomously capture and compile dynamic
    data visualizations (Plotly/Matplotlib), circumventing browser CORS policies;
    and (3) A State-Driven Dynamic Viewport UI that morphs seamlessly between a minimalist
    command deck and an interactive spatial rendering engine. We comprehensively benchmark
    BloClaw across cheminformatics (RDKit), de novo 3D protein folding via ESMFold,
    molecular docking, and autonomous Retrieval-Augmented Generation (RAG), establishing
    a highly robust, self-evolving paradigm for computational research assistants.
    The open-source repository is available at https://github.com/qinheming/BloClaw.'
