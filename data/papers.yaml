  title_cn: 含噪声测量：贝叶斯优化在自动化实验中协同优化噪声与属性发现
  abstract_cn: 我们开发了一种贝叶斯优化（BO）工作流，将步内噪声优化集成到自动化实验循环中。传统的自动化实验中的BO方法侧重于优化实验轨迹，但往往忽略测量噪声对数据质量和成本的影响。我们提出的框架通过引入时间作为额外输入参数，同时优化目标属性和相关测量噪声，从而平衡信噪比和实验持续时间。探索了两种方法：奖励驱动的噪声优化和双优化采集函数，两者都通过将噪声和成本纳入优化过程来提高自动化工作流的效率。我们通过仿真和实际压电响应力显微镜（PFM）实验验证了该方法，成功优化了测量持续时间和属性探索。我们的方法为自动化实验工作流中多个变量的优化提供了可扩展的解决方案，提高了数据质量并减少了资源消耗，适用于材料科学及其他领域。
  tldr_cn: 贝叶斯优化框架协同优化自动化实验中的测量噪声与目标属性，经仿真和实际PFM验证。
  analysis_cn:
    innovations:
    - 通过贝叶斯优化将步内噪声优化集成到自动化实验循环中
    - 引入时间作为额外输入参数以同时优化目标属性和测量噪声
    - 两种新方法：奖励驱动的噪声优化和双优化采集函数
    methodology: 一种贝叶斯优化工作流，通过将时间作为输入参数，协同优化目标属性和测量噪声，平衡信噪比和实验持续时间。探索了两种策略：奖励驱动的噪声优化和双优化采集函数。该方法通过仿真和实际压电响应力显微镜（PFM）实验进行了验证。
    key_results: 该方法在仿真和PFM实验中成功优化了测量持续时间和属性探索，提高了数据质量并减少了资源消耗。
