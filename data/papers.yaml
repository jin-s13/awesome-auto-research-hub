  abstract_cn: 学术文献的指数级增长催生了对全面综述论文的迫切需求，然而手动撰写仍然耗时费力。大语言模型（LLM）和检索增强生成（RAG）的最新进展促进了从多篇参考文献综合生成综述论文的研究，但现有大多数工作将用户限制为仅输入标题和固定输出，忽略了综述论文写作的个性化过程。本文介绍了InteractiveSurvey——一个基于LLM的个性化与交互式综述论文生成系统。InteractiveSurvey能够通过在线检索和用户上传两种方式，从多篇参考文献中生成带有参考文献分类的结构化多模态综述论文。更重要的是，用户可以通过直观的界面在生成过程中持续定制和优化中间组件，包括参考文献分类、大纲和综述内容。内容质量、时间效率和用户研究评估表明，InteractiveSurvey是一个易于使用的综述生成系统，在输出内容质量上优于大多数LLM和现有方法，同时保持高时间效率。
