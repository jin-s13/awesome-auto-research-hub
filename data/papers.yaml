  title_cn: MegaScience：推动科学推理的后训练数据集前沿
  abstract_cn: 科学推理对于开发人工智能科学家以及支持人类研究人员推进自然科学发现的前沿至关重要。然而，开源社区主要关注数学和编程，忽视了科学领域，这很大程度上是因为缺乏开放、大规模、高质量、可验证的科学推理数据集。为填补这一空白，我们首先提出了TextbookReasoning，这是一个开放数据集，包含从12k本大学级科学教科书中提取的真实参考答案，涵盖7个科学学科的65万个推理问题。我们进一步推出了MegaScience，这是一个大规模的高质量开源数据集混合体，总计125万个实例，通过系统的消融研究评估各种数据选择方法，为每个公开可用的科学数据集确定最优子集。同时，我们构建了一个涵盖15个基准测试中不同学科和问题类型的综合评估系统，并采用了全面的答案提取策略以确保准确的评估指标。实验表明，与现有的开源科学数据集相比，我们的数据集在更简洁的响应长度下实现了更优的性能和训练效率。此外，我们在MegaScience上训练了Llama3.1、Qwen2.5和Qwen3系列基础模型，这些模型在平均性能上显著优于相应的官方指令模型。另外，MegaScience对更大更强的模型表现出更高的有效性，表明科学调优具有规模效益。我们将数据整理流程、评估系统、数据集以及七个训练好的模型发布给社区，以推动科学推理研究。
  tldr_cn: 提出开源科学推理数据集TextbookReasoning和MegaScience，提升AI科学家训练效果，超越现有数据集。
  analysis_cn:
    innovations:
    - TextbookReasoning数据集：从12k本大学级科学教科书中提取65万个推理问题，附带真实参考答案，覆盖7个学科
    - MegaScience数据集：125万实例的高质量开源科学数据集混合体，通过系统消融研究确定最优子集
    - 综合评估系统：涵盖15个基准测试，采用稳健的答案提取策略确保准确评估
    methodology: 从12k本教科书中提取TextbookReasoning，然后通过混合开源科学数据集并利用消融研究选择最优子集构建MegaScience。在MegaScience上训练Llama3.1、Qwen2.5、Qwen3基础模型，并在15个基准测试上通过细致的答案提取进行评估。
    key_results: MegaScience训练的模型在更短的响应长度下实现了更优的性能和训练效率，平均性能显著优于官方指令模型，且更大模型受益更多，表明科学调优具有规模效益。
