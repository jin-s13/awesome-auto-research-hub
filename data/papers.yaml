  title_cn: INDIBATOR：分子发现中多样且基于事实的个体性多智能体辩论
  abstract_cn: 多智能体系统已成为自动化科学发现的一种强大范式。为了区分多智能体系统中的智能体行为，当前框架通常分配通用的基于角色的角色设定（如“审稿人”或“作者”）或依赖粗粒度的基于关键词的角色设定。尽管这些方法具有功能性，但它们过度简化了人类科学家的运作方式——科学家的贡献由其独特的研究轨迹塑造。为此，我们提出INDIBATOR，一个用于分子发现的框架，该框架将智能体基于个体化科学家档案进行构建，这些档案来自两种模态：用于文献衍生知识的发表历史和用于结构先验的分子历史。这些智能体通过提案、批评和投票阶段进行多轮辩论。我们的评估表明，这些细粒度个体性驱动的智能体始终优于依赖粗粒度角色设定的系统，达到了具有竞争力或最先进的性能。这些结果验证了捕捉个体智能体的“科学DNA”对于高质量发现至关重要。
  tldr_cn: INDIBATOR利用个体化科学家档案（发表与分子历史）提升分子发现多智能体辩论性能。
