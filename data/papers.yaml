  title_cn: 'DeepSurvey-Bench: 评估自动生成科学综述的学术价值'
  abstract_cn: 自动生成科学综述技术的快速发展使得建立一个全面的基准来评估生成综述的质量变得日益重要。几乎所有现有的评估基准都依赖于有缺陷的选择标准（如引用次数和结构连贯性）来选择人工撰写的综述作为真实综述数据集，然后使用表面层次的指标（如结构质量和参考文献相关性）来评估生成的综述。然而，这些基准存在两个关键问题：（1）真实综述数据集因缺乏学术维度标注而不可靠；（2）评估指标仅关注综述的表面质量（如逻辑连贯性）。这两个问题导致现有基准无法评估其深层的“学术价值”，例如核心研究目标和对不同研究的批判性分析。为解决上述问题，我们提出了DeepSurvey-Bench，一种新颖的基准，旨在全面评估生成综述的学术价值。具体而言，我们的基准提出了一套涵盖三个维度的综合学术价值评估标准：信息价值、学术交流价值和研究指导价值。基于该标准，我们构建了带有学术价值标注的可靠数据集，并评估生成综述的深层学术价值。大量实验结果表明，我们的基准在评估生成综述的学术价值方面与人类表现高度一致。
  tldr_cn: 提出DeepSurvey-Bench基准，评估自动生成科学综述的学术价值，弥补现有表面层次指标的缺陷。
  analysis_cn:
    innovations:
    - 提出了DeepSurvey-Bench，一个用于评估自动生成科学综述学术价值的基准。
    - 定义了包含信息价值、学术交流价值和研究指导价值三个维度的综合学术价值评估标准。
    - 构建了带有学术价值标注的可靠数据集，超越了引用次数和结构连贯性等有缺陷的选择标准。
    - 评估深层学术价值（核心研究目标、批判性分析），而非表面层次指标。
    methodology: 该基准定义了一个三维学术价值评估标准。基于这些维度构建带有标注的数据集。将生成的综述与该基准进行对比评估，并将结果与人类评估进行比较。
    key_results: 该基准在评估生成综述的学术价值方面与人类表现高度一致。
    limitations: []
    tech_stack: []
  grade: must_read
- id: deepsurvey-enhancing-analytical-depth-and-citation-reliabil-2026
  title: 'DeepSurvey: Enhancing Analytical Depth and Citation Reliability in Automated
    Survey Generation'
  authors:
  - Ziyue Yang
  - Da Ma
  - Hanqi Li
  - Zijian Wang
  - Tiancheng Huang
  - Zijian Hu
  - Chenrun Wang
  - Yunzhe Zhang
  - Xiaobao Wu
  - Kai Yu
  - Lu Chen
  abstract: As scientific literature grows rapidly, automated survey generation has
    become a key capability for AI scientists and human researchers. However, existing
    systems suffer from limited analytical depth due to reliance on abstracts and
    isolated paper processing, and unreliable citations from imprecise retrieval and
    post-hoc grounding, producing superficial surveys and may mislead researchers.
    We present DeepSurvey, an agentic system that addresses both. To enhance depth,
    DeepSurvey extracts structured keynotes from full-text papers, models cross-paper
    relationships through clustering and comparative analysis, and integrates code-repository
    analysis to recover implementation-level details. To fortify reliability, it combines
    citation-graph expansion with hybrid filtering for topic-focussed retrieval, enforces
    evidence-constrained citation assignment, and deploys multi-granularity agentic
    refinement to validate citation-claim alignment. Experiments show that DeepSurvey
    achieves the highest content score (8.644/10) and citation quality (12.3% and
    9.3% recall and precision gains over the strongest baseline), generalizes more
    robustly across domains (0.14 vs 0.22 to 0.69 CS-to-non-CS drop), and is preferred
    over human-written surveys by domain experts (83.3% overall quality, 100% content
    depth).
