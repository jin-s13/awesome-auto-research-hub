  title_cn: NanoResearch：技能、记忆与策略的协同进化实现个性化研究自动化
  abstract_cn: 基于大语言模型的多智能体系统现已能够自动化从构思到论文撰写的完整研究流程，但一个根本问题依然存在：自动化为谁服务？研究人员拥有不同的资源配置、持有不同的方法论偏好、并针对不同的输出格式。一个无视这些差异而生成统一输出的系统将系统性地无法满足每个个体用户的需求，因此个性化成为研究自动化真正可用的前提条件。然而，实现个性化需要当前系统所缺乏的三种能力：跨项目积累可复用的程序性知识、跨会话保留用户特定经验、以及内化难以显式形式化的隐式偏好。我们提出NanoResearch，一个通过三层协同进化解决这些不足的多智能体框架。技能库将重复性操作提炼为可跨项目复用的紧凑程序规则。记忆模块维护用户和项目特定的经验，使规划决策基于每个用户的研究历史。无标签策略学习将自由形式反馈转化为规划器的持久参数更新，重塑后续协调。这三层协同进化：可靠的技能产生更丰富的记忆，更丰富的记忆指导更好的规划，偏好内化持续将循环重新对准每个用户。大量实验表明，NanoResearch相比最先进的AI研究系统取得了显著提升，并在连续周期中逐步自我优化，以更低成本产出更优研究。
  tldr_cn: NanoResearch通过技能、记忆与策略的三层协同进化实现个性化研究自动化。
