  title_cn: AgentJet：一种用于智能体强化学习的灵活群体训练框架
  abstract_cn: 我们提出了AgentJet，一个用于大语言模型（LLM）智能体强化学习的分布式群体训练框架。与将智能体 rollout 与模型优化紧密耦合的集中式框架不同，AgentJet
    采用解耦的多节点架构，其中群体服务器节点托管可训练模型并在 GPU 集群上运行优化，而群体客户端节点在任意设备上执行任意智能体。这种设计提供了集中式框架难以支持的能力：（1）异构多模型强化学习，支持使用多个
    LLM 作为大脑训练异构多智能体团队；（2）具有隔离智能体运行时的多任务鸡尾酒训练；（3）容错执行，防止外部环境故障中断训练过程；（4）实时代码迭代，允许通过替换群体客户端节点在训练期间编辑智能体。为了支持多模型、多轮次和多智能体设置中的高效强化学习，AgentJet
    引入了一个带有时间线合并的上下文追踪模块，该模块合并冗余上下文，实现 1.5-10 倍的训练加速。最后，AgentJet 引入了一个自动化研究系统，该系统以研究主题为输入，并在大规模集群上自主进行长时间、多天的强化学习研究。通过利用群体架构，该系统在无需人工干预的情况下复现了强化学习研究人员的关键探索工作流程。
  tldr_cn: AgentJet 是一种解耦架构的分布式群体训练框架，支持异构多智能体训练和自动化强化学习研究。
  analysis_cn:
    innovations:
    - 解耦的群体架构，将模型优化（服务器节点）与智能体执行（客户端节点）分离
    - 异构多模型强化学习，支持使用多个 LLM 作为大脑的多智能体团队训练
    - 具有隔离智能体运行时的多任务鸡尾酒训练
    - 容错执行，防止外部环境故障中断训练
    - 实时代码迭代，通过替换客户端节点在训练期间编辑智能体
    - 带有时间线合并的上下文追踪模块，实现 1.5-10 倍训练加速
    - 自动化研究系统，自主进行长时间、多天的强化学习研究
    methodology: AgentJet 是一个分布式群体训练框架，采用解耦的服务器节点（GPU 集群用于模型优化）和客户端节点（任意设备用于智能体 rollout）。它支持异构多智能体强化学习、多任务训练、容错和实时代码迭代。一个带有时间线合并的上下文追踪模块合并冗余上下文以提高效率，并且一个自动化研究系统自主运行多天的强化学习实验。
    key_results: 带有时间线合并的上下文追踪模块实现了 1.5-10 倍的训练加速。自动化研究系统在无需人工干预的情况下复现了强化学习研究人员的关键探索工作流程。
    limitations: []
