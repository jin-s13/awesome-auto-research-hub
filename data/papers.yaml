  title_cn: 大型语言模型是可靠的AI科学家吗？评估对黑盒系统的逆向工程能力
  abstract_cn: 利用AI创建自主研究人员有望加速科学发现。实现这一愿景的前提是理解AI模型从黑盒系统的行为中识别其底层结构的能力。本文探讨了大型语言模型（LLM）在被动观察与主动收集数据两种条件下学习识别黑盒函数的能力。我们研究了LLM在三种不同类型的黑盒系统（程序、形式语言、数学方程）上的逆向工程能力，这些系统代表了未来自主AI研究人员可能产生重大影响的不同问题领域。通过大量实验，我们发现LLM无法从观察中提取信息，其性能平台低于贝叶斯推断的理想水平。然而，我们证明，提示LLM不仅观察而且主动干预——用特定输入查询黑盒并观察输出——通过让LLM测试边界情况并修正信念，提升了性能。通过将干预数据从一个LLM传递给另一个，我们表明这种改进部分源于生成有效干预的过程，这与人类学习文献中的结果相似。进一步分析揭示，干预有助于LLM摆脱两种常见失败模式：过度复杂化（LLM错误假设关于黑盒的先验知识）和忽视（LLM未能整合观察结果）。这些见解为帮助LLM更有效地逆向工程黑盒系统提供了实践指导，支持其在科学发现中的应用。
  tldr_cn: LLM在被动观察中无法逆向工程黑盒系统，但主动干预可提升性能，仍不及贝叶斯推断。
  analysis_cn:
    innovations:
    - 提示LLM主动干预（查询）黑盒系统而非仅被动观察，提升了逆向工程性能。
    - 识别出两种常见失败模式——过度复杂化和忽视——干预有助于LLM摆脱这些模式。
    - 证明干预的益处部分源于生成有效查询的过程，而不仅仅是结果数据。
    methodology: 本研究评估了LLM在被动观察和主动干预条件下对三种黑盒系统（程序、形式语言、数学方程）进行逆向工程的能力，将性能与贝叶斯推断进行比较，并分析了失败模式。
    key_results: LLM在被动观察下性能平台低于贝叶斯推断，但主动干预通过允许边界情况测试和信念修正提升了性能；干预有助于摆脱过度复杂化和忽视的失败。
    limitations:
    - 即使有干预，LLM仍低于贝叶斯推断的理想水平。
    - 干预带来的性能提升仅是部分性的。
    - 研究仅限于三种特定类型的黑盒系统。
