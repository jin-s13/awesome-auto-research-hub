- id: understanding-usage-and-engagement-in-ai-powered-scientific-2026
  title: 'Understanding Usage and Engagement in AI-Powered Scientific Research Tools:
    The Asta Interaction Dataset'
  authors:
  - Dany Haddad
  - Dan Bareket
  - Joseph Chee Chang
  - Jay DeYoung
  - Jena D. Hwang
  - Uri Katz
  - Mark Polak
  - Sangho Suh
  - Harshit Surana
  - Aryeh Tiktinsky
  - Shriya Atmakuri
  - Jonathan Bragg
  - Mike D'Arcy
  - Sergey Feldman
  - Amal Hassan-Ali
  - Rubén Lozano
  - Bodhisattwa Prasad Majumder
  - Charles McGrady
  - Amanpreet Singh
  - Brooke Vlahos
  - Yoav Goldberg
  - Doug Downey
  abstract: AI-powered scientific research tools are rapidly being integrated into
    research workflows, yet the field lacks a clear lens into how researchers use
    these systems in real-world settings. We present and analyze the Asta Interaction
    Dataset, a large-scale resource comprising over 200,000 user queries and interaction
    logs from two deployed tools (a literature discovery interface and a scientific
    question-answering interface) within an LLM-powered retrieval-augmented generation
    platform. Using this dataset, we characterize query patterns, engagement behaviors,
    and how usage evolves with experience. We find that users submit longer and more
    complex queries than in traditional search, and treat the system as a collaborative
    research partner, delegating tasks such as drafting content and identifying research
    gaps. Users treat generated responses as persistent artifacts, revisiting and
    navigating among outputs and cited evidence in non-linear ways. With experience,
    users issue more targeted queries and engage more deeply with supporting citations,
    although keyword-style queries persist even among experienced users. We release
    the anonymized dataset and analysis with a new query intent taxonomy to inform
    future designs of real-world AI research assistants and to support realistic evaluation.
