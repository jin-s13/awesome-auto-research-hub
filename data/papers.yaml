  abstract_cn: 大语言模型（LLM）越来越多地被用于自动生成综述论文。现有方法通常从大量相关论文中提取内容，并直接提示LLM进行总结。然而，这类方法往往忽略了论文之间的结构关系，导致生成的综述缺乏连贯的分类体系和对研究进展的深层上下文理解。为解决这些问题，我们提出了SurveyG，一个基于LLM的智能体框架，该框架集成了层次化引用图，其中节点表示研究论文，边捕捉引用依赖关系和内容之间的语义相关性，从而将结构性和上下文知识嵌入综述生成过程。该图分为三个层次：基础层、发展层和前沿层，以捕捉从开创性工作到渐进式进展和新兴方向的研究演进。通过结合层内横向搜索和跨层纵向深度遍历，智能体生成多层次摘要，并整合为结构化的综述大纲。随后，多智能体验证阶段确保最终综述的一致性、覆盖范围和事实准确性。实验（包括人类专家评估和LLM作为评判者）表明，SurveyG优于最先进的框架，生成的综述更全面，且更符合领域的内在知识分类体系。
