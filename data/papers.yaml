    methodology: The benchmark consists of 19 tasks derived from the NanoGPT speedrun
      competition, where each task gives an AI agent the previous record's training
      script and optionally a hint (pseudocode, description, or paper-like) about
      the improvement. The agent must modify the script to reproduce the speedup,
      with tasks covering diverse code-level changes from algorithmic to hardware-aware
      optimizations. Recent reasoning LLMs with state-of-the-art scaffolds are evaluated
      on their ability to reimplement these known innovations.
    key_results: Recent reasoning LLMs combined with state-of-the-art scaffolds struggle
      to reimplement already-known innovations in the benchmark, even when provided
      with detailed hints, indicating the benchmark is a non-saturated measure of
      scientific reproduction ability.
    limitations:
    - The benchmark only measures reproduction of existing results, which is a necessary
      but not sufficient skill for autonomous research.
    - Tasks are limited to NanoGPT training optimizations, potentially not capturing
      the full diversity of scientific reproduction challenges.
    - The hint formats may not fully represent the information available in real-world
      scientific reproduction scenarios.
  title_cn: 自动化LLM速通基准：复现NanoGPT改进
  abstract_cn: 大型语言模型（LLM）的快速进步有潜力助力科学进展。实现这一目标的关键能力是复现现有工作。为了评估AI智能体在活跃研究领域中复现结果的能力，我们引入了自动化LLM速通基准（Automated
    LLM Speedrunning Benchmark），该基准利用了NanoGPT速通竞赛（一项以最短时间训练GPT-2模型的竞赛）的研究社区贡献。19个速通任务中的每一个都为智能体提供了先前记录的训练脚本，并可选择搭配三种提示格式之一，范围从伪代码到类似论文的新记录改进描述。记录设计为快速执行，速通改进涵盖多样化的代码级更改，从高级算法改进到硬件感知优化。这些特性使该基准对于改进LLM训练这一前沿问题既易于访问又具有现实性。我们发现，即使提供了详细提示，最新的推理LLMs结合最先进的scaffolds也难以重新实现我们基准中已知的创新。因此，我们的基准提供了一个简单、非饱和的度量，用于衡量LLM自动化科学复现的能力，这是自主研究智能体所需（但非充分）的技能。
  tldr_cn: 新基准评估AI智能体复现NanoGPT速通改进，LLMs有详细提示也难完成。
  analysis_cn:
    innovations:
    - 引入了自动化LLM速通基准（Automated LLM Speedrunning Benchmark），这是一个利用NanoGPT速通竞赛评估AI智能体复现研究成果能力的新基准。
    - 设计了19个任务，为智能体提供先前记录的训练脚本以及三种提示格式之一（伪代码、描述、类似论文的描述），以重新实现已知改进。
    - 证明了该基准是非饱和的，因为当前具有最先进scaffolds的推理LLMs即使有详细提示也无法复现改进。
    methodology: 该基准包含19个源自NanoGPT速通竞赛的任务，每个任务向AI智能体提供先前记录的训练脚本，并可选择提供关于改进的提示（伪代码、描述或类似论文的描述）。智能体必须修改脚本以复现加速，任务涵盖从算法到硬件感知优化的多样化代码级更改。评估了具有最先进scaffolds的最新推理LLMs重新实现这些已知创新的能力。
    key_results: 最新的推理LLMs结合最先进的scaffolds在基准中难以重新实现已知创新，即使提供了详细提示，表明该基准是科学复现能力的非饱和度量。
    limitations:
    - 该基准仅衡量现有结果的复现，这是自主研究的必要但不充分技能。
    - 任务仅限于NanoGPT训练优化，可能无法捕捉科学复现挑战的全部多样性。
    - 提示格式可能无法完全代表现实世界科学复现场景中可用的信息。
