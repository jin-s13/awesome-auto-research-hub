  title_cn: 利用大语言模型和信息论量化天体物理方法的可重构性：光谱重建案例研究
  abstract_cn: 现代天体物理研究高度依赖复杂的数据分析流程，然而已发表的描述往往缺乏计算可重复性所需的细节。本文提出一个信息论框架，用于量化方法从其书面描述中被重建的有效程度。通过将算法重建视为大语言模型（LLMs）生成的概率分布，我们利用香农熵和詹森-香农散度来衡量文本对有效实现假设空间的约束强度。我们以稀疏测光数据中的海王星外天体（TNO）光谱重建为案例研究进行演示。通过向前沿LLMs提供不同级别的稿件文本（标题、摘要和方法部分），我们发现虽然增加文本能成功澄清整体算法结构，但无法消除实现层面的方差。这种持续存在的方差建立了一个“熵下限”，表明多种不同的实现与明确指令保持一致。为了评估实际可重复性，我们将这些重建算法转化为可执行流程。结果表明，虽然LLMs能轻松恢复核心功能方法论，但它们系统性地无法推断严格科学校准所需的隐性专家知识。这项初步研究表明，LLMs可被重新用作零样本诊断工具来审计方法透明度，帮助作者识别缺失的结构约束，并在自动化研究时代维护科学完整性。
