    - 权限工程：实现有界智能体执行和隔离评估
    - 工件工程：基于文件系统和Git的协作
    - 预算工程：预算感知探索
    - 人在回路工程：便捷的人工监督与干预
    methodology: EurekAgent是一个指标驱动的智能体系统，通过工程化执行环境来塑造智能体行为。它包含四个工程维度：权限工程（限制执行并隔离评估）、工件工程（使用文件系统和Git进行协作）、预算工程（成本感知探索）以及人在回路工程（监督）。智能体在此工程化环境中提出、验证并迭代解决方案。
