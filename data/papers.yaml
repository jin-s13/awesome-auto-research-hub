- id: nora-a-harness-engineered-autonomous-research-agent-for-end-2026
  title: 'NORA: A Harness-Engineered Autonomous Research Agent for End-to-End Spatial
    Data Science'
  authors:
  - Bing Zhou
  - Xiao Huang
  - Huan Ning
  - Qiusheng Wu
  - Diya Li
  - Ziyi Zhang
  abstract: 'The automation of scientific research workflows has emerged as a transformative
    frontier in artificial intelligence, yet existing autonomous research agents remain
    largely domain-agnostic, lacking the specialized reasoning, method selection,
    and data acquisition capabilities required for rigorous spatial data science.
    This paper introduces NORA (Night Owl Research Agent), a harness-engineered, multi-agent
    autonomous research system purpose-built for GIScience and spatial data science.
    NORA orchestrates the complete research lifecycle through a skills-first architecture
    comprising 21 domain-specialized workflow skills, 9 specialist sub-agents, and
    custom Model Context Protocol (MCP) servers. Central to the system''s design are
    two novel domain-specialized skills: a spatial analysis skill unit that encodes
    decision frameworks for exploratory spatial data analysis, spatial regression,
    and diagnostics; and a spatial data download skill that supports reproducible
    acquisition from authoritative geospatial data sources. We formalize the concept
    of harness engineering for scientific research agents, demonstrating how lifecycle
    hooks, safety gates, generator-evaluator separation, human-in-the-loop, and state
    persistence ensure reliable and reproducible autonomous research. We evaluate
    NORA through case studies by 6 domain specialists and 3 LLM reviewers across seven
    dimensions (novelty, quality, rigor, etc). Results demonstrate that domain-specialized
    harness engineering substantially improves the efficiency and quality of research
    output compared to general-purpose agent configurations.'
