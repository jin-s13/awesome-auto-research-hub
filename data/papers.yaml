  title_cn: 'BioKGBench: 面向生物医学科学的AI智能体知识图谱检查基准'
  abstract_cn: 追求生物医学科学的人工智能，即AI科学家，日益受到关注，其中一种常见方法是构建由大型语言模型（LLMs）驱动的协作者智能体。然而，评估此类系统时，人们要么依赖于对LLM本身的直接问答（QA），要么采用生物医学实验的方式。如何从AI科学家的角度精确地基准测试生物医学智能体仍然是一个未被充分探索的问题。为此，我们从科学家最重要的能力之一——理解文献中汲取灵感，引入了BioKGBench。与仅关注事实性QA的传统评估基准（已知LLMs存在幻觉问题）不同，我们首先将“理解文献”分解为两个原子能力：i)
    通过执行科学声明验证来“理解”研究论文中的非结构化文本，以及ii) 与结构化知识图谱问答（KGQA）交互的能力，作为“文献”基础。然后，我们提出了一项新的智能体任务，称为KGCheck，利用KGQA和基于领域的检索增强生成（RAG）来识别现有大规模知识图谱数据库中的事实错误。我们为两个原子任务收集了超过两千条数据，为智能体任务收集了225条高质量注释数据。令人惊讶的是，我们发现最先进的智能体，无论是日常场景还是生物医学场景，在我们的基准测试中要么失败，要么表现不佳。然后，我们引入了一个简单而有效的基线，称为BKGAgent。在广泛使用的流行知识图谱上，我们发现了超过90个事实错误，这为智能体进行发现提供了场景，并证明了我们方法的有效性。代码和数据可在
    https://github.com/westlake-autolab/BioKGBench 获取。
  tldr_cn: BioKGBench通过声明验证和KGQA评估生物医学AI智能体的文献理解能力，引入KGCheck任务识别知识图谱中的事实错误。
  analysis_cn:
    innovations:
    - 引入BioKGBench，一个从AI科学家视角聚焦文献理解能力的生物医学AI智能体评估基准。
    - 将“理解文献”分解为两个原子能力：对非结构化文本的科学声明验证，以及作为文献基础的结构化知识图谱问答（KGQA）。
    - 提出一项新的智能体任务KGCheck，利用KGQA和基于领域的检索增强生成（RAG）来识别知识图谱数据库中的事实错误。
    - 为该基准提出一个简单而有效的基线智能体BKGAgent。
    methodology: 该基准包含两个原子任务（科学声明验证和KGQA），共超过两千条数据，以及一个智能体任务（KGCheck），包含225条高质量注释实例。评估了来自日常和生物医学领域的最先进智能体，并引入基线BKGAgent，通过KGQA和RAG在知识图谱中进行错误检测。
    key_results: 最先进的智能体在BioKGBench上失败或表现不佳；提出的BKGAgent在广泛使用的知识图谱中发现了超过90个事实错误，证明了该基准在智能体评估和发现方面的实用性。
    limitations: []
