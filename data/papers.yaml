  abstract_cn: 健康信息学研究具有数据模态多样、知识更新迅速以及需要整合生物医学、数据分析和临床实践洞察的特点。这些特点使其特别适合采用基于代理的方法，以自动化知识探索、管理复杂工作流并生成具有临床意义的输出。近年来，基于大语言模型（LLM）的代理在文献综合、数据分析乃至端到端研究执行方面展现了令人瞩目的能力。然而，现有系统在健康信息学领域仍存在局限，因为它们缺乏解读医学可视化内容的机制，且往往忽视领域特定的质量要求。为弥补这些不足，我们提出了OpenLens
    AI——一个专为健康信息学设计的全自动化框架。OpenLens AI整合了文献综述、数据分析、代码生成和稿件准备等专门代理，并通过视觉-语言反馈增强医学可视化能力，同时引入可重复性的质量控制。该框架自动化了整个研究流程，生成可发表的LaTeX稿件，并确保工作流透明可追溯，从而为推进健康信息学研究提供了一种领域自适应的解决方案。
