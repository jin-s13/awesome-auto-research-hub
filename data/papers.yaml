  analysis:
    innovations:
    - Epistemic uncertainty measured via mutual information between ensemble predictions
      and weight hypotheses as an exploration bonus in policy gradient
    - Ensemble of low-rank adapters over a frozen base model to capture per-token
      disagreement
    - Nuclear norm regularizer to keep adapters distinct and preserve exploration
      signal
    methodology: UG-TTT freezes a base LLM and trains a small ensemble of low-rank
      adapters. Per-token epistemic uncertainty is quantified as the mutual information
      between the ensemble's predictions and the adapter weight hypotheses, isolating
      disagreement from insufficient coverage. This uncertainty is added as an exploration
      bonus to the policy gradient, guiding the policy toward low-coverage regions.
      A nuclear norm regularizer maintains adapter diversity.
    key_results: On four scientific discovery benchmarks, UG-TTT increased maximum
      reward on three tasks and maintained higher solution diversity; ablation showed
      the nuclear norm regularizer is essential for sustaining exploration.
    limitations:
    - Did not increase maximum reward on one of the four benchmarks
  title_cn: 测试时发现中的认知不确定性
  abstract_cn: 使用大型语言模型进行自动化科学发现依赖于识别真正新颖的解决方案。标准强化学习惩罚高方差变异，导致策略优先考虑熟悉模式。结果，即使平均奖励增加，最大奖励也会停滞。克服这一限制需要一个能够区分未探索区域与固有困难问题的信号。这需要测量独立适应的权重假设之间的分歧，而不是依赖单个网络的置信度。UG-TTT通过在冻结的基础模型上维护一个小型低秩适配器集成来解决这一挑战。每个token的分歧通过集成预测与权重假设之间的互信息量化，从而分离出认知不确定性，并识别出因覆盖不足而非问题固有难度导致适配器发散的位置。该度量作为探索奖励加入策略梯度，引导策略向适配器持续分歧指示低训练覆盖的区域移动，这正是真正发现可能的前沿。核范数正则化器确保适配器彼此保持不同，从而在整个训练过程中维持探索信号。在四个科学发现基准测试中，UG-TTT在三个任务上提高了最大奖励，保持了显著更高的解决方案多样性，消融实验证实正则化器对于维持这一行为至关重要。
  tldr_cn: UG-TTT利用低秩适配器集成测量认知不确定性，引导自动科学发现中的探索以克服奖励平台。
  analysis_cn:
