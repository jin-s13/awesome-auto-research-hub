  title_cn: Bohrium + SciMaster：构建规模化智能体科学的基础设施与生态系统
  abstract_cn: AI智能体正成为运行多步科学工作流的实用方式，这些工作流将推理与工具使用和验证交织在一起，标志着从孤立的AI辅助步骤向“规模化智能体科学”的转变。这一转变日益可行，因为科学工具和模型可以通过稳定接口调用，并通过记录的执行轨迹进行验证；同时，这一转变也日益必要，因为AI加速了科学产出，给同行评审和出版流程带来压力，提高了对可追溯性和可信评估的要求。然而，规模化智能体科学仍然困难重重：工作流难以观察和复现；许多工具和实验室系统尚未为智能体做好准备；执行过程难以追踪和管理；原型AI科学家系统通常是定制的，限制了复用和从真实工作流信号中系统性地改进。我们认为，规模化智能体科学需要一种基础设施与生态系统的方法，并通过Bohrium+SciMaster实例化。Bohrium作为一个可管理的、可追溯的AI4S资产中心——类似于AI
    for Science领域的HuggingFace——将多样化的科学数据、软件、计算和实验室系统转化为智能体就绪的能力。SciMaster将这些能力编排成长周期科学工作流，在此基础上可以组合和执行科学智能体。在基础设施与编排之间，一个“科学智能基质”将可复用的模型、知识和组件组织成可执行的构建块，用于工作流推理和行动，从而实现组合、可审计性和通过使用进行改进。我们通过11个代表性主智能体在真实工作流中演示了这一技术栈，实现了端到端科学周期时间数量级的减少，并从真实工作负载中生成了百万级规模的执行接地信号。
