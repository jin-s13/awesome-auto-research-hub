  title_cn: AI科学家综述
  abstract_cn: 人工智能正经历从计算工具到科学知识自主创造者的深刻转变。这一新兴范式——AI科学家——旨在模拟从初始假设生成到最终可发表成果合成的完整科学工作流，从而有望从根本上重塑科学发现的节奏与规模。然而，这些系统的快速且无结构化的扩散造成了碎片化的研究格局，模糊了总体方法论原则和发展趋势。本综述通过引入一个统一的六阶段方法论框架，将端到端科学过程分解为：文献综述、想法生成、实验准备、实验执行、科学写作和论文生成，从而对该领域进行了系统而全面的综合。通过这一分析视角，我们描绘了该领域从早期基础模块（2022-2023）到集成闭环系统（2024），再到当前前沿的可扩展性、影响力与人机协作（2025至今）的演进。通过严格综合这些发展，本综述不仅阐明了自主科学的当前状态，还为克服鲁棒性和治理方面的剩余挑战提供了关键路线图，最终引导下一代系统成为人类科学探究中值得信赖且不可或缺的伙伴。
  tldr_cn: 提出六阶段框架的AI科学家综述，描绘从基础模块到闭环系统与人机协作的演进。
  analysis_cn:
