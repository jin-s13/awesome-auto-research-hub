  title_cn: LLaMEA-BO：一种用于自动生成贝叶斯优化算法的大语言模型进化算法
  abstract_cn: 贝叶斯优化（BO）是一类用于优化昂贵黑盒函数的强大算法，但设计有效的BO算法仍然是一项依赖人工专业知识的任务。大语言模型（LLM）的最新进展为自动化科学发现开辟了新途径，包括自动设计优化算法。虽然先前的工作已在优化循环中使用LLM或生成非BO算法，但我们应对一个新挑战：使用LLM自动生成完整的BO算法代码。我们的框架采用进化策略引导LLM生成Python代码，保留BO算法的关键组件：初始设计、代理模型和采集函数。LLM被提示生成多个候选算法，这些算法在COCO平台的BBOB测试套件上进行评估。根据性能，选择最优候选，通过受控提示变体进行组合和变异，实现迭代优化。尽管没有额外的微调，LLM生成的算法在维度5的24个BBOB函数中的19个上超越了最先进的BO基线，并且能够很好地泛化到更高维度以及不同任务（来自Bayesmark框架）。这项工作表明，LLM可以作为算法协同设计者，为自动化BO开发提供新范式，并加速新型算法组合的发现。源代码见https://github.com/Ewendawi/LLaMEA-BO。
  tldr_cn: 大语言模型进化算法自动生成贝叶斯优化代码，在基准函数上超越基线。
