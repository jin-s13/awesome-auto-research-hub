  title_cn: 利用预训练大语言模型进行物理信息符号回归的知识集成
  abstract_cn: 符号回归（SR）已成为自动化科学发现的强大工具，能够从实验数据中推导出控制方程。越来越多的研究表明，将领域知识集成到符号回归中可以提高所发现方程的通用性和实用性。物理信息符号回归（PiSR）通过融入领域知识来解决这一问题，但当前方法通常需要专门的公式和手动特征工程，限制了其仅适用于领域专家。在本研究中，我们利用预训练的大语言模型（LLMs）来促进PiSR中的知识集成。通过利用在大量科学文献上训练的LLMs的上下文理解能力，我们旨在自动化领域知识的融入，减少人工干预的需求，并使该过程更易于应用于更广泛的科学问题。具体而言，将LLM集成到符号回归的损失函数中，添加一项LLM对SR生成方程的评估。我们使用三种SR算法（DEAP、gplearn和PySR）和三种预训练LLMs（Falcon、Mistral和LLama
    2）在三个物理动力学（落球、简谐运动和电磁波）上广泛评估了我们的方法。结果表明，LLM集成一致地改善了从数据中重建物理动力学的能力，增强了SR模型对噪声和复杂性的鲁棒性。我们进一步探讨了提示工程的影响，发现信息更丰富的提示显著提升了性能。
  tldr_cn: 利用预训练大语言模型将领域知识集成到符号回归损失函数中，提升物理动力学方程发现能力。
  analysis_cn:
    innovations:
    - 利用预训练大语言模型在物理信息符号回归中实现自动化领域知识集成
    - 将大语言模型评估作为额外项纳入符号回归损失函数
    - 通过提示工程优化大语言模型对方程发现的引导
    methodology: 将大语言模型集成到符号回归损失函数中，添加一项对生成方程的评估。该方法使用三种符号回归算法（DEAP、gplearn、PySR）和三种预训练大语言模型（Falcon、Mistral、LLama
      2）在三个物理动力学（落球、简谐运动、电磁波）上进行测试。
    key_results: 大语言模型集成一致地改善了从数据中重建物理动力学的能力，增强了对噪声和复杂性的鲁棒性。信息更丰富的提示显著提升了性能。
