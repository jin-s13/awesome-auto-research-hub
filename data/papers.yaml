  title_cn: PaperBanana：为AI科学家自动生成学术插图
  abstract_cn: 尽管基于语言模型的自主AI科学家取得了快速进展，但生成可发表的插图仍然是研究工作流程中一个劳动密集型的瓶颈。为减轻这一负担，我们提出了PaperBanana，一个用于自动生成可发表学术插图的智能体框架。借助最先进的VLM和图像生成模型，PaperBanana协调专门智能体进行参考文献检索、内容和风格规划、图像渲染，并通过自我批评进行迭代优化。为了严格评估我们的框架，我们引入了PaperBananaBench，该基准包含从NeurIPS
    2025出版物中精选的292个方法论图测试用例，涵盖多样化的研究领域和插图风格。综合实验表明，PaperBanana在忠实性、简洁性、可读性和美观性方面持续优于领先基线。我们进一步展示了该方法有效扩展到高质量统计图的生成。总体而言，PaperBanana为自动生成可发表的插图铺平了道路。
  tldr_cn: PaperBanana利用VLM和图像模型自动生成可发表的学术插图，并基于NeurIPS 2025构建基准。
  analysis_cn:
    innovations:
    - 智能体框架，协调专门智能体进行参考文献检索、内容/风格规划、渲染和迭代自我批评优化
    - PaperBananaBench，一个包含292个来自NeurIPS 2025的方法论图基准，用于评估学术插图生成
    methodology: PaperBanana采用基于VLM和图像生成模型的智能体框架，其中智能体检索参考文献、规划内容和风格、渲染图像，并通过自我批评进行迭代优化。评估在PaperBananaBench上进行，该基准包含从NeurIPS
      2025精选的292个方法论图，与领先基线在忠实性、简洁性、可读性和美观性方面进行比较。
    key_results: PaperBanana在忠实性、简洁性、可读性和美观性方面持续优于领先基线，并且能够生成高质量的统计图。
