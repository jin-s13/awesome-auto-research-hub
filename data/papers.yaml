  title_cn: MLReplicate：面向机器学习可复现性的自主研究系统基准测试
  abstract_cn: 能够生成完整科学手稿的自主研究系统发展迅速，但稳健且现实的评估框架未能跟上步伐。为弥合这一差距，我们提出MLReplicate，一个评估自主研究系统在机器学习可复现性方面的端到端基准。该基准基于ICML
    2025杰出论文重构为标准输入规范构建，并在六个最先进的自主研究系统（AI SCIENTIST-V1, AI SCIENTIST-V2, AGENT LABORATORY,
    CYCLERESEARCHER, AI RESEARCHER, TINY SCIENTIST）上进行评估，生成了45篇手稿（3篇失败）。输出采用双协议方法评估，结合自动化会议风格评审和结构化专家人工评估，同时追踪计算成本、运行时间和所需人工干预量。自动化会议风格评审接受了37份有效提交中的10份。另有8份提交因未达到最低页数阈值而在评审前被直接拒稿。与自动评审相反，人工评审员在所有系统中一致发现了方法论缺陷、虚构的实验结果和可复现性失败，且59%被接受的自动评审包含捏造或无依据的声明。我们进一步发现，令牌预算和计算成本均不能预测输出质量：最便宜的系统在人工评估中优于最耗资源的系统，尽管输入令牌数量相差38倍。因此，我们证明自主研究工作流设计比计算规模更重要。MLReplicate揭示了当前自主研究系统与真正科学严谨性之间的巨大差距，并为系统性地迈向可信赖的AI驱动科学发现建立了一个实用且可扩展的评估框架。
  tldr_cn: 提出MLReplicate基准，基于ICML 2025论文评估自主研究系统的ML可复现性，发现自动评审不可靠且成本与质量无关。
  analysis_cn:
    innovations:
    - MLReplicate基准：一个面向机器学习可复现性的自主研究系统端到端评估框架，基于ICML 2025杰出论文重构为标准输入规范构建。
    - 双协议评估方法，结合自动化会议风格评审和结构化专家人工评估，同时追踪计算成本、运行时间和人工干预量。
    - 证明自主研究工作流设计比计算规模更重要，因为最便宜的系统在人工评估中优于最耗资源的系统，尽管输入令牌数量相差38倍。
    methodology: MLReplicate基于ICML 2025杰出论文重构为标准输入规范构建。六个最先进的自主研究系统（AI SCIENTIST-V1,
      AI SCIENTIST-V2, AGENT LABORATORY, CYCLERESEARCHER, AI RESEARCHER, TINY SCIENTIST）生成了45篇手稿（3篇失败）。输出通过自动化会议风格评审和结构化专家人工评估进行评估，指标包括计算成本、运行时间和人工干预量。
    key_results: 自动评审接受了37份有效提交中的10份，但人工评审员在所有系统中发现了方法论缺陷、虚构结果和可复现性失败；59%被接受的自动评审包含捏造或无依据的声明。最便宜的系统在人工评估中优于最耗资源的系统，表明工作流设计比计算规模更重要。
