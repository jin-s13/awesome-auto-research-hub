  title_cn: 'SciSage: 一个用于高质量科学综述生成的多智能体框架'
  abstract_cn: 科学文献的快速增长要求强大的自动化综述生成工具。然而，当前基于大语言模型（LLM）的方法往往缺乏深入分析、结构连贯性和可靠的引用。为了解决这些局限性，我们提出了SciSage，一个采用'reflect-when-you-write'范式的多智能体框架。SciSage具有一个层次化的Reflector智能体，能够在提纲、章节和文档层面批判性地评估草稿，并与专门用于查询解释、内容检索和精炼的智能体协作。我们还发布了SurveyScope，一个严格策划的基准测试，包含2020-2025年间11个计算机科学领域的46篇高影响力论文，具有严格的时效性和基于引用的质量控制。评估表明，SciSage优于最先进的基线（LLM
    x MapReduce-V2, AutoSurvey），在文档连贯性上提高了+1.73分，在引用F1分数上提高了+32%。人工评估显示结果参差不齐（3胜7负于人工撰写的综述），但突出了SciSage在主题广度和检索效率方面的优势。总体而言，SciSage为研究辅助写作工具提供了一个有前景的基础。
  tldr_cn: SciSage多智能体框架通过层次化Reflector生成高质量科学综述，在连贯性和引用准确性上超越基线。
  analysis_cn:
    innovations:
    - 采用'reflect-when-you-write'范式的多智能体框架
    - 层次化的Reflector智能体，在提纲、章节和文档层面评估草稿
    - 专门用于查询解释、内容检索和精炼的智能体
    - SurveyScope基准测试：包含2020-2025年间11个计算机科学领域的46篇高影响力论文，具有严格的时效性和基于引用的质量控制
    methodology: SciSage是一个多智能体系统，其中层次化的Reflector智能体在多个粒度上批判草稿，并与用于查询解释、检索和精炼的智能体协作。它在SurveyScope基准测试上，以LLM
      x MapReduce-V2和AutoSurvey为基线，使用自动指标（文档连贯性、引用F1）和人工评估进行评价。
