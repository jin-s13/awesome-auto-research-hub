- id: build-your-personalized-research-group-a-multiagent-framewo-2025
  title: 'Build Your Personalized Research Group: A Multiagent Framework for Continual
    and Interactive Science Automation'
  authors:
  - Ed Li
  - Junyu Ren
  - Xintian Pan
  - Cat Yan
  - Chuanhao Li
  - Dirk Bergemann
  - Zhuoran Yang
  abstract: 'The automation of scientific discovery represents a critical milestone
    in Artificial Intelligence (AI) research. However, existing agentic systems for
    science suffer from two fundamental limitations: rigid, pre-programmed workflows
    that cannot adapt to intermediate findings, and inadequate context management
    that hinders long-horizon research. We present \texttt{freephdlabor}, an open-source
    multiagent framework featuring \textit{fully dynamic workflows} determined by
    real-time agent reasoning and a \coloremph{\textit{modular architecture}} enabling
    seamless customization -- users can modify, add, or remove agents to address domain-specific
    requirements. The framework provides comprehensive infrastructure including \textit{automatic
    context compaction}, \textit{workspace-based communication} to prevent information
    degradation, \textit{memory persistence} across sessions, and \textit{non-blocking
    human intervention} mechanisms. These features collectively transform automated
    research from isolated, single-run attempts into \textit{continual research programs}
    that build systematically on prior explorations and incorporate human feedback.
