  title_cn: 大型语言模型能否充分执行时间序列上的符号推理？
  abstract_cn: 从时间序列数据中揭示隐藏的符号规律，这一目标可追溯至开普勒发现行星运动，至今仍是科学发现和人工智能的核心挑战。尽管大型语言模型在结构化推理任务中展现出潜力，但其从时间序列数据中推断可解释、上下文对齐的符号结构的能力仍未被充分探索。为系统评估这一能力，我们引入了SymbolBench，一个全面的基准，旨在评估真实世界时间序列上的符号推理，涵盖三个任务：多元符号回归、布尔网络推断和因果发现。与以往仅限于简单代数方程的工作不同，SymbolBench涵盖了多种符号形式及其复杂度。我们进一步提出了一个统一框架，将LLM与遗传编程集成，形成闭环符号推理系统，其中LLM同时作为预测器和评估器。我们的实证结果揭示了当前模型的关键优势和局限性，强调了结合领域知识、上下文对齐和推理结构对于提升LLM在自动化科学发现中的重要性。https://github.com/nuuuh/SymbolBench
  tldr_cn: 提出SymbolBench评估LLM在时间序列上的符号推理，并构建LLM与遗传编程结合的框架。
  analysis_cn:
    innovations:
    - 引入SymbolBench，一个针对真实世界时间序列符号推理的综合基准，涵盖多元符号回归、布尔网络推断和因果发现，具有多样化的符号形式和复杂度。
    - 一个将LLM与遗传编程集成的统一闭环框架，其中LLM同时作为预测器和评估器。
    methodology: 本文引入了SymbolBench，一个包含三个真实世界时间序列符号推理任务的基准，并提出了一个将LLM与遗传编程结合在闭环系统中的框架。LLM被用作预测器和评估器，并在当前模型上进行了实证评估。
    key_results: 实证结果揭示了当前LLM的关键优势和局限性，强调领域知识、上下文对齐和推理结构对于改进时间序列符号推理至关重要。
    limitations:
    - 当前LLM在时间序列符号推理中表现出局限性，需要结合领域知识、上下文对齐和推理结构才能达到足够的性能。
    tech_stack:
    - LLMs
    - Genetic Programming
    - SymbolBench
