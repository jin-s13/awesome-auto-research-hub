  title_cn: 从AutoRecSys到AutoRecLab：呼吁构建、评估和治理自主推荐系统研究实验室
  abstract_cn: 推荐系统研究加速了模型和评估的进步，但很大程度上忽视了研究过程本身的自动化。我们主张从狭隘的AutoRecSys工具（专注于算法选择和超参数调优）转向集成端到端自动化的自主推荐系统研究实验室（AutoRecLab），涵盖问题构思、文献分析、实验设计与执行、结果解释、手稿起草以及来源记录。借鉴自动化科学的最新进展（例如，多智能体AI
    Scientist和AI Co-Scientist系统），我们为RecSys社区概述了一个议程：（1）构建结合LLM驱动的构思与报告以及自动化实验的开放AutoRecLab原型；（2）建立基准和竞赛，评估智能体在最少人工输入下生成可复现RecSys发现的能力；（3）创建透明地接受AI生成投稿的评审场所；（4）通过详细的研究日志和元数据定义归属和可复现性的标准；（5）促进关于自主研究中伦理、治理、隐私和公平的跨学科对话。推进这一议程可以提高研究产出，揭示非显而易见的见解，并使RecSys能够为新兴的人工研究智能做出贡献。最后，我们呼吁组织一次社区务虚会，以协调后续步骤并共同撰写关于负责任地集成自动化研究系统的指南。
  tldr_cn: 提出AutoRecLab概念，集成端到端自动化，并规划构建、评估和治理议程。
  analysis_cn:
