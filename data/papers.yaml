  title_cn: SciTrace：面向科学发现代理的轨迹感知安全推理
  abstract_cn: 基于LLM的科学代理已展现出强大的自主研究能力，但其安全层在结构上与核心推理相分离：它们检查流水线输出，而非塑造产生输出的推理过程。这种分离导致了两种失效模式：一个阶段积累的安全信号在进入下一阶段前被丢弃，以及一系列单独无害的工具调用可能组合成有害结果，而单步过滤器无法检测到。为解决这些挑战，我们提出了SciTrace框架，将安全推理融入科学代理流水线的每个阶段。SciTrace结合了两种互补机制：安全内在推理循环（SIR），通过联合任务与安全推理，在思考者、实验者、写作者和审阅者阶段维护累积风险状态；以及组合工具链验证器（CTV），在执行前进行轨迹感知安全检查，捕捉仅在多步工具序列中出现的风险。在涵盖六个科学领域的240项高风险研究任务和120项工具相关风险任务上的评估表明，SciTrace在四种骨干模型上均实现了最先进（SOTA）的安全性：它一致提升了工具调用安全性和对抗鲁棒性，同时保持了科学输出质量，并发现了单步监控器遗漏的78.8%的组合工具链逃逸。项目网站：https://opensciagent.github.io/SciTrace/。
  tldr_cn: SciTrace将安全推理融入科学发现代理的每个阶段，利用轨迹感知检查防止组合工具链风险。
  analysis_cn:
    innovations:
    - SciTrace框架将安全推理融入科学代理流水线的每个阶段，解决了安全层与核心推理分离的问题。
    - 安全内在推理循环（SIR）通过联合任务与安全推理，在思考者、实验者、写作者和审阅者阶段维护累积风险状态。
    - 组合工具链验证器（CTV）在执行前进行轨迹感知安全检查，捕捉多步工具序列中的风险。
    methodology: SciTrace结合了SIR和CTV两种机制。在涵盖六个科学领域的240项高风险研究任务和120项工具相关风险任务上，使用四种骨干模型进行评估，并与其他框架（基线未具体说明）进行比较。评估指标包括工具调用安全性、对抗鲁棒性、科学输出质量以及组合工具链逃逸检测率。
    key_results: SciTrace实现了最先进的安全性，在保持科学输出质量的同时提升了工具调用安全性和对抗鲁棒性，并检测到单步监控器遗漏的78.8%的组合工具链逃逸。
    limitations: []
    tech_stack: []
- id: scientistone-towards-human-level-autonomous-research-via-ch-2026
  title: 'ScientistOne: Towards Human-Level Autonomous Research via Chain-of-Evidence'
  authors:
  - Rui Meng
  - Bhavana Dalvi Mishra
  - Jiefeng Chen
  - Chun-Liang Li
  - Palash Goyal
  - Mihir Parmar
  - Yiwen Song
  - Yale Song
  - Rajarishi Sinha
  - Parthasarathy Ranganathan
  - Burak Gokturk
  - Jinsung Yoon
  - Tomas Pfister
  abstract: 'Autonomous research agents produce competitive solutions and professional-looking
    manuscripts, yet their outputs contain verifiability failures undetectable by
    surface-level evaluation: fabricated citations, unreproducible scores, and method
    descriptions that diverge from the implementation. We address this through three
    contributions. First, Chain-of-Evidence (CoE), a verifiability framework requiring
    every claim to be traceable to its evidence source. Second, ScientistOne, an end-to-end
    autonomous research system that maintains evidence chains by construction throughout
    literature review, solution discovery, and paper writing. Third, CoE Audit, a
    post-hoc audit whose four integrity checks -- score verification, specification
    violation, reference verification, and method-code alignment -- apply uniformly
    to all systems. Across 75 papers spanning five systems and five frontier research
    tasks, every baseline exhibits at least one systematic failure mode: hallucinated
    reference rates reach 21%, score verification passes in as few as 42% of papers,
    and method-code alignment ranges from 20% to 80%. ScientistOne achieves zero hallucinated
    references (0/337), perfect score verification (12/12), and the highest method-code
    alignment (14/15), while matching or exceeding human expert performance on all
    five tasks. ScientistOne further generalizes to six additional tasks spanning
    medical imaging, fine-grained recognition, 3D perception, and language modeling,
    achieving state-of-the-art on Parameter Golf and gold medals on MLE-Bench tasks
    where baselines fail entirely.'
