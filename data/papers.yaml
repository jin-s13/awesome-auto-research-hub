  title_cn: 闪光的不一定是新颖：AI生成研究中的抄袭
  abstract_cn: 自动化科学研究被视为科学的最终前沿。近期，多篇论文声称自主研究智能体能够生成新颖的研究想法。在普遍的乐观情绪中，我们记录了一个关键问题：相当一部分此类研究文档存在智能抄袭。与以往由专家评估研究想法新颖性和可行性的工作不同，我们邀请了13位专家在另一种情境逻辑下操作：识别LLM生成的研究文档与现有工作之间的相似性。令人担忧的是，专家发现50篇被评估的研究文档中有24%要么是改写（存在一对一的映射方法），要么是大量借鉴了现有工作。这些报告实例已由原始论文的作者交叉验证。其余76%的文档与现有工作存在不同程度的相似性，仅有一小部分看起来完全新颖。问题在于，这些LLM生成的研究文档未注明原始来源，并能绕过内置的抄袭检测器。最后，通过控制实验，我们表明自动抄袭检测器在捕捉此类系统中的抄袭想法方面存在不足。我们建议对LLM生成的研究进行谨慎评估，并讨论我们的发现对学术出版的影响。
  tldr_cn: 专家发现24%的LLM生成研究文档存在抄袭，多数与现有工作相似，且能绕过检测器。
  analysis_cn:
    innovations:
    - 首次系统记录AI生成研究文档中的抄袭问题
    - 基于专家评估的框架，用于检测LLM输出中的想法抄袭
    - 与原始论文作者交叉验证抄袭实例
    - 证明自动抄袭检测器无法捕捉LLM的抄袭想法
    methodology: 13位专家评估了50篇LLM生成的研究文档与现有工作的相似性，识别出改写或大量借鉴的内容；实例由原始作者交叉验证。控制实验测试了自动抄袭检测器的有效性。
    key_results: 专家发现50篇文档中有24%被识别为改写或大量借鉴，仅有一小部分看起来完全新颖；自动抄袭检测器在捕捉抄袭想法方面存在不足。
    limitations: []
    tech_stack: []
