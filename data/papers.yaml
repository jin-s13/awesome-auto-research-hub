  title_cn: 人工智能用于科学发现是一个社会问题
  abstract_cn: 人工智能（AI）正越来越多地应用于科学研究，但其收益在不同社区和学科之间仍然分布不均。尽管诸如数据有限、标准碎片化以及计算资源获取不平等这类技术挑战已广为人知，但社会与制度因素往往是主要制约因素。强调自主“AI科学家”的叙事、对数据与基础设施工作的认可不足、激励错位以及领域专家与机器学习研究者之间的鸿沟，都限制了AI对科学发现的影响。本文重点阐述了四个相互关联的挑战：社区协调、研究优先级与上游需求之间的错位、数据碎片化以及基础设施不平等。我们认为，应对这些挑战不仅需要技术创新，还需要有意识的社区建设努力、跨学科教育、共享基准以及可访问的基础设施。我们呼吁将AI用于科学重新定义为一项集体社会工程，其中可持续的合作与公平参与被视为实现技术进步的前提条件。
  tldr_cn: 论文认为社会与制度因素而非技术因素是人工智能在科学发现中的主要制约。
