  title_cn: 探索kNN噪声特征检测与恢复在自驱动实验室中的局限性
  abstract_cn: 自驱动实验室（SDLs）通过将机器学习与自动化实验平台相结合，在加速材料发现方面显示出潜力。然而，输入参数捕获中的错误可能会破坏用于建模系统性能的特征，从而影响当前和未来的实验。本研究开发了一种自动化工作流，用于系统检测噪声特征、确定可纠正的样本-特征配对，并最终恢复正确的特征值。随后进行了一项系统研究，考察数据集大小、噪声强度、噪声类型和特征值分布如何影响噪声特征在密度泛函理论（DFT）和SDL数据集上的可检测性和可恢复性。总体而言，高强度噪声和较大的训练数据集有利于噪声特征的检测和纠正。低强度噪声会降低检测和恢复效果，但可以通过更大的干净训练数据集来补偿。不同特征的检测和纠正结果各异，连续且分散的特征分布比离散或狭窄分布的特征显示出更高的可恢复性。这项系统研究不仅展示了一个模型无关的框架，用于在存在噪声、数据有限和不同特征分布的情况下进行合理的数据恢复，还为材料数据集中的kNN插补提供了具体的基准。最终，它旨在提高自动化材料发现中的数据质量和实验精度。
  tldr_cn: 系统研究自驱动实验室中基于kNN的噪声特征检测与恢复，考察数据集大小、噪声和特征分布的影响。
  analysis_cn:
    innovations:
    - 用于在自驱动实验室中检测噪声特征并恢复正确值的自动化工作流
    - 系统研究数据集大小、噪声强度、噪声类型和特征分布如何影响基于kNN的检测与恢复
    - 材料数据集中kNN插补的模型无关框架与基准
    methodology: 作者开发了一种基于kNN的自动化工作流来检测和纠正噪声特征。他们系统地改变数据集大小、噪声强度、噪声类型和特征值分布，在密度泛函理论（DFT）和自驱动实验室（SDL）数据集上评估可检测性和可恢复性。
    key_results: 高强度噪声和更大的训练数据集提高了检测和纠正效果，而低强度噪声可以通过更大的干净数据集来补偿；连续且分散的特征分布比离散或狭窄的特征分布显示出更高的可恢复性。
    limitations:
    - kNN插补对于离散或狭窄分布的特征显示出较低的可恢复性
    - 在没有足够大的干净训练集的情况下，低强度噪声难以检测和纠正
    - 研究仅限于DFT和SDL数据集，尚未建立对其他材料发现场景的泛化能力
