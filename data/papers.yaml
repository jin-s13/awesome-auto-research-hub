  title_cn: AutoResearch AI：面向科学发现的AI驱动研究自动化
  abstract_cn: 科学研究正被人工智能系统重塑，这些系统从孤立的辅助转向涵盖文献基础、假设生成、实验、验证、报告和修订的更长周期工作流。这一转变标志着从面向科学的任务级AI向工作流级研究自动化的过渡。然而，当前系统仍然碎片化，在自主性、领域范围、执行环境、验证机制和人类监督方面存在差异，同时在证据保存、可重复性、弱方向拒绝、来源追踪、跨领域鲁棒性和负责任的科学闭环方面仍面临挑战。本综述通过AutoResearch（定义为AI驱动的科学工作流自动化的发展谱系）来审视这些进展。其中，Vibe
    Research表示人类引导的基于提示的辅助和人工验证执行区域，而新兴的AI主导系统协调发现循环的更大部分，但尚未实现稳健的自主性。我们分析了研究系统如何在工作流中重新分配控制、证据、执行、验证和问责，并围绕五个工作流条件组织该领域：文献与研究基础；假设形成与规划；实验与工具使用；反馈、验证与评审；以及报告与知识传播。我们进一步综合了AI科学家系统、混合主动协同研究框架、基准测试、领域部署和开源基础设施。最后，我们提出了五个评估维度——新颖性、有效性、影响力、可靠性和来源——并表明AutoResearch的自主性是领域条件化的：在结构化、可执行且可快速验证的环境中更可信，但在具身、延迟、异质、伦理或机构问责的背景下则受限。
  tldr_cn: 综述AI研究自动化，定义AutoResearch和Vibe Research，分析工作流条件。
  analysis_cn:
    innovations:
    - 引入了AutoResearch概念，作为AI驱动的科学工作流自动化的发展谱系，区分了Vibe Research（人类引导的基于提示的辅助）与新兴的AI主导系统。
    - 围绕五个工作流条件组织该领域：文献与研究基础；假设形成与规划；实验与工具使用；反馈、验证与评审；以及报告与知识传播。
    - 为AI科学家系统提出了五个评估维度：新颖性、有效性、影响力、可靠性和来源。
    methodology: 本综述通过综合AI科学家系统、混合主动协同研究框架、基准测试、领域部署和开源基础设施，并围绕五个工作流条件和五个评估维度进行组织，审视了AI驱动的科学工作流自动化。
    key_results: AutoResearch的自主性是领域条件化的：在结构化、可执行且可快速验证的环境中更可信，但在具身、延迟、异质、伦理或机构问责的背景下受限。当前系统在证据保存、可重复性、弱方向拒绝、来源追踪、跨领域鲁棒性和负责任的科学闭环方面仍面临挑战。
    limitations:
