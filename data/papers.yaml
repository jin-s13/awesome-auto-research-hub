  title_cn: MIR：面向科学研究问题的方法论灵感检索
  abstract_cn: 利用大型语言模型（LLMs）的推理能力加速科学发现的研究兴趣激增。现有方法依赖于在相关文献中锚定发现过程，但其有效性随检索文献的质量和性质显著变化。我们解决了检索其概念能启发给定研究问题解决方案的先前工作这一挑战，将该任务定义为方法论灵感检索（MIR）。我们构建了一个专门用于训练和评估MIR检索器的新数据集，并建立了基线。为应对MIR，我们构建了方法论邻接图（MAG），通过引用关系捕获方法论谱系。我们利用MAG将“直观先验”嵌入密集检索器，以识别超越表面语义相似性的方法论灵感模式。这在强基线上实现了Recall@3提升+5.4、平均精度均值（mAP）提升+7.8。此外，我们将基于LLM的重排序策略适配到MIR，进一步带来Recall@3提升+4.5、mAP提升+4.8。通过广泛的消融研究和定性分析，我们展示了MIR在增强自动化科学发现方面的潜力，并概述了推动灵感驱动检索的途径。
