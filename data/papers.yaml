  title_cn: Airalogy：AI驱动的通用数据数字化实现研究自动化
  abstract_cn: 研究数据是人工智能（AI）驱动科学的基础，然而当前AI应用仍局限于少数拥有现成、结构良好、数字化数据集的领域。实现跨多个学科的全面AI赋能仍遥不可及。当前的研究数据收集往往碎片化，缺乏统一标准，管理效率低下，且难以共享。构建一个用于标准化数据数字化的单一平台，需要克服在通用性（支持各学科多样化、不断变化的需求）与标准化（强制执行一致格式以充分赋能AI）之间的固有挑战。现有平台无法同时兼顾这两个方面。构建真正的多学科平台需要将科学领域知识与复杂的计算技能相结合。研究人员往往缺乏设计定制化、标准化数据记录方法的计算专长，而平台开发者则很少理解多个科学领域的复杂需求。这些差距阻碍了研究数据的标准化，并制约了AI驱动的进步。在本研究中，我们通过开发Airalogy（https://airalogy.com）来应对这些挑战。Airalogy是全球首个由AI和社区驱动的平台，在跨多个学科的研究数据数字化中平衡了通用性与标准化。Airalogy使用可定制、标准化的数据记录来表征整个研究工作流程，并提供先进的AI研究助手，用于智能问答、自动数据录入、分析和研究自动化。该平台已在西湖大学所有四个学院的实验室中部署，有潜力加速并自动化大学、工业界及全球研究社区的科学创新，最终造福全人类。
  tldr_cn: Airalogy是AI与社区驱动的跨学科通用标准化研究数据数字化平台。
  grade: worth_reading
- id: aligning-reasoning-llms-for-materials-discovery-with-physics-2025
  title: Aligning Reasoning LLMs for Materials Discovery with Physics-aware Rejection
    Sampling
  authors:
  - Lee Hyun
  - Sohee Yoon
  - Jinwoo Park
  - Sue In Chae
  - Seongeon Park
  - Jooyeon Ahn
  - Yebin Jung
  - Youjung Chung
  - Hogeun Chang
  - Sujin Park
  - Myeonginn Kang
  - Jina Kim
  - Ho-Gyeong Kim
  - Myeonghun Jeong
  abstract: AI-driven materials discovery that couples automated experimentation with
    algorithmic decision-making requires process aware recipe to property predictors
    that are accurate, calibrated, and physically admissible. We approach this as
    a reasoning problem with large reasoning models (LRMs). To instill reasoning capability
    into language models, we curate reasoning traces from a teacher model to train
    a student model. However, most training pipelines select reasoning traces using
    binary correctness or learned preference signals that poorly reflect physical
    admissibility. We introduce Physics-aware Rejection Sampling (PaRS), a training-time
    trace selection scheme that favors traces consistent with fundamental physics
    and numerically close to targets, with lightweight halting to control compute.
    We instantiate our framework with a large student model fine-tuned on traces synthesized
    by a larger teacher model, and evaluate under matched token budgets against various
    rejection sampling baselines. Our method improves accuracy and calibration, reduces
    physics-violation rates, and lowers sampling cost relative to baselines. These
    results indicate that modest, domain-aware constraints combined with trace-level
    selection provide a practical path toward reliable, efficient LRMs for process-aware
    property prediction and closed-loop materials design.
