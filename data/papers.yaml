    innovations:
    - First autonomous research framework tailored to clinical medicine, enabling
      clinically grounded ideation and evidence-grounded manuscript drafting.
    - Clinician-engineer co-reasoning mechanism that transforms surveyed literature
      into actionable evidence, improving idea traceability.
    - Three research modes (paper-based reproduction, literature-inspired innovation,
      task-driven exploration) with progressively increasing autonomy.
    - Manuscript drafting guided by structured medical compositional conventions and
      ethical policies.
    methodology: The Medical AI Scientist framework uses clinician-engineer co-reasoning
      to ground ideation in surveyed literature, drafts manuscripts following medical
      conventions and ethical policies, and supports three research modes with increasing
      autonomy. Evaluations compare idea quality against commercial LLMs using LLM
      and human judges on 171 cases across 19 clinical tasks and 6 data modalities,
      and manuscript quality via double-blind human and Stanford Agentic Reviewer.
    key_results: Generated ideas significantly outperform commercial LLMs in quality;
      the system achieves strong alignment between proposed method and implementation
      with higher experiment success rates; manuscripts approach MICCAI-level quality
      and surpass ISBI and BIBM.
