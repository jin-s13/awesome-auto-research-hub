    largely unexplored。本文通过系统性实证研究，探讨不同多智能体结构在自动化机器学习优化中的比较效能。利用一个严格控制的、基于执行的测试平台（配备Git
    worktree隔离和显式全局内存），我们将单智能体基线对比两种多智能体范式：子智能体架构（并行探索与事后整合）和智能体团队架构（专家执行前交接）。在严格固定计算时间预算下评估这些系统，我们的发现揭示了操作稳定性与理论深思熟虑之间的基本权衡。子智能体模式作为一种高弹性、高吞吐量的搜索引擎，适用于严格时间约束下的广泛浅层优化。相反，智能体团队拓扑由于多作者代码生成而表现出更高的操作脆弱性，但在扩展计算预算下能够实现复杂架构重构所需的深度理论对齐。这些实证见解为设计未来的自动化研究系统提供了可操作指南，倡导采用动态路由架构，根据实时任务复杂性调整协作结构。
