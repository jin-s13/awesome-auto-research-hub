  title_cn: 'GIANTS: 从科学文献中生成性洞察预测'
  abstract_cn: 科学突破通常源于将已有思想综合成新的贡献。尽管语言模型（LM）在科学发现方面展现出潜力，但其进行这种有针对性、基于文献的综合能力仍未得到充分探索。我们引入了洞察预测（insight
    anticipation）这一生成任务，即模型从其基础父论文中预测下游论文的核心洞察。为了评估这一能力，我们开发了GiantsBench基准，包含八个科学领域的17k个示例，每个示例由一组父论文及其下游论文的核心洞察组成。我们使用一个语言模型评判器（LM
    judge）来评估模型生成的洞察与真实洞察之间的相似度，并证明这些相似度分数与专家人工评分相关。最后，我们提出了GIANTS-4B，这是一个通过强化学习（RL）训练的LM，利用这些相似度分数作为代理奖励来优化洞察预测。尽管其开源架构较小，GIANTS-4B在相似度分数上比gemini-3-pro实现了34%的相对提升，并泛化到未见领域。人工评估进一步表明，GIANTS-4B产生的洞察在概念上比基础模型更清晰。此外，第三方模型SciJudge-30B（训练用于比较研究摘要的潜在引用影响）预测，GIANTS-4B生成的洞察更有可能获得更高引用，在68%的成对比较中偏好GIANTS-4B而非基础模型。我们发布了代码、基准和模型，以支持未来自动化科学发现的研究。
  tldr_cn: 提出洞察预测任务和GiantsBench基准；用强化学习训练GIANTS-4B从父论文预测下游论文洞察。
