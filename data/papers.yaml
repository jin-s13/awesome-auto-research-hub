  title_cn: 基于文献锚定的自主研究：从语料库到前沿计算物理学论文的容错LLM流水线
  abstract_cn: 自主研究代理已在机器学习沙盒中展示了端到端的LLM自动化，其中执行提供了校准。前沿物理科学有本质区别：物理推理是每个方法论选择的基础，工具链往往文档不足，校准必须来自外部文献锚点——未经框架设计的代理会引用这些锚点但不与之对质，从而从内部先验中幻觉出看似合理但无法验证的结果。我们提出一个流水线，从包含11,083篇近期凝聚态物理arXiv论文的语料库端到端运行，生成一篇包含三个实质性物理学发现（此处关于交变磁压电效应）的可发表级别论文：代理通过映射语料库自主构思研究方向，通过复现已发表参考文献校准方法论，进行新颖的第一性原理计算，并撰写论文——全程基于文献锚定，跨越六个阶段中的47个新上下文会话，仅共享磁盘状态，涉及2,162次文献咨询事件。容错性源于冗余：新上下文隔离、分布式锚定和对抗性审查捕捉任何单个会话遗漏的问题；前导和后导阶段完全自主，而试点阶段仅在复现失败时需要有限的人类干预——操作知识整理，而非科学方向指导。两个配对故障模式（前架构基线和无试点消融）隔离了在校准检查点处结构性强制的数值对质，作为有效的锚定机制。这些原语、特征化的故障模式以及量化的干预模式为计算物理学之外的高风险科学领域的自主研究奠定了基础。
  tldr_cn: 一个LLM流水线自主进行文献综述、复现实验、执行新颖计算并撰写凝聚态物理学论文，具有容错能力。
  analysis_cn:
    innovations:
    - 从文献语料库到计算物理学可发表论文的端到端自主研究流水线，全程基于文献锚定。
    - 通过仅共享磁盘状态的47个会话中的新上下文隔离、分布式锚定和对抗性审查实现容错。
    - 通过复现已发表参考文献来校准方法学，防止幻觉。
    - 在校准检查点通过结构性强制的数值对质作为有效锚定机制，通过配对故障模式消融实验隔离。
    - 有限的人类干预仅限于复现失败时的操作知识整理，而非科学方向指导。
    methodology: 该流水线摄入包含11,083篇凝聚态物理arXiv论文的语料库，自主映射语料库以构思研究方向，通过复现已发表参考文献进行校准，进行新颖的第一性原理计算，并撰写论文。它跨越六个阶段，在47个仅共享磁盘状态的新上下文会话中运行，涉及2,162次文献咨询事件。容错性通过冗余实现：新上下文隔离、分布式锚定和对抗性审查。前导和后导阶段完全自主；试点阶段仅在复现失败时需要人类干预。两个消融实验（前架构基线和无试点）隔离了校准检查点的锚定机制。
    key_results: 该流水线生成了一篇可发表级别的论文，包含关于交变磁压电效应的三个实质性物理学发现，全程基于文献锚定；容错设计与校准检查点防止了幻觉，并量化了干预模式。
    limitations:
    - 试点阶段在复现失败时需要有限的人类干预，因此流水线并非完全端到端自主。
    - 仅在一个计算物理学子领域（交变磁压电效应）中使用特定的近期arXiv论文语料库进行了演示。
    - 依赖于大量近期文献语料库的可用性进行校准；未展示向缺乏此类锚定的领域的泛化能力。
