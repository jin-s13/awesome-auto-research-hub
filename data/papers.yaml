  analysis:
    innovations:
    - CARTOGRAPH verification layer coupling unresolved-subspace experiment steering
      (select), explicit ambiguity closure (resolve), and residual-based library inadequacy
      detection (refuse)
    - Exact unresolved A-optimal rule (CARTOGRAPH-A) derived under a local linear-Gaussian
      bridge, with raw unresolved projection shown as isotropic Fisher-information
      trace
    - Closed-form expected information gain and Box-Hill reinterpreted as local comparators
      rather than global equivalents
    - Refusal mechanism that tentatively identifies out-of-library mechanisms and
