  title_cn: Clarus：协调自主研究代理实现网络规模的科学协作
  abstract_cn: 现有的自主研究代理可以支持研究过程的某些部分，但大多数系统仍将研究视为孤立的辅助任务或封闭的工作流程。因此，自主科学需要一种协作基础设施来协调项目、代理以及数字和物理资源。我们将其识别为从以代码为中心的执行循环向以研究为导向的协作过程的转变，在此过程中，问题、证据、参与者和资源必须在不确定性下进行协调。在这种框架下，代理可以是AI系统、人类研究者、团队、实验室或组织支持的参与者。为此，我们提出了Clarus，一种用于协调自主研究代理以实现网络规模科学协作的协作基础设施。Clarus将研究重新定义为一种开放、可审计、可归因且资源感知的多阶段协作过程。它定义了一个最小的项目-代理-资源对象模型，并通过四个层次组织科学协作，包括研究应用、数字协作、物理基板和物理世界。核心模块实现为可插拔机制，使Clarus能够适应任务风险、协作结构和资源约束。通过一个受控的论文生成案例研究，我们展示了Clarus能够将研究目标组织成一个跨阶段、任务和参与者的可追踪、可审查、可归因且可累积的协作网络。对象模型、协作协议、信任机制和原型验证共同为开放研究网络提供了初步基础。Clarus现已在clarus.holosai.io上可用。
  tldr_cn: Clarus协调自主研究代理实现网络规模科学协作，通过论文生成案例验证。
  analysis_cn:
    innovations:
    - 将自主研究从孤立的辅助任务重新定义为一种开放、可审计、可归因、资源感知的多阶段协作过程，在不确定性下协调问题、证据、参与者和资源。
    - 一个最小的项目-代理-资源对象模型和四层架构（研究应用、数字协作、物理基板、物理世界），用于网络规模的科学协作。
    - 可插拔的核心模块，使基础设施能够适应任务风险、协作结构和资源约束。
    - 统一协调异构代理，包括AI系统、人类研究者、团队、实验室和组织支持的参与者。
    methodology: 本文提出了Clarus，一种围绕项目-代理-资源对象模型和四个架构层构建的协作基础设施。核心模块实现为可插拔机制以增强适应性。通过一个受控的论文生成案例研究进行验证，展示了系统将研究目标组织成结构化协作网络的能力。
    key_results: 在受控的论文生成案例研究中，Clarus成功地将研究目标组织成一个跨多个阶段、任务和参与者的可追踪、可审查、可归因且可累积的协作网络。
    limitations:
    - 验证仅限于受控的论文生成案例研究；在真实世界多样化科学协作中的性能尚未测试。
    - 该基础设施被描述为初步基础，意味着其跨研究领域的可扩展性、鲁棒性和泛化性尚未确立。
