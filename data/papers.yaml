  abstract_cn: AI智能体有潜力通过自动化文献综述、复现实验、分析数据甚至提出新的研究方向来彻底改变科学生产力；事实上，现在已有许多这样的智能体，从通用的“深度研究”系统到专门的科学智能体，如AI
    Scientist和AIGS。对这些智能体的严格评估对于进展至关重要。然而，现有基准在多个方面存在不足：它们通常（1）缺乏可复现的智能体工具，无法对核心智能体能力进行受控比较；（2）未考虑模型成本和工具访问等混杂变量；（3）未提供标准化接口以快速进行智能体原型设计和评估；（4）未能提供基于产品的整体衡量标准来评估科学研究等真实用例；（5）缺乏必要的基线智能体来识别真正的进步。为此，我们定义了更严格基准测试智能体的原则和工具。基于这些，我们提出了AstaBench，一个提供智能体执行科学研究能力的整体衡量标准的套件，包含2400多个问题，涵盖整个科学发现过程和多个科学领域，其中许多问题源自对已部署Asta智能体的真实用户请求。我们的套件配备了首个具有生产级搜索工具的科学研究环境，能够进行受控、可复现的评估，更好地考虑混杂因素。同时，我们提供了九个科学优化的Asta智能体类别的综合套件以及众多基线。我们对22个智能体类别中的57个智能体进行了广泛评估，揭示了一些有趣的发现，最重要的是，尽管在个别方面取得了有意义的进展，但AI距离解决科学研究辅助的挑战仍然很远。
  tldr_cn: AstaBench是一个包含2400+问题的严格基准套件，用于评估科学发现过程中的AI智能体。
  analysis_cn:
    innovations:
    - 定义了在科学研究中对AI智能体进行严格基准测试的原则和工具
    - 引入了AstaBench，一个包含2400+问题的套件，涵盖整个科学发现过程和多个领域，灵感来自真实用户请求
    - 提供了首个配备生产级搜索工具的科学研究环境，用于可控、可复现的评估
    - 包含九个科学优化的Asta智能体类别的综合套件以及众多基线
    - 对22个智能体类别中的57个智能体进行了广泛评估，揭示了当前能力的洞察
    methodology: 我们定义了严格智能体基准测试的原则，并构建了AstaBench，一个包含2400+问题的套件，涵盖科学领域和发现阶段，具有配备生产级搜索工具的可复现环境。我们评估了来自22个类别的57个智能体，包括九个科学优化的Asta智能体类别和基线，以评估整体科学研究辅助能力。
    key_results: 尽管在个别方面取得了有意义的进展，但AI智能体距离解决科学研究辅助的挑战仍然很远。
