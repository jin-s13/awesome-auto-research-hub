  title_cn: QMBench：量子材料研究的研究级基准
  abstract_cn: 我们介绍了QMBench，一个旨在评估大语言模型智能体在量子材料研究中能力的综合基准。该专门基准评估模型应用凝聚态物理知识和计算技术（如密度泛函理论）解决量子材料科学研究问题的能力。QMBench涵盖量子材料研究的不同领域，包括结构性质、电子性质、热力学及其他性质、对称性原理和计算方法。通过提供标准化评估框架，QMBench旨在加速能够为量子材料研究做出创造性贡献的AI科学家的开发。我们期望QMBench由研究社区开发并持续改进。
  tldr_cn: 介绍QMBench，一个用于评估大语言模型智能体在量子材料研究中应用凝聚态物理和DFT能力的基准。
