  title_cn: PaperSearchQA：使用RLVR学习在科学论文中搜索与推理
  abstract_cn: 搜索代理是能够推理并搜索知识库（或网络）以回答问题的语言模型（LM）；近期方法仅使用带可验证奖励的强化学习（RLVR）监督最终答案的准确性。大多数RLVR搜索代理处理通用领域的问答，这限制了其在科学、工程和医学等技术AI系统中的相关性。在这项工作中，我们提出训练代理在科学论文中进行搜索与推理——这测试了技术性问答，直接与真实科学家相关，并且该能力对未来AI科学家系统至关重要。具体而言，我们发布了一个包含1600万篇生物医学论文摘要的搜索语料库，并构建了一个具有挑战性的事实型问答数据集PaperSearchQA，包含6万个可从该语料库回答的样本，以及相应的基准。我们在此环境中训练搜索代理，使其优于非强化学习检索基线；我们还进行了进一步的定量分析，并观察到代理的有趣行为，如规划、推理和自我验证。我们的语料库、数据集和基准可与流行的Search-R1代码库一起用于RLVR训练，并在https://huggingface.co/collections/jmhb/papersearchqa上发布。最后，我们的数据创建方法具有可扩展性，易于推广到其他科学领域。
  tldr_cn: 使用RLVR训练搜索代理在科学论文中推理，发布生物医学语料库和QA数据集。
  analysis_cn:
    innovations:
    - 训练搜索代理使用RLVR在科学论文中进行搜索与推理，针对科学/工程/医学中的技术性问答。
