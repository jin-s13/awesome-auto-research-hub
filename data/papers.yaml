- id: agentic-ai-for-scientific-discovery-a-survey-of-progress-c-2025
  title: 'Agentic AI for Scientific Discovery: A Survey of Progress, Challenges, and
    Future Directions'
  authors:
  - Mourad Gridach
  - Jay Nanavati
  - Khaldoun Zine El Abidine
  - Lenon Mendes
  - Christina Mack
  abstract: The integration of Agentic AI into scientific discovery marks a new frontier
    in research automation. These AI systems, capable of reasoning, planning, and
    autonomous decision-making, are transforming how scientists perform literature
    review, generate hypotheses, conduct experiments, and analyze results. This survey
    provides a comprehensive overview of Agentic AI for scientific discovery, categorizing
    existing systems and tools, and highlighting recent progress across fields such
    as chemistry, biology, and materials science. We discuss key evaluation metrics,
    implementation frameworks, and commonly used datasets to offer a detailed understanding
    of the current state of the field. Finally, we address critical challenges, such
    as literature review automation, system reliability, and ethical concerns, while
    outlining future research directions that emphasize human-AI collaboration and
    enhanced system calibration.
