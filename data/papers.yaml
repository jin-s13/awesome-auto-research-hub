  title_cn: 机器学习驱动的材料发现：解锁下一代功能材料——综述
  abstract_cn: 机器学习和人工智能驱动技术的快速发展正在通过减少人工干预和加速科学进步，彻底改变材料发现、性能预测和材料设计。本综述全面概述了智能的机器学习驱动方法，重点介绍了它们在预测材料性能、发现新化合物和优化材料结构方面的作用。该领域的关键方法包括深度学习、图神经网络、贝叶斯优化和自动生成模型（GANs、VAEs）。这些方法能够自主设计具有定制功能的材料。通过利用AutoML框架（AutoGluon、TPOT和H2O.ai），研究人员可以自动化模型选择、超参数调优和特征工程，显著提高材料信息学的效率。此外，AI驱动的机器人实验室与高通量计算的集成建立了一个用于快速合成和实验验证的全自动流水线，大幅降低了材料发现的时间和成本。本综述重点介绍了自动化机器学习驱动方法在预测材料的机械、热、电和光学性能方面的实际应用，展示了在超导体、催化剂、光伏和储能系统中的成功案例。我们还讨论了关键挑战，如数据质量、可解释性以及AutoML与量子计算的集成，这些对于未来的进展至关重要。最终，将AI与自动化实验和计算建模相结合，正在改变材料发现和优化的方式。这种协同作用为能源、电子和纳米技术领域的新创新铺平了道路。
  tldr_cn: 综述了机器学习在材料发现中的应用，包括深度学习、AutoML与自动化实验。
  analysis_cn:
    innovations:
    - 全面概述了智能机器学习驱动方法在材料发现中的应用，包括深度学习、图神经网络、贝叶斯优化和生成模型（GANs、VAEs）。
    - 强调AutoML框架（AutoGluon、TPOT、H2O.ai）在材料信息学中自动化模型选择、超参数调优和特征工程的作用。
    - 将AI驱动的机器人实验室与高通量计算集成，创建用于快速合成和实验验证的全自动流水线。
    methodology: 本综述调查并综合了机器学习在材料科学中的最新进展，涵盖预测建模、生成设计、AutoML和自主实验。它描述了关键算法、数据工作流和实际案例研究，未呈现新的实验数据。
    key_results: 综述强调了在超导体、催化剂、光伏和储能系统中成功的机器学习驱动发现，表明自动化流水线大幅降低了材料开发的时间和成本。
    limitations:
    - 数据质量和可用性仍然是可靠机器学习预测的主要瓶颈。
    - 复杂模型的可解释性有限，阻碍了科学理解和信任。
    - AutoML与量子计算的集成仍是未来进展的一个开放挑战。
