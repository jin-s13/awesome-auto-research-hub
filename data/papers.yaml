  title_cn: AI科学家的风险：优先考虑安全保障而非自主性
  abstract_cn: 由大型语言模型驱动的AI科学家在自主进行实验和促进各学科科学发现方面展现了巨大潜力。尽管其能力令人期待，但这些智能体也引入了需要谨慎考虑安全性的新型脆弱性。然而，目前对这些脆弱性的全面探索仍然有限。本文从视角角度审视了AI科学家的脆弱性，揭示了其可能被滥用的潜在风险，并强调了安全措施的必要性。我们首先概述了AI科学家固有的潜在风险，考虑了用户意图、具体科学领域及其对外部环境的潜在影响。接着，我们探讨了这些脆弱性的根本原因，并对有限的现有研究进行了范围综述。基于分析，我们提出了一个三元框架，包括人类监管、智能体对齐以及对环境反馈的理解（智能体监管），以缓解已识别的风险。此外，我们强调了保护AI科学家所面临的局限与挑战，并倡导开发更优的模型、稳健的基准以及全面的法规。
