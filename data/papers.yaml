- id: autonomous-diffractometry-enabled-by-visual-reinforcement-le-2026
  title: Autonomous Diffractometry Enabled by Visual Reinforcement Learning
  authors:
  - J. Oppliger
  - M. Stifter
  - A. Rüegg
  - I. Biało
  - L. Martinelli
  - P. G. Freeman
  - D. Prabhakaran
  - J. Zhao
  - Q. Wang
  - J. Chang
  abstract: Automation underpins progress across scientific and industrial disciplines.
    Yet, automating tasks requiring interpretation of abstract visual information
    remain challenging. For example, crystal alignment strongly relies on humans with
    the ability to comprehend diffraction patterns. Here we introduce an autonomous
    system that aligns single crystals without access to crystallography and diffraction
    theory. Using a model-free reinforcement learning framework, an agent learns to
    identify and navigate towards high-symmetry orientations directly from Laue diffraction
    patterns. Despite the absence of human supervision, the agent develops human-like
    strategies to achieve time-efficient alignment across different crystal symmetry
    classes. With this, we provide a computational framework for intelligent diffractometers.
    As such, our approach advances the development of automated experimental workflows
    in materials science.
