  abstract_cn: “AI科学家”范式正在通过自动化研究过程的关键阶段（从想法生成到学术写作）来变革科学研究。这一转变有望加速发现并扩展科学探究的范围。然而，一个关键问题仍不明确：AI科学家能否识别有意义的研究问题？虽然大型语言模型（LLMs）已成功应用于特定任务的构思，但其进行战略性、长期评估过去突破和未来问题的潜力仍未得到充分探索。为弥补这一空白，我们探索了一种人机混合解决方案，将AI的可扩展数据处理能力与人类专家的价值判断相结合。我们的方法分为三个阶段。第一阶段，AI加速信息收集，利用AI在处理大量文献方面的优势生成混合信息库。第二阶段，候选问题提出，利用这些综合数据提示由六个不同LLM组成的集成模型提出初始候选池，并通过跨模型投票机制进行筛选。第三阶段，混合问题筛选，通过逐步增加人类监督的多阶段筛选过程来优化候选池。为验证该系统，我们进行了一项实验，旨在识别五个主要学科的2025年十大科学突破和2026年十大科学问题。我们的分析表明，AI智能体在识别已确立的突破方面与人类专家高度一致，但在预测前瞻性问题时表现出更大的分歧，这表明人类判断对于评估主观性、前瞻性挑战仍然至关重要。
  tldr_cn: 提出一个三阶段的人机混合系统来识别高影响力研究问题，并通过跨五个学科的实验验证。
