  title_cn: GEAR：面向智能体代码进化的遗传自动研究
  abstract_cn: 自主研究智能体已能在无需人工监督的情况下运行机器学习实验，但许多智能体依赖狭窄的搜索策略：它们反复修改一个程序，仅当改进当前最佳结果时才保留更改。这可能导致它们丢弃有用的部分想法、替代的有前途方向以及来自失败或不完整实验的见解。GEAR（遗传自动研究）用基于种群的多研究状态搜索取代了这种单路径搜索。它维护一组强候选解，基于生产力、新颖性和覆盖率选择父代，并通过突变和交叉探索新想法。每个研究状态存储其代码更改、反思和性能数据，使未来决策能够建立在过去发现的基础上。本文研究了GEAR的三种版本：一种通过提示控制，一种使用固定程序化搜索控制器，另一种允许控制器在运行过程中进化。在相同的计算预算和环境下，所有三种版本均优于AutoResearch基线。更重要的是，基线倾向于收敛到局部最优，而GEAR在更长的运行中持续发现改进。总体而言，结果表明，当自主研究智能体维护多个有前途的方向并能随时间调整搜索策略时，它们变得更加有效。
  tldr_cn: GEAR使用基于种群的多研究状态搜索改进自主研究智能体，优于单路径基线。
  analysis_cn:
    innovations:
    - 基于种群的多研究状态遗传搜索，取代单路径修改
    - 基于生产力、新颖性和覆盖率的父代解决方案选择
    - 存储代码更改、反思和性能数据的研究状态表示
    - 三种控制器变体：基于提示的、固定程序化的和自进化的搜索控制器
    methodology: GEAR维护一个候选解种群，每个解编码代码更改、反思和性能。它应用遗传算子（突变、交叉），并使用生产力、新颖性和覆盖率选择父代。在相同计算预算下，将三种控制器实现（基于提示、固定程序化、可进化）与AutoResearch基线进行比较。
