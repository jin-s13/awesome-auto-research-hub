  abstract_cn: 基于LLM的自动综述系统通过将检索、组织和内容合成整合到端到端生成流程中，正在改变用户从网络获取信息的方式。尽管近期工作聚焦于开发新的生成流程，但如何评估此类复杂系统仍是一个重大挑战。为此，我们引入SurveyEval，一个全面的基准测试，从三个维度评估自动生成的综述：整体质量、大纲连贯性和参考文献准确性。我们将评估扩展到7个学科，并通过引入人工参考来增强LLM-as-a-Judge框架，以加强评估与人类判断的一致性。评估结果表明，通用长文本或论文写作系统往往生成质量较低的综述，而专门的综述生成系统能够提供显著更高质量的结果。我们期望SurveyEval成为一个可扩展的测试平台，用于理解和改进跨不同学科和评估标准的自动综述系统。
