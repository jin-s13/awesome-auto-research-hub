  title_cn: AiSciVision：一种将大型多模态模型专用于科学图像分类的框架
  abstract_cn: 信任和可解释性对于人工智能在科学研究中的应用至关重要，但当前模型通常作为黑箱运行，其输出缺乏透明度和解释。我们提出AiSciVision框架，该框架将大型多模态模型（LMM）专用于小众科学领域的图像分类任务，使其成为交互式研究伙伴和分类模型。我们的框架使用两个关键组件：（1）视觉检索增强生成（VisRAG）和（2）在智能代理工作流中使用的领域特定工具。为了对目标图像进行分类，AiSciVision首先检索最相似的正负标签图像作为LMM的上下文。然后，LMM代理主动选择并应用工具，在多轮中操作和检查目标图像，完善其分析后再做出最终预测。这些VisRAG和工具组件旨在模仿领域专家的过程，因为人类通常将新数据与相似示例进行比较，并使用专门工具操作和检查图像后才得出结论。每次推理都会产生一个预测和一个自然语言记录，详细说明导致该预测的推理和工具使用过程。我们在三个真实世界的科学图像分类数据集上评估AiSciVision：检测水产养殖池塘、患病鳗草和太阳能板的存在。在这些数据集上，我们的方法在低标签数据和全标签数据设置中均优于全监督模型。AiSciVision已实际部署于真实应用，特别是通过一个专用网络应用用于水产养殖研究，该应用显示记录并允许专家用户与记录进行对话。这项工作朝着既可解释又有效的人工智能系统迈出了关键一步，推进了其在科学研究和科学发现中的应用。
  tldr_cn: AiSciVision将大型多模态模型专用于科学图像分类，利用视觉RAG和智能工具，在三个真实数据集上评估。
  grade: skip
