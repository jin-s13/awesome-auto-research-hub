  title_cn: 使用好奇心驱动的人工智能科学家探索Flow-Lenia宇宙：发现多样化的生态系统动力学
  abstract_cn: 我们提出了一种好奇心驱动的人工智能科学家方法，用于发现Flow-Lenia中的系统级动力学。Flow-Lenia是一种具有质量守恒和参数局部化的连续元胞自动机（CA）。在先前利用多样性搜索在Lenia中发现个体自组织模式的工作基础上，我们将内在动机目标探索过程（IMGEPs）适应于交互模式的大环境，使用模拟范围的度量，如进化活动、压缩比和多尺度物质分布。我们在两个探索实验中应用IMGEP：一个针对生态系统级动力学，另一个针对物质在障碍物环境中的运动。在这两种情况下，IMGEP比随机搜索显著照亮了更多的度量空间，并揭示了定性上类似于许多生物现象的自组织行为。利用生成的档案，我们随后在六个空间尺度和七个时间范围上进行了缩放研究，发现了在基础尺度上没有类似物的宏观尺度组织，并表征了目标空间度量在尺度上的行为。这展示了我们方法的一个优势：相对廉价的大规模多样性搜索可以作为设计后续更昂贵实验的原则性支架，实现实验设计、检查和重新设计的迭代循环，并由一个交互式探索工具支持，使科学家保持参与。尽管在Flow-Lenia上演示，但该方法可能适用于其他可参数化的复杂系统，其中研究自下而上的集体行为是有意义的。
  tldr_cn: 好奇心驱动的AI科学家通过多样性搜索发现Flow-Lenia中的生态系统动力学。
  analysis_cn:
    innovations:
    - 用于发现Flow-Lenia中系统级动力学的好奇心驱动的人工智能科学家方法
    - 将内在动机目标探索过程（IMGEPs）适应于使用模拟范围度量（进化活动、压缩比、多尺度物质分布）的交互模式的大环境
    - 利用多样性搜索档案支撑后续的缩放实验，实现与交互式探索工具相结合的迭代实验设计循环
    - 通过缩放研究发现了在基础尺度上没有类似物的宏观尺度组织
