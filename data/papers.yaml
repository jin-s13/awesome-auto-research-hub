- id: agentic-autosurvey-let-llms-survey-llms-2025
  title: 'Agentic AutoSurvey: Let LLMs Survey LLMs'
  authors:
  - Yixin Liu
  - Yonghui Wu
  - Denghui Zhang
  - Lichao Sun
  abstract: The exponential growth of scientific literature poses unprecedented challenges
    for researchers attempting to synthesize knowledge across rapidly evolving fields.
    We present \textbf{Agentic AutoSurvey}, a multi-agent framework for automated
    survey generation that addresses fundamental limitations in existing approaches.
    Our system employs four specialized agents (Paper Search Specialist, Topic Mining
    \ Clustering, Academic Survey Writer, and Quality Evaluator) working in concert
    to generate comprehensive literature surveys with superior synthesis quality.
    Through experiments on six representative LLM research topics from COLM 2024 categories,
    we demonstrate that our multi-agent approach achieves significant improvements
    over existing baselines, scoring 8.18/10 compared to AutoSurvey's 4.77/10. The
    multi-agent architecture processes 75--443 papers per topic (847 total across
    six topics) while targeting high citation coverage (often $\geq$80\% on 75--100-paper
    sets; lower on very large sets such as RLHF) through specialized agent orchestration.
    Our 12-dimension evaluation captures organization, synthesis integration, and
    critical analysis beyond basic metrics. These findings demonstrate that multi-agent
    architectures represent a meaningful advancement for automated literature survey
    generation in rapidly evolving scientific domains.
