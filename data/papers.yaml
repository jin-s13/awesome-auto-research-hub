    - 通过集成预测与权重假设之间的互信息测量认知不确定性，并将其作为策略梯度中的探索奖励
    - 在冻结的基础模型上使用低秩适配器集成来捕获每个token的分歧
    - 核范数正则化器保持适配器之间的差异性，从而维持探索信号
    methodology: UG-TTT冻结基础LLM，训练一个小型低秩适配器集成。每个token的认知不确定性通过集成预测与适配器权重假设之间的互信息量化，从而分离出因覆盖不足导致的分歧。该不确定性作为探索奖励加入策略梯度，引导策略向低覆盖区域移动。核范数正则化器维持适配器的多样性。
