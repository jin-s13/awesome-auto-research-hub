  title_cn: SurGE：科学综述生成的基准与评估框架
  abstract_cn: 学术文献的快速增长使得人工撰写科学综述变得越来越不可行。虽然大型语言模型在自动化这一过程方面展现出潜力，但该领域的进展因缺乏标准化基准和评估协议而受阻。为填补这一关键空白，我们提出了SurGE（综述生成评估），一个面向计算机科学领域的科学综述生成基准。SurGE包括：（1）一组测试实例，每个实例包含主题描述、专家撰写的综述及其完整的引用文献列表；（2）一个包含超过一百万篇论文的大规模学术语料库。此外，我们提出了一个自动化评估框架，从四个维度衡量生成综述的质量：全面性、引用准确性、结构组织和内容质量。我们对多种基于LLM的方法进行了评估，结果显示存在显著的性能差距，即使是先进的智能体框架也难以应对综述生成的复杂性，凸显了该领域未来研究的必要性。我们已在
    https://github.com/oneal2000/SurGE 开源了所有代码、数据和模型。
  tldr_cn: 提出SurGE基准与评估框架，揭示LLM方法在科学综述生成中的性能差距。
  analysis_cn:
    innovations:
    - 提出了SurGE，一个面向计算机科学领域的科学综述生成基准，包含专家撰写的综述及其引用文献的测试实例，以及大规模学术语料库。
    - 提出了一个自动化评估框架，从全面性、引用准确性、结构组织和内容质量四个维度衡量生成综述的质量。
    methodology: 我们构建了SurGE，包含由主题描述、专家撰写的综述及其完整引用文献组成的测试实例，以及一个超过一百万篇论文的语料库。然后使用自动化框架对多种基于LLM的方法进行评估，该框架根据全面性、引用准确性、结构组织和内容质量对生成的综述进行评分。
    key_results: 评估揭示了显著的性能差距，即使是先进的智能体框架也难以应对综述生成的复杂性。
