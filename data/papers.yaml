  title_cn: MVSS：多视角结构化综述生成的统一框架
  abstract_cn: 科学综述不仅需要总结大量文献，还需要将其组织成清晰连贯的概念结构。然而，现有的自动综述生成方法通常侧重于线性文本生成，难以显式建模研究主题之间的层次关系以及结构化的方法比较，导致在结构组织和证据呈现方面与专家撰写的综述存在较大差距。为解决这一局限，我们提出MVSS，一个多视角结构化综述生成框架，它联合生成并对齐带有引文支撑的层次树、结构化对比表格和综述文本。MVSS遵循结构优先范式：首先构建捕捉研究领域概念组织的树，然后生成受树结构约束的对比表格，最后将树和表格作为联合结构约束来指导大纲和综述文本的生成。这种设计实现了结构、对比和叙述之间互补且对齐的多视角表示。此外，我们引入了一个专门的评估框架，从多个维度系统评估生成的综述，包括结构质量、对比完整性和引文忠实度。通过在76个计算机科学主题上的大规模实验，我们证明MVSS在综述组织和证据支撑方面显著优于现有方法，并在多个评估指标上达到与专家撰写的综述相当的性能。
  tldr_cn: MVSS生成包含层次树、对比表格和文本的多视角结构化综述，在76个CS主题上优于现有方法。
  analysis_cn:
    innovations:
    - 多视角结构化综述生成，联合生成带有引文支撑的层次树、结构化对比表格和综述文本，并实现对齐。
    - 结构优先范式：先构建层次树，再生成受树结构约束的对比表格，最后联合树和表格约束指导大纲和文本生成。
    - 专门的多维度评估框架，评估结构质量、对比完整性和引文忠实度。
    methodology: MVSS框架构建研究主题的层次树，生成受树约束的对比表格，并将两者作为结构约束指导大纲和综述文本生成。在76个计算机科学主题上使用新框架进行评估，该框架衡量结构质量、对比完整性和引文忠实度。
    key_results: MVSS在综述组织和证据支撑方面显著优于现有方法，并在多个评估指标上达到与专家撰写的综述相当的性能。
