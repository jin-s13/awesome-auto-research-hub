  title_cn: 深度学习在扫描透射电子显微镜自动化实验中的应用
  abstract_cn: 机器学习（ML）已成为（扫描）透射电子显微镜（(S)TEM）成像和光谱学中采集后数据分析的关键工具。一个新兴趋势是向实时分析和闭环显微镜操作的转变。ML在电子显微镜中的有效应用现在需要开发以显微镜为中心的实验工作流设计和优化策略。在此，我们讨论了向主动ML过渡的相关挑战，包括序列数据分析和分布外漂移效应、边缘操作的要求、本地和云数据存储以及理论在环操作。具体而言，我们讨论了人类科学家和ML代理在实验工作流的构思、编排和执行中的相对贡献，以及开发可跨多个平台应用的通用超语言的需求。这些考虑将共同指导下一代实验中ML的操作化。
  tldr_cn: 探讨利用深度学习实现扫描透射电子显微镜实时分析与闭环操作的挑战与策略。
