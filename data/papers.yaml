- id: rethinking-the-ai-scientist-interactive-multi-agent-workflo-2026
  title: 'Rethinking the AI Scientist: Interactive Multi-Agent Workflows for Scientific
    Discovery'
  authors:
  - Lukas Weidener
  - Marko Brkić
  - Mihailo Jovanović
  - Ritvik Singh
  - Chiara Baccin
  - Emre Ulgac
  - Alex Dobrin
  - Aakaash Meduri
  abstract: 'Artificial intelligence systems for scientific discovery have demonstrated
    remarkable potential, yet existing approaches remain largely proprietary and operate
    in batch-processing modes requiring hours per research cycle, precluding real-time
    researcher guidance. This paper introduces Deep Research, a multi-agent system
    enabling interactive scientific investigation with turnaround times measured in
    minutes. The architecture comprises specialized agents for planning, data analysis,
    literature search, and novelty detection, unified through a persistent world state
    that maintains context across iterative research cycles. Two operational modes
    support different workflows: semi-autonomous mode with selective human checkpoints,
    and fully autonomous mode for extended investigations. Evaluation on the BixBench
    computational biology benchmark demonstrated state-of-the-art performance, achieving
    48.8% accuracy on open response and 64.4% on multiple-choice evaluation, exceeding
    existing baselines by 14 to 26 percentage points. Analysis of architectural constraints,
    including open access literature limitations and challenges inherent to automated
    novelty assessment, informs practical deployment considerations for AI-assisted
    scientific workflows.'
