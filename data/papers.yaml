  title_cn: 基于证据的自主研究（EviBound）：消除虚假声明的治理框架
  abstract_cn: 基于LLM的自主研究代理会报告虚假声明：任务标记为“完成”，但缺少工件、指标矛盾或执行失败。EviBound是一个基于证据的执行框架，通过双治理门要求机器可检查的证据来消除虚假声明。两个互补的门强制执行证据要求。执行前的批准门在代码运行前验证验收标准模式，主动捕获结构违规。执行后的验证门通过MLflow
    API查询（带递归路径检查）验证工件，并在验收标准指定时可选验证指标。仅当有可查询的运行ID、所需工件和FINISHED状态支持时，声明才传播。有界、置信门控的重试（通常1-2次尝试）从瞬态故障中恢复，避免无界循环。该框架在8个基准任务上评估，涵盖基础设施验证、ML能力和治理压力测试。基线A（仅提示级别）产生100%幻觉（8/8声称，0/8验证）。基线B（仅验证）将幻觉降至25%（2/8验证失败）。EviBound（双门）实现0%幻觉：7/8任务验证，1个任务在批准门正确阻止，执行开销仅约8.3%。本包包括执行轨迹、所有验证任务的MLflow运行ID以及4步验证协议。研究完整性是一种架构属性，通过治理门实现，而非从模型规模中涌现。
  tldr_cn: EviBound双门治理框架通过机器可检查证据消除虚假声明
