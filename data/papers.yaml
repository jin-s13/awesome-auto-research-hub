    - 证明RLVR训练的代理优于非强化学习检索基线。
    - 观察到代理的规划、推理和自我验证等行为。
    - 可扩展的数据创建方法，易于推广到其他科学领域。
    methodology: 作者构建了一个包含1600万篇生物医学论文摘要的搜索语料库和一个事实型问答数据集（PaperSearchQA），包含6万个可从该语料库回答的样本。他们在此环境中使用带可验证奖励的强化学习（RLVR）训练搜索代理，并与非强化学习检索基线进行比较。他们还对代理行为进行了定量分析。
