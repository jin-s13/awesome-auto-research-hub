    - 用于评估自主材料计算的新颖多样化计算任务基准测试
    methodology: 作者开发了一个智能体框架，将大型语言模型与检索、推理和工具使用相结合，嵌入领域专业知识以指导多步骤工作流和参数选择，用于第一性原理材料计算。该系统在一个新引入的多样化计算任务基准测试上与独立LLMs进行了评估。
