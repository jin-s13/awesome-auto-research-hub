  title_cn: 'AIBuildAI-2: 一种知识增强的自动构建AI模型的智能体'
  abstract_cn: AI模型支撑着从图像和文本处理到生物学、物理学和化学科学发现等数据密集型应用。然而，开发这些模型仍然高度依赖人工，需要从业者设计架构、构建训练流程并迭代优化解决方案，这使得缺乏专业AI工程知识的自然科学家难以构建其研究所需的高性能模型。为减轻这一负担并拓宽AI在科学发现中的可及性，已有研究提出了自动构建AI模型的智能体。然而，这些智能体的性能很大程度上受限于其底层大语言模型的参数化知识，这些知识是静态的、常常过时，且缺乏实用的AI模型工程经验。为解决这一局限，我们引入了AIBuildAI-2，一种具有外部、可进化知识系统的知识增强智能体，用于自动构建AI模型。AIBuildAI-2的知识系统是分层的，将精选的AI开发知识组织为按主题类别划分的高层知识指令和每个类别下的低层知识文档，智能体根据当前状态和待解决的AI任务动态加载相关上下文，使每个设计和实现决策都基于具体、可外部验证的专业知识。该系统通过从网络收集并清洗AI开发相关文档，并将其组织到相应类别中进行初始化，同时通过将每次AI任务完成的运行提炼为结构化经验并写回知识系统，从智能体自身经验中持续进化。AIBuildAI-2取得了最先进的结果，在MLE-Bench上以70.7%的奖牌率排名第一，并在一个心脏病预测竞赛中位列4370个人类专家团队的前6.6%。
  tldr_cn: 一种具有分层外部知识的知识增强智能体，用于自动构建AI模型，解决了静态LLM知识的局限性。
  grade: worth_reading
- id: aicid-unique-identifiers-for-ai-scientists-2026
  title: 'AICID: Unique Identifiers for AI Scientists'
  authors:
  - Clément Vidal
  - Martin Monperrus
  abstract: 'AI scientists are now a reality, with the ability to generate complete
    research papers, maintain scholarly profiles, receive citations, and attract peer
    review invitations. Yet no standard mechanism exists to distinguish an AI scientist
    from a human one in bibliographic databases, citation indexes, or journal submission
    systems. This white paper defines the problem, analyzes its consequences for the
    integrity of scholarly communication, and proposes AICID (AI Contributor IDentifier):
    a persistent, unique identifier for AI scientists. Modeled on ORCID but designed
    specifically for non-human contributors, AICID links each AI author to its model
    identity, version, operator. Adoption by publishers, preprint servers, and bibliographic
    databases aims to make the provenance of AI-generated research transparent and
    machine-readable. We outline the design requirements for such a system, present
    a prototype, and argue that AICID is necessary infrastructure for a scholarly
    ecosystem in which AI scientists are already active participants. A prototype
    alpha version is available at https://aicid.net.'
