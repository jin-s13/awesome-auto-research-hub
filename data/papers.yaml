  title_cn: 面向科学的可检查人工智能：生成式AI治理的研究对象方法
  abstract_cn: 本文提出将人工智能作为研究对象（AI-RO）的范式，用于治理生成式AI在科学研究中的使用。我们不再争论AI是作者还是工具，而是主张将AI交互视为研究过程中结构化、可检查的组成部分。在此观点下，AI辅助科学论文的合法性取决于模型使用如何被整合到工作流程中、如何被记录以及如何被问责。借鉴研究对象理论和FAIR原则，我们提出一个框架，通过交互日志和元数据打包来记录模型配置、提示和输出。这些特性在安全与隐私（SP）研究中尤为重要，因为其中的溯源工件必须满足保密性约束、完整性保证和可审计性要求，而通用的披露实践无法解决这些问题。我们实现了一个轻量级写作流水线，其中语言模型在显式约束下综合人类撰写的结构化文献综述笔记，并生成可验证的溯源记录。我们将此工作作为一个立场陈述，并附有初步的演示性工作流程，主张科学中生成式AI的治理可以通过结构化文档、受控披露和保持完整性的溯源捕获来实现。基于此示例，我们概述并推动了一系列必要的未来发展，以使此类实践变得实用且广泛可采纳。
  tldr_cn: 提出AI-RO框架，通过结构化文档与溯源治理科学中的生成式AI。
  grade: skip
- id: intern-atlas-a-methodological-evolution-graph-as-research-i-2026
  title: 'Intern-Atlas: A Methodological Evolution Graph as Research Infrastructure
    for AI Scientists'
  authors:
  - Yujun Wu
  - Dongxu Zhang
  - Xinchen Li
  - Jinhang Xu
  - Yiling Duan
  - Yumou Liu
  - Jiabao Pan
  - Qiyuan Zhu
  - Xuanhe Zhou
  - Jingxuan Wei
  - Siyuan Li
  - Jintao Chen
  - Conghui He
  - Cheng Tan
  abstract: Existing research infrastructure is fundamentally document-centric, providing
    citation links between papers but lacking explicit representations of methodological
    evolution. In particular, it does not capture the structured relationships that
    explain how and why research methods emerge, adapt, and build upon one another.
    With the rise of AI-driven research agents as a new class of consumers of scientific
    knowledge, this limitation becomes increasingly consequential, as such agents
    cannot reliably reconstruct method evolution topologies from unstructured text.
    We introduce Intern-Atlas, a methodological evolution graph that automatically
    identifies method-level entities, infers lineage relationships among methodologies,
    and captures the bottlenecks that drive transitions between successive innovations.
    Built from 1,030,314 papers spanning AI conferences, journals, and arXiv preprints,
    the resulting graph comprises 9,410,201 semantically typed edges, each grounded
    in verbatim source evidence, forming a queryable causal network of methodological
    development. To operationalize this structure, we further propose a self-guided
    temporal tree search algorithm for constructing evolution chains that trace the
    progression of methods over time. We evaluate the quality of the resulting graph
    against expert-curated ground-truth evolution chains and observe strong alignment.
    In addition, we demonstrate that Intern-Atlas enables downstream applications
    in idea evaluation and automated idea generation. We position methodological evolution
    graphs as a foundational data layer for the emerging automated scientific discovery.
