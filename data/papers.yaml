  analysis:
    innovations:
    - Introduction of CausaLab, a scalable environment for evaluating interactive
      causal discovery by LLM agents that requires recovering both causal graph and
      structural equations.
    - Dual evaluation framework that separately measures task accuracy (prediction)
      and mechanism recovery (all-edge F1 of the causal graph).
    - Use of randomly sampled structural causal models (SCMs) to ensure agents must
      perform genuine causal reasoning rather than relying on prior knowledge.
    methodology: CausaLab places an LLM agent in a synthetic laboratory where it receives
      prior measurement records, can intervene on a manipulator crystal, and must
      predict the resonance frequency of a held-out reactor crystal governed by a
      hidden SCM. The data-generating process is a randomly sampled SCM, and agents
      are evaluated on both prediction accuracy and fidelity of the recovered causal
      graph (all-edge F1). Experiments compare observational, mixed observation-intervention,
      and pure intervention strategies using GPT-5.2-high.
    key_results: In the purely observational 6-node setting, GPT-5.2-high achieved
      92% task accuracy but only 0.471 all-edge F1 for mechanism recovery. Mixed observation-intervention
      strategies improved structural fidelity, while pure intervention remained difficult;
      consistency verification mitigated premature stopping, a major identified weakness.
    limitations:
    - Persistent gap between high task accuracy and low mechanism recovery, indicating
      LLM agents can predict without faithful causal understanding.
    - Pure intervention strategies remain difficult even for strong agents.
    - Premature stopping is a major weakness in agent exploration, though consistency
      verification offers partial mitigation.
  title_cn: 'CausaLab: 面向AI科学家的可扩展交互式因果发现环境'
  abstract_cn: 我们介绍了CausaLab，一个用于评估LLM代理进行交互式因果发现的可扩展环境。与先前的评估不同，CausaLab同时评估代理是否能够利用因果证据解决问题，以及其答案是否基于忠实恢复的因果机制。每个回合将代理置于一个合成实验室中：它接收先前的测量记录，对操纵器晶体进行干预，并预测由相同机制控制的保留反应器晶体的共振频率。隐藏的数据生成过程是一个随机采样的结构因果模型（SCM），因此成功需要恢复因果图和结构方程，而非回忆先验知识。实验表明预测与机制恢复之间存在持续差距：在纯观测的6节点设置中，GPT-5.2-high达到了92%的任务准确率，但全边F1仅为0.471。混合观测-干预策略提高了结构保真度，而纯干预即使对强代理仍然困难。我们识别出过早停止是一个主要弱点，并表明一致性验证可以缓解这一问题。因此，CausaLab将预测成功与因果理解分离开来，并揭示了当前LLM代理作为实验性因果推理者的局限性。
  tldr_cn: CausaLab评估LLM代理的交互式因果发现，揭示了预测与机制恢复之间的差距。
  analysis_cn:
    innovations:
    - 引入CausaLab，一个用于评估LLM代理进行交互式因果发现的可扩展环境，要求同时恢复因果图和结构方程。
    - 双评估框架，分别衡量任务准确率（预测）和机制恢复（因果图的全边F1）。
    - 使用随机采样的结构因果模型（SCM），确保代理必须进行真正的因果推理而非依赖先验知识。
    methodology: CausaLab将LLM代理置于一个合成实验室中，代理接收先前的测量记录，可以对操纵器晶体进行干预，并必须预测由隐藏SCM控制的保留反应器晶体的共振频率。数据生成过程是随机采样的SCM，代理在预测准确率和恢复的因果图保真度（全边F1）上被评估。实验使用GPT-5.2-high比较了纯观测、混合观测-干预和纯干预策略。
    key_results: 在纯观测的6节点设置中，GPT-5.2-high达到了92%的任务准确率，但机制恢复的全边F1仅为0.471。混合观测-干预策略提高了结构保真度，而纯干预仍然困难；一致性验证缓解了过早停止这一已识别的主要弱点。
    limitations:
    - 高任务准确率与低机制恢复之间的持续差距，表明LLM代理可以在没有忠实因果理解的情况下进行预测。
    - 纯干预策略即使对强代理仍然困难。
    - 过早停止是代理探索中的一个主要弱点，尽管一致性验证提供了部分缓解。
