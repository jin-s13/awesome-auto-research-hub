  title_cn: OR-Agent：连接进化搜索与结构化研究的自动化算法发现
  abstract_cn: 在复杂、实验驱动的领域中自动化科学发现不仅需要程序的迭代变异，还需要结构化的假设管理、环境交互和原则性反思。我们提出了OR-Agent，一个可配置的多智能体研究框架，专为在丰富实验环境中进行自动化探索而设计。OR-Agent将研究组织为结构化的树形工作流，明确建模分支假设生成和系统回溯，从而实现对研究轨迹的受控管理，超越了简单的变异-交叉循环。其核心是一种进化-系统化构思机制，统一了研究起点的进化选择、全面研究计划生成以及研究树内的协调探索。我们引入了一种受优化启发的分层反思系统，其中短期反思作为语言梯度，长期反思作为语言动量，记忆压缩作为语义权重衰减，共同构成一个原则性机制来调控研究动态。我们在经典组合优化基准以及基于仿真的协作驾驶场景上进行了广泛实验。结果表明，OR-Agent优于强进化基线，同时为AI辅助科学发现提供了一个通用、可扩展且可检查的框架。所有代码和实验数据均公开于https://github.com/qiliuchn/OR-Agent。
  tldr_cn: OR-Agent是一个结合进化搜索与结构化研究树的多智能体框架，用于自动化算法发现。
  analysis_cn:
    innovations:
    - 基于结构化树的工作流，包含分支假设生成和系统回溯，用于受控的研究轨迹管理
    - 进化-系统化构思机制，统一了起始点的进化选择、全面研究计划生成和研究树内的协调探索
    - 受优化启发的分层反思系统，将短期反思作为语言梯度，长期反思作为语言动量，记忆压缩作为语义权重衰减
    methodology: OR-Agent是一个可配置的多智能体框架，将研究组织为具有分支和回溯的树形工作流。它结合了进化-系统化构思机制和受优化概念启发的分层反思系统。实验在经典组合优化基准和基于仿真的协作驾驶场景上进行，与强进化基线进行比较。
    key_results: OR-Agent在组合优化基准和协作驾驶场景上均优于强进化基线，展示了一个通用且可检查的AI辅助科学发现框架。
    limitations: []
    tech_stack: []
