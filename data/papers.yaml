  title_cn: LLMs在科学创新中角色的演变：助手、合作者、科学家和评估者
  abstract_cn: 大型语言模型（LLMs）越来越多地被用于科学研究和发现，支持从文献检索与综合到假设生成、自主实验和研究评估等任务。现有综述常常将科学研究与科学发现混为一谈，并且通常仅按领域、任务或自主性水平来组织系统。在本综述中，我们提出了一个理解LLMs在科学创新中的四角色框架：助手、合作者、科学家和评估者。该框架整合了三个互补维度：自主性水平、认知功能和科学创新，以区分面向研究的支持与面向前沿的发现。我们回顾了每个角色的代表性方法、基准和评估实践，考察了它们的能力、局限性和人类监督需求。在文献中，助手系统在检索和综合方面相对成熟，但在开放式应用中仍不可靠；合作者系统扩展了候选假设空间，但面临新颖性与基础性之间的权衡；科学家系统日益自动化研究工作流程，但面临可靠性和安全瓶颈；评估者系统支持评审和验证，但在新颖性评估方面仍然薄弱。我们认为，人工智能在科学领域的进步不仅取决于模型能力，还取决于评估、监督、问责和制度整合。
  tldr_cn: 提出大语言模型在科学创新中的四角色框架（助手、合作者、科学家、评估者），综述能力与局限。
  analysis_cn:
    innovations:
    - 提出了LLMs在科学创新中的四角色框架（助手、合作者、科学家、评估者）
    - 整合了三个互补维度：自主性水平、认知功能和科学创新
    - 区分了面向研究的支持与面向前沿的发现
    methodology: 本文引入了一个四角色框架，沿自主性、认知功能和科学创新维度对LLMs在科学创新中的应用进行分类。它回顾了每个角色的代表性方法、基准和评估实践，分析了它们的能力、局限性和人类监督需求。
    key_results: 助手系统在检索和综合方面成熟，但在开放式任务中不可靠；合作者系统扩展了假设空间，但面临新颖性与基础性之间的权衡；科学家系统自动化工作流程，但遇到可靠性和安全瓶颈；评估者系统辅助评审，但在新颖性评估方面仍然薄弱。
    limitations:
