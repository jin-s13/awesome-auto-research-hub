  title_cn: 超越优化：探索自主实验中的新颖性发现
  abstract_cn: 自主实验（AEs）通过将人工智能与自动化实验平台相结合，正在改变科学研究的方式。当前的AEs主要关注预定义目标的优化；虽然加速了这一目标，但这种方法限制了意外或未知物理现象的发现。在此，我们引入了一个新颖的框架INS2ANE（Integrated
    Novelty Score-Strategic Autonomous Non-Smooth Exploration），以增强自主实验中新颖现象的发现。我们的方法整合了两个关键组成部分：（1）一个评估实验结果独特性的新颖性评分系统，以及（2）一个战略采样机制，即使某些区域按传统标准看起来不太有前景，也能促进对欠采样区域的探索。我们在一个包含已知真实值的预采集数据集（由图像-光谱对组成）上验证了该方法。我们进一步在自主扫描探针显微镜实验中实施了该过程。与传统的优化程序相比，INS2ANE显著增加了所探索现象的多样性，提高了发现先前未观察到的现象的可能性。这些结果展示了AE增强科学发现深度的潜力；结合AE提供的效率，该方法有望通过同时导航复杂的实验空间以发现新现象，从而加速科学研究。
  tldr_cn: 提出INS2ANE框架，在自主实验中通过新颖性评分和战略采样增强探索，超越传统优化。
