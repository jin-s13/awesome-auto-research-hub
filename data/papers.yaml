      loop through a multi-agent system equipped with an open-knowledge system and
      a continuously accumulating Findings Memory . This memory is composed of both
      frontier human knowledge (e.g., papers and codes) and the system’s own historical
      findings, and it intelligently guides subsequent explorations. The entire discovery
