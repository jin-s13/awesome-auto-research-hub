  abstract_cn: 本文针对一个迅速出现的政策挑战：如何生成和解读关于AI科学家（即能够自主或协作执行多步科学任务的代理型AI系统）的生物能力与风险的可信证据。随着这些系统进入真实研究流程，决策者越来越多地面临评估结果，而这些结果的含义往往取决于隐含或记录不足的底层设计选择。我们综合了当前关于AI引发的生物风险的证据，并引入生物代理评估作为评估这些系统的一种有前景但解读敏感的工具。我们的核心贡献是一套基于实践经验的实用考量——借鉴我们自身的评估经验——展示了在定义、设计、运行、评分和记录评估方面的选择如何实质性地影响结果对风险的含义。该分析旨在帮助政策制定者以适当的谨慎态度解读生物评估输出；引导公共和私人资助者向AI-生物学评估研究的高杠杆投资；并支持评估新兴AI系统的生物安全从业者。次要受众包括在前沿AI实验室、AI提供商、科学机构和第三方评估组织中设计或进行代理评估的研究人员。
