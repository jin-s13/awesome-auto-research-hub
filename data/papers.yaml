  title_cn: 用于设计引力波探测器的神经代理模型
  abstract_cn: 物理模拟器在科学和工程中至关重要，能够分析、控制和设计复杂系统。在实验科学中，它们越来越多地用于自动化实验设计，通常通过组合搜索和优化实现。然而，随着实验装置日益复杂，传统基于CPU的模拟器的计算成本成为主要限制。本文展示了神经代理模型如何在保持精度的同时显著减少对此类慢速模拟器的依赖。以干涉式引力波探测器的设计为例，我们训练了一个神经网络来代理由LIGO社区开发的引力波物理模拟器Finesse。尽管物理参数的微小变化可能导致输出数量级的变化，但该模型能快速预测候选设计的质量和可行性，从而高效探索大型设计空间。我们的算法在训练代理、逆向设计新实验以及用慢速模拟器验证其属性以进一步训练之间循环。借助自动微分和GPU并行性，我们的方法比直接优化更快地提出高质量实验。算法在数小时内找到的解决方案优于优化器需要五天才能达到的设计。尽管以引力波探测器为背景，我们的框架广泛适用于其他因模拟器瓶颈而阻碍优化和发现的领域。
  tldr_cn: 神经代理模型替代慢速物理模拟器，高效设计引力波探测器，实现更快优化且保持高精度。
  analysis_cn:
    innovations:
    - 用神经代理模型替代慢速物理模拟器（Finesse）进行引力波探测器设计
    - 结合代理训练、逆向设计和慢速模拟器验证的主动学习循环
    - 利用自动微分和GPU并行性快速提出高质量实验方案
