- id: airalogy-ai-empowered-universal-data-digitization-for-resea-2025
  title: 'Airalogy: AI-empowered universal data digitization for research automation'
  authors:
  - Zijie Yang
  - Qiji Zhou
  - Fang Guo
  - Sijie Zhang
  - Yexun Xi
  - Jinglei Nie
  - Yudian Zhu
  - Liping Huang
  - Chou Wu
  - Yonghe Xia
  - Xiaoyu Ma
  - Yingming Pu
  - Panzhong Lu
  - Junshu Pan
  - Mingtao Chen
  - Tiannan Guo
  - Yanmei Dou
  - Hongyu Chen
  - Anping Zeng
  - Jiaxing Huang
  - Tian Xu
  - Yue Zhang
  abstract: Research data are the foundation of Artificial Intelligence (AI)-driven
    science, yet current AI applications remain limited to a few fields with readily
    available, well-structured, digitized datasets. Achieving comprehensive AI empowerment
    across multiple disciplines is still out of reach. Present-day research data collection
    is often fragmented, lacking unified standards, inefficiently managed, and difficult
    to share. Creating a single platform for standardized data digitization needs
    to overcome the inherent challenge of balancing between universality (supporting
    the diverse, ever-evolving needs of various disciplines) and standardization (enforcing
    consistent formats to fully enable AI). No existing platform accommodates both
    facets. Building a truly multidisciplinary platform requires integrating scientific
    domain knowledge with sophisticated computing skills. Researchers often lack the
    computational expertise to design customized and standardized data recording methods,
    whereas platform developers rarely grasp the intricate needs of multiple scientific
    domains. These gaps impede research data standardization and hamper AI-driven
    progress. In this study, we address these challenges by developing Airalogy (https://airalogy.com),
    the world's first AI- and community-driven platform that balances universality
    and standardization for digitizing research data across multiple disciplines.
    Airalogy represents entire research workflows using customizable, standardized
    data records and offers an advanced AI research copilot for intelligent QA, automated
    data entry, analysis, and research automation. Already deployed in laboratories
    across all four schools of Westlake University, Airalogy has the potential to
    accelerate and automate scientific innovation in universities, industry, and the
    global research community-ultimately benefiting humanity as a whole.
