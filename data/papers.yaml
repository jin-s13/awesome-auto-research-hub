    - 可泛化至现有智能体架构的即插即用模块
    methodology: PiFlow是一个信息论框架，将自动化科学发现建模为结构化不确定性减少问题，利用原则（如科学定律）指导多智能体协作。该框架在三个科学领域与最先进方法进行对比评估，衡量发现效率、解决方案质量、求解时间及令牌消耗。
