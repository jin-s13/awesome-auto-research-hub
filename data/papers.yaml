  title_cn: ResearchAgent：基于大型语言模型的科学文献迭代研究思路生成
  abstract_cn: 科学研究的速度对于改善人类生活至关重要，但其过程复杂、缓慢且需要专业知识。同时，新颖且有影响力的研究往往源于对先前工作的深刻理解以及跨领域和跨学科的思想交叉融合。为了提高研究人员的生产力，我们提出了ResearchAgent，它利用大型语言模型（LLM）的百科全书式知识和语言推理能力来辅助研究工作。该系统自动定义新颖问题、提出方法并设计实验，同时基于协作的LLM驱动的评审代理的反馈进行迭代优化。具体来说，从一篇核心科学论文出发，ResearchAgent不仅通过连接学术图中的信息来增强相关出版物，还从从大量论文中挖掘的共享底层概念的知识库中检索实体。然后，模仿通过同行讨论改进思想的科学方法，我们利用多个基于LLM的评审代理，通过迭代修订过程提供评审和反馈。这些评审代理使用与人类偏好对齐的LLM实例化，其评估标准通过LLM提示从实际人类判断中引出。我们在多个学科的科学出版物上对ResearchAgent进行了实验验证，结果表明其在基于人类和模型评估中生成新颖、清晰和有效的思想方面具有有效性。我们对AI介导的科学研究的初步探索对于开发未来旨在支持研究人员构思和操作化新颖工作的系统具有重要意义。
  tldr_cn: ResearchAgent利用LLMs通过定义问题、提出方法和设计实验，并借助评审反馈迭代生成新颖研究思路。
  analysis_cn:
    innovations:
    - 从核心论文自动生成研究思路（问题、方法、实验），并通过LLM评审代理进行迭代优化
    - 通过学术图中的相关出版物和从论文中挖掘的共享概念知识库中的实体进行增强
    - 多个基于LLM的评审代理，具有人类偏好对齐，并通过提示从人类判断中引出评估标准
    methodology: 从一篇核心科学论文出发，ResearchAgent检索相关出版物和概念实体，然后生成包含问题、方法和实验的研究思路。多个基于LLM的评审代理，与人类偏好对齐并通过人类判断标准提示，提供迭代反馈以优化思路。该系统在跨学科出版物上使用人类和基于模型的评估进行验证。
    key_results: ResearchAgent生成的思路在多个科学学科的人类和基于模型的评估中被评为新颖、清晰和有效。
