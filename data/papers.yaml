  title_cn: 负知识作为AutoResearch的失败感知共享记忆
  abstract_cn: AI辅助研究系统会产生大量失败的尝试，但这些失败很少成为持久、共享的知识资产。我们提出了一种负知识记忆层：一个策展代理将每次失败尝试转换为共享库中的有界类型记录，下游研究代理在提出下一个实验前明确采纳或拒绝这些记录。我们在两个设置中评估该层：ScienceAgentBench上的相同任务重试和两个非线性数学物理PDE问题上的跨任务科学研究。负知识层在使用更少令牌的情况下优于普通AutoResearch基线；拥有负知识库的代理能够解决所有基线在PDE系统研究中都无法解决的新任务。我们还表明，先前的负知识库可以迁移并增强不同PDE问题上的AutoResearch。这些结果表明，结构化的负知识是一种知识资产，应在更广泛的AI参与的科学研究中明确维护，而不仅仅是作为记忆压缩或调试辅助工具，与正面发现一起作为科学记忆的集体基础设施。代码可在https://github.com/hch-wang/Negative_Knowledge获取。
  tldr_cn: 提出一种负知识记忆层，记录失败尝试，提升科学任务性能并减少令牌使用。
  analysis_cn:
    innovations:
    - 提出一种负知识记忆层，其中策展代理将失败尝试转换为共享库中的有界类型记录，下游研究代理在提出下一个实验前明确采纳或拒绝这些记录。
    methodology: 策展代理将每次失败尝试转换为共享负知识库中的有界类型记录。下游研究代理随后在提出下一个实验前明确采纳或拒绝这些记录。该系统在相同任务重试（ScienceAgentBench）和跨任务科学研究（两个非线性数学物理PDE问题）上进行评估。
    key_results: 负知识层在使用更少令牌的情况下优于普通AutoResearch基线，并且拥有负知识库的代理能够解决所有基线都无法解决的新的PDE任务。负知识库还能迁移到不同的PDE问题上增强AutoResearch。
