- id: nanoresearch-co-evolving-skills-memory-and-policy-for-per-2026
  title: 'NanoResearch: Co-Evolving Skills, Memory, and Policy for Personalized Research
    Automation'
  authors:
  - Jinhang Xu
  - Qiyuan Zhu
  - Yujun Wu
  - Zirui Wang
  - Dongxu Zhang
  - Marcia Tian
  - Yiling Duan
  - Siyuan Li
  - Jingxuan Wei
  - Sirui Han
  - Yike Guo
  - Odin Zhang
  - Conghui He
  - Cheng Tan
  abstract: 'LLM-powered multi-agent systems can now automate the full research pipeline
    from ideation to paper writing, but a fundamental question remains: automation
    for whom? Researchers operate under different resource configurations, hold different
    methodological preferences, and target different output formats. A system that
    produces uniform outputs regardless of these differences will systematically under-serve
    every individual user, making personalization a precondition for research automation
    to be genuinely usable. However, achieving it requires three capabilities that
    current systems lack: accumulating reusable procedural knowledge across projects,
    retaining user-specific experience across sessions, and internalizing implicit
    preferences that resist explicit formalization. We propose NanoResearch, a multi-agent
    framework that addresses these gaps through tri-level co-evolution. A skill bank
    distills recurring operations into compact procedural rules reusable across projects.
    A memory module maintains user- and project-specific experience that grounds planning
    decisions in each user''s research history. A label-free policy learning converts
    free-form feedback into persistent parameter updates of the planner, reshaping
    subsequent coordination. These three layers co-evolve: reliable skills produce
    richer memory, richer memory informs better planning, and preference internalization
    continuously realigns the loop to each user. Extensive experiments demonstrate
    that NanoResearch delivers substantial gains over state-of-the-art AI research
    systems, and progressively refines itself to produce better research at lower
    cost over successive cycles.'
