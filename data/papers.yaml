  title_cn: SciAgents：通过多智能体智能图推理实现科学发现自动化
  abstract_cn: 人工智能的一个关键挑战是创建能够自主推进科学理解的系统，通过探索新领域、识别复杂模式以及在海量科学数据中发现先前未见的联系。在本工作中，我们提出了SciAgents，一种利用三个核心概念的方法：（1）使用大规模本体知识图谱来组织和连接多样化的科学概念，（2）一套大语言模型（LLM）和数据检索工具，以及（3）具有原位学习能力的多智能体系统。应用于生物启发材料时，SciAgents揭示了先前被认为无关的隐藏跨学科关系，其规模、精度和探索能力超越了传统人类驱动的研究方法。该框架自主生成并优化研究假设，阐明潜在机制、设计原理和意想不到的材料特性。通过以模块化方式集成这些能力，智能系统实现了材料发现、批判和改进现有假设、检索关于现有研究的最新数据，并突出其优势和局限性。我们的案例研究展示了将生成式AI、本体表示和多智能体建模相结合的可扩展能力，利用类似于生物系统的“智能群”。这为材料发现提供了新途径，并通过解锁自然的设计原理加速先进材料的开发。
  tldr_cn: SciAgents利用多智能体系统、知识图谱和LLM自主生成并优化材料发现的研究假设。
  analysis_cn:
    innovations:
    - 大规模本体知识图谱用于组织和连接多样化的科学概念
    - 一套大语言模型（LLM）和数据检索工具用于假设生成与优化
    - 具有原位学习能力的多智能体系统用于自主科学发现
    - 将生成式AI、本体表示和多智能体建模集成到模块化框架中
    methodology: SciAgents结合了大规模本体知识图谱、一套大语言模型（LLM）和数据检索工具，以及具有原位学习能力的多智能体系统。该框架通过检索最新数据并揭示跨学科联系，自主生成、批判和优化研究假设，本文应用于生物启发材料。
    key_results: 应用于生物启发材料时，SciAgents揭示了先前被认为无关的隐藏跨学科关系，在规模、精度和探索能力上超越了传统人类驱动的方法，并自主生成了阐明机制、设计原理和意想不到材料特性的假设。
