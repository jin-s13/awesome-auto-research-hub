  title_cn: RESCORE：基于LLM的控制系统研究论文仿真恢复
  abstract_cn: 从控制系统研究论文中重建数值仿真常常受到参数不明确和实现细节模糊的阻碍。我们定义了“论文到仿真可恢复性”任务，即自动化系统生成可执行代码以忠实复现论文结果的能力。我们构建了一个包含500篇来自IEEE决策与控制会议（CDC）论文的基准测试集，并提出了RESCORE——一个由分析器（Analyzer）、编码器（Coder）和验证器（Verifier）三组件组成的LLM智能体框架。RESCORE利用迭代执行反馈和视觉比较来提高重建保真度。我们的方法成功恢复了40.7%基准实例的任务一致仿真，优于单次生成。值得注意的是，RESCORE自动化流水线估计比人工复制快10倍，大幅减少了验证已发表控制方法所需的时间和精力。我们将发布我们的基准测试集和智能体，以促进自动化研究复现领域的社区进展。
