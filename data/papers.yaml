- id: matpilot-an-llm-enabled-ai-materials-scientist-under-the-fr-2024
  title: 'MatPilot: an LLM-enabled AI Materials Scientist under the Framework of Human-Machine
    Collaboration'
  authors:
  - Ziqi Ni
  - Yahao Li
  - Kaijia Hu
  - Kunyuan Han
  - Ming Xu
  - Xingyu Chen
  - Fengqi Liu
  - Yicong Ye
  - Shuxin Bai
  abstract: The rapid evolution of artificial intelligence, particularly large language
    models, presents unprecedented opportunities for materials science research. We
    proposed and developed an AI materials scientist named MatPilot, which has shown
    encouraging abilities in the discovery of new materials. The core strength of
    MatPilot is its natural language interactive human-machine collaboration, which
    augments the research capabilities of human scientist teams through a multi-agent
    system. MatPilot integrates unique cognitive abilities, extensive accumulated
    experience, and ongoing curiosity of human-beings with the AI agents' capabilities
    of advanced abstraction, complex knowledge storage and high-dimensional information
    processing. It could generate scientific hypotheses and experimental schemes,
    and employ predictive models and optimization algorithms to drive an automated
    experimental platform for experiments. It turns out that our system demonstrates
    capabilities for efficient validation, continuous learning, and iterative optimization.
