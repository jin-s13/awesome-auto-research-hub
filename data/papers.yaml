  title_cn: HARPA：一种可测试性驱动、基于文献的研究构思框架
  abstract_cn: 尽管随着LLM的出现，人们对自动科学发现（ASD）的兴趣激增，但工具仍然难以生成既可测试又基于科学文献的假设。此外，现有的构思工具无法适应先前的实验结果。我们开发了HARPA来应对这些挑战，它融入了受人类研究人员启发的构思工作流程。HARPA首先通过文献挖掘识别新兴研究趋势，然后探索假设设计空间，最后通过定位研究空白和证明设计选择来收敛到精确、可测试的假设。我们的评估表明，HARPA生成的假设驱动研究提案在大多数定性维度（如特异性、新颖性、整体质量）上与强大的基线AI研究者相当，但在10点李克特量表上，在可行性（+0.78，p<0.05，bootstrap）和基础性（+0.85，p<0.01，bootstrap）方面取得了显著提升。当与ASD代理（CodeScientist）一起测试时，HARPA产生了更多成功执行（20
    vs 11 out of 40）和更少失败（16 vs 21 out of 40），表明专家可行性判断与实际执行成功相关。此外，为了模拟研究人员如何从经验中不断优化对哪些假设既可测试又可能有趣的理解，HARPA学习了一个奖励模型，根据先前的实验结果对新假设进行评分，与HARPA未训练的基线评分器相比，实现了约28%的绝对增益。总之，这些方法代表了AI驱动科学发现领域向前迈出的一步。
  tldr_cn: HARPA是一个生成可测试、基于文献的研究假设的框架，在可行性和基础性上优于基线。
  analysis_cn:
    innovations:
    - 可测试性驱动、基于文献的假设生成框架，确保假设既可测试又基于科学文献。
    - 受人类启发的构思工作流程：通过文献挖掘识别新兴趋势，探索假设设计空间，并通过定位研究空白和证明设计选择收敛到精确可测试的假设。
    - 自适应奖励模型，从先前的实验结果中学习以对新假设进行评分，实现假设质量的持续优化。
    - 在可行性和基础性上显著优于强大的基线AI研究者，并且与ASD代理一起使用时在执行成功率上也有相应提升。
    methodology: HARPA通过挖掘科学文献识别新兴趋势，探索假设设计空间，并通过定位研究空白和证明设计选择收敛到可测试的假设。它从先前的实验结果中学习奖励模型以对假设进行评分。评估将HARPA生成的提案与基线AI研究者在定性维度（特异性、新颖性、整体质量、可行性、基础性）上使用10点李克特量表进行比较，并使用CodeScientist
      ASD代理测试执行成功率。
    key_results: HARPA提案在特异性、新颖性和整体质量上与基线相当，但在可行性（+0.78，p<0.05）和基础性（+0.85，p<0.01）上显著提升。与CodeScientist一起使用时，HARPA在40次执行中实现了20次成功，而基线为11次，失败更少（16
      vs 21）。学习的奖励模型比未训练的基线评分器实现了约28%的绝对增益。
