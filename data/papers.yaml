  title_cn: 用于高维物理系统中自主科学发现的苏格拉底式智能体
  abstract_cn: 科学发现的自动化已到达一个转折点。虽然AI系统现在可以操作仪器、优化参数并生成假设，但大多数仍然是程序性的：它们执行由人类设计者固定的工作流程。真正的自主科学需要认知自主性——即根据证据构建、挑战和修正物理解释的能力。在此，我们介绍了AHOIS，一个将苏格拉底式助产术嵌入闭环实验的多智能体AI科学家。一个物理批评智能体通过因果提问、约束检查、反例生成和证伪标准制定来质疑假设。我们在一个真实的多模光纤光学平台上评估了AHOIS，这是一个具有复杂波变换、间接探测、环境漂移和多模态采集的高维系统。在没有先验编码方案、分类器或散斑模型的情况下，该系统自主提出并验证了一个随机干涉编码假设，发现了任务自适应稀疏测量策略，诊断了不同的故障模式（编码不稳定性、荧光污染和探测器噪声），并将一个已发表的成像协议转化为非原始配置上的可执行工作流程。所发现的编码产生了16x16的测量，有效秩为56.9，在MNIST上的分类准确率为76.97%，在Fashion-MNIST上为83.17%。消融实验表明，苏格拉底式质疑提高了物理一致性、假设完整性、不确定性校准和实验计划有效性。这些结果从工作流自动化走向了复杂物理环境中基于证据、自我修正的自主发现之路。
