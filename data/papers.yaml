  abstract_cn: 人工智能在改变科学发现方式方面正发挥着越来越关键的作用。我们推出了AI Scientist-v2，一个端到端的智能体系统，能够生成首个完全由AI生成并通过同行评审的工作坊论文。该系统迭代地提出科学假设、设计和执行实验、分析和可视化数据，并自主撰写科学论文。与其前身（v1，Lu等人，2024
    arXiv:2408.06292）相比，AI Scientist-v2消除了对人类编写代码模板的依赖，在多种机器学习领域有效泛化，并采用了一种由专用实验管理器智能体管理的新颖渐进式智能体树搜索方法。此外，我们通过集成视觉-语言模型（VLM）反馈循环来增强AI审稿人组件，用于迭代优化图表的内容和美观度。我们通过向同行评审的ICLR工作坊提交三篇完全自主生成的论文来评估AI
    Scientist-v2。值得注意的是，其中一篇论文获得了足够高的分数，超过了人类平均接受阈值，标志着首篇完全由AI生成的论文成功通过了同行评审。这一成就凸显了AI在开展科学研究各个方面日益增强的能力。我们预计，自主科学发现技术的进一步进步将深刻影响人类知识生成，实现研究生产力的前所未有的可扩展性，并显著加速科学突破，从而极大地造福社会。我们已在https://github.com/SakanaAI/AI-Scientist-v2开源代码，以促进这一变革性技术的未来发展。我们还讨论了AI在科学中的作用，包括AI安全。
