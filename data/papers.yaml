  title_cn: 使用Graph-PReFLexOR的原位图推理与知识扩展
  abstract_cn: 自动化科学发现的追求推动了从符号逻辑到现代AI的进步，开辟了推理和模式识别的新前沿。Transformer作为潜在系统运作，其中所有可能的关系都处于潜在状态，直到任务施加约束（类似于测量）。然而，优化其采样需要的不仅仅是概率选择：解决方案必须符合特定的结构或规则，确保一致性并调用一般原则。我们提出了Graph-PReFLexOR（基于图的偏好递归语言建模用于探索性优化推理），一个将图推理与符号抽象相结合以动态扩展领域知识的框架。受强化学习启发，Graph-PReFLexOR将推理定义为结构化映射，其中任务生成知识图谱、抽象模式，并最终得到答案。受范畴论启发，它将概念编码为节点，关系编码为边，通过同构表示支持层次推理和自适应学习。演示包括假设生成、材料设计以及创造性推理，例如发现神话概念（如“薄地方”）与材料科学之间的关系。我们提出了一种“知识花园生长”策略，整合跨领域见解，促进跨学科联系。使用30亿参数的Graph-PReFLexOR模型的结果显示出卓越的推理深度和适应性，突显了透明、多学科AI驱动发现的潜力。它为通用自主推理解决方案奠定了基础。
  tldr_cn: Graph-PReFLexOR结合图推理与符号抽象，实现自动化科学发现与知识扩展。
  analysis_cn:
    innovations:
    - Graph-PReFLexOR框架结合图推理与符号抽象，实现动态知识扩展
