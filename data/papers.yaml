  title_cn: SafeScientist：面向风险感知的LLM智能体科学发现
  abstract_cn: 近年来，大语言模型（LLM）智能体的发展显著加速了科学发现的自动化进程，但同时也引发了关键的伦理与安全问题。为系统应对这些挑战，我们提出了SafeScientist——一个创新的AI科学家框架，专门设计用于增强AI驱动科学探索中的安全性与伦理责任感。SafeScientist主动拒绝不符合伦理或高风险的任务，并在整个研究过程中严格强调安全性。为实现全面的安全监督，我们集成了多种防御机制，包括提示监控、智能体协作监控、工具使用监控以及伦理审查组件。作为SafeScientist的补充，我们提出了SciSafetyBench——一个专门用于评估科学场景中AI安全性的新型基准，包含6个领域的240项高风险科学任务，以及30个专门设计的科学工具和120项与工具相关的风险任务。大量实验表明，与传统AI科学家框架相比，SafeScientist在不牺牲科学产出质量的前提下，将安全性能提升了35%。此外，我们严格验证了安全流水线针对多种对抗攻击方法的鲁棒性，进一步证实了集成方法的有效性。代码和数据将在https://github.com/ulab-uiuc/SafeScientist上公开。警告：本文包含可能具有冒犯性或有害性的示例数据。
  tldr_cn: SafeScientist提出具有安全机制的LLM智能体框架及基准，安全性能提升35%且不牺牲科学产出。
