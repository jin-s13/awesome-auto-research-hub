    - 识别出操作稳定性（高吞吐量搜索）与理论深思熟虑（深度对齐）之间的基本权衡
    - 倡导动态路由架构的可操作指南，根据实时任务复杂性调整协作结构
    methodology: 本研究在配备Git worktree隔离和显式全局内存的受控测试平台上，将单智能体基线对比两种多智能体范式——子智能体架构（并行探索与事后整合）和智能体团队架构（执行前专家交接）。所有系统均在严格固定的计算时间预算下进行评估。
    key_results: 子智能体模式作为一种弹性、高吞吐量的搜索引擎，适用于严格时间限制下的广泛浅层优化；而智能体团队拓扑表现出更高的操作脆弱性，但在扩展计算预算下能够实现复杂架构重构所需的深度理论对齐。
    limitations:
    - 仅比较了两种多智能体范式，其他协调框架未探索
    - 研究局限于自动化机器学习优化任务
    - 固定计算时间预算可能无法反映可变或真实资源约束下的性能
    - 智能体团队架构因多作者代码生成而存在操作脆弱性
    tech_stack:
    - Large Language Models (LLMs)
    - Multi-Agent Systems (MAS)
    - Git worktree isolation
    - explicit global memory
