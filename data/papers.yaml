  title_cn: HalluCiteChecker：AI科学家时代中幻觉引用检测与验证的轻量级工具包
  abstract_cn: 我们介绍了HalluCiteChecker，一个用于检测和验证科学论文中幻觉引用的工具包。虽然AI辅助技术已经改变了学术写作过程，包括引用推荐，但它们也导致了幻觉引用的出现，这些引用并不对应任何现有工作。此类引用不仅损害了科学论文的可信度，还给审稿人和作者带来了额外负担，他们必须在审稿过程中手动验证其有效性。在本研究中，我们将幻觉引用检测形式化为一个NLP任务，并提供了一个相应的工具包作为解决该问题的实用基础。我们的包是轻量级的，可以在标准笔记本电脑上在几秒内完成验证。它还可以完全离线执行，并且仅使用CPU即可高效运行。我们希望HalluCiteChecker能够通过实现系统性的预审和出版检查，帮助减轻审稿人工作量并支持组织者。我们的代码在GitHub上以Apache
