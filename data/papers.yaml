- id: agentic-ideation-sample-efficient-agentic-trajectories-synt-2026
  title: 'Agentic-Ideation: Sample Efficient Agentic Trajectories Synthesis for Scientific
    Ideation Agents'
  authors:
  - Keyu Zhao
  - Lingyan Kong
  - Fengli Xu
  - Yong Li
  abstract: 'Ideation plays a pivotal role in scientific discovery. Recent LLM, especially
    AI Scientist systems, show promising potential for automated ideation. However,
    existing approaches predominantly rely on pre-defined agentic workflows. This
    constraint severely limits the flexibility required to navigate the vast search
    space of scientific literature and the complex action space of research reasoning.
    Recently, training Agentic LLMs has emerged as a promising direction, offering
    flexible reasoning frameworks and the capability for autonomous tool utilization.
    However, there remains a non-trivial challenge: applying previous agentic data
    synthesis methods to scientific ideation suffers from prohibitively high data
    synthesis cost. To bridge this gap, we propose Agentic-Ideation, a novel framework
    comprising an automated trajectory synthesis pipeline and a specialized agentic
    LLM trained for scientific ideation. Specifically, we first define a comprehensive
    tool space incorporating three external tools and three cognitive tools. Then
    we introduce an Oracle-Guided Data Synthesis strategy. By leveraging a reference
    idea as oracle guidance, this approach steers the multi-agent system to efficiently
    reconstruct the logical reasoning and tool invocation paths, transforming aimless
    trial-and-error into directed trajectory generation. Finally, we train the agent
    on these synthesized trajectories, employing a masking strategy on tool execution
    results. This ensures the model focuses on decision-making logic without interference
    from external feedback. Experimental results demonstrate that our method outperforms
    the SOTA workflow-based baseline by \textbf{11.91\%} in overall quality. Furthermore,
    our approach improves the sample efficiency of high-quality data synthesis by
    \textbf{over 10$\times$}.'
