  title_cn: CausalEvolve：基于因果暂存器的开放式发现
  abstract_cn: 基于进化的智能体（如AlphaEvolve）是利用大型语言模型（LLMs）构建AI科学家的显著成功案例之一。这些智能体通过迭代改进和进化程序来解决开放式科学问题，利用LLMs的先验知识和推理能力。尽管取得了成功，但现有的基于进化的智能体缺乏针对性的进化指导以及有效组织和利用从过去进化经验中获得知识的机制。因此，它们在接近已知性能边界时会出现进化效率下降和振荡行为。为弥补这一差距，我们开发了CausalEvolve，它配备了一个因果暂存器，利用LLMs识别和推理进化的指导因素。开始时，CausalEvolve首先识别结果层面的因素，为改进目标目标提供互补灵感。在进化过程中，CausalEvolve还会检查进化过程中的意外模式，并通过溯因推理假设新因素，从而提供新的方向。通过全面的实验，我们表明CausalEvolve在四个具有挑战性的开放式科学任务中有效提高了进化效率并发现了更好的解决方案。
  tldr_cn: CausalEvolve通过因果暂存器引导LLM进化智能体，提升开放式科学任务效率与解质量。
  analysis_cn:
    innovations:
    - 利用LLMs识别和推理进化指导因素的因果暂存器
    - 两阶段过程：结果层面因素识别以提供互补灵感，以及通过溯因推理检查意外模式以假设新因素
    - 通过提供针对性指导和整理过往进化知识，解决基于进化的智能体的低效率和振荡行为
    methodology: CausalEvolve是一种配备因果暂存器的基于进化的智能体。它首先识别结果层面的因素，为改进目标目标提供互补灵感。在进化过程中，它检查意外模式并使用溯因推理假设新因素，从而引导新的进化方向。该方法在四个开放式科学任务上进行了评估。
    key_results: CausalEvolve在四个具有挑战性的开放式科学任务中，有效提高了进化效率，并发现了比现有基于进化的智能体更好的解决方案。
