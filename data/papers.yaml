  title_cn: 从结果数据中解析科学推理步骤以进行分子优化
  abstract_cn: 新兴的推理模型有望实现科学发现的自动化。然而，它们的训练面临一个关键的监督缺口：实验结果丰富，但中间推理步骤很少被大规模记录。为弥合这一缺口，我们提出了DESRO框架，用于从结果中解读科学推理。通过分析分组数据中的共享模式和关键差异，大语言模型（LLM）能够恢复底层逻辑。我们在分子优化中实例化该框架，分子优化是药物发现的关键阶段，传统上依赖药物化学家的迭代推理。基于230万条分子性质记录，我们的框架通过将具有共享片段的分子分组，然后利用LLM分析结构变异如何与性质差异相关，从而推断优化原理。基于推导出的数据，我们训练了一个模型，通过可解释的推理过程进行分子优化。DESRO在18个任务中的15个上取得了最高成功率，涵盖生物活性和ADMET性质的单目标和多目标优化。该推理过程实现了对分布外场景的鲁棒泛化，包括新颖的性质组合、未见过的生物靶点以及仅由自然语言描述定义的性质。在严格时间分割的回顾性案例研究中，该模型自主重建了专家级别的先导化合物优化轨迹。此外，我们的框架可扩展到分子优化之外的反应配体选择。我们的结果表明，从结果数据中解读推理步骤是实现科学推理的可行范式，为加速科学发现提供了可扩展的方法。
  tldr_cn: DESRO通过分组数据并利用大语言模型从结果中推断科学推理步骤，在18个分子优化任务中取得高成功率。
  analysis_cn:
    innovations:
    - 提出DESRO框架，通过分组数据并利用LLM恢复底层逻辑，从结果数据中解读科学推理步骤。
    - 在分子优化中实例化：通过将具有共享片段的分子分组，并利用LLM分析结构-性质相关性，从230万条分子性质记录中推断优化原理。
    - 训练一个模型，通过可解释的推理过程进行分子优化，实现了最先进的成功率和鲁棒的分布外泛化。
    - 通过扩展到反应配体选择，展示了框架的通用性。
    methodology: DESRO将具有共享片段的分子从230万条性质记录中分组，然后利用大语言模型分析结构变异如何与性质差异相关，从而推断优化原理。基于推导出的推理数据，训练一个模型通过可解释的推理过程进行分子优化，并在18个单目标和多目标优化任务上进行评估。
    key_results: DESRO在18个任务中的15个上取得了最高成功率，鲁棒地泛化到分布外场景（新颖性质组合、未见靶点、自然语言定义的性质），并在严格时间分割下自主重建了专家级别的先导化合物优化轨迹。
    limitations: []
    tech_stack: []
