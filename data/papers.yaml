  analysis:
    innovations:
    - Introduces 1GC-7RC, the first standardized benchmark for evaluating autonomous
      AI coding agents on end-to-end ML model design, implementation, and training
      from scratch across diverse domains.
    - 'Benchmark design enforces realistic constraints: single GPU, no internet, no
      pretrained weights (with one controlled exception), and strict wall-clock budgets,
      testing implicit ML knowledge, planning, and time management.'
    - Modular and extensible platform that can be adapted to new tasks, GPU budgets,
      and multi-agent settings for future research on autonomous research agents.
    methodology: The benchmark comprises seven ML tasks (language modeling, image
      classification, semantic segmentation, graph learning, tabular prediction, time-series
      forecasting, text classification) with locked data-preparation and evaluation
      scripts plus a baseline training script. Agents may only modify the training
      code, have no internet access, no pretrained weights (except one controlled
      exception for segmentation), and must complete each task within a 40–120 minute
      wall-clock budget on a single GPU. Seven coding agents (five proprietary, two
      open-source) are evaluated over five runs per agent-task pair.
    key_results: Substantial performance differences are observed across agents, revealing
      varying levels of implicit ML knowledge, planning ability, and time-budget management.
    limitations:
    - Limited to seven tasks, which may not cover all ML subfields or real-world complexity.
    - Single-GPU and time-budget constraints restrict applicability to larger-scale
      projects.
    - No internet access prevents agents from leveraging external resources, which
      may not reflect typical development workflows.
    - The controlled exception allowing pretrained weights for semantic segmentation
      introduces inconsistency across tasks.
  title_cn: '1GC-7RC: 一张显卡——七大研究挑战！AI智能体做你的工作有多好？'
  abstract_cn: 自主AI编码智能体正成为工业界和学术界ML从业者的核心工具。尽管采用率日益增长，但目前尚无标准化基准来评估它们从零开始设计、实现和训练模型的能力，且覆盖多个领域。我们提出**1GC-7RC**（*单显卡：七大研究挑战*），一个包含七项ML任务的基准，涵盖语言建模、图像分类、语义分割、图学习、表格预测、时间序列预测和文本分类。每项任务提供锁定的数据准备和评估脚本以及一个基线训练脚本；智能体只能修改训练代码，不能访问预训练权重（语义分割有一个受控例外），不能访问互联网，并且必须在单GPU上在特定任务的时间预算（40-120分钟）内完成每项任务。我们评估了七个编码智能体：五个专有（Claude
    Code with Sonnet 4.6, Opus 4.6, and Opus 4.7; Codex CLI with GPT 5.5; and OpenCode
    with Qwen 3.6+）和两个开源（OpenCode with Kimi K2.5, Kimi K2.6）。在每个智能体-任务对的五次运行中，我们报告了显著的性能差异，揭示了不同程度的隐式ML知识、规划能力和时间预算管理。该基准、测试框架及所有评估工件已在GitHub上公开（https://github.com/Strolchii/1GC-7RC-Benchmark），以促进未来智能体的可重复比较。由于我们的基准设计是模块化的，它可以扩展到新任务和领域，适应不同的GPU预算，并用于研究多智能体设置，使其成为未来自主研究智能体研究的灵活平台。
  tldr_cn: 提出1GC-7RC基准，评估AI编码智能体在七项ML任务上的表现，揭示性能差异。
  analysis_cn:
    innovations:
    - 提出1GC-7RC，这是首个标准化基准，用于评估自主AI编码智能体在跨多个领域的端到端ML模型设计、实现和从头训练方面的能力。
    - 基准设计强制执行现实约束：单GPU、无互联网、无预训练权重（一个受控例外）、严格的时间预算，测试隐式ML知识、规划和时间管理能力。
    - 模块化且可扩展的平台，可适应新任务、GPU预算和多智能体设置，用于未来自主研究智能体的研究。
    methodology: 该基准包含七项ML任务（语言建模、图像分类、语义分割、图学习、表格预测、时间序列预测、文本分类），配有锁定的数据准备和评估脚本以及一个基线训练脚本。智能体只能修改训练代码，无互联网访问，无预训练权重（分割任务有一个受控例外），并且必须在单GPU上在40-120分钟的时间预算内完成每项任务。对七个编码智能体（五个专有，两个开源）进行了每个智能体-任务对五次运行的评估。
    key_results: 观察到各智能体之间存在显著的性能差异，揭示了不同程度的隐式ML知识、规划能力和时间预算管理能力。
    limitations:
    - 仅限于七项任务，可能无法涵盖所有ML子领域或现实世界的复杂性。
    - 单GPU和时间预算限制了对更大规模项目的适用性。
    - 无互联网访问阻止智能体利用外部资源，这可能无法反映典型的开发工作流程。
    - 允许语义分割使用预训练权重的受控例外引入了任务间的不一致性。
