  title_cn: 面向科学的规范驱动AI：用于自动化和可重复数据分析的ARIA框架
  abstract_cn: 科学数据的快速增长扩大了分析能力与研究意图之间的差距。现有的基于AI的分析工具，从AutoML框架到智能研究助手，要么偏向自动化而牺牲透明度，要么依赖手动脚本，阻碍了可扩展性和可重复性。我们提出了ARIA（自动研究智能助手），一个规范驱动、人在回路的自动化可解释数据分析框架。ARIA在文档中心的工作流中集成了六个可互操作的层，即命令层、上下文层、代码层、数据层、编排层和AI模块层，统一了人类推理和机器执行。通过自然语言规范，研究人员定义分析目标，而ARIA自主生成可执行代码、验证计算并生成透明文档。除了实现高预测精度外，ARIA还能快速识别最优特征集并选择合适的模型，最小化冗余调优和重复实验。在波士顿房价案例中，ARIA发现了25个关键特征，并确定XGBoost为最佳模型（R平方=0.93），过拟合极小。跨异构领域的评估表明，与最先进系统相比，ARIA具有强大的性能、可解释性和效率。通过将AI
    for Research和AI for Science原则结合在规范驱动架构中，ARIA为透明、协作和可重复的科学发现建立了新范式。
  tldr_cn: ARIA是一个规范驱动、人在回路的自动化可解释数据分析框架，可生成代码和文档。
  analysis_cn:
    innovations:
    - 规范驱动、人在回路的自动化可解释数据分析框架
