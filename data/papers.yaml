- id: surveylens-a-discipline-aware-benchmark-for-automatic-surve-2026
  title: 'SurveyLens: A Discipline-Aware Benchmark for Automatic Survey Generation'
  authors:
  - Beichen Guo
  - Zhiyuan Wen
  - Jia Gu
  - Haochen Shi
  - Jian Wang
  - Senzhang Wang
  - Haoyang Li
  - Ruosong Yang
  - Shuaiqi Liu
  abstract: Automatic Survey Generation (ASG) aims to produce comprehensive literature
    surveys by retrieving, organizing, and synthesizing academic papers. Despite rapid
    progress in specialized ASG frameworks and Deep Research agents, existing evaluations
    largely center on Computer Science or rely on generic criteria, leaving it unclear
    whether current systems satisfy the survey standards of diverse disciplines. We
    introduce SurveyLens, the first discipline-aware ASG benchmark. SurveyLens comprises
    SurveyLens-1k, a curated dataset of 1,000 human-written surveys across 10 disciplines,
    and a dual-lens framework that combines discipline-aware rubric scoring with reference-based
    alignment to human-written surveys. Evaluating 11 state-of-the-art systems across
    vanilla LLMs, ASG systems, and Deep Research agents, we find that Deep Research
    agents are the only paradigm robust across all 10 disciplines, ASG systems lead
    on structural planning, and all paradigms remain weak on reference quality, providing
    practical guidance for discipline-specific tool selection and future ASG design.
