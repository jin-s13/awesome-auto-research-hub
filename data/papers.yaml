  title_cn: 基于合成任务扩展的AI科学家
  abstract_cn: 随着AI智能体的出现，自动科学发现已成为一个可行的目标。近期许多工作构建了能够执行机器学习研究的智能体系统，但并未提供训练此类智能体的原则性方法——当前的大语言模型常常生成看似合理但无效的想法。为了在训练能够从实践中学习的智能体方面取得进展，我们提出了一种新颖的合成环境生成流水线，专门针对机器学习智能体。我们的流水线自动合成与SWE-agent框架兼容的机器学习挑战，涵盖主题采样、数据集提议和代码生成。生成的合成任务具有以下特点：1）基于真实的机器学习数据集，因为提议的数据集通过Huggingface
    API进行验证；2）通过自调试循环确保更高质量。为了验证合成任务的有效性，我们针对MLGym（一个机器学习任务基准）进行了测试。从合成任务中，我们从教师模型（GPT-5）采样轨迹，然后使用这些轨迹训练学生模型（Qwen3-4B和Qwen3-8B）。经过合成任务训练的学生模型在MLGym上取得了改进的性能，Qwen3-4B的AUP指标提升了9%，Qwen3-8B提升了12%。
  tldr_cn: 生成合成ML研究任务的流水线，通过教师-学生训练提升MLGym基准性能。
  analysis_cn:
    innovations:
    - 针对机器学习智能体的合成环境生成流水线，自动合成与SWE-agent兼容的ML挑战（主题采样、数据集提议、代码生成）。
    - 通过Huggingface API验证，将合成任务基于真实ML数据集。
    - 自调试循环确保生成任务的高质量。
    - 使用GPT-5在合成任务上的轨迹进行教师-学生训练，以提升较小模型（Qwen3-4B、Qwen3-8B）在MLGym基准上的性能。
