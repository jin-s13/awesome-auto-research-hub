  title_cn: 构建你的个性化研究团队：一个用于持续和交互式科学自动化的多智能体框架
  abstract_cn: 科学发现的自动化是人工智能研究中的一个关键里程碑。然而，现有的科学智能体系统存在两个根本性限制：僵化、预编程的工作流程无法适应中间发现，以及不充分的上下文管理阻碍了长期研究。我们提出了
    freephdlabor，一个开源的多智能体框架，其特点是基于实时智能体推理确定的完全动态工作流，以及支持无缝定制的模块化架构——用户可以修改、添加或移除智能体以满足特定领域需求。该框架提供了全面的基础设施，包括自动上下文压缩、防止信息退化的基于工作空间的通信、跨会话的持久记忆以及非阻塞式人工干预机制。这些特性共同将自动化研究从孤立的单次尝试转变为持续的研究项目，能够系统地建立在先前探索的基础上并整合人类反馈。通过提供构建可定制协同科学家系统的架构原则和实际实现，本工作旨在促进自动化研究在科学领域的更广泛采用，使实践者能够部署交互式多智能体系统，自主进行从构思到实验再到可发表手稿的端到端研究。
  tldr_cn: 一个具有动态工作流和模块化架构的持续交互式科学自动化多智能体框架。
  analysis_cn:
    innovations:
    - 完全动态的工作流，由实时智能体推理决定，而非预编程步骤
    - 模块化架构，允许用户修改、添加或移除智能体以满足特定领域需求
    - 自动上下文压缩和基于工作空间的通信，防止信息退化
    - 跨会话的持久记忆，支持持续的研究项目
    - 非阻塞式人工干预机制，实现交互式反馈
    methodology: 本文提出了 freephdlabor，一个开源的多智能体框架，采用模块化架构，通过实时智能体推理实现完全动态的工作流。它集成了自动上下文压缩、基于工作空间的通信、持久记忆和非阻塞式人工干预，以支持从构思到手稿生成的持续、交互式研究项目。
    key_results: 摘要未报告定量实验结果；它声称该框架能够实现端到端的自动化研究，系统地建立在先前探索的基础上并整合人类反馈，生成可发表的手稿。
    limitations:
    - 摘要中未讨论所提出框架的局限性。
