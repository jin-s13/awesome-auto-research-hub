  title_cn: LABBench2：面向AI系统进行生物学研究的改进基准测试
  abstract_cn: 利用人工智能加速科学发现的乐观情绪持续增长。当前AI在科学研究中的应用范围从在科学数据上训练专用基础模型，到自主假设生成系统，再到AI驱动的自主实验室。相应地，衡量AI系统在科学领域进展的需求不仅需要加速，而且应日益转向更真实世界的能力——超越死记硬背的知识甚至推理，真正衡量执行有意义工作的能力。先前的工作引入了语言智能体生物学基准LAB-Bench，作为衡量这些能力的初步尝试。本文介绍了该基准的演进版本LABBench2，用于衡量AI系统执行有用科学任务的真实世界能力。LABBench2包含近1900项任务，在很大程度上是LAB-Bench的延续，衡量类似的能力但置于更真实的背景下。我们评估了当前前沿模型的性能，并表明虽然LAB-Bench和LABBench2衡量的能力已有显著提升，但LABBench2在难度上实现了有意义的跃升（各子任务中模型特定准确率差异范围为-26%至-46%），并突显了性能提升的持续空间。LABBench2延续了LAB-Bench作为AI科学研究能力事实基准的传统，我们希望它继续推动这些核心研究功能的AI工具开发。为促进社区使用和发展，我们在https://huggingface.co/datasets/futurehouse/labbench2提供任务数据集，并在https://github.com/EdisonScientific/labbench2提供公开评估工具。
  tldr_cn: LABBench2包含近1900项生物学任务，衡量AI真实能力，难度较前代显著提升。
