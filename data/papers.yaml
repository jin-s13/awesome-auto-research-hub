  title_cn: AutoSOTA：一种用于发现最先进AI模型的端到端自动化研究系统
  abstract_cn: 人工智能研究越来越依赖于长时间的复现、调试和迭代优化以达到最先进（SOTA）性能，这催生了对能够加速整个经验模型优化流程的系统的需求。本文提出AutoSOTA，一个端到端自动化研究系统，能够将顶级AI论文中发布的最新SOTA模型推进为可复现且经验上改进的新SOTA模型。我们将该问题形式化为三个紧密耦合的阶段：资源准备与目标设定、实验评估、以及反思与构思。为解决该问题，AutoSOTA采用多智能体架构，包含八个专门智能体，协同完成论文到代码与依赖项的对应、执行环境的初始化与修复、长期实验的跟踪、优化想法的生成与调度，以及有效性监督以避免虚假收益。我们在从八个顶级AI会议收集的近期研究论文上评估AutoSOTA，并过滤了代码可用性和执行成本。在这些论文上，AutoSOTA在自动复现和后续优化方面均取得了强大的端到端性能。具体而言，它成功发现了105个超越原始报告方法的新SOTA模型，平均每篇论文约五小时。涵盖LLM、NLP、计算机视觉、时间序列和优化的案例研究进一步表明，该系统能够超越常规超参数调优，识别架构创新、算法重新设计和工作流级别的改进。这些结果表明，端到端研究自动化不仅可以作为性能优化器，还可以作为一种新型研究基础设施，减少重复性实验负担，并将人类注意力重新导向更高层次的科学创造力。
  tldr_cn: AutoSOTA端到端多智能体系统，自动化复制优化SOTA模型，在顶级会议发现105个新SOTA。
  analysis_cn:
    innovations:
    - 端到端自动化研究系统，能够复现并改进顶级论文中的最先进AI模型
    - 多智能体架构，包含八个专门智能体，用于论文到代码的对应、环境修复、实验跟踪、想法生成和有效性监督
    - 三阶段问题形式化：资源准备与目标设定、实验评估、反思与构思
    methodology: AutoSOTA采用多智能体系统，包含八个智能体，负责将论文与代码对应、初始化并修复执行环境、跟踪长期实验、生成并调度优化想法，以及监督有效性。该系统在来自八个顶级AI会议的近期论文上进行评估，过滤了代码可用性和执行成本，衡量端到端复现和后续优化。
    key_results: 该系统发现了105个超越原始报告结果的新SOTA模型，平均每篇论文约五小时，并展示了超越超参数调优的改进，包括跨LLM、NLP、计算机视觉、时间序列和优化领域的架构创新和算法重新设计。
    limitations:
    - 评估仅限于有可用代码且执行成本可控的论文
    - 可能无法推广到没有代码或需要过高计算资源的论文
    - 优化构思受限于智能体的预定义能力
