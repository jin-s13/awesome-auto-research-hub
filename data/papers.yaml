- id: meow-end-to-end-outline-writing-for-automatic-academic-surv-2025
  title: 'Meow: End-to-End Outline Writing for Automatic Academic Survey'
  authors:
  - Zhaoyu Ma
  - Yuan Shan
  - Jiahao Zhao
  - Nan Xu
  - Lei Wang
  abstract: As academic paper publication numbers grow exponentially, conducting in-depth
    surveys with LLMs automatically has become an inevitable trend. Outline writing,
    which aims to systematically organize related works, is critical for automated
    survey generation. Yet existing automatic survey methods treat outline writing
    as mere workflow steps in the overall pipeline. Such template-based workflows
    produce outlines that lack in-depth understanding of the survey topic and fine-grained
    styles. To address these limitations, we propose Meow, the first metadata-driven
    outline writing framework that produces organized and faithful outlines efficiently.
    Specifically, we first formulate outline writing as an end-to-end task that generates
    hierarchical structured outlines from paper metadata. We then curate a high-quality
    dataset of surveys from arXiv, bioRxiv, and medRxiv, and establish systematic
    evaluation metrics for outline quality assessment. Finally, we employ a two-stage
    training approach combining supervised fine-tuning and reinforcement learning.
    Our 8B reasoning model demonstrates strong performance with high structural fidelity
    and stylistic coherence.
