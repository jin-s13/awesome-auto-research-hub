  abstract_cn: 近期研究质疑大型语言模型（LLM）是否能在科学实验设计中执行真正的上下文学习（ICL），先前研究表明基于LLM的智能体对实验反馈不敏感。我们通过800次独立重复实验，在Cell
    Painting高内涵筛选的迭代扰动发现中重新审视这一问题。我们将利用实验反馈迭代更新假设的LLM智能体与仅依赖预训练知识检索的零样本基线进行比较。获取反馈使每个特征的发现数量平均增加53.4%（p=0.003）。为检验这一改进源于真正的反馈驱动学习还是提示诱导的预训练知识回忆，我们引入随机反馈控制，其中命中/未命中标签被置换。在该控制下，性能增益消失，表明观察到的改进依赖于反馈信号的结构（+13.0次命中，p=0.003）。我们进一步考察模型能力对反馈利用的影响。从Claude
    Sonnet 4.5升级到4.6将基因幻觉率从约33%-45%降至约3%-9%，将非显著的ICL效应（+0.8，p=0.32）转化为最佳ICL策略下的大幅显著改进（+11.0，p=0.003）。这些结果表明，有效的实验反馈上下文学习仅在模型达到足够能力阈值时才会出现。
