  has_real_world: false
  title_cn: AI辅助研究中的校准转向：面向证据许可主张的概念与方法论框架
  abstract_cn: AI辅助研究已进入一个新阶段，其核心问题不仅在于系统能否生成假设、运行实验或撰写论文，更在于其科学主张是否与支持这些主张的证据相校准。本文以视角性论文的形式，为AI辅助研究中的证据许可主张构建了一个概念与方法论框架。受专门化科学基础模型、大语言模型研究助手、多智能体协同科学家、AI科学家流水线、数学发现智能体以及自动驾驶实验室等代表性路径的启发，本文将AI辅助研究表征为五个算子：假设生成、模型中介的推论推导、外部验证、信念更新以及主张校准。核心论点是：校准不仅是措辞上的谨慎，更是一种管理科学断言权利的机制——证据许可某些形式的言论，同时拒绝其他形式。本文区分了语言学语义、基于后果的语义、干预语义以及证据许可语义；定义了主张-证据差距与认知债务；并将跨异质输出的最小结构重构视为一种向上的主张校准形式。文中包含AISim-Cal作为说明性的合成动力学练习，而非经验预测或基准测试。由此得出的原则是：无许可则无主张，验证不决定主张层级，自动化放大了校准的需求。因此，可靠的AI辅助研究被评估为一个循环：生成假设、推导可检验的后果、接受独立裁决、更新信念，并仅输出证据许可的主张。
  tldr_cn: 提出AI辅助研究中证据许可主张的概念框架，论证校准是管理科学断言权利的机制。
