  title_cn: 自主型AI科学家并非为自主科学发现而构建
  abstract_cn: 越来越多的研究致力于开发能够进行端到端自主科学发现的AI科学家。本立场论文认为，尽管自主型AI科学家已经能够作为合作科学家发挥作用，但它们并非为自主科学发现而构建。我们识别出构建和部署自主AI科学家面临的以下挑战：（1）问题选择受到McNamara谬误的影响；（2）智能体基于大型语言模型（LLMs）构建，其训练语料库省略了实验室实践中的隐性程序性和失败知识；（3）后训练阶段的偏好优化将输出多样性压缩向共识；（4）大多数科学基准测试衡量单轮预测准确性，且缺乏从物理实验到计算模型的反馈。这些挑战不仅仅是规模和框架的问题，还需要重新审视基本设计选择。为了构建真正自主的AI科学家，我们建议使用科学模拟作为训练验证器，设计能够表示真实研究中变化目标的持久世界模型，建立所有AI生成假设的集中式预注册存储库，以及由科学需求而非工具可用性驱动的应用。
  tldr_cn: 本文认为，当前自主型AI科学家因问题选择、训练数据、输出多样性和基准测试等挑战，不适合自主科学发现。
  analysis_cn:
    innovations:
    - 识别出阻碍自主型AI科学家实现自主科学发现的四个根本挑战：（1）问题选择受McNamara谬误影响；（2）LLM训练语料库省略了隐性程序性和失败知识；（3）偏好优化将输出多样性压缩向共识；（4）科学基准测试衡量单轮预测准确性，缺乏物理实验反馈。
    - 提出四项设计建议：使用科学模拟作为训练验证器；构建捕捉变化研究目标的持久世界模型；建立AI生成假设的集中式预注册存储库；在应用设计中优先考虑科学需求而非工具可用性。
    methodology: 本文是一篇立场论文，从概念上论证当前自主型AI科学家的发展轨迹。它综合现有文献和实践中的观察，识别系统性挑战，并提出前瞻性设计原则，未进行新实验或实证评估。
    key_results: 本文未呈现实验结果；其核心主张是，当前自主型AI科学家虽可作为合作科学家，但由于识别的四个根本挑战，在完全自主发现方面根本受限，且这些挑战无法仅通过扩展或框架解决。
    limitations:
    - 论证纯属概念性，缺乏实证验证或案例研究来证明所识别的挑战或所提建议的有效性。
