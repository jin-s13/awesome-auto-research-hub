  title_cn: 科学新颖性度量评估的公理基准
  abstract_cn: 对科学论文新颖性的严格评估，即使对人类科学家而言也是一项具有挑战性的任务。随着对AI科学家以及AI参与科学思想生成和论文写作的兴趣日益增长，使这一任务可自动化且可靠也变得越来越重要，以免人类注意力和计算令牌浪费在已被探索过的想法上。然而，由于量化真实新颖性的困难，现有的科学论文新颖性度量通常使用有噪声且混杂的信号（如引用计数或同行评审分数）来验证其结果。这些代理指标可能将新颖性与影响力、质量或评审者偏好混为一谈，从而更难评估给定度量实际评估新颖性的效果。因此，我们提出一个用于科学新颖性度量的公理基准。我们首先定义一组基于人类科学规范和实践的良好行为新颖性度量应满足的公理，然后在涵盖AI研究三个领域的十个任务上评估现有度量。我们的结果表明，没有现有度量能一致满足所有公理，且度量在系统不同的公理上失败，反映了其底层架构。此外，我们表明，结合互补架构的度量可在基准上取得一致改进，每公理加权达到90.1%，而最佳单个度量仅为71.5%，这表明开发架构多样化的度量是未来工作的一个有前景的方向。我们发布基准代码作为补充材料，以鼓励开发更稳健的科学文献新颖性度量。
  tldr_cn: 提出公理基准评估科学新颖性度量，发现无现有度量一致满足所有公理。
