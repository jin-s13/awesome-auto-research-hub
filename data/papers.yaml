  abstract_cn: 构思在科学发现中起着关键作用。最近的LLM，特别是AI科学家系统，显示出自动化构思的潜力。然而，现有方法主要依赖预定义的智能体工作流，这严重限制了在科学文献的广阔搜索空间和研究推理的复杂动作空间中所需的灵活性。最近，训练智能体LLM成为一个有前景的方向，提供了灵活的推理框架和自主工具使用能力。然而，仍存在一个重大挑战：将先前的智能体数据合成方法应用于科学构思时，数据合成成本过高。为弥补这一差距，我们提出Agentic-Ideation，一个包含自动轨迹合成流水线和专门为科学构思训练的智能体LLM的新框架。具体来说，我们首先定义了一个全面的工具空间，包含三个外部工具和三个认知工具。然后引入了一种预言引导的数据合成策略。通过利用参考思想作为预言引导，该方法引导多智能体系统高效重建逻辑推理和工具调用路径，将盲目的试错转化为有方向的轨迹生成。最后，我们在这些合成轨迹上训练智能体，并对工具执行结果采用掩码策略，确保模型专注于决策逻辑而不受外部反馈干扰。实验结果表明，我们的方法在整体质量上比最先进的基于工作流的基线高出11.91%。此外，我们的方法将高质量数据合成的样本效率提高了10倍以上。
