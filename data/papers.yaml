  title_cn: 'SciCoQA: 科学论文与代码对齐的质量保证'
  abstract_cn: 科学论文与其代码之间的差异破坏了可重复性，这一问题随着自动化研究代理将科学产出扩展到人类审查能力之外而日益严重。大型语言模型（LLM）能否可靠地检测此类差异尚未得到系统评估。为此，我们提出了SciCoQA，一个包含635个论文-代码差异（92个真实、543个合成）的数据集，用于这一跨模态验证任务。在22个评估模型中，即使性能最佳的LLM（Gemini
    3.1 Pro和GPT-5 Mini）也只能检测到46.7%的真实世界差异，揭示了自动化科学质量保证中的关键差距。我们从GitHub问题和可重复性论文中构建了SciCoQA，并提出了一种合成生成流水线，以将规模从人工智能扩展到物理学、定量生物学及其他计算科学领域。我们进一步引入了一种差异类型和类别的分类法，以描述出现的不匹配。我们的分析表明，模型尤其难以处理遗漏的论文细节、长上下文输入以及训练语料库之外的论文。
  tldr_cn: SciCoQA数据集评估LLM检测论文-代码差异的能力，揭示自动化质量保证的重大差距。
  grade: skip
