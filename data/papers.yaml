  abstract_cn: AI科学家在研究流程的多个阶段已展现出令人鼓舞的进展，其中自动科学论文写作仍是一项艰巨挑战。引言写作尤为困难，不仅要求语言流畅，还需逻辑严谨且可验证的真实性。大多数AI辅助方法将该任务视为文本生成而非推理与结构化，导致严重缺陷，例如虚构引用。为解决此问题，我们首先定义了内容条件引言生成（CCIG）任务，要求引言基于论文的核心证据。随后提出LECTOR，一种新颖的逻辑-表达协同强化学习框架，能够严格遵循科学家的逻辑，添加高质量引用并保持结构化表达。LECTOR首先从论文主体构建逻辑推理图，作为可验证的逻辑蓝图；接着采用逻辑-表达协同奖励机制，联合优化图的结构忠实度与最终叙述的质量。我们从Nature
    Communications论文中构建数据集以评估方法。大量实验表明，在逻辑忠实度和引言生成质量指标上均取得一致提升，例如图质量（+26.7%）、引用质量（+8.6%）和论文一致性（+3.3%）。代码和数据见https://github.com/Xiao-Youth/LECTOR。
