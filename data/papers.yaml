    innovations:
    - Introduction of LAB-Bench, a broad dataset of over 2,400 multiple-choice questions
      specifically designed to evaluate AI systems on practical biology research tasks
      (literature search, protocol planning, data analysis, figure interpretation,
      database navigation, DNA/protein sequence manipulation).
    - Shift from textbook-style science benchmarks to assessment of capabilities needed
      for real-world research assistance, with the explicit goal that high scores
      on difficult tasks would indicate usefulness as an automated research assistant.
    methodology: We constructed LAB-Bench, a dataset of over 2,400 multiple-choice
      questions covering literature recall and reasoning, figure interpretation, database
      access, and sequence comprehension. We then evaluated several frontier large
      language models on this benchmark and compared their performance to that of
      human expert biology researchers.
    key_results: Performance of several frontier language models was measured on LAB-Bench
      and compared to human expert biology researchers, though specific quantitative
