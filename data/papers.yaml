    - Retrospective audit of A-Lab autonomous materials claims, flagging all inconclusive
      claims while passing confirmed ones
    methodology: The paper introduces CARTOGRAPH, a verification layer that selects
      experiments via unresolved-subspace steering, resolves ambiguity explicitly,
      and refuses when residual-based library inadequacy is detected. Under a local
      linear-Gaussian bridge, it derives CARTOGRAPH-A as the exact A-optimal rule
      and compares it to raw projection and closed-form EIG/Box-Hill. Evaluation spans
      five testbeds including a structured cascade, pharmacokinetic mechanism identification,
      filtered EPA settings, and a retrospective audit of 40 positive claims from
      the A-Lab autonomous materials system.
    key_results: CARTOGRAPH-A beats raw projection 129W/0T/15L at d=8 (p ≈ 10⁻²¹)
      in a replicated structured cascade; it identifies then revokes three out-of-library
      pharmacokinetic mechanisms while keeping an in-library control; in the A-Lab
      audit, the refuse guard flags all 4 claims later marked inconclusive and passes
      32/36 confirmed claims.
    limitations:
    - Derivations rely on a local linear-Gaussian bridge assumption, which may not
      hold globally
    - In low-dimensional pharmacokinetic and filtered EPA settings, near-ties against
      disagreement are observed, indicating limited advantage
    - The refusal mechanism initially misidentifies out-of-library mechanisms before
      revoking them, so real-time reliability depends on residual detection
    - Retrospective audit is limited to a single published system (A-Lab), and generalizability
      to other autonomous discovery systems is not demonstrated
    - Residual-based library inadequacy detection may fail to flag structural misfit
      if residuals do not clearly expose it
  title_cn: AI科学家何时应该停止？可验证的实验引导与拒绝机制用于自主发现
  abstract_cn: 我们提出了CARTOGRAPH，一种用于AI科学家的验证层，它结合了未解析子空间实验引导（选择）、显式模糊性闭合（解析）和基于残差的库不充分性检测（拒绝）。在局部线性-高斯桥接下，原始未解析投影是各向同性的未解析Fisher信息迹，而CARTOGRAPH-A是精确的未解析A-最优规则；闭式EIG和Box-Hill作为局部比较器而非全局等价物出现。在五个测试平台上，CARTOGRAPH-A在d=8的重复结构化级联中以129胜0平15负（p
    ≈ 10⁻²¹）击败原始投影。更独特的是，该框架初步识别了三个库外药代动力学机制，然后当残差暴露结构失配时撤销这些识别，而一个受扰动的库内对照则始终保持识别。在低维药代动力学和过滤EPA设置中，理论预测并观察到了与分歧的近似平局。最后，在对已发表的A-Lab自主材料系统中40个阳性主张的回顾性审计中，拒绝守卫标记了所有4个在人工重新分析后被标记为不确定的主张，同时通过了32/36个已确认的主张。代码可在https://github.com/ai4science-boed/cartograph.git获取。
  tldr_cn: CARTOGRAPH验证层通过实验引导、模糊性闭合和拒绝机制决定AI科学家何时停止，经多平台和实际审计验证。
  analysis_cn:
    innovations:
    - CARTOGRAPH验证层结合了未解析子空间实验引导（选择）、显式模糊性闭合（解析）和基于残差的库不充分性检测（拒绝）
    - 在局部线性-高斯桥接下推导出精确的未解析A-最优规则（CARTOGRAPH-A），原始未解析投影被证明为各向同性Fisher信息迹
    - 闭式期望信息增益和Box-Hill被重新解释为局部比较器而非全局等价物
    - 拒绝机制初步识别库外机制，然后在残差暴露结构失配时撤销这些识别
    - 对A-Lab自主材料主张的回顾性审计，标记了所有不确定主张同时通过了已确认的主张
    methodology: 本文介绍了CARTOGRAPH，一种验证层，通过未解析子空间引导选择实验，显式解析模糊性，并在检测到基于残差的库不充分性时拒绝。在局部线性-高斯桥接下，推导出CARTOGRAPH-A作为精确的A-最优规则，并与原始投影及闭式EIG/Box-Hill进行比较。评估涵盖五个测试平台，包括结构化级联、药代动力学机制识别、过滤EPA设置，以及对A-Lab自主材料系统中40个阳性主张的回顾性审计。
    key_results: CARTOGRAPH-A在d=8的重复结构化级联中以129胜0平15负（p ≈ 10⁻²¹）击败原始投影；它识别然后撤销了三个库外药代动力学机制，同时保持了一个库内对照；在A-Lab审计中，拒绝守卫标记了所有4个后来被标记为不确定的主张，并通过了32/36个已确认的主张。
    limitations:
    - 推导依赖于局部线性-高斯桥接假设，该假设可能不全局成立
    - 在低维药代动力学和过滤EPA设置中，观察到与分歧的近似平局，表明优势有限
    - 拒绝机制在撤销之前初步错误识别了库外机制，因此实时可靠性依赖于残差检测
    - 回顾性审计仅限于单个已发表系统（A-Lab），未证明对其他自主发现系统的泛化性
    - 基于残差的库不充分性检测可能在残差未清晰暴露结构失配时无法标记
