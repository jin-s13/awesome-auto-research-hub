    - 将人类专业知识外化为显式工作流、规则和执行约束，以引导智能体实现可靠的训练行为。
    - AutoTrainess系统，使语言模型智能体能够通过迭代后训练自主改进语言模型。
    methodology: AutoTrainess提供了一个智能体-计算机接口库，将后训练流程结构化为规划、数据准备、训练、评估和日志记录步骤，嵌入了人类衍生的工作流和约束。该智能体在PostTrainBench上使用GPT-5.4
