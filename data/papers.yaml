- id: human-attention-is-still-all-you-need-human-oversight-m-2026
  title: '(Human) Attention Is (Still) All You Need: Human oversight makes AI-assisted
    social science reliable'
  authors:
  - Chen Zhu
  - Xiaolu Wang
  - Weilong Zhang
  abstract: 'Large language models (LLMs) are increasingly used for tasks once reserved
    for trained researchers, including hypothesis generation, specification choice,
    and drafting conclusions. We argue that the reliability of AI-assisted research
    depends not only on model capability, but also on how cognitive labour is structured
    between humans and machines. We study this problem through Human-in-the-Loop Economic
    Research (HLER), a decision architecture based on pre-commitment, decision sequencing,
    accountability, and attention allocation. In a pre-specified 2*4 factorial experiment
    with 280 complete research runs across four datasets, an unconstrained multi-agent
    baseline produced critical failures in 72% of runs. Using the same underlying
    model, the same agent decomposition, and identical prompts for the shared reasoning
    agents, HLER reduced the failure rate to 16% by imposing three architectural commitments:
    LLMs reason but do not execute data work, data and estimation are handled deterministically,
    and three human decision gates bind the workflow. Fisher''s exact test rejects
    equality of failure rates at p0.001. Reliability gains were largest on the least
    publicly represented dataset, a Qing-dynasty population register, consistent with
    a task-based production model with Frechet-distributed output quality. An 80-run
    ablation suggests that deterministic computation and human gates contribute independently,
    with exploratory evidence of complementarity. We interpret HLER as a research
    harness rather than an autonomous AI scientist: it sharply reduces failures, makes
    residual weaknesses more visible, and prevents unreliable claims from being advanced
    as publication-ready outputs.'
