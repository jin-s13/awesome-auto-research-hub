  title_cn: 垂直符号回归
  abstract_cn: 自动化科学发现一直是人工智能（AI）的宏伟目标，并将带来巨大的社会影响。从实验数据中学习符号表达式是AI驱动科学发现的关键步骤。尽管取得了令人兴奋的进展，但大多数研究都集中在水平发现路径上，即直接在涉及所有自变量的完整假设空间中搜索最佳表达式。由于涉及所有自变量的假设空间呈指数级增长，水平路径极具挑战性。我们提出垂直符号回归（VSR）以加速符号回归。VSR首先在控制实验中拟合仅涉及少数自变量的简单表达式，其中其余变量保持不变。然后，通过添加新的自变量并允许这些变量变化的新控制变量实验，扩展先前轮次中学到的表达式。垂直发现的前几步比水平路径显著更便宜，因为它们的搜索是在涉及少量变量的缩减假设空间中进行的。因此，垂直发现有可能增强最先进的符号回归方法在处理包含多个因素的复杂方程时的能力。理论上，我们证明在学习一类表达式时，VSR的搜索空间可以比水平方法指数级更小。实验上，VSR在学习涉及多个自变量的符号表达式方面优于多个基线方法。
  tldr_cn: 提出垂直符号回归（VSR），通过控制实验逐步添加变量高效学习符号表达式。
  grade: worth_reading
- id: graph-native-reinforcement-learning-enables-traceable-scient-2026
  title: Graph-Native Reinforcement Learning Enables Traceable Scientific Hypothesis
    Generation through Conceptual Recombination
  authors:
  - Subhadeep Pal
  - Shashwat Sourav
  - Tirthankar Ghosal
  - Markus J. Buehler
  abstract: Accelerating materials discovery requires AI systems that can generate
    scientifically valid hypotheses through multi-step, domain-grounded reasoning.
    Standard large language models often produce fluent but weakly traceable responses
    to open-ended materials design problems, making it difficult to determine whether
    final answers are supported by coherent intermediate reasoning. We develop Graph-PRefLexOR,
    a family of graph-native reasoning models fine-tuned with Group Relative Policy
    Optimization (GRPO) to organize reasoning into explicit phases for mechanism exploration,
    graph construction, pattern extraction, and hypothesis synthesis. This design
    links neural language generation with symbolic relational structure, enabling
    causal connections to be constructed, inspected, and reused. On 100 open-ended
    questions from materials science and mechanics literature, Graph-PRefLexOR achieves
    40-65% improvements over corresponding base models, with the largest gains in
    reasoning traceability. Embedding analyses show broader semantic exploration and
    approximately 2-3 times greater semantic diversity than baselines. Semantic backtracking
    and layer-wise hidden-state analyses further show stronger alignment between structured
    reasoning and final answers. Finally, test-time graph expansion reveals that additional
    compute primarily increases long-range conceptual recombination within a bounded
    semantic space, rather than simply expanding semantic coverage. These results
    establish graph-native reinforcement learning as a pathway toward interpretable
    AI systems for scientific hypothesis generation in materials design and other
    scientific applications.
