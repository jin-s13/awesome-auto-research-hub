  title_cn: SurveyGen：基于质量感知的大型语言模型科学综述生成
  abstract_cn: 自动综述生成已成为科学文档处理中的关键任务。尽管大型语言模型（LLM）在生成综述文本方面展现出潜力，但缺乏标准化评估数据集严重阻碍了对其与人工撰写综述性能的严格评估。本文提出了SurveyGen，这是一个大规模数据集，包含来自多个科学领域的超过4,200篇人工撰写的综述，以及242,143篇引用文献和关于综述及引用论文的广泛质量相关元数据。利用这一资源，我们构建了QUAL-SG，一种新颖的质量感知综述生成框架，该框架通过将质量感知指标融入文献检索中，以评估和选择更高质量的源论文，从而增强了标准的检索增强生成（RAG）流程。利用该数据集和框架，我们在不同人类参与程度下（从全自动生成到人工引导写作）系统评估了最先进的LLM。实验和人工评估结果表明，尽管半自动流程能够取得部分有竞争力的结果，但全自动综述生成仍然存在引用质量低和批判性分析有限的问题。
  tldr_cn: SurveyGen 提供大规模数据集与质量感知框架，用于评估和改进LLM自动综述生成。
