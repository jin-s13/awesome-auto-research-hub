    innovations:
    - Introduces OpenBioRQ, a retrieval-grounded agentic benchmark of 12,553 unsolved
      biomedical research questions across 12 domains, designed as a faithfulness-and-abstention
      probe with no answer key.
    - First biomedical benchmark to combine an agentic setting (multiple tool calls)
      with unsolved questions, where openness is verified against real follow-up evidence
      rather than parametric knowledge.
    - 'Empirical difficulty anchoring: questions are selected based on failure of
      three open-weight reference models, avoiding subjective hardness labels.'
    - Discovery of agentic collapse on the hardest questions, where agents stop using
      tools, and demonstration that blocking tools barely changes scores for the most
      collapse-prone model.
    - Use of a frozen per-question checklist to raise inter-judge agreement from Spearman
      0.35 to 0.82.
    methodology: The benchmark comprises 12,553 unsolved biomedical questions requiring
      agents to perform multiple tool calls in a retrieval-grounded setting. Difficulty
      is determined empirically by selecting questions that three open-weight reference
      models fail to answer. Evaluation uses a frozen per-question checklist to judge
      answer correctness, with openness verified against real follow-up evidence.
    key_results: On the hardest subset, held-out models from the same lineage solve
      ~17%, while frontier agents (Gemini-3-Pro, Opus-4.7, GPT-5.5) achieve 29-60%,
      leaving 33-40% unsolved for the best agent. Agentic collapse occurs on the hardest
      questions, and for the most collapse-prone model, blocking tool access barely
      changes its score.
    limitations:
    - Benchmark limited to biomedical domain, potentially not generalizing to other
      fields.
    - Difficulty anchoring relies on three specific open-weight models, which may
      bias the hardest subset and not reflect universal hardness.
    - Agentic collapse observation is model-specific; extent of collapse may vary
      across different agent architectures.
    - Checklist-based evaluation, while improving agreement, may still miss nuanced
      correctness or introduce checklist-specific biases.
    - Unsolved nature means no ground-truth answers exist, so verification against
      follow-up evidence could be imperfect.
  title_cn: OpenBioRQ：面向代理的未解决生物医学研究问题
  abstract_cn: 一个有效的引用看起来像是证据——但链接能解析并不意味着被引论文支持该主张。我发现，当前的代理模型很少捏造引用（超过99%的链接可解析），但大约15.9%的链接指向错误的论文。现有基准忽略了这种失败模式：当问题有固定答案键时，模型可以重现该键中的预期来源，而不是独立验证来源是否支持主张。我提出了OpenBioRQ，一个基于检索的代理基准，包含12,553个跨12个领域的未解决生物医学研究问题，将开放问题作为忠实性与弃权探针。据我所知，这是首个将代理设置（模型必须发出多次工具调用）与无答案键的未解决问题相结合的生物医学基准。开放性通过真实的后续证据而非模型的参数知识进行验证。难度是经验性的：我基于三个开放权重参考模型无法回答的问题来锚定难度，而非主观的难度标签。在这个最难的子集上，与难度锚点同系列的保留模型仅解决约17%，而三个独立的前沿代理（Gemini-3-Pro、Opus-4.7、GPT-5.5）的解决率范围在29%到60%之间。因此，该基准难度大、未饱和（最佳代理仍有约33-40%未解决），并能区分不同能力层级。除了难度，我观察到在最难问题上出现代理崩溃，即代理停止使用工具。对于最易崩溃的模型，完全阻止工具访问几乎不改变其得分——因此工具在最需要的地方失去了效用。一个冻结的每问题检查清单将评估者间一致性从Spearman
    0.35提高到0.82。
