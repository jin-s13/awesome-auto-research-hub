  title_cn: DOVA：以深思为先的多智能体编排实现自主研究自动化
  abstract_cn: 大型语言模型（LLM）智能体在工具使用、推理和代码生成方面展现了卓越的能力，但单智能体系统在面对需要多源综合、对抗性验证和个性化交付的复杂研究任务时，表现出根本性的局限性。我们提出了DOVA（深度编排多功能智能体），一个多智能体平台，引入了三项关键创新：（1）以深思为先的编排，即在调用工具之前进行显式的元推理，并由持久用户模型和实体感知对话上下文提供信息；（2）混合协作推理，一个可组合的三阶段流水线，统一了集成多样性、黑板透明度和迭代优化；（3）自适应多级思维，一个六级令牌预算分配方案，在简单任务上降低推理成本40-60%，同时保留深度推理能力。我们形式化了核心算法，展示了跨七种系统配置的架构消融研究，并分析了每个组件对答案置信度、来源覆盖率和令牌效率的贡献。
