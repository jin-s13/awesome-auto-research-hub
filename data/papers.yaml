  abstract_cn: 训练语言模型（LM）仍然是一个高度依赖人工的过程，即使前沿语言模型智能体在软件工程和其他长周期任务上变得越来越强大。一个核心挑战在于，自主后训练不仅仅是一个编码问题：它要求智能体反复规划迭代、构建与基准对齐的数据、运行稳定的训练任务、评估检查点，并在数小时的交互中保持实验状态。我们提出AutoTrainess，一个LM智能体，它将这些操作暴露为用于规划、数据准备、训练、评估和日志记录的智能体-计算机接口库。AutoTrainess不是让智能体在原始CLI环境中操作（其动作空间未充分定义），而是将先前的人类经验外化为显式工作流、规则和执行约束，引导智能体实现有效且可靠的训练行为。在PostTrainBench上，AutoTrainess始终优于纯CLI基线，使用GPT-5.4
    (Codex)时平均得分为26.94，而纯CLI基线为23.21。它还能跨模型和框架泛化，将DeepSeek-V4-Flash (OpenCode)从12.13提升至19.58。
  tldr_cn: AutoTrainess通过智能体-计算机接口自动化语言模型后训练，在PostTrainBench上超越纯CLI基线。
