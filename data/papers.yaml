- id: prl-bench-a-comprehensive-benchmark-evaluating-llms-capabi-2026
  title: 'PRL-Bench: A Comprehensive Benchmark Evaluating LLMs'' Capabilities in Frontier
    Physics Research'
  authors:
  - Tingjia Miao
  - Wenkai Jin
  - Muhua Zhang
  - Jinxin Tan
  - Yuelin Hu
  - Tu Guo
  - Jiejun Zhang
  - Yuhan Wang
  - Wenbo Li
  - Yinuo Gao
  - Shuo Chen
  - Weiqi Jiang
  - Yayun Hu
  - Zixing Lei
  - Xianghe Pang
  - Zexi Liu
  - Yuzhi Zhang
  - Linfeng Zhang
  - Kun Chen
  - Wei Wang
  - Weinan E
  - Siheng Chen
  abstract: 'The paradigm of agentic science requires AI systems to conduct robust
    reasoning and engage in long-horizon, autonomous exploration. However, current
    scientific benchmarks remain confined to domain knowledge comprehension and complex
    reasoning, failing to evaluate the exploratory nature and procedural complexity
    of real-world research. In this work, we present research-oriented evaluations
    in theoretical and computational physics, a natural testbed with comprehensive
    domain knowledge, complex reasoning, and verifiable end-to-end workflows without
    reliance on experiments. Here we introduce PRL-Bench (Physics Research by LLMs),
    a benchmark designed to systematically map the capability boundaries of LLMs in
    executing end-to-end physics research. Constructed from 100 curated papers from
    the latest issues of Physical Review Letters since August 2025 and validated by
    domain experts, PRL-Bench covers five major theory- and computation-intensive
    subfields of modern physics: astrophysics, condensed matter physics, high-energy
    physics, quantum information, and statistical physics. Each task in the benchmark
    is designed to replicate the core properties of authentic scientific research,
    including exploration-oriented formulation, long-horizon workflows, and objective
    verifiability, thereby reconstructing the essential reasoning processes and research
    workflows of real physics research. Evaluation across frontier models shows that
    performance remains limited, with the best overall score below 50, revealing a
    pronounced gap between current LLM capabilities and the demands of real scientific
    research. PRL-Bench serves a reliable testbed for accessing next generation AI
    scientists advancing AI systems toward autonomous scientific discovery.'
  year: 2026
  venue: arXiv
  paper_type:
  - method
  tags:
  - LG
  - AI
  - data-an
