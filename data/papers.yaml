  title_cn: 人工智能与机器人科学家在科学发现中的缩放定律
  abstract_cn: 科学发现正通过先进机器人技术和人工智能迎来快速进步。当前的科学实践面临重大限制，因为手动实验仍然耗时且资源密集，而多学科研究需要超越单个研究者专业知识边界的知识整合。在此，我们设想了一种自主通用科学家（AGS）概念，它结合了代理型人工智能和具身机器人技术，以自动化整个研究生命周期。该系统能够动态地与物理和虚拟环境交互，同时促进跨不同科学学科的知识整合。通过将这些技术部署到每个研究阶段——涵盖文献综述、假设生成、实验和手稿撰写——并结合内部反思与外部反馈，该系统旨在显著减少科学发现所需的时间和资源。基于从虚拟AI科学家到多才多艺的通用AI机器人科学家的演变，AGS承诺具有突破性潜力。随着这些自主系统日益融入研究过程，我们假设科学发现可能遵循新的缩放定律，这些定律可能由这些自主系统的数量和能力塑造，为知识的生成和演化提供新颖视角。具身机器人对极端环境的适应性，加上科学知识积累的飞轮效应，有望不断突破物理和智力前沿。
  tldr_cn: 设想一种结合AI与机器人技术的自主通用科学家来自动化研究，并提出科学发现的新缩放定律。
  analysis_cn:
    innovations:
    - 自主通用科学家（AGS）概念，结合代理型人工智能和具身机器人技术，自动化整个研究生命周期
    - 假设科学发现可能遵循由自主系统数量和能力决定的新缩放定律
    - 通过适应极端环境的机器人积累科学知识的飞轮效应
    methodology: 这是一篇愿景论文，没有实证方法论。它概念性地描述了一个AGS系统，该系统将代理型人工智能和具身机器人技术整合到所有研究阶段，从文献综述到手稿撰写，并融入内部反思和外部反馈。
    key_results: 未报告实验结果；该论文提出了自主通用科学家的愿景，并假设了AI驱动的科学发现的缩放定律。
    limitations:
