    - 有限样本复杂度分析，界定了达到目标近似误差所需的LLM调用预算
    methodology: SMCEvolve将程序演化框架化为使用序贯蒙特卡洛采样器从奖励倾斜分布中采样，结合了自适应父代重采样、变异与接受的混合以及自动收敛控制。它包含有限样本复杂度分析，界定了达到目标近似误差所需的LLM调用预算，并在数学、算法效率、符号回归和端到端机器学习研究基准上进行了评估。
