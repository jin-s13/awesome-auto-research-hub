- id: rescore-llm-driven-simulation-recovery-in-control-systems-r-2026
  title: 'RESCORE: LLM-Driven Simulation Recovery in Control Systems Research Papers'
  authors:
  - Vineet Bhat
  - Shiqing Wei
  - Ali Umut Kaypak
  - Prashanth Krishnamurthy
  - Ramesh Karri
  - Farshad Khorrami
  abstract: Reconstructing numerical simulations from control systems research papers
    is often hindered by underspecified parameters and ambiguous implementation details.
    We define the task of Paper to Simulation Recoverability, the ability of an automated
    system to generate executable code that faithfully reproduces a paper's results.
    We curate a benchmark of 500 papers from the IEEE Conference on Decision and Control
    (CDC) and propose RESCORE, a three component LLM agentic framework, Analyzer,
    Coder, and Verifier. RESCORE uses iterative execution feedback and visual comparison
    to improve reconstruction fidelity. Our method successfully recovers task coherent
    simulations for 40.7% of benchmark instances, outperforming single pass generation.
    Notably, the RESCORE automated pipeline achieves an estimated 10X speedup over
    manual human replication, drastically cutting the time and effort required to
    verify published control methodologies. We will release our benchmark and agents
    to foster community progress in automated research replication.
