  title_cn: 实现偶然发现的操作化：基于理论在环的多智能体AI工作流用于增强材料表征
  abstract_cn: 科学史上充满了偶然发现，即意外的观察而非有针对性的假设开辟了新的研究领域。虽然现代自主实验室在加速假设检验方面表现出色，但其对效率的优化可能会忽视这些关键的非计划性发现。为弥补这一不足，我们提出了SciLink，一个开源的多智能体人工智能框架，旨在通过创建实验观察、新颖性评估和理论模拟之间的直接自动链接，将偶然发现操作化于材料研究中。该框架采用混合AI策略，其中专用机器学习模型对实验数据进行定量分析，而大型语言模型处理更高层次的推理。这些智能体自主地将来自材料表征技术的原始数据转化为可证伪的科学主张，然后根据已发表文献对其进行定量新颖性评分。我们展示了该框架在多种研究场景中的多功能性，包括其在原子分辨率和超光谱数据上的应用、整合实时人类专家指导的能力，以及通过提出有针对性的后续实验来闭合研究循环的能力。通过系统分析所有观察结果并对其进行情境化，SciLink为AI驱动的材料研究提供了一个实用框架，不仅提高了效率，还积极培育了有利于偶然发现的环境，从而弥合了自动化实验与开放式科学探索之间的差距。
  tldr_cn: SciLink是一个多智能体AI框架，通过连接实验、新颖性评估和理论，实现材料表征中的偶然发现操作化。
