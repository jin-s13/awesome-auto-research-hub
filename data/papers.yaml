  title_cn: 'CriticAL: 基于语言模型的批评自动化'
  abstract_cn: 通过模型理解世界是科学研究的基本目标。尽管基于大型语言模型（LLM）的方法在自动化科学发现方面显示出前景，但它们常常忽视了批评科学模型的重要性。批评模型可以加深科学理解，并推动更准确模型的发展。自动化模型批评是困难的，因为传统上需要人类专家定义如何比较模型与数据，并评估差异是否显著——这两者都依赖于对建模假设和领域的理解。尽管基于LLM的批评方法很有吸引力，但它们引入了新的挑战：LLM本身可能会产生幻觉式的批评。受此启发，我们提出了CriticAL（基于语言模型的批评自动化）。CriticAL利用LLM生成捕捉模型预测与数据之间差异的汇总统计量，并应用假设检验来评估其显著性。我们可以将CriticAL视为一个验证器，通过将模型及其批评嵌入假设检验框架中来验证它们。在实验中，我们从关键的定量和定性维度评估了CriticAL。在合成模型与数据集之间差异的场景中，CriticAL可靠地生成正确的批评，而不会产生幻觉式的错误批评。我们表明，人类和LLM评审员一致认为CriticAL的批评在透明性和可操作性方面优于其他方法。最后，我们展示了CriticAL的批评使得LLM科学家能够在真实世界数据集上改进人类设计的模型。
  tldr_cn: CriticAL利用语言模型自动生成汇总统计和假设检验以批评模型，减少幻觉。
