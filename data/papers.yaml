    - 视觉-语言物理验证门控，通过检查渲染流场来检测求解器级别检查遗漏的静默失败
    - 三个耦合路径：固定求解器内的参数扫描、针对新物理模型的案例本地C++库编译、以及针对参考比较器的开放式假设搜索
    methodology: AI CFD Scientist使用GPT-5.5骨干网络，通过Foam-Agent在OpenFOAM上运行，包含三个耦合路径：参数扫描、将新物理模型编译为C++库、以及开放式假设搜索。一个中央视觉-语言门控在结果被接受、重新运行或写入之前检查渲染流场以验证物理有效性。
    key_results: 该系统自主发现了一个Spalart-Allmaras运行时修正，在Reh=5600的周期性山丘上将下壁面Cf RMSE相对于DNS降低了7.89%；通用AI科学家基线（ARIS,
      DeepScientist）因缺少有效性门控而无法产生可辩护的主张；视觉-语言门控在植入失败消融中检测到了16个静默失败中的14个。
