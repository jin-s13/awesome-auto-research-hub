    - 五点社区议程：（1）构建结合LLM驱动构思与自动化实验的开放AutoRecLab原型；（2）建立基准和竞赛，评估智能体在最少人工输入下生成可复现RecSys发现的能力；（3）创建透明接受AI生成投稿的评审场所；（4）通过详细研究日志和元数据定义归属和可复现性标准；（5）促进关于自主研究中伦理、治理、隐私和公平的跨学科对话。
