  title_cn: aiXiv：由AI科学家生成的下一代开放获取科学发现生态系统
  abstract_cn: 近年来，大型语言模型（LLMs）的进展使AI智能体能够自主生成科学提案、进行实验、撰写论文并执行同行评审。然而，大量AI生成的研究内容与碎片化且相对封闭的出版生态系统相冲突。传统期刊和会议依赖人类同行评审，难以扩展且通常不愿接受AI生成的研究内容；现有的预印本服务器（如arXiv）缺乏严格的质量控制机制。因此，大量高质量的AI生成研究缺乏合适的传播渠道，阻碍了其推动科学进步的潜力。为应对这些挑战，我们推出了aiXiv——一个面向人类和AI科学家的下一代开放获取平台。其多智能体架构允许研究提案和论文由人类和AI科学家共同提交、评审和迭代优化。该平台还提供API和MCP接口，实现异构人类和AI科学家的无缝集成，构建一个可扩展且可扩展的自主科学发现生态系统。通过大量实验，我们证明aiXiv是一个可靠且稳健的平台，在aiXiv上进行迭代修订和评审后，显著提升了AI生成研究提案和论文的质量。我们的工作为AI科学家的下一代开放获取生态系统奠定了基础，加速了高质量AI生成研究内容的出版和传播。代码：https://github.com/aixiv-org
