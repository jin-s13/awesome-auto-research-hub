  title_cn: 评估Sakana的AI科学家：大胆的宣称、混合的结果，以及有希望的未来？
  abstract_cn: 迈向通用人工智能（AGI）和超级智能的重要一步是AI自主进行研究的能力——我们称之为人工研究智能（ARI）。如果机器能够自主生成假设、进行实验并撰写研究论文，这将彻底改变科学。Sakana最近推出了“AI科学家”，声称能够自主进行研究，即他们暗示已经实现了我们所说的ARI。AI科学家引起了广泛关注，但尚未进行彻底的独立评估。我们对AI科学家的评估揭示了关键缺陷。该系统的文献综述对新颖性的评估很差，经常将已有概念（例如，用于随机梯度下降的微批处理）误判为新颖。它在实验执行方面也存在困难：42%的实验因编码错误失败，而其他实验则产生了有缺陷或误导性的结果。代码修改很少，每次迭代平均仅增加8%的字符，表明适应性有限。生成的手稿缺乏充分依据，中位引用数为5篇，其中大部分过时（34篇中仅有5篇来自2020年或之后）。结构错误频繁出现，包括缺少图表、重复章节以及“结论在此”之类的占位文本。一些论文包含幻觉数值结果。尽管存在这些缺陷，AI科学家代表了研究自动化的一次飞跃。它能在极少人工输入的情况下生成完整的研究手稿，挑战了人们对AI驱动科学的预期。许多审稿人可能难以区分其工作与人类研究者。虽然其质量类似于匆忙完成的本科生论文，但其速度和成本效率前所未有，以6至15美元的成本和3.5小时的人工参与即可生成一篇完整论文，远超传统研究者。
  tldr_cn: 评估Sakana的AI科学家揭示严重缺陷：文献综述差、实验失败率高、代码改动少、结果幻觉。
