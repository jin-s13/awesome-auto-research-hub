  title_cn: AI可以学习科学品味
  abstract_cn: 伟大的科学家拥有强大的判断力和远见，这与我们所说的科学品味密切相关。在此，我们用该术语指代判断和提出具有高潜在影响力的研究想法的能力。然而，大多数相关研究侧重于提升AI科学家的执行能力，而增强AI的科学品味仍未被充分探索。在这项工作中，我们提出了基于社区反馈的强化学习（RLCF），一种利用大规模社区信号作为监督的训练范式，并将科学品味学习形式化为偏好建模与对齐问题。对于偏好建模，我们在70万对领域和时间匹配的高引用与低引用论文上训练Scientific
    Judge，以判断研究想法。对于偏好对齐，我们使用Scientific Judge作为奖励模型，训练策略模型Scientific Thinker，以提出具有高潜在影响力的研究想法。实验表明，Scientific
    Judge优于最先进的大语言模型（如GPT-5.2、Gemini 3 Pro），并能泛化到未来年份测试、未见领域和同行评审偏好。此外，Scientific
    Thinker提出的研究想法比基线具有更高的潜在影响力。我们的发现表明，AI可以学习科学品味，这标志着向达到人类水平的AI科学家迈出了关键一步。
  tldr_cn: 提出RLCF训练AI判断和提出高影响力研究想法，表明AI能学习科学品味。
  analysis_cn:
    innovations:
    - 基于社区反馈的强化学习（RLCF）范式，从大规模社区信号中学习科学品味
