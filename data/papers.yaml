- id: deterministic-integrity-gates-for-llm-assisted-clinical-manu-2026
  title: 'Deterministic Integrity Gates for LLM-Assisted Clinical Manuscript Preparation:
    An Auditable Biomedical Informatics Architecture'
  authors:
  - Yoojin Nam
  - Jinhoon Jeong
  - Namkug Kim
  abstract: 'As autonomous research agents and AI co-scientist systems push large
    language models (LLMs) from drafting toward end-to-end manuscript production,
    the bottleneck shifts from generation to verification. Fluent LLM output can hide
    fabricated citations, numbers that drift from source tables, and unmet reporting-guideline
    items; existing tools generate without verifying, and self-critique inherits the
    blind spots that produce confident fabrication. We describe an architecture pairing
    generation with verification, resting on three principles: decompose the workflow
    into self-contained skills, gate every stage transition with halt-on-failure,
    and resolve each integrity question with the cheapest sufficient mechanism, a
    deterministic, re-executable check where one suffices and a prose-level probe
    only where interpretation is unavoidable. This determinism-where-possible split,
    organized as an integrity-gate taxonomy, is the core contribution. It is realized
    as MedSci Skills, an open-source toolkit of 43 skills with a 21-detector deterministic
    tier, evaluated on three public-dataset pipelines (STARD, PRISMA, STROBE) and
    a seeded-defect ablation. Across the three pipelines every content-hash manifest
    verified clean and the gates surfaced real defects; on 27 identical injected defects
    the deterministic gates detected all 27 with no false positives on the matched
    clean fixtures, whereas a single-prompt LLM reviewer detected 11, its misses in
    code, bibliography, and style defects the prose hides. Determinism-where-possible
    verification yields an auditable, re-executable trail that exposes the evidence
    a human needs to check an LLM-assisted manuscript: feasibility and reproducibility
    evidence, not a claim of human-competitive quality, which a separate blinded study
    addresses. MedSci Skills is MIT-licensed and archived (v3.8.0).'
