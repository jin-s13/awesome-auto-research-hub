  analysis:
    innovations:
    - Experiment-guided hypothesis ranking using simulated experimental feedback
    - Domain-specific simulator modeling hypothesis performance as similarity to hidden
      ground truth with noise
    - In-context reinforcement learning (ICRL) framework for sequential decision-making
      in hypothesis ranking
    - LLM-based policy that decomposes hypotheses into functional elements, clusters
      by mechanistic roles, and prioritizes recombinations
    methodology: The paper proposes a simulator grounded in domain-specific concepts
      that models hypothesis performance as a function of similarity to a hidden ground
      truth, perturbed by noise, and validates it against 124 experimentally reported
      outcomes. Experiment-guided ranking is framed as a sequential decision-making
      problem, and an in-context reinforcement learning (ICRL) framework is introduced,
      where an LLM-based policy decomposes hypotheses into functional elements, clusters
      them by mechanistic roles, and prioritizes recombinations based on simulated
      feedback.
    key_results: The simulator approximates real experimental results with consistent
      trend alignment, and the ICRL policy significantly outperforms pre-experiment
      baselines and strong ablations.
    limitations:
    - Simulator exhibits deviations from real experimental outcomes, though they mimic
      wet-lab noise
    - Validation limited to 124 hypotheses
    - Policy is a proof of concept and not tested on real-world experimental feedback
  title_cn: MOOSE-Chem3：通过模拟实验反馈实现实验引导的假设排序
  abstract_cn: 假设排序对于自动化科学发现至关重要，尤其是在成本高昂、通量有限的自然科学领域。当前方法侧重于实验前排序，仅依赖语言模型推理而无经验反馈。我们引入实验引导的排序，即根据先前测试的反馈对假设进行优先级排序。由于真实实验不可行，我们提出一个基于领域特定概念的模拟器，将假设性能建模为与隐藏真实值的相似度函数，并加入噪声扰动。通过对124个具有实验报告结果的假设进行验证，该模拟器能够近似真实结果并保持一致的趋势对齐。尽管存在偏差，但这些偏差模拟了湿实验噪声，有助于促进更鲁棒的排序策略。我们将实验引导的排序建模为序列决策问题，并提出一个上下文强化学习（ICRL）框架。我们的基于LLM的策略将假设分解为功能元素，按机制角色聚类，并根据反馈优先重组。实验表明，我们的方法显著优于实验前基线及强消融模型。我们的工具包（包括模拟器和ICRL框架）能够系统研究实验引导的排序，该策略作为强有力的概念验证。
  tldr_cn: 提出实验引导的假设排序，利用领域模拟器和上下文强化学习，在124个真实假设上验证。
  analysis_cn:
    innovations:
    - 利用模拟实验反馈进行实验引导的假设排序
    - 基于领域特定概念的模拟器，将假设性能建模为与隐藏真实值的相似度并加入噪声
    - 用于假设排序序列决策的上下文强化学习（ICRL）框架
    - 基于LLM的策略，将假设分解为功能元素、按机制角色聚类并优先重组
    methodology: 本文提出一个基于领域特定概念的模拟器，将假设性能建模为与隐藏真实值的相似度函数并加入噪声扰动，并通过124个实验报告结果进行验证。实验引导的排序被建模为序列决策问题，引入上下文强化学习（ICRL）框架，其中基于LLM的策略将假设分解为功能元素，按机制角色聚类，并根据模拟反馈优先重组。
    key_results: 模拟器能够近似真实实验结果并保持一致的趋势对齐，ICRL策略显著优于实验前基线及强消融模型。
    limitations:
    - 模拟器与真实实验结果存在偏差，但模拟了湿实验噪声
    - 验证仅限于124个假设
    - 策略仅为概念验证，未在真实实验反馈上测试
