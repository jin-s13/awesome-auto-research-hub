  abstract_cn: 自主科学发现系统通过自动化假设生成与验证过程，有望加速研究进展。然而，当前系统在受限搜索空间内运行或需要预定义研究问题，限制了其进行真正开放式探究的能力。此外，尽管它们能迭代生成假设，但大多缺乏显式综合自身累积发现以揭示复杂互联现象的能力。我们提出DiscoPER，一个自主的大语言模型驱动框架，通过动态生成并执行代码来探索数据集，无需预设研究目标，从而实现开放式研究。为确保严格的科学有效性，每个提出的发现必须通过统计检验。为克服孤立搜索的局限性，我们的框架引入了一种二阶推理机制，定期分析自身累积的发现。通过将先前发现视为经验数据，DiscoPER识别结构模式、混杂因素和认知空白，主动将假设探索引导至搜索空间中未开发的区域。通过整合工具使用进一步扩展搜索空间，使系统能够无缝处理多模态来源（如图像）中的有用信息，从而探索超越结构化元数据的假设。在iNatDisco（一个具有来自同行评审文献的模式级真实标注的新型多模态生态知识基准）上评估，DiscoPER以72.7%的假设支持率恢复了9个已知模式中的8个，优于经典因果发现和LLM引导的基线方法。消融实验表明，DiscoPER随数据量增加而扩展，并证实了二阶元反思的益处。
  tldr_cn: DiscoPER利用大语言模型、迭代元反思和统计检验进行开放式科学发现，在多模态生态基准上评估。
