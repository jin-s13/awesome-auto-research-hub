    methodology: 作者开发了一个Python库，用于与扫描探针显微镜接口，允许从本地计算机和远程高性能计算资源进行控制。然后他们创建了一个平台，将SPM操作分类为固定策略（预定义）或奖励驱动（机器学习引导）工作流，从而实现常规自动化和自主科学发现。
