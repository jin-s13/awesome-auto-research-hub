  title_cn: 受物理约束的基础模型的智能体演化
  abstract_cn: 人工智能日益推动自动化科学发现，然而当代通用智能体缺乏物理基础，经常产生与硬件不兼容的设计幻觉。本文提出一个物理基础的多智能体发现引擎，能够自主构建符合硬件要求的计算系统。该框架以结构化过去科学创新的演化知识图谱为核心，提取“算法思维链”，将盲目的随机搜索转化为定向的结构演化。应用于基础模型部署这一极端测试场景，该引擎演化出两种超越人工启发式方法的硬件感知压缩方法：Q-Enhance缓解了密集模型中的长上下文精度损失，MoE-Salient-AQ在亚3比特条件下比最先进的手工稀疏混合专家设计高出3.7%。利用带宽高效的敏感度分布，我们成功将一个2350亿参数的大模型部署到受限的双A100服务器上，内存需求降低75%，精度仅下降0.64%。通过将无约束的组合搜索转化为知识驱动的自主性，这为在严格物理边界内进行机器驱动的发现建立了一种可扩展的硬件-软件协同设计范式。
  tldr_cn: 一个物理约束的多智能体引擎自主演化出硬件感知的压缩方法，在大型基础模型上超越人工启发式方法。
