- id: act-as-a-real-researcher-a-suite-of-benchmarks-evaluating-f-2026
  title: 'Act As a Real Researcher: A Suite of Benchmarks Evaluating Frontier LLMs
    and Agentic Harnesses in Research Lifecycle'
  authors:
  - Jiayu Wang
  - Weijiang Lv
  - Bowen Fu
  - Jing Fu
  - Jiayi Song
  - Lingyu Zhang
  - Lanxuan Xue
  - Luodi Chen
  - Zepeng Xin
  - Kaiyu Li
  - Xiangyong Cao
  abstract: As foundation models advance and agent scaffolding becomes increasingly
    sophisticated, agents have demonstrated remarkable proficiency in complex, long-horizon
    coding tasks and even autonomous experiment execution. Despite their evolution
    from research assistants into autonomous research agents, these systems still
    exhibit significant limitations in field sensitivity, research ethics, and nuanced
    scientific judgment. Consequently, frontier agents remain unable to fully replace
    human researchers. To bridge this gap, we conceptualize the AARR (Act As a Real
    Researcher) benchmark series. Unlike existing benchmarks that primarily assess
    macro-level execution capabilities, AARR focuses on whether agents can emulate
    the professionalism, thoroughness, and nuanced reasoning that characterize human
    researchers in granular research scenarios. In this work, we propose AARRI-Bench
    (Act As a Real Research Intern), the first benchmark in this series. We conduct
    extensive experiments across frontier models and agentic systems, revealing that
    even the best-performing configuration (Mini-SWE-Agent with Claude Opus 4.7) achieves
    only 68.3\% success rate, frequently overlooking subtle yet critical details that
    are obvious to real human researchers. Our results indicate that developing researcher-like
    AI requires further exploration of research behavior, rather than merely complex
    scaffolding. Our data is released at https://github.com/AARR-bench/AARRI-bench.
