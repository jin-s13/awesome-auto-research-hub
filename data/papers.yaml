  abstract_cn: 大型语言模型的最新进展催生了旨在自主分析生物数据并辅助科学发现的AI科学家。尽管进展迅速，但这些系统能从真实实验数据中提取有意义的生物学见解的程度仍不明确。现有基准要么在无数据情况下评估推理，要么关注预定义的分析输出，未能反映真实的数据驱动的生物学研究。在此，我们介绍BAISBench（生物学AI科学家基准），这是一个在真实单细胞转录组数据集上评估AI科学家的基准。BAISBench包含两个任务：跨15个专家标注数据集的细胞类型注释，以及通过从41篇已发表单细胞研究中报告的生物学结论衍生出的193道选择题进行科学发现。我们使用BAISBench评估了几个代表性的AI科学家，并邀请了六名研究生水平的生物信息学家共同完成相同任务，以提供人类表现基线。结果表明，尽管当前的AI科学家尚未达到完全自主的生物学发现，但已展现出支持数据驱动生物学研究的巨大潜力。这些结果使BAISBench成为描述AI科学家在生物学研究中当前能力和局限性的实用基准。我们期望BAISBench能作为一个实用的评估框架，指导开发更强大的AI科学家，并帮助生物学家识别能有效支持实际研究工作流程的AI系统。BAISBench可在以下网址获取：https://github.com/EperLuo/BAISBench,
    https://huggingface.co/datasets/EperLuo/BaisBench。
  tldr_cn: 介绍BAISBench，一个在真实单细胞转录组数据上评估AI科学家进行细胞注释和生物学发现的基准。
