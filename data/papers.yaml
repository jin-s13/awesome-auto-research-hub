  title_cn: LAB-Bench：衡量语言模型在生物学研究中的能力
  abstract_cn: 前沿大型语言模型（LLMs）及LLM增强系统有望快速加速跨学科的科学发现，这一观点被广泛看好。目前，存在许多衡量LLM在教科书式科学问题上知识和推理能力的基准，但几乎没有基准旨在评估语言模型在科学研究所需实际任务（如文献搜索、方案规划和数据分析）上的表现。作为构建此类基准的一步，我们引入了语言代理生物学基准（LAB-Bench），这是一个包含超过2400道多项选择题的广泛数据集，用于评估AI系统在生物学研究实际能力上的表现，包括文献回忆与推理、图表解读、数据库访问与导航，以及DNA和蛋白质序列的理解与操作。重要的是，与之前的科学基准不同，我们期望一个能够在较难的LAB-Bench任务上持续获得高分的AI系统，将在文献搜索和分子克隆等领域成为研究者的有用助手。作为对前沿语言模型涌现的科学任务能力的初步评估，我们测量了多个模型在此基准上的表现，并报告了与人类生物学专家研究者相比的结果。我们将随时间持续更新和扩展LAB-Bench，并期望它成为未来自动化研究系统开发中的有用工具。LAB-Bench的一个公开子集可通过以下URL使用：https://huggingface.co/datasets/futurehouse/lab-bench
  tldr_cn: LAB-Bench：2400+多项选择题数据集，评估LLM在文献搜索、数据分析生物学研究任务的能力。
  analysis_cn:
    innovations:
    - 引入LAB-Bench，一个包含超过2400道多项选择题的广泛数据集，专门用于评估AI系统在生物学研究实际任务（文献搜索、方案规划、数据分析、图表解读、数据库导航、DNA/蛋白质序列操作）上的表现。
    - 从教科书式科学基准转向评估真实研究辅助所需的能力，明确目标是在困难任务上获得高分将表明其作为自动化研究助手的有用性。
    methodology: 我们构建了LAB-Bench，一个包含超过2400道多项选择题的数据集，涵盖文献回忆与推理、图表解读、数据库访问和序列理解。随后，我们在此基准上评估了多个前沿大型语言模型，并将其表现与人类生物学专家研究者进行了比较。
    key_results: 在LAB-Bench上测量了多个前沿语言模型的表现，并与人类生物学专家研究者进行了比较，但摘要中未详细说明具体的定量结果。
    limitations:
    - 该基准仅限于多项选择题，可能无法捕捉真实生物学研究中所需的开放式推理和创造力。
    - 仅发布了数据集的公开子集，这可能限制完全的可重复性和独立评估。
    - 作为初步基准，它尚未涵盖所有实际生物学研究任务，需要持续扩展和更新。
    - 摘要未提供定量结果或模型与人类专家之间性能差距的分析，使得当前能力评估不明确。
