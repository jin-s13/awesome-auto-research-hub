- id: cycleresearcher-improving-automated-research-via-automated-2024
  title: 'CycleResearcher: Improving Automated Research via Automated Review'
  authors:
  - Yixuan Weng
  - Minjun Zhu
  - Guangsheng Bao
  - Hongbo Zhang
  - Jindong Wang
  - Yue Zhang
  - Linyi Yang
  abstract: The automation of scientific discovery has been a long-standing goal within
    the research community, driven by the potential to accelerate knowledge creation.
    While significant progress has been made using commercial large language models
    (LLMs) as research assistants or idea generators, the possibility of automating
    the entire research process with open-source LLMs remains largely unexplored.
    This paper explores the feasibility of using open-source post-trained LLMs as
    autonomous agents capable of performing the full cycle of automated research and
    review, from literature review and manuscript preparation to peer review and paper
    refinement. Our iterative preference training framework consists of CycleResearcher,
    which conducts research tasks, and CycleReviewer, which simulates the peer review
    process, providing iterative feedback via reinforcement learning. To train these
    models, we develop two new datasets, Review-5k and Research-14k, reflecting real-world
    machine learning research and peer review dynamics. Our results demonstrate that
    CycleReviewer achieves promising performance with a 26.89\% reduction in mean
    absolute error (MAE) compared to individual human reviewers in predicting paper
    scores, indicating the potential of LLMs to effectively assist expert-level research
    evaluation. In research, the papers generated by the CycleResearcher model achieved
    a score of 5.36 in simulated peer reviews, showing some competitiveness in terms
    of simulated review scores compared to the preprint level of 5.24 from human experts,
    while still having room for improvement compared to the accepted paper level of
    5.69. This work represents a significant step toward fully automated scientific
    inquiry, providing ethical safeguards and exploring AI-driven research capabilities.
    The code, dataset and model weight are released at https://wengsyx.github.io/Researcher/.
