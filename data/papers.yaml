  title_cn: AblationBench：评估实证人工智能研究中消融实验的自动规划
  abstract_cn: 语言模型智能体越来越多地被用于自动化科学研究，但评估其科学贡献仍然是一个挑战。获得此类洞察的关键机制是通过消融实验。为此，我们引入了AblationBench，一个用于评估智能体在实证人工智能研究中规划消融任务的基准套件。它包括两个任务：AuthorAblation（帮助作者基于方法部分提出消融实验，包含83个实例）和ReviewerAblation（帮助审稿人在完整论文中发现缺失的消融实验，包含350个实例）。对于这两个任务，我们开发了基于LM的评判器作为自动评估框架。我们对前沿LM的实验表明，这些任务仍然具有挑战性，表现最佳的LM系统平均仅识别出45%的原始消融实验，低于人类水平。我们观察到作者任务和审稿人任务之间存在相反的性能趋势，这归因于模型基础差异。最后，我们分析了当前LM在这些任务上的局限性，并发现思维链提示优于基于智能体的方法。我们的数据可在https://huggingface.co/collections/ai-coscientist/ablationbench获取，代码可在https://github.com/ai-scientist-bench/ablation-bench获取。
  tldr_cn: 提出AblationBench基准，用于评估LM智能体在AI研究中规划消融实验，发现当前LM表现不如人类。
  analysis_cn:
    innovations:
    - 引入了AblationBench，一个用于评估实证人工智能研究中消融实验自动规划的基准套件。
    - 两个互补任务：AuthorAblation（从方法部分提出消融实验）和ReviewerAblation（在完整论文中发现缺失的消融实验）。
    - 基于LM的评判器用于自动评估消融规划。
    - 发现思维链提示在这些任务上优于基于智能体的方法。
    - 观察到作者任务和审稿人任务之间存在相反的性能趋势，归因于模型基础差异。
    methodology: AblationBench包含83个AuthorAblation实例和350个ReviewerAblation实例，使用基于LM的评判器进行评估。在前沿语言模型上测试两个任务，比较思维链提示与基于智能体的设置。
    key_results: 表现最佳的LM系统平均仅识别出45%的原始消融实验，低于人类水平。思维链提示优于基于智能体的方法，并观察到作者任务和审稿人任务之间存在相反的性能趋势。
    limitations:
    - 当前LM在消融识别上仅达到45%的召回率，仍低于人类水平。
    - 作者任务和审稿人任务之间的相反性能表明存在基础差异，限制了模型行为的一致性。
    tech_stack:
    - Language Models (LMs)
    - Chain-of-Thought Prompting
    - Agent-based framework
  grade: must_read
- id: accelerating-scientific-discovery-with-autonomous-goal-evolv-2025
  title: Accelerating Scientific Discovery with Autonomous Goal-evolving Agents
  authors:
  - Yuanqi Du
  - Botao Yu
  - Tianyu Liu
  - Tony Shen
  - Junwu Chen
  - Jan G. Rittig
  - Kunyang Sun
  - Yikun Zhang
  - Aarti Krishnan
  - Yu Zhang
  - Daniel Rosen
  - Rosali Pirone
  - Zhangde Song
  - Bo Zhou
  - Cassandra Masschelein
  - Yingze Wang
  - Haorui Wang
  - Haojun Jia
  - Chao Zhang
  - Hongyu Zhao
  - Martin Ester
  - Nir Hacohen
  - Teresa Head-Gordon
  - Carla P. Gomes
  - Huan Sun
  - Chenru Duan
  - Philippe Schwaller
  - Wengong Jin
  abstract: There has been unprecedented interest in developing agents that expand
    the boundary of scientific discovery, primarily by optimizing quantitative objective
    functions specified by scientists. However, for grand challenges in science, these
    objectives may only be imperfect proxies. We argue that automating objective function
    design is a central, yet unmet need for scientific discovery agents. In this work,
    we introduce the Scientific Autonomous Goal-evolving Agent (SAGA) to address this
    challenge. SAGA employs a bi-level architecture in which an outer loop of LLM
    agents analyzes optimization outcomes, proposes new objectives, and converts them
    into computable scoring functions, while an inner loop performs solution optimization
    under the current objectives. This bi-level design enables systematic exploration
    of the space of objectives and their trade-offs, rather than treating them as
    fixed inputs. We demonstrate the framework through a wide range of design applications,
    including antibiotics, nanobodies, functional DNA sequences, inorganic materials,
    and chemical processes. Notably, our experimental validation identifies a structurally
    novel hit with promising potency and safety profiles for E. coli in the antibiotic
    design task, and three de novo PD-L1 binders in the nanobody design task. These
    results suggest that automating objective formulation can substantially improve
    the effectiveness of scientific discovery agents.
