  title_cn: PhysMaster：构建自主AI物理学家进行理论和计算物理研究
  abstract_cn: 大语言模型的进步催生了具有与人类科学家相当的知识和操作能力的智能体，表明其有潜力协助、加速和自动化研究。然而，现有研究主要是在定义明确的基准或通用任务（如文献检索）上评估此类系统，限制了它们在开放科学场景中的端到端问题解决能力。这在物理学中尤为突出，因为物理学抽象、数学密集，且需要将分析推理与基于代码的计算相结合。为解决这一问题，我们提出了PhysMaster，一个基于LLM的智能体，充当自主的理论和计算物理学家。PhysMaster将抽象推理与数值计算相结合，并利用LANDAU（分层学术数据宇宙），该数据宇宙保存检索到的文献、整理好的先验知识以及经过验证的方法论痕迹，从而增强决策的可靠性和稳定性。它还采用自适应探索策略，平衡效率与开放式探索，使其在超长周期任务中表现稳健。我们在从高能理论、凝聚态理论到天体物理学的物理问题上评估了PhysMaster，包括：(i)
    加速——将劳动密集型研究从数月压缩至数小时；(ii) 自动化——自主执行假设驱动循环；(iii) 自主发现——独立探索开放问题。
  tldr_cn: PhysMaster是基于LLM的自主物理学家，融合推理与计算，采用自适应探索。
