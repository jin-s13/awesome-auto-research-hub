  title_cn: 重新思考出版：面向人工智能赋能研究的认证框架
  abstract_cn: 人工智能研究流水线现在能够生成可能满足现有同行评审标准（质量、新颖性和方法论严谨性）的学术工作。然而，出版系统建立在研究由人类作者产生的假设之上。因此，当知识主张可能有效但生产者部分或完全自动化时，该系统缺乏评估工作的明确方式。本文提出了一种针对人工智能生成研究的两层认证框架。第一层评估知识主张是否合理。第二层评估人类贡献的程度。这种分离使得期刊和会议能够更一致地评估流水线生成的工作，而无需创建新机构。该框架采用规范性分析、概念设计以及针对代表性提交案例的干运行验证。它将人类贡献分为三类：A类，工作可由自动化流水线完成；B类，需要在可识别阶段进行人类指导；C类，工作超出当前流水线能力，尤其是在问题制定阶段。本文还提出了专门用于完全公开的自动化研究的基准插槽。这些插槽将提供透明的出版路径，并帮助审稿人随时间校准判断。关键论点是，出版历来同时认证两件事：知识有效且由人类产生。人工智能研究流水线将这两个主张分离。通过将知识认证与作者归属解耦，所提出的框架回应了已经发生的结构性变化。它可以在现有编辑系统内实施，即使在归属不确定时也能工作，并基于认知价值而非仅凭人类起源来识别人类前沿贡献。
  tldr_cn: 提出一个两层认证框架，将知识有效性评估与人类贡献水平评估分离。
  analysis_cn:
    innovations:
    - 两层认证框架，将知识合理性评估与人类贡献评估解耦
    - 基于流水线能力将人类贡献分为三类（A、B、C）
    - 为完全公开的自动化研究设立专用基准插槽，以校准审稿人判断
