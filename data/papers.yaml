    methodology: 'TianJi-Environ is a multi-agent system coupled with the WRF-Chem
      model that autonomously translates mechanistic hypotheses into simulation experiments,
      executes them, and evaluates outputs against predefined evidence criteria. It
      is demonstrated on two case studies: summertime ozone over the North China Plain
      and wintertime PM2.5 over the Guanzhong Basin.'
    key_results: In the ozone case, the system detected aerosol-radiation-interaction
      signals but judged evidence for ozone response to NOx control incomplete. In
      the PM2.5 case, it localized the unsupported link to insufficient propagation
      from black-carbon perturbation to particulate response and missing diagnostics
      of vertical absorptive heating.
