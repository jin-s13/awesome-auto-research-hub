  title_cn: AI驱动发现中统计严谨性的结构性强制：一种函数式架构
  abstract_cn: AI-Scientist系统可能通过不受控制的多重检验制造虚假发现。我们提出一种函数式架构，在两个层面强制统计严谨性：一个Haskell嵌入式领域特定语言（Research
    monad），使得在不更新误差预算的情况下无法检验假设；以及一个声明式脚手架，由操作系统级沙箱支持，使验证数据在物理上远离LLM生成的代码运行的环境。我们将设计基于机器检查的Lean
    4形式化LORD++在线错误发现率（FDR）控制：推导其误差预算并证明边际和完全FDR控制，然后通过SPARK/Ada中验证预算的财富不变性在IEEE 754算术上，弥合与实现之间的差距。据我们所知，这是首个从定理到浮点实现的在线FDR程序的验证链。在模拟中，该架构将错误发现率保持在接近1%（目标为5%），而朴素方法达到41%。在端到端案例研究中，有效测试避免了有缺陷测试产生的虚假发现，但在数据允许时仍能发现真实效应。对抗性评估证实，生成的代码即使被给予确切路径也无法读取保留数据。
  tldr_cn: 一种函数式架构通过monadic DSL和形式化验证控制错误发现率，强制AI驱动发现的统计严谨性。
