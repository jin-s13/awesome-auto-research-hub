  title_cn: AISSISTANT：数据科学中的人机协作综述与展望研究工作流
  abstract_cn: 高质量的科研综述与展望论文需要大量时间和精力，限制了研究者综合新兴知识的能力。尽管大语言模型（LLM）利用AI科学家进行科研工作流，现有框架主要关注自主工作流，人类干预非常有限。我们提出了AIssistant，这是首个用于数据科学中人类与AI协作生成科学展望与综述研究的开源智能体框架。AIssistant采用专门的LLM驱动智能体，并辅以外部学术工具，允许在整个工作流中进行人类干预。该框架包含两个主要的多智能体系统：包含七个智能体的研究工作流和包含八个智能体的论文写作工作流。我们通过人类专家评审和基于LLM的评估（遵循NeurIPS标准）进行了全面评估。实验表明，OpenAI
    o1在使用链式思维提示和增强文献搜索工具时取得了最高质量分数。我们还进行了一项人机交互调查，结果显示节省了65.7%的时间。我们相信，这项工作为数据科学中综述与展望研究的人机协作科学工作流建立了基线，证明了智能体增强的流水线在通过战略人类监督保持研究完整性的同时，大幅减少了工作量。
  tldr_cn: AIssistant是一个开源的人机协作框架，利用LLM代理和人类监督生成数据科学综述与展望论文。
  analysis_cn:
    innovations:
    - 首个用于数据科学中人类与AI协作生成科学展望与综述研究的开源智能体框架。
    - 包含两个工作流的多智能体系统：研究工作流（7个智能体）和论文写作工作流（8个智能体），全程允许人类干预。
    - 将LLM驱动智能体与外部学术工具集成，实现增强的文献搜索。
    - 使用人类专家评审和基于LLM的评估（遵循NeurIPS标准）进行全面评估。
    - 人机交互调查显示节省65.7%的时间。
    methodology: 该框架包含两个多智能体系统：一个包含七个智能体的研究工作流和一个包含八个智能体的论文写作工作流，所有智能体均由LLM驱动并辅以外部学术工具。全程允许人类干预。评估通过人类专家评审和基于LLM的评估（遵循NeurIPS标准）进行，外加测量时间节省的人机交互调查。
