- id: position-intelligent-science-laboratory-requires-the-integr-2025
  title: 'Position: Intelligent Science Laboratory Requires the Integration of Cognitive
    and Embodied AI'
  authors:
  - Sha Zhang
  - Suorong Yang
  - Tong Xie
  - Xiangyuan Xue
  - Zixuan Hu
  - Rui Li
  - Wenxi Qu
  - Zhenfei Yin
  - Tianfan Fu
  - Di Hu
  - Andres M Bran
  - Nian Ran
  - Bram Hoex
  - Wangmeng Zuo
  - Philippe Schwaller
  - Wanli Ouyang
  - Lei Bai
  - Yanyong Zhang
  - Lingyu Duan
  - Shixiang Tang
  - Dongzhan Zhou
  abstract: 'Scientific discovery has long been constrained by human limitations in
    expertise, physical capability, and sleep cycles. The recent rise of AI scientists
    and automated laboratories has accelerated both the cognitive and operational
    aspects of research. However, key limitations persist: AI systems are often confined
    to virtual environments, while automated laboratories lack the flexibility and
    autonomy to adaptively test new hypotheses in the physical world. Recent advances
    in embodied AI, such as generalist robot foundation models, diffusion-based action
    policies, fine-grained manipulation learning, and sim-to-real transfer, highlight
    the promise of integrating cognitive and embodied intelligence. This convergence
    opens the door to closed-loop systems that support iterative, autonomous experimentation
    and the possibility of serendipitous discovery. In this position paper, we propose
    the paradigm of Intelligent Science Laboratories (ISLs): a multi-layered, closed-loop
    framework that deeply integrates cognitive and embodied intelligence. ISLs unify
    foundation models for scientific reasoning, agent-based workflow orchestration,
    and embodied agents for robust physical experimentation. We argue that such systems
    are essential for overcoming the current limitations of scientific discovery and
    for realizing the full transformative potential of AI-driven science.'
