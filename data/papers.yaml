  title_cn: AI科学家的能力取决于其证据：药物资产估值中专有数据与推理技能的分层消融研究
  abstract_cn: AI科学家智能体常被评估为能力主要取决于模型质量、提示或推理框架。我们在药物资产估值中测试了一个不同的假设：对于知识密集型科学决策，限制因素往往是智能体可访问的证据基础。我们针对一个生产级估值智能体进行了受控的三臂消融实验：A组为仅使用网络的普通LLM分析师，B组增加了公共结构化工具、14维度估值手册、验证器、客观性策略和红队，C组进一步增加了专有的Noah
    AI语料库（包含精选的管线、试验和交易情报）。在13资产分层基准上，B组改善了校准和审计纪律：区间内准确率从0.80提升至0.89，客观性从3.16提升至3.30。但B组并未消除事实天花板。在能力超集核算下，A组和B组仅恢复了精选黄金竞争记录的0.25和0.38，而C组恢复了0.96；在精选长尾子集上，C组达到0.93，而A/B组为0.26/0.30。原始盲审决策质量A组与B组相似（7.01
    vs. 6.96），因此我们引入了完整性感知决策效用：知情决策质量 = 决策质量 × 黄金覆盖率。在该指标上，C组达到7.43，而A/B组为1.76/2.57。即使一份完美的非专有数据报告，受B组覆盖率的限制，其上限也仅为3.83。结果并非推理框架不重要——它们改善了校准和纪律；而是专有证据设定了AI科学家所能知晓并据此决策的上限。
  tldr_cn: 限制人工智能科学家在药物资产估值中表现的是证据基础而非推理框架；专有数据显著提升覆盖率和决策质量。
  analysis_cn:
    innovations:
    - 分层三臂消融实验，分离了专有证据基础与推理框架在药物资产估值AI智能体中的影响
    - 引入完整性感知决策效用指标：知情决策质量 = 决策质量 × 黄金覆盖率
    - 证明专有数据设定了AI科学家所能知晓的上限，推理框架虽能改善校准与纪律，但无法消除事实天花板
    methodology: 受控三臂消融实验，针对一个生产级药物资产估值智能体，在13资产分层基准上进行。A组使用仅网络的普通LLM分析师；B组增加公共结构化工具、14维度估值手册、验证器、客观性策略和红队；C组进一步增加专有的Noah
      AI语料库（包含精选的管线、试验和交易情报）。评估指标包括区间内准确率、客观性分数、黄金竞争记录恢复率、原始决策质量以及提出的完整性感知决策效用。
    key_results: B组将区间内准确率从0.80提升至0.89，客观性从3.16提升至3.30，但未提升事实天花板；C组恢复了黄金竞争记录的0.96，而A/B组为0.25/0.30；在完整性感知决策效用上，C组达到7.43，A/B组为1.76/2.57，即使完美的非专有数据报告受B组覆盖率限制，上限仅为3.83。
    limitations:
    - 研究仅限于单一领域（药物资产估值）和特定专有数据集（Noah AI语料库）
    - 基准规模较小（13个资产），可能限制泛化性
    - 完整性感知效用指标依赖于黄金覆盖率估计，该估计可能具有数据集特异性
    - 即使完美的非专有数据报告也受公共工具覆盖率的限制，如3.83上限所示
