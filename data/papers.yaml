    key_results: SAGE将包含指标的输出从42%提升至92%（相对于反思基线），工件质量从5.00/10提升至6.75/10，盲评分数达到52.0，而AI-Scientist-v2为48.2，增益集中在代码开发和执行上。
    limitations:
