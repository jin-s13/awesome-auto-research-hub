  abstract_cn: 评估科学研究质量对于学术交流至关重要，但广泛使用的方法在可扩展性、主观性和时间延迟方面存在局限性。大型语言模型（LLMs）的最新进展为基于文本内容的自动化研究评估提供了新的机会。本研究通过将LLMs的输出与专家判断和基于引用的指标进行基准测试，考察了LLMs是否能够支持发表后的同行评审任务。利用H1
    Connect平台上的文章构建了两个评估任务：识别高质量文章以及进行更细粒度的评估，包括文章评分、价值分类和专家风格评论。在多种学习策略下评估了多个模型系列，包括BERT模型、通用LLMs和面向推理的LLMs。结果表明，LLMs在粗粒度评估任务中表现良好，识别高度推荐文章的准确率超过0.8。然而，在细粒度评分任务中，性能显著下降。少样本提示（few-shot
