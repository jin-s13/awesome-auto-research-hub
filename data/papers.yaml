      that further development is needed for a fully mature solution.
  title_cn: AutoSciDACT：基于对比嵌入与假设检验的自动化科学发现
  abstract_cn: 大型科学数据集中的新颖性检测面临两个关键挑战：实验数据的噪声和高维特性，以及需要对任何观察到的异常值做出统计上稳健的陈述。尽管在通过降维进行异常检测方面有大量文献，但大多数方法无法产生与可量化的科学发现声明兼容的输出。在这项工作中，我们直接应对这些挑战，提出了迈向适应科学严格统计需求的新颖性检测统一流水线的第一步。我们引入了AutoSciDACT（基于异常对比检验的自动化科学发现），这是一个用于检测科学数据中新颖性的通用流水线。AutoSciDACT首先通过对比预训练创建富有表现力的低维数据表示，利用许多科学领域中大量高质量的模拟数据以及能够指导有原则的数据增强策略的专业知识。然后，这些紧凑的嵌入使得能够使用新物理学习机（NPLM）框架进行极其灵敏的基于机器学习的两样本检验，该框架识别并统计量化观测数据相对于参考分布（零假设）的偏差。我们在天文学、物理学、生物学、图像和合成数据集上进行实验，展示了在所有领域中对少量异常数据注入的强敏感性。
  tldr_cn: AutoSciDACT通过对比嵌入与假设检验自动检测科学数据中的新颖性，跨领域验证。
  analysis_cn:
    innovations:
    - 结合对比嵌入与统计假设检验的统一流水线，用于具有可量化科学声明的新颖性检测。
    - 在模拟数据上进行对比预训练，结合有原则的数据增强，以创建富有表现力的低维表示。
    - 将新物理学习机（NPLM）框架作为基于机器学习的两样本检验集成，以统计量化与参考分布的偏差。
    - 通用设计，在多个科学领域（天文学、物理学、生物学、成像、合成数据）得到验证。
    methodology: AutoSciDACT首先通过对比预训练，利用模拟数据和领域知识指导的数据增强学习低维嵌入。然后将这些嵌入输入NPLM框架，该框架执行两样本检验，以检测并统计量化与零假设参考分布的偏差。该流水线在涵盖天文学、物理学、生物学、图像和合成数据的多个数据集上进行了评估。
    key_results: 该流水线在所有测试领域（包括天文、物理、生物、图像和合成数据集）中对少量异常数据注入表现出强敏感性。
    limitations:
    - 该工作被呈现为迈向统一流水线的第一步，表明需要进一步开发才能形成完全成熟的解决方案。
