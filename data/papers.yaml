  title_cn: SciResearcher：面向前沿科学推理的深度研究智能体扩展
  abstract_cn: 前沿科学推理正迅速成为推动AI智能体在自动化科学发现中发展的关键基础。深度研究智能体为这一挑战提供了有前景的方法。这些模型通过在信息寻求任务上进行后训练来发展强大的问题解决能力，这些任务通常通过知识图谱构建或迭代网页浏览来策划。然而，这些策略在前沿科学中面临固有局限性，因为领域特定知识分散在稀疏且异构的学术来源中，而问题解决需要远超事实回忆的复杂计算和推理。为弥补这一差距，我们引入了SciResearcher，一个用于前沿科学数据构建的全自动智能体框架。SciResearcher综合了基于学术证据的多样化概念和计算任务，同时激发信息获取、工具集成推理和长期规划能力。利用策划的数据进行监督微调和智能体强化学习，我们开发了SciResearcher-8B，一个智能体基础模型，在HLE-Bio/Chem-Gold基准上达到19.46%，在其参数规模上建立了新的最先进水平，并超越了多个更大的专有智能体。它还在SuperGPQA-Hard-Biology和TRQA-Literature基准上实现了13-15%的绝对提升。总体而言，SciResearcher为前沿科学推理的自动化数据构建引入了新范式，并为未来的科学智能体提供了可扩展的路径。
  tldr_cn: SciResearcher是一个用于构建前沿科学数据的自动化智能体框架，通过8B模型在科学基准上实现了最先进的推理能力。
