  analysis:
    innovations:
    - Distributed self-driving laboratory (SDL) enabling collaboration among geographically
      dispersed researchers via a shared central database.
    - Integration of FAIR data infrastructure (ResultsDB) with automated data processing
      (Sim2L) for automatic indexing and model updates.
    - Active learning workflow for sequential optimization that trains machine learning
      models on-the-fly using all existing data.
    - Frugal twin concept applied to a simple, accessible color-mixing task to demonstrate
      collaborative optimization with inexpensive materials.
    methodology: The methodology implements a distributed SDL on nanoHUB services,
      where collaborators submit raw experimental data through a web interface; data
      is automatically processed by Sim2L to extract derived quantities and indexed
      in a FAIR repository (ResultsDB). A separate nanoHUB workflow enables sequential
      optimization via active learning, training ML models on all accumulated data
      to guide future experiments, demonstrated with a frugal twin color-mixing task.
    key_results: The framework successfully enables collaborative data sharing and
      automatic model updating, with a proof-of-concept frugal twin demonstration
      for optimizing food dye mixtures to achieve a target color.
    limitations:
    - The demonstration is limited to a simple color-mixing optimization task, leaving
      scalability to more complex scientific problems unaddressed.
    - The system's dependence on nanoHUB infrastructure may restrict adoption outside
      that ecosystem.
    - No quantitative performance metrics or comparisons to non-collaborative optimization
      approaches are provided.
  title_cn: 基于FAIR数据与计算基础设施的协作数字孪生
  abstract_cn: 机器学习与自动化实验在自动驾驶实验室(SDL)中的结合，为加速科学和工程应用中的发现与优化任务提供了强大方法。当得到可查找、可访问、可互操作、可重用(FAIR)数据基础设施支持时，具有重叠兴趣的SDL可以更有效地协作。本工作提出了一种基于nanoHUB服务的分布式SDL实现，用于在线仿真和FAIR数据管理。在该框架中，地理上分散的合作者进行独立的优化任务，将原始实验数据贡献到共享中央数据库。这些研究人员随后可以受益于分析工具和机器学习模型，这些模型随着新数据的加入而自动更新。新数据点通过简单的网页界面提交，并由nanoHUB
    Sim2L自动处理，提取导出量并将所有输入和输出索引到名为ResultsDB的FAIR数据存储库中。另一个nanoHUB工作流通过主动学习实现顺序优化，研究人员定义优化目标，机器学习模型利用所有现有数据即时训练，指导未来实验的选择。受“frugal
    twin”概念的启发，优化任务旨在找到组合食用色素以达到目标颜色的最佳配方。借助易于获取且成本低廉的材料，研究人员和学生可以自行设置实验、与协作者共享数据，并探索FAIR数据、预测性ML模型和顺序优化的结合。所引入的工具具有通用性，可轻松扩展到其他优化问题。
  tldr_cn: 利用FAIR数据和主动学习的分布式自动驾驶实验室，通过食用色素调色演示协作优化。
  analysis_cn:
    innovations:
    - 分布式自动驾驶实验室(SDL)，通过共享中央数据库实现地理分散的研究人员之间的协作。
    - 将FAIR数据基础设施(ResultsDB)与自动化数据处理(Sim2L)集成，实现自动索引和模型更新。
    - 用于顺序优化的主动学习工作流，利用所有现有数据即时训练机器学习模型。
    - 将frugal twin概念应用于简单易行的颜色混合任务，以低成本材料演示协作优化。
    methodology: 该方法在nanoHUB服务上实现分布式SDL，合作者通过网页界面提交原始实验数据；数据由Sim2L自动处理以提取导出量，并索引到FAIR存储库(ResultsDB)中。另一个nanoHUB工作流通过主动学习实现顺序优化，利用所有累积数据训练机器学习模型以指导未来实验，并通过frugal
      twin颜色混合任务进行演示。
    key_results: 该框架成功实现了协作数据共享和自动模型更新，并通过frugal twin概念验证演示，优化食用色素混合物以达到目标颜色。
    limitations:
    - 演示仅限于简单的颜色混合优化任务，未解决扩展到更复杂科学问题的可扩展性。
    - 系统对nanoHUB基础设施的依赖可能限制其在生态系统之外的采用。
