  title_cn: 基于大语言模型的自动化研究可重复性代理：阿尔茨海默病的探索性研究
  abstract_cn: 目的：展示大语言模型（LLM）作为自主代理，使用相同或相似数据集重现已发表研究结果的能力。材料与方法：我们使用了国家阿尔茨海默病协调中心（NACC）的“快速访问”数据集。我们识别了使用NACC数据的高被引已发表研究手稿，并选择了五项仅使用该数据集即可重现的研究。利用GPT-4o，我们创建了一个由基于LLM的自主代理组成的模拟研究团队，其任务是在仅获得研究摘要、方法部分和数据字典描述的情况下，编写并执行代码以动态重现每项研究的结果。结果：我们从5项阿尔茨海默病研究的摘要中提取了35个关键发现。平均而言，LLM代理每项研究大约重现了53.2%的发现。数值和基于范围的结果在研究和代理之间往往存在差异。代理还应用了与原始研究不同的统计方法或参数，尽管总体趋势和显著性有时相似。讨论：在某些情况下，基于LLM的代理复制了研究技术和发现。在其他情况下，由于实施缺陷或缺少方法细节，它们失败了。这些差异显示了当前LLM在完全自动化可重复性评估方面的局限性。尽管如此，这项初步研究突显了结构化代理系统在提供科学严谨性可扩展评估方面的潜力。结论：这项探索性工作展示了LLM作为自主代理在生物医学研究中自动化可重复性的前景和局限性。
  tldr_cn: LLM代理使用NACC数据重现约53%的阿尔茨海默病结果，有潜力但无法完全自动化。
  analysis_cn:
    innovations:
    - 使用基于LLM的自主代理作为模拟研究团队，自动重现已发表研究的结果。
    - 将基于代理的可重复性评估应用于生物医学研究，特别是使用NACC数据集的阿尔茨海默病研究。
    - 证明代理仅从研究摘要、方法部分和数据字典描述即可编写并执行重现代码。
    methodology: 选择了五项使用NACC“快速访问”数据集的高被引阿尔茨海默病研究。利用GPT-4o创建了一个由LLM代理组成的模拟团队，在仅获得每项研究的摘要、方法部分和数据字典的情况下，编写并执行代码以重现从摘要中提取的35个关键发现。通过比较代理输出与原始发现来评估重现成功度。
    key_results: LLM代理平均每项研究大约重现了53.2%的发现，但数值和基于范围的结果往往存在差异，代理应用的统计方法或参数与原始研究不同，尽管总体趋势和显著性有时相似。
    limitations:
    - 代理在某些情况下因实施缺陷或原始研究缺少方法细节而失败。
    - 数值和基于范围的结果在代理与原始研究之间经常存在差异。
    - 代理应用的统计方法或参数与原始研究不同，限制了精确重现。
    - 该研究是探索性的，仅限于五项阿尔茨海默病研究和单一数据集，因此普适性不确定。
    tech_stack:
    - GPT-4o
    - NACC Quick Access dataset
  grade: worth_reading
