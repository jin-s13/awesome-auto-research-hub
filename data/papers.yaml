  title_cn: 与AI科学家竞争：天体物理学研究的智能体驱动方法
  abstract_cn: 我们提出了一种智能体驱动的方法，用于构建科学数据分析中的参数推断流程。该方法利用多智能体系统Cmbagent（AI科学家Denario的分析系统），其中专门化的智能体协作生成研究思路、编写并执行代码、评估结果，并迭代优化整个流程。作为案例研究，我们将该方法应用于FAIR
    Universe Weak Lensing Uncertainty Challenge，这是一个有时间限制的竞赛，专注于在具有现实观测不确定性的情况下进行稳健的宇宙学参数推断。虽然完全自主探索最初未能达到专家级性能，但人类干预的整合使我们的智能体驱动工作流在挑战中获得了第一名。这表明半自主智能体系统可以与专家解决方案竞争，并在某些情况下超越它们。我们详细描述了我们的工作流，包括Cmbagent的自主和半自主探索。我们的最终推断流程使用了参数高效的卷积神经网络、在已知参数网格上的似然校准以及多种正则化技术。我们的结果表明，智能体驱动的研究工作流可以为快速探索和构建推断问题的流程提供可扩展的框架。
  tldr_cn: 多智能体系统驱动天体物理参数推断流程，在人类干预下获得挑战赛第一名。
