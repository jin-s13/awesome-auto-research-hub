    methodology: SurveyX decomposes automated survey generation into Preparation and
      Generation phases, incorporating online reference retrieval, an AttributeTree
      pre-processing method, and a re-polishing process to enhance content and citation
      quality. The system is evaluated against existing automated survey generation
      systems using content quality and citation quality metrics.
