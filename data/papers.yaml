- id: astrovisbench-a-code-benchmark-for-scientific-computing-and-2025
  title: 'AstroVisBench: A Code Benchmark for Scientific Computing and Visualization
    in Astronomy'
  authors:
  - Sebastian Antony Joseph
  - Syed Murtaza Husain
  - Stella S. R. Offner
  - Stéphanie Juneau
  - Paul Torrey
  - Adam S. Bolton
  - Juan P. Farias
  - Niall Gaffney
  - Greg Durrett
  - Junyi Jessy Li
  abstract: Large Language Models (LLMs) are being explored for applications in scientific
    research, including their capabilities to synthesize literature, answer research
    questions, generate research ideas, and even conduct computational experiments.
    Ultimately, our goal is for these to help scientists derive novel scientific insights.
    In many areas of science, such insights often arise from processing and visualizing
    data to understand its patterns. However, evaluating whether an LLM-mediated scientific
    workflow produces outputs conveying the correct scientific insights is challenging
    to evaluate and has not been addressed in past work. We introduce AstroVisBench,
    the first benchmark for both scientific computing and visualization in the astronomy
    domain. AstroVisBench judges a language model's ability to both (1) create astronomy-specific
    workflows to process and analyze data and (2) visualize the results of these workflows
    through complex plots. Our evaluation of visualizations uses a novel LLM-as-a-judge
    workflow, which is validated against annotation by five professional astronomers.
    Using AstroVisBench we present an evaluation of state-of-the-art language models,
    showing a significant gap in their ability to engage in astronomy research as
    useful assistants. This evaluation provides a strong end-to-end evaluation for
    AI scientists that offers a path forward for the development of visualization-based
    workflows, which are central to a broad range of domains from physics to biology.
