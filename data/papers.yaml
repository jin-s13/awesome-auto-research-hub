  title_cn: 图原生强化学习通过概念重组实现可追溯的科学假设生成
  abstract_cn: 加速材料发现需要能够通过多步、领域基础推理生成科学有效假设的AI系统。标准大型语言模型在应对开放式材料设计问题时，往往产生流畅但可追溯性较弱的回答，难以判断最终答案是否得到连贯中间推理的支持。我们开发了Graph-PRefLexOR，一系列图原生推理模型，使用组相对策略优化（GRPO）进行微调，将推理组织为显式阶段：机制探索、图构建、模式提取和假设合成。该设计将神经语言生成与符号关系结构相连接，使得因果连接可以被构建、检查和重用。在来自材料科学和力学文献的100个开放式问题上，Graph-PRefLexOR相比对应基础模型提升40-65%，其中推理可追溯性增益最大。嵌入分析显示更广泛的语义探索，语义多样性约为基础模型的2-3倍。语义回溯和逐层隐藏状态分析进一步显示结构化推理与最终答案之间更强的一致性。最后，测试时图扩展表明，额外计算主要增加有限语义空间内的长程概念重组，而非简单扩展语义覆盖范围。这些结果确立了图原生强化学习作为材料设计及其他科学应用中可解释AI系统用于科学假设生成的途径。
  tldr_cn: Graph-PRefLexOR利用图原生推理与GRPO生成可追溯材料科学假设，性能提升40-65%。
  analysis_cn:
    innovations:
    - 图原生推理模型（Graph-PRefLexOR），将推理结构化为显式阶段：机制探索、图构建、模式提取和假设合成，将神经生成与符号关系结构相连接。
    - 使用组相对策略优化（GRPO）进行微调，以实现可追溯的多步假设生成。
    - 测试时图扩展，在有限语义空间内增加长程概念重组，而非扩展覆盖范围。
    methodology: Graph-PRefLexOR模型使用GRPO进行微调，将推理组织成多个阶段。在100个开放式的材料科学和力学问题上进行评估，使用可追溯性指标、嵌入分析（语义多样性）、语义回溯和逐层隐藏状态分析与基础模型进行比较。还考察了测试时图扩展。
    key_results: Graph-PRefLexOR相比基础模型提升40-65%，在推理可追溯性方面增益最大，语义多样性提高2-3倍，结构化推理与最终答案之间的一致性更强。测试时图扩展增加了长程概念重组。
