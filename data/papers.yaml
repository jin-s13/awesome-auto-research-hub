    - SciSafetyBench：一个用于评估科学场景中AI安全性的基准，包含6个领域的240项高风险任务、30个科学工具和120项工具相关风险任务
    methodology: SafeScientist将多个防御性监控组件集成到LLM智能体框架中，以确保研究过程的安全性。该框架使用提出的SciSafetyBench基准进行评估，比较安全性能和科学产出质量与传统AI科学家框架的差异，并测试对对抗攻击的鲁棒性。
