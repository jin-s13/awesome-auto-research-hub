  title_cn: PRISM：通过智能仿真建模进行协议优化
  abstract_cn: 自动化实验方案的设计与执行仍是实现自驱动实验室的根本瓶颈。我们提出了PRISM（通过智能仿真建模进行协议优化）框架，该框架能够在一个由现成机器人仪器组成的实验室平台上自动完成实验方案的设计、验证与执行。PRISM利用一组基于语言模型的智能体协同工作，生成并优化实验步骤。整个过程首先从网络来源自动收集描述实验流程的相关规程，然后通过规划、批评与验证循环将其转化为结构化的实验步骤（例如液体处理步骤、台面布局及其他相关操作）。最终步骤被转换为Argonne
    MADSci协议格式，该格式为协调多个机器人仪器（Opentrons OT-2液体处理器、PF400机械臂、Azenta封板机与揭膜机）提供了统一接口，无需人工干预即可完成步骤间衔接。为评估协议生成性能，我们在受限和开放式提示范式下对单一推理模型和多智能体工作流进行了基准测试。生成的协议在基于NVIDIA
    Omniverse构建的数字孪生环境中进行验证，以在执行前检测物理或序列错误。以Luna qPCR扩增和Cell Painting作为案例研究，我们展示了PRISM作为一种实用的端到端工作流，能够连接基于语言的协议生成、基于仿真的验证以及自动化机器人执行。
  tldr_cn: PRISM利用LLM智能体自动化实验方案设计与执行，并通过数字孪生和真实案例验证。
