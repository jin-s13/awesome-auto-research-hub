- id: tianji-environ-an-autonomous-ai-scientist-for-atmospheric-e-2026
  title: 'TianJi-Environ: An Autonomous AI Scientist for Atmospheric Environmental
    Research'
  authors:
  - Haoluo Zhao
  - Hongchun Zhang
  - Nan Li
  - Jing-Jia Luo
  - Kaikai Zhang
  - Mengyang Yu
  - Nan Chen
  - Tao Song
  - Fan Meng
  abstract: 'As atmospheric environmental prediction continues to improve, interpretable
    validation of pollution mechanisms and feedback processes has become a main challenge
    in atmospheric chemistry. Yet mechanism validation based on complex numerical
    models still relies heavily on expert knowledge: mechanistic hypotheses must be
    operationalized into executable experiments, and model outputs must be organized
    into traceable evidence. We present TianJi-Environ, an auditable AI Scientist
    for atmospheric-chemistry mechanism validation. TianJi-Environ establishes the
    first WRF-Chem-based multi-agent framework that autonomously drives complex atmospheric-chemistry
    simulations, converting mechanistic hypotheses into executable configurations,
    testing experiments, and evidence criteria. Using ozone response and particulate-matter
    feedback as two representative examples, we demonstrate TianJi-Environ''s capability
    for mechanism validation. In a summertime ozone case over the North China Plain,
    the system detects directionally consistent aerosol-radiation-interaction signals
    in shortwave radiation and boundary-layer height, but judges the evidence for
    ozone response to NOx control to be incomplete. In a wintertime PM2.5 case over
    the Guanzhong Basin, it localizes the unsupported link to insufficient propagation
    from black-carbon perturbation to particulate response and missing diagnostics
    of vertical absorptive heating. These results show that TianJi-Environ makes expert-driven
    mechanism validation explicit, structured, and auditable, offering a reproducible
    paradigm for multi-agent systems coupled with complex atmospheric-chemistry models.'
