  abstract_cn: 自动化科学发现有望加速各科学领域的进展。然而，开发并评估AI智能体进行端到端科学推理的能力颇具挑战，因为运行真实实验往往成本过高或不可行。本文介绍DISCOVERYWORLD，这是首个用于开发和基准测试智能体完成新颖科学发现完整循环的虚拟环境。DISCOVERYWORLD包含多种不同的挑战，涵盖放射性同位素测年、火箭科学和蛋白质组学等主题，以鼓励发展通用发现技能而非特定任务解决方案。DISCOVERYWORLD本身是一个廉价的、模拟的基于文本的环境（可选二维视觉叠加）。它包括120个不同的挑战任务，涵盖八个主题，每个主题有三个难度级别和若干参数变化。每个任务要求智能体形成假设、设计和运行实验、分析结果并根据结论行动。DISCOVERYWORLD还提供了三种自动评估性能的指标，基于（a）任务完成度，（b）任务相关动作，以及（c）发现的解释性知识。我们发现，在先前发布的环境中表现良好的强基线智能体在大多数DISCOVERYWORLD任务上表现困难，这表明DISCOVERYWORLD捕捉了科学发现的一些新挑战，因此DISCOVERYWORLD可能有助于加速近期科学发现能力在智能体中的开发和评估。代码见：www.github.com/allenai/discoveryworld
  tldr_cn: DISCOVERYWORLD：含120个任务的虚拟环境，用于基准测试自动化科学发现智能体。
  analysis_cn:
    innovations:
    - 首个用于开发和基准测试智能体完成新颖科学发现完整循环的虚拟环境。
    - 120个多样化挑战任务，涵盖8个主题，每个主题有3个难度级别和参数变化，涉及放射性同位素测年、火箭科学、蛋白质组学等。
    - 三种自动评估指标：任务完成度、任务相关动作和发现的解释性知识。
    - 证明强基线智能体表现困难，凸显该环境捕捉新颖发现挑战的能力。
    methodology: DISCOVERYWORLD是一个模拟的基于文本的环境（可选二维视觉叠加），包含8个科学主题的120个任务。每个任务要求智能体形成假设、设计和运行实验、分析结果并根据结论行动。性能通过三种自动指标评估：任务完成度、任务相关动作和发现的解释性知识。
    key_results: 在先前环境中表现良好的强基线智能体在大多数DISCOVERYWORLD任务上表现困难，表明该环境捕捉了科学发现的新挑战。
