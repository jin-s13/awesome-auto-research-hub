  title_cn: EurekAgent：智能体环境工程——自主科学发现的唯一关键
  abstract_cn: 基于LLM的智能体在自动化科学发现方面展现出越来越大的潜力。给定一个可优化的指标和一个执行环境，它们可以提出、验证并迭代科学解决方案，并已产生优于人类设计方法的结果。随着模型能力的持续提升，我们认为自主科学发现的瓶颈正从规定智能体工作流程转向设计智能体环境：即塑造智能体行为的资源、约束和接口。我们将此框架化为环境工程：构建能够放大生产性行为（如开放式探索、系统化工件管理和智能体间协作）同时抑制有害行为（如奖励欺骗和高摩擦的人工监督）的环境。我们提出了EurekAgent，一个用于指标驱动型自主科学发现的环境工程化智能体系统。EurekAgent从四个维度对环境进行工程化：权限工程（有界智能体执行与隔离评估）、工件工程（基于文件系统和Git的协作）、预算工程（预算感知探索）以及人在回路工程（便捷的人工监督与干预）。EurekAgent在多个数学、内核工程和机器学习任务上取得了新的最先进结果，包括以不到11美元的总API成本发现新的最先进的26圆填充结果。我们开源了代码和结果，并呼吁将环境工程作为开发可靠自主研究智能体的核心研究方向。
  tldr_cn: EurekAgent通过工程化智能体环境实现自主科学发现，以低成本在数学内核及ML任务取得SOTA。
  analysis_cn:
    innovations:
    - 将环境工程定位为自主科学发现智能体的关键瓶颈和核心研究方向
