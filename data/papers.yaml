- id: inverse-surrogate-model-of-a-soft-x-ray-spectrometer-using-d-2025
  title: Inverse Surrogate Model of a Soft X-Ray Spectrometer using Domain Adaptation
  authors:
  - Enrico Ahlers
  - Peter Feuer-Forson
  - Gregor Hartmann
  - Rolf Mitzner
  - Peter Baumgärtel
  - Jens Viefhaus
  abstract: In this study, we present a method to create a robust inverse surrogate
    model for a soft X-ray spectrometer. During a beamtime at an electron storage
    ring, such as BESSY II, instrumentation and beamlines are required to be correctly
    aligned and calibrated for optimal experimental conditions. In order to automate
    these processes, machine learning methods can be developed and implemented, but
    in many cases these methods require the use of an inverse model which maps the
    output of the experiment, such as a detector image, to the parameters of the device.
    Due to limited experimental data, such models are often trained with simulated
    data, which creates the challenge of compensating for the inherent differences
    between simulation and experiment. In order to close this gap, we demonstrate
    the application of data augmentation and adversarial domain adaptation techniques,
    with which we can predict absolute coordinates for the automated alignment of
    our spectrometer. Bridging the simulation-experiment gap with minimal real-world
    data opens new avenues for automated experimentation using machine learning in
    scientific instrumentation.
