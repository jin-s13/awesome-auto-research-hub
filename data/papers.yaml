      open-ended, messy nature of real-world scientific inquiry.
  title_cn: “图灵测试”用于人工智能科学家
  abstract_cn: 尽管大语言模型在解决数学或编程问题方面展现了令人印象深刻的能力，但做出科学发现的能力仍然是一个独特的挑战。本文提出了一个“人工智能科学家的图灵测试”，以评估AI智能体是否能够独立进行科学研究，而不依赖人类生成的知识。受科学历史发展的启发，我们提出了七个基准测试，评估AI智能体在各个科学领域做出突破性发现的能力。这些测试包括：从天体观测推断日心模型、在模拟环境中发现运动定律、推导振动弦的微分方程、从电动力学模拟推断麦克斯韦方程组、发明初值问题的数值方法、发现用于数据压缩的霍夫曼编码，以及开发高效的排序算法。为确保这些测试的有效性，AI智能体被提供每个问题特定的交互式库或数据集，且无法访问可能包含目标发现信息的人类知识。最终目标是创造一个能够做出新颖且有影响力的科学发现、超越各自领域最优秀人类专家的AI科学家。这些“图灵测试”作为中间里程碑，评估AI智能体做出在当时具有突破性发现的能力。如果AI智能体能够通过这七个测试中的大部分，将表明在构建AI科学家方面取得了重大进展，为自主科学发现的未来进步铺平道路。本文旨在为AI在科学研究中的能力建立基准，并激发这一激动人心领域的进一步研究。
  tldr_cn: 提出七个基准图灵测试，评估AI智能体在无人类知识下独立科学发现的能力。
  analysis_cn:
    innovations:
    - 提出了一个由七个基准测试组成的‘人工智能科学家图灵测试’，用于评估自主科学发现能力。
    - 设计测试要求仅使用交互式模拟或数据集重新发现历史上具有突破性的成果（例如日心说、麦克斯韦方程组），且无法获取人类已有知识。
    methodology: 本文定义了涵盖物理、数学和计算机科学的七个基准任务。每个任务为AI智能体提供特定领域的交互式库或数据集，智能体必须推断出目标发现（例如运动定律、霍夫曼编码），且不能接触可能包含答案的人类知识。未详细说明具体的模型架构、训练过程或评估指标。
    key_results: 未报告实验结果；本文是基准设计的提案，不包含实证验证。
    limitations:
    - 这些测试仅评估对已知科学的重新发现，而非生成新颖且有影响力的科学知识。
    - 在这些基准测试上的成功并不能保证AI能够超越人类专家或在未探索领域进行自主研究。
    - 对精心策划的交互式库和数据集的依赖可能无法反映现实世界科学探究的开放性和复杂性。
