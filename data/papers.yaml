- id: harnessing-atomisticskills-for-agentic-atomistic-research-2026
  title: Harnessing AtomisticSkills for Agentic Atomistic Research
  authors:
  - Bowen Deng
  - Bohan Li
  - Matthew Cox
  - Hoje Chun
  - Juno Nam
  - Artur Lyssenko
  - Sathya Edamadaka
  - Jurgis Ruza
  - Xiaochen Du
  - Nofit Segal
  - Jesus Diaz Sanchez
  - Mingrou Xie
  - Ty Perez
  - Yu Yao
  - Miguel Steiner
  - Sauradeep Majumdar
  - Charles B. Musgrave
  - Anirban Chandra
  - Abhirup Patra
  - Detlef Hohl
  - Connor W. Coley
  - Ju Li
  - Rafael Gómez-Bombarelli
  abstract: 'Computational materials science and chemistry span vast knowledge domains
    and fractured software ecosystems. Although large language models (LLMs) have
    demonstrated research capabilities, scaling monolithic agents to manage the rigor
    and complexity of atomistic research remains a challenge. Here, we introduce AtomisticSkills,
    an open-source harness framework that empowers general-purpose AI coding agents
    to conduct atomistic research across materials science, chemistry, and drug discovery.
    By hierarchically decomposing scientific workflows into agent skills and tools,
    AtomisticSkills provides agents with modular, extensible, and plug-and-play research
    capabilities. The framework integrates more than 100 human-curated multidisciplinary
    skills, including database access, thermodynamics and kinetics modeling, and diverse
    simulation engines employing machine learning interatomic potentials (MLIPs) and
    density functional theory (DFT). We validate its functional coverage against scientific
    literature and demonstrate robust orchestration capabilities across diverse scientific
    campaigns: generative design of Li-ion solid-state electrolytes, high-throughput
    screening of metal-organic frameworks for CO2 capture, autonomous MLIP benchmarking
    and fine-tuning, multi-stage structure-based virtual screening for drug design,
    multimodal X-ray diffraction pattern analysis, and screening of Fe-oxide catalysts
    for oxygen evolution reaction. AtomisticSkills provides a critical agent infrastructure
    towards building fully autonomous AI scientists.'
