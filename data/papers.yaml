- id: ai-driven-automation-can-become-the-foundation-of-next-era-s-2025
  title: AI-Driven Automation Can Become the Foundation of Next-Era Science of Science
    Research
  authors:
  - Renqi Chen
  - Haoyang Su
  - Shixiang Tang
  - Zhenfei Yin
  - Qi Wu
  - Hui Li
  - Ye Sun
  - Nanqing Dong
  - Wanli Ouyang
  - Philip Torr
  abstract: The Science of Science (SoS) explores the mechanisms underlying scientific
    discovery, and offers valuable insights for enhancing scientific efficiency and
    fostering innovation. Traditional approaches often rely on simplistic assumptions
    and basic statistical tools, such as linear regression and rule-based simulations,
    which struggle to capture the complexity and scale of modern research ecosystems.
    The advent of artificial intelligence (AI) presents a transformative opportunity
    for the next generation of SoS, enabling the automation of large-scale pattern
    discovery and uncovering insights previously unattainable. This paper offers a
    forward-looking perspective on the integration of Science of Science with AI for
    automated research pattern discovery and highlights key open challenges that could
    greatly benefit from AI. We outline the advantages of AI over traditional methods,
    discuss potential limitations, and propose pathways to overcome them. Additionally,
    we present a preliminary multi-agent system as an illustrative example to simulate
    research societies, showcasing AI's ability to replicate real-world research patterns
    and accelerate progress in Science of Science research.
