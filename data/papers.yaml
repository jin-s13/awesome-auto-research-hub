  title_cn: ScienceAgentBench：面向数据驱动科学发现的语言代理严格评估
  abstract_cn: 大型语言模型（LLMs）的进步激发了人们对开发基于LLM的语言代理以端到端自动化科学发现的兴趣，这引发了对其真实能力的兴奋和怀疑。在这项工作中，我们呼吁在科学工作流的单个任务上对代理进行严格评估，然后再对端到端自动化做出大胆断言。为此，我们提出了ScienceAgentBench，一个用于评估数据驱动科学发现语言代理的新基准。为确保基准的科学真实性和现实相关性，我们从四个学科的44篇同行评审出版物中提取了102个任务，并邀请了九位领域专家进行验证。我们将每个任务的目标输出统一为一个自包含的Python程序文件，并采用一系列评估指标来检查生成的程序、执行结果和成本。每个任务都经过标注员和领域专家的多轮手动验证，以确保其标注质量和科学合理性。我们还提出了两种有效策略来缓解数据污染问题。利用ScienceAgentBench，我们评估了五个开源和专有LLM，每个LLM使用三种框架：直接提示、OpenHands
    CodeAct和自调试。每个任务尝试三次，表现最佳的代理仅独立解决了32.4%的任务，在专家提供知识的情况下解决了34.3%。此外，我们使用直接提示和自调试评估了OpenAI
    o1-preview，其性能提升至42.2%，证明了增加推理时计算的有效性，但成本是其他LLM的10倍以上。尽管如此，我们的结果凸显了当前语言代理在为数据驱动发现生成代码方面的局限性，更不用说科学研究的端到端自动化了。
  tldr_cn: 一个从真实出版物中严格评估语言代理在数据驱动科学发现任务上的基准。
  analysis_cn:
    innovations:
    - 创建了ScienceAgentBench基准，包含从四个学科的44篇同行评审出版物中提取的102个任务，并由九位领域专家验证。
    - 统一任务输出为自包含的Python程序，能够评估生成的代码、执行结果和计算成本。
    - 通过标注员和专家进行多轮手动验证，确保标注质量和科学合理性。
    - 在基准设计中采用两种策略来缓解数据污染问题。
    methodology: 该基准包含从44篇同行评审出版物中获取并经领域专家验证的102个数据驱动科学发现任务。每个任务要求生成一个自包含的Python程序，并从代码正确性、执行结果和成本三个方面进行评估。对五个开源和专有LLM进行了测试，每个任务使用三种框架（直接提示、OpenHands
      CodeAct、自调试）进行三次尝试，此外还使用直接提示和自调试对OpenAI o1-preview进行了评估。
    key_results: 表现最佳的代理仅独立解决了32.4%的任务，在专家提供知识的情况下解决了34.3%；OpenAI o1-preview达到了42.2%，但成本是其他LLM的10倍以上，凸显了显著的性能差距。
    limitations:
    - 当前语言代理仍无法可靠地为数据驱动科学任务生成正确代码，最高性能仅为42.2%。
    - 该基准仅涵盖单个任务，而非端到端的科学工作流，限制了关于完全自动化的论断。
    - 像o1-preview这样的高级模型推理成本高（超过10倍），可能阻碍实际部署。
    - 任务范围仅限于来自四个学科的102个实例，可能无法代表所有科学领域。
    tech_stack:
    - Python
    - OpenHands CodeAct
    - Self-debug
    - Direct prompting
    - OpenAI o1-preview
    - LLMs
