  title_cn: MLIPilot：基于大语言模型的机器学习原子间势自动研究框架
  abstract_cn: 构建生产级质量的机器学习原子间势（MLIP）需要在精度、动力学稳定性和计算吞吐量之间取得平衡，而这些约束无法通过单一训练损失来捕捉。我们提出MLIPilot，一个自动研究框架，其中工具调用型大语言模型提出假设、编辑MLIP训练代码、启动HPC作业，并使用固定的、受物理约束的评分卡接受或撤销更改。我们在MACE势优化上评估MLIPilot，使用商业和开源LLM代理，包括GPT-5.5、GPT-4.1、Mistral-24B和Qwen3-32B。基准测试涵盖分子和周期体系：一个QM7衍生数据集（我们为其生成了B3LYP/6-31G(d)能量和力），以及一个Cu
    EMT数据集（包含由ASE有效介质理论计算器标记的周期铜超胞）。在这些基准测试中，最强的代理通过自主发现有用的训练策略（包括输出归一化、损失函数更改、渐进训练计划和模型容量调整），将最初违反约束的基线转变为可接受的模型。这些结果表明，当LLM代理的搜索受到领域特定验证标准的约束时，它们可以作为科学机器学习工作流的自主操作者，将MLIP开发的一部分从手动试错转向可审计的自动化实验。
  tldr_cn: MLIPilot利用LLM代理通过假设提出、代码编辑和HPC作业管理自主优化机器学习原子间势。
  analysis_cn:
    innovations:
    - MLIPilot：一个自动研究框架，其中工具调用型LLM代理提出假设、编辑MLIP训练代码、启动HPC作业，并使用固定的、受物理约束的评分卡接受或撤销更改。
    methodology: MLIPilot使用工具调用型LLM代理（GPT-5.5、GPT-4.1、Mistral-24B、Qwen3-32B）通过编辑代码、提交HPC作业并依据受物理约束的评分卡进行评估，迭代优化MACE原子间势。评估在QM7衍生分子数据集（B3LYP/6-31G(d)能量和力）和Cu
      EMT周期数据集（ASE有效介质理论标签）上进行。
