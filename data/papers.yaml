  abstract_cn: 大型语言模型（LLMs）已成为加速科学发现的强大工具，但其静态知识和幻觉问题阻碍了自主研究应用。最近的进展将LLMs集成到智能体框架中，使其能够进行检索、推理和工具使用，以处理复杂的科学工作流。在此，我们提出一种领域专用智能体，用于可靠地自动化第一性原理材料计算。通过嵌入领域专业知识，该智能体确保物理一致的多步骤工作流，并一致选择收敛且适定的参数，从而实现可靠的端到端计算执行。一个新的多样化计算任务基准测试表明，我们的系统在准确性和鲁棒性上显著优于独立的LLMs。这项工作为自主计算实验建立了可验证的基础，并朝着全自动科学发现迈出了关键一步。
  tldr_cn: 基于LLM的领域专家智能体框架自动化第一性原理材料计算，在基准测试上优于独立LLM。
