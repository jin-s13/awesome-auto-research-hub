  title_cn: 面向材料发现的推理大语言模型对齐：基于物理感知的拒绝采样
  abstract_cn: 将自动化实验与算法决策相结合的人工智能驱动材料发现，需要具备准确、校准且物理可接受的工艺感知属性预测器。我们将此视为一个涉及大型推理模型（LRMs）的推理问题。为了向语言模型注入推理能力，我们从教师模型中整理推理轨迹来训练学生模型。然而，大多数训练流程使用二元正确性或学习到的偏好信号来选择推理轨迹，这些信号难以反映物理可接受性。我们引入了物理感知拒绝采样（PaRS），这是一种训练时的轨迹选择方案，倾向于选择与基本物理定律一致且数值上接近目标的轨迹，并通过轻量级停止机制控制计算量。我们使用一个大型学生模型实例化我们的框架，该模型在由更大教师模型合成的轨迹上进行微调，并在匹配的令牌预算下与多种拒绝采样基线进行比较。我们的方法提高了准确性和校准度，降低了物理违规率，并相对于基线降低了采样成本。这些结果表明，适度的领域感知约束与轨迹级选择相结合，为可靠、高效的LRMs在工艺感知属性预测和闭环材料设计中提供了一条实用路径。
