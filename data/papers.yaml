- id: evoscientist-towards-multi-agent-evolving-ai-scientists-for-2026
  title: 'EvoScientist: Towards Multi-Agent Evolving AI Scientists for End-to-End
    Scientific Discovery'
  authors:
  - Yougang Lyu
  - Xi Zhang
  - Xinhao Yi
  - Yuyue Zhao
  - Shuyu Guo
  - Wenxiang Hu
  - Jan Piotrowski
  - Jakub Kaliski
  - Jacopo Urbani
  - Zaiqiao Meng
  - Lun Zhou
  - Xiaohui Yan
  abstract: 'The increasing adoption of Large Language Models (LLMs) has enabled AI
    scientists to perform complex end-to-end scientific discovery tasks requiring
    coordination of specialized roles, including idea generation and experimental
    execution. However, most state-of-the-art AI scientist systems rely on static,
    hand-designed pipelines and fail to adapt based on accumulated interaction histories.
    As a result, these systems overlook promising research directions, repeat failed
    experiments, and pursue infeasible ideas. To address this, we introduce EvoScientist,
    an evolving multi-agent AI scientist framework that continuously improves research
    strategies through persistent memory and self-evolution. EvoScientist comprises
    three specialized agents: a Researcher Agent (RA) for scientific idea generation,
    an Engineer Agent (EA) for experiment implementation and execution, and an Evolution
    Manager Agent (EMA) that distills insights from prior interactions into reusable
    knowledge. EvoScientist contains two persistent memory modules: (i) an ideation
    memory, which summarizes feasible research directions from top-ranked ideas while
    recording previously unsuccessful directions; and (ii) an experimentation memory,
    which captures effective data processing and model training strategies derived
    from code search trajectories and best-performing implementations. These modules
    enable the RA and EA to retrieve relevant prior strategies, improving idea quality
    and code execution success rates over time. Experiments show that EvoScientist
    outperforms 7 open-source and commercial state-of-the-art systems in scientific
    idea generation, achieving higher novelty, feasibility, relevance, and clarity
    via automatic and human evaluation. EvoScientist also substantially improves code
    execution success rates through multi-agent evolution, demonstrating persistent
    memory''s effectiveness for end-to-end scientific discovery.'
