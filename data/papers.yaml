  title_cn: 'SMCEvolve: 基于序贯蒙特卡洛演化的有原则的科学发现'
  abstract_cn: LLM驱动的程序演化已成为自动化科学发现的强大工具，然而现有框架缺乏设计其各个组件的原则性指导，也无法保证搜索收敛。我们提出SMCEvolve，将程序搜索重新表述为从奖励倾斜的目标分布中采样，并使用序贯蒙特卡洛（SMC）采样器进行近似。从这一视角出发，三个核心机制作为原则性组件出现：自适应父代重采样、变异与接受的混合以及自动收敛控制。我们进一步提供了有限样本复杂度分析，界定了达到目标近似误差所需的LLM调用预算。在数学、算法效率、符号回归和端到端机器学习研究基准上，SMCEvolve超越了最先进的演化系统，同时在自定终止条件下使用了更少的LLM调用。代码可在https://github.com/kongwanbianjinyu/SMCEvolve获取。
  tldr_cn: SMCEvolve利用序贯蒙特卡洛引导LLM驱动的程序演化，实现有收敛保证的有原则的科学发现。
