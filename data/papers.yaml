  title_cn: SR-Scientist：基于智能体AI的科学方程发现
  abstract_cn: 最近，大型语言模型（LLMs）已被应用于科学方程发现，利用其嵌入的科学知识进行假设生成。然而，当前方法通常将LLMs限制为遗传编程等搜索算法中的方程提出者。在本文中，我们提出SR-Scientist框架，将LLM从简单的方程提出者提升为自主AI科学家，能够编写代码分析数据、将方程实现为代码、提交评估，并根据实验反馈优化方程。具体而言，我们将代码解释器封装为一组用于数据分析和方程评估的工具。智能体被指示利用这些工具在长时间跨度内以最少的人工定义流程优化方程。实验结果表明，SR-Scientist在涵盖四个科学学科的数据集上以6%到35%的绝对优势优于基线方法。此外，我们展示了该方法对噪声的鲁棒性、发现方程对域外数据的泛化能力以及符号准确性。进一步地，我们开发了一个端到端的强化学习框架来增强智能体的能力。
