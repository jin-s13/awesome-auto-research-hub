  title_cn: EvoMaster：面向大规模智能体科学的基础演化智能体框架
  abstract_cn: 大语言模型与智能体的融合正在催化科学发现的新时代：智能体科学。尽管科学方法本质上是迭代的，但现有的智能体框架大多是静态的、范围狭窄的，并且缺乏从试错中学习的能力。为弥补这一差距，我们提出了EvoMaster，一个专门为大规模智能体科学设计的基础演化智能体框架。EvoMaster以持续自我演化为核心原则，使智能体能够迭代优化假设、自我批判并在实验周期中逐步积累知识，忠实模拟人类的科学探究过程。至关重要的是，作为一个领域无关的基础框架，EvoMaster极易扩展——使开发者能够用约100行代码为任意学科构建和部署高性能、自演化的科学智能体。基于EvoMaster，我们在机器学习、物理学和通用科学等领域孵化了SciMaster生态系统。在四个权威基准（Humanity's
    Last Exam、MLE-Bench Lite、BrowseComp和FrontierScience）上的评估表明，EvoMaster分别取得了41.1%、75.8%、73.3%和53.3%的最先进分数。它全面超越了通用基线OpenClaw，相对提升幅度从+159%到+316%，有力验证了其作为下一代自主科学发现首要基础框架的有效性和通用性。EvoMaster可在https://github.com/sjtu-sai-agents/EvoMaster获取。
  tldr_cn: EvoMaster是领域无关、自我演化的智能体框架，用于可扩展的智能体科学，在四个基准上取得最先进结果。
  analysis_cn:
