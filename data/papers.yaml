- id: risks-of-ai-scientists-prioritizing-safeguarding-over-auton-2024
  title: 'Risks of AI Scientists: Prioritizing Safeguarding Over Autonomy'
  authors:
  - Xiangru Tang
  - Qiao Jin
  - Kunlun Zhu
  - Tongxin Yuan
  - Yichi Zhang
  - Wangchunshu Zhou
  - Meng Qu
  - Yilun Zhao
  - Jian Tang
  - Zhuosheng Zhang
  - Arman Cohan
  - Zhiyong Lu
  - Mark Gerstein
  abstract: AI scientists powered by large language models have demonstrated substantial
    promise in autonomously conducting experiments and facilitating scientific discoveries
    across various disciplines. While their capabilities are promising, these agents
    also introduce novel vulnerabilities that require careful consideration for safety.
    However, there has been limited comprehensive exploration of these vulnerabilities.
    This perspective examines vulnerabilities in AI scientists, shedding light on
    potential risks associated with their misuse, and emphasizing the need for safety
    measures. We begin by providing an overview of the potential risks inherent to
    AI scientists, taking into account user intent, the specific scientific domain,
    and their potential impact on the external environment. Then, we explore the underlying
    causes of these vulnerabilities and provide a scoping review of the limited existing
    works. Based on our analysis, we propose a triadic framework involving human regulation,
    agent alignment, and an understanding of environmental feedback (agent regulation)
    to mitigate these identified risks. Furthermore, we highlight the limitations
    and challenges associated with safeguarding AI scientists and advocate for the
    development of improved models, robust benchmarks, and comprehensive regulations.
