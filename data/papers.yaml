      or datasets, without access to human-generated knowledge.
    methodology: The paper defines seven benchmark tasks spanning physics, mathematics,
      and computer science. Each task provides an AI agent with a domain-specific
      interactive library or dataset, and the agent must infer the target discovery
      (e.g., laws of motion, Huffman coding) without exposure to human knowledge that
      could contain the answer. No specific model architecture, training procedure,
      or evaluation metrics are detailed.
    key_results: No experimental results are reported; the paper is a proposal for
      benchmark design and does not include empirical validation.
    limitations:
    - The tests only assess rediscovery of known science, not the generation of novel,
      impactful scientific knowledge.
