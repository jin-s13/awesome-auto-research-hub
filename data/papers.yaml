    - Scientific Judge模型，在70万对领域和时间匹配的高引用与低引用论文对上训练，用于评估研究想法
    - Scientific Thinker策略模型，通过使用Scientific Judge作为奖励模型进行偏好对齐训练，以生成高影响力研究想法
    methodology: 作者提出RLCF，首先在70万对匹配的高引用和低引用论文上训练Scientific Judge以建模科学偏好，然后将其作为奖励模型对齐策略模型Scientific
