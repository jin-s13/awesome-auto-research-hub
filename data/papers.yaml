- id: the-more-you-automate-the-less-you-see-hidden-pitfalls-of-2025
  title: 'The More You Automate, the Less You See: Hidden Pitfalls of AI Scientist
    Systems'
  authors:
  - Ziming Luo
  - Atoosa Kasirzadeh
  - Nihar B. Shah
  abstract: 'AI scientist systems, capable of autonomously executing the full research
    workflow from hypothesis generation and experimentation to paper writing, hold
    significant potential for accelerating scientific discovery. However, the internal
    workflow of these systems have not been closely examined. This lack of scrutiny
    poses a risk of introducing flaws that could undermine the integrity, reliability,
    and trustworthiness of their research outputs. In this paper, we identify four
    potential failure modes in contemporary AI scientist systems: inappropriate benchmark
    selection, data leakage, metric misuse, and post-hoc selection bias. To examine
    these risks, we design controlled experiments that isolate each failure mode while
    addressing challenges unique to evaluating AI scientist systems. Our assessment
    of two prominent open-source AI scientist systems reveals the presence of several
    failures, across a spectrum of severity, which can be easily overlooked in practice.
    Finally, we demonstrate that access to trace logs and code from the full automated
    workflow enables far more effective detection of such failures than examining
    the final paper alone. We thus recommend journals and conferences evaluating AI-generated
    research to mandate submission of these artifacts alongside the paper to ensure
    transparency, accountability, and reproducibility.'
