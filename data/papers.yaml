- id: beyond-drug-discovery-the-nanotechnology-molecular-optimiza-2026
  title: 'Beyond Drug Discovery: The Nanotechnology Molecular Optimization (NMO) Benchmark'
  authors:
  - Matthias Blaschke
  - Daniel Kienzle
  - Zsuzsanna Koczor-Benda
  - Julian Lorenz
  - Rainer Lienhart
  - Fabian Pauly
  abstract: Generative molecular design is shaped by simple proxy benchmarks for drug-like
    properties and models pretrained on large pharmaceutical datasets. This combination
    yields strong benchmark metrics but limits transferability to domains structurally
    distinct from drug discovery. To overcome this limitation and drive discovery
    toward real, scientifically grounded targets, we introduce the Nanotechnology
    Molecular Optimization (NMO) Benchmark, which bridges machine learning (ML) and
    quantum materials science. NMO acts simultaneously as a rigorous testbed for the
    ML community and a discovery engine for nanotechnology research. The suite replaces
    proxy oracles with quantum simulations and introduces strict protocols that prioritize
    scientific utility over leaderboard-oriented overfitting. The physics-based NMO
    tasks impose hard structural constraints and rugged fitness landscapes, posing
    fundamentally new requirements on generative models. Notably, advanced molecular
    optimization methods underperform much simpler approaches on the NMO tasks. We
    develop a new baseline method identifying the critical components to solve the
    NMO tasks, including a novel representation for modeling structural constraints
    and a domain-agnostic pretraining strategy to eliminate pharmaceutical dataset
    bias. Our results surpass state-of-the-art physical properties and reveal previously
    unknown structural motifs, offering new insights for the nanotechnology community
    and demonstrating that ML can drive genuine scientific discovery.
