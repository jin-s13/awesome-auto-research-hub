  title_cn: 超越药物发现：纳米技术分子优化（NMO）基准
  abstract_cn: 生成分子设计由针对药物相似性质的简单代理基准和在大型制药数据集上预训练的模型所塑造。这种组合产生了强大的基准指标，但限制了向结构上与药物发现不同的领域的可迁移性。为了克服这一限制并推动发现走向真实的、有科学依据的目标，我们引入了纳米技术分子优化（NMO）基准，它连接了机器学习（ML）和量子材料科学。NMO同时作为ML社区的严格测试平台和纳米技术研究的发现引擎。该套件用量子模拟取代代理预言机，并引入了优先考虑科学实用性而非排行榜导向过拟合的严格协议。基于物理的NMO任务施加了严格的结构约束和崎岖的适应度景观，对生成模型提出了全新的要求。值得注意的是，先进的分子优化方法在NMO任务上表现不如简单得多的方法。我们开发了一种新的基线方法，识别出解决NMO任务的关键组成部分，包括一种用于建模结构约束的新颖表示和一种消除制药数据集偏差的领域无关预训练策略。我们的结果超越了最先进的物理性质，并揭示了以前未知的结构基序，为纳米技术社区提供了新的见解，并证明了机器学习可以推动真正的科学发现。
