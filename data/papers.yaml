  title_cn: 一次反思不够：通过多假设失败归因实现自我纠正的自主研究
  abstract_cn: 自主研究代理现在可以起草假设、编写代码、运行实验并生成论文，但在实验失败时仍然脆弱。在主流范式下，失败恢复通常委托给单一的自由形式反思：将丰富的指标、日志和设计选择轨迹压缩成一条口头批评，这往往导致局部试错或硬性转向，丢弃有用的上下文。我们提出SAGE，一个自我纠正、自主、基于事实的实验者，以解决这一失败恢复瓶颈。其核心机制——多假设失败归因（MHFA）——将恢复视为结构化的因果诊断。通过分析动态轨迹特征，MHFA系统性地生成多个基于证据的失败解释，独立评估其严重性，并将验证后的根本原因确定性路由到正确的干预级别（假设、实验设计或实现）。为保证科学诚实性，SAGE进一步采用基于事实的报告机制，明确将草拟结果约束为实际测量值，删减幻觉数字。在12主题、5领域的基准上，SAGE将包含指标的输出从42%提升至92%（相对于反思基线），工件质量从5.00/10提升至6.75/10，盲评分数达到52.0，而AI-Scientist-v2为48.2，增益集中在代码开发和执行上。尽管完全自主的科学写作和生成可提交会议论文仍然是整个领域公认的难题，SAGE成功生成了显著更可靠、更高质量的科学工件。最终，通过将结构化恢复与显式事实约束相结合，SAGE显著优于单一反思范式，为未来的自主研究建立了高度可信的基础。
  tldr_cn: SAGE通过多假设失败归因自我纠正自主研究，在12主题基准上提升成功率。
