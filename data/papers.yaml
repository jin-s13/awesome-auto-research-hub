  title_cn: HLER：基于多智能体流水线的人机协同经济研究用于实证发现
  abstract_cn: 大型语言模型（LLMs）使得基于智能体的系统能够自动化科学研究工作流程。现有方法大多专注于完全自主发现，即AI系统生成研究想法、进行分析并撰写手稿，几乎无需人工参与。然而，经济学和社会科学中的实证研究带来了额外约束：研究问题必须基于可用数据集，识别策略需要精心设计，且人类判断对于评估经济显著性仍然至关重要。我们提出HLER（人机协同经济研究），一种支持实证研究自动化同时保留关键人类监督的多智能体架构。该系统协调专门智能体进行数据审计、数据剖析、假设生成、计量分析、手稿起草和自动评审。一个关键设计原则是数据集感知的假设生成，即候选研究问题受数据集结构、变量可用性和分布诊断的约束，从而减少不可行或幻觉假设。HLER进一步实现了双循环架构：一个问题质量循环，用于筛选和选择可行假设；一个研究修订循环，其中自动评审触发重新分析和手稿修订。在关键阶段嵌入人类决策门，允许研究人员指导自动化流水线。在三个实证数据集上的实验表明，数据集感知的假设生成在87%的情况下产生可行研究问题（相比之下，无约束生成仅为41%），而完整的实证手稿可以以每次运行平均API成本0.8-1.5美元生成。这些结果表明，人机协作流水线可能为可扩展的实证研究提供一条实用路径。
  tldr_cn: HLER是一个用于人机协同实证经济研究的多智能体系统，具有数据集感知假设生成和双循环架构。
