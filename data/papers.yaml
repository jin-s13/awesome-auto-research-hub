- id: virtuous-machines-towards-artificial-general-science-2025
  title: 'Virtuous Machines: Towards Artificial General Science'
  authors:
  - Gabrielle Wehr
  - Reuben Rideaux
  - Amaya J. Fox
  - David R. Lightfoot
  - Jason Tangen
  - Jason B. Mattingley
  - Shane E. Ehrhardt
  abstract: Artificial intelligence systems are transforming scientific discovery
    by accelerating specific research tasks, from protein structure prediction to
    materials design, yet remain confined to narrow domains requiring substantial
    human oversight. The exponential growth of scientific literature and increasing
    domain specialisation constrain researchers' capacity to synthesise knowledge
    across disciplines and develop unifying theories, motivating exploration of more
    general-purpose AI systems for science. Here we show that a domain-agnostic, agentic
    AI Scientist system can independently navigate the scientific workflow - from
    hypothesis generation through data collection to manuscript preparation. The system
    autonomously designed and executed three psychological studies on visual working
    memory, mental rotation, and imagery vividness, executed one new online data collection
    with 288 participants, developed analysis pipelines through 8-hour+ continuous
    coding sessions, and produced completed manuscripts. The results demonstrate the
    capability of AI scientific discovery pipelines to conduct non-trivial research
    with theoretical reasoning and methodological rigour comparable to experienced
