  title_cn: 迈向AI研究的端到端自动化
  abstract_cn: 科学的自动化是人工智能领域长期以来的目标。尽管社区在自动化科学过程的各个组成部分方面取得了显著进展，但能够自主导航整个研究生命周期（从构思到发表）的系统仍然遥不可及。在此，我们展示了迄今为止朝着端到端自动化整个流程的最强证明。我们提出了The
    AI Scientist，它能够创建研究想法、编写代码、运行实验、绘制和分析数据、撰写完整的科学手稿，并进行自己的同行评审。其想法、执行和呈现的质量足以生成一份由AI系统制作的手稿，该手稿在主要机器学习会议研讨会上通过了第一轮同行评审。该研讨会的接收率为70%。我们的系统利用复杂智能体系统中的现代基础模型。我们在两种设置下评估The
    AI Scientist：一种聚焦模式，使用人类提供的代码模板作为初始支架，在特定主题上进行研究；另一种无模板的开放模式，利用智能体搜索进行更广泛的科学探索。两种设置都产生了多样化的想法，并自动测试、报告和评估它们。这一成就展示了AI在科学贡献方面日益增长的能力，并标志着研究方式可能发生的范式转变。与任何有影响力的新技术一样，可能存在重大风险，包括给已经不堪重负的评审系统增加负担，以及给科学文献增加噪音。然而，如果负责任地开发，这种自主系统可以极大地加速科学发现。
  tldr_cn: 提出The AI Scientist系统，端到端自主进行AI研究，从构思到发表，通过研讨会同行评审。
  analysis_cn:
    innovations:
    - 整个AI研究生涯的端到端自动化：想法生成、代码编写、实验、数据分析、手稿撰写和同行评审。
