  title_cn: E3：自动化研究评审的问题级回测
  abstract_cn: 我们提出E3，一种自动审稿助手，通过识别研究论文中与决策相关的技术问题来增强评审人员和工程团队。对于每个问题，E3报告其性质、位置、对贡献的影响以及解决该问题所需的分析或证据，涵盖无依据的主张、缺失的消融实验、薄弱的基线、隐藏的假设、有效性威胁以及数据泄露风险。为在无污染混淆的情况下评估E3，我们采用问题级回测协议：语料库仅限于所有自动化来源训练截止日期之后发表的论文，并且对于每篇论文，一个仅观察匿名评审的元裁判将每个问题-来源对标记为捕获、部分或遗漏。应用于100篇ICLR
    2026论文和4598条被判断的问题行，将E3与ICLR人工评审以及两个基于OpenAI的gpt-5.4和Anthropic的claude-opus-4-6构建的提示匹配LLM基线进行比较，元裁判使用gpt-5.5，E3在所有聚合指标上获得最高召回率。包含部分的召回率达到90.2%，比GPT高15.5个百分点，比Claude高17.1个百分点，比人工评审高29.2个百分点；严格召回率保持排序为65.8%。在人工评审提出的问题上，E3恢复了89.6%；在人工评审遗漏的问题上，E3额外发现1635条被纳入评审联合集的问题行，比次优来源多406条。语料库、基线提示、裁判提示模板和评估代码均已发布。
