  title_cn: 帕累托前沿的力量：在扫描探针显微镜中平衡不确定奖励以实现自适应实验
  abstract_cn: 自动化实验有潜力彻底改变科学发现，但其有效性取决于明确定义的优化目标，而在现实环境中这些目标往往是不确定或概率性的。在这项工作中，我们展示了多目标贝叶斯优化（Multi-Objective
    Bayesian Optimization, MOBO）在自主实验中平衡多个竞争奖励的应用。通过使用扫描探针显微镜（SPM）成像——最广泛使用且基础的SPM模式之一——我们表明MOBO可以优化成像参数，以提升测量质量、可重复性和效率。该方法的一个关键优势是能够计算和分析帕累托前沿（Pareto
    front），这不仅指导优化，还提供了不同目标之间权衡的物理洞察。此外，MOBO为人在回路决策提供了一个自然框架，使研究人员能够基于领域专业知识微调实验权衡。通过标准化高质量、可重复的测量并将人类输入整合到AI驱动的优化中，这项工作凸显了MOBO作为推进自主科学发现的强大工具。
  tldr_cn: 多目标贝叶斯优化平衡扫描探针显微镜中的竞争奖励，提升测量质量并支持人在回路决策。
  analysis_cn:
    innovations:
    - 将多目标贝叶斯优化（MOBO）应用于自主扫描探针显微镜成像中平衡多个竞争奖励。
    - 利用帕累托前沿（Pareto front）不仅指导优化，还提取关于测量质量、可重复性和效率之间权衡的物理洞察。
    - 在MOBO框架中整合人在回路决策，使研究人员能够基于领域专业知识微调实验权衡。
    methodology: 应用多目标贝叶斯优化（MOBO）优化扫描探针显微镜成像参数。该方法通过计算和分析帕累托前沿（Pareto front）来平衡三个目标——测量质量、可重复性和效率。该框架还支持人在回路交互以调整权衡。
    key_results: MOBO成功优化了SPM成像参数，提升了测量质量、可重复性和效率。帕累托前沿揭示了这些目标之间权衡的物理洞察。
