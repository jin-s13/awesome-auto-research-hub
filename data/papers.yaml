  title_cn: CodeScientist：基于代码实验的端到端半自动化科学发现
  abstract_cn: 尽管对软件制品（例如改进的机器学习算法）的自主科学发现（ASD）兴趣激增，但当前的ASD系统面临两个关键限制：（1）它们主要探索现有代码库的变体或类似受限的设计空间；（2）它们产生大量研究制品（如自动生成的论文和代码），通常使用会议式论文评审进行评估，而对代码的评估有限。在这项工作中，我们引入了CodeScientist，一种新颖的ASD系统，它将构思和实验构建视为一种遗传搜索，联合搜索研究文章和定义领域内常见动作（如提示语言模型）的代码块的组合。我们利用这一范式，在智能体和虚拟环境领域广泛地对机器生成的想法进行了数百次自动化实验，系统返回了19项发现，其中6项在经过多维度评估（包括外部会议式评审、代码评审和复现尝试）后被判定为至少具有最低限度的合理性和增量新颖性。此外，这些发现涵盖了新任务、智能体、指标和数据，表明从基准优化向更广泛发现的定性转变。
  tldr_cn: CodeScientist通过文章和代码块的遗传搜索实现半自动化科学发现，产出19项发现并经多维度评估。
  analysis_cn:
    innovations:
    - 将构思和实验构建视为对研究文章和定义领域内常见动作的代码块组合的遗传搜索。
    - 超越会议式评审的多维度评估，包括代码评审和复现尝试。
    - 产生涵盖新任务、智能体、指标和数据的发现，超越基准优化。
    methodology: CodeScientist采用遗传搜索范式，联合组合研究文章和代码块（定义常见动作，如提示语言模型）以生成想法并构建实验。它在智能体和虚拟环境领域对机器生成的想法进行了数百次自动化实验。
    key_results: 系统返回了19项发现，其中6项在外部评审、代码评审和复现尝试后被判定为至少具有最低限度的合理性和增量新颖性。这些发现涵盖了新任务、智能体、指标和数据。
    limitations:
    - 19项发现中仅有6项被判定为合理且增量新颖，表明许多输出并不合理或新颖。
    - 该系统是半自动化的，并非完全自主。
    - 评估仅限于智能体和虚拟环境领域。
    tech_stack:
    - genetic search
    - codeblocks
    - language model
