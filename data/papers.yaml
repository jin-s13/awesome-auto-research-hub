- id: pai-msc-ml-theory-research-with-humans-on-the-loop-2026
  title: 'pAI/MSc: ML Theory Research with Humans on the Loop'
  authors:
  - Mahmoud Abdelmoneum
  - Pierfrancesco Beneventano
  - Tomaso Poggio
  abstract: 'We present pAI/MSc, an open-source, customizable, modular multi-agent
    system for academic research workflows. Our goal is not autonomous scientific
    ideation, nor fully automated research. It is narrower and more practical: to
    reduce by orders of magnitude the human steering required to turn a specified
    hypothesis into a literature-grounded, mathematically established, experimentally
    supported, submission-oriented manuscript draft. pAI/MSc is built with a current
    emphasis on machine learning theory and adjacent quantitative fields.'
