    innovations:
    - Introduction of the Automated LLM Speedrunning Benchmark, a new benchmark for
      evaluating AI agents' ability to reproduce research results using the NanoGPT
      speedrun competition.
    - Design of 19 tasks that provide agents with a previous record's training script
