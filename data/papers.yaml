  title_cn: 立场：正确答案，错误机制——当AI科学家为其自身数据相矛盾的一般性主张辩护时
  abstract_cn: AI科学家系统被描述为工具、合著者或创始人，但我们评估它们时仿佛只有最终答案才重要。本立场论文认为仅以结果评估是不够的，必须分别测量任务结果、机制保真度和认知诚实。我们的证据来自一个编码代理尝试在Geant4模拟中重新发现已知粒子识别可观测量的28个片段，包括跨两个额外前沿模型的8个片段探测。在4/20的主模型和3/8的跨模型片段中，代理通过不正确的推理获得了看似正确的结果，但在条件变化时失效，我们称之为“正确答案，错误机制”（Correct
    Answer, Wrong Mechanism, CAWM）。诚实和机制保真度在单个代理轨迹内分离。当给予部分误导性先验时，所有五个代理都基于证据拒绝了错误成分，但其中一个代理用与其自身数据不一致的物理学为其选择的可观测量辩护。在此基于模拟的发现环境中，编码代理被证明是可靠的工具，但对于开放式主张制定而言是不可靠的科学合著者，因为合著者信任需要它们无法可靠自我应用的机制保真度验证。这种失败是可检测的，我们提出了一种轻量级测试。单步机制转变检查仅需代理的主张即可标记过度泛化的情况。当已知正确可观测量时，伴随重新计算可标记其余情况。这些检查共同标记了本研究中的每一个CAWM案例。
  tldr_cn: 立场论文认为仅以结果评估AI科学家不足；提出测量机制保真度和认知诚实，基于模拟证据。
  analysis_cn:
    innovations:
    - 引入了正确答案、错误机制（CAWM）的概念，即AI代理通过不正确的推理产生看似正确的结果，但在条件变化时失效
    - 提出从三个独立维度评估AI科学家：任务结果、机制保真度和认知诚实
