  title_cn: 自主目标演化代理加速科学发现
  abstract_cn: 人们对开发能够拓展科学发现边界的代理产生了前所未有的兴趣，这些代理主要通过优化科学家指定的定量目标函数来实现。然而，对于科学中的重大挑战，这些目标可能只是不完美的代理指标。我们认为，自动化目标函数设计是科学发现代理的一个核心但尚未满足的需求。在这项工作中，我们引入了科学自主目标演化代理（SAGA）来应对这一挑战。SAGA采用双层架构，其中外层LLM代理分析优化结果，提出新目标，并将其转化为可计算的评分函数，而内层则在当前目标下进行解优化。这种双层设计使得能够系统地探索目标空间及其权衡，而不是将其视为固定输入。我们通过广泛的设计应用展示了该框架，包括抗生素、纳米抗体、功能性DNA序列、无机材料和化学过程。值得注意的是，我们的实验验证在抗生素设计任务中识别出一个结构新颖的、对大肠杆菌具有良好效力和安全性的候选分子，以及在纳米抗体设计任务中发现了三个从头设计的PD-L1结合物。这些结果表明，自动化目标制定可以显著提高科学发现代理的有效性。
  tldr_cn: SAGA是一种双层LLM代理，自动化目标函数设计以加速科学发现，经多个实际任务验证。
  analysis_cn:
    innovations:
    - 为科学发现代理自动化目标函数设计，解决一个核心但尚未满足的需求
    - 双层架构，外层LLM代理提出目标并将其转化为评分函数，内层进行优化循环
    - 系统探索目标空间及其权衡，而非固定输入
    methodology: SAGA采用双层架构：外层LLM代理分析优化结果，提出新目标，并将其转化为可计算的评分函数，内层则在当前目标下进行解优化。该框架在抗生素、纳米抗体、功能性DNA序列、无机材料和化学过程中得到验证。
    key_results: 实验验证在抗生素设计任务中识别出一个结构新颖的、对大肠杆菌具有良好效力和安全性的候选分子，以及在纳米抗体设计任务中发现了三个从头设计的PD-L1结合物。
