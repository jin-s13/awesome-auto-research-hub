  title_cn: 当AI共同科学家失败时：SPOT：一个用于科学研究自动验证的基准
  abstract_cn: 近年来，大型语言模型（LLM）的进展推动了自动化科学发现的愿景，通常被称为AI共同科学家。迄今为止，先前的工作将这些系统视为生成式合著者，负责构思假设、合成代码或起草手稿。在本工作中，我们探索了一种互补的应用：使用LLM作为验证者，自动化科学手稿的学术验证。为此，我们引入了SPOT数据集，包含83篇已发表论文及其对应的91个足以导致勘误或撤稿的显著错误，并经实际作者和人工标注者交叉验证。在SPOT上评估最先进的LLM，我们发现没有模型超过21.1%的召回率或6.1%的精确率（o3取得最佳分数，其他模型接近零）。此外，置信度估计普遍较低，并且在八次独立运行中，模型很少重新发现相同的错误，削弱了其可靠性。最后，与领域专家的定性分析表明，即使最强的模型也会犯类似于学生因误解而产生的错误。这些发现凸显了当前LLM能力与可靠AI辅助学术验证要求之间的巨大差距。
  tldr_cn: SPOT基准测试评估LLM作为科学手稿验证者，发现召回率和精确率低，凸显自动验证的差距。
  analysis_cn:
    innovations:
    - 引入了SPOT数据集，包含83篇已发表论文及其对应的91个足以导致勘误或撤稿的显著错误，并经作者和人工标注者交叉验证。
    - 提出将LLM作为验证者用于科学手稿的自动化学术验证，这是对生成式AI共同科学家角色的补充。
    methodology: 在SPOT数据集上使用召回率和精确率指标评估最先进的LLM，同时进行置信度估计和八次独立运行的一致性分析。与领域专家进行定性分析以分类模型错误。
    key_results: 没有LLM超过21.1%的召回率或6.1%的精确率；o3取得最佳分数，其他模型接近零。置信度估计普遍较低，且模型在多次运行中很少重新发现相同的错误。
    limitations: []
