- id: an-agentic-framework-for-autonomous-materials-computation-2025
  title: An Agentic Framework for Autonomous Materials Computation
  authors:
  - Zeyu Xia
  - Jinzhe Ma
  - Congjie Zheng
  - Shufei Zhang
  - Yuqiang Li
  - Hang Su
  - P. Hu
  - Changshui Zhang
  - Xingao Gong
  - Wanli Ouyang
  - Lei Bai
  - Dongzhan Zhou
  - Mao Su
  abstract: Large Language Models (LLMs) have emerged as powerful tools for accelerating
    scientific discovery, yet their static knowledge and hallucination issues hinder
    autonomous research applications. Recent advances integrate LLMs into agentic
    frameworks, enabling retrieval, reasoning, and tool use for complex scientific
    workflows. Here, we present a domain-specialized agent designed for reliable automation
    of first-principles materials computations. By embedding domain expertise, the
    agent ensures physically coherent multi-step workflows and consistently selects
    convergent, well-posed parameters, thereby enabling reliable end-to-end computational
    execution. A new benchmark of diverse computational tasks demonstrates that our
    system significantly outperforms standalone LLMs in both accuracy and robustness.
    This work establishes a verifiable foundation for autonomous computational experimentation
    and represents a key step toward fully automated scientific discovery.
