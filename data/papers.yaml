  title_cn: Kosmos：用于自主发现的人工智能科学家
  abstract_cn: 数据驱动的科学发现需要文献搜索、假设生成和数据分析的迭代循环。在自动化科学研究的AI智能体方面已取得重大进展，但所有此类智能体在失去连贯性之前所能采取的行动数量仍然有限，从而限制了其发现的深度。在此，我们提出Kosmos，一个自动化数据驱动发现的人工智能科学家。给定一个开放式目标和数据集，Kosmos运行长达12小时，执行并行数据分析、文献搜索和假设生成的循环，然后将发现综合成科学报告。与之前的系统不同，Kosmos使用结构化世界模型在数据分析智能体和文献搜索智能体之间共享信息。该世界模型使Kosmos能够在超过200次智能体展开中连贯地追求指定目标，每次运行平均执行42,000行代码并阅读1,500篇论文。Kosmos在其报告中的所有陈述均引用代码或原始文献，确保其推理可追溯。独立科学家发现Kosmos报告中79.4%的陈述是准确的，合作者报告称，一次20周期的Kosmos运行平均相当于他们6个月的研究工作量。此外，合作者报告称，有价值科学发现的数量随Kosmos周期线性增长（测试至20周期）。我们重点介绍了Kosmos在代谢组学、材料科学、神经科学和统计遗传学领域做出的七项发现。其中三项发现独立复现了Kosmos在运行时未访问的预印本或未发表手稿的结果，另外四项则对科学文献做出了新颖贡献。
  tldr_cn: Kosmos自主进行数据分析、文献搜索和假设生成循环，12小时内生成高准确度可追溯的科学报告。
  analysis_cn:
    innovations:
    - 结构化世界模型，在数据分析智能体和文献搜索智能体之间共享信息，使得在超过200次智能体展开中实现连贯的长周期发现。
    - 并行数据分析、文献搜索和假设生成的迭代循环，最终综合成科学报告。
    - 通过引用代码或原始文献对所有报告陈述进行可追溯推理。
    - 有价值科学发现随周期数线性增长（测试至20周期）。
    - 自主复现未发表发现并在代谢组学、材料科学、神经科学和统计遗传学领域产生新颖贡献。
    methodology: Kosmos接受一个开放式目标和数据集，然后运行长达12小时，执行并行数据分析、文献搜索和假设生成的迭代循环。结构化世界模型使得数据分析智能体和文献搜索智能体之间能够共享信息。发现被综合成科学报告，其中每个陈述都引用代码或原始文献。
    key_results: 独立科学家评定Kosmos报告中79.4%的陈述为准确；一次20周期运行平均相当于研究人员6个月的工作量，有价值发现的数量随周期线性增长。七项发现跨越多个领域，其中三项复现了未发表/预印本结果，四项为新颖贡献。
    limitations:
    - 报告陈述准确率为79.4%，意味着20.6%的陈述可能不准确。
