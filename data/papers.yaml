  title_cn: AI CFD科学家：面向开放的计算流体动力学发现，具有物理感知的AI智能体
  abstract_cn: 近期基于LLM的智能体已在纯软件机器学习研究、化学和生物学中完成了科学发现循环的相当大一部分。将同样的循环扩展到高保真物理模拟器则更为困难，因为求解器完成并不代表物理有效性，且许多失败模式仅出现在场级图像中而非求解器日志中。我们提出了AI
    CFD Scientist，一个用于计算流体动力学（CFD）的开源AI科学家，据我们所知，它是首个在单一可检查工作流中涵盖基于文献的构思、验证执行、基于视觉的物理验证、源代码修改以及基于图形的写作的系统。三个耦合路径覆盖了固定求解器内的参数扫描、针对新物理模型的案例本地C++库编译，以及针对参考比较器的开放式假设搜索，所有这些均通过Foam-Agent在OpenFOAM上运行。该框架的核心是一个视觉-语言物理验证门控，它在任何结果被接受、重新运行或写入稿件之前检查渲染的流场。在共享GPT-5.5骨干网络下的五个任务中，AI
    CFD Scientist自主发现了一个Spalart-Allmaras运行时修正，在Reh=5600的周期性山丘上，将下壁面Cf RMSE相对于DNS降低了7.89%；在匹配的LLM成本下，两个强大的通用AI科学家基线（ARIS,
    DeepScientist）执行了部分CFD工作流，但缺乏将运行转化为可辩护科学主张所需的领域特定有效性门控；一项受控的植入失败消融实验表明，视觉-语言门控检测到了求解器级别检查遗漏的16个静默失败中的14个。代码、提示和运行工件已在https://github.com/csml-rpi/cfd-scientist发布。
  tldr_cn: AI CFD Scientist是一个开源AI智能体，通过物理感知验证自主进行计算流体动力学发现，在壁面Cf RMSE上实现了7.89%的改进。
