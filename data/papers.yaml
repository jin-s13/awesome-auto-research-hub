- id: rethinking-publication-a-certification-framework-for-ai-ena-2026
  title: 'Rethinking Publication: A Certification Framework for AI-Enabled Research'
  authors:
  - Yang Lu
  - Rabimba Karanjai
  - Lei Xu
  - Weidong Shi
  abstract: 'AI research pipelines can now generate academic work that may satisfy
    existing peer review standards for quality, novelty, and methodological rigor.
    However, the publication system was built around the assumption that research
    is produced by human authors. It therefore lacks a clear way to evaluate work
    when the knowledge claim may be valid but the producer is partly or fully automated.
    This paper proposes a two-layer certification framework for AI-generated research.
    The first layer evaluates whether the knowledge claim is sound. The second layer
    evaluates the level of human contribution. This separation allows journals and
    conferences to assess pipeline-generated work more consistently without creating
    new institutions. The framework uses normative analysis, conceptual design, and
    dry-run validation against representative submission cases. It classifies human
    contribution into three categories: Category A, where the work is reachable by
    an automated pipeline; Category B, where human direction is required at identifiable
    stages; and Category C, where the work goes beyond current pipeline capability,
    especially at the problem-formulation stage. The paper also proposes dedicated
    benchmark slots for fully disclosed automated research. These slots would provide
    a transparent publication path and help reviewers calibrate judgments over time.
    The key argument is that publication has historically certified two things at
    once: that the knowledge is valid and that a human produced it. AI research pipelines
    separate these two claims. By decoupling knowledge certification from authorship
    attribution, the proposed framework responds to a structural change already underway.
    It can be implemented within existing editorial systems, works even when attribution
    is uncertain, and recognizes human frontier contribution based on epistemic value
    rather than human origin alone.'
