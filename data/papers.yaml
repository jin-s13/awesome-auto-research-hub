  title_cn: 大型语言模型在维基百科风格综述生成中的应用：NLP概念评估
  abstract_cn: 教育材料，如计算机科学等专业领域的综述文章，传统上需要大量的专家投入，因此创建和更新成本高昂。近年来，大型语言模型（LLMs）在各种通用任务中取得了显著成功。然而，它们在教育领域的有效性和局限性尚未得到充分探索。在这项工作中，我们考察了LLMs在生成计算机科学中NLP这一细分领域的简洁综述文章方面的能力，重点关注精心挑选的99个主题。自动基准测试显示，与已建立的真实标准相比，GPT-4的性能超越了其前代模型（包括GPT-3.5、PaLM2和LLaMa2），提升幅度在2%到20%之间。我们比较了人工评估和基于GPT的评估分数，并进行了深入分析。虽然我们的研究结果表明，GPT生成的综述比人工撰写的综述更具时代性和可读性，但也观察到了一些局限性。值得注意的是，GPT-4尽管经常提供出色的内容，但偶尔会出现遗漏细节或事实错误等问题。最后，我们比较了人类和GPT-4的评分行为，发现使用GPT评估存在系统性偏差。
  tldr_cn: 评估LLMs生成NLP维基百科综述，GPT-4最优但有错误和评估偏差。
  analysis_cn:
    innovations:
    - 首次全面评估LLMs在专业领域（NLP）生成维基百科风格综述文章的能力
    - 为综述生成精心策划的99个NLP主题基准
    - 比较人工评估与基于GPT的评估，揭示GPT评估中的系统性偏差
    methodology: 多个LLMs（GPT-4、GPT-3.5、PaLM2、LLaMa2）被提示为99个NLP主题生成综述文章。自动基准测试将输出与真实标准进行比较，并进行了人工和GPT-4评估，随后分析了评分行为和偏差。
    key_results: GPT-4在自动指标上以2%-20%的优势优于其他LLMs；GPT生成的综述更具时代性和可读性，但偶尔遗漏细节或包含事实错误；发现基于GPT的评估存在系统性偏差。
    limitations:
    - GPT-4偶尔出现失误，遗漏细节或引入事实错误
    - 与人工评分相比，使用GPT-4进行评估存在系统性偏差
