    - 引入BAISBench，一个在真实单细胞转录组数据集上评估AI科学家的基准，包含两个任务：细胞类型注释和基于已发表研究选择题的科学发现。
    - 提供使用六名研究生水平生物信息学家的人类表现基线，以对比AI科学家的表现。
