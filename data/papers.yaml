  title_cn: 科学贡献图：大规模自动化基于文献的技术路线规划
  abstract_cn: 科学贡献很少孤立地发展，而是建立在先前发现的基础上。我们将自动化技术路线规划的任务定义为从学术文章中提取科学贡献并将其与前提条件联系起来。我们提出了科学贡献图（Scientific
    Contribution Graph），这是一个大规模的AI/NLP领域资源，包含从23万篇开放获取论文中提取的200万个详细科学贡献，并通过1250万条前提边连接。我们进一步引入了科学前提预测任务，即模型预测哪些现有技术可以促成未来发现，并展示了当代模型在该任务上迅速改进，在使用时间过滤回测评估时达到了0.48
    MAP。我们预计此类技术路线规划资源将支持科学影响评估和自动化科学发现。
