  title_cn: 自动化越多，所见越少：AI科学家系统的隐藏陷阱
  abstract_cn: 能够自主执行从假设生成、实验到论文撰写的完整研究流程的AI科学家系统，在加速科学发现方面具有巨大潜力。然而，这些系统的内部工作流程尚未得到仔细审视。这种缺乏审查可能引入缺陷，从而损害其研究产出的完整性、可靠性和可信度。在本文中，我们识别了当代AI科学家系统中的四种潜在失败模式：不恰当的基准选择、数据泄露、指标误用以及事后选择偏差。为了检验这些风险，我们设计了隔离每种失败模式的受控实验，同时应对评估AI科学家系统所特有的挑战。我们对两个著名的开源AI科学家系统进行了评估，揭示了若干严重程度不一的失败，这些失败在实践中容易被忽视。最后，我们证明，访问完整自动化工作流程中的跟踪日志和代码，比仅检查最终论文能更有效地检测此类失败。因此，我们建议评估AI生成研究的期刊和会议强制要求提交这些工件以及论文，以确保透明度、问责制和可重复性。
  tldr_cn: 识别出AI科学家系统中的四种失败模式，并通过在两个开源系统上的受控实验进行验证。
  analysis_cn:
    innovations:
