  title_cn: 从AI助手到AI科学家：利用LLM代理自主发现LLM-RL算法
  abstract_cn: 发现改进的语言模型策略优化算法仍然是一个成本高昂的手动过程，需要反复进行机制层面的修改和验证。与简单的组合代码搜索不同，这个问题需要在与训练动态紧密耦合的算法机制中进行搜索，同时跨迭代重用经验证据。我们提出POISE，一个用于自动发现语言模型策略优化算法的闭环框架。POISE维护一个结构化的、具有谱系关联的档案，将提案、可执行实现、标准化评估和自然语言反思联系起来，以支持基于证据的迭代。在从GRPO开始的数学推理实验中，POISE评估了64个候选算法，并发现了改进的机制，包括分析方差缩放和有效性掩码。最佳变体将加权Overall从47.8提高到52.5（+4.6），并将AIME25
    pass@32从26.7%提高到43.3%，证明了自动策略优化发现的可行性，同时支持可解释的设计原则。
