  title_cn: 理解AI驱动的科学研究工具中的使用与参与：Asta交互数据集
  abstract_cn: AI驱动的科学研究工具正迅速融入研究工作流程，然而该领域缺乏对研究人员在真实环境中如何使用这些系统的清晰视角。我们提出并分析了Asta交互数据集，这是一个大规模资源，包含来自两个已部署工具（一个文献发现界面和一个科学问答界面）的超过20万条用户查询和交互日志，这些工具运行在一个基于LLM的检索增强生成平台上。利用该数据集，我们描述了查询模式、参与行为以及使用如何随经验演变。我们发现，用户提交的查询比传统搜索更长、更复杂，并将系统视为协作研究伙伴，委托其完成起草内容和识别研究空白等任务。用户将生成的回复视为持久性工件，以非线性方式重新访问和浏览输出及引用的证据。随着经验积累，用户会发出更具针对性的查询，并更深入地参与支持性引用，尽管关键词式查询即使在经验丰富的用户中仍然存在。我们发布了匿名化数据集和分析，并附带一个新的查询意图分类法，以指导未来真实世界AI研究助手的设计，并支持现实评估。
  tldr_cn: 分析来自两个AI驱动研究工具的20万+用户查询，揭示复杂查询模式和协作使用行为。
  grade: worth_reading
- id: unlocking-the-visual-record-of-materials-science-a-large-sc-2026
  title: 'Unlocking the Visual Record of Materials Science: A Large-Scale Multimodal
    Dataset from Scientific Literature'
  authors:
  - Subham Ghosh
  - Shubham Tiwari
  - Mohammad Ibrahim
  - Abhishek Tewari
  abstract: 'The materials science literature encodes decades of experimental knowledge
    in figures, yet this visual record remains locked away and inaccessible to AI
    at scale. The core difficulty is structural: most scientific figures are compound,
    with a single caption describing multiple sub-panels simultaneously, making direct
    image-text pairing unreliable. We present MatMMExtract, an end-to-end open-source
    pipeline that resolves this by decomposing compound figures into individual sub-panels
    and generating structured, grounded annotations using a large language model guided
    by a curated materials science taxonomy. Applied to 14,810 open-access articles,
    MatMMExtract produces MatSciFig; 391,606 panel-level image-text pairs from 180,571
    figures, each annotated with a sub-caption, a two-level visualisation category
    spanning 19 classes and over 100 subtypes, and a scientific summary. To enable
    accurate panel localisation, we introduce MaterialScope, a domain-specific detection
    dataset of 2,811 manually annotated materials science figures, on which a fine-tuned
    YOLO12-m detector achieves mAP_50 of 0.9227. Among six benchmarked language models,
    Gemini 3.1 Flash Lite delivers the best cost-quality trade-off for annotation
    generation, with 82% of outputs rated good and a hallucination rate of 4.8%. A
    dual-encoder retrieval baseline on MatSciFig achieves a 4.4 times improvement
    in R@1 over zero-shot CLIP, demonstrating the dataset''s immediate utility for
    vision-language learning. All resources are released openly to the community.'
