  abstract_cn: 尽管跨学科研究能带来更大且更长期的影响，但大多数工作仍局限于单一学科的学术孤岛中。近期基于AI的科学发现方法在跨学科研究方面展现出潜力，但许多方法优先考虑快速设计实验和解决方案，绕过了推动创造性跨学科突破的探索性、协作性推理过程。因此，先前的工作主要侧重于自动化科学发现，而非增强支撑科学颠覆的推理过程。我们提出Idea-Catalyst，一个新颖的框架，系统性地识别跨学科见解，以支持人类和大语言模型的创造性推理。从一个抽象的研究目标出发，Idea-Catalyst旨在辅助头脑风暴阶段，明确避免过早锚定于特定解决方案。该框架体现了跨学科推理的关键元认知特征：(a)定义和评估研究目标，(b)对领域内机遇和未解决挑战的认知，以及(c)基于影响潜力对跨学科想法进行战略性探索。具体而言，Idea-Catalyst将一个抽象目标（例如，改善人机协作）分解为核心目标领域的研究问题，指导对该领域进展和开放挑战的分析。这些挑战被重新表述为领域无关的概念性问题，从而能够从处理类似问题的外部学科（例如心理学、社会学）中检索。通过将这些领域的见解综合并重新语境化到目标领域，Idea-Catalyst根据跨学科潜力对源领域进行排序。实验表明，这种有针对性的整合使新颖性平均提高21%，洞察力提高16%，同时保持扎根于原始研究问题。
