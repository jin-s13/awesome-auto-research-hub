  title_cn: AI-Supervisor：通过持久研究世界模型实现自主AI研究监督
  abstract_cn: 现有的自动化研究系统以无状态、线性流水线的方式运行——生成输出时，对其所导航的研究领域缺乏任何持久理解。它们顺序处理论文，在没有结构化差距分析的情况下提出想法，并且缺乏让智能体相互验证、质疑或完善彼此发现的机制。我们提出AI-Supervisor，一个多智能体编排框架，其中专门化的智能体通过自主探索和研究知识的自我纠正更新，提供由人类兴趣驱动的端到端AI研究监督——从文献综述到差距发现、方法开发、评估和论文撰写。与顺序流水线不同，AI-Supervisor维护一个持续演化的研究世界模型（Research
    World Model），实现为知识图谱（Knowledge Graph），该模型捕获方法、基准、已知局限和未探索的差距，作为所有智能体的共享记忆，使智能体能够探索并基于对研究领域的结构化理解进行构建。该框架引入了三项架构贡献：（1）结构化差距发现（structured
    gap discovery），将方法分解为核心模块，跨基准验证其性能，并映射每个模块产生的具体差距；（2）自我纠正发现循环（self-correcting
    discovery loops），探究模块为何在某些问题上成功而在其他问题上失败、基准是否携带隐藏偏差、以及评估协议是否仍足以应对新兴挑战；（3）自我改进开发循环（self-improving
    development loops），由跨领域机制搜索驱动，迭代地针对失败模块，从其他科学领域寻找解决方案。所有智能体在共识机制（consensus mechanism）下运作，独立发现结果在提交至研究世界模型之前需经过相互验证。
