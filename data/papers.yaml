    2025研讨会和ACL 2025接受，这表明一个能够发现人类未知现象的人类水平AI科学家可能即将到来。尽管取得了这些实质性进展，AI科学家尚未在计算机科学领域产生与自动化科学工具相媲美的突破性成果。基于现有复杂工程任务基准的大量定量证据以及对五个先进AI科学家系统生成的28篇研究论文的系统评估，我们认为AI科学家的根本瓶颈在于其执行必要验证程序的能力。当前的AI科学家系统缺乏执行严格实验和产生高质量科学论文所需的执行能力。为了更好地说明这一“实现差距”的根本原因，我们深入讨论了AI科学家的基本局限性。本立场论文旨在呼吁社区参与者弥合这一实现差距。
