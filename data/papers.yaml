  title_cn: AI科学家作为发现引擎：在改革机构内发展的论证
  abstract_cn: 自主人工智能（AI）系统开始协助、加速并部分自动化科学发现，执行包括文献综合、代码生成、数据分析、假设提出和模型批判在内的任务。我们认为这一转变是质变而非增量，且经过适当设计的多智能体系统可能从被动计算工具演变为能够扩展科学假设生成与验证能力的“AI科学家”。此类系统必须在适合目的的科学生态系统中开发与部署：机构必须为验证、问责、可解释性和双重用途安全进行重新设计。我们勾勒了多智能体架构（以原型框架Denario为例）如何加速发现周期并遍历人类无法触及的模型空间；探讨这对作者身份、同行评审以及人类科学家的持久角色意味着什么；最后提出将AI作为认知主体而非单纯工具进行治理的建议。
  tldr_cn: 主张在改革机构内开发多智能体AI科学家，以Denario原型为例，加速科学发现。
  analysis_cn:
