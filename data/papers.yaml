- id: towards-automating-scientific-review-with-google-s-paper-ass-2026
  title: Towards Automating Scientific Review with Google's Paper Assistant Tool
  authors:
  - Rajesh Jayaram
  - Drew Tyler
  - David Woodruff
  - Corinna Cortes
  - Yossi Matias
  - Vahab Mirrokni
  - Vincent Cohen-Addad
  abstract: "Artificial intelligence is driving a revolution in scientific discovery,\
    \ accelerating everything from hypothesis generation to mathematical theorem proving.\
    \ However, this rapid acceleration is creating a systemic challenge: traditional\
    \ human peer review cannot scale to match the influx of AI-assisted science. Ultimately,\
    \ to resolve this tension, we must also deploy AI to accelerate the verification\
    \ and review process itself. To frame the discussion around this transition, we\
    \ propose a taxonomy consisting of four progressive levels of AI-human collaboration\
    \ in scientific evaluation, and discuss various trade-offs involved with each.\n\
    \  As a step toward this future, we introduce the Paper Assistant Tool (PAT),\
    \ an agentic AI framework built for deep scientific review and verification. PAT\
    \ ingests full scientific manuscripts and produces a comprehensive evaluation,\
    \ checking theoretical results, validating experiments, suggesting improvements,\
    \ and identifying potential flaws. By utilizing inference scaling techniques,\
    \ PAT is able to identify deeper issues than a single model call alone, achieving\
    \ a 34% improvement over zero-shot recall on mathematical errors in the SPOT benchmark.\
    \ Pilot deployments of PAT as a pre-submission tool for authors at two major Computer\
    \ Science conferences -- STOC and ICML -- demonstrate its ability to identify\
    \ critical errors and suggest substantive improvements to research papers. By\
    \ catching errors early, PAT eases the cognitive burden placed on referees, while\
    \ preserving their control over the outcomes of the review process."
