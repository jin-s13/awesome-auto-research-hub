  analysis:
    innovations:
    - 'Proposes evaluating AI scientist systems on three separate dimensions: task
      outcome, mechanism fidelity, and epistemic honesty, rather than outcome alone.'
    - Introduces and defines the 'Correct Answer, Wrong Mechanism' (CAWM) failure
