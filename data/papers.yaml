  title_cn: ResearchEVO：面向自动化科学发现与文档撰写的端到端框架
  abstract_cn: 科学突破中一个重要的重复模式是两阶段过程：初始阶段进行无定向实验，产生意外发现；随后是回顾阶段，解释该发现为何有效，并将其置于现有理论中。我们提出ResearchEVO，一个端到端框架，以计算方式实例化这种“发现-解释”范式。进化阶段采用LLM引导的双维协同进化——同时优化算法逻辑和整体架构——仅通过适应度搜索代码实现空间，无需理解其产生的解决方案。写作阶段则选取性能最佳的算法，通过句子级检索增强生成（带有显式反幻觉验证和自动化实验设计）自主生成完整的、可发表的科研论文。据我们所知，ResearchEVO是首个覆盖这一完整流水线的系统：此前没有工作同时进行原则性算法进化与基于文献的科学文档生成。我们在两个跨学科科学问题——使用真实Google量子硬件数据的量子纠错，以及物理信息神经网络——上验证了该框架，其中进化阶段发现了各自领域文献中未曾提出的人类可解释的算法机制。在两个案例中，写作阶段均自主生成了可编译的LaTeX手稿，通过RAG正确地将这些盲发现与现有理论联系起来，且零虚构引用。
  tldr_cn: ResearchEVO是一个端到端框架，结合LLM引导的算法进化与自主论文生成，实现自动化科学发现。
  analysis_cn:
    innovations:
    - 端到端框架，自动化完整的“发现-解释”科学范式，从盲算法进化到可发表的论文生成。
    - LLM引导的双维协同进化，同时优化算法逻辑和整体架构，仅基于适应度，无需先验理解。
    - 句子级检索增强生成，带有显式反幻觉验证和自动化实验设计，用于写作阶段。
    - 首个在单一流水线中联合执行原则性算法进化与基于文献的科学文档生成的系统。
    methodology: ResearchEVO包含一个进化阶段，使用LLM引导的双维协同进化通过适应度搜索代码实现；以及一个写作阶段，通过句子级检索增强生成（带反幻觉检查和自动化实验设计）生成完整的LaTeX手稿。该框架在量子纠错（使用真实Google量子硬件数据）和物理信息神经网络两个任务上进行了验证。
    key_results: 进化阶段在两个任务中发现了领域文献中未曾提出的人类可解释的算法机制。写作阶段自主生成了可编译的LaTeX手稿，通过RAG正确地将盲发现与现有理论联系起来，且零虚构引用。
    limitations: []
