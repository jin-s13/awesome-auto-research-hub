  title_cn: ARIS：基于对抗性多智能体协作的自主研究
  abstract_cn: 本报告描述了ARIS（Auto-Research-in-sleep），一个用于自主研究的开源研究框架，包括其架构、保障机制和早期部署经验。基于LLM的智能体系统的性能既取决于模型权重，也取决于其周围的框架，该框架控制着存储、检索和呈现给模型的信息。对于长期研究工作流程，主要的失败模式不是明显的崩溃，而是看似合理但缺乏支持的“成功”：一个长时间运行的智能体可能产生声称，其证据支持不完整、被错误报告或静默继承自执行者的框架。因此，我们提出ARIS作为一个研究框架，通过跨模型对抗性协作作为默认配置来协调机器学习研究工作流程：一个执行模型推动进展，同时推荐来自不同模型族的评审模型来批判中间产物并请求修订。ARIS具有三个架构层。执行层提供超过65个可重用的Markdown定义的技能、通过MCP的模型集成、用于迭代重用先前发现的持久研究Wiki，以及确定性图形生成。编排层协调五个端到端工作流程，具有可调节的努力设置和可配置的评审模型路由。保障层包括一个三阶段流程，用于检查实验声称是否得到证据支持：完整性验证、结果到声称映射，以及将手稿陈述与声称账本和原始证据进行交叉检查的声称审计，以及一个五遍科学编辑流水线、数学证明检查和渲染PDF的视觉检查。一个原型自我改进循环记录研究轨迹并提出框架改进，这些改进仅在评审批准后才被采纳。
  tldr_cn: ARIS是开源研究框架，利用对抗性多智能体协作协调ML研究流程，并具备保障机制。
  analysis_cn:
    innovations:
    - 跨模型对抗性协作作为自主研究的默认配置，将执行模型与来自不同模型族的评审模型配对
    - 三层架构，包括执行层、编排层和保障层
    - 三阶段声称审计流程：完整性验证、结果到声称映射，以及针对声称账本和原始证据的声称审计
    - 五遍科学编辑流水线，包含数学证明检查和渲染PDF的视觉检查
    - 原型自我改进循环，记录研究轨迹并提出需经评审批准的框架改进
    methodology: ARIS是一个开源研究框架，通过跨模型对抗性协作协调机器学习研究工作流程。它包含一个执行层，提供超过65个Markdown定义的技能、MCP模型集成、持久研究Wiki和确定性图形生成；一个编排层，具有五个端到端工作流程、可调节的努力设置和可配置的评审路由；以及一个保障层，包含三阶段声称检查流程、五遍编辑流水线、证明检查和视觉检查。一个原型自我改进循环记录轨迹并提出需经评审批准的框架改进。
    key_results: 论文报告了早期部署经验和原型自我改进循环，但摘要中未提供定量实验结果。
    limitations:
    - 如果评审模型未能检测到证据不足，则看似合理但缺乏支持的成功的核心失败模式仍可能发生
    - 跨模型对抗性协作是推荐而非强制，可能允许单模型执行
    - 自我改进循环仅为原型，其有效性尚未得到验证
    - 未提供研究质量、声称准确性或保障有效性的定量评估
