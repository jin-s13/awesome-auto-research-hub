  title_cn: 深度研究智能体能否检索与组织？利用专家分类体系评估综合差距
  abstract_cn: 深度研究智能体（Deep Research Agents）日益自动化综述生成，但其在检索关键论文并将其组织成专家级分类体系方面是否达到人类专家水平仍不明确。现有基准侧重于写作质量或引用正确性，而标准聚类指标忽略了层次结构。我们提出TaxoBench基准，包含72篇高被引LLM综述，附有专家撰写的分类树及3,815篇论文到类别的映射。TaxoBench评估（1）通过召回率/精确率/F1的检索能力，以及（2）在叶子层面（论文到类别分配）和层次层面通过两个新指标：无序语义树编辑距离（US-TED/US-NTED）和语义路径相似度（Sem-Path）的组织能力。支持两种模式：深度研究（仅主题，端到端）和自底向上（提供专家论文集，仅组织）。为区分与单一专家参考的分歧和真正的模型失败，我们将发现明确划分为基于能力（无参考）和基于对齐（依赖参考）两组。评估7个深度研究智能体和12个前沿LLM揭示了双重瓶颈。在能力方面，最佳智能体仅检索到20.92%的专家引用论文，1000个模型分类体系显示75.9%的兄弟重叠、51.2%的MECE违反和83.4%的结构不平衡，这些均无需参考即可检测。在对齐方面，所有12个LLM收敛于Sem-Path
    28-29%，远低于三个独立人类标注组在同一论文集上达到的47-58%。我们的基准公开于https://github.com/KongLongGeFDU/TaxoBench。
  tldr_cn: 提出TaxoBench基准评估深度研究智能体的论文检索与分类组织能力，揭示能力与对齐的双重瓶颈。
  analysis_cn:
    innovations:
    - TaxoBench：包含72篇LLM综述、专家分类树及论文-类别映射的基准，用于评估检索与层次组织
    - 新的层次评估指标：无序语义树编辑距离（US-TED/US-NTED）和语义路径相似度（Sem-Path），捕捉超越平面聚类的分类结构
    - 将评估划分为基于能力（无参考）和基于对齐（依赖参考）两组，以区分模型失败与对单一专家参考的分歧
    methodology: TaxoBench由72篇高被引LLM综述及其专家分类树和3,815篇论文构建。通过召回率/精确率/F1评估检索，通过新指标US-TED和Sem-Path在叶子与层次层面评估组织。在7个深度研究智能体和12个前沿LLM上测试两种模式（深度研究端到端和自底向上仅组织），结果分为能力组和对齐组。
    key_results: 最佳智能体仅检索到20.92%的专家引用论文；模型分类体系显示75.9%兄弟重叠、51.2% MECE违反和83.4%结构不平衡（能力）。所有LLM达到Sem-Path
      28-29%，远低于人类标注者的47-58%（对齐）。
    limitations:
