  title_cn: 迈向自动化科学评审：谷歌论文助手工具
  abstract_cn: 人工智能正在推动科学发现的革命，加速从假设生成到数学定理证明的各个环节。然而，这种快速加速带来了一个系统性挑战：传统的人类同行评审无法扩展以匹配AI辅助科学的大量涌入。最终，为了解决这一矛盾，我们也必须部署AI来加速验证和评审过程本身。为了围绕这一转变展开讨论，我们提出了一个由四个渐进式AI-人类协作层级组成的分类法，并讨论了每个层级涉及的各种权衡。作为迈向这一未来的一步，我们介绍了论文助手工具（PAT），这是一个为深度科学评审和验证构建的智能AI框架。PAT接收完整的科学手稿，并生成全面的评估，检查理论结果、验证实验、提出改进建议并识别潜在缺陷。通过利用推理扩展技术，PAT能够识别比单次模型调用更深层次的问题，在SPOT基准测试中，数学错误检测的零样本召回率提高了34%。PAT作为预提交工具在两个主要计算机科学会议——STOC和ICML——的作者中进行了试点部署，展示了其识别关键错误并为研究论文提出实质性改进的能力。通过及早发现错误，PAT减轻了审稿人的认知负担，同时保留了他们对评审结果的控制权。
  tldr_cn: 提出论文助手工具PAT用于自动化科学评审，包含AI-人类协作层级分类及实际部署。
  analysis_cn:
    innovations:
    - 提出了科学评估中四个渐进式AI-人类协作层级的分类法
    - 介绍了论文助手工具（PAT），一个用于深度科学评审和验证的智能AI框架
    - 利用推理扩展技术，在SPOT基准测试中数学错误检测的零样本召回率提高了34%
    - 在STOC和ICML会议上试点部署PAT作为预提交工具
    methodology: PAT接收完整的科学手稿，并使用带有推理扩展技术的智能AI框架生成全面评估，检查理论结果、验证实验、提出改进建议并识别缺陷。在SPOT基准测试上评估数学错误检测，并在两个主要计算机科学会议上进行了试点研究。
    key_results: PAT在SPOT基准测试中数学错误检测的零样本召回率提高了34%，在STOC和ICML的试点部署中，它识别了关键错误并为研究论文提出了实质性改进。
