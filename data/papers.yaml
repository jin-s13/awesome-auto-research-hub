  title_cn: 进化微调：在371个优化任务中学习发现
  abstract_cn: 设计更快的GPU内核的经验是否也有助于解决长期存在的开放数学猜想？集成到进化搜索中的大型语言模型（LLM）最近在优化任务上取得了最先进的解决方案，包括开放数学猜想、GPU内核设计、科学定律发现和组合谜题。为了实现这一点，先前的工作一次只对一个目标任务应用搜索脚手架，因此每个新问题都从头开始处理，并且模型完成尝试后，搜索过程中积累的经验就被丢弃。这使得迭代演化解决方案的能力（例如，知道哪个部分要变异以及如何变异，决定何时回溯）完全保留在脚手架中，而不是模型本身。模型本身能否获得这种能力并在不同任务之间重复使用，在很大程度上尚未被研究。为了解决这个问题，我们引入了进化微调（EFT），这是一种中间训练范式，通过将进化搜索轨迹转换为监督信号来教会LLM跨任务演化解决方案。我们构建了Finch
    Collection，一个包含156K条轨迹的数据集，涵盖10个领域和371个优化任务，并对从2B到9B参数的开源LLM进行微调。实验表明，EFT赋予了跨任务泛化能力：在22个保留任务上，我们的模型平均比其基础模型高出10.22%。此外，当与测试时强化学习结合时，我们的模型在两个圆填充任务上达到了最先进的性能，并在Erdős最小重叠问题上优于其基础模型。因此，EFT充当了通用发现代理的“练习阶段”，使其不再从头解决新问题。
  tldr_cn: 提出进化微调（EFT），教会LLM跨优化任务演化解决方案，实现跨任务泛化。
  analysis_cn:
