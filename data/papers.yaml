    - Integration of intra-step noise optimization into automated experimental cycles
      via Bayesian optimization
    - Introduction of time as an additional input parameter to simultaneously optimize
      target property and measurement noise
    - 'Two novel approaches: reward-driven noise optimization and a double-optimization
      acquisition function'
    methodology: 'A Bayesian optimization workflow that co-optimizes the target property
      and measurement noise by incorporating time as an input parameter, balancing
      signal-to-noise ratio and experimental duration. Two strategies are explored:
      reward-driven noise optimization and a double-optimization acquisition function.
      The method is validated through simulations and real-world Piezoresponse Force
      Microscopy (PFM) experiments.'
    key_results: The approach successfully optimized measurement duration and property
      exploration in both simulations and PFM experiments, improving data quality
      and reducing resource expenditure.
