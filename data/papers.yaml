  title_cn: 'BioInsight: 多智能体编排实现交互式生物医学知识发现'
  abstract_cn: 生物医学研究者越来越多地使用AI生成的分析和报告来解释蛋白质水平的信号，但静态输出通常不足以支持研究决策，用户需要检查证据、评估不确定性、比较机制并完善假设。我们提出BioInsight，一个多智能体系统，从静态生物医学报告生成转向交互式、以证据为中心的界面生成。给定疾病名称、蛋白质关联表和可选的队列元数据，BioInsight通过类型化的中间工件组织疾病特异性证据，包括排序通路、文献证据包、蛋白质水平推理笔记、引用依据报告、仪表板模式和渲染的交互式界面。该系统将证据检索与机制推理分离，通过确定性组件规范化引用，并将报告中使用的相同结构化证据转换为交互式界面。我们在标准化生物医学问答、挑战性蛋白质功能推理和端到端生物医学证据综合上评估BioInsight。结果表明BioInsight达到最佳性能，并表明生物医学AI系统应超越纯文本和静态报告，转向保留来源的交互式证据工件。
  tldr_cn: BioInsight是一个多智能体系统，将静态生物医学报告转化为交互式、以证据为中心的界面，用于知识发现。
