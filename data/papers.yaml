  abstract_cn: 计算能力和机器学习算法的快速发展为利用扫描探针显微镜（SPM）实现科学发现自动化铺平了道路。实现自动化SPM的关键要素包括：通过Python代码控制SPM的接口、高计算能力的可用性，以及用于科学发现的工作流开发。在此，我们构建了一个Python接口库，使得可以从本地计算机或远程高性能计算机（HPC）控制SPM，从而满足自主工作流中机器学习算法对高计算能力的需求。我们进一步引入了一个通用平台，将SPM在科学发现中的操作抽象为固定策略或奖励驱动的工作流。我们的工作为构建自动化SPM工作流提供了完整的基础设施，既适用于常规操作，也适用于基于机器学习的自主科学发现。
