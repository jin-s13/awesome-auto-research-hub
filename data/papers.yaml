    - 专注于提升自动化综述生成中的可读性和事实准确性
    methodology: LiRA是一个多智能体框架，包含用于大纲、写作、编辑和审阅的智能体，旨在生成文献综述。它在SciReviewGen和一个专有的ScienceDirect数据集上，与AutoSurvey和MASS-Survey基线进行对比评估，使用写作质量、引用质量和与人类综述的相似度等指标，并进行了真实世界检索和鲁棒性测试。
