  title_cn: AutoEmpirical：基于LLM的实证软件故障分析自动化研究
  abstract_cn: 理解软件故障对于软件开发和维护的实证研究至关重要。然而，传统的故障分析虽然有价值，但通常涉及多个专家驱动的步骤，如收集潜在故障、筛选和手动调查。这些过程既劳动密集又耗时，造成了瓶颈，阻碍了在复杂但关键的软件系统中进行大规模故障研究，并减缓了迭代实证研究的步伐。在本文中，我们将实证软件故障研究的过程分解为三个关键阶段：（1）研究目标定义、（2）数据准备和（3）故障分析，并开展了应用大型语言模型（LLMs）进行开源软件故障分析的初步探索研究。具体而言，我们基于一项高质量实证研究中的3,829个软件故障进行了评估。结果表明，LLMs可以显著提高故障分析的效率，平均处理时间约为两小时，而传统手动分析通常需要数周。最后，我们概述了一个详细的研究计划，既突出了LLMs在推进实证故障研究方面的潜力，也指出了实现完全自动化、端到端软件故障分析所需解决的开放挑战。
  tldr_cn: LLM自动化实证软件故障分析，处理时间从数周缩短至约两小时（3829个故障）。
  analysis_cn:
    innovations:
    - 将实证软件故障研究分解为三个关键阶段：研究目标定义、数据准备和故障分析。
    - 应用LLMs对大规模数据集（3,829个软件故障）进行自动化故障分析。
    - 展示了显著的效率提升，将分析时间从数周缩短至约两小时。
    methodology: 该研究将实证故障分析分解为三个关键阶段，并应用LLMs分析来自先前高质量实证研究的3,829个软件故障，测量处理时间并与传统手动工作进行比较。
    key_results: LLMs平均在约两小时内完成故障分析，而传统手动分析需要数周，展示了显著的效率提升。
    limitations:
    - 该方法是初步探索，尚未实现完全自动化的端到端系统。
    - 实现整个实证故障研究过程的完全自动化仍存在开放挑战。
    tech_stack: []
