- id: socratic-agents-for-autonomous-scientific-discovery-in-high-2026
  title: Socratic agents for autonomous scientific discovery in high-dimensional physical
    systems
  authors:
  - Xianrui Zeng
  - Pengfei Liu
  - Yirui Zang
  - Yang Shen
  - Fei Yu
  - Chunlei Yu
  - Minghao Liu
  - Yang Du
  abstract: 'The automation of scientific discovery has reached an inflection point.
    While AI systems now operate instruments, optimize parameters and generate hypotheses,
    most remain procedural: they execute workflows fixed by human designers. True
    autonomous science demands epistemic autonomy--the capacity to construct, challenge
    and revise physical explanations in response to evidence. Here we introduce AHOIS,
    a multi-agent AI scientist that embeds Socratic midwifery into closed-loop experimentation.
    A physics-critic agent interrogates hypotheses through causal questioning, constraint
    checking, counterexample generation and falsification-criteria formulation. We
    evaluate AHOIS on a real multimode-fibre optical platform, a high-dimensional
    system with complex wave transformations, indirect detection, environmental drift
    and multi-modal acquisition. Without prior encoding schemes, classifiers or speckle
    models, the system autonomously proposed and validated a random-interference encoding
    hypothesis, discovered task-adaptive sparse-measurement strategies, diagnosed
    distinct failure modes (encoding instability, fluorescence contamination and detector
    noise) and translated a published imaging protocol into an executable workflow
    on a non-original configuration. The discovered encoding yielded 16x16 measurements
    with effective rank 56.9 and classification accuracies of 76.97% on MNIST and
    83.17% on Fashion-MNIST. Ablations show that Socratic interrogation improves physical
    consistency, hypothesis completeness, uncertainty calibration and experimental-plan
    validity. These results establish a route from workflow automation towards evidence-grounded,
    self-correcting autonomous discovery in complex physical environments.'
