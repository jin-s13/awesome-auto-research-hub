    - 'Proposes a lightweight detection method for CAWM: a one-step regime-shift check
      using only the agent''s claim, and a companion recomputation check when the
      correct observable is known.'
    methodology: The study analyzes 28 episodes of a coding agent attempting to rediscover
      a known particle identification observable in a Geant4 simulation, including
      an 8-episode probe across two additional frontier models. Agent trajectories
