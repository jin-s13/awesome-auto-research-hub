  analysis:
    innovations:
    - Introduction of SoundnessBench, a curated benchmark of 1,099 machine-learning
      research proposals reconstructed from ICLR submissions with reviewer soundness
      sub-scores and source-paper audits.
    - Discovery of a pervasive optimism bias in frontier LLMs, where low-soundness
      proposals are frequently rated as sound under standard prompting.
    - Demonstration that aggressive prompting shifts errors from false positives to
      false negatives without improving overall evaluation reliability.
    - Rigorous control experiments for public-corpus contamination, paper-identifying
      phrases, surface features, and human audit quality to rule out single-confounder
      explanations.
    methodology: SoundnessBench was built from 1,099 ICLR submissions, reconstructing
      research proposals and labeling them with reviewer soundness sub-scores, then
      audited against source papers. Twelve frontier LLMs were evaluated under standard
      and aggressive prompting, measuring optimism bias and error-type shifts. Additional
      control experiments tested for contamination, surface features, and audit quality
      confounders.
    key_results: LLMs show a strong optimism bias, often rating unsound proposals
      as sound; aggressive prompting reduces false positives but increases false negatives,
      and no single confounder explains the behavior, indicating LLMs are unreliable
      as standalone first-gate scientific rigor evaluators.
    limitations:
    - SoundnessBench measures recoverable proposal-stage soundness, not exact prediction
      of full-paper review outcomes.
    - The benchmark is limited to machine learning research proposals from ICLR, so
      findings may not generalize to other scientific domains.
    - Aggressive prompting only shifts error types (false positives to false negatives)
      without improving overall reliability.
    - Reconstructed proposals from submissions may introduce artifacts not present
      in original idea-stage proposals.
  title_cn: SoundnessBench：你的AI科学家真的能区分好的和坏的研究想法吗？
  abstract_cn: 自主AI研究智能体旨在通过自动化研究流程（从假设生成到同行评审）来加速科学发现。然而，现有基准很少测试一个根本瓶颈：大型语言模型在耗费时间和计算资源之前，能否判断研究想法的方法论可行性。我们提出了SoundnessBench，这是一个精心策划的基准，包含从ICLR投稿中重构的1,099个机器学习研究提案，并标注了评审者的合理性子分数，且对照原始论文进行了审计。SoundnessBench应被解释为对可恢复的提案阶段合理性的基准，而非对完整论文评审结果的精确预测。在对12个前沿LLM的评估中，我们发现了一种普遍的乐观偏差：在标准提示下，模型经常将低合理性的提案评为合理，而激进提示则主要将错误从假阳性转移到假阴性。针对公共语料污染、论文识别短语、表面特征和人工审计质量的额外控制实验表明，这种行为无法由单一混杂因素解释。我们的结果表明，当前LLM作为科学严谨性的独立第一关评估者尚不可靠。
  tldr_cn: 提出SoundnessBench测试LLM判断研究想法合理性的能力，发现普遍乐观偏差和不可靠性。
  analysis_cn:
    innovations:
    - 提出了SoundnessBench，这是一个精心策划的基准，包含从ICLR投稿中重构的1,099个机器学习研究提案，并标注了评审者的合理性子分数，且对照原始论文进行了审计。
    - 发现了前沿LLM中普遍的乐观偏差：在标准提示下，低合理性的提案经常被评分为合理。
    - 证明了激进提示将错误从假阳性转移到假阴性，但并未提高整体评估可靠性。
    - 进行了针对公共语料污染、论文识别短语、表面特征和人工审计质量的严格控制实验，排除了单一混杂因素的解释。
    methodology: SoundnessBench基于1,099个ICLR投稿构建，重构研究提案并标注评审者的合理性子分数，然后对照原始论文进行审计。在标准和激进提示下评估了12个前沿LLM，测量乐观偏差和错误类型转移。额外控制实验测试了污染、表面特征和审计质量等混杂因素。
    key_results: LLM表现出强烈的乐观偏差，经常将不合理的提案评为合理；激进提示减少了假阳性但增加了假阴性，且没有单一混杂因素能解释该行为，表明LLM作为科学严谨性的独立第一关评估者不可靠。
    limitations:
    - SoundnessBench衡量的是可恢复的提案阶段合理性，而非对完整论文评审结果的精确预测。
    - 该基准仅限于来自ICLR的机器学习研究提案，因此发现可能不适用于其他科学领域。
    - 激进提示仅改变了错误类型（从假阳性到假阴性），并未提高整体可靠性。
    - 从投稿中重构的提案可能引入原始提案阶段不存在的伪影。
