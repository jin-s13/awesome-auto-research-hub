  title_cn: OmniScientist：迈向人类与AI科学家共同进化的生态系统
  abstract_cn: 随着大型语言模型（LLMs）的快速发展，AI代理在科学任务中展现出日益增强的能力，涵盖假设生成、实验设计到论文撰写。这类代理系统通常被称为“AI科学家”。然而，现有的AI科学家主要将科学发现视为独立的搜索或优化问题，忽视了科学研究本质上是一项社会性和协作性的事业。现实世界的科学依赖于复杂的科学基础设施，包括协作机制、贡献归属、同行评审以及结构化的科学知识网络。由于缺乏对这些关键维度的建模，当前系统难以建立真正的研究生态系统或与人类科学社区进行深度互动。为弥补这一差距，我们提出了OmniScientist，一个将人类研究底层机制显式编码到AI科学工作流中的框架。OmniScientist不仅实现了从数据基础、文献综述、研究构思、实验自动化、科学写作到同行评审的端到端自动化，还通过模拟人类科学系统提供全面的基础设施支持，包括：（1）基于引文网络和概念相关性构建的结构化知识系统；（2）协作研究协议（OSP），实现无缝的多代理协作和人类研究者参与；（3）基于盲对用户投票和Elo排名的开放评估平台（ScienceArena）。该基础设施使代理不仅能够理解和利用人类知识系统，还能协作并共同进化，从而培育一个可持续且可扩展的创新生态系统。
  tldr_cn: OmniScientist将科学研究建模为社会协作生态系统，实现多代理自动化与基础设施支持。
  analysis_cn:
