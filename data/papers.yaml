    - 将人类干预与智能体驱动探索相结合的半自主工作流
    - 在时间受限的天体物理学挑战中应用并取得第一名
    methodology: 使用多智能体系统Cmbagent，专门化的智能体协作生成研究思路、编写并执行代码、评估结果，并迭代优化流程。该方法应用于FAIR
      Universe Weak Lensing Uncertainty Challenge，结合了自主探索与人类干预。最终推断流程使用了参数高效的卷积神经网络、在已知参数网格上的似然校准以及多种正则化技术。
    key_results: 完全自主探索未能达到专家级性能，但半自主模式下人类干预的整合使智能体驱动工作流在挑战中获得了第一名。
