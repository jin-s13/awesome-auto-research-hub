  title_cn: 利用AtomisticSkills进行代理式原子研究
  abstract_cn: 计算材料科学和化学涵盖广泛的知识领域和碎片化的软件生态系统。尽管大型语言模型（LLMs）已展现出研究能力，但扩展单体代理以管理原子研究的严谨性和复杂性仍是一个挑战。在此，我们介绍AtomisticSkills，一个开源框架，使通用AI编码代理能够在材料科学、化学和药物发现领域进行原子研究。通过将科学工作流分层分解为代理技能和工具，AtomisticSkills为代理提供了模块化、可扩展和即插即用的研究能力。该框架整合了超过100个人工策划的多学科技能，包括数据库访问、热力学和动力学建模，以及采用机器学习原子间势（MLIPs）和密度泛函理论（DFT）的多种模拟引擎。我们通过科学文献验证其功能覆盖范围，并在多个科学任务中展示了强大的编排能力：锂离子固态电解质的生成设计、用于CO2捕获的金属有机框架的高通量筛选、自主MLIP基准测试和微调、用于药物设计的多阶段基于结构的虚拟筛选、多模态X射线衍射图谱分析，以及用于析氧反应的铁氧化物催化剂筛选。AtomisticSkills为构建完全自主的AI科学家提供了关键的代理基础设施。
