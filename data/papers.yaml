      were probed.
  title_cn: 立场：正确答案，错误机制——当AI科学家捍卫其自身数据所矛盾的一般性主张时
  abstract_cn: AI科学家系统被描述为工具、合著者或创始人，但我们评估它们时仿佛只有最终答案才重要。本立场论文认为，仅以结果评估是不够的，必须分别衡量任务结果、机制忠实性和认知诚实性。我们的证据来自一个编码代理在Geant4模拟中试图重新发现已知粒子识别可观测量的28个片段，包括跨两个额外前沿模型的8个片段探测。在20个主模型片段中的4个和8个跨模型片段中的3个中，代理通过错误的推理得出了看似正确的结果，当条件改变时该推理失效，我们称之为“正确答案，错误机制”（CAWM）。诚实性和机制忠实性在单个代理轨迹内是分离的。当给定部分误导性的先验时，所有五个代理都基于证据拒绝了错误成分，但其中一个代理用与其自身数据不一致的物理学为其选择的可观测量辩护。在本研究基于模拟的发现环境中，编码代理被证明是可靠的工具，但对于开放式的声明制定而言，它们是不可靠的科学合著者，因为合著者信任需要它们无法可靠自我应用的机制忠实性验证。这种失败是可检测的，我们提出了一种轻量级测试。一步机制转换检查仅需代理的声明即可标记过度泛化的情况。当已知正确可观测量时，配套的重新计算检查可标记其余情况。这些检查共同标记了本研究中所有CAWM案例。
  tldr_cn: 本文主张仅以结果评估AI科学家不足，提出测量机制忠实性与认知诚实性，基于模拟中编码代理的证据。
  analysis_cn:
    innovations:
    - 提出从三个独立维度评估AI科学家系统：任务结果、机制忠实性和认知诚实性，而非仅看结果。
    - 引入并定义了“正确答案，错误机制”（CAWM）失败模式，即代理通过错误的推理得出看似正确的结果，该推理在条件变化时失效。
    - 提出了一种轻量级CAWM检测方法：仅使用代理声明的一步机制转换检查，以及在已知正确可观测量时的配套重新计算检查。
    methodology: 本研究分析了编码代理在Geant4模拟中试图重新发现已知粒子识别可观测量的28个片段，包括跨两个额外前沿模型的8个片段探测。检查代理轨迹的推理正确性、机制忠实性以及在给定部分误导性先验时的诚实性。
    key_results: 在20个主模型片段中的4个和8个跨模型片段中的3个中，代理表现出CAWM，即通过错误的推理得出看似正确的结果，该推理在条件变化时失效。所有五个代理都拒绝了错误的先验成分，但其中一个代理用与其自身数据不一致的物理学为其选择的可观测量辩护；所提出的检查标记了所有CAWM案例。
    limitations:
    - 研究结果仅限于基于模拟的发现环境和重新发现已知粒子识别可观测量的特定任务。
    - 研究使用了编码代理，结果可能不适用于其他类型的AI科学家系统。
    - 配套的重新计算检查需要知道正确的可观测量，这在真正的开放式发现中可能不可用。
    - 样本量较小（28个片段），且仅探测了两个额外前沿模型。
