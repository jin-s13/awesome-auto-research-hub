- id: aissistant-human-ai-collaborative-review-and-perspective-re-2025
  title: 'AISSISTANT: Human-AI Collaborative Review and Perspective Research Workflows
    in Data Science'
  authors:
  - Sasi Kiran Gaddipati
  - Farhana Keya
  - Gollam Rabby
  - Sören Auer
  abstract: 'High-quality scientific review and perspective papers require substantial
    time and effort, limiting researchers'' ability to synthesize emerging knowledge.
    While Large Language Models (LLMs) leverage AI Scientists for scientific workflows,
    existing frameworks focus primarily on autonomous workflows with very limited
    human intervention. We introduce AIssistant, the first open-source agentic framework
    for Human--AI collaborative generation of scientific perspectives and review research
    in data science. AIssistant employs specialized LLM-driven agents augmented with
    external scholarly tools and allows human intervention throughout the workflow.
    The framework consists of two main multi-agent systems: Research Workflow with
    seven agents and a Paper Writing Workflow with eight agents. We conducted a comprehensive
    evaluation with both human expert reviewers and LLM-based assessment following
    NeurIPS standards. Our experiments show that OpenAI o1 achieves the highest quality
    scores on chain-of-thought prompting with augmented Literature Search tools. We
    also conducted a Human--AI interaction survey with results showing a 65.7\% time
    savings. We believe that our work establishes a baseline for Human--AI collaborative
    scientific workflow for review and perspective research in data science, demonstrating
    that agent-augmented pipelines substantially reduce effort while maintaining research
    integrity through strategic human oversight.'
