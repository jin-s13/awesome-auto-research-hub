  title_cn: 通过研究框架将AI科学家的研究综合与验证外部化
  abstract_cn: AI系统日益能够自动化科学工作流程，但连接先前证据、生成的想法、实验和最终主张的推理过程往往仍隐含在模型推理中。本文介绍了Xcientist，一种研究框架，将研究综合与实验验证外部化为可检查、契约约束的过程。Xcientist将文献证据、想法状态、实施计划、消融记录和修复痕迹组织为持久化研究工件，使得生成的机制能够在不丢失其证据基础的情况下被落地、执行、测试和修订。我们将主张漂移识别为自动化研究的一种失败模式，即可运行工件不再支持最初主张的机制。在免训练记忆系统、图结构交通预测和多尺度物理信息神经网络上，Xcientist保留了从问题表述到机制设计、验证和有界修订的可追溯轨迹。这些结果表明，AI科学家的评估不应仅基于最终工件，还应基于其综合与验证过程是否保持可归因、可检查且科学可问责。
  tldr_cn: Xcientist将研究综合与验证外部化为可检查过程，保留可追溯轨迹，解决自动化AI研究中的主张漂移。
