  title_cn: （人类）注意力（依然）是全部所需：人类监督使AI辅助的社会科学研究可靠
  abstract_cn: 大型语言模型（LLMs）越来越多地被用于曾经只有训练有素的研究人员才能完成的任务，包括假设生成、规范选择和起草结论。我们认为，AI辅助研究的可靠性不仅取决于模型能力，还取决于人类与机器之间的认知劳动如何分配。我们通过人机协同经济研究（HLER）来研究这个问题，这是一种基于预先承诺、决策排序、问责制和注意力分配的决策架构。在一项预先指定的2×4因子实验中，涉及四个数据集上的280次完整研究运行，无约束的多智能体基线在72%的运行中产生了关键失败。使用相同的底层模型、相同的智能体分解以及共享推理智能体的相同提示，HLER通过施加三项架构承诺将失败率降低至16%：LLMs进行推理但不执行数据工作，数据和估计以确定性方式处理，以及三个人类决策门控绑定工作流程。Fisher精确检验在p<0.001水平上拒绝了失败率相等的假设。可靠性提升在公开代表性最低的数据集（清代人口登记册）上最大，这与基于任务的生产模型（输出质量服从弗雷歇分布）一致。一项80次运行的消融实验表明，确定性计算和人类门控具有独立贡献，并存在互补性的探索性证据。我们将HLER解释为一种研究约束框架而非自主AI科学家：它大幅减少失败，使残余弱点更加可见，并防止不可靠的声明被作为可发表的成果提出。
  tldr_cn: 通过HLER架构的人类监督将AI辅助社会科学研究失败率从72%降低到16%。
  analysis_cn:
    innovations:
    - 人机协同经济研究（HLER）决策架构，整合了预先承诺、决策排序、问责制和注意力分配
    - 三项架构承诺：LLMs进行推理但不执行数据工作，数据和估计以确定性方式处理，以及三个人类决策门控绑定工作流程
    - 将系统概念化为研究约束框架而非自主AI科学家，使残余弱点可见并防止不可靠的声明被推进
    methodology: 一项预先指定的2×4因子实验，在四个数据集上进行了280次完整研究运行，比较了无约束的多智能体基线与HLER，使用相同的底层模型、智能体分解以及共享推理智能体的相同提示。失败率通过Fisher精确检验进行比较，一项80次运行的消融实验评估了确定性计算和人类门控的独立贡献。
    key_results: 无约束基线在72%的运行中产生关键失败，而HLER将失败率降低至16%（p<0.001）。可靠性提升在公开代表性最低的数据集（清代人口登记册）上最大，消融实验表明确定性计算和人类门控具有独立贡献，并存在互补性的探索性证据。
    limitations:
    - 即使使用HLER，仍有16%的残余失败率
    - 确定性计算与人类门控之间互补性的证据是探索性的
    - 评估仅限于四个数据集和单一底层模型架构
    - 人类决策门控引入了人类努力和潜在瓶颈，这些在摘要中未量化
