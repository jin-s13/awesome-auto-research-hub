- id: deep-literature-survey-automation-with-an-iterative-workflow-2025
  title: Deep Literature Survey Automation with an Iterative Workflow
  authors:
  - Hongbo Zhang
  - Han Cui
  - Yidong Wang
  - Yijian Tian
  - Qi Guo
  - Cunxiang Wang
  - Jian Wu
  - Chiyu Song
  - Yue Zhang
  abstract: Automatic literature survey generation has attracted increasing attention,
    yet most existing systems follow a one-shot paradigm, where a large set of papers
    is retrieved at once and a static outline is generated before drafting. This design
    often leads to noisy retrieval, fragmented structures, and context overload, ultimately
    limiting survey quality. Inspired by the iterative reading process of human researchers,
    we propose \ours, a framework based on recurrent outline generation, in which
    a planning agent incrementally retrieves, reads, and updates the outline to ensure
    both exploration and coherence. To provide faithful paper-level grounding, we
    design paper cards that distill each paper into its contributions, methods, and
    findings, and introduce a review-and-refine loop with visualization enhancement
    to improve textual flow and integrate multimodal elements such as figures and
    tables. Experiments on both established and emerging topics show that \ours\ substantially
    outperforms state-of-the-art baselines in content coverage, structural coherence,
    and citation quality, while producing more accessible and better-organized surveys.
    To provide a more reliable assessment of such improvements, we further introduce
    Survey-Arena, a pairwise benchmark that complements absolute scoring and more
    clearly positions machine-generated surveys relative to human-written ones. The
    code is available at https://github.com/HancCui/IterSurvey\_Autosurveyv2.
