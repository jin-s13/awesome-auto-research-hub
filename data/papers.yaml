    - 对该领域从基础模块（2022-2023）到闭环系统（2024）再到可扩展性、影响力与人机协作（2025至今）的演进进行历史性描绘。
    methodology: 本综述通过应用统一的六阶段框架分解科学工作流，系统性地综合了AI科学家领域，然后利用这一视角分析和分类现有系统及三个发展阶段中的趋势。
