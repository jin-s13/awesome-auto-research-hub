- id: measurements-with-noise-bayesian-optimization-for-co-optimi-2024
  title: 'Measurements with Noise: Bayesian Optimization for Co-optimizing Noise and
    Property Discovery in Automated Experiments'
  authors:
  - Boris N. Slautin
  - Yu Liu
  - Jan Dec
  - Vladimir V. Shvartsman
  - Doru C. Lupascu
  - Maxim Ziatdinov
  - Sergei V. Kalinin
  abstract: 'We have developed a Bayesian optimization (BO) workflow that integrates
    intra-step noise optimization into automated experimental cycles. Traditional
    BO approaches in automated experiments focus on optimizing experimental trajectories
    but often overlook the impact of measurement noise on data quality and cost. Our
    proposed framework simultaneously optimizes both the target property and the associated
    measurement noise by introducing time as an additional input parameter, thereby
    balancing the signal-to-noise ratio and experimental duration. Two approaches
    are explored: a reward-driven noise optimization and a double-optimization acquisition
    function, both enhancing the efficiency of automated workflows by considering
    noise and cost within the optimization process. We validate our method through
    simulations and real-world experiments using Piezoresponse Force Microscopy (PFM),
    demonstrating the successful optimization of measurement duration and property
    exploration. Our approach offers a scalable solution for optimizing multiple variables
    in automated experimental workflows, improving data quality, and reducing resource
    expenditure in materials science and beyond.'
