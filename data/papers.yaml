    innovations:
    - Research monad：一种Haskell嵌入式DSL，强制每次假设检验更新误差预算，使得无法在不考虑多重性的情况下进行检验。
    - 带有操作系统级沙箱的声明式脚手架，物理隔离验证数据与LLM生成的代码运行的环境。
    - 在Lean 4中对LORD++在线FDR控制的机器检查形式化，包括误差预算的推导以及边际和完全FDR控制的证明。
    - 使用SPARK/Ada验证预算的财富不变性在IEEE 754浮点算术上，弥合从定理到实现的差距。
    - 首个从定理到浮点实现的在线FDR程序的验证链。
    methodology: 该架构结合了一个Haskell EDSL（Research monad），强制假设检验消耗误差预算，以及一个沙箱执行环境，扣留验证数据不让LLM生成的代码访问。设计基于Lean
      4对LORD++在线FDR控制的形式化，包含FDR控制的证明，并在SPARK/Ada中验证了财富不变性在IEEE 754算术上。评估使用模拟、端到端案例研究和对抗性测试。
    key_results: 模拟显示该架构将错误发现率保持在接近1%（目标为5%），而朴素方法达到41%。端到端案例研究表明，有效测试避免了虚假发现，但仍能检测到真实效应。对抗性评估证实，生成的代码即使被给予确切路径也无法访问保留数据。
