  title_cn: ProjectionBench：在渐进信息揭示下评估LLM的科学假设生成
  abstract_cn: 科学发现本质上是一个创造性和不确定的过程，需要超越已知知识回忆的推理。尽管已有许多基准通过多跳检索来评估大语言模型（LLM）在深度研究任务上的表现，但其对真正科学发现至关重要的创新推理能力仍未得到充分测试。我们提出一个基准框架，用于评估模型在科学发现和推理中的表现，从原始问题逐步构建到经典零假设检验。在我们的框架中，模型最初仅接收来自近期论文的主题和研究问题，技术细节逐步揭示。在每个信息揭示阶段，模型需生成针对研究问题的假设，这些假设与原始论文的结论进行比较，并通过自动语义相似性对构成原子声明进行评估。这种从真实结论出发的渐进式语义偏离评估，能够衡量模型在最少信息下的创新性以及在全实验细节下的基于推理的能力，这两者对于将LLM用于科学发现至关重要。我们的框架为系统评估LLM的科学推理和发现能力奠定了基础，这对于推动下一代AI科学家/合作科学家系统的发展至关重要。具体而言，我们评估了GPT-5、GPT-5.4、Gemini
    2.5 pro和Gemini 3.1 pro preview在涵盖生物活性材料、机械材料和纳米材料的45篇论文上的表现。我们发现，GPT-5.4和Gemini
    3.1 pro的表现优于其前代版本，且GPT-5.4即使在最少上下文下也能保持与真实结论的0.7 F1分数对齐。
  tldr_cn: 一个在渐进信息揭示下评估LLM科学假设生成的基准，衡量创新性和基于推理的能力。
  analysis_cn:
    innovations:
    - 渐进信息揭示框架，用于评估从最少上下文到全实验细节的假设生成。
    - 通过自动语义相似性对原子声明进行评估，以衡量与真实结论的偏离。
    - 对多个LLM（GPT-5、GPT-5.4、Gemini 2.5 pro、Gemini 3.1 pro preview）在材料科学子领域的45篇近期论文上进行基准测试。
    methodology: 模型从近期论文中获取研究主题和问题，技术细节逐步揭示。在每个阶段，模型生成假设，这些假设被分解为原子声明，并通过自动语义相似性与原始论文的结论进行比较，以量化对齐和偏离。
    key_results: GPT-5.4和Gemini 3.1 pro的表现优于其前代版本；GPT-5.4即使在最少上下文下也能保持与真实结论的0.7 F1分数对齐。
    limitations: []
    tech_stack: []
