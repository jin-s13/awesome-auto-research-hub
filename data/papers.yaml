  title_cn: 'TianJi-Environ: 用于大气环境研究的自主人工智能科学家'
  abstract_cn: 随着大气环境预测的不断改进，污染机制与反馈过程的可解释验证已成为大气化学的主要挑战。然而，基于复杂数值模型的机制验证仍然严重依赖专家知识：机制假设必须转化为可执行的实验，模型输出必须组织成可追溯的证据。我们提出了TianJi-Environ，一个用于大气化学机制验证的可审计人工智能科学家。TianJi-Environ建立了首个基于WRF-Chem的多智能体框架，能够自主驱动复杂的大气化学模拟，将机制假设转化为可执行的配置、测试实验和证据标准。以臭氧响应和颗粒物反馈作为两个代表性案例，我们展示了TianJi-Environ的机制验证能力。在华北平原夏季臭氧案例中，系统检测到短波辐射和边界层高度中方向一致的气溶胶-辐射相互作用信号，但判断臭氧对NOx控制的响应证据不完整。在关中盆地冬季PM2.5案例中，系统将不支持的联系定位为从黑碳扰动到颗粒物响应的传播不足以及缺少垂直吸收加热的诊断。这些结果表明，TianJi-Environ使专家驱动的机制验证变得明确、结构化且可审计，为与复杂大气化学模型耦合的多智能体系统提供了可复现的范式。
  tldr_cn: TianJi-Environ是自主AI科学家，利用多智能体WRF-Chem模拟验证大气化学机制，并通过实际案例研究。
  analysis_cn:
    innovations:
    - 首个基于WRF-Chem的多智能体框架，用于自主大气化学机制验证
    - 将机制假设转化为可执行的配置、测试实验和证据标准
    - 可审计的人工智能科学家，使专家驱动的机制验证变得明确、结构化且可复现
    methodology: TianJi-Environ是一个与WRF-Chem模型耦合的多智能体系统，能够自主将机制假设转化为模拟实验，执行实验，并根据预定义的证据标准评估输出。该系统在华北平原夏季臭氧和关中盆地冬季PM2.5两个案例研究中进行了演示。
    key_results: 在臭氧案例中，系统检测到了气溶胶-辐射相互作用信号，但判断臭氧对NOx控制的响应证据不完整。在PM2.5案例中，系统将不支持的联系定位为从黑碳扰动到颗粒物响应的传播不足以及缺少垂直吸收加热的诊断。
