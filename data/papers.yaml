  analysis:
    innovations:
    - Rigorous evaluation of an autonomous AI scientist (KOSMOS) using simple random-gene
      null benchmarks
    - Application of null-model auditing to AI-generated hypotheses in radiation biology
    methodology: KOSMOS, an autonomous AI scientist, generated three hypotheses for
      radiation biology problems. Each hypothesis was tested against random-gene null
      benchmarks using metrics such as Spearman correlation, empirical p-values, and
      concordance index to assess whether the AI's predictions outperformed random
      gene sets.
    key_results: One hypothesis (CDO1 predicting radiation-response modules) was strongly
      supported (r=0.70, empirical p=0.0039); a 12-gene signature for prostate radiotherapy
      outcome was significant but had a non-unique effect size (C-index=0.61, p=0.017);
      and a DDR-p53 hypothesis was not supported (rho=-0.40, p=0.76, indistinguishable
      from random).
    limitations:
    - KOSMOS produced one false hypothesis and one uncertain result, demonstrating
      that AI-generated hypotheses can be misleading without rigorous auditing.
    - The significant 12-gene signature had a non-unique effect size, limiting its
      practical value.
    - Evaluation was restricted to three specific problems in radiation biology, so
      generalizability to other domains is unknown.
  title_cn: 当AI从事科学：评估自主AI科学家KOSMOS在放射生物学中的表现
  abstract_cn: 基于智能体的AI“科学家”现在使用语言模型搜索文献、进行分析并生成假设。我们使用简单的随机基因零假设基准（random-gene null
    benchmarks）评估了自主AI科学家KOSMOS在放射生物学中的三个问题。假设1：不同细胞系的基线DNA损伤反应（DDR）能力预测辐照后的p53转录反应（GSE30240）。假设2：OGT和CDO1的基线表达预测乳腺癌细胞中受抑制和诱导的辐射反应模块的强度（GSE59732）。假设3：一个12基因表达特征预测前列腺放疗加雄激素剥夺治疗后的生化无复发生存率（GSE116918）。DDR-p53假设未得到支持：DDR评分与p53反应呈弱负相关（Spearman
    rho = -0.40, p = 0.76），与随机五基因评分无法区分。OGT仅显示弱关联（r = 0.23, p = 0.34），而CDO1是一个明显的异常值（r
    = 0.70, 经验p = 0.0039）。12基因特征的一致性指数为0.61（p = 0.017），但效应量非唯一。总体而言，KOSMOS产生了一个得到充分支持的发现、一个合理但不确定的结果以及一个错误假设，表明AI科学家可以产生有用的想法，但需要针对适当的零假设模型进行严格审计。
  tldr_cn: 用随机基因零假设基准评估KOSMOS，三个假设中一个有效。
  analysis_cn:
    innovations:
    - 使用简单随机基因零假设基准对自主AI科学家（KOSMOS）进行严格评估
    - 将零假设模型审计应用于放射生物学中AI生成的假设
    methodology: KOSMOS，一个自主AI科学家，为放射生物学问题生成了三个假设。每个假设均使用随机基因零假设基准进行测试，采用斯皮尔曼相关性、经验p值和一致性指数等指标，评估AI的预测是否优于随机基因集。
    key_results: 一个假设（CDO1预测辐射反应模块）得到强烈支持（r=0.70，经验p=0.0039）；一个用于前列腺放疗结局的12基因特征显著但效应量非唯一（C-index=0.61，p=0.017）；而DDR-p53假设未得到支持（rho=-0.40，p=0.76，与随机无法区分）。
    limitations:
    - KOSMOS产生了一个错误假设和一个不确定结果，表明没有严格审计的AI生成假设可能具有误导性。
    - 显著的12基因特征具有非唯一效应量，限制了其实用价值。
    - 评估仅限于放射生物学中的三个特定问题，因此对其他领域的泛化能力未知。
    tech_stack: []
