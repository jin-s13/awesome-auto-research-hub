- id: physmaster-building-an-autonomous-ai-physicist-for-theoreti-2025
  title: 'PhysMaster: Building an Autonomous AI Physicist for Theoretical and Computational
    Physics Research'
  authors:
  - Tingjia Miao
  - Jiawen Dai
  - Jingkun Liu
  - Jinxin Tan
  - Muhua Zhang
  - Wenkai Jin
  - Yuwen Du
  - Tian Jin
  - Xianghe Pang
  - Zexi Liu
  - Tu Guo
  - Zhengliang Zhang
  - Yunjie Huang
  - Shuo Chen
  - Rui Ye
  - Yuzhi Zhang
  - Linfeng Zhang
  - Kun Chen
  - Wei Wang
  - Weinan E
  - Siheng Chen
  abstract: 'Advances in LLMs have produced agents with knowledge and operational
    capabilities comparable to human scientists, suggesting potential to assist, accelerate,
    and automate research. However, existing studies mainly evaluate such systems
    on well-defined benchmarks or general tasks like literature retrieval, limiting
    their end-to-end problem-solving ability in open scientific scenarios. This is
    particularly true in physics, which is abstract, mathematically intensive, and
    requires integrating analytical reasoning with code-based computation. To address
    this, we propose PhysMaster, an LLM-based agent functioning as an autonomous theoretical
    and computational physicist. PhysMaster couples absract reasoning with numerical
    computation and leverages LANDAU, the Layered Academic Data Universe, which preserves
    retrieved literature, curated prior knowledge, and validated methodological traces,
    enhancing decision reliability and stability. It also employs an adaptive exploration
    strategy balancing efficiency and open-ended exploration, enabling robust performance
    in ultra-long-horizon tasks. We evaluate PhysMaster on problems from high-energy
    theory, condensed matter theory to astrophysics, including: (i) acceleration,
    compressing labor-intensive research from months to hours; (ii) automation, autonomously
    executing hypothesis-driven loops ; and (iii) autonomous discovery, independently
    exploring open problems.'
  year: 2025
  venue: arXiv
  paper_type:
  - method
  tags:
