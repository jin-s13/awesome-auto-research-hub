  title_cn: CycleResearcher：通过自动化评审改进自动化研究
  abstract_cn: 科学发现的自动化一直是研究界的长期目标，其驱动力在于加速知识创造的潜力。尽管使用商业大语言模型（LLM）作为研究助手或创意生成器已取得显著进展，但利用开源LLM自动化整个研究过程的可行性仍鲜有探索。本文探讨了使用开源后训练LLM作为自主代理，执行从文献综述和稿件准备到同行评审和论文改进的完整自动化研究与评审周期的可行性。我们的迭代偏好训练框架包括执行研究任务的CycleResearcher和模拟同行评审过程的CycleReviewer，通过强化学习提供迭代反馈。为训练这些模型，我们开发了两个新数据集Review-5k和Research-14k，反映真实世界的机器学习研究和同行评审动态。结果表明，CycleReviewer在预测论文评分方面相比单个人类评审者实现了26.89%的平均绝对误差（MAE）降低，表明LLM在有效辅助专家级研究评估方面的潜力。在研究方面，CycleResearcher模型生成的论文在模拟同行评审中获得了5.36分，与人类专家预印本水平5.24相比显示出一定竞争力，但与录用论文水平5.69相比仍有改进空间。这项工作朝着完全自动化的科学探究迈出了重要一步，提供了伦理保障并探索了AI驱动的研究能力。代码、数据集和模型权重已在https://wengsyx.github.io/Researcher/发布。
  tldr_cn: 提出CycleResearcher和CycleReviewer，利用迭代偏好训练和新数据集实现自动化研究与同行评审的开源LLM代理。
  analysis_cn:
    innovations:
    - 首次探索使用开源后训练LLM作为自主代理实现全周期自动化研究与评审。
    - 迭代偏好训练框架，将CycleResearcher（稿件生成）与CycleReviewer（通过强化学习反馈模拟同行评审）配对。
    - 引入两个新数据集Review-5k和Research-14k，捕捉真实世界机器学习研究与同行评审动态。
    - 证明基于LLM的评审者在论文评分预测中相比单个人类评审者将平均绝对误差降低26.89%。
    methodology: 本文提出一个迭代偏好训练框架，其中CycleResearcher执行文献综述和稿件准备，CycleReviewer模拟同行评审以提供强化学习反馈用于论文改进。两个模型均为开源后训练LLM，基于新创建的Review-5k和Research-14k数据集进行训练，这些数据集反映了真实的机器学习研究与评审过程。
    key_results: CycleReviewer在论文评分预测中相比单个人类评审者实现了26.89%的MAE降低。CycleResearcher生成的论文获得5.36的模拟评审分数，超过了人类预印本基线5.24，但低于录用论文水平5.69。
    limitations:
    - 生成的论文仍落后于录用论文质量（分数5.36对比5.69），表明仍有改进空间。
    - 评估基于模拟同行评审，而非真实会议录用或超出评分预测的人类专家判断。
