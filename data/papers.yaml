  title_cn: MirrorMind：利用人类科学家的专家视角和集体知识赋能OmniScientist
  abstract_cn: AI科学家的出现已在自动化科学研究方面展现出巨大潜力。然而，当前方法大多将科学发现视为孤立的优化或搜索过程，忽视了知识生产本质上是一项社会性和历史性的事业。人类科学洞察源于两个不同但相互关联的来源：一是个体认知轨迹，研究者的独特洞察由其不断演变的研究历史和风格偏好塑造；二是集体学科记忆，知识沉淀为庞大且相互关联的引文和概念网络。现有大语言模型仍难以表征这些结构化、高保真的认知和社会背景。为弥合这一差距，我们提出了MirrorMind，一种分层认知架构，在三层框架内整合了双记忆表示。个体层通过捕获研究者的情景记忆、语义记忆和人格记忆来构建高保真认知模型；领域层将集体知识映射为结构化的学科概念图；跨学科层则充当正交编排引擎。关键的是，我们的架构将记忆存储与智能体执行分离，使AI科学家智能体能够灵活访问个体记忆以获取独特视角，或访问集体结构进行推理。我们在四个综合任务上评估了MirrorMind，包括作者级认知模拟、互补推理、跨学科协作促进和多智能体科学问题求解。结果表明，通过整合个体认知深度与集体学科广度，MirrorMind超越了简单的事实检索，实现了结构化、个性化和洞察生成的科学推理。
  tldr_cn: MirrorMind提出双记忆表示的分层认知架构，为AI科学家建模个体与集体知识。
  analysis_cn:
    innovations:
    - 将科学发现概念化为社会和历史过程，而不仅仅是孤立的优化。
    - 双记忆表示：个体认知轨迹（情景、语义、人格记忆）和集体学科记忆（结构化概念图）。
    - 三层分层认知架构：个体层、领域层、跨学科层。
    - 将记忆存储与智能体执行分离，实现灵活访问个体或集体记忆。
    methodology: MirrorMind是一种分层认知架构，包含三个层级：Individual Level捕获研究者的情景、语义和人格记忆；Domain
      Level将集体知识映射为学科概念图；Interdisciplinary Level进行编排。记忆存储与智能体执行分离。在四个任务上进行评估：作者级认知模拟、互补推理、跨学科协作促进和多智能体科学问题求解。
    key_results: MirrorMind通过整合个体认知深度与集体学科广度，超越了简单的事实检索，实现了结构化、个性化和洞察生成的科学推理。
