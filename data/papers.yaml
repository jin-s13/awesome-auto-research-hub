    methodology: EvoScientist采用三个智能体（研究者、工程师、演化管理）和两个持久记忆模块。演化管理智能体将先前交互中的见解提炼为构思记忆和实验记忆，研究者智能体和工程师智能体检索这些记忆以改进想法生成和代码执行。评估通过与7个开源和商业系统在想法质量（新颖性、可行性、相关性、清晰度）上的自动和人工比较，以及代码执行成功率进行。
