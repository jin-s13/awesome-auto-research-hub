  title_cn: SurveyX：基于大语言模型的学术综述自动化
  abstract_cn: 大语言模型（LLMs）展现了卓越的理解能力和庞大的知识库，表明LLMs可以作为自动综述生成的高效工具。然而，近期关于自动综述生成的研究仍受到一些关键限制，如有限的上下文窗口、缺乏深入的内容讨论以及缺少系统化的评估框架。受人类写作过程的启发，我们提出了SurveyX，一个高效且组织化的自动综述生成系统，将综述撰写过程分解为两个阶段：准备阶段和生成阶段。通过创新性地引入在线参考文献检索、一种名为AttributeTree的预处理方法以及再润色过程，SurveyX显著提升了综述撰写的效果。实验评估结果表明，SurveyX在内容质量（提升0.259）和引用质量（提升1.76）方面优于现有的自动综述生成系统，在多个评估维度上接近人类专家水平。由SurveyX生成的综述示例可在www.surveyx.cn上获取。
