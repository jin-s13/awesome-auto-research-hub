  title_cn: 一次反思不够：通过多假设失败归因实现自我修正的自主研究
  abstract_cn: 自主研究代理现在可以起草假设、编写代码、运行实验并生成论文，但在实验失败时仍然脆弱。在主流范式下，失败恢复通常委托给单一的自由形式反思：将丰富的轨迹（包括指标、日志和设计选择）压缩成一条口头批评，这往往导致局部试错或硬性转向，丢弃有用的上下文。我们提出SAGE（自我修正、自主、基于事实的实验者）来解决这一失败恢复瓶颈。其核心机制——多假设失败归因（MHFA）——将恢复视为结构化的因果诊断。通过分析动态轨迹特征，MHFA系统性地生成多个基于证据的失败解释，独立评估其严重性，并将验证后的根本原因确定性地路由到正确的干预级别（假设、实验设计或实现）。为保证科学诚实性，SAGE进一步采用基于事实的报告机制，明确将起草的结果约束为实际测量值，删除幻觉数字。在包含12个主题、5个领域的基准测试中，SAGE将包含指标的输出从42%提升至92%，工件质量从5.00/10提升至6.75/10，并在盲评中超过AI-Scientist-v2（52.0
    vs. 48.2），增益集中在代码开发和执行方面。尽管完全自主的科学写作和生成会议级别的论文对整个领域来说仍然是众所周知的困难开放问题，但SAGE成功生成了显著更可靠和更高质量的科学工件。最终，通过将结构化恢复与显式事实约束相结合，SAGE显著优于单一反思范式，为未来的自主研究建立了高度可信的基础。
  tldr_cn: SAGE通过多假设失败归因实现自主研究代理的自我修正，在12主题基准上提升成功率和工件质量。
  analysis_cn:
    innovations:
    - 多假设失败归因（MHFA）：一种结构化因果诊断机制，生成多个基于证据的失败解释，评估其严重性，并将验证后的根本原因确定性地路由到正确的干预级别（假设、实验设计或实现）。
    - 基于事实的报告机制：将起草的结果约束为实际测量值，删除幻觉数字，确保科学诚实性。
    - SAGE系统：整合MHFA和基于事实的报告，克服自主研究代理中单一自由形式反思的失败恢复瓶颈。
    methodology: SAGE采用MHFA分析动态轨迹特征，生成多个失败假设，评估严重性，并路由干预。基于事实的报告机制强制事实准确性。系统在包含12个主题、5个领域的基准测试中，与反思基线和AI-Scientist-v2进行对比，评估指标包括包含指标的输出、工件质量和盲评分数。
    key_results: SAGE将包含指标的输出从42%提升至92%（相比反思基线），工件质量从5.00/10提升至6.75/10，并在盲评中超过AI-Scientist-v2（52.0
      vs. 48.2），增益集中在代码开发和执行方面。
    limitations:
    - 完全自主的科学写作和生成会议级别的论文对整个领域来说仍然是众所周知的困难开放问题，SAGE并未完全解决这些问题。
