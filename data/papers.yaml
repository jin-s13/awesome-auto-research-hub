- id: lira-a-multi-agent-framework-for-reliable-and-readable-lite-2025
  title: 'LiRA: A Multi-Agent Framework for Reliable and Readable Literature Review
    Generation'
  authors:
  - Gregory Hok Tjoan Go
  - Khang Ly
  - Anders Søgaard
  - Amin Tabatabaei
  - Maarten de Rijke
  - Xinyi Chen
  abstract: The rapid growth of scientific publications has made it increasingly difficult
    to keep literature reviews comprehensive and up-to-date. Though prior work has
    focused on automating retrieval and screening, the writing phase of systematic
    reviews remains largely under-explored, especially with regard to readability
    and factual accuracy. To address this, we present LiRA (Literature Review Agents),
    a multi-agent collaborative workflow which emulates the human literature review
    process. LiRA utilizes specialized agents for content outlining, subsection writing,
    editing, and reviewing, producing cohesive and comprehensive review articles.
    Evaluated on SciReviewGen and a proprietary ScienceDirect dataset, LiRA outperforms
    current baselines such as AutoSurvey and MASS-Survey in writing and citation quality,
    while maintaining competitive similarity to human-written reviews. We further
    evaluate LiRA in real-world scenarios using document retrieval and assess its
    robustness to reviewer model variation. Our findings highlight the potential of
    agentic LLM workflows, even without domain-specific tuning, to improve the reliability
    and usability of automated scientific writing.
