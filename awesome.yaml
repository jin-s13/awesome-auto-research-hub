project:
  name: Awesome Auto Research Hub
  description: 'A curated hub for AI systems that automate scientific research: literature
    review, survey synthesis, experiment design and execution, paper writing, AI scientists,
    and autonomous research agents.'
  github_url: https://github.com/jin-s13/awesome-auto-research-hub
  site_url: https://jin-s13.github.io/awesome-auto-research-hub
  generator_repo: jin-s13/awesome-hub-generator
research:
  keywords:
  - AI scientist
  - automated scientific discovery
  - autonomous research agent
  - automated research
  - literature review agent
  - survey generation
  - automated experimentation
  - experiment design agent
  - AI for scientific research
  - paper writing agent
  - research automation
  - scientific discovery agent
  taxonomy:
    paper_types:
    - label: method
      description: Algorithms, agent architectures, planning methods, training methods,
        or inference methods for automated research.
    - label: system
      description: End-to-end research agent systems, AI scientist platforms, lab
        automation systems, and research workflow frameworks.
    - label: benchmark
      description: Benchmarks, datasets, evaluation protocols, metrics, or environments
        for automated research systems.
    - label: survey
      description: Surveys, taxonomies, literature reviews, perspectives, or roadmaps
        about AI-automated research.
    - label: application
      description: Applications of autonomous research agents to science, engineering,
        medicine, materials, biology, chemistry, or ML research.
    - label: theory
      description: Conceptual, theoretical, safety, epistemic, or methodology analysis
        of automated scientific research.
    dimensions:
    - name: research_stage
      description: research workflow stages addressed (e.g., literature review, hypothesis
        generation, experiment design, execution, analysis, paper writing)
    - name: automation_level
      description: automation level (assistant, semi-autonomous agent, closed-loop
        autonomous scientist, lab robot integration)
    - name: evaluation_domains
      description: scientific or research domains evaluated
    - name: outputs
      description: outputs produced (e.g., survey, hypothesis, experiment plan, code,
        results, manuscript)
  taxonomy_discovery:
    enabled: true
    update_mode: propose
    max_depth: 3
    max_children_per_node: 8
    nodes:
    - id: literature_intelligence
      label: Literature Intelligence
      description: Automated literature search, paper reading, citation analysis,
        literature review, survey synthesis, and research gap discovery.
      keywords:
      - literature review agent
      - survey generation
      - paper reading
      - research gap discovery
      - citation analysis
    - id: hypothesis_and_idea_generation
      label: Hypothesis & Idea Generation
      description: Systems that propose hypotheses, research ideas, experimental directions,
        or scientific questions.
      keywords:
      - hypothesis generation
      - idea generation
      - scientific ideation
      - research proposal generation
    - id: experiment_automation
      label: Experiment Automation
      description: Agents that design, execute, monitor, analyze, or iterate experiments,
        including code-based and lab-based experimentation.
      keywords:
      - automated experimentation
      - experiment design agent
      - closed-loop experimentation
      - lab automation
    - id: ai_scientist_systems
      label: AI Scientist Systems
      description: End-to-end autonomous research agents that combine ideation, experimentation,
        analysis, and manuscript generation.
      keywords:
      - AI scientist
      - autonomous research agent
      - automated scientific discovery
      - research agent
    - id: writing_and_communication
      label: Writing & Communication
      description: Automatic paper writing, manuscript drafting, scientific reporting,
        peer review assistance, and research communication.
      keywords:
      - paper writing agent
      - manuscript generation
      - scientific writing
      - peer review agent
    - id: evaluation_and_governance
      label: Evaluation, Reliability & Governance
      description: Evaluation, reproducibility, safety, epistemic reliability, governance,
        and benchmark infrastructure for automated research.
      keywords:
      - research agent benchmark
      - scientific reliability
      - reproducibility
      - AI scientist evaluation
    source_headings:
    - AI Scientist Systems
    - Literature Review Agents
    - Survey Generation
    - Hypothesis Generation
    - Automated Experimentation
    - Scientific Discovery Agents
    - Paper Writing Agents
    - Research Agent Benchmarks
  relevance_criteria:
    include:
    - AI systems or agents whose core contribution automates scientific research workflows
    - Automated literature search, paper reading, literature review, survey synthesis,
      or research gap discovery
    - Autonomous or semi-autonomous hypothesis generation, research idea generation,
      or scientific planning
    - Automated experiment design, experiment execution, result analysis, or closed-loop
      scientific discovery
    - AI Scientist systems that combine ideation, experimentation, analysis, and manuscript
      or report generation
    - Automatic scientific writing, paper drafting, peer review assistance, or research
      communication grounded in scientific work
    - Benchmarks, evaluation protocols, datasets, or safety/reliability analysis for
      automated research agents
    - Applications of research agents to scientific discovery in ML, biology, chemistry,
      materials, medicine, engineering, or other sciences
    exclude:
    - General LLM agents, chatbots, RAG systems, or tool-use papers without a scientific
      research automation contribution
    - General coding agents or software engineering automation unless used as part
      of scientific experiment automation
    - Ordinary scientific ML models that solve one domain task without automating
      research workflow steps
    - Pure literature retrieval or citation recommendation without review synthesis,
      research gap discovery, or research-agent workflow
    - General text summarization, document QA, or writing assistance not specific
      to scientific research or papers
    - Robotics, lab hardware, or experiment control without AI-driven research planning
      or discovery loop
    - Medical diagnosis, drug discovery, protein design, materials prediction, or
      other scientific applications without autonomous research workflow automation
    - General foundation model training, benchmark reports, or model release papers
      without automated research capability
  llm:
    workers: 4
    survey_workers: 2
  negative_keywords:
  - financial trading
  - stock market
  - cryptocurrency
  - weather forecast
  - traffic prediction
  - object detection
  - image segmentation
  - speech recognition
  - OCR
  - recommendation system
  - protein folding only
  - medical diagnosis only
  - drug response prediction only
  - molecular property prediction only
  - autonomous driving
  - humanoid
  - robot grasping
  - reinforcement learning benchmark only
  domain_boost_keywords:
  - AI scientist
  - automated research
  - autonomous research
  - scientific discovery agent
  - literature review
  - survey synthesis
  - hypothesis generation
  - experiment design
  - automated experimentation
  - closed-loop discovery
  - paper writing
  - manuscript generation
  - research agent
  - lab automation
  arxiv_categories:
  - cs.AI
  - cs.CL
  - cs.LG
  - cs.MA
  - cs.DL
  - stat.ML
  date_from: '2023-01-01'
  daily_search_days: 14
  huggingface_daily_max_days: 7
  sources:
    arxiv: true
    huggingface_daily: true
    huggingface_trending: true
    huggingface_datasets: true
    upstream_awesome: true
    alphaxiv: false
  datasets:
    huggingface: true
    huggingface_max_keywords: 4
    huggingface_limit_per_keyword: 20
    derive_from_papers: true
  alphaxiv:
    enabled: false
    endpoint: ''
  upstream_awesome:
    repos:
    - SakanaAI/AI-Scientist
    - worldbench/awesome-ai-auto-research
    - DavidZWZ/Awesome-Deep-Research
    - yuzhimanhua/Awesome-Scientific-Language-Models
    - HKUST-KnowComp/Awesome-LLM-Scientific-Discovery
    - openags/Awesome-AI-Scientist-Papers
    - handsome-rich/Awesome-Auto-Research-Tools
    - alvinunreal/awesome-autoresearch
    - Leey21/awesome-ai-research-writing
    auto_discover: true
  auto_discover:
    enabled: true
    min_stars: 5
    max_sources: 5
    max_search_terms: 2
    max_repos_to_fetch: 4
    search_interval_seconds: 0.5
    core_interval_seconds: 0.1
    request_timeout_seconds: 8
    max_rate_limit_sleep_seconds: 30
    query_expansion:
    - AI scientist
    - automated scientific discovery
    - autonomous research agent
    - research agent literature review
    - AI literature review agent
    - scientific discovery agent
    - automated experimentation agent
    - paper writing agent
    - AI research automation
  seed_discovery:
    enabled: false
    api: semantic_scholar
    max_references_per_paper: 80
    max_seeds_per_run: 20
    initial_seed_arxiv_ids: []
  candidate_pool:
    enabled: true
    db_path: data/candidates.db
    promote_batch_size: 100
  overrides:
    enabled: true
    file: data/papers.overrides.yaml
  scoring:
    base_score: 1.5
    weight_coefficient: 2.5
    max_score_per_keyword: 10
    filter_min_score: 5.0
    author_bonus:
      enabled: false
      bonus_points: 5.0
      expert_authors: []
  ranking:
    enabled: true
    weights:
      topical_relevance: 0.25
      citation_impact: 0.15
      graph_prestige: 0.15
      citation_velocity: 0.1
      methodology_quality: 0.15
      reproducibility: 0.15
      recency: 0.05
    citation_graph:
      enabled: true
      fetch_openalex: false
      timeout: 20
      workers: 6
      api_key: ''
      mailto: ''
  deep_analysis:
    enabled: false
    min_score: 30
    pdf_parser: mineru
    max_papers_per_run: 10
  interpretations:
    enabled: true
    workers: 10
    daily_limit: 0
    checkpoint_interval: 5
    force_analysis: false
    sleep: 0.0
  teasers:
    workers: 10
    retry_fallbacks: true
  deep_research:
    enabled: true
    min_read_first_score: 70
    max_papers_per_run: 10
  enrichment:
    enabled: true
    max_concurrent: 10
    extract_affiliations: true
    extract_figures: true
    extract_methods: true
  grading:
    must_read_min_score: 45
    worth_reading_min_score: 25
  history:
    enabled: true
    retention_days: 60
    min_papers_per_run: 20
    weekend_mode: true
  image_localization:
    enabled: true
    max_concurrent: 10
  keyword_tracking:
    enabled: true
    report_frequency: weekly
website:
  sections:
    papers: true
    datasets: true
    projects: true
    resources: true
    analysis: true
    trends: true
  nav:
  - label: Home
    href: /
  - label: Papers
    href: /papers
  - label: Datasets
    href: /datasets
  - label: Projects
    href: /projects
  - label: Analysis
    href: /analysis
  - label: Resources
    href: /resources
  - label: Trends
    href: /trends
  footer: Built with awesome-hub-generator for AI automated research.
